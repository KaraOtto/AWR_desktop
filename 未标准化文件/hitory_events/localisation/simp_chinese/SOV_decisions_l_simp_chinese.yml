SOV_socialism_in_one_country_idea:0 "一国建成社会主义论"
SOV_socialism_in_one_country_idea_desc:0 "“一国建成社会主义论”是苏联领导人约瑟夫·斯大林于列宁逝世后提出的全新社会主义革命理论，其认为社会主义革命可以首先在一国内爆发并得到巩固和建成，而非必须要在世界范围内同时进行和完成。这是对马克思列宁主义关于世界革命理论的重大调整。"
