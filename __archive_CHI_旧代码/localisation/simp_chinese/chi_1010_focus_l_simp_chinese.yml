l_simp_chinese:
constit_draft_focus:0 "宪法起草委员会"
constit_draft_focus_desc:0 "我中华民国距离民主还有一段路要走，话虽如此，我们还是能向各党各派的政治家与知识分子乃至老百姓传达我们的愿景，让他们知道中国国民党不是一个独裁的政党，我们会先让党内志士依照孙总理的构想，来提出一个宪法的蓝图。可想而知，这部宪法草案不能让所有人满意，但我们有很多时间来讨论宪法的具体内容，毕竟民主应该严肃且谨慎地处理。"
CHI_national_political_council_focus:0 "国民参政会"
CHI_national_political_council_focus_desc:0 "日本的野心只增不减，我们必须预想一个可能与日本开战的未来，到时候乃我们中华民国与中华民族的存亡之秋，但就是这样的时刻提供给了我们一个团结一致对外的机会。我们会把握时机开设一个名为国民参政会的政治咨询机关，让支持我们的与反对我们的人都能一起把话讲开，同时接纳各方对当前宪法草案的意见，真正地让三民主义与五权宪法能够实现。"
CHI_political_consultative_assembly_focus:0 "政治协商会议"
CHI_political_consultative_assembly_focus_desc:0 "太久了，不论是与日本侵略者的战争，还是我们国民对民主的期待，又或者是中国国民党背负独裁的骂名，都已经持续太久了。现在日本人已经撤离，我们终于可以真正地一步步走向宪政，实施军队国家化、政治民主化、党派平等、地方自治，达到和平民主的建国。我们将举办政治协商会议，完成一部为各党各派所接受，且能造福全国国民的中华民国宪法。"
CHI_constitution_focus:0 "制宪会议"
CHI_constitution_focus_desc:0 "虽然政治协商会议的争吵与不愉快导致我们几度差点前功尽弃，但我们还是走过来了。我们成功完成了一部不失去三民主义精随且能有效运转的五权宪法。最后，我们要让这部宪法得到国民的授权以获得正当性与合法性，我们会在全中国各地展开选出制宪国民大会代表的直接选举，再让这些代表共同审议与表决宪法，就快了，民主之花就快在中国绽放了！"
CHI_lighthouse_of_democracy_focus:0 "民主灯塔"
CHI_lighthouse_of_democracy_focus_desc:0 "中国帝制虽有几度盛世，但若皇帝无能则百姓受苦，除了隐忍就是造反，如此循环，永无安宁之日。中国人需要自己选出一位国家元首，且每四年选一次，以此来真正为百姓谋幸福。你能在这看到英美法的选举制度、立宪主义、契约精神、自由保障、社会福利、市场经济、还有苏维埃式的全国代表大会，你现在看到的，就是亚洲民主的灯塔，中华民国。"
CHI_Chungking_Negotiations_focus:0 "重庆谈判"
CHI_Chungking_Negotiations_focus_desc:0 "与共党的战争可能会破坏我们重建国家的努力，我们将尝试和他们谈判达成和平协议。"









































