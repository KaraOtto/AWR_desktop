l_simp_chinese:
CHI_foreign_help_focus:0 "寻求外国军事援助"
CHI_foreign_help_focus_desc:0 "没有外国援助，国民政府就没有机会对抗日本人。"
CHI_axis_help_focus:0 "轴心国援助"
CHI_axis_help_focus_desc:0 "继续开展中德合作，必将有助于我们打赢这场战争。"
CHI_chinese_general_staff:0 "国民政府参谋本部"
CHI_chinese_general_staff_desc:0 "仿效德意志帝国建立总参谋部有助于帮助我们掌控军队，提高作战效率。"
CHI_axis_help_diplo_focus:0 "加强中德合作"
CHI_axis_help_diplo_focus_desc:0 "随着法西斯运动在日本的兴起，我们必须加强与德国的联系，以免他们开始与我们敌人结盟。我们将派出孔祥熙代表我们国家与希特勒进行谈判。"
CHI_german_training_method:0 "德式训练法"
CHI_german_training_method_desc:0 "德国军队看起来前途无量，我们应该跟随他们的脚步，在即将到来的冲突中变得同样强大。"
CHI_mission_to_the_soviet_union:0 "共产国际的支持"
CHI_mission_to_the_soviet_union_desc:0 "我们必须向莫斯科派出一个值得信赖的共产主义小代表团，以进一步加强中苏关系，就像北伐战争时期一样。"
CHI_purchase_tanks:0 "订购苏联坦克"
CHI_purchase_tanks_desc:0 "坦克作为现代战争的主角必须被引进。我们考虑引进一整条t26生产线来加强我们的国防实力。"
CHI_sov_pact_focus:0 "中苏互不侵犯条约"
CHI_sov_pact_focus_desc:0 "苏联正受到法西斯势力的威胁，我们也一样。为了打败法西斯杂种，我们一起共同合作似乎是顺理成章的。"
CHI_the_soviet_volunteer_group:0 "苏联航空志愿队"
CHI_the_soviet_volunteer_group:0 "在抗日战争期间，苏联志愿航空队有200多名国际主义战士在中国大地上英勇牺牲，名字镌刻在南京抗日航空烈士纪念馆英烈碑上的共有236位。苏联志愿航空队有500多架飞机，800多名空地勤人员，在南京、上海、武汉、归德、广州、南海等地上空与日军进行多次空战，击毁日机数百架，击沉击伤日舰近百艘，并远征台湾，给日军以有力打击。此外，该航空队还为中国培养训练了一批飞行员。"
CHI_allies_help_focus:0 "滇缅路计划"
CHI_allies_help_focus_desc:0 "寻求英国的支持，在云南和缅甸之间开辟一条公路，长远来看可能有助于我们抵御日本的侵略。"
CHI_fighter_purchases:0 "采购战斗机"
CHI_fighter_purchases_desc:0 "我们急需一批先进战斗机保卫我们的领空。"
CHI_invite_the_flying_tigers:0 "邀请飞虎队"
CHI_invite_the_flying_tigers_desc:0 "1940年8月，中国航空委员会顾问陈纳德受重庆国民政府委派，通过《租借法案》在美采购100架P-40战斗机并招募110名飞行员。1941年8月1日正式成立于昆明巫家坝机场，陈纳德任准将大队长，下辖3个战斗中队。1941年12月20日，该队在昆明首次迎击日军空袭，击落敌机9架；云南省政府主席龙云在庆功会上称其为“空中飞虎”，经媒体广泛报道后得名“飞虎队”。1942年7月后由美国驻中国航空特遣队，负责为“驼峰航线”护航并打击日军运输线。1943年3月扩编为美国陆军第14航空队，参与空袭日军基地及配合轰炸日本本土等任务。"
CHI_allies_help_diplo_focus:0 "新平等条约"
CHI_allies_help_diplo_focus_desc:0 "在经历了近一个世纪的不平等条约之后，美国和大英帝国现在终于可以重新谈判我们的贸易协定了。一旦条约签署，我们最终可以发展成一个健康的经济体。































