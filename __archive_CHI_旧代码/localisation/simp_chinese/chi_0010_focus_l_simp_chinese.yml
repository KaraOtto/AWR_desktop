l_simp_chinese:
one_party_tutelage:0 "继续训政"
one_party_tutelage_desc:0 "按照孙中山的原话，重建国家有三个阶段：第一阶段是军政，在北伐战争后结束；第二阶段是训政，只有在中国政治稳定之后才会结束；然后是最后一个阶段：宪政。中国目前的政治形势还远未稳定下来，应该继续实行训政。"
CHI_reinforce_new_life_movement:0 "加强新生活运动"
CHI_reinforce_new_life_movement_desc:0 "新生活运动是政府主导的促进文化改革和新儒家社会道德的公民运动。发起于1934年2月19日，作为反共运动的一部分。我们需要加强这场运动，以确保颠复组织不会将他们的错误信息传播给民众。"
strengthen_cc:0 "加强中央俱乐部"
strengthen_cc_desc:0 "中央俱乐部支持国民党的统治和训政。赋予他们管理国家的权力和影响力，反过来也将有利于我们的权威。"
found_cbis:0 "成立中统局"
found_cbis_desc:0 "党需要一个秘密情报机构来阻止针对国民党的颠复活动。通过重组中央俱乐部的影响力，创立一个官方组织，可以显着扩大国民党的势力范围。"
strengthen_the_kmt:0 "强化国民党"
strengthen_the_kmt_desc:0 "二陈兄弟领导下的中央执行委员会调查统计局(中统)运转顺畅，与此同时中央党务却变得不堪重负。 通过合并国民党中央执行委员会的一些部门，特别是交通部门和统计部门，扩大中统将是解决这个问题的一个很好的办法。"
political_indoctrination:0 "政治教化"
political_indoctrination_desc:0 "在这样的动荡时期，情报能力，尤其是反情报能力，变得尤为重要。 为实现这一目标，在党内建立情报网路以及在党的各个机构内建立坚实的电信和调查部门基础将是一个理想的解决方案。"
CHI_yi_dang_zhi_guo_focus:0 "以党治国"
CHI_yi_dang_zhi_guo_focus_desc:0 "以党治国或简称党国，字面意思是利用政党来管理国家，孙中山先生明确指出，党国应成为中华民国在训政阶段的官方国策。"
CHI_declare_martial_law_focus:0 "宣布戒严令"
CHI_declare_martial_law_focus_desc:0 "由于共产主义的威胁，我们国家的完整性岌岌可危。任何时候尽快开始全面宪政将导致不必要的不稳定。在这种极端时期，必须采取极端措施。"
CHI_the_fall_of_mainland:0 "大撤退"
CHI_the_fall_of_mainland_desc:0 "我们失去了整个中国大陆，台湾这座岛是我们最后的希望了。"
strengthen_bs:0 "强化蓝衣社"
strengthen_bs_desc:0 "由于中华民族复兴社拥护民族主义和中国传统，同时也支持蒋介石的权威，它应该在很大程度被赋予权力和影响力来协助治理这个国家。"
centralizing_power:0 "临时全国代表大会"
centralizing_power_desc:0 "我们必须避免失去权力，并强迫人民效忠于我们，因为我们是中国唯一真正的政府。为了实现这一目标，我们必须召开一次特别的全国代表大会，以应对中国目前面临的危机。"
found_mbis:0 "成立军统局"
found_mbis_desc:0 "随着外国势力的威胁日益迫近，重组蓝衣社的影响力和和原秘密机构，组建一个新的特工部，将是间谍战的理想选择。"
espionage_network:0 "间谍网"
espionage_network_desc:0 "我们必须开始监视我们的人民，使我们政府能继续执政，我们还必须监视计划把我们赶下台的外国政府。"
CHI_axis_help_party_focus:0 "蓝衣社发动政变"
CHI_axis_help_party_focus_desc:0 "现在蓝衣社的声望比以往任何时候都大，蓝衣社应该发动政变，让我们的国家回到军政。 这很重要，因为明显的军阀割据和国内动荡仍在中国发生，这意味着中国还没有准备好接受训政。 蒋介石将被誉为中华民国的最高领袖，带领我们走向辉煌。"
CHI_covert_research_facility:0 "秘密研究设施"
CHI_covert_research_facility_desc:0 "为了加强我们的力量，严格控制我们的国家，同时也为了技术进步而努力，建立秘密的研究设施可以在这方面有所帮助。"
CHI_assume_intra_party_leadership:0 "承担党内领导"
CHI_assume_intra_party_leadership_desc:0 "在成功地发动政变夺取政权之后，我们将承担党内领导，对国民党进行整体的改组，一个新的属于中国人民的民国将由[Root.GetLeader]委员长来领导！"
CHI_cult_of_chiang_kai_shek:0 "崇拜蒋介石"
CHI_cult_of_chiang_kai_shek_desc:0 "蒋介石是中华民族伟大的统帅，他将带领我们把中国建设成为世界强国！"


























