l_simp_chinese:
CHI_right_line.30.t:"中止"
CHI_right_line.30.a:"这个时候追究孔家，已经没什么意义了。"
CHI_right_line.30.d:"整顿党政、肃清积弊的计划已被提出，其目标直指长期控制财政、军政与经济命脉的既得利益集团。此举原本被视为重塑政府权威、恢复社会信任的关键一步。\n\n然而，整肃尚未真正展开，来自党内、军中与金融体系的阻力便迅速显现。这些家族早已深度嵌入国家机器，任何激进举措都可能引发财政失序、军心动摇，甚至危及政权本身的稳定。\n\n在权力平衡与现实压力之下，这场整肃最终被迫中止。改革未能推进，而积弊依旧存在，政府的威信也因此受到进一步削弱。"
CHI_right_line.31.t:"§R一部分罪行：发行公债§!"
CHI_right_line.32.t:"§R一部分罪行：增加捐税§!"
CHI_right_line.33.t:"§R一部分罪行：通货膨胀§!"
CHI_right_line.34.t:"§R一部分罪行：外汇管制§!"
CHI_right_line.35.t:"§R一部分罪行：实行专卖制§!"
CHI_right_line.36.t:"§R一部分罪行：统购统销§!"
CHI_right_line.37.t:"§R一部分罪行：扬子公司§!"
CHI_right_line.31.d:"四大家族掠夺全国人民膨胀官僚资本主要通过以下的手段：\n1938年至1944年，国民政府财政部发行内债18种，有的按法币和关金计算，有的按英镑、美元计算。总计法币15,192,000,000万元，关金100,000,000单位，英镑20,000,000，美元210,000,000。此外还有谷麦粮食债券。除1937年的救国公债在民间“劝募”外，其余都不公开发行，而以总预约券的方式向银行抵押，再由银行垫款给国民政府。银行则利用它作为发行纸币的准备，发行不兑现的钞票。官僚资本既发了公债财，又发了法币财。"
CHI_right_line.32.d:"由于工业、商业发达的沿江沿海地区相继沦陷，关税、盐税、统税三税收入大为减少。国民政府便通过扩大征税范围和增加税率的办法，来弥补减少的税收。国民政府将统税扩大为货物税，形成几乎无物不税的状况。1943年十月开征食盐附加税，开始每斤征3元，到1945年1月增至60元。由于通货膨胀，从1941年下半年起，实行田赋征实，按田赋的正税和附加税的税额，每元折征稻谷2市斗，1942年增至4市斗。从1942年起普遍实行粮食随赋征购，征购价格远低于市价，而且多数不付现款，只付粮食库券或法币储蓄券。1943年普遍实行粮食征借，既不付利息，还本也只是空话。从1941年到1945年6月，国民政府通过“三征”，共实收稻谷和小麦240，000，000多万石。这是对广大农民最直接最厉害的掠夺。"
CHI_right_line.33.d:"抗战开始后四个月，国民政府决定用增发纸币的办法弥补财政赤字。法币发行额，据官方公布的数字，1937年底为十六亿1,600,000,000元。1945年底为10,319亿元。八年中增加了738倍。实际上还不止此数。滥发钞票的结果，使四大家族的财富迅速集中，而广大人民则越来越贫困。"
CHI_right_line.34.d:"国民政府从1938年3月起实行外汇管制。从此官价外汇被垄断，黑市交易随之而起。伴随法币的贬值，官价与黑市之间的差额越来越大。抗战期间，外汇中美元与法币的对换率一直是1:20，而黑市1943年12月为1:85.4，1944年12月为1:542.2。四大家族利用特权，以官价买进大量外汇和黄金，以黑市价格抛出，转手之间，牟取暴利。"
CHI_right_line.35.d:"1941年4月，国民政府成立专卖事业管理局。从次年初开始，先后对食盐、糖、卷烟、火柴、茶叶、酒等六类物品实行专卖。这一制度，使国民政府收入大增。增收数额，1942年为47,800万元，1943年为174,700万元，1944年为18亿元左右。这一制度大大加重了人民的负担。国民党官员和有关机构乘机营私舞弊，套取专卖品转投黑市，从中牟取暴利。"
CHI_right_line.36.d:"1937年9月，在国民政府之下成立贸易委员会，该会下设复兴公司、富华公司、中国茶叶公司三大公司，对国统区的丝、茶、桐油、猪鬃等主要出口物资，实行统购统销。钨、锑、锡、汞等主要出口矿产品，则由资源委员会统购统销。1942年2月，成立物资局，对棉纱实行统购。在统购统销政策下，国民政府实行低价强购，利用买卖之间的差价获取重利。以桐油为例，1942年收购价比内销市场价每担差100元，1943年差1100元。\n总之，国民政府用种种手段对人民实行公开的掠夺，使官僚资本在抗战期间迅速膨胀起来。"
CHI_right_line.37.d:"扬子公司由孔令侃独资经营，实际上背后却有孔宋两大家族的背景。关键是宋美龄。她一生不能生育，蒋经国、蒋纬国已渐渐长大成人，她急需于下一代中找几个侄辈的来与之抗衡。宋氏一门几个兄弟，都是晚婚而且儿女稀少，只有孔家人丁兴旺，而其中孔令侃又是她最喜欢的一个。因此宋美龄对孔令侃“情有独钟”，并极力培养他来与蒋经国、蒋纬国抗衡。到美国定居前，宋蔼龄曾专程拜访宋美龄，姐妹俩相对垂泪，心潮难平。临了宋蔼龄拜托宋美龄，多多关照自己留在大陆的儿子，当下宋美龄自然应允。正是由于有了这种种背景，孔令侃的扬子公司才能在短短的时间里崛起，大赚其钱，成为上海滩上一股不可忽视的势力。孔令侃做生意，既有从老爹孔祥熙那里继承过来的手腕，又有自己的“发明创造”：如炒外币美金当年就是孔祥熙的拿手好戏，可轮到孔令侃手里。他玩起来也一点不比他老爹差。抗战后，外汇由中央银行统一管理经营，外汇价格由官方规定。当时1美元合法币1.2万元。但不久黑市涨到1美元换法币4万元。孔令侃一看这里头有油水可赚，就想尽办法套购官价外汇美元。他通过宋美龄，一次就搞到几百万美元。他还将2辆进口高级轿车送给中国银行外汇部主任，外汇部主任就源源不断地将平价美元卖给孔令侃。靠着这近千万美元的外汇，孔令侃在美元市场上进行炒作并大发了一笔。\n不过，孔令侃赚钱最多的，还是走私和汽车生意，例如公司从美国进口的“雪佛兰”、“奥斯汀”等汽车，进口价格是每辆1500美元，而孔令侃却以“只此一家，别无分号”的优越条件，经常保持5000美元一辆的高价向市场出售。仅此一项，他就攫取了大量的美金。1947年国民党统治区市场物价暴涨，马口铁奇缺（制作罐头盒的原料），扬子公司从美国共和钢铁企业搞到一批马口铁原料，由于海关拒不签发进口许可证，以致无法进口，这就触犯了扬子公司的利益。孔令侃大发雷霆，一方面在《大陆报》上向海关当局发起攻击，同时以“降低物价、扶持工业”为理由，与海关当局大打笔墨官司；另一方面，则在海关职员中进行活动，终于迫使海关让步，签发了进口许可证。货物到手之后，孔令侃即以高价向市场抛售，获取暴利。"
CHI_right_line.38.t:"§R最终的胜利§!"
CHI_right_line.38.d:"长期盘踞于财政、金融与军政体系核心的既得利益集团，已成为国家改革无法回避的障碍。面对内外交困的局势，政府最终决定不再妥协，着手推进一场高风险的整肃行动。\n\n通过政治清洗、财权重组与强力干预，数个家族的影响力被削弱，其控制的关键机构被收归中央。这一过程引发了剧烈震荡，也触动了旧有权力结构的根基，但国家机器终于重新集中于政府手中。\n\n整肃并未消除所有问题，却为进一步改革扫清了最顽固的阻力。政府权威得以重建，而未来的道路，将取决于这份权力是否能被真正用于挽救国家。"
