l_simp_chinese:
 extreme_materialism.1.t: "陆军无限制研究实验"
 extreme_materialism.1.d: "我们的科学团队正在以近乎疯狂的方式测试新型材料理论。实验结果可能带来难以预料的突破，也可能造成灾难。但全国上下所有的人民都知道，在绝对唯物主义的世界，收益与风险永远是并行的，主观上带来的顾虑和恐惧只会束缚我们进步的脚步，我们必须以最快的速度一次又一次地突破极限。"
 extreme_materialism.1.a: "我们将不择手段地前进。"

 extreme_materialism.2.t: "重大突破"
 extreme_materialism.2.d: "实验结果远超预期。新材料的性能彻底改变了当前工程项目的设计路线，负责该项目的科学家也因此获得了宝贵经验。"
 extreme_materialism.2.a: "早已预料的结果。"

 extreme_materialism.3.t: "实验成功"
 extreme_materialism.3.d: "实验取得了成功。虽然还没有达到理论上的极限，但这些成果已经足以推动当前工程项目，并为相关军事研究提供帮助。"
 extreme_materialism.3.a: "很好。"

 extreme_materialism.4.t: "部分成功"
 extreme_materialism.4.d: "实验只取得了有限成果，但其中一部分数据仍然具有研究价值。"
 extreme_materialism.4.a: "可以接受。"

 extreme_materialism.5.t: "实验失败"
 extreme_materialism.5.d: "此次无限制实验失败，后果是我们的研究设施遭受重创和资源的浪费，一些社会人士通过自行计算收益与后果后后已经开始向无限制实验的合理性提出质疑，且已经获得了不可忽视的社会响应。"
 extreme_materialism.5.a: "只是微小的挫折。"

 extreme_materialism.101.t: "海军无限制研究实验"
 extreme_materialism.101.d: "我们的科学团队正在以近乎疯狂的方式研发海军设施与新型战舰。实验结果可能带来难以预料的突破，也可能造成灾难。但全国上下所有的人民都知道，在绝对唯物主义的世界，收益与风险永远是并行的，主观上带来的顾虑和恐惧只会束缚我们进步的脚步，我们必须以最快的速度一次又一次地突破极限。"
 extreme_materialism.101.a: "我们将不择手段地前进。"

 extreme_materialism.102.t: "海军工程重大突破"
 extreme_materialism.102.d: "实验取得了惊人的成功。新材料与新结构方案让当前海军特殊工程几乎越过了全部技术障碍。"
 extreme_materialism.102.a: "理所当然的结果。"

 extreme_materialism.103.t: "海军工程成功"
 extreme_materialism.103.d: "实验成果可靠，虽然尚未达到理论极限，但已经足以推进当前海军特殊工程，并反哺相关海军科技。"
 extreme_materialism.103.a: "很好。"

 extreme_materialism.104.t: "海军工程部分成功"
 extreme_materialism.104.d: "实验数据并不完美，但仍然有一部分可用成果。工程团队认为这些成果可以节省一部分研发时间。"
 extreme_materialism.104.a: "至少还是值得的。"

 extreme_materialism.105.t: "海军工程事故"
 extreme_materialism.105.d:  "此次无限制实验失败，后果是我们的研究设施遭受重创、投入的大量资源的浪费，一些社会人士通过自行计算收益与后果后后已经开始向无限制实验的合理性提出质疑，且已经获得了不可忽视的社会响应。"
 extreme_materialism.105.a: "只是微小的挫折"

 extreme_materialism.201.t: "空军无限制研究实验"
 extreme_materialism.201.d: "我们的航空工程师正在以近乎疯狂的方式研发极端环境下的新型材料、发动机结构与航空电子系统。实验结果可能带来难以预料的突破，也可能造成灾难。但全国上下所有的人民都知道，在绝对唯物主义的世界，收益与风险永远是并行的，主观上带来的顾虑和恐惧只会束缚我们进步的脚步，我们必须以最快的速度一次又一次地突破极限。"
 extreme_materialism.201.a: "这是征服天空的必要选择。"

 extreme_materialism.202.t: "空军工程重大突破"
 extreme_materialism.202.d: "试验结果远超预期。新的航空材料与结构设计将当前空军特殊工程推向了前所未有的阶段。"
 extreme_materialism.202.a: "天空属于我们。"

 extreme_materialism.203.t: "空军工程成功"
 extreme_materialism.203.d: "实验取得了成功。新数据可以直接用于当前空军特殊工程，并为后续航空研究提供帮助。"
 extreme_materialism.203.a: "记录所有数据。"

 extreme_materialism.204.t: "空军工程部分成功"
 extreme_materialism.204.d: "实验成果有限，但部分数据仍具有实际价值。"
 extreme_materialism.204.a: "继续改进。"

 extreme_materialism.205.t: "空军工程事故"
 extreme_materialism.205.d: "此次无限制实验失败，后果是我们的研究设施遭受重创、投入的大量资源的浪费，一些社会人士通过自行计算收益与后果后后已经开始向无限制实验的合理性提出质疑，且已经获得了不可忽视的社会响应。"
 extreme_materialism.205.a: "只是微小的挫折。"

 extreme_materialism.301.t: "核能无限制研究实验"
 extreme_materialism.301.d: "我们的核研究团队以一种极其危险的方式尝试驯服原子核中蕴含的巨大能量。这项实验可能创造历史，也可能带来毁灭。但全国上下所有的人民都知道，在绝对唯物主义的世界，收益与风险永远是并行的，主观上带来的顾虑和恐惧只会束缚我们进步的脚步，我们必须以最快的速度一次又一次地突破极限。"
 extreme_materialism.301.a: "成功不是必然，但我们会不断尝试直至成功。"

 extreme_materialism.302.t: "核能研究重大突破"
 extreme_materialism.302.d: "实验成果令人震惊。关键理论障碍被突破，当前核能特殊工程的进展被大幅推进。"
 extreme_materialism.302.a: "我们触碰到了原子的核心。"

 extreme_materialism.303.t: "核能研究成功"
 extreme_materialism.303.d: "实验取得成功。虽然仍需谨慎推进，但当前核能特殊工程已经获得重要数据支持。"
 extreme_materialism.303.a: "谨慎推进。"

 extreme_materialism.304.t: "核能研究部分成功"
 extreme_materialism.304.d: "实验结果并不完整，但部分数据具有研究价值。"
 extreme_materialism.304.a: "保存可用数据。"

 extreme_materialism.305.t: "核能研究事故"
 extreme_materialism.305.d: "此次无限制实验失败，后果是我们的研究设施遭受重创、投入的大量资源的浪费，一些社会人士通过自行计算收益与后果后后已经开始向无限制实验的合理性提出质疑，且已经获得了不可忽视的社会响应。"
 extreme_materialism.305.a: "只是微小的挫折。"


