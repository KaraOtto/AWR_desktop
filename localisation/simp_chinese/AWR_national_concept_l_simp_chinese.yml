 extreme_materialism_failed_experiment_recovery: "无限制研究事故善后"
 extreme_materialism_failed_experiment_recovery_desc: "一次严重的特殊工程事故造成了社会恐慌，但政府正在通过善后、赔偿和宣传逐步恢复公众信心。"
