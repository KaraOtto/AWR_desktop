ugaki_kazushige_desc:0"宇垣一成庆应4年（1868年）出生于备前国磐梨郡潟瀬村大内（现冈山县冈山市东区瀬户町大内）一个叫宇垣杢右卫门的农民家里，兄弟5人，他是幼子。\n\n他在京都成城学校毕业后进入陆军，随后以优异成绩完成陆军士官学校与陆军大学的学习，并多次赴德国留学。其间军阶稳步上升，历任参谋本部要职、师团长、陆军省次官等重要岗位。大正时期，他先后在多个内阁中担任陆军大臣，并推行了大规模裁军计划，在军政界具有举足轻重的影响力。1931年因卷入三月事件而辞职。\n\n昭和11年（1936年）再次担任朝鲜总督，倡导“内鲜融和”和推行皇民化政策。"
JAP_peace_preservation_law:0"治安维持法"
JAP_peace_preservation_law_desc:0"1925年治安维持法（Chian_IjiHō）于1925年5月12日，在加藤高明任内颁布。这是日本最重要和最具争议的法律之一，因为它禁止所有反对政府议程的异议跟思想。"
emperor_showa:0"裕仁天皇"
emperor_showa_desc:0"作为日本帝国昭和时代的统治者，天皇受到军民双方的尊敬。"
JAP_bribe_the_tokko_1:0"特高"
JAP_bribe_the_tokko_1_desc:0"特高（Tokkō），是特别高等警察的简称，是一支1911年在日本成立的警察部队，专门用于调查和控制被视为对公共秩序构成威胁的政治团体和意识形态。\n§W--------------§!\n在改革的情况下，§R首相很有可能遭暗杀§!。"
JAP_bribe_the_tokko_2:0"游说特别高等警察"
JAP_bribe_the_tokko_2_desc:0"特高（Tokkō），是特别高等警察的简称，是一支1911年在日本成立的警察部队，专门用于调查和控制被视为对公共秩序构成威胁的政治团体和意识形态。\n§W--------------§!\n在改革的情况下，§R首相遭暗杀的可能性很小§!。"
JAP_bribe_the_tokko_3:0"贿赂特别高等警察"
JAP_bribe_the_tokko_3_desc:0"特高（Tokkō），是特别高等警察的简称，是一支1911年在日本成立的警察部队，专门用于调查和控制被视为对公共秩序构成威胁的政治团体和意识形态。\n§W--------------§!\n在改革的情况下，§Y首相不会遭暗杀§!。"
JAP_bribe_the_tokko_befriended:0"交好特别高等警察"
JAP_bribe_the_tokko_befriended_desc:0"特高（Tokkō），是特别高等警察的简称，是一支1911年在日本成立的警察部队，专门用于调查和控制被视为对公共秩序构成威胁的政治团体和意识形态。\n"
JAP_naval_primacy:0"海军优先"
JAP_military_outweighs_the_government_idea:0"军方压过政府"
JAP_military_outweighs_the_government_idea_desc:0"随着军国主义的兴起和军队内部的派系斗争，日本政府的能力越来越弱。没有一个正常运作的政府，日本军队也陷入了混乱状态。"
JAP_military_outweighs_the_government_idea_good:0"军方压过政府"
JAP_military_outweighs_the_government_idea_good_desc:0"随着军国主义的兴起和军队内部的派系斗争，日本政府的能力越来越弱。没有一个正常运作的政府，日本军队也陷入了混乱状态。然而，随着新秩序运动的实施，军队比以前更有组织性。"
JAP_military_outweighs_the_government_idea_bad:0"军方压过政府"
JAP_military_outweighs_the_government_idea_bad_desc:0"随着军国主义的兴起和军队内部的派系斗争，日本政府的能力越来越弱。没有一个正常运作的政府，日本军队也陷入了混乱状态。"
JAP_reapprochement_with_the_government:0"与政府重新接洽"
JAP_reapprochement_with_the_government_desc:0"条约派一直与文官政府保持着良好的关係。混乱的军国主义只会给日本带来麻烦。我们将开始与文官政府合作，以摆脱那些疯子。"
JAP_navy_backed_government:0"海军派支持的政府"
JAP_navy_backed_government_desc:0"与文官政府的合作进展顺利。海军派影响力也因此而扩大。现在政府得到了海军派的大力支持，海军派可以在政治上佔有一席之地了。"
JAP_military_is_the_government_idea:0"陆军派取代政府"
JAP_military_is_the_government_idea_desc:0"随着我们打击腐败中国政府的战争取得成功，我们终于做出了一些努力，将军国主义融入我们的政府结构中。日本帝国陆军现在比以前更有组织性了。"
JAP_reorganized_japanese_militarism_idea:0"重组日本军国主义"
JAP_reorganized_japanese_militarism_idea_desc:0"日本帝国陆军已经重组，军国主义与政府紧密结合。强大的日本军队不再退缩。"
JAP_kodoha_plot:0"皇道派动乱"
JAP_kodoha_plot_desc:0"Kodoha或称皇道派，是军方的一个主要派别，支持由天皇直接领导的民粹主义统治，消灭政府中的精英和建制官僚。现在他们的存在正在极大地破坏这个国家的稳定。"
