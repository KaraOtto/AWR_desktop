agrarion_society_generic_3:0 "极端落后的工业"  
agrarion_society_generic_3_desc:0 "农业经济占据了我国国民经济总量的几乎全部比重，工业基础则如同一张白纸，绝大多数的重工业产品和高科技装备我国均无法生产。"  
agrarion_society_generic_2:0 "得到发展的工业"  
agrarion_society_generic_2_desc:0 "在经过初步的工业化建设后，我国的工业基础得到了一定发展，不少领域已经迈入了工业化起步的基本门槛。"  
agrarion_society_generic_1:0 "大幅改善的工业"  
agrarion_society_generic_1_desc:0 "经过全国上下的不懈努力，我国终于摆脱了过去工业领域一穷二白的局面，生产力水平得到大幅提升，但与世界主要工业国家相比仍有较大差距。"  
