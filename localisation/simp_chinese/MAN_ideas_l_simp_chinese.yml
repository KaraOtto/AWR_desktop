 MAN_left_wing_student_movement:0 "左翼学生运动"
 MAN_left_wing_student_movement_desc:0 "由于对官僚和建制精英的不满，很多日本大学毕业生都有着草根、左翼的情绪。1925年的《治安维持法》禁止一切反对政府议程的思想，特别是左翼思想，为了逃避该法，他们搬到满洲国寻找一个新地方，在那里他们可以发表自己的思想，促进自己的事业。"
 MAN_man_baqi:0 "满洲八旗"
 MAN_man_baqi_desc:0 "§L八旗子弟自1644年就开始堕落，大清末期甚至还吸食鸦片，我们将彻底改变八旗，强化他们的战斗力，大清高皇帝会为我们骄傲！§!"
 MAN_man_ruguan:0 "再入关"
 MAN_man_ruguan_desc:0 "§L在长白山顶之上，脚踏洁白雪花，看到广阔天地之间，有我飞翔的鹰神海东青，在深林中穿行，拉开天赐硬弓，拉弓的阿哥啊，骄傲地奔走吧。长白山啊，是咱满洲人的根啊。黑龙江啊，是咱满洲人的根啊。海东青，海东青，仿拂看到你在那里飞行，海东青，海东青，仿拂看到你搏击长空，你有一双矫健翅膀，你有两只锐利眼睛，搏飞高天不知倦，高瞻远瞩笑天星，越是骤雨越飞云天，擎起骤雨现出彩虹，飞越白山越过那黑水，你是民族不屈的雄鹰。啊，海东青，海东青，仿拂看到你还在那里飞行，海东青，海东青，我们民族永远的图腾！§!"
 MAN_man_yangzhoushiri:0 "被再入关震惊"
 MAN_man_yangzhoushiri_desc:0 "§L大清的再度入关让我们措手不及。§!"
