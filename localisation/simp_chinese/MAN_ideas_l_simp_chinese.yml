 MAN_white_movement:0 "白色运动"
 MAN_xingxingzhihuo_keyiliaoyuan:0 "星星之火，可以燎原"
 MAN_xingxingzhihuo_keyiliaoyuan_desc:0 "中国是一个落后的半封建半殖民地国家，我们的革命力量现在是弱的，但是立足于落后社会上的反动阶级也是弱的。现在虽只有一点小小的力量，但它的发展会是很快的。它是站在海岸遥望海中已经看得见桅杆尖头了的一只航船，它是立于高山之巅远看东方已见光芒四射喷薄欲出的一轮朝日，它是躁动于母腹中的快要成熟了的一个婴儿。"
 MAN_yakuzas:0 "[Root.GetYakuzasSupport]"
