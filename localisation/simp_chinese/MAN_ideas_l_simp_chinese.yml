 MAN_son_of_heaven_idea:0 "天命之子"
 MAN_son_of_heaven_idea_desc:0 "天子，虽然现在只是一个礼仪上的君主，仍然是一个深受人民爱戴的人物。"
 MAN_special_labour_force:0 "特殊劳动力"
 MAN_state_shintoism:0 "国立神道教"
 MAN_state_shintoism_desc:0 "在日本的强大影响下，神道教被宣布为国教，以便从日本获得更多的好处。"
 MAN_support_of_intellectual_youth:0 "知识青年的支持"
 MAN_tenko_program:0 "扭转计划"
 MAN_tongyizhanxian:0 "团结一切力量"
 MAN_tongyizhanxian_desc:0 "为了组建反法西斯同盟对抗日本法西斯统治，我们应团结一切可团结力量，摒弃民族，宗教前嫌，团结一切爱国者一同起来反抗日本帝国主义。"
 MAN_unsan_gold_mine:0 "云山金矿"
