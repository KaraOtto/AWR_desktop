CHI_army_reform_redux:0"国防委员会"
CHI_army_reform_redux_desc:0"军阀混战时期，巨额的军费开支不仅压垮了地方财政，还严重阻碍了中国的经济发展。在“黄金十年”时期，军费支出依然占据财政总支出的三成以上。这笔巨额资金本应用于经济建设和民生改善，却白白浪费在了无休止的内战上。基础设施建设停滞，教育、医疗等民生事业发展缓慢，人民生活水平低下，这都是军阀混战的恶果。\n不仅如此，军阀们为了筹措军费，大量印发纸币，导致严重的通货膨胀。物价飞涨，百姓生活更加艰难，而军阀们的战争机器却依然运转。这种恶性循环最终使得国家经济凋敝，民生困苦，最终阻碍了中国现代化的进程。"
