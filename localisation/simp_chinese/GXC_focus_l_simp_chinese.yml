l_simp_chinese:
 GAME_OVER_TT:0 "§R对你来说游戏已经结束了§!"
 GXC_Air_Force_Theory:0 "空军学说"
 GXC_Air_Force_Theory_desc:0 "我们可以聘请外国的空军教官来教授我军飞行员的空战技巧。"
 GXC_Aircraft_parts_factory:0 "自制战机计划"
 GXC_Aircraft_parts_factory_desc:0 "广西飞机除了来自外国，其零件还能在国内生产，并且不断供应。"
 GXC_Artillery_reform:0 "火炮更新"
 GXC_Artillery_reform_desc:0 "我军在短期内不太能够建立一支完善的现代化部队，但我们可以将资源专注在大炮上，让我们的支持火力更强。"
 GXC_Battlefield_support_equipment:0 "现代化支持装备"
 GXC_Battlefield_support_equipment_desc:0 "光有愿意向敌人冲锋的勇者是不够的。 工程师、电信部门和医务人员的重要性皆不容忽视。"
 GXC_Capture_the_central_government:0 "夺取中央领导权"
 GXC_Capture_the_central_government_desc:0 "中央军已经溃败了，必须由我们重新组织部队。"
 GXC_Challenge_central_government:0 "挑战中央政府"
 GXC_Challenge_central_government_desc:0 "我们已经有足够多的伙伴来再次挑战南京了。"
 GXC_China_of_new_guangxi:0 "新桂系统治中国"
 GXC_China_of_new_guangxi_desc:0 "黄埔系已经淡出历史的舞台，现在将会是由新桂系主导的政府，未来也将由新桂系带领国家。"
 GXC_Cooperation_with_chiang_kai_shek:0 "与中央合作"
 GXC_Cooperation_with_chiang_kai_shek_desc:0 "在现在的大势中支持蒋介石才是明智的选择，而同时可以策划一下未来的蓝图。"
 GXC_Cooperation_with_the_kuomintang_right:0 "崭新的国民党"
 GXC_Cooperation_with_the_kuomintang_right_desc:0 "我们现在可以整合这些同样反蒋的派系，并结合原有的南方势力，组织成一个强大且高效的政府。"
 GXC_Defeat_the_chiang:0 "重燃中原大战"
 GXC_Defeat_the_chiang_desc:0 "[WTT_current_china_leader.GetLeader]的政治势力弱化了，我们必须趁此机会一鼓作气击败他，取得中央政权："
 GXC_Develop_armaments:0 "发展军备"
 GXC_Develop_armaments_desc:0 "我们可以从国外购买武器和设计，以此在广西建设军工业。"
 GXC_Develop_guangxi:0 "开发广西"
 GXC_Develop_guangxi_desc:0 "发展广西才能带来生机，改善交通也是其中一环。"
 GXC_Develop_motorized_forces:0 "机动化部队"
 GXC_Develop_motorized_forces_desc:0 "我们派去外国的人员认为摩托化部队将会是下一代战争的要角，我们得掌握先机。"
 GXC_Develop_the_next_generation_equipment:0 "开发新步枪"
 GXC_Develop_the_next_generation_equipment_desc:0 "一旦基础工业制造能力到位，就该进一步投资开发下一代产品。"
 GXC_Economic_reform:0 "经济改革"
 GXC_Economic_reform_desc:0 "我们将会把广西从贫穷的经济情形转变成富饶的真正模范省。"
 GXC_Establish_a_new_national_government:0 "成立新国民政府"
 GXC_Establish_a_new_national_government_desc:0 "介石的政府不足以代表全中国，我们将成立新的国民政府，与之抗衡。"
 GXC_Establish_the_fourth_theater:0 "桂军出征"
 GXC_Establish_the_fourth_theater_desc:0 "为打败日本侵略者，桂军将离开广西去帮助其他中国部队，我们也可以藉此机会扩大我们在其他省份的影响力。"
 GXC_Expand_guangxi_aviation_and_military_school:0 "广西航空学校"
 GXC_Expand_guangxi_aviation_and_military_school_desc:0 "我们要扩建“广西航空学校”，培养更多飞行员，让他们担负起保护天空的责任。"
 GXC_Expand_guangxi_university:0 "扩大广西大学"
 GXC_Expand_guangxi_university_desc:0 "广西大学成立于1928年，多年来一直是省立大学，我们应该将其升为国立大学，这样我们就能有更多的资源和资金来投资这所大学。"
 GXC_Fighter_Focus:0 "广西三号"
 GXC_Fighter_Focus_desc:0 "制空权确保才能保护广西的领空，投入更多资源在战斗机的发展上。"
 GXC_Focus_on_economy:0 "专注经济"
 GXC_Focus_on_economy_desc:0 "若不注重经济发展，广西的民生产业短期内可能不会有什么发展。"
 GXC_Focus_on_model_province_projects:0 "新县制"
 GXC_Focus_on_model_province_projects_desc:0 "在我们与国民政府周旋的同时，也必须与清朝以来剥削人民的旧官员打交道。"
 GXC_Further_cooperation_with_japan:0 "深化对日合作"
 GXC_Further_cooperation_with_japan_desc:0 "日本顾问造成的效益良多，可以在此基础上进一步与其合作，至少我们未来在面对日本人的军队时能够更佳的对应。"
 GXC_Government_reshuffle:0 "改组我方政府"
 GXC_Government_reshuffle_desc:0 "在加入国民政府后，我们需要调整政府人事以应对新的挑战。"
 GXC_Grand_corps_operations:0 "持续研发"
 GXC_Grand_corps_operations_desc:0 "凭借强大的人力资源，该部队能够进一步致力于专业化的战术行动。"
 GXC_Guangxi_ai_force:0 "广西空军"
 GXC_Guangxi_ai_force_desc:0 "我们利用外购的飞机建立了一支属于广西的空中力量，我们将其扩展，最后必定能飞行于中原大地的天上。"
 GXC_Guangxi_arsenal_project:0 "扩展柳州机械厂"
 GXC_Guangxi_arsenal_project_desc:0 "我们应扩大柳州机械厂的生产能力。"
 GXC_Guangxi_military_modernization:0 "黄埔南宁分校"
 GXC_Guangxi_military_modernization_desc:0 "中国有许多军事院校，其中最著名的是黄埔军校。 黄埔军校的一个分校将帮助我军训练。"
 GXC_Guangxi_model_province:0 "模范省"
 GXC_Guangxi_model_province_desc:0 "广西是国内的模范省之一，继续投资在发展经济上有助于提升竞争能力。"
 GXC_Imitate_the_british_army:0 "购买[CZE.GetAdjective]步枪"
 GXC_Imitate_the_british_army_desc:0 "[CZE.GetAdjective] 步枪被认为是中国能搞到的最好步枪，我们应该进口一些，以应对即将到来的冲突。"
 GXC_Improve_industrial_capacity:0 "提高提高工业能力"
 GXC_Improve_industrial_capacity_desc:0 "提升广西的工业实力与技术有助于整体产业的发展。"
 GXC_Improve_resource_utilization_efficiency:0 "财政改革"
 GXC_Improve_resource_utilization_efficiency_desc:0 "为了提高我们的金融效率，需要进行金融体制改革。"
 GXC_Increase_border_pressure:0 "对抗中央政府"
 GXC_Increase_border_pressure_desc:0 "我们不能冒险地进行全面的战争。小规模且可控的冲突容许我们在不会被彻底击垮的同时获得珍贵的土地。在理想的情况下，当对手的军队被调派离开的时候，我们就会马上发起攻击。"
 GXC_Integration_of_southwestern_institutions:0 "整合西南两机关"
 GXC_Integration_of_southwestern_institutions_desc:0 "近年来，迫于中央压力，两广的省政府一直维持着合作。而现在，我们终于能彻底团结，成为单一政治力量。 这是两广地区历史的新一页。"
 GXC_Japanese_style_troop:0 "日式军队"
 GXC_Japanese_style_troop_desc:0 "日本军队在北方能够胜利自有其原因在，我们会钻研此原因，让我军的能力向他们靠拢。"
 GXC_Lessons_from_the_war:0 "中式战法"
 GXC_Lessons_from_the_war_desc:0 "一支规模庞大的军队对于中国军阀来说非常重要。"
 GXC_Li_jishen_return:0 "李济深归来"
 GXC_Li_jishen_return_desc:0 "我们可以邀请李济深回到广西，协助治理广西的内政。"
 GXC_Maintain_independence:0 "保持我方独立性"
 GXC_Maintain_independence_desc:0 "桂系将会摆脱国民政府的控制， 以保全自身的完整性。"
 GXC_Mass_mobilization:0 "大规模突击"
 GXC_Mass_mobilization_desc:0 "我们可以利用好自己的民团体系，去以“人力”作战。"
 GXC_Mental_combat_power:0 "战斗精神"
 GXC_Mental_combat_power_desc:0 "藉由提升士兵们的心理状态，搭配优秀的训练，我们将打造一支强大的传统劲旅。"
 GXC_Modernized_army:0 "现代化陆军"
 GXC_Modernized_army_desc:0 "在经过一连串改进后，桂军已经步入现代化军队的门坎。"
 GXC_Negotiate_with_long_yun:0 "对日友好"
 GXC_Negotiate_with_long_yun_desc:0 "[JAP.GetName]总是对推翻蒋政府感兴趣，我们可以从[JAP.GetName]进口装备，同时避免与他们直接合作。"
 GXC_Order_foreign_fighters:0 "订购外国飞机"
 GXC_Order_foreign_fighters_desc:0 "我们可以与各国签订购买飞机之合约，以强化我军。"
 GXC_Oriental_sparta:0 "东方斯巴达"
 GXC_Oriental_sparta_desc:0 "广西军事实力雄厚，治安良好，战争潜力强劲，素有“东方斯巴达”之称。"
 GXC_Political_struggle:0 "组织党内反对派"
 GXC_Political_struggle_desc:0 "有必要扩大在政府中的影响力。 我们将能吸引更多的政治盟友，也许有一天我们将可藉此成为政府的领导人。"
 GXC_Proclaim_legal_government:0 "保党救国军"
 GXC_Proclaim_legal_government_desc:0 "我军将改编为“护党救国军”，以区别于腐败的中央军。"
 GXC_Puppet_guangdong:0 "确保广东"
 GXC_Puppet_guangdong_desc:0 "粤军实力太过弱小，广东应当由新桂系所统治。"
 GXC_Rebuild_fujian_peoples_government:0 "重建中华共和国"
 GXC_Rebuild_fujian_peoples_government_desc:0 "各方面的掌握已经完成，我们可以与桂系一同重建那曾经失败过的中华共和国，来反对蒋政权了。"
 GXC_Reform_the_conscription_system:0 "进口[CZE.GetAdjective]生产设备"
 GXC_Reform_the_conscription_system_desc:0 "我们不仅要进口步枪，还要进口生产设备，这样才能强化我们的军工业。"
 GXC_Reform_the_militia_system:0 "改组民团"
 GXC_Reform_the_militia_system_desc:0 "我们可以通过改革民团制度来提高其效率。"
 GXC_Separate_revolution:0 "吾等的革命"
 GXC_Separate_revolution_desc:0 "新政府将自行对抗国民党跟法西斯，不会加入任何中共阵营。"
 GXC_Southwest_two_agencies:0 "西南两机关"
 GXC_Southwest_two_agencies_desc:0 "我们虽然在数年前输了中原大战，但在反蒋派的集结下在两广建立了西南政务委员会与中央执监委员会西南执行部的“西南两机关”来对抗南京的蒋介石。"
 GXC_Strengthen_the_administrative_supervision_region:0 "加强革命同志会"
 GXC_Strengthen_the_administrative_supervision_region_desc:0 "革命同志会对于我们的革命非常重要，我们必须加大对革命同志会的投入来稳定我们的政府。"
 GXC_an_unlikely_alliance:0 "不可思议的联盟"
 GXC_an_unlikely_alliance_desc:0 "我们和共产党有同样的目标——推翻[WTT_current_china_leader.GetLeader]，那我们为和不一同努力呢？"
 GXC_anti_communist_in_anhui:0 "反共政策"
 GXC_anti_communist_in_anhui_desc:0 "在安徽的共军净给我们的政府制造麻烦，我们应开始镇压他们。"
 GXC_anti_japan_peoples_self_defense_army:0 "抗日人民自卫军"
 GXC_anti_japan_peoples_self_defense_army_desc:0 "我们可以招募一些当地抗日运动成员来协助我们的部队。"
 GXC_anti_opposition_campaigns:0 "以武力夺取边境"
 GXC_anti_opposition_campaigns_desc:0 "敌军正在我方边境附近聚集，绝不能放任不见。发动一系列小规模的攻势就可以将其击退，也有机会开疆拓土。"
 GXC_armoured_vehicle_experiment:0 "装甲车辆实验"
 GXC_armoured_vehicle_experiment_desc:0 "第一次世界大战中坦克的出现改变了战争历史的进程。 我们必须发展自己的坦克，以免装备和战术落后。"
 GXC_central_china:0 "华中剿匪总司令部"
 GXC_central_china_desc:0 "华北的沦陷将会威胁华中，我们应该藉此机会扩大我们在该地区的影响力。"
 GXC_defeat_nanking:0 "民族解放战争"
 GXC_defeat_nanking_desc:0 "现在我们已经够强了，是时候发动解放战争。"
 GXC_defend_anhui:0 "成立动员委员会"
 GXC_defend_anhui_desc:0 "我们必须成立一个动员委员会来利用安徽当地的人力。"
 GXC_develop_anhui:0 "开发安徽"
 GXC_develop_anhui_desc:0 "安徽并不是一个工业化的省份，我们要从改善基础设施开始做起，逐步发展安徽。"
 GXC_disband_comrades_association:0 "解散革命同志会"
 GXC_disband_comrades_association_desc:0 "为了避免与[WTT_current_china_leader.GetLeader]发生冲突，我们应该解散革命同志会。"
 GXC_enter_anhui:0 "掌控安徽行政机构"
 GXC_enter_anhui_desc:0 "现在正由我方管理安徽省，我们将建立一个新省政府。"
 GXC_guangxi_construction_platform:0 "广西建设方略"
 GXC_guangxi_construction_platform_desc:0 "《广西建设方略》是广西省政府的行事之础。"
 GXC_guangxi_construction_research_association:0 "广西建设研究会"
 GXC_guangxi_construction_research_association_desc:0 ""
 GXC_invade_guangdong:0 "统一两广"
 GXC_invade_guangdong_desc:0 "广东的资源和人力至关重要，我们应该先解放广东，然后再向其他家伙宣战。"
 GXC_join_civil_war:0 "坚持反共立场"
 GXC_join_civil_war_desc:0 "作为国民党内部的一个派系，我们应该遵循[WTT_current_china_leader.GetLeader]的反共政策来稳固民国。"
 GXC_land_reform:0 "温和土改"
 GXC_land_reform_desc:0 "实施温和的土地改革，改善农民生活。"
 GXC_n_socialism:0 "广西人民政府"
 GXC_national_front:0 "出版《民族阵线》"
 GXC_national_front_desc:0 "《民族阵线》是中华民族革命同盟的理论刊物，通过在广西出版《民族阵线》，可以大大提高人们对中华民族革命同盟的兴趣。"
 GXC_peoples_guidelines:0 "人民纲领"
 GXC_peoples_guidelines_desc:0 "我们将以人民纲领为准则，改善我们的政府。"
 GXC_peoples_revolutionary_army:0 "人民革命军"
 GXC_peoples_revolutionary_army_desc:0 "我们将把我们的军队改组为人民革命军，就像当年中华第一共和国那样。"
 GXC_prepare_civil_war:0 "与国民党反对派合作"
 GXC_prepare_civil_war_desc:0 "很多中央军将领都愿意反对中央，联系他们可以让我们扩大军事实力。"
 GXC_recruit_19_army:0 "招募原十九路军成员"
 GXC_recruit_19_army_desc:0 "我们将招募一些有经验的十九路军军官加入我军。"
 GXC_reform_anhui:0 "安徽工业"
 GXC_reform_anhui_desc:0 "我们将投资安徽轻工业。"
 GXC_reignite_civil_war:0 "重燃内战"
 GXC_reignite_civil_war_desc:0 "日本战败后，现在我们要面对终极敌人。"
 GXC_retake_fujian:0 "收复福建"
 GXC_retake_fujian_desc:0 "福建是中华第一共和国的核心领土，我们应该收复福建。"
 GXC_second_guangxi:0 "安徽抗战"
 GXC_second_guangxi_desc:0 "安徽将由桂军保卫。"
 GXC_squash_kmt:0 "排除国民党影响"
 GXC_squash_kmt_desc:0 "现在我们已经离开了国民党，我们应该解散原先的国民党机构。"
 JPG_only_show_up_in_war_time_tt:0 "§C这个决议只会在战时出现。§!"
