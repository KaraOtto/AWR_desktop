 is_not_supporting_someone_in_political_struggle:0 "没有在政治斗争中选择支持其它任何一个中国军阀"
 jap_small_china_tt:0 "所有§Y中国核心地块§! 除§Y香港、澳门和广州湾§!且没有被§Y日本与其盟友控制§!"
 opinion_worsen_over_time_tt:0 "§Y随着时间的推移，利益冲突§!将会§G恶化§!。\n"
