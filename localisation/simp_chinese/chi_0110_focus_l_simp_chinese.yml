l_simp_chinese:
CHI_monetary_reform:0 "放弃银本位制"
CHI_monetary_reform_desc:0 "由于1934年美国《白银收购法》的颁布，银本位制经济逐渐成为中国经济的负担。1935年底通过了一项币制改革，现在是实施改革的时候了。"
CHI_government_bailout_focus:0 "政府救助"
CHI_government_bailout_focus_desc:0 "[Root.GetName]的经济不稳定是一个系统性问题，如果我们卷入战争，它将受到更大的打击。我们将让专家们解决这些问题。"
CHI_public_school_program_focus:0 "公立学校计划"
CHI_public_school_program_focus_desc:0 "教育我们的学生是当务之急。由于识字率如此之低，我们必须让这个国家的儿童拥有更美好的未来。"
CHI_compulsory_education_chi:0 "义务教育"
CHI_compulsory_education_chi_desc:0 "我们不能让持传统观念的父母阻碍他们的孩子在国家和技术进步，因此需要颁布法律，让孩子接受他们应得的教育。"
CHI_academy_rf_focus:0 "改革中央研究院"
CHI_academy_rf_focus_desc:0 "与其他西方国家相比，我们的国家研究中心——中央研究院的效率仍然相当低。迫切需要进行大刀阔斧的改革。"
CHI_modern_university:0 "现代大学"
CHI_modern_university_desc:0 "我们需要把西方思想引入我们的大学，采用新的生活方式和思维方式。中国的传统思想对我国来说已经过时了。"
CHI_academy_ex_focus:0 "扩大中央研究院"
CHI_academy_ex_focus_desc:0 "尽管进行了改革，我们实验室的规模仍然有限。扩大实验室可以提高我们的研究能力。"
CHI_academy_mp_focus:0 "中央研究院：\n现代物理学"
CHI_academy_mp_focus_desc:0 "新成立的中央研究院现代物理部可以帮助我们国家用核武器武装自己，这可以极大地增强我们国家的安全。"
CHI_national_resources_commission:0 "资源委员会"
CHI_national_resources_commission_desc:0 "迫在眉睫的战争意味着和平发展时代的即将终结。现在，时间就是一切。如果没有适当的准备，我们无法应对这场战争，我们将建立资源委员会来管理我们的工业发展。"
CHI_nationalize_industry_focus:0 "重工业五年建设计划I"
CHI_nationalize_industry_focus_desc:0 "如果我们将一些工厂国有化，就能进一步提高我们的武器生产。"
CHI_nationalize_industry_ii_focus:0 "重工业五年建设计划II"
CHI_nationalize_industry_ii_focus_desc:0 "如果我们将更多的工厂国有化，就能进一步提高我们的武器生产。"
CHI_nationalize_industry_iii_focus:0 "重工业五年建设计划 III"
CHI_nationalize_industry_iii_focus_desc:0 "如果我们将更多的工厂国有化，就能进一步提高我们的武器生产。"
CHI_modern_industrialization:0 "工业集中化"
CHI_modern_industrialization_desc:0 "我们的工业已经过时到可笑的地步，几十年来都没有多少研究或发展，在这种情况下，为了我们的经济和国家，我们必须努力使我们工业现代化。"
CHI_streamlined_industry:0 "提高工业效率"
CHI_streamlined_industry_desc:0 "为了重建我国落后的工业，提高工业效率是最重要的步骤之一。"
CHI_rejuvenate_heavy_industry:0 "振兴重工业"
CHI_rejuvenate_heavy_industry_desc:0 "由于政治上的优先考虑，中国的混乱局面使我们无法改善我们的工业。也许我们应该为经济振兴重工业，尝试做我们早就应该做的事情。"
CHI_revive_hanyang_steelwork_focus:0 "振兴汉阳钢铁厂"
CHI_revive_hanyang_steelwork_focus_desc:0 "汉阳钢铁厂管理不善，设备陈旧，或许如果我们僱佣更多工人，为改造提供资金，我们就能在战争中发挥作用。"
CHI_anshan_steelwork_focus:0 "鞍山钢铁厂"
CHI_anshan_steelwork_focus_desc:0 "现在，我们已经收复了东北的工业腹地奉天，我们可以把曾经用来生产武器的工业複合体和设施投入正常使用。"
CHI_national_steelwork_focus:0 "国家钢铁生产"
CHI_national_steelwork_focus_desc:0 "通过建立组织并密切监控企业的状况是有效的，我们可以将同样的做法应用于钢铁厂，这些钢铁厂已成为几乎所有设备的战时生产工作不可或缺的一部分。"
CHI_powerhouse_of_the_east:0 "东方强国"
CHI_powerhouse_of_the_east_desc:0 "中国是一个幅员辽阔的国家，拥有取之不尽的优质资源和庞大的人口，才能创造出工业强国。是时候动用我们的资源，把这个国家推向光明的未来了。我们将成为亚洲最大的工业强国。"
CHI_infrastructure_effort_i:0 "公路建设五年计划"
CHI_infrastructure_effort_i_desc:0 "我国很大一部分地区的基础设施仍然很差，不足以满足不断增长的人口和建设需求。我们将改善我们的基础设施来解决这个问题，同时为我们国家打下良好的基础。"
CHI_infrastructure_effort_ii:0 "公路总管理处"
CHI_infrastructure_effort_ii_desc:0 "我们应该设立公路总管理处，其工作重点为把公路建设搞好。"
CHI_infrastructure_effort_iii:0 "改进公路工程"
CHI_infrastructure_effort_iii_desc:0 "通过改进我们的公路工法，我们可以大大提高建设公路的效率。"
CHI_railway_effort:0 "铁路建设方略"
CHI_railway_effort_desc:0 "中国还缺乏许多现代化的基础设施，尤其是铁路，铁路无论在军用上，或是在民用上都极其重要，应尽快开工建设。"
CHI_national_resource_exploration:0 "国家资源勘探"
CHI_national_resource_exploration_desc:0 "我们必须鼓励私营企业在我国寻找原始资源储备方面进行投资，以帮助促进我们的经济，并帮助再次建立我们的军队。"
CHI_aluminium_effort_i_focus:0 "重视铝矿开采 I"
CHI_aluminium_effort_ii_focus:0 "重视铝矿开采 II"
CHI_aluminium_effort_iii_focus:0 "重视铝矿开采 III"
CHI_aluminium_effort_i_focus_desc:0 "我们需要改进铝的开采和生产，以增强我们的空军力量，所以我们必须采取措施，抢在日本人之前保护我们的资源。"
CHI_aluminium_effort_ii_focus_desc:0 "为了中国，我们必须流血流汗来进一步增加产量。我们的空军正在扩大，铝在战争中的使用也变得更加普遍和有效。"
CHI_aluminium_effort_iii_focus_desc:0 "我们的空军正在蓬勃发展，我们开采的铝几乎达到了最好的水准。只要在生产和开采方面再进行一点改革，我们就能稳稳地踏上战场。"
CHI_tungsten_effort_i_focus:0 "重视钨矿开采 I"
CHI_tungsten_effort_ii_focus:0 "重视钨矿开采 II"
CHI_tungsten_effort_iii_focus:0 "重视钨矿开采 III"
CHI_tungsten_effort_i_focus_desc:0 "我们缺乏坦克也可以归因于中国各地缺乏钨的开采和生产。现在是政府投资于日本人正在追逐的这一重要资源的时候了。"
CHI_tungsten_effort_ii_focus_desc:0 "钨行业正在蓬勃发展，其在战场上的用途也在不断增加。坦克的产量似乎增加了，重型装甲工业也在增长。"
CHI_tungsten_effort_iii_focus_desc:0 "我们现在正在稳步建造坦克，以便在战场上作战，钨业也正在给中国带来繁荣。让我们倾注更多的努力，进一步巩固我们在战场上的地位。"
CHI_refinery_technology_german:0 "精炼工艺"
CHI_refinery_technology_german_desc:0 "利用德国的炼油工艺，我们可以改造我们过时的、结构不良的炼油厂，这些炼油厂在生产过程中浪费了宝贵的原材料。"
CHI_yumen_oil_field:0 "玉门油田"
CHI_yumen_oil_field_desc:0 "玉门的一些地质专家认为那里可能蕴藏着大量的石油。应努力开发利用这些资源。"
CHI_daqing_oil_field:0 "大庆油田"
CHI_daqing_oil_field_desc:0 "大庆的一些地质专家认为那里可能蕴藏着大量的石油。应努力开发利用这些资源。"
CHI_hainan_plantation:0 "海南橡胶"
CHI_hainan_plantation_desc:0 "橡胶是军事装备动员所必需的资源。由于海南有种植橡胶树所需的气候，我们政府应该帮助那里的农民帮助增加橡胶产量。"



































































