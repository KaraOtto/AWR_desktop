 PRC_communist_support_high:0 "政府内的共产主义者影响"
 PRC_dongzheng_idea:0 "东征"
 line_struggle:0 "党内斗争"
 line_struggle_desc:0 "这也被某些党员称为“路线斗争”，目前中国共内产党部正在进行激烈的政治斗争。 为了解决这些斗争，应该组织政治局会议和中央委员会会议来解决这些问题。"
 CCP_go_west:0 "西征战役"
 CCP_go_west_desc:0 "我们一定要驱逐盘据宁甘的反动马家部队！"
 PRC_youqinzhuyi:0 "南下路线红军分裂的阴影"
 PRC_youqinzhuyi_desc:0 "§L红四方面军会师后，在四面军战士中，很多人并没有了解党的路线的正确与过去和四方面军领导上、路线上的错误。张国焘的“右倾分裂主义”和“军阀主义”对四方面军的影响极深、危害极大，当谈到南下北上问题时，大多数人认为都是对的，这极其不利于中央对四方面军的领导，中央红军的同志也经常因“北上南下”问题发生争吵，导致红军的组织纪律面临危机，无法团结一致，从而降低了红军的战斗力。§!"
 communist_influence_aazz:0 "共产主义影响"
 prc_qingbao_2ju:0 "军委二局"
 prc_qingbao_2ju_desc:0 "1932年，军委二局成立，起初为中革军事委员会总参谋部情报科，后升级为局。位列总参谋部各局之二，因此得名“军委二局”。军委二局的主要职责包括无线电侦察任务、破译敌人密码本、获取情报。局长由黄埔四期毕业生曾希圣担任，与曹祥仁、邹毕兆组成了红军的“破译三杰”。"
 PRC_idea_Nation_economic_recovery_period:0 "恢复国民经济"
 PRC_idea_Nation_economic_recovery_period_desc:0 "旧中国的经济本来就已经极其落后，日本帝国主义侵华战争和国民党反动派反人民战争更使它遭到严重的破坏，集中力量恢复国民经济成为摆在党和人民面前的紧迫任务。党和政府按照“公私兼顾、劳资两利、城乡互助、内外交流”的基本方针，全力恢复国民经济。"
 PRC_idea_demobilize:0 "军队复员"
 PRC_idea_demobilize_desc:0 "新中国建立后，为了节省军费，把国家资金用到民生建设、社会秩序恢复等重大事项上，中央军委决定对解放军进行大规模的精简整编复员。1950年5月16日，军委专门就军队复员工作进行部署研究，做出了军队复员150万人的决定，把全军总兵力压缩到400万人，当年度就复员了23.9万人，这是新中国成立后第一次大裁军。"
 prc_manmuchuangyi:0 "满目疮痍，百废待兴"
 prc_manmuchuangyi_desc:0 "由于帝国主义、封建主义、官僚资本主义的统治和长期的战争，在新中国建立前，社会经济十分落后而且破坏严重。1949年与历史最高年份相比，工业总产值减少50%，其中重工业减少70%，轻工业减少30%，煤炭产量减少48%，钢铁产量减少80%以上。粮食产量减少近1/4，棉花产量减少48%。铁路只有近万公里线路通车，3200多座桥梁遭到严重破坏。\n国民党政府滥发货币，通货恶性膨胀，市场物价猛涨。1949年城市中失业人数约有400万人，农村灾民约4000万人，人民生活极端困难。建国后，必须迅速医治战争创伤，恢复国民经济，以巩固人民政权，改善人民生活，并为有计划的社会主义建设和社会主义改造准备条件。"
 PRC_baifei:0 "白匪残留"
 PRC_baifei_desc:0 "在撤退到台湾之前，国民党反动派在大陆潜伏了大批武装特务土匪，妄图以所谓“大陆游击”同我军进行长期斗争。"
 PRC_Five_year_plans_of_China:0 "一五计划"
 PRC_Five_year_plans_of_China_desc:0 "根据党在过渡时期总路线的要求，“一五”计划将集中主要力量进行以苏联帮助我国设计的156个建设项目为中心、由694个大中型建设项目组成的工业建设，建立我国的社会主义工业化的初步基础；发展部分集体所有制的农业生产合作社以建立对农业和手工业社会主义改造的基础；基本上把资本主义工商业分别纳入各种形式的国家资本主义的轨道以建立对私营工商业社会主义改造的基础。"
 changjiang_bureau:0 "长江局"
 changjiang_bureau_desc:0 "长江局是由王明、博古、周恩来为首的一个组织，协助协调和管理长江地区的党务。"
 yanan_rect_1:0 "延安整风-第一阶段"
 yanan_rect_1_desc:0 "延安整风开始了！ 让我们重构我们的学习方式，反对主观主义、宗派主义和党八股！"
 yanan_rect_2:0 "延安整风-第二阶段"
 yanan_rect_2_desc:0 "我们需要重组三种低效的工作方式！ 自由主义取消思想斗争，主张无原则的和平，结果是腐朽庸俗的作风发生，使党和革命团体的某些组织和某些个人在政治上腐化起来。我们需要反对个人主义和自由主义，拥抱充分重视并发动群众的力量，让群众有民主的权利参与管理、监督的集体主义和党的领导！"
 yanan_rect_3:0 "延安整风-第三阶段"
 yanan_rect_3_desc:0 "我们要对所有失足者进行营救！ 为此康生同志提议我们对那些思想尚不成熟的同志们进行抢救运动。 部分党内成员将会进行自我检讨。"
