 Long_March_1:0 "长征：完全无恢复"
 Long_March_2:0 "长征：有限的恢复"
 Long_March_3:0 "长征：适度的恢复"
 Long_March_4:0 "长征：相当好的恢复"
 Long_March_5:0 "长征：最终的恢复"
 Long_March_1_desc:0 "经过国民党围剿的长途跋涉，我军终于在这里找到了立足之地，但我们在途中也失去了大量的人力和资源。"
 Long_March_2_desc:0 "尽管遭受了长征的毁灭性影响，但在这方面已经做了一些恢复工作。然而，这方面工作做得还是太不够了，不足以显示出任何改善。"
 Long_March_3_desc:0 "经过一系列的恢复工作，军队取得了一些积极的进展。然而，仍需付出更多努力才能产生显着的改善。"
 Long_March_4_desc:0 "恢复工作很有希望。很多事情都得到了改善，我军比我们第一次踏上陕北时候的状态要好多了。然而，如果我们想要在另一场围剿战争中生存下来，仍有改进的空间和需要做的事情。"
 Long_March_5_desc:0 "恢复工作已进入最后阶段。大多数事情已经到位，我们的军队已经能够应付其他军阀的全面攻击。然而，如果我们真的想要在国民党、军阀和日本的权力斗争中取得胜利，我们还可以做一些事情来推动我们的事业。"
 PRC_no_skilled_personnel_1:0 "缺乏技术人才：极度"
 PRC_no_skilled_personnel_2:0 "缺乏技术人才：严重"
 PRC_no_skilled_personnel_3:0 "缺乏技术人才：中等"
 PRC_no_skilled_personnel_4:0 "缺乏技术人才：轻微"
 PRC_no_skilled_personnel_1_desc:0 "由于缺乏教育和普通大众的低识字率，我国正面临着巨大的技术短缺。我们需要对此采取一些措施，否则我们很难在任何领域的研究中取得任何进展。"
 PRC_no_skilled_personnel_2_desc:0 "由于缺乏教育和普通大众的低识字率，我国正面临着明显的技术短缺。我们需要对此采取一些措施，否则我们很难在任何领域的研究中取得任何进展。"
 PRC_no_skilled_personnel_3_desc:0 "由于缺乏教育和普通大众的低识字率，我国正面临着部分的技术短缺。我们需要对此采取一些措施，否则我们很难在任何领域的研究中取得任何进展。"
 PRC_no_skilled_personnel_4_desc:0 "尽管我们在培训方面做出了努力，受到以往严重的技术短缺的轻微影响。我们仍然需要更多的专家和熟练技工来与其他国家的标准相匹配。"
