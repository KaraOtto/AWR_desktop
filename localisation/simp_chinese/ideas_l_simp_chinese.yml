 PRC_ideas:0 "中共ideas" 
 CHI_communist_in_government:0 "政府中的共产主义者"
 CHI_communist_in_government_tt:0 "§Y当共产党的支持率低于15%时，这种民族精神就会消失。§!\n\n"
 CHI_communist_in_government_desc:0 "由于我们对共产党作出了让步，尽管他们重新加入了我们的政府，但他们仍然保留了很大的影响力。我们应该注意他们的活动，确保他们不会掌权。\n§W--------------§!\n§W如果他们是第一次总统选举期间§! §R最受欢迎的政党§! §W或者§! §R他们的支持率超过40%，而我们的支持率低于25%，§! §W他们就会掌权。§!§W\n§Y当共产党支持率低于15%时，这种民族精神就会消失。§!"
 military_commission_ZHONGYANGJUNWEI:0 "中共中央革命军事委员会"
 military_commission_ZHONGYANGJUNWEI_desc:0 "中国共产党中央军事委员会是中国共产党领导下的最高军事领导机构，简称中央军委，由主席、副主席、委员组成，实行主席负责制。其主要职能是：直接领导全国武装力量。其组成人员由中国共产党中央委员会决定。"
 military_commission_zhonggejunwei:0 "中华苏维埃中央革命军事委员会"
 military_commission_zhonggejunwei_desc:0 "1931年11月，中华苏维埃第一次全国代表大会在江西瑞金召开，决定成立中华苏维埃中央革命军事委员会，简称中革军委。会后，根据此次大会决议和中央执行委员会决定，中华苏维埃共和国中央革命军事委员会成立，朱德任主席，王稼祥、彭德怀为副主席。下设军委总政治部、军委总参谋部、军委总经理部、军委总医务处等工作机构。\n1935年11月上旬，中共中央成立中国工农红军西北革命军事委员会，在中共中央直接领导下，行使中革军委职权，毛泽东任主席，周恩来、彭德怀任副主席。红军三大主力会师后，中华苏维埃共和国临时中央政府决定由毛泽东等六人组成中革军委主席团。1936年12月7日，又决定扩大中革军委，由23人组成，毛泽东任主席，周恩来、张国焘任副主席。"
 PRC_zhengzhibaoweiju:0 "国家政治保卫局"
 PRC_zhengzhibaoweiju_desc:0 "1931年11月，中华苏维埃第一次全国代表大会在江西瑞金召开，宣布成立中华苏维埃共和国临时中央政府，选举产生中华苏维埃共和国中央执行委员会。中央执行委员会之下成立国家政治保卫局，由中国共产党前期领导人之一的邓发同志任局长，下设侦察部、执行部、秘书处（后称总务处）、政治保卫大队、红军工作部、白区工作部等职能部门，在省、县及相当于县的市苏维埃政府设政治保卫分局，区及县属市设特派员，各级肃反委员会随着政治保卫机构的成立而随之撤销。1931年底开始至1932年4月，中央直属县江西瑞金和福建、江西、湘赣、湘鄂赣、闽浙赣等省的政治保卫分局先后成立。国家政治保卫局成立之后，在党和政府的领导下，依靠人民群众，服务于工农民主政权的巩固和革命斗争的需要，把斗争的矛头指向国民党特务、各种反革命分子和一切破坏革命秩序的反动势力，并初步开展了政治侦察、刑事侦查、预审、治安管理、安全保卫、劳动改造等专业工作，为保卫苏维埃政权、保护人民群众的利益、巩固工农民主政权、镇压反革命分子，作出了不可磨灭的贡献。"
 PRC_zhengzhibaoweiju_2:0 "中央特别工作委员会"
 PRC_zhengzhibaoweiju_2_desc:0 "1937年12月，中共中央成立“中央特别工作委员会”，对外称“敌区工作委员会”，主任周恩来、副主任林育英，取代原有的政治保卫局统管全党的情报、保卫工作。"
 PRC_zhengzhibaoweiju_3:0 "中央社会部"
 PRC_zhengzhibaoweiju_3_desc:0 "1939年2月，中央保卫委员会和中央敌区工作委员会合并，组成中央社会部，对内称“中央情报部”，对外仍是用“中央敌区工作委员会”。部长康生，副部长李克农、孔原、潘汉年。从这时起直至新中国成立，中央社会部一直承担党的情报工作职能。"
 PRC_zhengzhibaoweiju_4:0 "中央人民政府公安部"
 PRC_zhengzhibaoweiju_4_desc:0 "1949年10月19日，中央人民政府委员会第三次会议决定任命罗瑞卿为中央人民政府公安部长，杨奇清为副部长。中央人民政府命令发布后，中央军委公安部即行撤销，改名为中央人民政府公安部，统管全国国家安全与情报工作。"
