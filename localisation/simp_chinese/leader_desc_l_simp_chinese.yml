GER_adolf_hitler:0"阿道夫·希特勒"
GER_adolf_hitler_d:0"阿道夫·希特勒的一战经历始于1914年8月，25岁的他志愿加入巴伐利亚第16步兵团。作为传令兵穿梭于西线战壕间，因表现冷静获得二级铁十字勋章，1918年更罕见地以列兵身份获颁一级铁十字勋章。1916年索姆河战役中腿部受伤，1918年遭芥子气攻击短暂失明。在帕泽瓦尔克医院养伤期间听闻德国投降，将战败归咎于"背后捅刀"的犹太人、共产主义者和政客，形成极端民族主义世界观。\n\n战后滞留慕尼黑的希特勒成为陆军政治教官，1919年9月奉命调查"德国工人党"，反而被安东·德莱克斯勒的反犹主义纲领吸引而加入。凭借煽动性演说天赋迅速崛起，1921年7月通过党内政变成为党魁，将党名改为"国家社会主义德国工人党"。1923年11月联合鲁登道夫发动啤酒馆暴动失败，狱中口述《我的奋斗》，系统阐述种族主义与生存空间理论。\n\n他出狱后重组了纳粹党，建立冲锋队并培养戈培尔等核心成员。1929年经济危机中，他利用民众不满将纳粹党从边缘小党发展为国会第二大党。1933年1月兴登堡总统迫于压力任命其为总理，次年总统逝世后通过《元首法》集党政军权于一身。1935年撕毁《凡尔赛和约》恢复征兵，1936年3月悍然出兵莱茵兰非军事区，成功试探英法底线。此时第三帝国已初步建立独裁体制，为后续扩张铺平道路。"
SOV_iosif_stalin_d:0"约瑟夫·维萨里奥诺维奇·斯大林出生于格鲁吉亚哥里市，原名约瑟夫·朱加什维利。父亲是鞋匠，母亲为农奴之女，家境贫困。幼年受东正教教育，1894年进入第比利斯神学院，期间接触马克思主义，1898年加入俄国社会民主工党，次年因传播革命思想被开除，成为职业革命家，化名“科巴”从事地下活动。\n\n1901-1917年间，斯大林因组织罢工、宣传革命七次被捕，六次流放西伯利亚，五次逃脱。1903年社会民主工党分裂后加入布尔什维克派，逐渐成为列宁重要助手。1912年列宁任命其为党中央委员，并首次使用“斯大林”（钢铁之人）笔名。1917年十月革命期间任政治局委员，参与武装起义决策。革命胜利后任民族事务人民委员，参与组建苏维埃政权。\n\n1918-1920年内战期间，斯大林被列宁派往察里津（后改名斯大林格勒）指挥粮食运输，以铁腕整肃军队，与托洛茨基产生矛盾。1922年出任党中央总书记，利用职务安排亲信，奠定权力基础。列宁去世后（1924年），通过排挤托洛茨基、季诺维也夫等对手，于1927年确立领导地位，提出“一国建成社会主义”理论。\n\n1928年启动第一个五年计划，强制推行农业集体化，导致乌克兰等地爆发大饥荒（1932-1933），数百万人死亡。同时以国家计划推动重工业化，建立马格尼托哥尔斯克等工业基地。1934年基洛夫遇刺后，斯大林发动大清洗，通过莫斯科审判（1936-1938）清除党内元老、军队将领及知识分子，确立个人独裁。1936年颁布新宪法，形式上确立苏维埃民主制度，实则完成极权体制构建。"
USA_franklin_delano_roosevelt_d:0"富兰克林·德拉诺·罗斯福于1882年1月30日出生于纽约州海德公园的名门望族，自幼受良好教育，就读格罗顿学校与哈佛大学，随后在哥伦比亚大学法学院学习并取得律师资格。受远亲西奥多·罗斯福影响，他早年即对公共事务产生兴趣，逐步走上政治道路。\n1910年，罗斯福当选纽约州参议员，以主张改革和反对党内政治机器而受到关注。1913年，他被威尔逊总统任命为海军部助理部长，在第一次世界大战期间参与推动海军扩编与后勤建设，积累了重要的行政经验。1920年，他作为民主党副总统候选人参选，虽落败但获得全国知名度。\n1921年，罗斯福感染小儿麻痹症致下肢瘫痪，长期康复期间仍保持政治活动，并在佐治亚州温泉镇建立疗养中心，这段经历强化了他对社会困境与公共责任的关注。1928年，他重返政坛并当选纽约州州长，任内推行劳动保护、公共工程与福利措施，在大萧条爆发后采取积极干预政策以稳定州内经济与就业。\n凭借其州长时期的改革声望，罗斯福在1932年赢得总统选举。他上任后推出“新政”以应对经济危机，包括银行改革、农业调整、公共建设计划等多项措施，试图恢复金融秩序与社会信心。至1936年，他已成为美国应对大萧条的重要领导者，其政策为政府扩大经济干预和社会保障体系奠定基础，并为之后的国内改革与国际政策转向做好铺垫。"
ITA_benito_mussolini_d:0"贝尼托·墨索里尼的一战轨迹始于1914年，当时他作为意大利社会党《前进报》主编，因突然转向支持参战被开除党籍。1915年意大利参战后，他主动应征加入狙击兵团，在伊松佐河战役中因手榴弹爆炸重伤退役，这段经历使他形成"战争净化论"，认定暴力是政治变革的核心手段。\n\n1919年3月，墨索里尼在米兰组建"战斗法西斯"，成员多为退伍军人。他们身着黑衫，用蓖麻油和棍棒镇压罢工工人，两年内将队伍扩张至32万。1922年10月"向罗马进军"中，他坐火车直达首都，胁迫国王维托里奥·埃马努埃莱三世任命其为首相。次年通过《亚科法》确立独裁，建立特别法庭镇压反对派。\n\n1925-1926年，墨索里尼系统构建极权体制：解散所有非法西斯政党，建立秘密警察组织OVRA，推行新闻审查制度。1929年与梵蒂冈签订《拉特兰条约》，换取天主教势力支持。经济上实施"社团主义"，将劳资双方纳入国家控制的生产协会。\n\n1935年10月发动埃塞俄比亚战争，动用毒气与轰炸机镇压原始武装，次年5月宣布建立"意大利帝国"。这次侵略引发国际联盟制裁，却使墨索里尼国内支持率飙升。1936年与德国签订《钢铁条约》，形成罗马-柏林轴心，同时派遣黑衫军支援佛朗哥发动西班牙内战。此时他已将法西斯主义输出为国际运动，为二战同盟奠定基础。"
ENG_winston_churchill_d:0"温斯顿·丘吉尔的早年经历始于1895年，他作为年轻军官奔赴帝国前线，在古巴、印度、西北边境和苏丹不断积累实战经验，并以随军记者身份磨炼文笔。1899年参加南非战争时被布尔人俘虏，却大胆越狱并徒步数百公里获救，由此一举成名。1900年进入下议院后，他以犀利辩才与独立立场迅速出头，先后在自由党和保守党之间转党，却始终坚持强硬的帝国与海军政策。任海军大臣期间大力扩建舰队，但1915年达达尼尔行动失败使其一度失势，转而主动赴西线指挥营级部队，再次以勇气挽回部分声望。\n战后回到政坛的丘吉尔继续担任多个重要阁职，致力于财政稳定与帝国防务，但随着国际局势变化，他在20年代末逐渐退居二线。面对希特勒的崛起与德国再武装，他是英国政坛中少数持续保持警惕的声音，反复在国会警告英国不能对独裁扩张抱有幻想。尽管长期被视为“危言耸听”，他的警告随着德奥合并、莱茵兰再军事化和捷克危机的逼近而愈发显得先见。\n当欧洲秩序在1939年全面崩解、英法被迫对德宣战后，丘吉尔以其坚定的反纳粹立场重新被任命为海军大臣。他在战时内阁中展现的果决与魄力，使越来越多议员与民众认为英国需要一位能够在最黑暗时刻坚持斗争的领导者。1940年5月，在挪威战役失败与张伯伦政府信任危机的双重压力下，六十五岁的丘吉尔接过战时内阁权杖。加里波利的惨败教会他敬畏战争，坦克研发的经历培育出创新思维，二十年的政坛沉浮磨砺出钢铁意志。当他在下议院说出"我所能奉献的唯有热血、辛劳、眼泪与汗水"，整个不列颠都听到了一个浴火重生者的誓言。"
ENG_stanley_baldwin_d:0"斯坦利·鲍德温于1867年8月3日出生在英格兰伍斯特郡贝威德利的实业家庭，父亲是成功的铁器制造商与议员，使他自幼便接触商业与政治环境。鲍德温先后就读哈罗公学与剑桥大学三一学院，并在毕业后进入家族企业工作，积累了管理经验与温和务实的处事风格。1908年，他继承父亲的议席进入下议院，从此开始其漫长的公共生涯。\n在第一次世界大战期间，鲍德温担任财政部官员，以稳健态度处理战时债务筹措问题。战后，他在保守党内部凭借温和立场和协调能力得到重用，1922年保守党脱离联合政府后，他在安德鲁·博纳·劳短暂担任首相期间出任财政大臣，参与处理战后复员与财政紧缩事务。1923年博纳·劳因病辞职后，鲍德温接任首相，成为保守党稳定派的重要领袖。\n1923年底的选举使工党首次组阁，鲍德温转任反对党领袖，并在1924年重新执政。在第二任期内，他主张社会妥协与工业调解，却因处理煤矿争端不力，引发1926年英国大罢工，成为其政治生涯的主要考验。尽管如此，他凭借温和态度与强调“国家团结”的理念维持了政治稳定。\n1929年工党再次上台后，鲍德温继续领导保守党，在经济大萧条背景下主张财政稳健与跨党合作。1931年，他与麦克唐纳共同组建国民政府，再度成为英国政坛关键人物。其后，他推动减少极端势力影响、维持议会政治，并在1935年第三次担任首相。\n至1936年，鲍德温作为国民政府首脑正努力在经济萧条、社会紧张及国际局势恶化之间维持英国的稳定，并为后续的外交与再武装政策铺设方向。"
ENG_neville_chamberlain_d:0"内维尔·张伯伦于1869年3月18日出生在英国伯明翰的一个政治与实业世家，其父约瑟夫·张伯伦是英国政坛举足轻重的人物，兄长奥斯丁亦曾任外交大臣。张伯伦早年在拉格比学校与梅森理工学院接受教育，毕业后投身实业，在巴哈马群岛经营种植项目虽以失败告终，但锻炼了他的组织与管理能力。回国后，他成功经营家族金属制造企业，奠定了其务实稳健的作风。\n1911年，他进入伯明翰市议会积极推动地方住房与社会福利改革，1915年至1916年担任伯明翰市长，以高效行政和社会关怀著称。直至46岁、1918年战后大选中，张伯伦才首次进入下议院，成为当时最晚踏入国家政坛的重要政治人物之一，但很快凭借其行政能力崭露头角。\n1922年保守党重新执政后，张伯伦先后出任卫生大臣与财政部官员，尤其在1923—1924年短暂任卫生大臣期间推动住宅建设、公共健康与社会管理改革，树立了“实干型部长”的声誉。1925年，他在第二次鲍德温内阁中再次出任卫生大臣，继续推进大规模住宅法案与地方自治改革，使其成为政府中最具影响力的社会政策制定者之一。\n1931年大选后，张伯伦出任国民政府财政大臣，正值全球经济危机最严重时期。他推行紧缩措施、削减开支、维持英镑信誉，在国际经济动荡中保持了英国财政体系的整体稳定。1930年代初的财政政策虽饱受争议，但也巩固了他在保守党内的核心地位。\n到1937年5月，鲍德温退休后，作为保守党内最具经验与威望的政治人物，内维尔·张伯伦顺理成章地出任英国首相。上任之初，他延续节制财政与稳健行政的优先方向，试图在经济复苏的背景下加强帝国防务，同时又希望通过外交手段维持欧洲脆弱的和平。"
SAU_abdulaziz_ibn_saud_d:0"阿卜杜勒-阿齐兹·本·阿卜杜拉赫曼·本·费萨尔·阿勒沙特1875年1月15日生于内志酋长国利雅得大贵族家庭沙特家族，为当地酋长阿卜杜勒-拉赫曼·本·费萨尔的第三子。其祖辈曾统治内志，后来被拉希德家族的杰贝勒沙马尔酋长国击败。\n\n1891年他随父亲流亡巴林，后又到科威特。1901年，在科威特埃米尔的资助下，带领兄弟和亲属前往内志地区打击亲近拉希德家族的部落。1902年1月，率领约40人乘夜潜入利雅得，斩杀拉希德家族委任的次总督，夺回了利雅得。随即自称利雅得埃米尔。\n\n1902年6月其父主动禅让家主与之，成为沙特家族的领袖，其父则退位，只保留了伊玛目的头衔，作为国家的精神领袖。1904年出任内志埃米尔。1912年统一了内志地区。1913年夺取波斯湾沿岸的哈萨和盖提夫地区，利雅得酋长国又被称作内志和哈萨酋长国。1918年在胡马尔击败汉志国王。1921年，加冕为内志苏丹，同时获得了伊玛目的头衔，国家也随之更名为内志苏丹国。他于当年彻底征服了拉希德家族的杰拜勒舍迈尔酋长国（哈伊勒酋长国）。1924年攻下圣城麦加，1925年吞并汉志，1926年又占领阿西尔地区，自封为苏丹，1927年1月内志苏丹的称号改为内志国王。1932年9月23日改国名为沙特阿拉伯，出任首任国王。"
PER_reza_shah_pahlavi_desc:0"礼萨·汗于1878年出生在伊朗北部马赞达兰省的一个普通军人家庭，自幼在贫困与部落冲突的环境中成长，使他比一般同侪更早接触武装与规训。青年时期，他加入哥萨克旅，并凭借体格强悍、纪律严明与果断执行著称，很快从一名普通骑兵晋升为军官。第一次世界大战期间，伊朗虽然名义中立，却成为协约与同盟势力的角力场，中央政府摇摇欲坠。礼萨·汗在混乱中不断累积实力，最终成为哥萨克旅中最具影响力的指挥官。\n\n1921年，他与赛义德·齐亚发动政变，控制德黑兰，确立自己为国家安全的核心人物。虽然齐亚政府很快垮台，但礼萨·汗在政变后反而声望大涨，被任命为战争部长，随后又执掌内务。他以铁腕手段镇压地方豪强，统一税收与军制，并通过道路建设、学校系统与司法改革削弱传统部落势力。1923年，他成为首相，推动国家现代化、中央集权化与世俗化议程，反对外国势力操控伊朗政治，使民众对他产生“强人救国”的期待。\n\n1925年，在议会支持下，他废黜卡扎尔王朝并加冕为伊朗国王，建立巴列维王朝。即位后，他试图仿效土耳其的凯末尔改革，以国家权力强制推进世俗法律、军队现代化、民族认同重塑以及女性社会地位改善。他以国家统一为目标压制库尔德与部落叛乱，并通过修建跨国公路与规划铁路网络来强化经济基础。虽然其统治手段日益严厉，但伊朗在他领导下确实呈现出前所未有的集中化与现代化迹象。"