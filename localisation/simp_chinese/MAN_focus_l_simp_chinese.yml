l_simp_chinese:
 JAP_no_longer_focus_annex:0 "§G日本将不再能够通过国策来吞并你。§!\n"
 MAN_Armored_force:0 "装甲部队"
 MAN_Armored_force_desc:0 "坦克改变了战争的方式。我们决不能对这种变化一无所知。"
 MAN_Big_Hsinking_Urban_Planning:0 "大都市计划"
 MAN_Big_Hsinking_Urban_Planning_desc:0 "通过扩大我们城市的边界，我们可以提高它们的经济实力和工业能力。这将很快造就我国第一个国际大都市。"
 MAN_Close_Cooperation_with_IGH:0 "派学员到日本院校"
 MAN_Close_Cooperation_with_IGH_desc:0 "我们可以要求把我们学员送到与关东军有联系的日本军事院校。"
 MAN_Conscription:0 "全国征兵"
 MAN_Conscription_desc:0 "在充满敌意的全球形势下，未来一定会发生动荡。不管有没有战争，我们都要做好准备。"
 MAN_Control_legislation:0 "控制立法"
 MAN_Control_legislation_desc:0 "满洲国立法是我国政府的重要组成部分，是保证我国合法性的重要政治机关之一。我们应该坚持我们对其施加影响，排除东京方面任何形式的干预。"
 MAN_Control_the_government:0 "强化政府"
 MAN_Control_the_government_desc:0 "在我们军队现在自给自足的情况下，我们应该利用这个机会来增强我们臣民的忠诚度。"
 MAN_Defense_doctrine:0 "防御战略"
 MAN_Defense_doctrine_desc:0 "我们的军队仍然没有能力对我们任何潜在的敌人发动成功的大规模进攻。我们必须暂时集中精力于防守。"
 MAN_Fukusho_chinese_labor_company_focus:0 "资助福昌华工株式会社"
 MAN_Fukusho_chinese_labor_company_focus_desc:0 "打下一个好国家的基础需要付出艰苦的劳动。艰苦的工作需要劳工，而在中国，有的是劳工。"
 MAN_Imperial_Army_Focus:0 "扩大帝国陆军"
 MAN_Imperial_Army_Focus_desc:0 "关东军是我们的肉中刺，他们在我国各方面都有巨大的影响，甚至在政策和决策上也有很大的影响。虽然我们目前没有能力策划驱逐他们，但我们可以通过扩大我们自己部队来设法与他们保持距离。也就是我们自己的帝国陆军。"
 MAN_Japan_Advanced_industrial_system:0 "日本工业结构"
 MAN_Japan_Advanced_industrial_system_desc:0 "日本目前是亚洲最大的工业强国。我们必须尽我们所能向他们学习，以改进我们的工业。"
 MAN_Japan_Extraterritoriality_of_Abrogation:0 "废除日本人的治外法权"
 MAN_Japan_Extraterritoriality_of_Abrogation_desc:0 "东京方面仍然对满洲帝国拥有很大的治外法权，但它可能会阻碍我们的业务。现在我们在满洲有了更稳固的立足点，我们将与东京方面进行谈判，并加以修正。"
 MAN_Japanese_aircraft:0 "研究日本飞机"
 MAN_Japanese_aircraft_desc:0 "日本飞机具有极高的灵活性，这是空战中一个非常重要的因素。我们必须深入研究其背后的机制。"
 MAN_Japanese_weapons:0 "研究日本装备"
 MAN_Japanese_weapons_desc:0 "[Root.GetJapWeaponFocusDesc]"
 MAN_Join_against_soviet_military_exercises:0 "反苏联合军事演习"
 MAN_Join_against_soviet_military_exercises_desc:0 "通过参加日本组织的针对苏军的军事演习，我们士兵可以对军事战术和管理有更多的了解。"
 MAN_Kwantung_Army_Focus:0 "[Root.GetKwantungArmyFocus]"
 MAN_Kwantung_Army_Focus_desc:0 "[Root.GetKwantungArmyFocusDesc]"
 MAN_Labour_law:0 "特殊劳动力"
 MAN_Labour_law_desc:0 "拿起武器保卫我们亲爱的国家是每一个合格公民的责任。不过，不应抛弃那些没有资格承担这种责任的人。他们将在特殊劳动力大军中占有一席之地，这将有助于把我们国家建设成伟大的国家。"
 MAN_Manchukuo_Air_Force:0 "改革空军"
 MAN_Manchukuo_Air_Force_desc:0 "自从1911年意大利-土耳其战争中第一次出现攻击机以来，战斗机及其分支经过了几十年的发展。为了跟上其他国家的步伐，我们必须建立自己的空军。"
 MAN_Manchukuo_Constitution:0 "满洲宪法"
 MAN_Manchukuo_Constitution_desc:0 "尽管满洲国是一个君主立宪制国家，但它没有正式的宪法，只有一些宪政的法律条文。既然我们对我们的立法有了坚定的影响力，我们最终可以设立一部正式的宪法，并相应地改革我们的政治结构。"
 MAN_Manei_focus:0 "满洲映画协会"
 MAN_Manei_focus_desc:0 "电影可能是为了娱乐，但它们仍然可以用来传播思想。满洲映画协会现在的任务是制作符合我们在满洲利益的宣传片。"
 MAN_Manshu_Nippo_focus:0 "《满洲日日新闻》优先"
 MAN_Manshu_Nippo_focus_desc:0 "我们必须向我们的臣民灌输毫无疑问的忠诚。《满洲日日新闻》在他们中间的普及，将使其成为实现这一目标的一个伟大的媒介。"
 MAN_Offensive_doctrine:0 "崇尚进攻"
 MAN_Offensive_doctrine_desc:0 "进攻是最好的防御。一个只防卫自己的人不能粉碎他们的敌人。我们需要打击我们的敌人才能打败他们。进攻是战场上的关键。"
 MAN_Policy_of_Japanese_immigrants:0 "[Root.GetJapImmigrant]"
 MAN_Policy_of_Japanese_immigrants_desc:0 "[Root.GetJapImmigrantDesc]"
 MAN_River_fleet:0 "江上军"
 MAN_River_fleet_desc:0 "我们必须发展一支巡逻河流的军队。"
 MAN_SMR_electric_focus:0 "南满洲电业株式会社"
 MAN_SMR_electric_focus_desc:0 "电气化将大大改善南满人民的生活质量。所以有必要成立一家负责该地区配电和电网管理的公司。"
 MAN_SMR_gas:0 "南满洲石油株式会社"
 MAN_SMR_gas_desc:0 "为了加强南满洲的工业能力，需要建立各部门的工业。南满洲石油株式会社就是其中之一。"
 MAN_South_Manchuria_Railway:0 "南满铁路"
 MAN_South_Manchuria_Railway_desc:0 "南满铁路的扩建将加强我国在南方地区的运输业务。"
 MAN_Strengthen_backward_support:0 "提高后勤支援"
 MAN_Strengthen_backward_support_desc:0 "一支强大的军队需要一个良好的后勤来支持其前进。当然，我们在这两方面都不能落后。"
 MAN_Tenko_the_leftists_youth:0 "扭转左翼大学毕业生的倾向"
 MAN_Tenko_the_leftists_youth_desc:0 "随著大批左翼知识分子涌入满洲，他们对国家安全构成的威胁越来越大。毕竟他们占据数量上的优势。我们决不能因为这种对我们国家基础的真正威胁还没有发生，就对它视而不见。必须用一切必要的手段改变或纠正这些左翼分子的思想。"
 MAN_Training_officers:0 "军官培训计划"
 MAN_Training_officers_desc:0 "帝国陆军至少应该努力与关东军并驾齐驱，甚至超越关东军。有鉴于此，我们必须聘请有经验的军官来提高他们的素质。"
 MAN_a_deal_with_Kuhn_Leob_focus:0 "与库恩勒伯公司做交易"
 MAN_a_deal_with_Kuhn_Leob_focus_desc:0 "有了麦克斯韦·克莱曼作为Aikawa的中间人，我们有能力与最有影响力的银行之一——库恩勒伯公司达成协议。如果这笔交易成功，它将改善我们与美国的关系，并为我们提供足够的资源来扩大满洲的工业。"
 MAN_a_deal_with_Kuhn_Leob_focus_tt:0 "将发生一系列§Y谈判事件§!。库恩勒伯公司将以一定的价格§Y提供工业投资§!。\n"
 MAN_aiguozhuyi:0 "弘扬爱国主义"
 MAN_aiguozhuyi_desc:0 "伪满洲国不过是日本扶持的傀儡政权，不值得我们去为之付出。我们应该号召每一个不愿受日本侵略者奴役的中国人起来反抗，推翻伪满洲国，赶走侵略者！"
 MAN_amass_korean_support_focus:0 "争取朝鲜人的支持"
 MAN_amass_korean_support_focus_desc:0 "自甲午战争以来，朝鲜人一直对日本的统治不满。如果我们的计划要成功，我们就必须争取尽可能多的支持。有了朝鲜人的感伤和我们提供的平等，他们应该很乐意加入我们的事业。"
 MAN_appeals_to_japanese_intellectual_youth:0 "吸引日本知识青年"
 MAN_appeals_to_japanese_intellectual_youth_desc:0 "根据1925年日本的《治安维持法》，反对日本现行体制的思想被认为是“思想犯罪”。因此，很多左倾的日本大学毕业生转而前往满洲国。我们可以利用这一点，争取他们的支持，以实现我们的事业。"
 MAN_assertiveness:0 "王道统治"
 MAN_bicycle_battalions:0 "自行车机动营"
 MAN_bicycle_battalions_desc:0 "机动性极其关键。在笨重的运兵车不能穿越的地方，自行车可以很好地为我们士兵服务。"
 MAN_bolster_nationalism:0 "弘扬爱国主义"
 MAN_bribe_zhang_jinghui_focus:0 "贿赂张景惠"
 MAN_bribe_zhang_jinghui_focus_desc:0 "张景惠似乎是个机会主义者，如果我们送给他适当的礼品，他可能会站在我们这边。"
 MAN_buy_back_unsan_goldmines:0 "收购云山金矿"
 MAN_buy_back_unsan_goldmines_desc:0 "云山金矿由东方联合矿业公司经营。由于世界紧张局势的加剧，联合矿业公司运出黄金方面面临越来越大的困难，我们可以介入谈判，购买云山金矿。此次收购还将帮助我们实现东京方面要求增加黄金产量的目标。"
 MAN_chaoxian:0 "联合朝鲜同志"
 MAN_chaoxian_desc:0 "在东北有很多的朝鲜人，他们大多数是因为日本人的一些政策迁徙到东北来的，他们很多人也和我们一样遭受日本侵略者的奴役和压迫。我们抗联的金日成同志恰好就是朝鲜人，他将会帮助我们领导朝鲜人共同反抗日本侵略者。"
 MAN_china_nights_focus:0 "“支那之夜”"
 MAN_china_nights_focus_desc:0 "我们必须继续制作亲日宣传片。它们将在青年日本化和促进同化方面发挥重要作用。"
 MAN_chinese_leadership:0 "关东军顾问"
 MAN_chinese_leadership_desc:0 "以我们目前与关东军的关系，我们可以要求退伍军人担任我们的军事顾问。这必将提高我军的素质。"
 MAN_consolidate_concordia_association_focus:0 "强化协和会"
 MAN_consolidate_concordia_association_focus_desc:0 "尽管满洲国的目标是为了进一步吸引日本人对满洲的兴趣，但满洲国仍是很多持不同政见者的居所。这些持不同政见者可能在这个国家没有任何支配地位，但他们可能仍然能够对满洲国人民施加一定的影响。即使是这些微不足道的影响也不应该被容忍。协和会的权力必须是绝对的。"
 MAN_demand_righteous_territories_focus:0 "索取合法领土"
 MAN_demand_righteous_territories_focus_desc:0 "西方列强利用我们软弱的时代，强迫我们签署“不平等条约”。这些耻辱作为外国人在中国土地上的定居点而存在。我们必须驱逐这些卑鄙的西方狗，重新找回我们以前的荣耀！"
 MAN_democratize_the_constitution_focus:0 "权利扩张"
 MAN_democratize_the_constitution_focus_desc:0 "我国已成为一个君主立宪制国家。然而，我们的宪法还很不完善。有关公民权利和政治权利的文章因未能赶上西方标准而受到批评。我们必须纠正这种情况。"
 MAN_development_focus:0 "满洲的发展"
 MAN_development_focus_desc:0 "在制定任何工业发展计划之前，应考虑满洲的可持续性。如果满洲遭到无情地剥削，它将很快失去其价值，而变成像中国本土一样的另一个贫困城市。为了避免这样的后果，需要进行深入的评估和谨慎。"
 MAN_election_over_60_tt:0 "一旦§H民主支持率超过 60%§!，民众将要求进行选举。\n"
 MAN_expand_opium_fields_focus:0 "扩大鸦片田"
 MAN_expand_opium_fields_focus_desc:0 "满洲的鸦片田需要大规模扩建以满足海外需求。"
 MAN_expell_the_chinese_collaborationists:0 "驱逐中国合作主义者"
 MAN_expell_the_chinese_collaborationists_desc:0 "中国人在王道乐土没有立足之地，他们必须被驱逐出我们挚爱的土地。"
 MAN_exploitation_focus:0 "开发满洲"
 MAN_exploitation_focus_desc:0 "入侵满洲的意图一直是开发该地区的资源。因此，满洲的发展应该始终为日本本岛人民带来福祉。而满洲当地人的生计和该地区的可持续性永远不应该被关注。"
 MAN_finish_the_fight_focus:0 "最后一战"
 MAN_finish_the_fight_focus_desc:0 "中华民国在1914年推翻了清帝国。这种屈辱是不能容忍的。民国必须被摧毁，我们才能挽回我们应得的尊重。"
 MAN_first_five_year_plan:0 "引入五年计划"
 MAN_first_five_year_plan_desc:0 "尽管受到共产党人的拥护，苏联的五年计划实际上是一个很好的工业集中规划的典范。这种模式可以极大地惠及满洲，最终提高满洲工业的效率和竞争力。"
 MAN_five_equal_peoples_desc:0 "一个民族可以凌驾于所有其他民族之上的日子已经过去了。满洲国将成为一个新型国家，汉、满、蒙、朝、日五个民族的人民将和谐共处。"
 MAN_five_people_armies_tt:0 "获得12个由§G3步兵营§!组成的单位。\n"
 MAN_five_peoples_council:0 "五族议会"
 MAN_guandongjun:0 "刺杀关东军将领"
 MAN_guandongjun_desc:0 "1928年，关东军制造皇姑屯事件，炸死中国奉系军阀首领张作霖。1931年关东军又策划九一八事变，侵占中国东北全境。次年炮制伪满洲国，司令部迁至长春，司令兼任日本驻“满”大使和关东厅长官，掌握伪满军政大权。我们可以计划消灭关东军一位高级将领，为张学良报仇，并以此来招募收编东北军残部势力。"
 MAN_hebing:0 "回归中央"
 MAN_hebing_desc:0 "我们已经取得了抗日战争的胜利，现在是时候回归中央了"
 MAN_hoankyoku:0 "设立保安局"
 MAN_hoankyoku_desc:0 "由于满洲内部的颠覆活动，我们需要一个比Tokko更机密的情报机构来稳定我们的皇权，以保护我们的王道乐土。"
 MAN_honeymoon_express:0 "“蜜月快车”"
 MAN_honeymoon_express_desc:0 "需要一部关于日本民族主义思想的电影来向公众灌输忠诚。一位会说一口流利普通话的日本女演员已成为这部影片的主角，并为她的首次亮相做好了准备。"
 MAN_imperial_association:0 "帝国议会"
 MAN_imperial_conservative_party:0 "帝国保守党"
 MAN_imperial_council:0 "清廷"
 MAN_improve_international_image:0 "提升国际形象"
 MAN_improve_international_image_desc:0 "为了在世界上获得更多的盟友，我们必须向他们表明我们愿意合作并做出妥协。这应该降低他们的警惕，使我们能够充分利用他们的资源，为我们的利益服务。"
 MAN_increase_of_Joint_stock_company:0 "扩大财阀影响"
 MAN_increase_of_Joint_stock_company_desc:0 "日本大型商业集团——财阀一直对满洲表现出兴趣。如果我们允许他们在这里扩展业务，我们可能会从中获得一些好处。"
 MAN_independence_war_tt:0 "获得12个由§G6步兵营§!组成的单位。\n"
 MAN_invite_japanese_settlers:0 "[GetInviteJapSettlers]"
 MAN_invite_japanese_settlers_desc:0 "[GetInviteJapSettlersDesc]"
 MAN_invite_johnston_focus:0 "[Root.GetReginaldJohnstonCitizenship]"
 MAN_invite_johnston_focus_desc:0 "[Root.GetReginaldJohnstonCitizenshipDesc]"
 MAN_invite_menjiang:0 "邀请内蒙古"
 MAN_invite_menjiang_desc:0 "我们国家是一个非常包容的国家，一个愿意站起来反对压迫者的国家。通过邀请内蒙古地区弱邦，他们可以享受我们的保护和他们以前压迫者没有给予的自由。"
 MAN_japanization_of_manchuria_focus:0 "满洲的日本化"
 MAN_japanization_of_manchuria_focus_desc:0 "满洲是日本不可分割的一部分！满洲生活的方方面面都要符合日本的标准，这是很自然的！"
 MAN_jieguanqiye:0 "强制接管日本会社"
 MAN_jieguanqiye_desc:0 "以“满铁”为代表的日本企业强占着东北这片土地的铁路，把控着中国的各个经济命脉，现在他们的营业时间结束了，中国人民将会接管他们的企业。"
 MAN_join_allies_focus:0 "加入同盟国"
 MAN_join_allies_focus_desc:0 "这个世界充满了危险和贪婪的捕食者，它们正盯著我们这个宝贵的国家。我们必须寻求西方自由世界的帮助。与他们联盟将确保我们国家不受世界上其他压迫者的压迫。"
 MAN_jundui:0 "整编部队，申明军纪"
 MAN_jundui_desc:0 "我们虽然在过去几个月中招募了大量起义部队，但随着人数的增加，部队整体纪律有所下降，为此，我们必须重申部队纪律，保证我们部队战斗力。"
 MAN_kanglian:0 "与抗联合作"
 MAN_kanglian_desc:0 "东北抗日联军是在中国共产党领导下的一支英雄部队。“九一八”日本侵占中国东北以后，由部分原东北军、中共抗日游击队、农民暴动武装、义勇军等组成。他们在中国共产党的领导下，同日本侵略者进行了数年的艰苦斗争。我们应与其合作，共同反抗日本法西斯的统治，以争取民族独立。"
 MAN_land_reform:0 "土地改革"
 MAN_land_reform_desc:0 "满洲分布著大量未开发和未利用的土地。土地分配和土地使用的改革可以给满洲经济带来很大的潜力。"
 MAN_law_university:0 "扩大建国大学"
 MAN_law_university_desc:0 "随著普通民众文盲率的降低，满洲的建国大学应该扩大规模，让更多的人才有施展才华的地方。注：建国大学是一所位于满州国首都新京（灭国后改制为中华民国吉林省长春），直辖于满洲国国务院的国立大学。简称“建大”。1938年5月创校，至1945年8月满州国灭亡而关闭。毕业生共1500名。"
 MAN_light_industry_investments:0 "轻工业投资"
 MAN_light_industry_investments_desc:0 "投资于满洲里蓬勃发展的轻工业，可以极大地促进了满洲经济的发展。"
 MAN_lixian_pai_short:0 "帝国制宪会议"
 MAN_manchu_council:0 "皇族内阁"
 MAN_manchuria_daily_news_focus:0 "优先推行《满洲日报》"
 MAN_manchuria_daily_news_focus_desc:0 "随著我们对媒体行业的完全控制，我们臣民毫无疑问会对我们效忠，这只是时间问题。我们现在应该把重点放在利用媒体与国际社会沟通上。《满洲日报》将成为我们这一攻势的主要工具。"
 MAN_mangyo_focus: "满洲重工业开发株式会社"
 MAN_mangyo_focus_desc:0 "[Root.GetMangyoDesc]"
 MAN_media_industry_focus:0 "发展媒体产业"
 MAN_media_industry_focus_desc:0 "媒体被称为第四产业或第四权，可以在限制政府权力方面发挥巨大作用。我们必须通过在报社任命亲政府人员来确保媒体对我们的忠诚。"
 MAN_menjiang_ultimatum_focus:0 "对内蒙古的最后通牒"
 MAN_menjiang_ultimatum_focus_desc:0 "随著我们军事力量的增强，我们现在可以强迫内蒙古地区弱邦投降。"
 MAN_mesta_tt:0 "§HMesta机械公司§!可成为工业企业。\n"
 MAN_obedience:0 "日满一体"
 MAN_pacify_the_countryside:0 "稳定满洲"
 MAN_pacify_the_countryside_desc:0 "自满洲国成立以来，叛乱分子和共产党土匪一直在大肆破坏。为了恢复大满洲帝国的完整性和国家凝聚力，必须对这些土匪进行一场平定运动。"
 MAN_partner_with_mesta_machinery_focus:0 "与Mesta机械公司合作"
 MAN_partner_with_mesta_machinery_focus_desc:0 "由于第一个五年计划期间我们面临的专用机床短缺，我们将慎重地与专门生产专用机床的外国公司合作，以加快工业化进程。"
 MAN_plm:0 "联合蒙古独立旅"
 MAN_plm_desc:0 "乌兰夫的蒙古独立旅一直在坚持和日本侵略者作斗争，他们值得我们去联合的对象，草原和白山黑水上空将会重新升起中国的旗帜！"
 MAN_poison_zheng_xiaoxu:0 "毒杀郑孝胥"
 MAN_poison_zheng_xiaoxu_desc:0 "尽管郑孝胥是建立满洲国的主要贡献者之一，但他还是暗中想要恢复旧清帝国。他现在被软禁，并受到持续的监视。然而，他的存在可能会给其他复辟主义者带来希望。是时候除掉他了。"
 MAN_pressure_Zhang_jinghui_focus:0 "给张景惠施压"
 MAN_pressure_Zhang_jinghui_focus_desc:0 "尽管张景惠职位是国务总理，但实际上更像是一个有名无实的首脑。真正的权力掌握在关东军顾问手中。现在我们需要一个有权势的人站在我们这边，我们应该考虑给他一些压力。"
 MAN_proclaim_absolute_monarchy:0 "绝对君主制"
 MAN_proclaim_absolute_monarchy_desc:0 "晚清的灭亡很大程度上是由于对新宪法的要求。因此，有了这样残酷的教训，我们不应该为西方理想的谎言而倾倒。我们的新帝国将延续我们祖先的传统，并将天子视为这片土地唯一的统治者。任何人都不得挑战天子的权威。"
 MAN_propagandize_government_agenda:0 "宣传政府议程"
 MAN_propagandize_government_agenda_desc:0 "随著《满洲日报》的普及，我们应该能够更容易地普及日语的使用，并倡导政府议程。"
 MAN_qingxi:0 "总务厅的一声炸响"
 MAN_qingxi_desc:0 "总务厅是日本人设置来监视和操控东北政府和东北人民的反动机构，他们为虎作伥的日子到头了！我们的特工将会用炸弹把他都送上天。"
 MAN_qiyishike:0 "起义时刻"
 MAN_qiyishike_desc:0 "现在，我们已经做好了所有起义的准备，让同志们吹响解放东北的号角吧！"
 MAN_raid_the_social_research_unit:0 "突袭南满社会研究所"
 MAN_raid_the_social_research_unit_desc:0 "南满铁路公司的社会研究所是臭名昭著的马克思主义同情者的温床。我们应该对那些颠覆分子进行突袭，以提醒所有想反对我们政府的人。"
 MAN_realize_the_white_movement_focus:0 "解放俄罗斯"
 MAN_realize_the_white_movement_focus_desc:0 "康斯坦丁·罗扎耶夫斯基正在领导一场成功的运动，在满洲国内重建一个新的民族主义俄罗斯国家。在我们的帮助下，我们可以把他的想法变成现实。"
 MAN_reclaim_lost_lands:0 "收复失地"
 MAN_reclaim_lost_lands_desc:0 "晚清在一系列屈辱条约中丧失了大片领土。现在是我们，他们的合法继承人，收复这些失去的领土和我们以前荣耀的时候。"
 MAN_recruit_white_russian_advisors_focus:0 "招募白俄顾问"
 MAN_recruit_white_russian_advisors_focus_desc:0 "由于俄国的共产主义革命，很多俄国白军居住在满洲。他们与我们合作对双方都有利。"
 MAN_reform_the_constitutional_monarchy:0 "君主立宪制"
 MAN_reform_the_constitutional_monarchy_desc:0 "君主立宪制一直是郑孝胥和很多参与建立满洲国的清朝忠臣的理想。这也是满洲国创立的原则。它将比重建清朝的绝对君主制更合适。"
 MAN_rejuvenate_heavy_industry_focus:0 "重组重工业"
 MAN_rejuvenate_heavy_industry_focus_desc:0 "尽管日本和世界各地的企业都提供了大量援助和大规模投资，但满洲的重工业仍然相对不发达。现在满业的帮助下，全面重组我们的重工业，可以确保我们帝国的繁荣。"
 MAN_rejuvenate_heavy_industry_focus_no_dlc:0 "重组重工业"
 MAN_rejuvenate_heavy_industry_focus_no_dlc_desc:0 "尽管日本和世界各地的企业都提供了大量援助和大规模投资，但满洲的重工业仍然相对不发达。现在满业的帮助下，全面重组我们的重工业，可以确保我们帝国的繁荣。"
 MAN_request_control_of_the_railways:0 "夺取铁路公司控制权"
 MAN_rescue_zheng_xiaoxu_focus:0 "营救郑孝胥"
 MAN_rescue_zheng_xiaoxu_focus_desc:0 "满洲国前总理郑孝胥因经常与日本领导人意见不合，于1935年被迫辞职。他现在关东军的监视之下。作为一个伟大的王道哲学家和坚定的大清忠臣，我们需要把他营救出来，才能有所成就。"
 MAN_return_to_the_old_ways_focus:0 "中央集权"
 MAN_return_to_the_old_ways_focus_desc:0 "中央集权政府将为我们新成立的帝国提供更大的国家完整性和稳定性。"
 MAN_second_five_year_plan_focus:0 "第二个五年计划"
 MAN_second_five_year_plan_focus_desc:0 "在前一个五年计划成功后，应组织新的产业规划倡议，以便高效地实现满洲工业化。"
 MAN_solicit_investment_from_US_steel_focus:0 "与美国钢铁公司谈判"
 MAN_solicit_investment_from_US_steel_focus_desc:0 "由于美国的大萧条，他们很多工业集团都很难找到合作伙伴来做生意。在这种情况下，美国钢铁公司就是其中之一。然而，由于日本和美国之间的紧张关系，这样的协议仍然是一个挑战。不过，这是一个值得一试的挑战。"
 MAN_songzhangjinghuishanglu:0 "送张景惠上路"
 MAN_songzhangjinghuishanglu_desc:0 "张景惠是奉系领袖张作霖的结拜兄弟，他作为一个中国人，却担任着日本扶持的伪满洲国的总理，帮助日本侵略者屠杀残害我们的中国同胞。我们的地下党员将会铲除他，以儆效尤。"
 MAN_sov:0 "苏联军援"
 MAN_sov_desc:0 "我们党中央距离我们太远了，而且中央本身的物资也十分短缺，基本上是无法支援我们的抗日活动的。好在苏联的同志愿意提供我们所需要的枪支弹药，并且我们从苏联进口了武器机床，我现在可以在地下秘密生产武器了！"
 MAN_support_the_Yakuza_focus:0 "[Root.GetYakuzaSupportFocus]"
 MAN_support_the_Yakuza_focus_desc:0 "[Root.GetYakuzaSupportFocusDesc]"
 MAN_tongyizhanxian:0 "团结一切力量"
 MAN_tongyizhanxian_desc:0 "为了组建反法西斯同盟对抗日本法西斯统治，我们应团结一切可团结力量，摒弃民族，宗教前嫌，团结一切爱国者一同起来反抗日本帝国主义。"
 MAN_unit_731_focus:0 "特别研究组"
 MAN_unit_731_focus_desc:0 "道德和人的尊严只是阻碍科学进步发展的障碍。以科学的名义，我们将不惜一切代价达到我们想要的目标。"
 MAN_yangjingyu:0 "与杨靖宇密谈"
 MAN_yangjingyu_desc:0 "杨靖宇领导的抗日联军第一军在吉林东南部和辽东等广大地区，给日寇以有力的打击，我们应与他进行密谈，并邀请他来领导我们未来大规模武装起义反抗日本侵略者的行动。"
 MAN_zhangxueliang:0 "整编东北军残部"
 MAN_zhangxueliang_desc:0 "我们的计划非常成功，现在我们可以与张学良密谈并以他的名义整编东北军的残余力量了。"
 MAN_zhaoyiman:0 "营救赵一曼"
 MAN_zhaoyiman_desc:0 "1935年11月，在与日军作战中，赵一曼为掩护部队腿部负伤后在昏迷中被俘。现在我们应与抗联同志们一同营救她，作为我们与抗联一同反抗日本帝国主义的第一步。"
 MEN_State_religion:0 "奉神道教为国教"
 MEN_State_religion_desc:0 "由于日本在我们文化中占主导地位，我们自然会采用与他们相同的国教。"
 MEN_could_reject_tt:0 "§C内蒙古可能会拒绝我们的要求。§!"
 MEN_will_always_accept_tt:0 "§C内蒙古将永远接受我们的要求。§!"
 PRC_yangjingyu_desc:0 "杨靖宇（1905年2月13日-1940年2月23日），汉族，原名马尚德，字骥生，河南省确山县李湾村人，中国共产党优秀党员，无产阶级革命家、军事家、著名抗日民族英雄，鄂豫皖苏区及其红军的创始人之一，东北抗日联军的主要创建者和领导人之一。1926年，杨靖宇加入中国共产主义青年团。此时，全国各地农民运动正在蓬勃发展，受中共组织派遣，杨靖宇从开封回确山开展农民运动。1927年初，确山县农民协会会员发展到1万多人，杨靖宇被选为确山县农民协会委员长。当年4月，杨靖宇参与领导确山农民暴动，驱逐军阀武装，攻占确山县城。同年5月，杨靖宇加入中国共产党。中共中央“八七”会议后，杨靖宇参与发动刘店秋收起义，先后创建由共产党领导的中国最早的县级农工革命政权——确山县临时治安委员会和河南省第一个县级苏维埃政权——确山县革命委员会，并组建河南省第一支革命武装——确山县农民革命军（后编为豫南工农革命军）。从此，拉开了河南土地革命战争的序幕。他历任确山县农民革命军总指挥、确山县农民协会委员长和临时治安委员会代理主席、豫南特委委员兼信阳县委书记。1932年，受党中央委托到东北组织抗日联军，历任抗日联军总指挥政委等职。率领东北军民与日寇血战于白山黑水之间。1939年10月，日本关东军制定了针对杨靖宇率领的东北抗日联军第一路军的作战计划。在日军疯狂镇压下，杨靖宇带领抗联第一路军进行了艰苦卓绝的战斗。1940年2月23日，杨靖宇在冰天雪地、弹尽粮绝的情况下，孤身一人与大量日寇周旋，战斗几昼夜后，在濛江县（今吉林省靖宇县）壮烈牺牲。杨靖宇将军的一生是革命的一生，战斗的一生，辉煌的一生。他率领东北抗日联军在林海雪原的艰苦环境中与日寇血战，为全民抗战建立了具有战略意义的功绩。他以草根棉絮充饥，战斗到最后一刻的气概，更在亿万人民心中树起不朽的丰碑。"
