 PRC_Protection_of_intelligence:0 "战术穿插"
 PRC_Protection_of_intelligence_desc:0 "穿插战术是利用敌人部署的间隙或薄弱部位插入其纵深或后方的战斗行动，是进攻作战的一种重要手段。目的是夺占敌纵深内的要点，分割和打乱敌人部署，为各个歼敌创造有利条件。穿插具有任务艰巨，腹背受敌，边打边插，独立战斗等特点。要周密计划准备，详细查明敌人防御间隙、薄弱部位和纵深内的兵力部署、地形、道路等情况，制定多种战斗方案。"