l_simp_chinese:
 GAME_OVER_TT:0 "§R对你来说游戏已经结束了§!"
 JPG_only_show_up_in_war_time_tt:0 "§C这个决议只会在战时出现。§!"
 PRC_communism_party:0 "中国共产党"
 SHX_Artillery_department:0 "炮兵部门"
 SHX_Artillery_department_desc:0 "增加些野战炮生产产线，将使我方拥有更多的自产火力。"
 SHX_Assault_tactics:0 "改善战术"
 SHX_Assault_tactics_desc:0 "通过有效使用大部队并持续增加数量，我们将可阻止敌人的任何进攻。"
 SHX_Building_air_bases:0 "扩展空军基地"
 SHX_Building_air_bases_desc:0 "建设更多空军基地将有助于扩大我们的机队。"
 SHX_Capture_shaanxi:0 "防御陕北"
 SHX_Capture_shaanxi_desc:0 "共匪经常侵入山西进行破坏活动。 若不立即消灭他们将后患无穷。"
 SHX_Capture_suiyuan:0 "夺取绥远"
 SHX_Capture_suiyuan_desc:0 "现在是镇压绥远叛徒的时候了！"
 SHX_Communism_land_reform:0 "土地改革"
 SHX_Communism_land_reform_desc:0 "我们必须把山西的地主赶出去，让农民富裕起来。"
 SHX_Contact_nationalist_government:0 "请求中央军支持"
 SHX_Contact_nationalist_government_desc:0 "晋绥军只能勉强能对抗陕西的共产党人，看来必须向中央政府寻求支持。"
 SHX_Contact_the_communist:0 "联系共产党人"
 SHX_Contact_the_communist_desc:0 "虽然不信任这些共产主义民兵，但现在存在更强大的威胁。"
 SHX_Contact_with_comintern:0 "司法改革"
 SHX_Contact_with_comintern_desc:0 "若我们的政府想要有所作为，就必须确保所有法官都受到充分的教育，能够正确地应用我们的法律。"
 SHX_Cooperation_with_chiang:0 "保留与国民党的联系"
 SHX_Cooperation_with_chiang_desc:0 "我们现在要面对共产主义和日本的威胁，与同样反共、实力比我们强大的蒋介石交好，是一条可行的道路。"
 SHX_Declare_independence:0 "亲日宣传"
 SHX_Declare_independence_desc:0 "山西人民应该要知道，日本是我们的朋友，而不是侵略者。"
 SHX_Deep_battle:0 "游击战"
 SHX_Deep_battle_desc:0 "与先进国家正面对决可能会导致我军受到大打击，在我方科技与战法能追上前，以用游击战驱散敌人是可行的想法。"
 SHX_Develop_heavy_fighters:0 "研发重型战斗机"
 SHX_Develop_heavy_fighters_desc:0 "为了我国长程轰炸机的安全，得发展护航战斗机来提高生存率。"
 SHX_Develop_heavy_industry:0 "发展重工业"
 SHX_Develop_heavy_industry_desc:0 "要发展机械化部队，就必须有一定规模的重工业。"
 SHX_Develop_shanxi_economy:0 "发展山西经济"
 SHX_Develop_shanxi_economy_desc:0 "这几年山西的经济已成长了不少，但我们还将继续使其发展茁壮。"
 SHX_Development_of_a_new_generation_of_armaments:0 "引进国外武器设计"
 SHX_Development_of_a_new_generation_of_armaments_desc:0 "山西已经具备了生产与国内最高质量相媲美的武器装备，与自行研制新型武器装备的能力。"
 SHX_Elastic_defence:0 "灵活防御"
 SHX_Elastic_defence_desc:0 "建立一系列弹性防线，抵御敌方进攻，直到时机到来我们就能发动反击。"
 SHX_Enhance_air_superiority:0 "追求制空权"
 SHX_Enhance_air_superiority_desc:0 "具良好机动性的轻型战斗机可以对抗许多敌方目标，重型战斗机则可以用于对抗敌方轰炸机。"
 SHX_Establish_japanese_army:0 "日式军队"
 SHX_Establish_japanese_army_desc:0 "我们的军队充其量只是一支地方的乌合之众，我们可以在日本人的帮助下打造一支日式精锐部队。"
 SHX_Establish_japanese_army_tt:0 "将接收§Y3个训练有素的步兵师。§!\n"
 SHX_Expand_factory_scale:0 "成立西北机器局"
 SHX_Expand_factory_scale_desc:0 "山西的军工产业闻名全国，不仅能自给自足，还能为盟友供应物资。"
 SHX_Expand_the_taiyuan_arsenal:0 "扩大西北实业公司"
 SHX_Expand_the_taiyuan_arsenal_desc:0 "西北实业公司作为太原兵工厂的继承者，是我们的主要武器来源，有必要对其进行扩大，以应对即将到来的战争。"
 SHX_Experience_of_the_central_plains_war:0 "汲取中原大战的教训"
 SHX_Experience_of_the_central_plains_war_desc:0 "尽管我们在中原大战中战败了，但是若我们能够从失败中吸取教训，那么我们就可以努力改进我们的部队，并靠它们来维持或扩大我们的控制力。"
 SHX_Fighter_development_plan:0 "战斗机计划"
 SHX_Fighter_development_plan_desc:0 "不断提高战斗机的性能将使我们能够保持空中优势。"
 SHX_Focus_on_defense:0 "专注防御"
 SHX_Focus_on_defense_desc:0 "一些有效的防御措施能有力阻止敌人的进攻。"
 SHX_Focus_on_offense:0 "改善军事训练"
 SHX_Focus_on_offense_desc:0 "攻击就是最好的防御。"
 SHX_Form_the_northern_bureau:0 "建立晋绥边区"
 SHX_Form_the_northern_bureau_desc:0 "我们将承认延安方面为党的领导，并在山西设立北方局，与他们密切合作。"
 SHX_Formed_the_air_force:0 "重建山西空军"
 SHX_Formed_the_air_force_desc:0 "中原大战后，我们的空军被中央政府收编，无论是对抗中央政府还是日本，我们都处于压倒性的劣势，所以我们必须立即建立空军来对抗他们。"
 SHX_Government_reform:0 "改革我们的政府"
 SHX_Government_reform_desc:0 "我们的政府效率仍低下，需要进行改革才能获得公众的认可。"
 SHX_Improve_air_tactics:0 "改善空战战术"
 SHX_Improve_air_tactics_desc:0 "飞机不好好利用就没有意义，我们需要改良我们的战法。"
 SHX_Improve_production_efficiency:0 "扩大西北维修厂"
 SHX_Improve_production_efficiency_desc:0 "不断改进装备可以提高作战效率。"
 SHX_Industrial_reform:0 "工业改革"
 SHX_Industrial_reform_desc:0 "我们须改善工业与建筑技术，以增强建设能力。"
 SHX_Land_reform:0 "土地改革试点"
 SHX_Land_reform_desc:0 "中国地主对农民的压迫太重了，我们应该想办法改善农民的待遇。"
 SHX_Launch_coup:0 "山西革命"
 SHX_Launch_coup_desc:0 "我们在太原的同志将发动政变，把山西人民从暴虐的军阀手中解放出来！"
 SHX_Lead_independent_movement:0 "领导独立运动"
 SHX_Lead_independent_movement_desc:0 "我们按照日本人的“建议”介入，领导华北独立运动。"
 SHX_Long_live_shanxi:0 "加强绝对领导"
 SHX_Long_live_shanxi_desc:0 "我们要弘扬对阎锡山将军的个人崇拜。"
 SHX_Model_warlord:0 "山西模范督军"
 SHX_Model_warlord_desc:0 "作为“模范督军”，閰的爱好不是女人，不是威士忌，不是鸦片，甚至不是黄金； 但其所建立之良好的道路、蚕业、守卫乡土的士兵、维护秩序的警察、以及优质牛、马、犁、家禽、化肥的发展——所有这些都直接造福于他的乡民们。"
 SHX_Munitions_production_plan:0 "弹药生产"
 SHX_Munitions_production_plan_desc:0 "庞大的武器生产能力对我军有相当大的好处，也可以靠其进行贸易。"
 SHX_New_china:0 "晋系领导中国"
 SHX_New_china_desc:0 "新国民政府将由晋系领导。"
 SHX_Offensive_operations:0 "训练有素的军队"
 SHX_Offensive_operations_desc:0 "对于敌方入侵，可以发动大规模的反击有效地对抗敌人。"
 SHX_Practical_experience:0 "实弹演习"
 SHX_Practical_experience_desc:0 "我们的军工工业能够使负担得起实弹演习，这将使我们的军队能得到更好的训练。"
 SHX_Preparation_for_war:0 "扩大陆军"
 SHX_Preparation_for_war_desc:0 "鉴于周边势力所施加之压力陡增，我军应该随时做好战争准备。"
 SHX_Prepare_for_civilwar:0 "组织党内反对派"
 SHX_Prepare_for_civilwar_desc:0 "有必要扩大在政府中的影响力。 我们将能吸引更多的政治盟友，也许有一天我们将可藉此成为政府的领导人。"
 SHX_Prosperous_shanxi:0 "华北工业基地"
 SHX_Prosperous_shanxi_desc:0 "山西的经济实力将能跃上国际舞台，让国际社会看到山西不仅仅是一个小地方。"
 SHX_Purge_communists:0 "清洗共产党"
 SHX_Purge_communists_desc:0 "山西还有些藏匿着的共产党，我们必须找出并处理他们。"
 SHX_Recommend_electronic_technology:0 "进口电子技术"
 SHX_Recommend_electronic_technology_desc:0 "这些看似不耐用的物品对于智慧来说却相当重要。"
 SHX_Recommend_jap_fighter:0 "进口日本飞机"
 SHX_Recommend_jap_fighter_desc:0 "我们将从日本订购一些飞机。"
 SHX_Red_army_mode_of_operation:0 "允许组建山西新军"
 SHX_Red_army_mode_of_operation_desc:0 "山西青年抗敌敢死总队，又称山西新军，是共产党领导的一支部队，他们对于保卫山西免受日本侵略者的侵害上将非常有用，但他们将来也可以用于威胁我们在山西的统治。"
 SHX_Request_for_jap_support:0 "加强反共政策"
 SHX_Request_for_jap_support_desc:0 "山西将取缔共产主义。"
 SHX_Road_development:0 "修建道路"
 SHX_Road_development_desc:0 "山西的基础设施已有不错的发展，而我们还会继续完善它。"
 SHX_Second_theater:0 "守土抗战"
 SHX_Second_theater_desc:0 "我们将竭尽全力抗击日本侵略者。"
 SHX_Shanxi_army_group:0 "壮大山西新军"
 SHX_Shanxi_army_group_desc:0 "我们将强化山西的防御。"
 SHX_Shanxi_defense:0 "强化山西防务"
 SHX_Shanxi_defense_desc:0 "虽然我们没有时间建造庞大的防御设施，但我们还是可以建造基本的防线。"
 SHX_Shanxi_did_not_fall:0 "接受日本保护"
 SHX_Shanxi_did_not_fall_desc:0 "现在是深化我们与日本合作的时候了。"
 SHX_Shanxi_science:0 "扩大山西大学"
 SHX_Shanxi_science_desc:0 "我们应该投资教育，使山西成为比中国其他省份更先进的省份。"
 SHX_Stop_cooperation_with_comchina:0 "终止合作"
 SHX_Stop_cooperation_with_comchina_desc:0 "这些共产党人真是够了！我方将正式与他们决裂，彻底夺回对山西的控制权！"
 SHX_Strategic_bombing:0 "战略轰炸"
 SHX_Strategic_bombing_desc:0 "It is more effective to fight against the other side's production facilities than to compete with each other in terms of quantity."
 SHX_Strengthen_the_ground_support:0 "加强地面支持"
 SHX_Strengthen_the_ground_support_desc:0 "空军对地打击能力的价值不容忽视。"
 SHX_Struggle_party_central_committee:0 "新中央委员会"
 SHX_Struggle_party_central_committee_desc:0 "山西才是革命的中心，延安那帮人只会纸上谈兵。 我们应该请莫斯科来决定谁该领导革命。"
 SHX_Support_industries:0 "发展轻工业"
 SHX_Support_industries_desc:0 "大力支持山西民生产业，将有助于经济繁荣。"
 SHX_Support_north_china_buffer_state_strategy:0 "支持华北分离工作"
 SHX_Support_north_china_buffer_state_strategy_desc:0 "与日本合作，并让他们帮助建立一个由我方领导的中国政府很符合我们的战略利益。"
 SHX_Tactical_bombers:0 "战术轰炸"
 SHX_Tactical_bombers_desc:0 "这些大型飞机能够严重毁坏敌方设施和堡垒系统。"
 SHX_Ten_rules:0 "中国共产党十大方针"
 SHX_Ten_rules_desc:0 "一支纪律严明的军队会有很强的战斗力，我们可以参照共产党来制定自己的诫命。"
 SHX_Three_eggs:0 "三颗鸡蛋上之舞者"
 SHX_Three_eggs_desc:0 "共产党、蒋介石、日本侵略者这三方已包围了山西，尔等形势危急，只要稍有不慎就会彻底崩溃。"
 SHX_To_preserve_ones_strength:0 "保存我方实力"
 SHX_To_preserve_ones_strength_desc:0 "不能让我们的主力部队遭受毁灭性的打击。"
 SHX_Transport_network:0 "运输网"
 SHX_Transport_network_desc:0 "我们的运输能力仍须加强，交通网络的建设可以增强运输能力。"
 SHX_United_front:0 "统一战线"
 SHX_United_front_desc:0 "与共产党民兵建立更深入的伙伴关系，对我们来说是有好处的。"
 SHX_anti_communist_cooperation:0 "日本补给"
 SHX_anti_communist_cooperation_desc:0 "停火后，我们可以接收日军的补给。"
 SHX_anti_opposition_campaigns:0 "以武力夺取边境"
 SHX_anti_opposition_campaigns_desc:0 "敌军正在我方边境附近聚集，绝不能放任不见。发动一系列小规模的攻势就可以将其击退，也有机会开疆拓土。"
 SHX_board_of_shanxi_peoples_state_owned_enterprises:0 "山西省人民公营事业董事会"
 SHX_board_of_shanxi_peoples_state_owned_enterprises_desc:0 ""
 SHX_civil_war_in_shanxi:0 "扫荡行动"
 SHX_civil_war_in_shanxi_desc:0 "抗战间共党在进行游击战的同时，也在我们的领土上建立了“解放区”。为了维护山西的和平稳定，我们该在全国内战爆发之前消灭共产党的据点。"
 SHX_clash_with_the_central_government_focus:0 "对抗中央政府"
 SHX_clash_with_the_central_government_focus_desc:0 "我们现在还不能冒全面战争的风险，但我们仍然需要扩大我们的影响力，以挑战中央政府。 一场小规模、可控的冲突可以让我们获得宝贵的阵地，而不会被彻底击垮。 理想情况下，当我们的对手将兵力投入到其他地方时，我们将立即发起攻击。"
 SHX_fascism_leadership:0 "军事独裁"
 SHX_fascism_leadership_desc:0 "当获得足够的支持后，就是建立军政府的时候了。"
 SHX_industrialization_i:0 "工业化I"
 SHX_industrialization_i_desc:0 "工业化既可以造福于我们政府统治下的人民，也可以强化我们的军事实力。"
 SHX_industrialization_ii:0 "工业化II"
 SHX_industrialization_ii_desc:0 "工业化既可以造福于我们政府统治下的人民，也可以强化我们的军事实力。"
 SHX_industrialization_iii:0 "工业化III"
 SHX_industrialization_iii_desc:0 "工业化既可以造福于我们政府统治下的人民，也可以强化我们的军事实力。"
 SHX_institute_cross_border_raids:0 "策划跨境袭击"
 SHX_institute_cross_border_raids_desc:0 "除非我们向世界证明我们有能力和愿意为我们的土地而战，否则我们不会被视为中国领导地位竞争中的有力竞争者。一些小规模的冲突会表明我们的决心并可能让我们占领一些不设防的领土。"
 SHX_jap_support_economy:0 "晋日贸易协议"
 SHX_jap_support_economy_desc:0 "我们将开始与日本进行贸易，这能更好地发展我们的经济。"
 SHX_jap_support_tech:0 "科技合作协议"
 SHX_jap_support_tech_desc:0 "我们的科学研究将受益于与日本的合作。"
 SHX_jap_support_weapon:0 "进口日本装备"
 SHX_jap_support_weapon_desc:0 "显然我方设备质量不如日本的，所以最好还是从日本进口设备。"
 SHX_japanese_troops_in_shanxi:0 "山西内的日残军"
 SHX_japanese_troops_in_shanxi_desc:0 "尽管这是非法行为，但一些日本军队仍然愿意留在山西，他们将在即将到来的剿共战争中帮助我们。"
 SHX_join_central:0 "扩大在政府内之影响"
 SHX_join_central_desc:0 "加入中央后，我们应该要扩大在政府内部的影响力。"
 SHX_keep_fighting:0 "抵抗到底"
 SHX_keep_fighting_desc:0 "我们决不会与日本侵略者谈判。"
 SHX_king_of_north_china:0 "华北王"
 SHX_king_of_north_china_desc:0 "我们在与共军作战的同时，应该乘势而上，将影响力扩大到整个华北地区。"
 SHX_military_academy:0 "重建山西军官学校"
 SHX_military_academy_desc:0 "山西军官学校（1926-1930）为晋绥军培养了很多将领，在中原大战后停办，现在，如果我们想提高军队素质，第一步应该是重建它来培养我们的将领。"
 SHX_move_capital:0 "撤离太原"
 SHX_move_capital_desc:0 "太原有被敌进攻的危险，最好退到晋西南以进行长期战。"
 SHX_offensive_to_ccp:0 "进攻战略"
 SHX_offensive_to_ccp_desc:0 "我们将主动进攻共产党，以扩大我们的控制区。"
 SHX_pro_japanese_china:0 "与华北自治政权合并"
 SHX_pro_japanese_china_desc:0 "日本入侵华北后，我们可以和其傀儡合并成一个新政府。"
 SHX_proclaim_rival_government:0 "成立对立政府"
 SHX_proclaim_rival_government_desc:1 "是时候将我们的野心公诸于世了。我们要的是完全控制中国，而到时候我们就可以跟世界其他国家进行公平的谈判。"
 SHX_provincial_defense_army:0 "山西省防军"
 SHX_provincial_defense_army_desc:0 "日本战败后，以前的伪军就可为我用了，他们愿意帮助我们对抗我们共同的敌人——共产党人。"
 SHX_provoke_border_clashes:0 "向国民党挑起边境冲突"
 SHX_provoke_border_clashes_desc:0 "我们还不能冒险发动全面战争，但小规模且可控的冲突足以令我们在不至于孤注一掷的前提下有效地开疆拓土，我们将会在敌方军队调离时出其不意地发起进攻。"
 SHX_rent_and_interest_reduction_movement:0 "减租减息运动"
 SHX_rent_and_interest_reduction_movement_desc:0 "减租减息运动会让农民受益，我们会推动减租减息，提高农民的生活质量。"
 SHX_request_central_support:0 "中央武器补给"
 SHX_request_central_support_desc:0 "我们将从中央政府获得更多武器供给。"
 SHX_shanxi_defense_ccw:0 "防御战略"
 SHX_shanxi_defense_ccw_desc:0 "在内战中我们将采取防御立场，进行牵制以等待友军进攻。"
 SHX_shanxi_provincial_politics_ten_years_construction_plan:0 "省政十年建设计划"
