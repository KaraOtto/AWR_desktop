 const_pressure_will_be_reducing_party_pop_instead_tt:0 "§Y[Root.GetPressureorOpposition]§!将会§G降低执政党支持率§!，而不是政治点数。\n"
 constit_draft_focus:0 "宪法起草委员会"
 constit_draft_focus_desc:0 "我中华民国距离民主还有一段路要走，话虽如此，我们还是能向各党各派的政治家与知识分子乃至老百姓传达我们的愿景，让他们知道中国国民党不是一个独裁的政党，我们会先让党内志士依照孙总理的构想，来提出一个宪法的蓝图。可想而知，这部宪法草案不能让所有人满意，但我们有很多时间来讨论宪法的具体内容，毕竟民主应该严肃且谨慎地处理。"
 create_2_divs_in_state_tt:0 "§G在人口超过 150 万的每个省设立 2 个民兵师。§!"
 dai_li2: "隐蔽战线"
 dai_li2_desc:0 "‌戴笠的军统是国民党的一条隐蔽战线，在战争中将会发挥巨大作用。"
 dai_li3: "捍卫党国"
 dai_li3_desc:0 "‌戴笠将会消灭一切危害党国安全的敌人。"
 dai_li_HX: "戴笠"
 dai_li_HX_desc:0 "‌‌戴笠因得到蒋委员长的信任，长期从事特工与间谍工作。"
 debuff_tt:0 "§C以下debuff将在该国策期间激活：§!\n"
