 cacnl_tt:0 "§Y中华民族解放行动委员会§!成为执政党。\n将不会举行公开选举。"
 cdl_founded_tt:0 "中国民主同盟还没创立。\n"
 cdl_tt:0 "§Y中国民主同盟§! 成为执政党。\n将不会举行公开选举。"
 centralizing_power:0 "临时全国代表大会"
 centralizing_power_desc:0 "我们必须避免失去权力，并强迫人民效忠于我们，因为我们是中国唯一真正的政府。为了实现这一目标，我们必须召开一次特别的全国代表大会，以应对中国目前面临的危机。"
 chen_guofu2: "委员长至上"
 chen_guofu2_desc:0 "‌‌陈果夫对蒋委员长无比忠诚，对他的一切命令都解决执行。"
 chen_guofu3: "忠于领袖"
 chen_guofu3_desc:0 "‌‌陈果夫提出在国民党内必须忠于领袖。"
 chen_guofu_HX: "陈果夫"
 chen_guofu_HX_desc:0 "‌‌陈果夫为蒋委员长所倚重，负责国民党内组织及党务，有“二陈”、“CC系”之称。"
