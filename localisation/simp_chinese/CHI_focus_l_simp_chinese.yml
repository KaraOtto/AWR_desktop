 chi_war_of_resistance_tt:0 "§R最糟糕的情况已经来临，我们的国家正在受到攻击。中国人民一致同意团结在中央政府的旗帜下，以击退外国侵略者，国家的生死存亡将取决于抗战的结果。§!"
 chiang_ching_kuo: "蒋经国"
 chiang_ching_kuo_desc:0 "‌蒋委员长之子蒋经国从苏联留学归来，似乎其父有意培养他，使他逐渐进入权力中心。"
 chiang_ruling_idea:0 "\n§Y国民党§!成为执政党。\n将不会举行公开选举。\n"
 chinese_republic:0 "亚洲社会主义的高塔"
 chinese_republic_desc:0 "只要中国还在的一天，世界上那些任凭资本主义剥削百姓的国家将会寝食难安，他们会开始修学校、盖医院、铺设马路、挖通下水道、接通饮用水、提高基本工资、保障劳工权益、照顾穷苦人民、停止殖民压迫，而他们做这些，不是因为他们良心发现或者是大澈大悟，而是因为我们在这，我们的中国在这，我们伟大的社会主义中国在这！在这世界的东方！"
 ching_kuo_start_mayhem_in_shanghai_tt:0 "§O蒋经国将监督财政和经济改革的实施，抑制上海日益严重的通货膨胀。§!"
