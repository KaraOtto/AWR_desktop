 RCM_pressure_rebrand_support_tt:0 "§Y宪政压力§!将被重新包装成§Y反对派支持度§!.\n"
 SOV_qiyong_cuikefu:0 "§Y瓦西里·崔可夫担任军事顾问。§!"
 THIS_IS_HISTORICAL_TT:0 "§O这是历史上的选择。§!"
 THIS_IS_HISTORICAL_but_other_more_fun_TT:0 "§O这是国民政府输掉内战之后在历史上做的选择，但是其他路线在国民党胜利的情况下也是现实的。§!"
 THIS_IS_NOT_HISTORICAL_BUT_WILL_BE_UNLOCKED_TT:0 "§O这不是历史上的选择，但在史实模式下会透过事件解锁。§!"
 a_new_constitution:0 "东方的民主长城"
 a_new_constitution_desc:0 "综观东方诸国的历史，民主自由的辉煌也不过昙花一现，日本曾经引以为傲的「大正民主」到最后也已荡然无存，取而代之的是那狂热的军国主义与追求领土扩张的帝国主义，西方的纳粹德国也提醒着我们熄灭自由民主的火光是多么容易。我们会将自身视为东方民主的最后一道防线， 我们的军队将会成为一座新的长城，保卫那得来不易的自由与民主。"
 acceptance_will_depend_on_stuff_tt:0 "§L他们是否会接受我们的要求将取决于我们与他们的外交关系（观点）和我们目前的外交情况。§!"
 ack_hiro_sen_focus:0 "承认“广田三原则“"
 ack_hiro_sen_focus_desc:0 "由于共产主义的威胁，只有接受日本政治家广田弘毅为使我们让步而提出的“广田三原则”，我们才能开始关注我们的内部问题。"
 already_learned_air_design:0 "已获得正规的飞机设计。\n"
 already_learned_armor_design:0 "已获得正规的装甲设计。\n"
 already_learned_naval_design:0 "已获得正规的舰艇设计。\n"
 armor_bonus:0 "装甲加成"
 available_foreign_advisor:0 "启用§Y外国顾问§!：\n"
 ban_communism:0 "禁止共产主义"
 ban_communism_desc:0 "共产主义是腐败的苏联和其他左翼分子共同宣扬的一种邪恶的意识形态。只有铲除它们，我们才能确保国家安全。"
 befriend_the_west:0 "西方吹来自由的风"
 befriend_the_west_desc:0 "我们对自由与民主的追求不但让中国的人权意识与社会文化蓬勃发展，更让我们在世界赢得了好名声，越来越多英国的政治家、军人、国民注意到我们那史无前例的伟业。前几天英国派来了密使，说只要我们让中国士兵前往欧洲与非洲代替英国人作战，英国将会撤销所有对华不平等条约并归还领土，同时他们会提供我们一切必要的支持来对抗日本侵略者。"
 blank_line:0 " "
