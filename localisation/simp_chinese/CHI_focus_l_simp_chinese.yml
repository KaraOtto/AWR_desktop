 enc_cam_focus_tt:0 "§R当不再同共产党交战时，这种民族精神就会去除。§!"
 espionage_network:0 "间谍网"
 espionage_network_desc:0 "我们必须开始监视我们的人民，使我们政府能继续执政，我们还必须监视计划把我们赶下台的外国政府。"
 failed_to_do_this_focus_in_time_can_lead_to_a_complete_defection_of_inner_mongolia_tt:0 "§R未能及时完成该国策，可能导致内蒙古彻底叛变。§!\n"
 foreign_aid_can_be_sent_once_we_are_at_war_with_japan:0 "§C一旦我们与日本开战，就可以向我们提供外国援助。§!"
 found_cbis:0 "成立中统局"
 found_cbis_desc:0 "党需要一个秘密情报机构来阻止针对国民党的颠复活动。通过重组中央俱乐部的影响力，创立一个官方组织，可以显着扩大国民党的势力范围。"
 found_mbis:0 "成立军统局"
 found_mbis_desc:0 "随着外国势力的威胁日益迫近，重组[Root.GetBSorTPPYC]的影响力和和原秘密机构，组建一个新的特工部，将是间谍战的理想选择。"
 gain_base_supp_cond_p10_tt:0 "增加供给与生产状况基础值: §G+10%§!"
 georgist_tax_reform:0 "推行平均地权"
 georgist_tax_reform_desc:0 "孙总理的平均地权的程序有四：规定地价、照价收税、照价收买和涨价归公。与粗暴的苏维埃式土地改革不同，孙总理主张政府应当在地主与农民之间担任协调者的角色，在不否定私人所有权的情况下对地主课税，再由这些税收制定回馈农民与劳工的福利政策，由此，才能做到孙总理所提倡的「地尽其利」与「地利共享」。"
 goes_away_when_at_peace_with_JAP_tt:0 "§R当不再与@JAP日本交战时，这个民族精神就会去除。§!"
 government_bailout_tt:0 "\n§Y政府救助§!可以以一定的代价缓解§Y经济不稳定§!。\n"
 he_yingqin: "何应钦"
 he_yingqin_desc:0 "何应钦在蒋委员长的领导下，从一名留日学生逐步成长为国军总司令，并在国民党内部具有极高的地位和影响力‌。"
 health_care_program:0 "生产分配社会化"
 health_care_program_desc:0 "为什么孙总理要提出民生主义？因为社会实在过于不平等，而国家应当去尽可能地减轻这种不平等。孙总理认为，应该把全国的大矿业、大工业、大商业、大交通都由国家经营。国家透过这些大实业发了财后，就能实行包括但不限于健保、教育、居住、老弱妇孺福利、职业权利、低收入救助等等的政策来实现普遍的社会福利制度，将利益分配给国民。"
