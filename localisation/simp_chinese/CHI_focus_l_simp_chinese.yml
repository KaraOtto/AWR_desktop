 jiang_jingguo2: "减租减息"
 jiang_jingguo2_desc:0 "‌蒋经国提出要实行减租减息以减轻农民的负担，当然党内很多反对这一激进的改革。"
 jiang_jingguo3: "实行新政"
 jiang_jingguo3_desc:0 "‌蒋经国主政赣南，他在此地大刀阔斧查禁烟赌娼，修明吏治，发展经济，兴办教育。"
 join_allies_sol:0 "不自由，毋宁死！"
 join_allies_sol_desc:0 "我们与英国过密的合作关系激发了日本对民主主义的敌意，根据英国秘密情报局的朋友指出，对英国开战的言论正在日本国内发酵，到时候中国战场的战线将会延伸到东南亚，可我们并不畏惧，只因这次我们将与盟友一起抵抗野蛮的侵略者，我们会一同高举自由的火炬，举全国之力高喊「不自由，毋宁死！」，中国将为自由而战！"
 kmt_all:0 "国民党将会成为中国唯一的政党。"
 kmt_guoguangjihua_mission:0 "国光行动"
 kong_xiang_xi: "孔祥熙"
 kong_xiang_xi_desc: "‌孔祥熙，国民政府行政院长兼财政部长，孔子的第七十五世孙，蒋委员长的姐夫‌，并深受其信任。"
 kung_hsiang_hsi2: "经济改革"
 kung_hsiang_hsi2_desc:0 "我们的经济体制已经落后于时代，现在是进行经济改革的时候了。"
 kung_hsiang_hsi3: "促进市场"
 kung_hsiang_hsi3_desc: "促进市场这种经济上的事交给孔祥熙去办，蒋委员长需要把精力放在军事上面。"
 land_reform:0 "土地改革"
 land_reform_desc:0 "修改土地徵用和所有权的法律，可以极大地安抚农民，保证他们对我们的忠诚。"
 military_indoctrination:0 "灌输军事思想"
 military_indoctrination_desc:0 "为了增强我国人民为我们而战的意愿，我们必须把“正确”的思想灌输给他们。"
 no_bupingdengtiaoyue_tt:0 "移除§Y一切不平等条约§!"
 no_longer_affected_by_pressure_tt:0 "\n不再受§Y[Root.GetPressureorOpposition]上升§!任务的影响。\n"
 no_party:0 "-"
 no_war_when_talk:0 "\n§C当有此种民族精神，日本将无法完成任何可能导致与中国开战的国策。§!\n\n"
 null_the_promise_of_election_tt:0 "§C撤消对选举的承诺。§!"
 one_party_tutelage:0 "继续训政"
 one_party_tutelage_desc:0 "按照孙中山的原话，重建国家有三个阶段：第一阶段是军政，在北伐战争后结束；第二阶段是训政，只有在中国政治稳定之后才会结束；然后是最后一个阶段：宪政。中国目前的政治形势还远未稳定下来，应该继续实行训政。"
 political_indoctrination:0 "政治教化"
 political_indoctrination_desc:0 "在这样的动荡时期，情报能力，尤其是反情报能力，变得尤为重要。 为实现这一目标，在党内建立情报网路以及在党的各个机构内建立坚实的电信和调查部门基础将是一个理想的解决方案。"
 promise_remove_bs_cc:0 "\n\n我国政府将向日本政府承诺解散§C蓝衣社§!和§C中央俱乐部§!。§R抗拒或者推迟去做可能会有严重的后果。§!"
 qixiang_doctrine:0 "左翼三民主义"
 qixiang_doctrine_desc:0 "在研究社会主义思想的过程中，我们与国民党左派的关系也逐渐修复了起来，他们教导了我们许多社会主义的可取之处，并时常拿孙中山先生的三民主义来举例，不知不觉之中，一种经过社会主义式诠释的三民主义―即左翼三民主义已经在国民党内成为了主流。我们会让黄琪翔同志与国民党左派主导政府，中国从此将踏上一条非凡的道路！"
 rethink_socialist_values:0 "正视社会主义思想"
 rethink_socialist_values_desc:0 "什么是社会主义？每个人都有自己理解的社会主义，孙中山先生也说过自己的民生主义就是社会主义，那我们怎么可以因为反对其中一种社会主义，而去反对所有的社会主义呢？当先进国家都有各自的社会主义理论时，我们就不能再逃避并且污名化社会主义了，我们要开始正视社会主义的思想，并从中摸索出一道能拯救中国的道路。"
 separate_line_tt:0 "--------------\n"
 shorten_duration_tt:0 "§Y国家基础设施项目§!决议的§C持续时间§!和§C冷却时间§!将被§G缩短§!。"
 small_china_tt:0 "在所有的§Y中国核心省分§!当中"
 squash_kmt:0 "消弥训政遗毒"
 squash_kmt_desc:0 "虽然蒋介石他们承诺总有一天会给中国民主，但我们怎么知道那个「总有一天」到底什么时候会到来？如果他们总是说「中国还没准备好」之类的借口，那岂不是我们永远要活在蒋介石国民党的「训政」体制之下？我们要把当前政府中的专制性给消除，同时帮助国民党转型成为一个民主的政党，让其与其他党派平起平坐并良性竞争。"
 strengthen_bs:0 "强化[Root.GetBSorTPPYCshort]"
 strengthen_bs_desc:0 "由于[Root.GetBSorTPPYC]拥护民族主义和中国传统，同时也支持蒋介石的权威，它应该在很大程度被赋予权力和影响力来协助治理这个国家。"
 strengthen_cc:0 "加强中央俱乐部"
 strengthen_cc_desc:0 "中央俱乐部支持国民党的统治和训政。赋予他们管理国家的权力和影响力，反过来也将有利于我们的权威。"
 strengthen_the_kmt:0 "强化国民党"
 strengthen_the_kmt_desc:0 "二陈兄弟领导下的中央执行委员会调查统计局(中统)运转顺畅，与此同时中央党务却变得不堪重负。 通过合并国民党中央执行委员会的一些部门，特别是交通部门和统计部门，扩大中统将是解决这个问题的一个很好的办法。"
 this_will_have_zainan_consequences_tt:0 "§R这将使国家丧失大量主权。§!"
 this_will_unlock_national_focus_subbranch_of_BSS_tt:0 "§O这将解锁“蓝衣社统治中国”国策支线§!"
 this_will_unlock_national_focus_subbranch_of_roc_in_taiwan_tt:0 "§O这将解锁“中华民国在台湾”国策支线§!"
 transfer_to_sst_tt:0 "转交@SST§Y[SST.GetName]§!"
 united_and_ready:0 "团结一致并做好准备"
 united_and_ready_desc:0 "团结则存，分裂则亡。中国人民已经成功实现了统一。现在我们终于可以一起保卫我们的家园了。"
 unlock_focus_right:0 "§C工业将会平衡到足以应付§! §R同一行右边§!的§Y全部国策§!。\n\n"
 wang_coup:0 "汪精卫发动政变"
 wang_coup_desc:0 "随着国民党内部合作主义的兴起，一位隐秘的合作主义者汪精卫发现了夺取政权的机会。现在是采取行动的时候了。"
 wang_ruling_idea:0 "\n§Y国民党§!成为执政党。\n将不会举行公开选举。\n"
 when_war_is_declared_tt:0 "§R宣战时：\n§!"
 xyz_plan_tt:0 "§YX-Y-Z计划§!将§Y实行§!，我军将能§Y部分配备美国装备，并将接受美式训练。§!"
 yichu_ccxiyingxiang_tt:0 "§R移除二陈系影响§!"
 yichunitian_tt:0 "移除§Y发行金圆券§!\n移除§Y地主还乡团§!"
 zhang_lan_doctrine:0 "民主自由联盟"
 zhang_lan_doctrine_desc:0 "张澜先生一向追求民主，在他担任成都大学校长的期间，他允许各种政治思想的碰撞，强调学术自由的他也认为只有民主才能将中国团结起来。如今时候已到，我们应该让张先生来组建一个容纳各党各派的大联盟，并请他担任主席，如此一来，我们就能期望中国不会再分裂了，而加入这个联盟的条件也十分简单：支持民主、追求自由、相互容忍。"
 zhang_will_defect_if_the_communist_reach_xian:0 "§R若共产党攻进西安，@NEA[NEA.GetName]将会叛变，且一场大型叛乱可能会爆发。§!"
