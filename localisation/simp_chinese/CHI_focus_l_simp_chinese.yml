l_simp_chinese:
 CHI_375_executive_headquarters:0 "严查匪谍"
 CHI_375_executive_headquarters_desc:0 "我们内部一定还有共匪安插的间谍，这将会导致党国的事业彻底失败。现在必须进行严查，不能放过任何一个可疑分子。同时我们将成立执行部，以准备反击攻计划。"
 CHI_Befriend_Tibet:0 "交好西藏"
 CHI_Befriend_Tibet_desc:0 "虽然西藏是个叛乱省份，但通过外交手段，我们可能直接恢复宗主权。"
 CHI_CCW_a_quick_and_swift_war:0 "东方闪电战"
 CHI_CCW_a_quick_and_swift_war_desc:0 "共匪如同野火，风一吹就会死灰复燃，我们必须如快刀斩乱麻消灭他们，闪电战的打法非常适合“丛林之狐”孙立人将军。"
 CHI_CCW_anti_communist_crusade:0 "掀起反共高潮"
 CHI_CCW_anti_communist_crusade_desc:0 "共匪比我们想象的还要顽强，现在我们将掀起全国的反共高潮，与他们决一死战。"
 CHI_CCW_arm_the_insurgents:0 "武装起义者"
 CHI_CCW_arm_the_insurgents_desc:0 "勇士们起义的时刻到了，让我们发起圣战吧！"
 CHI_CCW_blitz_yenan:0 "攻克延安"
 CHI_CCW_blitz_yenan_desc:0 "延安是共匪的老巢，全国传播赤化的中心，我们想要彻底消灭共匪就必须拿下这里。"
 CHI_CCW_call_up_domestic_militias:0 "动员地主民兵"
 CHI_CCW_call_up_domestic_militias_desc:0 "共匪没收乡绅土地的残暴行为，让他们不得不背井离乡。戡乱一开始我们就建立了地主武装，现在我们将给予他们最大支持，动员所有对共匪怀有仇恨的乡绅组建还乡团，这将是一支中坚力量。"
 CHI_CCW_ching_kuos_shanghai_adventure:0 "经国的上海冒险"
 CHI_CCW_ching_kuos_shanghai_adventure_desc:0 "蒋经国在上海执行财政经济紧急措施时，进行打击巨商、富户、大官僚的活动以抢救我们岌岌可危的经济。"
 CHI_CCW_continue_the_ko_hsin_movement:0 "继续新生活运动"
 CHI_CCW_continue_the_ko_hsin_movement_desc:0 "新生活宣扬礼义廉耻是中华民族的灵魂，新生活运动将永远的进行下去。"
 CHI_CCW_destroy_industrial_sites:0 "摧毁工业"
 CHI_CCW_destroy_industrial_sites_desc:0 "任何工厂和工业设施都不能留给共匪，政府将炸毁大陆上的一切工厂，破坏一切工业设施。"
 CHI_CCW_directing_our_operations:0 "指导战略部署"
 CHI_CCW_directing_our_operations_desc:0 "接下戡乱的那一步都需要得到委员长的亲自指挥，亲自部署！"
 CHI_CCW_end_the_ko_hsin_movement:0 "结束新生活运动"
 CHI_CCW_end_the_ko_hsin_movement_desc:0 "戡乱行动的失利使我们不得不结束进行多年的新生活运动。"
 CHI_CCW_fighting_retreat:0 "战略转进"
 CHI_CCW_fighting_retreat_desc:0 "我们这绝不是逃跑，而是战略转进，只要政府体系还在，总有一天我们还能回来！"
 CHI_CCW_further_monetary_transfer:0 "进一步的货币转移"
 CHI_CCW_further_monetary_transfer_desc:0 "大量的黄金已经基本转移到了台湾，现在我们还需要把部分国民的黄金储备一起带走..."
 CHI_CCW_hopeh_campaign:0 "希望攻势"
 CHI_CCW_hopeh_campaign_desc:0 "华北地区是中华民族的发源地之一，自古以来是中原王朝的政治中心，绝不能让匪在此盘踞。"
 CHI_CCW_left_stranded:0 "请求美国介入"
 CHI_CCW_left_stranded_desc:0 "党国的戡乱大计严重受阻，为了三民主义在大陆能存续下去，我们不得不牺牲巨大利益以换取大洋彼岸的美国介入戡乱战争！"
 CHI_CCW_mobilize_to_suppress_bandits:0 "动员起来剿匪"
 CHI_CCW_mobilize_to_suppress_bandits_desc:0 "我们必须把全体动员起来给予共匪最后的致命一击！"
 CHI_CCW_northwest_insurgency:0 "西北起义"
 CHI_CCW_northwest_insurgency_desc:0 "马家军的骑兵战斗力彪悍，我们将支持他们成为打击共匪的利刃。"
 CHI_CCW_plunder_the_cities:0 "战时征用"
 CHI_CCW_plunder_the_cities_desc:0 "党国的一切资产必须全部带走，绝不能留给共匪。"
 CHI_CCW_promote_ma_hushan:0 "宣传马虎山"
 CHI_CCW_promote_ma_hushan_desc:0 "马虎山是我们在西北的一位孤忠，为党国坚守西北多年，政府将宣传的英勇事迹，并交由他领导马家军。"
 CHI_CCW_seize_the_gold:0 "征用黄金"
 CHI_CCW_seize_the_gold_desc:0 "政府在大陆积攒多年的黄金储备必须一起带到台湾，作为我们未来反攻回来的启动资金..."
 CHI_CCW_shantung_campaign:0 "徐蚌会战"
 CHI_CCW_shantung_campaign_desc:0 "淮海地区人口众多，此地也受共匪影响极大，现在我们将以徐州、蚌埠这两座城市为中心，给予共匪沉重打击。"
 CHI_CCW_take_over_dongbei:0 "东北攻势"
 CHI_CCW_take_over_dongbei_desc:0 "东北有着日本人遗留下的大量工业设施，对东北的攻势刻不容缓。"
 CHI_CCW_temporary_provisions:0 "动员戡乱时期临时条款"
 CHI_CCW_temporary_provisions_desc:0 "《动员戡乱时期临时条款》是国大第一届大会第一次会议通过的具有“宪法”补充条文性质的法律文件，成为委员长在“戡乱时期”获得巨大权力的重要法律依据。"
 CHI_CCW_the_retreat_to_taipei:0 "走为上计"
 CHI_CCW_the_retreat_to_taipei_desc:0 "戡乱大势已去，为了保留有生力量，三十六计，走为上计。"
 CHI_Chungking_Negotiations_focus:0 "重庆谈判"
 CHI_Chungking_Negotiations_focus_desc:0 "国际上期望中国事务能够得到和平解决，而且政府也需要时间准备一些行动，我们将尝试和他们谈判达成和平协议。"
 CHI_Concession_or_cede:0 "索取列强租界"
 CHI_Concession_or_cede_desc:0 "腐败的前清领导人让外国列强根据领土不平等条约窃取中国的正义领土。作为现代中国的领导人，我们将纠正这一错误。"
 CHI_Demand_Outer_Mongolia:0 "索取外蒙古"
 CHI_Demand_Outer_Mongolia_desc:0 "《蒙苏议定书》是对中国领土完整的公然侵犯。在拒绝中国宗主权的情况下，我们宣布苏联和蒙古人违反了《恰克图条约》。因此，我们要求回到1911年以前的边界！"
 CHI_Encirclement_Campaign_focus:0 "围剿运动"
 CHI_Encirclement_Campaign_focus_desc:0 "共产主义乃中国最大的威胁。只有铲除它，中华民国才能抵御任何外来威胁。"
 CHI_Establish_Hsikang_province:0 "西康建省"
 CHI_Establish_Hsikang_province_desc:0 "这方面的工作已经开始，但是我们必须尽快在西康建立一个真正的省政府，以取代目前的川边特别行政区。这将改善该地区的行政管理，并使该地区实现现代化。"
 CHI_Faction_Research:0 "阵营研究"
 CHI_Faction_Research_desc:0 "我们从参与第一次世界大战中获得了巨大的政治资本。同样地，加入一个主要阵营可以为我们提供难以置信的技术援助和指导。"
 CHI_Faction_Research_jap:0 "技术共享"
 CHI_Faction_Research_jap_desc:0 "技术共享可以帮助我们长期推进技术进步。"
 CHI_Faction_Research_tt:0 "我们将加入§Y阵营研究§!。"
 CHI_Found_Faction:0 "创立阵营"
 CHI_Found_Faction_desc:0 "我们不能忽视世界事务，但我们不想在相互冲突的帝国主义者之间作出选择。我们将领导其他世界打击帝国主义。"
 CHI_Isolationism:0 "孤立主义"
 CHI_Isolationism_desc:0 "我们自身的问题已经够多了，我们不需要捲入进一步的冲突。我们将采取中立的政策。"
 CHI_JAP_Faction_Research_jap:0 "技术共享"
 CHI_JAP_Faction_Research_jap_desc:0 "技术共享可以帮助我们长期推进技术进步。"
 CHI_JAP_armoured_vehicle_experiment:0 "装甲车辆实验"
 CHI_JAP_armoured_vehicle_experiment_desc:0 "一战中坦克的出现改变了战争历史的进程。我们必须发展自己的坦克，以免在军事装备和战术上落后。"
 CHI_JAP_arms_confiscation:0 "没收武器"
 CHI_JAP_arms_confiscation_desc:0 "武器能允许携带者进行报复，或者主动打击他们的敌人。对于我们政权的反对派也是如此。"
 CHI_JAP_army_expansion:0 "扩大陆军"
 CHI_JAP_army_expansion_desc:0 "我军原来是一支警察部队，现在规模太小了。它需要一次大规模的扩张，才能满足国家防御的需要。"
 CHI_JAP_bicycle_battalions:0 "自行车机动营"
 CHI_JAP_bicycle_battalions_desc:0 "机动性极其关键。在笨重的运兵车不能穿越的地方，自行车可以很好地为我们士兵服务。"
 CHI_JAP_expand_propaganda_machines:0 "扩大宣传机器"
 CHI_JAP_expand_propaganda_machines_desc:0 "为了获得民众的支持，我们必须向他们灌输我们是一个为他们谋福利的好政府的形象。"
 CHI_JAP_hire_japanese_military_advisors:0 "聘请日本陆军顾问"
 CHI_JAP_hire_japanese_military_advisors_desc:0 "缺乏经验是我军的一个无可辩驳的缺点。我们必须通过聘请国外有经验的老兵作为顾问来解决这个问题。"
 CHI_JAP_improve_infrastructure:0 "改善基础设施"
 CHI_JAP_improve_infrastructure_desc:0 "拥有完善的基础设施有利于我们部队的迅速部署，并有助于缓解后勤压力。"
 CHI_JAP_industrial_investment:0 "工业投资"
 CHI_JAP_industrial_investment_desc:1 "虽然我们的资源可能有限，但我们仍应该将我们所拥有的资本用于改善经济。"
 CHI_JAP_labor_reform:0 "劳动改革"
 CHI_JAP_labor_reform_desc:1 "我们是时候将中国在超过数千年发展下来的工作方式和传统推向现代化了。"
 CHI_JAP_local_arms_production:0 "本地武器生产"
 CHI_JAP_local_arms_production_desc:1 "只要我们仍被视为战争中一个微不足道的小派别，我们就不能奢望依靠外部输送的武器。我们有必要建立我们自己的兵工厂来建造武器。"
 CHI_JAP_local_arms_workshops:0 "地方武器作坊"
 CHI_JAP_local_arms_workshops_desc:0 "有一个地方的武器作坊可以让我们知识分子研究一些轻型武器。这将有助于我们的研究，并有助于降低生产成本。"
 CHI_JAP_long_term_economic_planning:0 "长远经济规划"
 CHI_JAP_long_term_economic_planning_desc:1 "我们的官僚机构不像中央政府一样的庞大。这容许我们可以清除大部分妨碍经济发展的官僚习气并将我们的努力集中于获得最大的回报。"
 CHI_JAP_modernise_support_equipment:0 "现代化支援装备"
 CHI_JAP_modernise_support_equipment_desc:0 "只有勇士愿意向敌人发动进攻是不够的。工兵、通信兵和医务兵的重要性不容忽视。"
 CHI_JAP_personal_leadership:0 "绝对领导"
 CHI_JAP_personal_leadership_desc:1 "分散军队指挥权就有引发不甘居人之下的军官试图夺权的危险。我们必须确保士兵们将一直忠于政府。"
 CHI_JAP_public_education_reform:0 "公共教育改革"
 CHI_JAP_public_education_reform_desc:1 "一个现代化的国家的基础就是知识和科学。我们必须先改善和强化这一基础。"
 CHI_JAP_public_works:0 "公共工程"
 CHI_JAP_public_works_desc:1 "国民需要看见我们为了他们的努力。几个备受瞩目的项目将成为有效的宣传工具，并让他们了解到中国能拥有的未来——如果他们继续支持我们的话。"
 CHI_JAP_rapid_mobilization:0 "快速动员"
 CHI_JAP_rapid_mobilization_desc:1 "要成为中国领导地位的有力竞争者的话，我们必须扩大军队的规模。我们将会开发新的方法来精简培训并创建一支可以应对任何挑战的军队。"
 CHI_JAP_rural_militias:0 "农民兵"
 CHI_JAP_rural_militias_desc:1 "在广阔的领土内，军事支援经常需要大量的时间来抵达冲突前沿。通过培训本土民兵力量，我们将使得所有入侵者都难以在我们的国境内移动。"
 CHI_JAP_seek_japanese_support:0 "寻求日本支持"
 CHI_JAP_seek_japanese_support_desc:1 "中央政府和共产党都拥有强大的盟友。如果我们想维持统治，甚至夺得天下的话，我们就不得不寻找我们的保护者。"
 CHI_JAP_small_arms_development:0 "轻武器开发"
 CHI_JAP_small_arms_development_desc:0 "我们士兵装备的落后品质令人无法忍受。我军不能用陈旧的武器战胜不断前进的敌人。需要在轻武器发展方面取得重大突破。"
 CHI_JAP_take_what_we_can_take:0 "收缴武器"
 CHI_JAP_take_what_we_can_take_desc:0 "随著战争持续进行，我们的枪支开始短缺。我们不仅应该保持现有的装备，更该尽可能多地从敌人手中夺取武器。"
 CHI_JAP_the_benefit_of_collaboration:0 "合作主义的好处"
 CHI_JAP_the_benefit_of_collaboration_desc:0 "尽管绝大多数民众支持我们的统治，但仍有很多人不支持。强硬派被他们的民族主义情绪矇蔽了双眼，看不到在我们的宗主国统治下服务的美好未来。然而，中立的人只需要一点“推动力”。"
 CHI_JAP_war_taxes:0 "战争税"
 CHI_JAP_war_taxes_desc:1 "危急的情况需要特殊的措施。在战争持续进行中的同时，我们必须尽可能向全国所有人口征调经济资源。"
 CHI_Land_to_the_Tillers_focus: "耕者有其田"
 CHI_Land_to_the_Tillers_focus_desc:0 "再将土地交还给农民后，我们应该继续进行政策，以确保我们的农业经济能符合乔治主义之精神。"
 CHI_NW_mobile_barracks_focus:0 "西北行辕"
 CHI_NW_mobile_barracks_focus_desc:0 "为了平息在新疆的动荡，我们需要在河西走廊建立西北行辕作为指挥部。没有他，我们将无法在大西北地区巩固控制权。"
 CHI_National_Defense_Council_focus:0 "国防委员会"
 CHI_National_Defense_Council_focus_desc:0 "我们需要不惜一切代价来抵抗日本，稍后我们也可以把中国团结在我们的旗帜下。"
 CHI_OG_neutrality_party:0 "国民党(保守派)"
 CHI_PEO: "党国核心集团"
 CHI_PEO2:0 "亲爱精诚"
 CHI_PEO2_desc:0 "孙总理核定“亲爱精诚”为黄埔军校校训，这是团结国民内共同革命的写照。蒋委员长曾对黄埔军校学生训话中阐述：“亲爱”是要所有的革命同志能“相亲相爱”，本校的宗旨“精”是“精益求精”，“诚”是“诚心诚意”。"
 CHI_PEO_desc:0 "核心集团是一个国家的政治中心，负责领导和管理整个国家的运作。核心集团包括国家元首、政府、立法机构以及司法机构等核心部门。这些机构共同协作，行使国家的立法、行政和司法权力。"
 CHI_RG_neutrality_party:0 "国民党(改组派)"
 CHI_Second_United_Front_focus:0 "第二次统一战线"
 CHI_Second_United_Front_focus_desc:0 "我们不能单独阻止日本人，我们需要与共产党人一起合作。"
 CHI_Tibet_Ultimatum:0 "给西藏下最后通牒"
 CHI_Tibet_Ultimatum_desc:0 "西藏是个叛乱省份，而他们将“自愿”或以武力回到于我们的治理下。"
 CHI_Truce_of_the_Civil_War:0 "停止内战"
 CHI_Truce_of_the_Civil_War_desc:0 "日本变得越来越咄咄逼人。与盟友一道对抗敌人远比同时对抗两个敌人要好得多。"
 CHI_WOR_1938_operations:0 "南岳军事会议"
 CHI_WOR_1938_operations_desc:0 "我们将在湖南南岳召开军事会议，对抗战作出新的战略部署。"
 CHI_WOR_1938_operations_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIERS_ARMY_ATTACK_FACTOR$: §G+5.00%§! \n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+2.50%§! \n\n"
 CHI_WOR_1939_1940_offensive:0 "冬季攻势"
 CHI_WOR_1939_1940_offensive_desc:0 "经过研究敌军实力，我最高统帅部已制定好下一阶段大的规模反攻计划。经此计划，我军必能给予侵略者致命一击，彻底粉碎其侵略野心。"
 CHI_WOR_1939_1940_offensive_tt:0 "§H抗日战争的新阶段已经来临。随着日军在多个地区的攻势出乎意料的失败和日军的重组，现在是时候利用这一机会开始新的攻势以一劳永逸地将鬼子驱逐出中国的最佳时机！§!"
 CHI_WOR_a_bitter_defeat:0 "淞沪失守"
 CHI_WOR_a_bitter_defeat_desc:0 "自我军从上海撤退后，士气跌至谷底。诸多精锐部队毁于一旦，训练有素的德式精锐也已全军覆没。"
 CHI_WOR_a_great_victory:0 "淞沪大捷"
 CHI_WOR_a_great_victory_desc:0 "我军已成功歼灭进犯并企图占领上海的日军，此乃上海民众之大幸！同时，我军亦向驻留沪上的各路洋人彰显了自身的实力。"
 CHI_WOR_a_great_victory_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_ARMY_MORALE_FACTOR$: §G+5.00%§! \n\n"
 CHI_WOR_ambush_tactics:0 "伏击战术"
 CHI_WOR_ambush_tactics_desc:0 "用小股部队或游击力量设伏，静待敌军进入圈套，在他们最无防备之时发动突袭，攻其不备。"
 CHI_WOR_ambush_tactics_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_RECON_FACTOR_WHILE_ENTRENCHED$: §G+15.00%§! \n$MODIFIER_DIG_IN_SPEED_FACTOR$: §G+10.00%§! \n$MODIFIER_SUPPLY_CONSUMPTION_FACTOR$: §G-5.00%§! \n$MODIFIER_ATTRITION$: §G-5.00%§! \n\n"
 CHI_WOR_asess_shanghai_performance:0 "评估淞沪会战"
 CHI_WOR_asess_shanghai_performance_desc:0 "随着淞沪战役结束，我们必须对作战方案进行一番评估，厘清其中的正确与谬误。"
 CHI_WOR_asess_shanghai_performance_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_ARMY_ADVISOR_COST_FACTOR$: §G-5.00%§! \n\n"
 CHI_WOR_battle_of_changsha:0 "长沙会战"
 CHI_WOR_battle_of_changsha_desc:0 "目前，日军企图攻占长沙，面对日军的进攻，我军已经在长沙组织好城防。但是长沙是否能坚守住，仍是未知数。"
 CHI_WOR_battle_of_shanghai:0 "淞沪会战"
 CHI_WOR_battle_of_shanghai_desc:0 "上海是沿海最重要的地方，为确保首都安全，我们应集中兵力准备歼灭上海的三千日军海军陆战队，海军堵塞江阴阻止日军长江舰队前进。"
 CHI_WOR_battle_of_wuhan:0 "武汉会战"
 CHI_WOR_battle_of_wuhan_desc:0 "武昌作为我们的第二大城市。也是湖北的战略要地。敌军也注意到了这一点，其早已派遣部队企图战略武昌。为了确保我军在鄂的主动权，我们就必须不惜一切代价守住武昌"
 CHI_WOR_changsha_defeat:0 "长沙失守"
 CHI_WOR_changsha_defeat_desc:0 "由于长沙守军的仓惶而逃，致使这座千年古城落入日军之手。虽然这是一场惨痛的失败，但这并不影响我们整体的抗敌大计。我们要让侵略者明白，对于他们侵占的每一寸土地，我们都绝不会轻易放弃，他们必将为此付出血的代价。"
 CHI_WOR_changsha_great_victory:0 "长沙大捷"
 CHI_WOR_changsha_great_victory_desc:0 "日军已从长沙败退，我军已成功将这座城市从日寇手中夺回。作为一场伟大的胜利，这必将振奋我军将士的士气。"
 CHI_WOR_cut_off_enemy_supply:0 "切断敌军补给线"
 CHI_WOR_cut_off_enemy_supply_desc:0 "部队的作战需要补给来维持，若我们彻底切断他们的补给，那么结果不言而喻。"
 CHI_WOR_cut_off_enemy_supply_tt:0 "§O由中央政府或地方势力控制的地区将获得此修正：§!"
 CHI_WOR_defensive_fortifications:0 "防御工事"
 CHI_WOR_defensive_fortifications_desc:0 "伴随着日军的步步紧逼，我们的主要防线正遭受蚕食。现在必须立刻加固我们的防御工事，力求构建起敌军难以逾越的屏障，绝对不能让阵地轻易落入敌手。"
 CHI_WOR_encircle_the_enemy:0 "包围敌人"
 CHI_WOR_encircle_the_enemy_desc:0 "对敌军实施合围，能让我们从多个方向攻击他们，既便于彻底歼灭敌人，也能迫使对方投降。"
 CHI_WOR_encircle_the_enemy_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_LAND_NIGHT_ATTACK$: §G+5.00%§! \n$MODIFIER_ATTRITION$: §G-5.00%§! \n$MODIFIER_SUPPLY_CONSUMPTION_FACTOR$: §G-5.00%§! \n\n"
 CHI_WOR_fearmonger_chinese_retribution:0 "文化工作委员会"
 CHI_WOR_fearmonger_chinese_retribution_desc:0 "郭沫若将主持对日心理战，联合日本进步人士训练日俘、组建反战团体，开展前线喊话与战俘教育，统筹对日宣传，瓦解日军军心。"
 CHI_WOR_fearmonger_chinese_retribution_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_STABILITY_WAR_FACTOR$: §G+10.00%§! \n$MODIFIERS_ARMY_ATTACK_FACTOR$: §G+5.00%§! \n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+5.00%§! \n\n"
 CHI_WOR_god_of_war:0 "中国战神"
 CHI_WOR_god_of_war_desc:0 "薛岳，有着“战神”之称，也被美国人誉为“东方巴顿”。作为曾击败过贺龙、叶挺等著名的红军指挥官的人，是国民革命军中不可多得的杰出将领，更被委员长本人赞为“军官之楷模”。"
 CHI_WOR_japan_is_defeated:0 "日本帝国主义被打败了！"
 CHI_WOR_japan_is_defeated_desc:0 "经过多年的流血牺牲，日寇终于向我们投降。后世将永远铭记着我们战胜日本帝国主义的这一天。"
 CHI_WOR_magnetic_warfare:0 "诱敌深入"
 CHI_WOR_magnetic_warfare_desc:0 "我们可以通过诱敌深入，将敌军引入更利于我方歼灭的有利地带。"
 CHI_WOR_magnetic_warfare_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_MAX_PLANNING_FACTOR$: §G+10.00%§! \n\n"
 CHI_WOR_marytrdom:0 "万众一心"
 CHI_WOR_marytrdom_desc:0 "我们始终为自由而战，纵使需要玉石俱焚，我们也将血战到流尽最后一滴血，咽下最后一口气！"
 CHI_WOR_marytrdom_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIERS_ARMY_ATTACK_FACTOR$: §G+5.00%§! \n$MODIFIER_STABILITY_WAR_FACTOR$: §G+5.00%§! \n\n"
 CHI_WOR_mountain_warfare:0 "山地作战"
 CHI_WOR_mountain_warfare_desc:0 "山地作为防守要地，只要我军占据制高点，便可掌握战场主动权。\n（如果不占领高地，下场就会像安纳金一样惨！）"
 CHI_WOR_mountain_warfare_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_TERRAIN_PENALTY_REDUCTION$: §G+10.00%§! \n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+2.50%§! \n\n"
 CHI_WOR_night_raid:0 "夜袭"
 CHI_WOR_night_raid_desc:0 "在夜间突袭敌军阵地，能打敌军一个出其不意，还能给他们带来很大震慑。我们应广泛采用这类战术，在杀敌的同时，更能让战果积少成多。"
 CHI_WOR_night_raid_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_LAND_NIGHT_ATTACK$: §G+10.00%§! \n$MODIFIER_ORG_LOSS_WHEN_MOVING$: §G-5.00%§! \n\n"
 CHI_WOR_patriotism:0 "起来,不愿做奴隶的人们！"
 CHI_WOR_patriotism_desc:0 "我们必须警醒全国同胞：我们的浴血奋战，正是为了守护中华血脉不灭、家园不失。若不愿子孙后代永世为奴，受帝国主义凌辱，此刻便当挺身而出，以血肉构成我们新的长城！"
 CHI_WOR_patriotism_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIERS_ARMY_ATTACK_FACTOR$: §G+5.00%§! \n$MODIFIER_STABILITY_WAR_FACTOR$: §G+5.00%§! \n\n"
 CHI_WOR_prolonged_war:0 "中国不会亡！"
 CHI_WOR_prolonged_war_desc:0 "中国不会亡！中国将会战到最后一刻！"
 CHI_WOR_prolonged_war_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_MAX_DIG_IN$: §G+5.00%§! \n$MODIFIER_DIG_IN_SPEED_FACTOR$: §G+2.50%§! \n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+2.50%§! \n\n"
 CHI_WOR_psychological_warfare:0 "心理战"
 CHI_WOR_psychological_warfare_desc:0 "运用心理战术，我们可以瓦解敌军的士气与心理防线，使其在交战时变得不堪一击。"
 CHI_WOR_psychological_warfare_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_INTEL_FROM_COMBAT_FACTOR$: §G+10.00%§! \n$MODIFIER_ARMY_INTEL_TO_OTHERS$: §G-15.00%§! \n\n"
 CHI_WOR_scorched_earth:0 "焦土政策"
 CHI_WOR_scorched_earth_desc:0 "一旦失地，我们必须摧毁所有可能落入敌手的战略物资。"
 CHI_WOR_scorched_earth_tt:0 "§O只要我们继续与日本帝国主义和其走狗伪政权作战，敌人就会持续受到这个修正的影响。§!"
 CHI_WOR_solicit_international_goodwill:0 "争取国际声援"
 CHI_WOR_solicit_international_goodwill_desc:0 "虽然世界都承认日本是这场战争的侵略者，但我们必须强调进一步支持的必要性。"
 CHI_WOR_solicit_international_goodwill_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_STABILITY_WAR_FACTOR$: §G+5.00%§! \n\n"
 CHI_WOR_static_defense:0 "静态防御"
 CHI_WOR_static_defense_desc:0 "虽然有些人可能认为静态防御是‘老一套’，但我们可以利用这种战术来防守那些精锐部队都难以通行的险要之地。"
 CHI_WOR_static_defense_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_MAX_DIG_IN$: §G+10.00%§! \n$MODIFIER_ARMY_SPEED_FACTOR$: §R-5.00%§! \n\n"
 CHI_WOR_strategic_retreat:0 "战略撤退"
 CHI_WOR_strategic_retreat_desc:0 "我们可以主动放弃一些不重要的区域，集中兵力与资源，转而投入到具有战略价值的核心地带，形成稳固防线，为后续作战保存实力、争取掌握战场主动权。"
 CHI_WOR_strategic_retreat_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_ARMY_SPEED_FACTOR$: §G+10.00%§! \n$MODIFIER_ORG_LOSS_WHEN_MOVING$: §G-5.00%§! \n$MODIFIER_EXPERIENCE_LOSS_FACTOR$: §G-5.00%§! \n$MODIFIER_MAX_DIG_IN$: §R-5.00%§! \n\n"
 CHI_WOR_the_big_sword_march:0 "大刀进行曲"
 CHI_WOR_the_big_sword_march_desc:0 "在卢沟桥事变爆发后，第29路军面对有着压倒性优势的日军，不畏强敌，浴血奋战。这种英勇无畏的壮举，将永远被我们铭记。"
 CHI_WOR_the_big_sword_march_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIERS_ARMY_ATTACK_FACTOR$: §G+5.00%§! \n$MODIFIER_ORG_LOSS_AT_LOW_ORG_FACTOR$: §G+5.00%§! \n\n"
 CHI_WOR_the_war_of_resistance:0 "中华民族最危险的时候"
 CHI_WOR_the_war_of_resistance_desc:0 "我们正遭受攻击，我们必须动员全国人民和全部工业能力来抵御日本帝国主义的入侵。"
 CHI_WOR_war_of_attrition:0 "持久战"
 CHI_WOR_war_of_attrition_desc:0 "在抗击日寇的过程中，我们失去了许多的同胞。然而，日军在这场贪婪且代价高昂的入侵中，也同样损兵折将。当他们为难以补充兵员而苦苦挣扎时，我们却能通过一些“特殊手段”，迅速地补充我们的官兵。"
 CHI_WOR_war_of_attrition_tt:0 "修改 §Y$CHI_war_of_resistance_modifier$§! 由 \n$MODIFIER_ORG_LOSS_AT_LOW_ORG_FACTOR$: §G-10.00%§! \n$MODIFIER_DIG_IN_SPEED_FACTOR$: §G+2.50%§! \n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+2.50%§! \n$MODIFIER_EXPERIENCE_LOSS_FACTOR$: §G-5.00%§! \n\n"
 CHI_WOR_wuhan_defeat:0 "武汉失守"
 CHI_WOR_wuhan_defeat_desc:0 "我军虽在武昌失利，但这也让日军兵力大幅损耗。从长远来看，这争取了宝贵时间，使我军物资与部队得以向大后方转移，此乃战略上的胜利。"
 CHI_WOR_wuhan_great_victory:0 "武汉大捷"
 CHI_WOR_wuhan_great_victory_desc:0 "经此大规模会战，我军已将武昌附近的日军悉数肃清。此等大捷，必将极大提升我们的声望与地位。"
 CHI_a_possibly_ally:0 "重申中美合作"
 CHI_a_possibly_ally_desc:0 "尽管[USA.getleader]在中国内战期间的援助有限，但面对共产主义的全球蔓延的情势，美国仍然是一个强大的潜在军事伙伴。 如果共产主义入侵，我们应该重申我们的军事关系。"
 CHI_academy_ex_focus:0 "扩大中央研究院"
 CHI_academy_ex_focus_desc:0 "尽管进行了改革，我们实验室的规模仍然有限。扩大实验室可以提高我们的研究能力。"
 CHI_academy_mp_focus:0 "中央研究院：\n现代物理学"
 CHI_academy_mp_focus_desc:0 "新成立的中央研究院现代物理部可以帮助我们国家用核武器武装自己，这可以极大地增强我们国家的安全。"
 CHI_academy_rf_focus:0 "改革中央研究院"
 CHI_academy_rf_focus_desc:0 "与其他西方国家相比，我们的国家研究中心——中央研究院的效率仍然相当低。迫切需要进行大刀阔斧的改革。"
 CHI_air_bases_expansion_focus:0 "扩建空军基地"
 CHI_air_bases_expansion_focus_desc:0 "我们应该开始扩建我们的空军基地，同时投入更多的研究经费，以增强我们在面对外来威胁时的实力，以防入侵。"
 CHI_allies_help_diplo_focus:0 "新平等条约"
 CHI_allies_help_diplo_focus_desc:0 "在经历了近一个世纪的不平等条约之后，美国和大英帝国现在终于可以重新谈判我们的贸易协定了。一旦条约签署，我们最终可以发展成一个健康的经济体。"
 CHI_allies_help_focus:0 "滇缅路计划"
 CHI_allies_help_focus_desc:0 "寻求英国的支持，在云南和缅甸之间开辟一条公路，长远来看可能有助于我们抵御日本的侵略。"
 CHI_aluminium_effort_i_focus:0 "重视铝矿开采 I"
 CHI_aluminium_effort_i_focus_desc:0 "我们需要改进铝的开采和生产，以增强我们的空军力量，所以我们必须采取措施，抢在日本人之前保护我们的资源。"
 CHI_aluminium_effort_ii_focus:0 "重视铝矿开采 II"
 CHI_aluminium_effort_ii_focus_desc:0 "为了中国，我们必须流血流汗来进一步增加产量。我们的空军正在扩大，铝在战争中的使用也变得更加普遍和有效。"
 CHI_aluminium_effort_iii_focus:0 "重视铝矿开采 III"
 CHI_aluminium_effort_iii_focus_desc:0 "我们的空军正在蓬勃发展，我们开采的铝几乎达到了最好的水准。只要在生产和开采方面再进行一点改革，我们就能稳稳地踏上战场。"
 CHI_annex_sinkiang:0 "整合新疆"
 CHI_annex_sinkiang_desc:0 "在击败共产党后，我们现在可以在没有叛乱风险的情况下整合新疆了。"
 CHI_anshan_steelwork_focus:0 "鞍山钢铁厂"
 CHI_anshan_steelwork_focus_desc:0 "现在，我们已经收复了东北的工业腹地奉天，我们可以把曾经用来生产武器的工业複合体和设施投入正常使用。"
 CHI_army_reorganisation_focus:0 "重组陆军"
 CHI_army_reorganisation_focus_desc:0 "我们从过去的战争中吸取了很多教训和经验。我们现在必须应用这一知识，开始整顿工作，以改进我们的陆军。"
 CHI_assume_intra_party_leadership:0 "承担党内领导"
 CHI_assume_intra_party_leadership_desc:0 "在成功地发动政变夺取政权之后，我们将承担党内领导，对国民党进行整体的改组，一个新的属于中国人民的民国将由[Root.GetLeader]委员长来领导！"
 CHI_axis_help_diplo_focus:0 "加强中德合作"
 CHI_axis_help_diplo_focus_desc:0 "随着法西斯运动在日本的兴起，我们必须加强与德国的联繫，以免他们开始与我们敌人结盟。我们将派出孔祥熙代表我们国家与希特勒进行谈判。"
 CHI_axis_help_focus:0 "轴心国援助"
 CHI_axis_help_focus_desc:0 "继续开展中德合作，必将有助于我们打赢这场战争。"
 CHI_axis_help_party_focus:0 "蓝衣社发动政变"
 CHI_axis_help_party_focus_desc:0 "现在蓝衣社的声望比以往任何时候都大，蓝衣社应该发动政变，让我们的国家回到军政。 这很重要，因为明显的军阀割据和国内动荡仍在中国发生，这意味着中国还没有准备好接受训政。 蒋介石将被誉为中华民国的最高领袖，带领我们走向辉煌。"
 CHI_baomiju_tt:0 "§C军统改组为保密局§!"
 CHI_befriend_india:0 "交好印度"
 CHI_befriend_india_desc:0 "在我们最黑暗的时刻，英属印度在我们面对全面战争时鼎力相助，这使他们成为我们的天然盟友。"
 CHI_befriend_mongolia:0 "交好外蒙古"
 CHI_befriend_mongolia_desc:0 "外蒙古可以充当中国和苏联之间的缓冲区。与他们保持外交关系并给予他们支持将对双方大有裨益。"
 CHI_befriend_the_USSR_focus:0 "北方吹来十月的风"
 CHI_befriend_the_USSR_focus_desc:0 "我们对平等与博爱的追求不但让中国的劳工意识与经济生产蓬勃发展，更让我们在世界赢得了好名声，越来越多苏联的政治家、军人、国民注意到我们那史无前例的伟业。前几天苏联派来了密使，说只要我们让中国的劳工前往苏联帮他们再续中断的五年计划，苏联将会归还所有自清朝以来侵占的中国领土，同时他们会提供我们一切必要的支持来对抗日本侵略者。"
 CHI_carrier_construction_focus:0 "建造航母"
 CHI_carrier_construction_focus_desc:0 "为了维护我们的海军优势，必须建造航母。有了航母，我们的空中优势可以扩大，而我们的海军优势可以得到加强。"
 CHI_chen_cheng1: "陈诚"
 CHI_chen_cheng1_desc:0 "‌陈诚的土木系在中央军中号称不吃空缺和适度接受下属意见，我们应该支持他们的发展。"
 CHI_chen_cheng2: "改良火炮"
 CHI_chen_cheng2_desc:0 "‌陈诚是炮兵出身，对火炮十分了解，他将进行对旧式火炮的改进。"
 CHI_chen_cheng3: "建立德式新军"
 CHI_chen_cheng3_desc:0 "‌德国军队的训练方式值得我们学习，陈诚将推进德式新军的建立。"
 CHI_china_first_tank_focus:0 "重视装甲部队"
 CHI_china_first_tank_focus_desc:0 "尽管我们的工业实力衰弱，但我们还是生产了第一辆坦克，现在它将进入战场。随着时间的推移，坦克数量会越来越多，而轻装步兵将越来越少，这将使我们士兵从战争恐怖中拯救出来。"
 CHI_chinese_culture_focus:0 "再探中华文化"
 CHI_chinese_culture_focus_desc:0 "在五四运动之后，有十分多的知识分子说我们应该与传统划清界线，全盘接受来自西方的文化，我们孙总理则不以为然，他说接受新文化不代表要舍弃旧道德，我们要坚定地把自己文化中好的东西保存下来，勇敢地丢弃不好的东西。中国之道统，即尧舜禹汤、文武周公、孔孟之道，我们要重新拥抱并诠释中华文化，让此道能继续相继不绝。"
 CHI_chinese_expeditionary_force:0 "中国远征军"
 CHI_chinese_expeditionary_force_desc:0 "为了帮助我们在东南亚的西方盟友，我们将建立远征军并在异国他乡作战。"
 CHI_chinese_national_focus:0 "建构国族"
 CHI_chinese_national_focus_desc:0 "孙总理说，中国各民族中，汉人占了绝大多数，所以中国的国族不可避免地会以汉人为中心，这与美利坚的国族是以白人为中心一样。而重点是我们在建构国族的同时，也必须慎重考虑汉人与其他民族之间的关系，不能让汉人压倒、欺压、歧视其他民族。我们并不能说满洲国的成立与我们自革命时开始的极端排满情绪毫无关系，我们要重新拾起五族共和的精神。"
 CHI_chinese_special_force:0 "中国特种部队"
 CHI_chinese_special_force_desc:0 "为我军创立一支新的特种部队，可以帮助中国加强整体实力。"
 CHI_chinese_submarine_focus:0 "中国潜艇"
 CHI_chinese_submarine_focus_desc:0 "潜艇是一个国家海军的重要一部分，要建立一支称职的海军，还需要进行研究工作。"
 CHI_coast_focus:0 "重视海岸防御"
 CHI_coast_focus_desc:0 "鉴于日军的海上性质及其潜在威胁，让我们把空军集中在海岸上以有效地打击敌人的船隻。"
 CHI_communism_party_POW:0 "中华民族解放行动委员会"
 CHI_compulsory_education_chi:0 "义务教育"
 CHI_compulsory_education_chi_desc:0 "我们不能让持传统观念的父母阻碍他们的孩子在国家和技术进步，因此需要颁布法律，让孩子接受他们应得的教育。"
 CHI_conquer_focus:0 "统一中国"
 CHI_conquer_focus_desc:0 "现在是统一中国的时候了。只有成为一个统一的国家，才能对抗日本人。"
 CHI_constitution_focus:0 "制宪会议"
 CHI_constitution_focus_desc:0 "虽然政治协商会议的争吵与不愉快导致我们几度差点前功尽弃，但我们还是走过来了。我们成功完成了一部不失去三民主义精随且能有效运转的五权宪法。最后，我们要让这部宪法得到国民的授权以获得正当性与合法性，我们会在全中国各地展开选出制宪国民大会代表的直接选举，再让这些代表共同审议与表决宪法，就快了，民主之花就快在中国绽放了！"
 CHI_counterattack_the_mainland:0 "发动第三号作战计划"
 CHI_counterattack_the_mainland_desc:0 "我们已经准备好反攻！我们将夺回大陆并重建中国！"
 CHI_covert_research_facility:0 "秘密研究设施"
 CHI_covert_research_facility_desc:0 "为了加强我们的力量，严格控制我们的国家，同时也为了技术进步而努力，建立秘密的研究设施可以在这方面有所帮助。"
 CHI_cult_of_chiang_kai_shek:0 "崇拜蒋介石"
 CHI_cult_of_chiang_kai_shek_desc:0 "蒋介石是中华民族伟大的统帅，他将带领我们把中国建设成为世界强国！"
 CHI_daqing_oil_field:0 "大庆油田"
 CHI_daqing_oil_field_desc:0 "大庆的一些地质专家认为那里可能蕴藏着大量的石油。应努力开发利用这些资源。"
 CHI_deal_with_sichuan:0 "平定川军"
 CHI_deal_with_sichuan_desc:0 "川省乃抗战之重要后方，但四川军阀显然不愿将整个四川交给中央政府。 在我方准备着手将政府迁往四川时，这些军阀很可能会搞些手段，我们必须想办法平定他们。"
 CHI_declare_martial_law_focus:0 "宣布戒严令"
 CHI_declare_martial_law_focus_desc:0 "由于共产主义的威胁，我们国家的完整性岌岌可危。任何时候尽快开始全面宪政将导致不必要的不稳定。在这种极端时期，必须采取极端措施。"
 CHI_delaying_tactics_focus:0 "拖延战术"
 CHI_delaying_tactics_focus_desc:0 "我们将设法与日本人举行和谈，以争取到一些时间。"
 CHI_demand_overlordship_of_puppet_states:0 "要求控制日本的傀儡"
 CHI_demand_overlordship_of_puppet_states_desc:0 "既然日本和中国之间已经建立了信任，我们应该要求控制华北的缓冲国，这有助于巩固我们的统治。"
 CHI_dissolve_bs:0 "解散蓝衣社"
 CHI_dissolve_bs_desc:0 "我们已经答应日本要解散蓝衣社，现在我们必须兑现我们的承诺。"
 CHI_dissolve_cc:0 "解散中央俱乐部"
 CHI_dissolve_cc_desc:0 "我们已经答应日本要解散中央俱乐部（CC系），现在我们必须兑现我们的承诺。"
 CHI_end_political_tutelage_focus:0 "结束训政"
 CHI_end_political_tutelage_focus_desc:0 "既然我们已经确保了国家的完整性，我们共和国就不再需要训政了。宪政应该随着我们国家翻开新篇章而开启。"
 CHI_establishment_wartime_administration:0 "组建紧急战时行政机构"
 CHI_establishment_wartime_administration_desc:0 "该死的日本人向我们宣战了，为了保护新生的宪政民主共和国，我们必须采取一些非常措施。"
 CHI_expand_Kiangnan_shipyard:0 "扩建江南造船厂"
 CHI_expand_Kiangnan_shipyard_desc:0 "江南造船厂的很多机械和构成都是陈旧和受限制的。重组和扩建工作将为老旧的造船厂注入新的活力。"
 CHI_fight_for_right_focus: "鼓动学生运动"
 CHI_fight_for_right_focus_desc:0 "在中华民国，一股要求民主化的浪潮正在兴起。学生们，作为这场运动的先锋，纷纷走上街头，表达他们对更广泛民主参与和政治透明度的渴望。他们手持标语牌，高喊口号，要求政府进行改革，实现真正的民主制度。这些年轻的面孔代表着国家的未来，他们不满于现状，渴望变革。"
 CHI_flying_tiger_tt:0 "读取§Y飞虎队§!的战斗序列"
 CHI_focus_two_fronts_war:0 "两线作战"
 CHI_focus_two_fronts_war_desc:0 "我们中国人民是无所畏惧的。就算两线作战也不会让我们退缩！"
 CHI_foreign_help_focus:0 "寻求外国军事援助"
 CHI_foreign_help_focus_desc:0 "没有外国援助，我们就没有机会对抗日本人。"
 CHI_german_training_method:0 "德式训练法"
 CHI_german_training_method_desc:0 "德国军队看起来前途无量，我们应该跟随他们的脚步，在即将到来的冲突中变得同样强大。"
 CHI_government_bailout_focus:0 "政府救助"
 CHI_government_bailout_focus_desc:0 "[Root.GetName]的经济不稳定是一个系统性问题，如果我们卷入战争，它将受到更大的打击。我们将让专家们解决这些问题。"
 CHI_government_reorganization_focus:0 "政府重组"
 CHI_government_reorganization_focus_desc:0 "重组政府对我们有很大帮助。"
 CHI_guojun_tt:0 "§C国民革命军改编为中华民国国军§!"
 CHI_hainan_plantation:0 "海南种植园"
 CHI_hainan_plantation_desc:0 "橡胶是军事装备动员所必需的资源。由于海南有种植橡胶树所需的气候，我们政府应该帮助那里的农民帮助增加橡胶产量。"
 CHI_he_yingqin2: "国民革命军司令"
 CHI_he_yingqin2_desc:0 "‌我们将任命何应钦为国民革命军总司令，这将加强他在军队中的影响力。"
 CHI_he_yingqin3: "党国之军"
 CHI_he_yingqin3_desc:0 "‌一支坚决服从蒋委员长命令党国之军将在何应钦的领导下壮大起来。"
 CHI_import_allies_tech:0 "引入制造设备"
 CHI_import_allies_tech_desc:0 "从西方盟友引入制造设备和科技专家将增强我们的工业能力。"
 CHI_increase_equipment_production_focus:0 "优化装备生产"
 CHI_increase_equipment_production_focus_desc:0 "我们的轻武器生产手段需要优化。生产的某些零件是多余的，而另一些则缺乏。我们应该尽最大努力把成本降到最低，最大限度地提高产量。"
 CHI_infrastructure_effort_i:0 "公路建设五年计划"
 CHI_infrastructure_effort_i_desc:0 "我国很大一部分地区的基础设施仍然很差，不足以满足不断增长的人口和建设需求。我们将改善我们的基础设施来解决这个问题，同时为我们国家打下良好的基础。"
 CHI_infrastructure_effort_ii:0 "公路总管理处"
 CHI_infrastructure_effort_ii_desc:0 "我们应该设立公路总管理处，其工作重点为把公路建设搞好。"
 CHI_infrastructure_effort_iii:0 "改进公路工程"
 CHI_infrastructure_effort_iii_desc:0 "通过改进我们的公路工法，我们可以大大提高建设公路的效率。"
 CHI_institutional_reform_focus:0 "制度改革"
 CHI_institutional_reform_focus_desc:0 "国民党第五次全国代表大会后，大会将通过中央执行委员会组织纲要，中央委员会组织法，中央政治会议更名为中央政治委员会，中央政治委员会也将进行改组。"
 CHI_invite_the_CPC:0 "递去延安和迪化的橄榄枝"
 CHI_invite_the_CPC_desc:0 "我们在军事、政治、经济、文化、社会上团结全国的目标已经取得了重大进展，可如今延安与迪化仍然对我们有所戒备，因此我们将会派遣代表过去与他们展开会谈，让他们知道新政府对共产党不会赶尽杀绝，我们会尽最大努力让他们知道新生的中国里永远有他们的一份位置，如果顺利的话，我们甚至还能请共产党的军官教导我们游击战的精随。"
 CHI_invite_the_flying_tigers:0 "飞虎队"
 CHI_invite_the_seven_gentlemen:0 "平反“七君子”"
 CHI_invite_the_seven_gentlemen_desc:0 "政府改革的脚步不能停，平反那些被我们冤枉的知识分子的脚步也不能停。我们的第一步就是从牢狱中释放「七君子」，作为左翼自由派的他们曾在九一八之后抨击蒋介石的消极抗日政策，并在1936年组成「全国各界救国联合会」，但他们却被当时的政府给逮捕了。释放他们后，我们会诚挚地邀请他们一同建设一个新的中国。"
 CHI_issue_blood_chits_tt:0 "§C允许我们向其他与日本交战的盟军国家发送“血幅”，这将提供以下效果：§!"
 CHI_jap_neutrality_party:0 "日本驻华派遣军"
 CHI_join_allies:0 "加入同盟国"
 CHI_join_allies_desc:0 "拥有几个强大的盟友与我们并肩作战从来都不是坏事。"
 CHI_join_axis:0 "加入轴心国"
 CHI_join_axis_desc:0 "拥有几个强大的盟友与我们并肩作战从来都不是坏事。"
 CHI_land_focus:0 "重视陆上"
 CHI_land_focus_desc:0 "陆军是我们的骨干，我们应该巩固我们的力量，把空军集中在内陆地区的目标上，为我陆军提供支援。"
 CHI_learn_foreign_tank_design_focus:0 "研究外国坦克设计"
 CHI_learn_foreign_tank_design_focus_desc:0 "西方坦克已经在战场上证明了他们的实力和能力，所以现在是我们为战争准备追随他们的时候了。"
 CHI_legislative_reforms:0 "筹备五院"
 CHI_legislative_reforms_desc:0 "孙总理认为，西方的所谓立法、司法、行政的三权分立虽然行之有年，但仍不够完善，而解决办法就在中国的传统之中。首先设置以御史制为原型的监察院来避免国会的专制，再来为了消除盲从滥举及任用私人的流弊，要仿照科举制度来考试院，达到用人唯才的目的。为达成总理的追求，我们会开始筹备与逐渐完善五院，为日后起草五权宪法做准备。"
 CHI_lighthouse_of_democracy_focus:0 "民主灯塔"
 CHI_lighthouse_of_democracy_focus_desc:0 "中国帝制虽有几度盛世，但若皇帝无能则百姓受苦，除了隐忍就是造反，如此循环，永无安宁之日。中国人需要自己选出一位国家元首，且每四年选一次，以此来真正为百姓谋幸福。你能在这看到英美法的选举制度、立宪主义、契约精神、自由保障、社会福利、市场经济、还有苏维埃式的全国代表大会，你现在看到的，就是亚洲民主的灯塔，中华民国。"
 CHI_logistical_reform_focus:0 "后勤改革"
 CHI_logistical_reform_focus_desc:0 "如德国人那样，我们应该大幅提高军队的机动性，以便在敌人增援部队到位之前更快地入侵。增加机动性将是战争准备的一大重点。"
 CHI_minquanism_focus:0 "民权主义"
 CHI_minquanism_focus_desc:0 "孙总理说，政治是很浅显易懂的，因为政就是众人的事，治就是管理，管理众人的事，便是政治。有管理众人之事的力量，便是政权。今以人民管理政事，便叫做民权。我们现在要集合中外的精华，将外国的行政、立法、司法，与中国的考试和监察结合起来，造成一个五权分立的政府。国家有了这样的纯良政府，才可以做到民有、民治、民享的国家。"
 CHI_minshengism_focus:0 "民生主义"
 CHI_minshengism_focus_desc:0 "孙总理说，民生就是人民的生活，也就是社会的生存、国民的生计、群众的生命。而西方近百十年来最大的问题，就是民生问题，也就是社会问题，社会主义就是为了解决社会问题所诞生的主义。因此所谓民生主义其实就是社会主义，又名共产主义，即是大同主义。我们要建设民生主义，藉此让中国的百姓了解到，有比马克思与列宁更适合中国的社会主义。"
 CHI_minzuism_focus:0 "民族主义"
 CHI_minzuism_focus_desc:0 "外国人为何总说中国人是一片散沙？孙总理指出，因为中国只有家族主义和宗族主义，没有国族主义，而国族主义正是民族主义。就是因为一般人民只知道家族和宗族，不知有国族，所以我们现在要从传统出发，让每个人了解到何为国族！我们要建构一个叫做中华民国的大共同体，建构一个叫做中华民族的国族，把所有中国人重新拧成一股绳！"
 CHI_mission_to_the_soviet_union:0 "共产国际的支持"
 CHI_mission_to_the_soviet_union_desc:0 "我们必须向莫斯科派出一个值得信赖的共产主义小代表团，以进一步巩固社会主义思想，就像斯大林时期他们在社会和国家所有领域所做的那样。"
 CHI_modern_industrialization:0 "工业集中化"
 CHI_modern_industrialization_desc:0 "我们的工业已经过时到可笑的地步，几十年来都没有多少研究或发展，在这种情况下，为了我们的经济和国家，我们必须努力使我们工业现代化。"
 CHI_modern_university:0 "现代大学"
 CHI_modern_university_desc:0 "我们需要把西方思想引入我们的大学，采用新的生活方式和思维方式。中国的传统思想对我国来说已经过时了。"
 CHI_monetary_reform:0 "放弃银本位制"
 CHI_monetary_reform_desc:0 "由于1934年美国《白银收购法》的颁布，银本位制经济逐渐成为中国经济的负担。1935年底通过了一项币制改革，现在是实施改革的时候了。"
 CHI_mongolian_and_tibetan_affairs_commission:0 "蒙藏委员会"
 CHI_mongolian_and_tibetan_affairs_commission_desc:0 "蒙藏委员会将负责处理所有蒙藏相关事务，尤其是在外蒙古或西藏回归后。"
 CHI_mr_science_focus:0 "自由的长城、平等的高塔"
 CHI_mr_science_focus_desc:0 "我们做到了，中国集全国的力量将西方自古希腊的一切精华与我华夏五千年的传统进行了具有突破性、创造性、批判性的融合，我们的伟业为我们赢得了来自全世界的掌声，就连侵略我们的日本国内都开始意识到自己是如何地渺小与可笑，无论是作为自由的长城还是平等的高塔，中国都成为今后国际社会里绝对不容忽视的超级大国！中国万岁！"
 CHI_national_political_council_focus:0 "国民参政会"
 CHI_national_political_council_focus_desc:0 "日本的野心只增不减，我们必须预想一个可能与日本开战的未来，到时候乃我们中华民国与中华民族的存亡之秋，但就是这样的时刻提供给了我们一个团结一致对外的机会。我们会把握时机开设一个名为国民参政会的政治咨询机关，让支持我们的与反对我们的人都能一起把话讲开，同时接纳各方对当前宪法草案的意见，真正地让三民主义与五权宪法能够实现。"
 CHI_national_resource_exploration:0 "国家资源勘探"
 CHI_national_resource_exploration_desc:0 "我们必须鼓励私营企业在我国寻找原始资源储备方面进行投资，以帮助促进我们的经济，并帮助再次建立我们的军队。"
 CHI_national_resources_commission:0 "资源委员会"
 CHI_national_resources_commission_desc:0 "迫在眉睫的战争意味着和平发展时代的即将终结。现在，时间就是一切。如果没有适当的准备，我们无法应对这场战争，我们将建立资源委员会来管理我们的工业发展。"
 CHI_national_steelwork_focus:0 "国家钢铁生产"
 CHI_national_steelwork_focus_desc:0 "通过建立组织并密切监控企业的状况是有效的，我们可以将同样的做法应用于钢铁厂，这些钢铁厂已成为几乎所有设备的战时生产工作不可或缺的一部分。"
 CHI_nationalize_industry_focus:0 "重工业五年建设计划 I"
 CHI_nationalize_industry_focus_desc:0 "如果我们将一些工厂国有化，就能进一步提高我们的武器生产。"
 CHI_nationalize_industry_ii_focus:0 "重工业五年建设计划 II"
 CHI_nationalize_industry_ii_focus_desc:0 "如果我们将更多的工厂国有化，就能进一步提高我们的武器生产。"
 CHI_nationalize_industry_iii_focus:0 "重工业五年建设计划 III"
 CHI_nationalize_industry_iii_focus_desc:0 "如果我们将更多的工厂国有化，就能进一步提高我们的武器生产。"
 CHI_naval_expansion_focus:0 "海军扩张"
 CHI_naval_expansion_focus_desc:0 "现在，我们海军已经很好地掌握了好的船舶设计，现在是时候扩大我们的海军，并维护我们的海军统治地位，以确保我们国家的安全。"
 CHI_navy_reorganization:0 "重组海军"
 CHI_navy_reorganization_desc:0 "为了维护我们在大亚太地区的海军优势，需要进行重组和调整结构，以建立一支强大的海军。"
 CHI_neiwubu_ttt:0 "§C中统改组为内调局§!"
 CHI_neizhanzongdongyuan:0 "戡乱总动员"
 CHI_neizhanzongdongyuan_desc:0 "委员长交议厉行全国总动员，以戡平共匪叛乱，扫除民主障碍，如期实施宪政，贯彻和平建国方针案”，并颁布了“总动员令”。"
 CHI_neutrality_CC_party:0 "中央俱乐部"
 CHI_neutrality_party:0 "中国国民党"
 CHI_new_taiwan_dollar:0 "新台币"
 CHI_new_taiwan_dollar_desc:0 "高通胀是我们失去大陆的原因之一，若要保住台湾，我们必须解决这个问题。"
 CHI_old_antiair_protection_german:0 "强化防空"
 CHI_old_antiair_protection_german_desc:0 "为了保护我们新开发的地区，我们必须设置防空砲和雷达站以防敌人的战略轰炸。"
 CHI_old_asia_liberation_manifesto:0 "亚洲解放宣言"
 CHI_old_asia_liberation_manifesto_desc:0 "近 300 年来，亚洲人民第一次打败了西方殖民者。 是时候向所有亚洲人民和西方邪恶的殖民者宣布自由宣言了。 一个统一自由的亚洲，绝不会再成为他们的奴隶！"
 CHI_old_cooperate_with_sukarno_focus:0 "与苏加诺合作"
 CHI_old_cooperate_with_sukarno_focus_desc:0 "印尼的苏加诺是一位与我们志同道合的反殖民主义强人，他希望击退荷兰在印尼的殖民统治。我应该帮助他夺权，并一同建设更好的印度尼西亚。"
 CHI_old_demand_indochina_passage:0 "索取印度支那通行权"
 CHI_old_demand_indochina_passage_desc:0 "为了履行我们对德国的承诺，我们必须与盟国作战并控制他们在亚洲的殖民地。 现在我们已经在北方打败了日本，而法国军队正忙于在欧洲与德国打一场注定失败的战争。 我们应该向法国发出最后通牒，索取印度支那。"
 CHI_old_electronics_research_german:0 "研究电子科技"
 CHI_old_electronics_research_german_desc:0 "知彼知己，百战不殆；不知彼而知己，一胜一负；不知彼，不知己，每战必败。 ——孙子兵法"
 CHI_old_form_indian_liberation_army:0 "成立印度解放军"
 CHI_old_form_indian_liberation_army_desc:0 "现在我们从英国殖民者手中夺取了缅甸。 现在是时候帮助印度人民建立自己的政府，建立自己的军队来对抗邪恶的殖民主义了。 亚洲是亚洲人的亚洲！"
 CHI_old_found_wanhu_flugmaschinenfabrik:0 "成立万湖飞机製造厂"
 CHI_old_found_wanhu_flugmaschinenfabrik_desc:0 "经过多年的国外学习和自主开发，我们的科学家在飞机设计和製造方面已经和德国科学家具有相同的知识水平。 现在是时候将中德两国的所有人才聚集到一个飞机设计局了。"
 CHI_old_persuade_siam:0 "说服暹罗"
 CHI_old_persuade_siam_desc:0 "暹罗成功避免了欧洲人的殖民，没成为附属国。 然而，为了支持我们解放整个亚洲的斗争，我们必须说服他们加入我们，否则我们必须使用武力迫使他们讲道理。"
 CHI_old_question_of_the_philipines:0 "菲律宾问题"
 CHI_old_question_of_the_philipines_desc:0 "菲律宾已经作为美国殖民地，受到帝国主义欺压太久了，是时候刚解放他们，并帮助他们重建国家。"
 CHI_old_refinery_technology_german:0 "精炼工艺"
 CHI_old_refinery_technology_german_desc:0 "中国这么大，很难相信我们会缺乏任何一种资源。 然而，如果没有适当的技术和设备，我们永远无法鑽出石油，即使它就在我们的脚下。 但我们至少可以向更发达国家学习如何建立合成炼油厂，以替代目前无法进行的部份。"
 CHI_old_reunion_with_singapore:0 "重组马来西亚"
 CHI_old_reunion_with_singapore_desc:0 "我们的军队最近将马来西亚从英国人的暴政下解放出来，其人民渴望加入我们的行列。 由于新加坡几乎是一个华人城市，因此将其纳入民国的永久省份是合理的。 对于马来西亚其他地区，应该建立一个共和国，以铲除邪恶的殖民君主制。"
 CHI_old_sino_luftwaffe:0 "中华德式空军"
 CHI_old_sino_luftwaffe_desc:0 "德国优越的空军是他们引以为豪的东西。 由于中国是他们在亚洲的忠实盟友，他们与我们分享了他们先进的空中技术和战略。 现在在德国工程师的帮助下，我们将建立自己的空军！"
 CHI_old_tsingtao_cooperation_company:0 "青岛合作公司"
 CHI_old_tsingtao_cooperation_company_desc:0 "为了深化我们的合作，德国专家建议我们在他们的老殖民地——青岛成立一家官方合作公司，这样我们就可以在不受日本军事存在骚扰的情况下工作。 越来越多的德国人来到这座城市，要么是为了工作，要么是为了喝青岛啤酒。 一个德国石油专家团队已经在渤海勘探了几个月，我们应该很快就会收到他们的消息。"
 CHI_one_party_neutrality: "§G选择此路线后中华民国将会进入国民党一党专政的威权统治。§!"
 CHI_opening_up_focus:0 "开放与利用外资"
 CHI_opening_up_focus_desc:0 "中国山川壮丽、物产丰隆、地广人多，可为什么至今仍旧贫穷？孙总理说，因为我们没有资本、没有人才、没有技术！看看中国最富最先进最发达的城市吧，哪个城市没有外国的资本、人才、技术？所以我们得欢迎列国之资本、人才、技术来到中国，为我筹划，为我组织，为我经营，为我训练。则十年之内，我国之大事业必能林立于国中，并最终自主独立发展！"
 CHI_pacific_fleet:0 "制霸太平洋"
 CHI_pacific_fleet_desc:0 "必须不惜一切代价保护中国不受外国侵略。一支强大的舰队在太平洋巡逻可以阻止任何潜在的海军登陆。"
 CHI_pacify_yunnan:0 "进入云南"
 CHI_pacify_yunnan_desc:0 "龙云这些年一直成功将我们的影响力挡在云南外，但是战时云南将成为我们的重要援助路线，所以我们必须想办法控制它。"
 CHI_paratroopers_focus:0 "中美特种技术合作协定"
 CHI_paratroopers_focus_desc:0 "中美签署《中美特种技术合作协定》，成立中美特种技术合作所。美国提供物资和技术，双方合作搜集日本情报，训练、装备国民党特种部队，开展对日敌后游击战，同时美国也希望借此学习中方破译密码的技术。同时根据陈纳德的建议，我们应该建立第一支中国伞兵部队，它可以为我们的反击行动提供支持。"
 CHI_political_consultative_assembly_focus:0 "政治协商会议"
 CHI_political_consultative_assembly_focus_desc:0 "太久了，不论是与日本侵略者的战争，还是我们国民对民主的期待，又或者是中国国民党背负独裁的骂名，都已经持续太久了。现在日本人已经撤离，我们终于可以真正地一步步走向宪政，实施军队国家化、政治民主化、党派平等、地方自治，达到和平民主的建国。我们将举办政治协商会议，完成一部为各党各派所接受，且能造福全国国民的中华民国宪法。"
 CHI_politics_and_governance_focus:0 "落实权能区分"
 CHI_politics_and_governance_focus_desc:0 "不只是中国，当今世界各国的国民希望政府有强大的权力来管理国家的方方面面，但孙总理注意到，若政府的力量过大，人民便不能管理政府，会被政府压迫。所以孙总理提倡权能区分，将人民的政权（选举、罢免、创制、复决）与政府的治权（行政、立法、司法、考试、监察）区分开来。人民才有办法控制政府，以建成一个完全的民权政治机关。"
 CHI_powerhouse_of_the_east:0 "东方强国"
 CHI_powerhouse_of_the_east_desc:0 "中国是一个幅员辽阔的国家，拥有取之不尽的优质资源和庞大的人口，才能创造出工业强国。是时候动用我们的资源，把这个国家推向光明的未来了。我们将成为亚洲最大的工业强国。"
 CHI_prepare_for_constitionalization_focus:0 "为宪政做准备"
 CHI_prepare_for_constitionalization_focus_desc:0 "我们国父创建中国国民党、缔造中华民国，就是为了追求我们中华民族之独立、国民民权之平等、百姓民生之自由，所以宪政必须是我们中国国民党最后的目标。任何伟大的国家都必须怀抱着十足的勇气去踏上那通往新时代的第一步，我们将会以党内自由派的主张为基础，广泛采纳各党各派的意见，在不破坏三民主义的基础上，共同研究一部适合新中国的宪法。"
 CHI_pressure_burma_focus:0 "施压缅甸"
 CHI_pressure_burma_focus_desc:0 "缅甸在英殖民统治下成了个贫民窟，充满了贫困与内乱。我们应该施压殖民政府，使其转交给我们中国！"
 CHI_public_school_program_focus:0 "公立学校计划"
 CHI_public_school_program_focus_desc:0 "教育我们的学生是当务之急。由于识字率如此之低，我们必须让这个国家的儿童拥有更美好的未来。"
 CHI_railway_effort:0 "铁路建设方略"
 CHI_railway_effort_desc:0 "中国还缺乏许多现代化的基础设施，尤其是铁路，铁路无论在军用上，或是在民用上都极其重要，应尽快开工建设。"
 CHI_rebuild_civil_service:0 "多党联合政府"
 CHI_rebuild_civil_service_desc:0 "中国的民主不需要依托一个政党来达成，也不应该以某一个党为中心，对于中国这样地广人多的国家来说，单靠一个党是绝对不能够反映人民的心声的，所以我们要组成一个以多党政治为基础的联合政府，没有一个党会占绝大多数，且我们会让每个县的每个党派都派一名代表来政府当代表，如此一来，我们就能达成一个横跨全中国与全阶级的全民政治了。"
 CHI_receive_usa_equipment:0 "中美合作"
 CHI_receive_usa_equipment_desc:0 "为改善亚洲战区的局势，[USA.GetName]将援助我们的部队，我们可以用它来提高我军的战斗力。"
 CHI_receive_usn_destroyers:0 "接收美国驱逐舰"
 CHI_receive_usn_destroyers_desc:0 "美国将台湾作为太平洋岛链的战略据点。我们应该藉此机会加强我们的海军。"
 CHI_refinery_technology_german:0 "精炼工艺"
 CHI_refinery_technology_german_desc:0 "利用德国的炼油工艺，我们可以改造我们过时的、结构不良的炼油厂，这些炼油厂在生产过程中浪费了宝贵的原材料。"
 CHI_reform_military_academy:0 "改革军事学校"
 CHI_reform_military_academy_desc:0 "中国有很多军事院校，最着名的是黄埔军校。这样的学校却造就了无能的领导者。是时候教育我们现役和未来的指挥官们打击腐败、犯罪，并与他们所领导的人合作了。"
 CHI_reinforce_air_force:0 "增强中国空军"
 CHI_reinforce_air_force_desc:0 "中国空军在战场中伤亡惨重，由于我们的工业仍不成熟，我们应该向盟友寻求协助。"
 CHI_reinforce_new_life_movement:0 "加强新生活运动"
 CHI_reinforce_new_life_movement_desc:0 "新生活运动是政府主导的促进文化改革和新儒家社会道德的公民运动。发起于1934年2月19日，作为反共运动的一部分。我们需要加强这场运动，以确保颠复组织不会将他们的错误信息传播给民众。"
 CHI_rejuvenate_heavy_industry:0 "振兴重工业"
 CHI_rejuvenate_heavy_industry_desc:0 "由于政治上的优先考虑，中国的混乱局面使我们无法改善我们的工业。也许我们应该为经济振兴重工业，尝试做我们早就应该做的事情。"
 CHI_remilitarize_shanghai:0 "上海重新军事化"
 CHI_remilitarize_shanghai_desc:0 "上海及其周边地区自1932年一·二八淞沪抗战以来一直处于非军事化状态，这使得我们首都很容易受到攻击。现在我们的政府更强大了，和日本关系也改善了，我们可以毫无阻碍地重新军事化这座城市。"
 CHI_reorganization_of_the_air_force_focus:0 "重组空军"
 CHI_reorganization_of_the_air_force_focus_desc:0 "为了与外国势力竞争，我们需要重组我们的空军，以维护我们的空中优势，并为我们的陆军和海军提供适当的支援。这将包括重组我们空军的整个军事机构。"
 CHI_reorganization_our_armed_forces:0 "改组我们的军队"
 CHI_reorganization_our_armed_forces_desc:0 "我们的军队，虽然拥有一些反共的武器支援，但在内战期间出现了大量伤亡和战俘，所以我们必须整顿士气低落的部队，否则我们就没有任何希望没有夺回大陆。"
 CHI_reorganize_nra:0 "改组国民革命军"
 CHI_reorganize_nra_desc:0 "国民革命军曾经是中国军事实力的标竿，现在却既无能又可笑。我们必须努力使它恢复昔日的辉煌！"
 CHI_reorganize_outdated_industrial_complex:0 "地方政府改革计划"
 CHI_reorganize_outdated_industrial_complex_desc:0 "当各省各县的各党各派与我们取得联系后，我们就可以开始着手根据各地的经济、文化、社会、环境、人口等因素来制定一套又一套「因地制宜」的改革计划，与日本的战争正在如火如荼地进行着，一旦我们了解透彻中国各地的实际情况，那么日军的进攻也必定会受阻，我们也能在军事上取得重大突破，以求在尽可能减少士兵牺牲的情况下抵抗日本。"
 CHI_replace_zhang_zhizhong:0 "撤换张治中"
 CHI_replace_zhang_zhizhong_desc:0 "张治中将军在新疆的治理颇有成效，但他似乎是一个共产党的同情者，我们最好撤换他。"
 CHI_republic_of_china_air_force:0 "强化空军"
 CHI_republic_of_china_air_force_desc:0 "为了抵禦共产党，我们需要重建我们的空军，这会为我们的陆军和海军提供适当的支援。 这将会包括关于重组我们空军的整体架构。"
 CHI_republic_of_china_army:0 "重建陆军"
 CHI_republic_of_china_army_desc:0 "我们从过去的战争中吸取了许多教训，并获得了许多经验。 我们现在应该落实这些知识并开始重组部队之工作以改善我们的军队。"
 CHI_republic_of_china_navy:0 "扩展海军"
 CHI_republic_of_china_navy_desc:0 "为了防止可能的解放军入侵，我们需要一支足够强大的海军，为此我们可以从前日本海军和美国海军接收一些舰艇。 如果我们想夺回大陆，我们必将需要海军的支援。"
 CHI_reset_constitutionalize_pressure:0 "§G重置§! §H[Root.GetPressureorOpposition]§!§H.§!"
 CHI_return_to_mainland:0 "大陆的光复"
 CHI_return_to_mainland_desc:0 "经过全体将士的不懈努力，我们终于得以光复大陆。如今赤匪遁逃、四海承平，是时候决定民国未来的道路了。"
 CHI_revitalize_chinese_liberalism:0 "德先生与赛先生"
 CHI_revitalize_chinese_liberalism_desc:0 "中国不能再等了，如果我们想要在国际上抬头挺胸并与世界列强平起平坐的话，我们就必须把「德先生与赛先生」作为我们的精神国父。德莫克拉西（Democracy）先生会把民主与自由带给我们的国家与社会，赛因斯（Science）先生则会带给我们中国人客观且务实的思维模式，用不了多久，中国就会成为20世纪的东方雅典。"
 CHI_revive_hanyang_steelwork_focus:0 "振兴汉阳钢铁厂"
 CHI_revive_hanyang_steelwork_focus_desc:0 "汉阳钢铁厂管理不善，设备陈旧，或许如果我们僱佣更多工人，为改造提供资金，我们就能在战争中发挥作用。"
 CHI_revive_new_culture_movement_focus:0 "发扬新文化与五四精神"
 CHI_revive_new_culture_movement_focus_desc:0 "1915年的新文化运动和1919年的五四运动是无法拆开的，两者相辅相成，你中有我，我中有你。我们要就民主与科学的精神，重新评估所有一切古今中外事物的价值，并让这些东西最后都为我们所用。同时这种在思想与政治上的弹性有助于让我们说服各地的军阀与我们合作，统一可以不用刀剑枪炮，也可以依靠沟通、谈判、说服、合作、和解、包容来达成。"
 CHI_sale_of_public_farm_lands_to_farmers:0 "公地放领"
 CHI_sale_of_public_farm_lands_to_farmers_desc:0 "在继续实施三七五减租推行后，我们还需要做更多，以保证民生原则的正确实施。 我们现在要将从地主那里买来的土地，以公平的价格交给农民。"
 CHI_shijiehuimiezhe:0 "世界毁灭者？？？!!!"
 CHI_shijiehuimiezhe_desc:0 "一天夜里，蒋中正梦到了神秘的外星人，一觉醒来，他获得了无上的力量，化身为世界毁灭者!!!"
 CHI_sino_british_pact:0 "中英协定"
 CHI_sino_british_pact_desc:0 "[JAP.GetName]很可能在不久的将来入侵英国的亚洲殖民地，我们可以向英国提出组成军事同盟的建议。"
 CHI_socialist_realism_focus:0 "平等与博爱"
 CHI_socialist_realism_focus_desc:0 "为什么我们会把社会主义与三民主义结合起来？只因我们忘不了巴黎公社为世界历史所照耀出的第一道红色光辉，只因我们忘不了孙中山先生曾说过的「天下为公」。我们要把「天下为公」作为立国的根本，我们要把「平等与博爱」作为中国人的美德，我们世世代代的子孙都会为我们今日开创的事业而感到骄傲，我们已经准备好建设真正的社会主义了。"
 CHI_sol_join_comintern_focus:0 "要为真理而斗争！"
 CHI_sol_join_comintern_focus_desc:0 "我们与苏联过密的合作关系激发了日本对社会主义的敌意，根据苏联国家安全委员会的朋友指出，对苏联开战的言论正在日本国内发酵，到时候中国战场的战线将会延伸到西伯利亚，可我们并不畏惧，只因这次我们将与盟友一起抵抗野蛮的侵略者，我们会一同高举平等的红旗，举全国之力高喊「要为真理而斗争！」，中国将为平等而战！"
 CHI_song_zi_wen: "宋子文"
 CHI_song_zi_wen_desc:0 "‌ ‌宋子文，国民政府财政部长，蒋委员长的大舅哥‌，为其筹集经费，因此进入核心集团。"
 CHI_sov_pact_focus:0 "中苏互不侵犯条约"
 CHI_sov_pact_focus_desc:0 "苏联正受到法西斯势力的威胁，我们也一样。为了打败自由工人天堂的敌人，我们一起共同合作似乎是顺理成章的。"
 CHI_split_plm_focus:0 "拆分百灵庙蒙政会"
 CHI_split_plm_focus_desc:0 "德穆楚克栋鲁普亲王已经显露出与日本军队勾结的明显迹象。在他做任何蠢事之前，最好在蒙古政务委员会（也称为百灵庙蒙政会）内压制他的影响力。"
 CHI_streamlined_industry:0 "提高工业效率"
 CHI_streamlined_industry_desc:0 "为了重建我国落后的工业，提高工业效率是最重要的步骤之一。"
 CHI_strengthen_chiangs_rule:0 "武士的奴隶"
 CHI_strengthen_chiangs_rule_desc:0 "我们根本无力对抗日本！现在政府将和日本签订《日华基本关系条约》条约内容为:日华共同防共、日本有在华驻扎军队的权利、中国的资源应满足日本的国防需要、冈村宁次担任驻华派遣军总司令直接管辖中国领土。"
 CHI_study_foreign_air_focus:0 "研究西方飞机设计"
 CHI_study_foreign_air_focus_desc:0 "很多西方公司製造的飞机机翼都有一些複杂而先进的设计，为了使我们的飞机结构图现代化，我们必须对这些设计进行研究。"
 CHI_study_foreign_ship:0 "研究外国舰船设计"
 CHI_study_foreign_ship_desc:0 "英国和美国等国的海军装备设计被世界公认为是最高标准。我们应该研究这些设计，以将来更好地创造我们自己的设计。"
 CHI_subjugate_warlords_focus:0 "荡平军阀"
 CHI_subjugate_warlords_focus_desc:0 "现在我们同共产党人和日本人都打过仗，而且都打赢了。现在是重新统一中国、从战争中重建的时候了。"
 CHI_subvert_malaya:0 "颠复马来亚"
 CHI_subvert_malaya_desc:0 "马来亚地区和北婆罗洲有大量华侨。 我们应该利用此事，扩大我们在那里的影响。"
 CHI_support_kmt_opposition_focus:0 "接纳国民党反对派"
 CHI_support_kmt_opposition_focus_desc:0 "中国需要自强，同时也需要民主，更需要包容。若政府要尽最快的速度让中国人重新团结起来，我们应当着手邀请反对国民党、持有不同立场的有志之士，让他们发表批评意见与指导建议。中国不是国民党的中国，而是全体中国人的中国，只有当中国的政治可以实实在在地反映各地各阶层的声音时，我们才能要求所有人都为这个国家奉献与奋斗。"
 CHI_suppress_constitutionalist_pressure:0 "镇压持不同政见者"
 CHI_suppress_constitutionalist_pressure_desc:0 "持不同政见者只不过是我们领导层面临的一个困境。他们应该滚蛋！"
 CHI_t_v_soong2: "扩大外交部"
 CHI_t_v_soong2_desc:0 "宋子文将同时担任我们在国际上的外交代表。"
 CHI_t_v_soong3: "现代化外交"
 CHI_t_v_soong3_desc:0 "宋子文将代表国民政府实现中国的现代化外交。"
 CHI_taiwanese_industry:0 "设置贸易限制"
 CHI_taiwanese_industry_2:0 "经济建设四年计划"
 CHI_taiwanese_industry_2_desc:0 "大撤退期间，我们成功地将大部分黄金储备与工业技术一同从大陆撤出。 这些资源将有助于我们发展台湾。"
 CHI_taiwanese_industry_desc:0 "台湾资源和产业有限，因此其出口和进口都需要减少。"
 CHI_the_375_arable_rent_reduction_act:0 "三七五减租"
 CHI_the_375_arable_rent_reduction_act_desc:0 "由于日本殖民时期的遗留问题，台湾的农业亟需改革。三七五减租法案将有助于减轻台湾农民的负担。"
 CHI_the_fall_of_mainland:0 "大撤退"
 CHI_the_fall_of_mainland_desc:0 "我们失去了整个中国大陆，台湾这座岛是我们最后的希望了。"
 CHI_the_real_sanminism:0 "真正落实三民主义"
 CHI_the_real_sanminism_desc:0 "三民主义，即民族主义、民权主义和民生主义，是由我们中华民国国父暨中国国民党总理的孙中山先生所提出的政治思想。他主张三民主义是真正地将欧美的政治哲学与中国的社会文化进行了结合，只有中国落实了三民主义，中国才能真正地走向自由、平等、博爱。因此我们必须一步步地按照总理的理想，让三民主义在我中华民国上遍地开花。"
 CHI_the_reform_of_kmt:0 "国民党中央改革委员会"
 CHI_the_reform_of_kmt_desc:0 "在完成了几项改革，为前台湾省政府清理了错误之后，需要成立一个国民党中央改革委员会，以便将大陆时期一些不同权力机构整合至适合我们当前状况的形式。"
 CHI_the_rise_of_wang:0 "汪精卫崛起"
 CHI_the_rise_of_wang_desc:0 "随着国民党合作主义的兴起，汪精卫成为党内的领导人物之一。汪精卫的崛起与其统治可保证大日本帝国和中国政府之间的和平与稳定。"
 CHI_the_soviet_volunteer_group:0 "苏联航空志愿队"
 CHI_time_of_neutrality: "中华民国处于§G威权统治§!之下"
 CHI_tungsten_effort_i_focus:0 "重视钨矿开采 I"
 CHI_tungsten_effort_i_focus_desc:0 "我们缺乏坦克也可以归因于中国各地缺乏钨的开采和生产。现在是政府投资于日本人正在追逐的这一重要资源的时候了。"
 CHI_tungsten_effort_ii_focus:0 "重视钨矿开采 II"
 CHI_tungsten_effort_ii_focus_desc:0 "钨行业正在蓬勃发展，其在战场上的用途也在不断增加。坦克的产量似乎增加了，重型装甲工业也在增长。"
 CHI_tungsten_effort_iii_focus:0 "重视钨矿开采 III"
 CHI_tungsten_effort_iii_focus_desc:0 "我们现在正在稳步建造坦克，以便在战场上作战，钨业也正在给中国带来繁荣。让我们倾注更多的努力，进一步巩固我们在战场上的地位。"
 CHI_usa_aid:0 "美援"
 CHI_usa_aid_desc:0 "尽管在中国内战的关键时期它们无视现况并不给予援助，但现今[USA.GetAdjective]援助我们作为反共的最后堡垒的意愿越来越强。 我们将用好这些援助来开发这个岛屿。"
 CHI_usn_dd_oob_tt:0 "读取战斗序列§Y美国驱逐舰§!"
 CHI_wangjingwei_zz_desc:0 "汪精卫（1883年5月4日-1944年11月10日），名兆铭，祖籍浙江山阴（原绍兴县），出生于广东三水，字季新。早年投身革命，曾谋刺清摄政王载沣未遂，袁世凯统治时期到法国留学。回国后于1919年在孙中山领导下，驻上海创办《建设》杂志。1921年孙中山在广州就任非常大总统，汪精卫任广东省教育会长、广东政府顾问。1924年任中央宣传部长。1926年1月在国民党“二大”上当选为中央执行委员会常务委员会委员。“中山舰事件”发生后，被迫辞职，出走法国。汪精卫于1927年2月下旬离开法国，乘火车经苏联归国。在汪精卫途径莫斯科时，斯大林专门接见了这位国民党左派领袖。4月归国，任武汉国民政府主席，一度与叛变革命的蒋介石进行争权斗争。4月5日，汪陈两人一起联名发表了一份《国共两党领袖汪兆铭、陈独秀联合宣言》，4月18日，南京的国民政府成立，蒋介石邀请国民党中的老牌反共分子胡汉民出任国民政府主席，蒋介石自己任中央军委主席和国民革命军总司令，国民党公开分裂成“汉”“宁”两个政府。7月15日在武汉实行“分共”，与蒋合流，但随后仍一直与蒋明争暗斗，蒋介石和胡汉民均已下野，汪精卫也于9月13日通电下野，12月16日发表了引退政界的声明，和陈璧君一起前往法国。1929年回国后，以“中国国民党第二届中央执监委员联席会议”的名义发布命令，对各路“护党救国军”发出委任状和番号。1931年元旦汪精卫在天津发表下野声明，在汪精卫的主持下，于5月28日成立了广州国民政府，否认南京国民政府的合法性。“九一八”事变，完全改变了中国历史的进程。蒋介石迫于形势，将软禁的胡汉民释放，并派蔡元培、张继携带他写给汪精卫的亲笔信赴广州议和。在南京召开四届一中全会，重组国民政府，广州政府随即取消。历任国民党中央特别委员会委员、国民政府委员、行政院院长兼外交部长、国防最高会议副主席、国民党副总裁等职。"
 CHI_war_xinjiang:0 "对新疆用兵"
 CHI_war_xinjiang_desc:0 "谈判需要花费太多时间和精力。战争是夺回新疆最快也是唯一可行的方式。"
 CHI_warlord_issues:0 "强调中央权威"
 CHI_warlord_issues_desc:0 "当我们和地方实力派并肩作战的同时，也应该设法融合这些军阀，或至少与他们保持良好的关系。毕竟，当我们消灭了外敌后，民国也必须迎向真正的统一。"
 CHI_warn_hiro_san_tt:0 "\n§R这将在该国内部引发一场政治危机。§!"
 CHI_western_yunnan_campaign:0 "中国反攻作战计划"
 CHI_western_yunnan_campaign_desc:0 "在改善了我们的部队后，我们可以制定一场反攻计划来夺回被敌军占领的领土。（如果有盟友海军支援的情况下我们甚至可以考虑登陆敌人本土作战）"
 CHI_whampoa_rifle:0 "黄埔步枪"
 CHI_whampoa_rifle_desc:0 "黄埔军校现正进行改革，准备教育我们的士兵和传授用于不同类型战争的武器工艺。很明显，为我们的部队研製新型火力武器可以显着增强我军的实力。"
 CHI_workers_culture:0 "生产者立国"
 CHI_workers_culture_desc:0 "什么是生产者？我们指的不是狭义上的工人或农民，而是那些依靠自己的双手与头脑来创造任何有益的事物与想法的人们，无产阶级不一定是生产者，资产阶级也不一定就生产不了东西。我们本着生产者立国的精神，要让各行各业自行组织工会，并积极推动保障劳工权益的法律，当生产的齿轮与创造的灯泡永不停歇，中国总有一天会成为生产者之国。"
 CHI_yi_dang_zhi_guo_focus:0 "以党治国"
 CHI_yi_dang_zhi_guo_focus_desc:0 "以党治国或简称党国，字面意思是利用政党来管理国家，孙中山先生明确指出，党国应成为中华民国在训政阶段的官方国策。"
 CHI_yichudebuff_tt:0 "移除§Y派系斗争§!\n移除§Y百废待兴§!\n移除§Y复员问题§!"
 CHI_yumen_oil_field:0 "玉门油田"
 CHI_yumen_oil_field_desc:0 "玉门的一些地质专家认为那里可能蕴藏着大量的石油。应努力开发利用这些资源。"
 JPG_only_show_up_in_war_time_tt:0 "§C这个决议只会在战时出现。§!"
 RCM_25_percent_assassinate_chance:0 "当持不同政见者将要§Y质疑我们对宪政的承诺时§!，有§G25%§!的机会§R暗杀他们§! 。\n§C当暗杀成功时：§!\n"
