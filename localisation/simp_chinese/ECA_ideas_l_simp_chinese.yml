 ECA_MEN_royal_guard:0 "扩大王室卫队"
 ECA_MEN_standing_advisors:0 "常务顾问"
 ECA_MEN_standing_advisors_desc:0 "我们的武装部队中很少出现熟练的日本专家，主要是在激烈的军事行动期间。我们可以努力使他们长期留下来。"
