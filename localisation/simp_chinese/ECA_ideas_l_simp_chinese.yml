 ECA_MEN_JAP_partnership:0 "追求友谊"
 ECA_MEN_central_academy:0 "张家口中央学院"
 ECA_MEN_central_academy_desc:0 "张家口中央研究院是由日本的地方情报学校创办的，但我们可以利用它获取更多的控制权，并把它转变成我们自己的军官学校。"
 ECA_MEN_general_staff:0 "总参谋部"
 ECA_MEN_general_staff_desc:0 "现在，我们的最高指挥部是由蒙古王公和日本顾问组成的松散组合。通过正规化我们的参谋部并提拔训练有素的军官，我们可以提高其能力，并保持独立于日本军队之外。"
