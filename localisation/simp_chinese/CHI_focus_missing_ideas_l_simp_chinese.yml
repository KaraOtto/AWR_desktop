 the_blueshirts_stronger_desc:0 "[Root.GetBSorTPPYC]作为党内组织的意识形态团体起家，初期主要成员来自黄埔军校。 到 1930 年代，它的影响力扩展到军事和政治领域。\n\n但因为它的一些边缘成员表现，现今被担心在党内传递一些不健康的法西斯思想。\n\n尽管如此，由于中央领导人最近改变了党内政策，该政治团体的成员人数又出现了新一波暴增。"
