 appeasement_policy_2:0 "绥靖政策"
 appeasement_policy_desc:0 "由于目前国内冲突不断，政府在处理日本问题时选择了不抵抗的绥靖政策。然而，中国国内很多团体已经表达了反对这一政策的声音，并呼吁停止内战。"
 asia_liberator:0 "亚洲解放者"
 asia_liberator_desc:0 "人们将在新亚洲的领袖和解放者的旗帜下战斗！"
 baoxi_desc:0 ""
 central_club:0 "中央俱乐部"
 central_club_desc:0 "中央俱乐部，又称CC系，是国民党内部管理党际事务的主要政治集团。\n\n陈立夫和他的兄弟陈果夫是其主要领导人，在国共两党分裂不久后成立，包括两人在内的许多成员在 1928 年帮助组建了国民党中央执行委员会。"
 central_club_stronger:0 "中央俱乐部"
 central_club_stronger_desc:0 "中央俱乐部，又称CC系，是国民党内部管理党际事务的主要政治集团。\n\n陈立夫和他的兄弟陈果夫是其主要领导人，在国共两党分裂不久后成立，包括两人在内的许多成员在 1928 年帮助组建了国民党中央执行委员会。"
 chen_lifu_desc:0 "陈立夫出生于浙江，早年曾是一名矿工和採矿工程师，但在他的家庭在 1917 年遭到袁世凯搜查后过的十分艰难。1925 年，陈立夫在蒋介石的命令下正式加入国民党，当时陈立夫以优异成绩毕业于匹兹堡大学，并获得採矿工程硕士学位，准备去美国做採矿工程师。\n\n他在29岁时成为国民党中央委员会首要人物，这使他成为有史以来担任该职位中最年轻的一位。\n\n1931年任国民党组织部部长。 他还与其兄陈果夫一起被统称为政治组织「中央俱乐部」的领导人。\n\n除了政治，他还与胡汉民等一些学者一起在 30 年代帮助保存中医以对抗汪精卫的镇压。"
 chi_375_battle_plan:0 "375执行部"
 chi_baifeidaixing:0 "百废待兴"
 chi_baifeidaixing_desc:0 "§L经济上我们依靠外国资本，关税、盐税、统税几乎也就是我们所有的收入来源了，农村地区文盲遍地，他们部分人开始参加民间秘密结社的宗教组织，也就是所谓的“会道门”，使得我们几乎无法有效管理农村。而且地方上我们已经放权给当地乡绅，农业税问题和土地分配问题无疑将会是一个隐患。§!"
 chi_baomiju:0 "国防部保密局"
 chi_baomiju_desc:0 "§L原国民政府军事委员会调查统计局秘密核心部分改组成国防部保密局，由毛人凤担任局长。§!"
 chi_ccw_anti_communist_idea:0 "消灭共匪！"
 chi_ccw_fighting_retreat_idea:0 "战略转进"
 chi_ccw_fighting_retreat_upgrade_idea:0 "战略转进"
 chi_ccw_ministry_of_national_defence:0 "中华民国国防部"
 chi_ccw_seize_the_gold_idea:0 "将黄金转移到台北"
 chi_chenchenggaige:0 "陈诚改革"
 chi_chenchenggaige_desc:0 "§L陈诚在台湾期间，吸取了国民党在大陆失败的教训，努力缓和与当地农民之间的矛盾，推行“三七五减租”和以工商企业股向地主赎买土地的办法进行“土地改革”，台湾一片勃勃生机万物竞发的境界犹在眼前！§!"
 chi_defeat_jap111:0"中国复仇主义"
 chi_defeat_jap111_desc:0"中国在经历了这么久的苦难后终于迎来了她的新生！蒋中正委员长将带领我们走向复兴，没有任何东西能战胜我们！"
 chi_diwucongzui:0 "第五纵队在行动"
 chi_diwucongzui_desc:0 "国民党在撤离大陆期间留下了大批间谍特务，他们藏在地下秘密活动，现在[CHI.GetLeader]突然宣布反攻，他们的行动配合还乡团和地方的土匪变得越发频繁，严重影响我军的调动速度和应对国民党反动派登陆作战的能力，我们现在必须彻底肃清他们！"
 chi_dongyuankanluan:0 "动员戡乱时期临时条款"
 chi_dongyuankanluan_desc:0 "§L《动员戡乱时期临时条款》是《中华民国宪法》的附属条款，由国民大会经由宪法修正程序制定，以适应动员戡乱时期政军情势。§!"
 chi_fukuan:0 "对美国的支付"
 chi_fuyuanwenti:0 "复员问题"
 chi_fuyuanwenti_desc:0 "§L军事上我们的国军由于在抗战和戡乱中急需兵员，招募了大量的伪军、壮丁、土匪、帮派成员、还乡团成员，成分极其复杂。而且连年的战乱使军队厌战情绪高涨，这无疑会成为军队质量下降的因素。§!"
 chi_guoguangjihua:0 "国光计划"
 chi_guoguangjihua_desc:0 "一年准备，两年反攻，三年扫荡，五年成功。"
 chi_guojun:0 "中华民国国军"
 chi_guojun_desc:0 "§L风云起,山河动,黄埔建军声势雄,革命壮士矢精忠。金戈铁马,百战沙场,安内攘外作先锋。国民革命军已经改组成中华民国国军，以实现“军队国家化”。§!"
 chi_guojunhaijun:0 "中华民国海军"
 chi_guojunhaijun_desc:0 "§L信仰坚定，纪律严明，操纵新时代之战列舰，使用最坚利之甲兵。雄视三洋，屏障四海，保卫疆土，巩固和平，同舟共济，万众一心，着成忠勇冒险之好习惯，同舟共济，万众一心，创造海洋生活之新精神，为青天白日旗争光荣。我们的海军已经实现全面现代化，甲午海战的悲惨历史一去不复返了!。§!"
 chi_guojunkongjun:0 "中华民国空军"
 chi_guojunkongjun_desc:0 "§L凌云御风去，报国把志伸，遨游昆仑上空，俯瞰太平洋滨，看五岳三江，雄关要塞，美丽的锦绣河山，辉映着无敌机群。缅怀先烈莫辜负创业艰辛，发扬光大尤赖我空军军人！同志们努力努力，矢勇矢勤，国祚皇皇万世荣。我们的空军已经实现全面现代化，敌人的飞机一架都休想从此飞过，领空是属于我们的!§!"
 chi_hangmu:0 "不沉的航母"
 chi_hangmu_desc:0 "§L台湾岛是永不沉没的航空母舰！§!"
 chi_huangpujunhun:0 "黄埔军魂"
 chi_huangpujunhun_desc:0 "§L升官发财请往他处,贪生畏死勿入斯门。§!"
 chi_huanxiangtuan:0 "地主还乡团"
 chi_huanxiangtuan2:0 "地主还乡复仇团"
 chi_huanxiangtuan2_desc:0 "§L为了拯救我们岌岌可危的国家，我们将动用一切手段武装地主来对抗共匪，号召他们上山打游击和敌人斗到底！双枪老太婆赵洪文国将成为他们学习的榜样。\n\n§R打回老家去，有仇报仇，有冤报冤！§!"
 chi_huanxiangtuan_desc:0 "§L为了拯救我们岌岌可危的国家，我们将动用一切手段武装地主来对抗共匪，号召他们上山打游击和敌人斗到底！双枪老太婆赵洪文国将成为他们学习的榜样。§!"
 chi_initial_offensive_buff:0 "攻略陕北作战计划"
 chi_initial_offensive_buff_desc:0 "胡宗南将他几年前压箱底的“闪击延安”计划拿出来，改成了“攻略陕北作战计划”，要采取“犁庭扫穴、直捣延安”的闪击计划，如果此计划能够成功，共匪将遭受重大打击!"
 chi_jingong:0 "进攻畅通无阻"
 chi_jinyuanquan:0 "发行金圆券"
 chi_jinyuanquan_desc:0 "§L币制改革、发行金圆券刻不容缓，尽管这会引起民众的不满，但为了对抗共匪迫不得已我们只能这么做。§!"
 chi_kanluan:0 "戡乱总动员"
 chi_kanluan2:0 "戡乱总动员"
 chi_meiguoyuanzhu:0 "中美共同防御条约"
 chi_meiguoyuanzhu_desc:0 "§L《中美共同防御条约》，正式名称是《中华民国与美利坚合众国间共同防御条约》，是中华民国政府与美国政府签订的国际条约。该条约以军事为基础，包含政治、经济、社会等合作条约。根据条约第十条规定，该条约无限期有效，但若一国向对方提出终止通告，则该条约会在该通告发出时刻的整1年后失效。§!"
 chi_neiwubu:0 "内政部调查局"
 chi_neiwubu_desc:0 "§L中国国民党中央执行委员会调查统计局改组为“党员通讯社”后又改为内政部调查局，隶属于中华民国行政院内政部，首任局长为季源溥。§!"
 chi_shijiehuimie:0 "世界毁灭者？？？!!!"
 chi_zhongguoneizhan:0 "中国内战"
 chi_zhongguoneizhan_desc:0 "贸然介入新一轮的中国内战并不是明智的选择。"
 chi_zhongmeitiaoyue:0 "中美友好通商航海条约"
 chi_zhongmeitiaoyue_desc:0 "§L《中美友好通商航海条约》，全称《中华民国与美利坚合众国友好通商航海条约》，中华民国外交部部长王世杰与美国驻华大使司徒雷登于南京签订的国际条约，内容包括：中美永敦睦谊、互相平等国民待遇、互相矿产最惠国待遇、互相进出口不管制、平等税收特权、中美共管领海。§!"
 chi_zhongsutiaoyue:0 "失去中东铁路控制权"
 chi_zhongsutiaoyue_desc:0 "§L苏联现在控制着我们在东北的铁路。§!"
 chi_zhuangjiabudui:0 "中华民国装甲部队"
 chi_zhuangjiabudui_desc:0 "§L加速我们的飞轮前进!迈进迈进!我们是锥之尖,我们是刀之刃,我们是中华民国国军新生命。§!"
 chiang:0 "蒋氏独裁"
 chiang_better:0 "蒋氏独裁"
 chiang_better_desc:0 "尽管民国的开国元勋孙中山先生有民主的意愿，但蒋介石及其亲密盟友以强大的独裁统治中国。不过，这位领导人还是设法让人民相信他的权威。"
 chiang_desc:0 "尽管民国的开国元勛孙中山先生有民主的意愿，但由于国内仍在持续的内乱，蒋介石及其亲密盟友仍以强大的独裁统治中国。"
 chinese_tribute_idea:0 "中方付款"
 dai_li_desc:0 "在加入黄埔军校之前就与蒋相识，戴笠是蒋介石的亲密盟友，并帮助组织了中国最早的情报机构之一。\n\n1932 年，他参与创建三民主义力行社，也称为蓝衣社，但他不是其创始人，只是作为与大众信仰相反的情报部门负责人。\n\n在思想上，他强烈反对共产主义，为中国的情报能力做出了巨大贡献。"
 dangguo_system:0 "党国体制"
 dianziyanjiu:0"电子研究"
 dianziyanjiu_desc:0"知敌知己，百战不惧。知己知敌，一胜必败。不知敌也不知你自己，你将在每一场战斗中屈服。——孙子兵法"
 excavating:0 "挖掘"
 improved_industry:0 "改善工业"
 kung_hsiang_hsi_desc:0 "中国银行家和政治领袖，曾就读于欧柏林和耶鲁大学。 他认为自己是第75代孔子的直系后裔。\n\n在他的整个职业生涯中，他都支持孙中山和蒋介石，他的第一个重要职位是工商部长（1928-31 年）。 1931年后，他加入国民党中央执行委员会。\n\n孔祥熙的金融专长曾多次帮助国民政府，但其方法与行事颇具争议。"
 meiguo_keji:0 "科技专家援华项目"
 national_resource_council:0 "国民政府资源委员会"
 new_life:0 "新生活运动"
 new_life2:0 "新生活运动"
 new_life2_desc:0 "蒋介石在南昌发起社会风气革新运动。运动宣传以“礼义廉耻”“生活军事化”等为口号，从改造国民日常生活入手，以整齐、清洁、简单、朴素等为标准，以图革除陋习，提高国民素质。"
 new_life_desc:0 "蒋介石在南昌发起社会风气革新运动。运动宣传以“礼义廉耻”“生活军事化”等为口号，从改造国民日常生活入手，以整齐、清洁、简单、朴素等为标准，以图革除陋习，提高国民素质。"
 no_proper_equipment_design_no_air:0 "不正规的装备设计"
 no_proper_equipment_design_no_armor:0 "不正规的装备设计"
 no_proper_equipment_design_no_naval:0 "不正规的装备设计"
 oil_exploring:0 "石油勘探"
 reginald_johnston_desc:0 "作为一个对中国佛教着迷的苏格兰人，雷金纳德·庄士敦被任命为13岁的溥仪的导师。 随着时间的推移，他们变得更加熟悉并最终成为彼此的朋友。\n\n1924年清朝灭亡，溥仪被逐出紫禁城后，受命管理威海卫，直至其回归民国。 1931年，庄士敦回到英国，成为伦敦大学中文教授。"
 sanmin_doctrine:0 "三民主义"
 sanmin_doctrine_desc:0 "三民主义，是孙中山先生提出的一种政治哲学，是使中国成为一个自由、繁荣、强大国家的哲学的一部分。这三个原则经常被翻译和概括为：民族、民权、民生。"
 the_blueshirts:0 "[Root.GetBSorTPPYC]"
 the_blueshirts_desc:0 "[Root.GetBSorTPPYC]作为党内组织的意识形态团体起家，初期主要成员来自黄埔军校。 到 1930 年代，它的影响力扩展到军事和政治领域。\n\n但因为它的一些边缘成员表现，现今被担心在党内传递一些不健康的法西斯思想。"
