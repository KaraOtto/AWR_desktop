 advantaged_operational_experts:0 "优势破敌的战略家"
 advantaged_operational_experts_desc:0 "§L这位军官爱好进行碾压式作战，尽可能的减少不必要的伤亡，因此深受士兵们的爱戴。但也导致在局势不明朗时，此将领对发起攻势有所忧虑。§!"
