 yan_an_zheng_feng_text2:0 "§R惩前毖后，治病救人§!"
 yan_an_zheng_feng_text:0 "§R党内长期存在的主观主义、宗派主义与党八股等错误倾向，严重阻碍了马克思主义中国化的进程，也削弱了党应对复杂战局的能力。§!\n\n为彻底肃清这些余毒，以毛泽东同志为核心的党中央在延安发起大规模整风运动。党内将以“团结—批评—团结”的方式，完成党内思想的高度统一，使我党的组\n织力与凝聚力得到质的飞跃，让每一位党员都成为坚定的革命战士。"
