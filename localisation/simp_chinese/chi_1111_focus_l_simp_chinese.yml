CHI_Encirclement_Campaign_focus:0 "围剿运动"
CHI_Encirclement_Campaign_focus_desc:0 "共产主义乃中国最大的威胁。只有铲除它，中华民国才能抵御任何外来威胁。"
CHI_Truce_of_the_Civil_War:0 "停止内战"
CHI_Truce_of_the_Civil_War_desc:0 "日本变得越来越咄咄逼人。与盟友一道对抗敌人远比同时对抗两个敌人要好得多。"
CHI_National_Defense_Council_focus:0 "国防委员会"
CHI_National_Defense_Council_focus_desc:0 "我们需要不惜一切代价来抵抗日本，稍后我们也可以把中国团结在我们的旗帜下。"
CHI_conquer_focus:0 "“隆中对”"
CHI_conquer_focus_desc:0 "1928年初，通过政学系黄郛和熊式辉的引荐，杨永泰结识了蒋介石。杨自幼接受严格的旧式教育，又曾留学日本，接受过系统的西式教育，故“既擅文事，又长武备；既懂立法，又精行政”，加之对于“天下大事”观察已久，故与蒋介石见面之初便发表了宏韬大略：/n当今天下，广西第七军横行两湖，李济深负隅两广，白崇禧收编了唐生智残部三个军，称霸一方，三分天下有其一，如勾结冯、阎，则南京无法立足。好在桂系的政敌俞作柏能拆李宗仁的台，唐生智也可以收回旧部为辞进逼白崇禧，再用重金收买冯玉祥的大将韩复榘、石友三等，则李宗仁、白崇禧的势力就不难瓦解。/n杨永泰将其“削藩”策略概括为：以经济方法瓦解冯玉祥的第二集团军，以政治方法解决阎锡山的第三集团军，以军事方法解决李宗仁的第四集团军，以外交方法对付张学良的东北军。"
CHI_delaying_tactics_focus:0 "拖延战术"
CHI_delaying_tactics_focus_desc:0 "我们将设法与日本人举行和谈，以争取到一些时间。"
CHI_once_more_focus:0 "进一步的和谈"
CHI_once_more_focus_desc:0 "我们将设法与日本人举行和谈，以争取到更多时间。"
united_and_ready:0 "团结一致并做好准备"
united_and_ready_desc:0 "团结则存，分裂则亡。中国人民已经成功实现了统一。现在我们终于可以一起保卫我们的家园了。"
CHI_war_xinjiang:0 "对新疆用兵"
CHI_war_xinjiang_desc:0 "谈判需要花费太多时间和精力。战争是夺回新疆最快也是唯一可行的方式。"
