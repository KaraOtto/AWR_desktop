l_simp_chinese:
 CHI_Faction_Research_tt:0 "我们将加入§Y阵营研究§!。"
 CHI_anti_opposition_campaigns:0 "以武力夺取地方领导权"
 CHI_change_to_japanese_puppet:0 "与日本合作"
 CHI_change_to_japanese_puppet_desc:0 "我们得到日本的支持和保护。 我们应该改变我们的方式并进一步合作以充分利用这种情况。"
 CHI_clash_with_the_central_government_focus:0 "对抗中央政府"
 CHI_clash_with_the_central_government_focus_desc:0 "我们不能冒险地进行全面的战争。小规模且可控的冲突容许我们在不会被彻底击垮的同时获得珍贵的土地。在理想的情况下，当对手的军队被调派离开的时候，我们就会马上发起攻击。"
 CHI_communist_administrators:0 "社会主义官员"
 CHI_cooperation_with_the_nationalists:0 "保持与国民党的亲善关系"
 CHI_cooperation_with_the_nationalists_desc:0 "国民党是共和国的基础。无论我们在内部有多大的斗争，我们都要保持与国民党的良好关系，扩大我们在国民党内的影响力。"
 CHI_democratic_party:0 "中国国家社会党"
 CHI_flying_tiger_tt:0 "读取§Y飞虎队§!的战斗序列"
 CHI_foreign_help_focus:0 "寻求外国军事援助"
 CHI_join_the_republican_government:0 "改组政府领导层"
 CHI_leaves_the_KMT:0 "离开国民党"
 CHI_leaves_the_KMT_desc:0 "既然我们已经在这个地区建立了我们的支持和权威，就没有必要再留在国民党了。是时候走我们自己的路，挑战他们的权威了。"
 CHI_neutrality_party:0 "中国国民党"
 CHI_new_model_province:0 "组织党内反对派"
 CHI_power_struggle:0 "挑战国家领导权"
 CHI_will_be_notified_and_may_negotiate_with_us:0 "§R国民政府将收到通知，并可能提出透过组织政协会议以实现联合政府达成和平。§!\n"
 CNSP_become_ruling_party_politics_tt:0 "政局将会发生变化：\n§C民主社会党§!成为执政党。\n将不会举行公开选举。\n\n"
 CPC_become_ruling_party_politics_tt:0 "政局将会发生变化：\n§Y中国共产党§!成为执政党。\n将不会举行公开选举。\n\n"
 JPG_only_show_up_in_war_time_tt:0 "§C这个决议只会在战时出现。§!"
 KMT_will_become_a_democratic_party_tt:0 "政局将会发生变化：\n§Y国民党§!成为民主政党。\n将不会举行公开选举。\n\n"
 KMT_will_become_a_fascist_party_tt:0 "政局将会发生变化：\n§Y国民党§!成为法西斯党。\n将不会举行公开选举。\n\n"
 NXM_recruit_talents:0 "招募人才"
 NXM_recruit_talents_desc:0 " "
 PRC_Befriend_Tibet:0 "交好西藏"
 PRC_Befriend_Tibet_desc:0 "西藏可能是一个叛乱的省份，但通过外交手段，我们可以恢复宗主权。"
 PRC_Demand_Outer_Mongolia:0 "索取外蒙古"
 PRC_Demand_Outer_Mongolia_desc:0 "《蒙苏议定书》是对中国领土完整的公然侵犯。在拒绝中国宗主权的情况下，我们宣布苏联和蒙古人违反了《恰克图条约》。因此，我们要求回到1911年以前的边界！"
 PRC_Faction_Research:0 "阵营研究"
 PRC_Faction_Research_desc:0 "我们从参与第一次世界大战中获得了巨大的政治资本。同样地，加入一个主要阵营可以为我们提供难以置信的技术援助和指导。"
 PRC_Isolationism:0 "孤立主义"
 PRC_Isolationism_desc:0 "我们自身的问题已经够多了，我们不需要卷入进一步的冲突。我们将采取中立的政策。"
 PRC_Tibet_Ultimatum:0 "给西藏下最后通牒"
 PRC_Tibet_Ultimatum_desc:0 "西藏是一个叛乱的省份，他们将自愿或通过武力屈服于我们的权力。"
 PRC_WRL_Concession_or_cede:0 "索取列强租界"
 PRC_WRL_Concession_or_cede_desc:0 "前领导层根据领土不平等条约，允许外国列强窃取中国的合法领土。作为中国的新领导层，我们将纠正这一错误。"
 PRC_WRL_War_of_Liberation:0 "解放战争"
 PRC_WRL_War_of_Liberation_desc:0 "反动政府仍然对我们怀有敌意。要真正建立一个人民的国家，就必须打一场解放战争！"
 PRC_a_new_country_tt:0 "新国家§Y中华人民共和国§!将成立。\n"
 PRC_allies_help_diplo_focus:0 "新平等条约"
 PRC_allies_help_diplo_focus_desc:0 "在经历了近一个世纪的不平等条约之后，美国和大英帝国现在终于可以重新谈判我们的贸易协定了。一旦条约签署，我们最终可以发展成一个健康的经济体。"
 PRC_befriend_india:0 "交好印度"
 PRC_befriend_india_desc:0 "在我们最黑暗的时代，英属印度在我们全面战争中鼎力扶持，这使他们成为我们的天然盟友。"
 PRC_befriend_mongolia:0 "交好外蒙古"
 PRC_befriend_mongolia_desc:0 "外蒙古可以充当中国和苏联之间的缓冲区。与他们保持外交关系并向他们提供支持将大有裨益。"
 PRC_communism_party:0 "中国共产党"
 PRC_fighter_purchases:0 "购买战斗机"
 PRC_fighter_purchases_desc:0 "我们的空军需要一些现代化的战机来应对外来威胁。很遗憾，我们的工业体系暂时无法生产这些现代化的战机，所以我们必须从国外购买。"
 PRC_invite_the_seven_gentlemen:0 "邀请“七君子”"
 PRC_invite_the_seven_gentlemen_desc:0 "1936年末，有一群自由左倾的抗日积极分子遭国民党陷害和攻击。他们中的很多人都是一个新成立的激进组织的成员，这个组织叫做“救国联合会”。这个组织的目标是结束中国内部的内讧，反击日本侵略。在他们的支持下，我们可以推进我们的事业。"
 PRC_joint_tank_development:0 "联合坦克设计"
 PRC_joint_tank_development_desc:0 "在与苏联设计师合作并获得经验后，我们应该成立联合设计团队来更好地协调我们之间的工作并互相学习。"
 PRC_modern_logistics:0 "现代后勤"
 PRC_modern_logistics_desc:0 "没有有效的后勤系统，我们就没办法维持一支可战斗的军队。"
 PRC_partisan_offensive_WRL:0 "游击队攻势"
 PRC_partisan_offensive_WRL_desc:0 "我们将把重点放在更多的敌方地区，并在这些地区改造和招募更多的人。"
 PRC_purchase_tanks:0 "购买坦克"
 PRC_purchase_tanks_desc:0 "装甲车辆将会成为现代战争的先锋。我们应该适当地购买一些坦克来为组建中国的第一支装甲部队作好准备。"
 PRC_renounce_the_mcmahon_line:0 "否认麦克马洪线"
 PRC_renounce_the_mcmahon_line_desc:0 "尽管英国人假装尊重这条边界线，但旧帝国政府和英国人订立的这条边界线根本就不合理。过去数十年我们实力太弱，无法来挑战这条边界线，但现在情况不一样了。"
 PRC_reorganize_the_government:0 "重组政府"
 PRC_reorganize_the_government_desc:0 "重组政府可以帮助我们巩固领导地位，并为国家而努力。"
 PRC_socialism_with_chinese_characteristics:0 "中国特色社会主义"
 PRC_sov_pact_focus:0 "中苏中立条约"
 PRC_sov_pact_focus_desc:0 "要保持与苏联的良好关系，一个中苏中立条约是很重要的。"
 PRC_support_from_allies:0 "同盟国援助"
 PRC_support_from_allies_desc:0 "同盟国和我们一样都有反法西斯的战争目标。请求他们的援助来击退帝国主义者似乎是一个明智的想法。"
 PRC_support_from_comintern:0 "共产国际的支持"
 PRC_support_from_comintern_desc:0 "共产国际中的国家与我们有著相似的理想。世界上各地的社会主义者需要在这个困难时期团结起来。"
 RCM_communist_infiltration_tt:0 "\n§Y游击队攻势§!可以煽动不同地区的共产党游击队活动。\n\n§C可以通过显示在地区窗口旁边的面板，在选择受影响地区执行行动。§!"
 SIK_a_new_provincial_government:0 "新省政府"
 SIK_a_new_provincial_government_desc:0 "现在我们已经解决了大部分问题，是时候建立一个新的省政府了。"
 SIK_declare_independence_from_china:0 "宣布独立"
 SIK_declare_independence_from_china_desc:0 "我们将宣布东突厥斯坦独立！"
 SIK_develop_sinkiang:0 "开发新疆"
 SIK_develop_sinkiang_desc:0 "我们应该开始开发新疆，毕竟它还很落后。"
 SIK_pacify_the_unrests:0 "平息骚乱"
 SIK_pacify_the_unrests_desc:0 "我们应该平息上次叛乱造成的动乱。"
 SIK_rail_transport:0 "加强铁路建设"
 SIK_rail_transport_desc:0 "新疆基础设施缺乏，特别是铁路，应该尽快开工建设。"
 SIK_suppress_separatism:0 "镇压分裂主义"
 SIK_suppress_separatism_desc:0 "作为民国的一个地方派系，我们不能允许任何分裂主义运动。"
 SIK_the_defeat_of_sheng_shicai:0 "迪化之战"
 SIK_the_defeat_of_sheng_shicai_desc:0 "新疆人民多年来深受盛世才之害，是时候除掉这个暴君，解放新疆了！"
 SIK_the_new_east_turkestan:0 "新东突厥斯坦"
 SIK_the_new_east_turkestan_desc:0 "是时候重振东突独立运动了。"
 SIK_the_next_king_of_sinkiang:0 "下一个新疆王"
 SIK_the_next_king_of_sinkiang_desc:0 "我们将以武力一统新疆。"
 SIK_united_province_of_sinkiang:0 "和平的新疆"
 SIK_united_province_of_sinkiang_desc:0 "新疆这几年一直在战乱，我们应该保持中立，并开始重建新疆。"
