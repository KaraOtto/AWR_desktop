history_hide.1.t:0 "莫斯科保卫战"
history_hide.1.desc:0 "[This.GetNewsIcon]随着“台风行动”的顺利进行，德军的先头部队已经挺进至莫斯科郊外32公里处，有传言道德军的一支侦察小队甚至已经能够望见克里姆林宫的塔尖。在此危急时刻，莫斯科红场仍如期举办了十月革命24周年阅兵式。参加阅兵式的红军士兵们全体荷枪实弹，在接受检阅后便直接开赴莫斯科城外的前线参加战斗。苏联最高领导人[SOVGetLeader]在阅兵式讲话中说道：“我们的国家正在遭到入侵，全体苏维埃公民和军队都要不惜用尽每一滴鲜血来保卫苏维埃土地和村庄！”当天苏联所有广播站都播放了这次演讲。这无疑向全世界表明了苏联战斗到底的决心。"
history_hide.1.a:0 "苏联虽大，但我们已无路可退！"
history_hide.1.b:0 "任何抵抗都是徒劳的！"
history_hide.1.c:0 "世界的目光聚焦于莫斯科"
history_hide.002.t:0"红场阅兵"
history_hide.002.d:0"我们能够并且一定战胜德国侵略者，这样难道可以怀疑么？\n敌人并不像某些惊慌失措的知识分子所形容的那样厉害。鬼并不像人们所描述的那样可怕。谁能否认，我们红军曾屡次把轰动一时的德军击得仓皇逃窜呢？如果不妄信德国宣传家的夸张声明，而去按照德国真实状况来判断，那就不难了解德国法西斯侵略者是处在大破产的面前。\n现在德国笼罩着饥饿和贫困，在四个月的战争中，德国损失了四百五十万士兵，德国流血殆尽，他的人员后备正在穷竭，愤恨的精神不仅浸入到那些陷在德国侵略者压迫下的欧洲各国人民中，而且浸入到感于战争结束无期的德国本国人民中。德国侵略者正在紧张其最后的力量。毫无疑问，德国决不能长久支持这种紧张局面。再过几个月，再过半年，也许一年——而希特勒德国就定会在其深重罪孽下破碎的。\n红军和红海军战士，指挥员和政治工作人员，游击队男女队员同志们！全世界都望着你们，认定你们是能够消灭德国侵略者匪军的力量。陷在德国侵略者枷锁下被奴役的欧洲各国人民都指望着你们，认定你们是他们的解放者。伟大的解放使命落到你们的肩上。要不愧为这个使命的承担者呵！你们所进行的战争是解放的战争，正义的战争。\n让我们的伟大祖先亚历山大·涅夫斯基、季米特里·顿斯科伊、库兹马·米宁、季米特里·波札尔斯基、亚历山大·苏沃洛夫、米哈伊尔·库图佐夫的英姿，在这次战争中鼓舞着你们吧！让伟大列宁的胜利旗帜指引着你们吧！\n\n为完全粉碎德寇而战！\n\n消灭德寇!\n\n我们光荣的祖国万岁！我们祖国的自由和独立万岁！\n\n在列宁旗帜下向胜利前进！\n\n————斯大林1941年11月7日《红场演讲》片段"
history_hide.002.a:0"大地在我们脚下颤抖，敌人在这里找到坟墓！"
history_hide.994.t:0"波罗的海国家问题"
history_hide.994.d:0"德国对波兰开战时，德国海军对驻泊在但泽港的波兰海军潜艇进行围剿，“苍鹰”号潜艇被迫逃到爱沙尼亚首都塔林港避难。爱沙尼亚政府根据德国的要求，对潜艇进行了扣押，然而出于对被苏德夹击而亡国的波兰的同情，爱沙尼亚对扣留潜艇的看管并不严格，导致波兰水兵夺艇而逃。\n\n潜艇出逃事件爆发后，与德国人的无所谓形成鲜明对比的是，苏联对此倾注了极大的人情，硬是认为潜艇出逃是爱沙尼亚政府有意为之，并以此为借口进行军事干涉。苏联真理报发布声明：“有充分证据表明，在波罗的海国家某些政府人士庇护下，波兰潜艇兵目前正隐藏在这几国的海港之内。据一些情报显示，除波兰潜艇外，那里还藏着一些其他国家的潜艇。由此推测，在9月18日，爱沙尼亚当局蓄意放走了波兰潜艇。我红旗波罗的海舰队将采取必要措施，对隐藏在波罗的海水域的潜艇加以防范。”\n\n随后，连续派出军舰和飞机入侵爱沙尼亚的领海和领空。在后面的爱沙尼亚外长瑟尔特尔和苏联二号人物莫洛托夫的交涉中，莫洛托夫认为爱沙尼亚无视苏联对于国家安全的关切，故意放走波兰潜艇，体现爱沙尼亚不想或者不能维持本国秩序，对此，苏联提议缔结军事同盟或互助条约，以保证苏联有权在爱沙尼亚领土获得军事基地。\n\n同时还提出“如果您不同意我们的建议，那么，苏联就会根据自己的愿望，不经爱沙尼亚的同意，用其他方法实现自己的安全措施。”\n\n孤立无援的爱沙尼亚只能妥协，与苏联签订《苏爱互助条约》，苏联获得了在爱沙尼亚驻军和建设军事基地的权力。在此之后，苏联如法炮制，分别与拉脱维亚和立陶宛签订互助条约，正式将波罗的海三国纳入自己的势力范围。\n\n不久之后，在立陶宛的一名苏军士兵失踪，我国政府认为这一事件不是简单的孤立问题，其背后有立陶宛政府的支持，“苏联政府认为，立陶宛政府机关必须制止其内部个别间谍的这种行为，寻找失踪的苏联士兵，否则苏联将采取其他措施。”\n\n随后，在苏联的支持下，立陶宛共产党发表《告工人农民书》，指责立陶宛政府没有忠实执行与苏联的条约，致使国家处在危险的边缘，号召人民参加反对政府的斗争，坚决要求政府下台。\n\n立陶宛政府被迫解散，改由苏联支持的立陶宛共产党执政，组建亲苏的新政府，于此同时，爱沙尼亚和拉脱维亚同样也落入我们的手中。在波罗的海三国亲苏政府的运作下，爱沙尼亚、立陶宛、拉脱维亚成为苏联第十三、十四、十五个加盟共和国。"
history_hide.994.a:0"这是我们维持波罗的海边境安全的必要手段！"
history_hide.13.t:0"托洛茨基回国"
history_hide.13.d:0"今日早晨，莫斯科伏努科沃机场戒备森严。斯大林身着元帅制服亲抵第二跑道，在莫洛托夫、卡冈诺维奇等政治局委员陪同下，迎接流亡九年的托洛茨基。当伊尔-12运输机舱门开启，斯大林主动上前扶住托洛茨基手肘，现场内务部部队齐呼“乌拉”。午间，克里姆林宫发布第178号主席团令:\n\n1.恢复托洛茨基党籍及中央委员职务（1927年开除)\n2.任命为重工业人民委员（分管第聂伯联合体等军工体系)\n3.授予国防委员会常务顾问席（列席总参谋部战略会议)\n\n次日的《真理报》头版刊载两人握手照片，标题《革命之鹰归巢》，下附斯大林声明:“历史证明，分裂只会削弱工人阶级力量——此刻需要所有布尔什维克团结在列宁旗帜下。”"
history_hide.13.a:0"团结一致的全联盟共产党将战无不胜！"
