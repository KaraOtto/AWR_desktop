 armor_bonus:0 "装甲加成"
 blank_line:0 " "
 boost_communism_neighbor_tt:0 "提高邻国的§H共产主义§!支持率以观其效果。"
 china_will_send_zhang_zhizhong_over_tt:0 "§C盛世才被撤职后，国府将派张治中过去一段时间。§!"
 create_generic_faction_tt:0 "创建阵营: §Y[Root.GetAdjective]联盟§!"
