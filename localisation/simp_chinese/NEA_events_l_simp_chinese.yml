l_simp_chinese:
 AWR_NEA.1.t:0 "共产党人希望安排默许停战以避免伤亡"
 AWR_NEA.1.d:0 "共产党人今天秘密緻函我们，希望我们与他们达成默契，以免造成不必要的牺牲。我们大多数人都同情共产党，也对南京对日本侵略的不作为而感到愤怒。然而，安排这样的事情是非常棘手的。我们该如何回应？"
 AWR_NEA.1.a:0 "中国人不打中国人。我们会安排默许停战。"
 AWR_NEA.1.b:0 "我们理解他们的事业，但他们的影响太大了，我们现在不能这样做。"
 AWR_NEA.2.t:0 "[CHI.GetLeader]抵达西安"
 AWR_NEA.2.d:0 "中央政府声称，我们和共产党军队之间有一个所谓的默许的停战协议，原因他们尚未证实。[CHI.GetLeader]已经决定访问西安并与我们会面，以澄清事情的结果。"
 AWR_NEA.2.a:0 "嗯，也许我们可以做点什么......"

 

 

 

 
