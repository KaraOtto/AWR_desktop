 POLITICS_CHIANG_KAISHEK_DESC:0 "蒋中正委员长无疑是一位掌控国民党和中华民国的有实力的政治家。自参加辛亥革命后，他在中国共和运动中迅速崛起，并成为孙中山的追随者。孙中山死后，蒋中正利用廖仲恺、胡汉民、汪精卫之间的权力斗争，在广州政变（即三二〇事件，中山舰事件）中罢免了汪精卫，引发了后续两人间的竞争。夺取政权后，他领导国民党发起北伐战争。北伐途中，他对中国共产党的清洗显示了他的反共立场。在国民党统一全国之后，蒋中正带给了中国一个经济相对稳定和工业发展起步的时代。"
