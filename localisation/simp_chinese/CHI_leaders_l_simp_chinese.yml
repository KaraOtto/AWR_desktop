 CHI_wellington_koo:0 "顾维钧"
 CHI_wellington_koo_desc:0 "顾维钧，1887 年出生于上海，是一位娴熟的外交官。顾曾在哥伦比亚大学接受教育（1908 年学士；1909 年硕士；1912 年博士），在那里他专攻国际法。\n\n1912年，顾惠灵顿担任中国国家主席袁世凯的秘书。他曾担任巴黎和会代表（1919年），然后是同盟理事会的代表国家。在不同时期，他担任外交部长。"
