 CHI_wu_shi_desc:0 "吴石（1894年9月14日-1950年6月10日），原名萃文，字虞薰，号湛然，福建省闽侯县螺洲乡人，先后毕业于保定军校第三期炮兵科、日本东京炮兵专科学校、日本陆军大学，1936年陆军少将，1944年晋升陆军中将。"
