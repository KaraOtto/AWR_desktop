#####start_events
 start_events.1.t:0 "欢迎游玩《全面抗战》！"
 start_events.1.desc:0 "如各位希望的那样，《八年抗战优化补充整合版》回来了！除了清掉了前Mod中的大量bug，我们对所有主要国家的数值做出了新的调整，除去了逆天buff等情况带来的影响，同时对近些年来的DLC做了更好的适配，在非mod国家中也可以正常游玩DLC内容！\n\n除此之外，下面的建议或许能够帮助您更享受这款MOD：\n      1.关注一开始所拥有的民族精神！关注一开始所拥有的民族精神！这可以帮助您了解这个国家的现状，并帮助您了解该如何才能避免一些不好的事情发生，亦或者获得DEBUFF。\n      2.时常确认决议的状况：有时候一些重要的事情会在决议当中说明，经常检查决议的状况以确保你不会错过。\n      3.阅读提示：在此MOD中，特别是一些信息将会被高亮显示，这些通常都是有用的讯息。"
 start_events.1.a:0 "谢谢！我现在明白了。"
 start_events.2.t:0 "中华苏维埃共和国的注意事项"
 start_events.2.desc:0 "整合版对于中华苏维埃共和国进行了一系列的加强，提升了它的产能，获取工厂的数量及一系列buff，但这些需要时间来发育，所以不要急于战斗，以下是其他的注意事项：\n    1.日本在中国战场上获取一定成果后，地图上会出现“未经计划的攻势”，保证中央政府不会突然暴毙，但也要抓紧时间，因为ai可以用决议消除；\n    2.“联系张学良”：“联系张学良”国策能让你与东北军达成默契的休战（在游戏中会以非军事区表示），确保国民党不会直接攻击你。少帅只有看到你抗日的决心才会同意停战，所以要考虑好开局扩张的方向；\n    3.PRC在国共内战未开始前，主要的扩张方式为游击队的武装起义，注意敌后抗战相关国策。"
 start_events.2.a:0 "谢谢！我现在明白了。"
 start_events.3.t:0 "我应该如何消去那些debuff？"
 start_events.3.desc:0 "日本是一个工业强国，但中国是一个患病的巨人，想征服他，你只能尝试以最快的速度将其灭掉，不要尝试多线作战。这很容易让本就不稳定的经济崩溃。\n当前的国策可能无法移除一些debuff，就算你选择了一些相关的分支国策也是一样。但是不用担心，一旦你解锁了相关的新国策树，这些debuff就能够被移除。"
 start_events.3.a:0 "谢谢！我现在明白了。"
