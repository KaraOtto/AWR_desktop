ger_call_jap_into_war_desc:0 "随着苏联各大主要城市的沦陷，是时候要求日本人履行他们的盟友义务了。"
ITA_invite_rommel:0 "请求德国支援非洲战事"
ITA_invite_rommel_desc:0 "目前我军在非洲战场的形式正急剧恶化，同盟国军队已经逼近班加西，向德国求援或许能够扭转目前的不利战局。"
GER_erwin_rommel.1.t:0 "意大利请求我国出兵增援北非战场"
GER_erwin_rommel.1.desc:0 "目前意大利军队在非洲战场的形式正急剧恶化，同盟国军队已经逼近班加西，为此意大利政府向我国求援以扭转目前的不利战局。"
GER_erwin_rommel.1.a:0 "隆美尔将军或能担此重任"
GER_erwin_rommel.1.b:0 "我们已经自顾不暇了！"
GER_erwin_rommel.2.t:0 "德国同意了我们的出兵请求"
GER_erwin_rommel.2.desc:0 ""
GER_erwin_rommel.2.a:0 "太好了！"
GER_erwin_rommel.2.b:0 "我们已经自顾不暇了！"
GER_erwin_rommel_go_to_africa:0 "§Y隆美尔将军指挥的非洲军团将会接管北非战场的指挥权§!"
shamozhihu:0 "沙漠之狐"
GER_erwin_rommel_in_africa_army:0 "德意志非洲军团"
GER_erwin_rommel_in_africa_army_desc:0 "自意大利军队在北非战场遭遇了一系列重大失败之后，德国国防军最高统帅部决定派遣远征军到利比亚以支援意大利军，抵抗盟军名为罗盘行动（Operation Compass）的反击。德国远征军由隆美尔指挥，最初只包括第五装甲团以及许多小部队。这些部队在2月抵达非洲时组成了第五轻装甲师。第十五轻装甲师在春天加入了第五轻装甲师，即使他们在隆美尔反攻并重夺昔兰尼加的大部份区域后转为防守时才到达。此时非洲军团由两个师和好几个支援部队，并隶属于意大利于最初只有第21装甲师的前身——第5轻装师，以及少量的第15装甲师部队，总人数大约在1万人左右。后来又有补充，较长时间的编制为：第15装甲师和第21装甲师编为“非洲军”，第90轻装师和“非洲军”以及意大利部队一起编为德国非洲军，总人数维持在3-4万之间。"
zizhinews.43.t:0 "德国组建非洲军团"
zizhinews.43.desc:0 "[This.GetNewsIcon]自意大利军队在北非战场遭遇了一系列重大失败之后，德国国防军最高统帅部决定派遣远征军到利比亚以支援意大利军，抵抗盟军名为罗盘行动（Operation Compass）的反击。德国远征军由隆美尔指挥，最初只包括第五装甲团以及许多小部队。这些部队在2月抵达非洲时组成了第五轻装甲师。第十五轻装甲师在春天加入了第五轻装甲师，即使他们在隆美尔反攻并重夺昔兰尼加的大部份区域后转为防守时才到达。此时非洲军团由两个师和好几个支援部队，并隶属于意大利于最初只有第21装甲师的前身——第5轻装师，以及少量的第15装甲师部队，总人数大约在1万人左右。后来又有补充，较长时间的编制为：第15装甲师和第21装甲师编为“非洲军”，第90轻装师和“非洲军”以及意大利部队一起编为德国非洲军，总人数维持在3-4万之间。"
zizhinews.43.a:0 "这将迅速扭转北非的战局！"
zizhinews.43.b:0 "不速之客......"
zizhinews.43.c:0 "看来意大利这个盟友并不可靠啊"
zizhinews.43.d:0 "短暂而伟大的友谊"
zizhinews.43.e:0 "耻辱！"
GER_barbar_east_waijunchu:0 "东线外军处"
GER_barbar_east_waijunchu_desc:0 "“东线外军处”是德国“§R有史以来§!”最为“§R出色§!”的“§R情报部门§!”，其承担了对苏作战的绝大部分情报工作。"  
GER_barbar_east_waijunchu_2:0 "东线外军处"  
GER_barbar_east_waijunchu_desc:0 "“东线外军处”是德国有史以来最为出色的情报部门，其承担了对苏作战的绝大部分情报工作，并发挥了重大的积极作用。"  
ger_reform_intelegenc:0 "改革情报机构" 
ger_reform_intelegenc_desc:0 "我国情报部门的效率之低、能力之差已经到了令人发指的地步，一场针对情报机构的全面改革迫在眉睫。" 
CHI_yuanzhuhuibao:0 "对华军事援助回报"
CHI_yuanzhuhuibao_desc:0 "对中国的军事援助为我们换回了丰富的稀有金属矿产。\n§Y§Y一旦与中国的合作关系破裂我们将失去这些回馈§!§!"
CHI_yuanzhuhuibao_2:0 "对华军事援助回报"
CHI_yuanzhuhuibao_2_desc:0 "对中国的军事援助为我们换回了丰富的稀有金属矿产。\n§Y§Y一旦与中国的合作关系破裂我们将失去这些回馈§!§!"
ger_zhuhuajunshiguwentuan:0 "驻华军事顾问团"
ger_zhuhuajunshiguwentuan_desc:0 "对中国的军事援助不仅为我们换回了丰富的稀有金属矿产，也为我们的军事人才培养提供了实践机会。\n§Y§Y一旦与中国的合作关系破裂我们将失去这些回馈§!§!"
GER_enigma_machine0:0 "恩尼格玛密码机"
GER_enigma_machine0_desc:0 "在密码学史中，恩尼格玛密码机（德语：Enigma，又译哑谜机，或“谜”式密码机）是一种用于加密与解密文件的密码机。确切地说，恩尼格玛是对二战时期纳粹德国使用的一系列相似的转子机械加解密机器的统称，它包括了许多不同的型号，为密码学对称加密算法的流加密。"
GER_enigma:0 "改进恩尼格玛密码机"
GER_enigma_desc:0 "对恩尼格玛密码机加密方法的持续研究可能会产生惊人的结果，使我们能在面对敌人时进一步隐藏自己的战略通信。"
GER_aux_police_SS_idea:0 "党卫队国家安全部"
GER_aux_police_SS_idea_desc:0 "党卫队国家安全部（德语：SS-Reichssicherheitshauptamt，也称为国家保安总部、国家保安本部、国家保安总局、国家安全总局、帝国保安总部、帝国中央安全局、帝国保安总局）组建于1939年，由党卫队保安局与纳粹德国内政部下属的治安警察合并而成，是纳粹德国重要的情报与反情报部门，第一任部长为党卫队上级集团领袖、警察大将莱因哈德·海德里希。"
GER_combine_anquanjingcha_gestapo:0 "合并治安警察与盖世太保"
GER_combine_anquanjingcha_gestapo_desc:0 "为适应战争形势下的国家安全与反间谍要求，党卫队全国领袖兼纳粹德国内政部警察总监海因里希·希姆莱下令将党卫队保安局与纳粹德国内政部下属的治安警察合并以提高安全部门的措施执行效率。"
GER_form_the_dangweiduiguojiaanquanbu:0 "成立党卫队国家安全部"
GER_form_the_dangweiduiguojiaanquanbu_desc:0 "海德里希自加入党卫队以来便深受元首的信赖和器重，元首特意指定由他出任党卫队国家安全部部长一职，这将大大改善我国的政治安全局面和情报侦察能力。"
nazi_zhanshouguan:0 "纳粹斩首官"
GER_Reinhard_Heydrich:0 "莱因哈德·海德里希"
GER_Reinhard_Heydrich_desc:0 "莱因哈德·特里斯坦·欧根·海德里希，德国党卫队全国副总指挥兼警察上将，德国纳粹党党卫队的重要成员之一，地位仅次于希姆莱，而且希特勒有意培养海德里希为自己的接班人；由于行事极其残酷，而有着“金发的野兽”、“铁石心肠的人”、“纳粹的斩首官”、“死亡的追随者”、“纳粹魔王”、“第三帝国的黑太子”等许多恐怖称号。"
GER_operation_attack_poland:0"白色方案"
GER_operation_attack_poland_desc:0"鉴于波兰的态度，不仅需要使修改后的东部边界有安全保障，而且还需要进行军事准备，以便在必要时永远消除来自这一方向的各种威胁。\n德国同波兰的关系仍然要遵循避免引起骚乱的原则。如果波兰改变其迄今基于同样原则的对德政策，转而采取对帝国进行威胁的态度，那么，同它进行最终清算就有可能势在必行。\n要达到的目的是，粉碎波兰的防御力量，在东面造成一种能满足国防需要的态势。最迟在冲突开始时，宣布但泽共和国为德意志帝国的领土。\n政治当局认为自己的任务是：在上述情况下必须尽可能地使波兰孤立，即把战争局限在波兰进行。这种局面在不太远的将来就可能出现，因为法国的内部危机日益加剧，英国会因此而采取克制态度。\n俄国的干预（它有能力这样做）很可能对波兰毫无益处，而仅仅意味着波兰被布尔什维主义吞并。\n越能成功地以突然、猛烈的打击开始战争，并迅速取得胜利，就越容易使波兰处于孤立地位，即使在战争爆发以后也是如此。\n在进军波兰时，要针对周边国家特别是立陶宛采取警戒措施。国防军的任务是歼灭波兰的军事力量。为达到此目的，必须做好准备，力求达成进攻的突然性。\n计划用于防守西部边界的兵力暂时不得另行调用。对立陶宛须保持警惕，对其余边界只须进行监视。"
GER_barbarossa_ai:0"巴巴罗萨行动"
GER_barbarossa_ai_desc:0"“面对东线边境日益增长的威胁，帝国已别无选择。[SOV.getname]在我们面前集结了庞大兵力，其行动表明战争的阴影正迅速逼近。为了德国的安全，为了欧洲的未来，我们必须先发制人。国防军自此肩负起沉重而决定性的使命：粉碎红军的武装力量，确保帝国在东方的生存空间。现在，我们踏上这场关乎国家命运的斗争。”"
GER_barbarossa_player:0"巴巴罗萨行动"
GER_barbarossa_player_desc:0"“面对东线边境日益增长的威胁，帝国已别无选择。[SOV.getname]在我们面前集结了庞大兵力，其行动表明战争的阴影正迅速逼近。为了德国的安全，为了欧洲的未来，我们必须先发制人。国防军自此肩负起沉重而决定性的使命：粉碎红军的武装力量，确保帝国在东方的生存空间。现在，我们踏上这场关乎国家命运的斗争。”"
GER_barbar_prepare:0"巴巴罗萨行动-准备阶段"
gepeier:0 "论总体战"
zizhinews.14.t:0 "戈培尔发表《论总体战》演说"
zizhinews.14.a:0 "是的，我们想要一场总体战争！"
zizhinews.14.b:0 "疯子！"
zizhinews.14.c:0 "德国人要动真格了？"
zizhinews.14.desc:0 "[This.GetNewsIcon]“仅仅在三周以前，我站在这里宣读纳粹党执政10周年的元首宣言，向你们和德国人民发表演讲。在东线我们所面临的危机已经达到最严重的程度。在伏尔加河畔的战斗中，在国家遭遇严重的不幸期间，在1月30日的群众大会中，我们齐聚一堂来展现我们的团结一致以及坚强意志来战胜我们所面临的战争第四个年头的困难。”\n.......\n“在东线我们面临着一次严峻的军事挑战。当前，这是一次广泛的危机，与去年冬天的危机在很多方面相似但不尽相同。一会儿我们再讨论原因所在。现在，我们必须接受现实，并发现和运用方式方法来扭转形势以对我们再次有利。争论形势的严重性已毫无意义。我不想给你们留下一个对形势的错误印象，并因此得出错误的结论，或许给德国人民一种在当前形势下完全不合时宜的错误安全感。”\n.......\n“我问你们，你们是否想要总体战？如果有必要，是否想要一场比我们以前能想象的更总体和彻底的战争？”\n\n-约瑟夫·戈培尔“论总体战”演讲片段"
sour_loser_desc:0"\n痛苦啊，你就是我的唯一。\n除了你，我皆无欲求。\n痛苦啊，你忠实地陪伴着我，直至现在也没有一丝改变。\n当我的灵魂徘徊于深渊之底时。\n唯有你相伴在我的身旁，守护着我。\n我又怎能埋怨你呢。\n痛苦啊，你绝不会从我的身旁遁走。\n我终于能够表达对你的尊敬。\n现在也认识到了你的存在。\n而你只是存在于世，就已那么美丽。\n痛苦啊，你就像那从未离开我那贫苦的心之火炉旁的人一样。\n比我那身为至爱的恋人还要多情。\n我知道在我迈向死亡的那一天。\n你会进到我的内心深处。\n与我并排躺下。"
