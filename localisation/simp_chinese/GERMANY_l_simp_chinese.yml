GER_operation_barbarossa_modded:0 "巴巴罗萨行动"   
GER_operation_barbarossa_modded_desc:0 "所向披靡的德意志军队将分为北、中、南三个集团军群向腐朽的共产主义苏联发起突袭，我们只需轻轻踹上一脚，这座腐朽破烂的房子便会轰然倒塌，没有什么能够阻挡德意志前进的步伐！"   
