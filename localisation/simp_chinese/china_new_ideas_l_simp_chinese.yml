CHI_never_surrender_buff:0"背水一战的中国"
CHI_never_surrender_buff_desc:0"在长期的侵略与失败阴影之下，中华民国的退让空间正被一步步压缩。城市沦陷、交通中断、工业被毁，任何“体面妥协”的可能性都在现实中迅速消失。对外部世界而言，中国似乎已濒临崩溃；但对仍在坚持的人来说，国家已被逼到无路可退的境地。\n\n随着投降倾向不断上升，生存本身成为唯一的目标。地方防线被反复修筑，守军被迫在缺乏补给的情况下死守要点，纵深内的抵抗与消耗战逐渐取代机动作战。每一次失地，都会换来更顽强的防御意志——因为一旦继续后退，等待的将不再是战争，而是国家的终结。\n\n当退让被彻底否定，防御便成为最后也是最坚固的选择。"
japan.20.t:0"背水之国，无路可退"
japan.20.d:0"前线的坏消息接踵而至。铁路被切断，港口相继失守，撤退的部队在陌生的内地集结，却再也找不到继续后退的方向。曾经被视为“缓冲空间”的广阔国土，如今正一点点被吞噬，所有人都开始意识到一个残酷的事实——中国已经没有可以再让出的土地了。\n\n在各战区指挥部中，命令不再围绕反攻与机动，而是如何坚守、如何拖延、如何在废墟与山地中继续战斗。地方官员被要求组织民众构筑防线，仓库被清点，能用的一切资源都被投入到防御之中。即便士气低落、补给匮乏，投降也已不再被视为一种选择。\n\n这不再是一场可以谈条件的战争，而是一场关乎国家存亡的消耗。越是接近崩溃，抵抗就越趋于顽强——因为失败的代价，已经清晰得令人无法承受。"
japan.20.a:"抵抗到最后一刻，直到侵略者被赶走！"
