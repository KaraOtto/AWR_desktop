China_navy_expand_plan:0 "十年造舰计划"
China_navy_expand_plan_desc:0 "1945年，经过14年的抗日战争，中国终于迎来了胜利，陈绍宽认为此时国内将进入经济建设阶段，因此再次提出了航母计划。这次他根据实际情况将航母数量缩减为12艘，并提出了30年的建设期限，每艘航母的预算为6000万美元。然而，解放战争爆发后，南京国府的焦点完全转向了战斗机、轰炸机、坦克、装甲车等军事装备，而海军的建设依然被忽视。最终，陈绍宽的航母梦想彻底破灭。"
