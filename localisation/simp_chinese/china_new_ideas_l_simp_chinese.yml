military_unable_to_organize:0 "派系林立的军队"
military_unable_to_organize_desc:0 "名义上，国民政府已经完成北伐，实现了全国统一；但在军队内部，统一依旧停留在纸面之上。\n\n中央军、地方军阀部队、旧系残余各自为政，派系倾轧、指挥体系割裂，忠诚往往指向个人而非国家。整编与改革屡遭阻力，命令在传递过程中不断变形，作战协同极为困难。\n\n在这样的军队中，数量并不等于力量。除非完成真正的整合与重建，否则任何大规模战争，都将暴露这一结构性弱点。"
military_unable_to_organize_2:0 "脆弱的军事整合"
military_unable_to_organize_2_desc:0 "北伐后形成的妥协秩序正在松动，中央开始通过裁军与整编尝试收回对部队的直接控制权。部分派系被削弱，指挥权得以在有限范围内集中。\n\n然而，这种集中仍然脆弱。地方势力依旧保有影响力，关键决策常需权衡政治后果，军队的统一行动能力尚不稳定。\n\n统一正在推进，但远未牢固。"
military_unable_to_organize_3:0 "正在成形的国家军队"
military_unable_to_organize_3_desc:0 "随着军官培养、编制调整与训练制度的推进，军队运作开始更多依赖制度而非私人关系。升迁与指挥逐渐脱离派系控制，形成相对一致的组织框架。\n\n旧有网络并未完全消失，却已不再主导全局。协同作战成为可能，但整体效率仍受到历史遗留问题的限制。\n\n这是一支正在重塑自身结构的军队。"
military_unable_to_organize_4:0 "国家意志的军队"
military_unable_to_organize_4_desc:0 "军队的组织与行动开始以国家层面的战略需求为核心。统一的指挥链条得以确立，大规模调动与持续作战不再依赖临时妥协。\n\n派系影响退居次要位置，忠诚的指向逐渐明确。虽然内部差异仍然存在，但已无法左右整体战略方向。\n\n这支军队已具备承担全面战争的基本能力。"
military_unable_to_organize_5:0 "国民革命军"
military_unable_to_organize_5_desc:0 "长期的整编与制度建设终于完成了转变。军队不再是派系的集合，而是一支服务于国家整体利益的武装力量。\n\n指挥集中、编制稳定、协同顺畅，使其能够有效执行复杂而长期的军事行动。曾经削弱战斗力的结构性问题，已被吸收并转化为组织经验。\n\n这支军队的力量，终于与国家的统一相匹配。"
victory_of_Great_war_of_Zhongyuan:0 "中原大战的胜利者"
G4_the_robber:0 "四大家族"
G4_the_robber_desc:0 "蒋家王朝的盛衰与四大家族的兴衰是紧密相连的，他们是当时中国的显赫家族。流传着“蒋家天下陈家党，宋氏姐妹孔家财”的说法。四大家族官僚资本的形成不是靠生产起家，而完全靠掠夺，靠内战和买办起家。加强财政搜刮，滥发公债，买办军火；不搞生产资本扩大再生产而发展经济，而是搞商业投机资本，不以银行和工业结合为特征，而是银行和商业相结合，首先垄断了全国的金融业。之后又逐步垄断工业商业和农业，实行统购统销。还垄断了交通运输、电影、广播、新闻出版等业。抗战开始后，四大家族通过发行公债、增加捐税、通货膨胀、外汇管制和黄金买卖、专卖制度、统购统销、使其资本急剧膨胀；尤其是抗战胜利后，他们利用“接收”名义实行空前的吞并和掠夺，集中了200多亿美元的财产，使四大家族官僚资本发展到顶点。"
