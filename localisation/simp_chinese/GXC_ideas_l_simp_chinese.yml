l_simp_chinese:
 GXC_EFM_Southwest_two_agencies:0 "西南两机关"
 GXC_EFM_Southwest_two_agencies_desc:0 "国民党内部的反蒋派于1931年底至1932年初间建立了西南两机关，包括西南执行部和西南政务委员会，这些机构可以帮助其反抗中央政府并保留两广的自治权。"
 GXC_Guangxi_economy:0 "依靠鸦片过境税"
 GXC_Guangxi_economy_desc:0 "鸦片过境税是广西的重要收入来源，但战时这一收入将大大减少。"
 GXC_Guangxi_economy_2:0 "经济改革"
 GXC_Improve_resource_utilization_efficiency:0 "财政改革"
 GXC_Improve_resource_utilization_efficiency_desc:0 "为了提高我们的金融效率，需要进行金融体制改革。"
 GXC_Integration_of_southwestern_institutions:0 "整合西南两机关"
 GXC_Integration_of_southwestern_institutions_desc:0 "近年来，迫于中央压力，两广的省政府一直维持着合作。而现在，我们终于能彻底团结，成为单一政治力量。 这是两广地区历史的新一页。"
 GXC_Iron_will:0 "钢军"
 GXC_Iron_will_desc:0 "桂军曾在北伐战争中表现突出，而被誉为“钢军”。"
 GXC_Iron_will_2:0 "钢军"
 GXC_Iron_will_2_desc:0 "桂军曾在北伐战争中表现突出，而被誉为“钢军”。"
 GXC_Japanese_consultant:0 "日本顾问"
 GXC_Militia_system:0 "民团"
 GXC_Militia_system_desc:0 "广西实行“三自”（自卫、自治、自给）和“三寓”（寓兵于团、寓将于学、寓征于募），因此具有良好之军事潜力。"
 GXC_New_guangxi_clique:0 "新桂系"
 GXC_New_guangxi_clique_desc:0 "新桂系是以李宗仁、白崇禧、黄绍竑为首的军事集团。 他们透过击败旧桂系巩固了政权。 新桂系的内部团结相当坚定，难以动摇，他们将带领广西成为一个不容忽视的省份。"
 GXC_Order_foreign_fighters:0 "订购外国飞机"
 GXC_Order_foreign_fighters_desc:0 "我们可以与各国签订购买飞机之合约，以强化我军。"
 GXC_Rebuild_fujian_peoples_government:0 "重建中华共和国"
 GXC_Rebuild_fujian_peoples_government_desc:0 "各方面的掌握已经完成，我们可以与桂系一同重建那曾经失败过的中华共和国，来反对蒋政权了。"
 GXC_Separate_revolution:0 "吾等的革命"
 GXC_Separate_revolution_desc:0 "新政府将自行对抗国民党跟法西斯，不会加入任何中共阵营。"
 GXC_defend_anhui_idea:0 "第五战区民众动员委员会"
 GXC_defend_anhui_idea_desc:0 ""
 GXC_land_reform:0 "温和土改"
 GXC_land_reform_desc:0 "实施温和的土地改革，改善农民生活。"
 GXC_liuzhou_machine_works:0 "柳州机械厂"
 GXC_old_officals:0 "低效的行政官员"
 GXC_org:0 "革命同志会"
 GXC_org_2:0 "革命同志会"
 GXC_peoples_government:0 "人民政府"
 GXC_peoples_revolutionary_army:0 "人民革命军"
 GXC_peoples_revolutionary_army_desc:0 "我们将把我们的军队改组为人民革命军，就像当年中华第一共和国那样。"
 GXC_propaganda:0 "广西建设研究会"
 GXC_propaganda_2:0 "民族阵线"
 GXC_reform_debuff:0 "改组政府"
 GXC_reform_debuff_desc:0 "广西省政府目前正如火如荼的进行改组。"
 GXC_save_country_army:0 "保党救国军"
