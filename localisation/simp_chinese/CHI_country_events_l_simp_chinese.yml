l_simp_chinese:
 AWR_CHI.1000.t:0 "中共高层领导人张国焘前来投奔"
 AWR_CHI.1000.desc:0 "近日中共高层领导人张国焘趁国共两党共祭黄帝陵之机逃出了陕甘宁边区，并向我党代表蒋鼎文表达了脱离共党投奔我方的意愿。"
 AWR_CHI.1000.a:0 "弃暗投明，为时不晚！"
 AWR_CHI.1000.b:0 "这种叛徒无论到哪里都不会受到欢迎！"
 AWR_CHI.1001.t:0 "据称张学良与共产党停战"
 AWR_CHI.1001.d:0 "据称，由于中央政府尚未证实的原因，张学良的东北军已与共产党军队达成了默许的停战协议。[CHI.GetLeader]已经决定访问西安，并与那里的官员会面，以澄清事情。"
 AWR_CHI.1001.a:0 "祝我们领袖好运！"
 AWR_CHI.1002.t:0 "[From.GetName]加入统一战线"
 AWR_CHI.1002.d:0 "[From.GetName]已经选择加入[Root.GetFactionName]来对抗日本人。这对我们的战争工作有很大的帮助。分裂的我们什么也做不了，只有团结起来我们才能把侵略者赶出去！"
 AWR_CHI.1002.a:0 "我们将把所有日本鬼子赶出中国！"
 AWR_CHI.1003.t:0 "击退共产党民兵"
 AWR_CHI.1003.d:0 "我们和东北军、马家军联合发起突袭给共匪带来了更大的打击。现在他们都逃走了，今天对中华民国来说是个好日子。"
 AWR_CHI.1003.a:0 "太好了！" 
 AWR_CHI.1004.t:0 "击退共产党民兵"
 AWR_CHI.1004.d:0 "我军队遭到共产党军队的袭击。但是，我们给他们带来了更大的打击。现在他们都逃走了。我们在该地区的主导地位已得到恢复。今天对我军来说是个好日子。"
 AWR_CHI.1004.a:0 "太好了！"
 AWR_PRC.58.t:0 "远征计划失败"
 AWR_PRC.58.d:0 "我军未能实现最初计划的作战目标。 因此，我们决定撤退到我们的基地让部队恢复。 我们的部队在这次失败的战斗中损失惨重，以至于我们不能再坚守[760.GetName]了。 我们必须一路撤退。"
 AWR_PRC.58.a:0 "真是不幸。"
 

 

 

 
