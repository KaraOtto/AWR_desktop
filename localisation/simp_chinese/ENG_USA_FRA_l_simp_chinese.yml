usa_FBI:0 "美国联邦调查局"
usa_FBI_desc:0 "美国联邦调查局是世界上最著名的情报机构之一，隶属于美国司法部，英文缩写FBI。“FBI”不仅是美国联邦调查局的缩写，还代表着该局坚持贯彻的信条——忠诚（Fidelity）、勇敢（Bravery）和正直（Integrity），象征联邦警察。FBI的任务是调查反联邦法罪犯，支持法律，保护美国，调查来自于外国的情报和恐怖活动，在领导阶层和法律方面执行。对联邦、州、当地和国际机构提供帮助，同时在响应公众需要和忠实于美国宪法的前提下履行职责。五大影响社会的方面享有最高优先调查权:反暴行，毒品/有组织犯罪，外国反间谍活动，暴力犯罪和白领阶层犯罪等方面享有最高优先调查权。"
eng_junqing6chu:0 "军情六处"  
eng_junqing6chu_desc:0 "军情六处的全称是英国陆军情报六局。西方情报界把MI6看成是世界情报机关的“开山祖师”，也是世界上效率最高的情报机构。从伊丽莎白的开创初期，它和它的前身都是严格保密的，也称秘密情报处，原为英国情报机构海外谍报系统，负责为英国政府在全球各地收集情报，主要任务包括反对恐怖主义、武器扩散与海外地区动乱带来的威胁。"  
zizhinews.26.t:0 "《告法国人民书》"
zizhinews.26.desc:0 "[This.GetNewsIcon]“维希政府断定我国军队失败，已经开始和敌人进行交涉，以便停止敌对行动。完全可以肯定，无论是在地面还是在天空，我们过去和现在都被敌人的机械化部队压倒。正是德国军队的坦克、飞机和先进的战术为他们带来了突袭的优势，才使法兰西祖国落到现在这种不幸境地。”\n.......\n“但这是最终的结局吗？我们的失败是否已成定数而无法挽救了呢？我对这些问题的回答是：不！因为，你们要记住，法国不是孤单的。它没有被孤立。在它的后面是一个广大的帝国，并且它还可以和大英帝国结成同盟；大英帝国控制着海洋，正在继续斗争。和英国一样，法国还能够充分地利用美国的取之不尽的资源。”\n.......\n“我是戴高乐将军，我现在在伦敦，我向目前在英国土地上和将来可能来到英国土地上的持有武器的法国官兵发出号召，我向目前在英国土地上和将来可能不到英国土地上的军火工厂的一切工程师和技术工人发出号召，请你们和我取得联系。无论发生什么事情，法国抵抗的火焰都不能熄灭，也绝不会熄灭。明天我将再次从伦敦广播。”\n\n-夏尔·戴高乐“六月十八日的号召”演讲片段"
zizhinews.26.a:0 "自由之火尚未熄灭"
zizhinews.26.b:0 "螳臂当车！"
zizhinews.26.c:0 "法国仍在战斗"
zizhinews.26.d:0 "Vive La France！（法语：法国万岁！）"
zizhinews.26.e:0 "等待他的将会是死刑！"
operation_fork:0 "鱼叉行动"#guo
operation_fork_desc:0 "新近独立的冰岛国在北大西洋海域的战略位置十分重要。随着挪威陷落，这座岛屿十分易受攻击。我们必须挫败敌方入侵或占领冰岛的尝试，以免其利用该岛作为战略基地，进而威胁到我方的补给线。只有在我方的保护下，冰岛人民才能远离敌方的侵扰。"
invade_ireland:0 "入侵爱尔兰"
invade_ireland_desc:0 "我们必须以任何必要的手段确保我方运输船队的安全，也许部分我方人士对入侵爱尔兰持有异议，但若只有如此我们才能使用其空军基地，那么也别无他法。"
zizhinews.5.t:0 "英国军队占领冰岛"
zizhinews.5.a:0 "不得已而为之"
zizhinews.5.b:0 "他们以为这样做就安全了？"
zizhinews.5.c:0 "小国的悲哀"
zizhinews.5.desc:0 "[This.GetNewsIcon]在丹麦王国宣布投降后，出于对获得独立的冰岛的立场问题的忧虑，英国首相[ENG.GetLeader]在战时内阁会议上公开表示要用闪电战夺取冰岛以保障英国本土的防卫安全，随后英国战时内阁批准了入侵冰岛的“鱼叉”行动。一支英国海军陆战队目前已经完成了对冰岛政府机关和重要基础设施的占领，唯一的减员发生在航行途中，一名士兵自杀身亡。处于英军“保护”下的冰岛政府公然提出抗议，指责英国政府“粗暴地攻击一个中立国家”，英国首相[ENG.GetLeader]则声称不会解散冰岛政府，战后英国军队将会撤出冰岛。许多军事评论家认为这将有利于增强英国海军在北大西洋地区的防御力量。"
AFG_Imperial_Cemetery:0 "帝国坟场"
AFG_Imperial_Cemetery_desc:0 "从亚历山大大帝到大唐帝国，从成吉思汗到如今的大英帝国，阿富汗几乎经历了历史上所有大国的入侵，却仍旧屹立不倒，甚至还能将他的对手拖入无尽的深渊之中。"
 
ice_duli.2.t:0 "冰岛问题"
ice_duli.2.desc:0 "我国与轴心国之间的战事正日渐白热化，请求美国军队介入驻防冰岛可以大大缓解我们的本土防守压力。"
ice_duli.2.a:0 "好主意"
ice_duli.2.b:0 "我们不需要美国人的介入"
 
ice_duli.3.t:0 "冰岛问题"
ice_duli.3.desc:0 "英国政府请求我国军队介入驻防冰岛以缓解他们的本土防守压力。"
ice_duli.3.a:0 "当仁不让"
ice_duli.3.b:0 "我们对那块破岛不感兴趣"
ice_duli.12:0 "冰岛问题"
ice_duli.12D:0 "随着反法西斯战争的胜利结束，冰岛政府要求我们履行承诺撤离在岛上的驻军。"
ice_duli.12.1:0 "履行承诺"
ice_duli.12.2:0 "请神容易送神难"
