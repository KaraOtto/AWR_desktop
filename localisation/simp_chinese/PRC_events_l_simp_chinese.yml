 AWR_PRC.1.t:0 "漫漫黄沙中的无线电波"
 AWR_PRC.1.desc:0 "当灾难来临时，最脆弱的堤坝首当其冲……在长征路上，我们不得不丢掉了所有大功率通讯设备，导致我们在大部分时间内无法与外界沟通。在中央红军走出川陕地带的雪山与草地后也感到前路渺茫，全靠地下党的战士为党中央的同志们输送“精神食粮”——这才知道陕北竟然还有我们的红军部队存在。\n如今我们还未彻底在陕北站稳脚跟，共产国际派来的林育英同志已经到达陕北，中国共产党作为共产国际的一个支部，必须要打通与外界的联系。因为仅仅靠我们是难以团结力量的，我们还需要与共产国际重新搭建联系，建立“最广泛的民族统一战线”，发动、团结与组织全中国全民族一切革命力量反对当前的主要敌人——日本帝国主义与卖国头子蒋介石。"
 AWR_PRC.1.a:0 "先派人到上海联通宋庆龄同志，让她尽快与莫斯科取得联系"
 AWR_PRC.1.TT:0 "§Y我处不但对北方局、上海局已发生联系，国际亦有发生联系，这是大胜利。\n——毛泽东§!"
 liaison_of_comintern:0 "共产国际联络人"

 AWR_PRC.2.t:0 "林育英同志传达共产国际七大指示精神"
 AWR_PRC.2.desc:0 "20世纪30年代上半期，法西斯势力日益成为世界人民的主要威胁，迫切需要共产党同社会民主党等政党联合起来，建立工人阶级统一战线，共同反对法西斯。为适应这一变化，1935年7月25日到8月20日，共产国际第七次代表大会在莫斯科举行。参加会议的有来自五大洲65个共产党的516名代表，其中有表决权的代表371人。以王明为团长的中国共产党代表团出席了这次会议，并受到了热烈的欢迎。大会一致通过由斯大林、季米特洛夫、皮克、台尔曼（时在德国狱中）、库西宁、曼努伊尔斯基、王明、康生、周和生等42人组成的大会主席团，负责大会的领导工作。\n会议期间，先后听取讨论了皮克做的《关于共产国际执行委员会工作的报告》，关于共产国际监察委员会的报告；季米特洛夫做的《关于法西斯的进攻以及共产国际在争取工人阶级团结起来反对法西斯的斗争中的任务》的报告；陶里亚蒂做的《帝国主义的战争准备与共产国际的任务》的报告；以及曼努伊尔斯基做的《苏联社会主义建设的成果》的报告。大会通过决议，指出：为了战胜法西斯，必须建立广泛的统一战线。在资本主义国家建立工人阶级反法西斯的统一战线和各民主阶层反法西斯的人民阵线，在殖民地半殖民地国家建立反帝国主义侵略的民族统一战线。决议高度评价中国共产党的斗争，赞扬“中国共产党是英勇斗争的模范”。\n大会还通过了《关于共产国际执行委员会工作》的决议，提议共产国际执委会将工作重心转移到规定国际工人运动基本政治路线及策略路线方面去，一般的不要直接干涉各国共产党内部组织上的事务。总结来说，共产国际七大通过的新的策略方针主要有三方面：第一，克服“左”倾宗派主义错误，与社会民主党建立无产阶级统一战线；第二，确立了建立统一战线的任务；第三，改变共产国际执行委员会的作用以及工作作风和方法。"
 AWR_PRC.2.a:0 "欢迎林育英同志的到来！"

 AWR_PRC.3.t:0 "张闻天同志作《中央关于目前政治形势与党的任务决议》报告"
 AWR_PRC.3.desc:0 "目前政治形势已经起了一个基本上的变化，在中国革命史上划分了一个新时期，这表现在日本帝国主义变中国为殖民地，中国革命准备进入全国性的大革命，在世界是战争与革命的前夜。日本帝国主义并吞东北四省之后，现在又并吞了整一个华北，而且正准备并吞全中国，把全中国从各帝国主义的半殖民地，变为日本的殖民地。这是目前时局的最基本的特点。\n......\n目前的世界是处在大革命与大战争的前夜形势中，一切帝国主义国家的经济危机，以及由此产生的革命危机，使得帝国主义除了战争找不出第二条挽救死亡的出路。日本帝国主义大举进攻中国与意大利帝国主义大举进攻阿比西尼亚的冒险战争，无疑的存在着引导到第二次帝国主义大战的危险。而中国与阿比西尼亚的民族革命战争，各帝国主义国家，及其许多殖民地半殖民地革命危机的成熟，无疑的要引导到世界的大革命。在目前革命与战争的前夜时期，已可明显看到世界反革命力量的削弱，与世界革命力量的增涨。在将来就是大战争与大革命，葬送世界上的一切反革命。这一形势使得中国革命脱离了过去的孤立。世界革命是中国革命有力的帮手。同时中国革命现在就已经成了世界革命的伟大因素，将来则要以全民族的雄伟阵势帮助着世界的革命。\n......\n因为国防政府与抗日联军是反日反卖国贼的最广泛的与最高的民族统一战线的组织，所以他应该有最广泛的行动纲领。这十大纲领如下：（一）没收日本帝国主义在华的一切财产作抗日经费；（二）没收一切卖国贼及汉奸的土地财产分给工农及灾民难民；（三）救灾治水，安定民生；（四）废除一切苛捐杂税，发展工商业；（五）加薪加饷，改良工人士兵及教职员的生活；（六）发展教育，救济失学的学生；（七）实现民主权利，释放一切政治犯；（八）发展生产技术，救济失业的知识分子；（九）联合朝鲜，台湾，日本国内的工农，及一切反日力量，结成巩固的联盟；（十）对于中国的民族运动表示同情赞助或守善意中立的民族或国家，建立亲密的友谊关系。\n......\n中国共产党中央号召全党及其干部为坚决执行党的策略路线而斗争。把统一战线运用到全国去，把国防政府与抗日联军建立起来，把苏维埃人民共和国变成全民族的国家，把红军变成全民族的武装队伍，把党变成伟大的群众党，把土地革命与民族革命结合起来，把国内战争与民族战争结合起来。神圣的民族革命战争万岁：中国的自由独立与统一万岁！苏维埃新中国万岁！"
 AWR_PRC.3.a:0 "张闻天总书记很好地主持了这次会议"

 AWR_PRC.4.t:0 "毛泽东同志作《中央关于军事战略问题的决议》报告"
 AWR_PRC.4.desc:0 "在日本帝国主义变中国为殖民地的形势之下，在中国红军及其他革命武装力量的现状之下，党的军事策略，即战略方针应有如下各项：\n（一）在以坚决的民族战争反抗日本帝国主义进攻中国总任务之下，首先须在一切政治的军事的号召上与实际行动上，确定“把国内战争同民族战争结合起来”的方针，这即是“抗日联军”，“红军是中国人民抗日的先锋队”，“一切不愿当亡国奴的士兵及军队，同红军联合起来打日本去”，“全国同胞武装起来反对日本帝国主义进攻中国”，“工农商学兵联合起来武装保卫中国”，“打倒帮助日本帝国主义打中国人的汉奸卖国贼’’，“打倒帮助日本灭中国的卖国头子--蒋介石”，“打倒侵入抗日根据地的汉奸卖国贼”，“反对汉奸卖国贼扰乱抗日后方，，“巩固抗日后方”，“扩大抗日根据地”，“红军白军联合起来，打倒日本帝国主义”，“没收汉奸卖国贼的财产做抗日军经费”，“没收日本帝国主义在中国的财产做抗日军的经费”，“有钱出钱，有力出力，有枪出枪，有智识出智识，打倒日本帝国主义”，“为打倒日本帝国主义战到最后一滴血”，“民族革命战争万岁”的口号及行动。\n（二）正确的估计敌我力量，党在1936年军事部署方面的总方针，应该是“准备直接对日作战的力量”。因此，1936年主力红军作战的主要目标还应该是汉奸卖国贼的军队，但在日本占领区域及自治区，应尽量组织扩大及联合一切的抗日武装力量--抗日义勇军抗日游击队等，同日本军队进行直接的有力的游击战争。同时还应估计到，在一九三六年下半年，第一方面军有可能和有必要，同日本军队发生部分的战斗（晋绥察方面）。\n（三）猛烈扩大红军，一九三六年全国主力红军应有二十万人，第一方面军应有五万。\n（四）为坚决而有力的执行（一）（二）（三）项所述之方针（把国内战争同民族战争结合起来，准备对日作战力量，扩大红军），第一方面军行动部署之基础，应确定地放在“打通苏联”与“巩固扩大现有苏区”这两个任务之上，并把“打通苏联”作为中心任务。拿“巩固扩大现有苏区”同他密切的联系起来，具体步骤即把红军行动与苏区发展的主要方向放到东边的山西和北边的绥远等省去。\n（五）第一方面军以外之红军（二、六军团，四方面军），对于南京卖国贼军队之削弱与牵制，有极大的战略上的作用，其行动应适当地指导之。\n（六）游击战争对于战胜日本帝国主义及汉奸卖国贼的任务，有很大的战略上的作用。"
 AWR_PRC.4.a:0 "很棒的见解！"
 AWR_PRC.4.b:0 "我看也不过如此"
 prc_kuodahongjun_mission:0 "扩大红军"
 prc_dongzheng_mission:0 "东征"
 prc_datongsulian_mission:0 "打通苏联"

 AWR_PRC.5.t:0 "刘志丹同志的定性问题"
 AWR_PRC.5.desc:0 "1935年9月中旬至11月，“左”倾教条主义的执行者出于对西北革命根据地历史与现实的错误认识，在根据地开展了错误的“肃反”运动。陕甘边党政军主要领导干部几乎全部被抓，200多人惨遭杀害，土地革命战争时期党领导的硕果仅存的根据地岌岌可危。\n由于怀疑“同国民党部队有秘密勾结”，“肃反”的黑手也伸向了正在前方指挥作战的西北红军和西北革命根据地的主要创建人之一刘志丹。鉴于他在西北的巨大声望，陕甘晋省委政治保卫局代局长戴季英等人欺骗刘志丹说：调你回瓦窑堡担任西北军委代理主席，指挥北线作战，实则暗中写信命令前方捕人。刘志丹信以为真，立即动身。到了瓦窑堡，刘志丹没有去省委，没有回家，而是径直去了西北军委，对有关负责人说道：“要捉我的信，我在半路上看到了，因此自己回来。”刘志丹光明磊落，慷慨赴死，“自投罗网”，仍然被认为“反而不跑，是狡猾地以使党对其信任”，当即被逮捕关押、镣铐加身。\n千钧一发之际，毛主席、党中央率中央红军长征到达陕北吴起镇，派遣王首道、贾拓夫带一个连和一部电台，以最快速度赶赴瓦窑堡，接管西北政治保卫局，营救刘志丹。但由于此时尚处于战争环境，刘志丹虽被平反，却仍然留下犯有严重右倾错误的决定。"
 AWR_PRC.5.a:0 "暂且不下最终定论"
 AWR_PRC.5.b:0 "我看不是陕北的同志“右”了，是我们搞肃反的同志“左”了！"

 AWR_PRC.6.t:0 "《关于张国焘同志成立“第二中央”的决定》"
 AWR_PRC.6.desc:0 "张国焘同志自同中央决裂后，最近在四方面军中公开的成立了他自己的“党的中央”、“中央政府”、“中央革命军事委员会”与“团的中央”。张国焘同志这种成立第二党的倾向，无异于自绝于党，自绝于中国革命。党中央除去电命令张国焘同志立刻取消他的一切“中央”放弃一切反党的倾向外，特决定在中央委员会内公布一九三五年九月十二日中央政治局俄界决定。\n\n中共中央政治局\n\n一九三六年一月二十二日"
 AWR_PRC.6.a:0 "坚决拥护中央的正确决定！"
 AWR_PRC.6.b:0 "这充满了对张国焘同志的偏见！"

 AWR_PRC.7.t:0 "刘志丹同志的任命去向"
 AWR_PRC.7.desc:0 "1936年1月15日，毛泽东、周恩来、彭德怀签发了“关于红军东进抗日及讨伐卖国贼阎锡山的命令”，命令“主力红军即刻出发，打到山西去”。遵照上述命令，各路东征部队迅速隐蔽地集结到黄河岸边，进行渡河准备。1月31日，毛泽东来到延长县城，主持召开军事会议，全面检查了东征的各项准备工作，研究和部署了东征的行动路线，正式组建了“中国人民红军抗日先锋军”。由毛泽东、彭德怀、叶剑英分别兼任总政委、总指挥、总参谋长。将红28军、红1军团、红15军团分为左、中、右3路大军，各自选定渡河突破口，待命东征。黄河游击师随同主力出征，负责保持主力红军与后方的交通联络，红29军则担任后方留守。"
 AWR_PRC.7.a:0 "刘志丹同志率领红28军即刻出发"
 AWR_PRC.7.b:0 "刘志丹同志还是留守瓦窑堡为好"


 AWR_PRC.9.t:0 "《沁园春·雪》"
 AWR_PRC.9.d:0 "北国风光，千里冰封，万里雪飘。望长城内外，惟余莽莽；大河上下，顿失滔滔。山舞银蛇，原驰蜡象，欲与天公试比高。须晴日，看红装素裹，分外妖娆。\n 江山如此多娇，引无数英雄竞折腰。惜秦皇汉武，略输文采；唐宗宋祖，稍逊风骚。一代天骄，成吉思汗，只识弯弓射大雕。俱往矣，数风流人物，还看今朝。\n 毛泽东率领红军东征前夕，在陕西清涧县袁家沟筹划渡河时，天降大雪，他登高望远，俯瞰苍茫大地，胸中豪情不可抑制，于是写下了这首词。"
 AWR_PRC.9.a:0 "气势磅礴!" 

 

 AWR_PRC.12.t:0 "中国工农红军第二、第四方面军抵达！"
 AWR_PRC.12.d:0 "经过与国民党反动派的长期战斗后，中国工农红军第二方面军和第四方面军已经抵达会宁作为会合地点。 许多其他共产主义领导人也一路抵达。 我们的政府终于可以巩固了。"
 AWR_PRC.12.a:0 "欢迎回来！"
