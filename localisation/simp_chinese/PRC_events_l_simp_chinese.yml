 lizhen_general:0 "§Y李贞§!成为§Y将军§!。"
 AWR_PRC.13.t:0 "王明、陈云同康生同志从莫斯科归来"
 AWR_PRC.13.d:0 "因为各种原因留在苏联之后，王明陈云和康生已经回到了延安。\n\n尽管国际派在遵义会议后丧失了主导地位，王明仍在党内有着不可小觑的影响力。康生和陈云则长期担任我党驻共产国际代表团的主要负责人之一。"
 AWR_PRC.13.a:0 "你们可都是从昆仑山上下来的神仙呀！"
 AWR_PRC.13.b:0 "王明同志可真会挑时间回来。"
 AWR_PRC.14.t:0 "中央政治局会议——\n张闻天之报告：\n当前形势和党的任务"
 AWR_PRC.14.d:0 "\n张闻天的报告标志著中央政治会议的开始。 在张的报告之后，预计王明将发表他的见解。"
 AWR_PRC.14.a:0 "多么棒的报告啊！"
 AWR_PRC.14.b:0 "该报告仍有待改进。"
 AWR_PRC.14.c:0 "他在胡说什么？"
 AWR_PRC.15.t:0 "中央政治局会议——\n王明之报告：\n如何继续抗战并取得胜利"
 AWR_PRC.15.d:0 "\n\n王明对如何在我们当前的战争中取得胜利发表了他的见解。 他的想法主要包括以国民党为中心的战略，建议每一个决定在执行前都应该在统一战线内讨论。 王还批评了过分强调自治和毛泽东与刘少奇对大局的分析。\n\n王明的发言得到了与会者的大力支持。"
 AWR_PRC.15.a:0 "多么棒的报告啊！"
 AWR_PRC.15.b:0 "该报告仍有待改进。"
 AWR_PRC.15.c:0 "他在胡说什么？"
 AWR_PRC.16.t:0 "中央政治局会议——\n毛泽东发表反驳"
 AWR_PRC.16.d:0 "听完王明的发表后，毛泽东对王明的想法进行了一定程度的反驳。 毛接著强调中共在统一战线中的自主性和党的方面，并声称党的主要战略应该是游击战，而不是让红军服从统一战线的指挥。"
 AWR_PRC.16.a:0 "好吧，算他有理"
 AWR_PRC.16.b:0 "这是一次糟糕的回应。"
 AWR_PRC.16.c:0 "为什么他还敢说？"
 AWR_PRC.17.t:0 "中央政治局会议——\n长江局成立！"
 AWR_PRC.17.d:0 "中央政治局会议闭幕，同意设立长江局的决定。 王明随后被任命为长江局的总负责人。"
 AWR_PRC.17.a:0 "这对统一战线将是一件好事！"
 AWR_PRC.17.b:0 "瞧瞧他们找到了什么"
 AWR_PRC.18.t:0 "六届六中全会[global.GetCPC]中央委员会-\n王稼祥宣布共产国际指示精神"
 AWR_PRC.18.d:0 "\n全会一开始，王稼祥传达了共产国际和季米特洛夫的指示精神，表示党目前的政治道路是正确的，他们支持[Root.GetLeader]的领导。"
 AWR_PRC.18.dmao:0 "\n全会一开始，王稼祥传达了共产国际和季米特洛夫的指示精神，表示党目前的政治道路是正确的，根据国际讨论时季米特洛夫的发言，认为中共一年来建立了抗日统一战线，尤其是朱、毛等领导的八路军执行了党的新政策，国际认为中共的政治路线是正确的，中共在复杂的环境及困难条件下真正运用了马列主义。中共中央领导机关要以毛泽东为首解决统一领导问题，中央领导机关要有亲密团结的空气，全党上下都应当拥护毛泽东同志的领导地位，至于王明等人就不要再去争夺领导权了。这无疑从实际上确立了毛泽东同志为我们党的最高领袖，尽管他尚未担任党的总书记一职。"
 AWR_PRC.18.a:0 "这不可能是真的！"
 AWR_PRC.18.b:0 "令人惊讶的决定"
 AWR_PRC.18.c:0 "莫斯科终于理解了我们"
 
 AWR_PRC.19.t:0 "六届六中全会[global.GetCPC]中央委员会-\n毛泽东之演讲：\n 《论新阶段》"
 AWR_PRC.19.d:0 "\n王稼祥作开幕报告后，毛泽东发表演说。\n\n他说：抗战以来，中国的形势发生了变化。 毛泽东还以他的主张批评了失败主义者和速胜论支持者。 随后，毛泽东详细说明了统一战线迈向之新阶段，以及党的应对措施，一如既往地强调党的独立自主。"
 AWR_PRC.19.a:0 "迈向一个新阶段！"
 AWR_PRC.19.b:0 "有道理"
 AWR_PRC.19.c:0 "(嘘声)"
 AWR_PRC.20.t:0 "六届六中全会[global.GetCPC]中央委员会-\n张国焘演说：\n 《关于战略合作》"
 AWR_PRC.20.d:0 "\n王稼祥作开幕报告后，张国焘发表演说。\n\n他表示，中国人的持续抵抗已对党内的失败主义情绪造成了重大打击。 张还强调统一战线内部的合作，敦促党在合作与自治之间取得平衡，批评在统一战线方法上的极端主义。"
 AWR_PRC.20.a:0 "团结就是力量！"
 AWR_PRC.20.b:0 "有道理"
 AWR_PRC.20.c:0 "(嘘声)"
 AWR_PRC.21.t:0 "六届六中全会[global.GetCPC]中央委员会-\n王明演讲：\n 《关于战略合作》"
 AWR_PRC.21.d:0 "\n王稼祥作开幕报告后，王明发表演讲。\n\n他表示，中国人的持续抵抗对党内的失败主义情绪造成了重大打击。 王明忠于共产国际，表达了将党完全提交给统一战线的计划。 他批评自治的倡导者过于左派和排外，统一战线内部更紧密的合作是迅速取得胜利的唯一途径。"
 AWR_PRC.21.a:0 "团结就是力量！"
 AWR_PRC.21.b:0 "有道理"
 AWR_PRC.21.c:0 "(嘘声)"
 AWR_PRC.22.t:0 "六届六中全会[global.GetCPC]中央委员会-\n党内托派要求平反"
 AWR_PRC.22.d:0 "\n[Root.GetLeader]发表演讲后，几位著名的托洛茨基主义者谈到了对他们派系的迫害。 他们都要求为他们的迫害平反，并允许他们的言论被纳入到党的决定中。"
 AWR_PRC.22.a:0 "托派也是我们的兄弟。"
 AWR_PRC.22.b:0 "他们说的有理。 但我们仍应该保持谨慎。"
 AWR_PRC.22.c:0 "让他们做梦去吧。"
 AWR_PRC.23.t:0 "六届六中全会[global.GetCPC]中央委员会-\n解散长江局"
 AWR_PRC.23.d:0 "\n全会结束时，与会人员一致认为，长江局已发挥了其应有的作用。 该局将很快解散，其人员将重新部署。"
 AWR_PRC.23.a:0 "这无疑是个正确的决定"
 AWR_PRC.23.b:0 "行吧"
 AWR_PRC.23.c:0 "这简直大错特错！"
 AWR_PRC.24.t:0 "[Root.GetLeader] 主持扩大中央政治局会议"
 AWR_PRC.24.t_mao:0 "毛泽东主持召开中央政治局扩大会议"
 AWR_PRC.24.d:0 "为总结党近年来的革命与斗争经验，[Root.GetLeader]同志宣布召开中央政治局扩大会议。 部分党员应在会议中全面总结他们过去对党的贡献以及所犯的错误，进行认真的自我检讨和改正。"
 AWR_PRC.24.d_mao:0 "为总结党近年来的革命与斗争经验，为大规模整风运动做好准备，毛泽东同志宣布召开中央政治局扩大会议。 部分党员应在会议中全面总结他们过去对党的贡献以及所犯的错误，进行认真的自我检讨和改正。"
 AWR_PRC.24.a:0 "那么开始吧。"
 AWR_PRC.25.t:0 "中央政治局扩大会议——\n张国焘作自我检讨"
 AWR_PRC.25.d:0 "\n张国焘自愿承认自己以前的错误，尤其是长征期间的错误。 他承认，在他率领红四方面军北上的过程中，他成为了权力与腐败之牺牲品，妄图另立第二中央，造成党的分裂局面。 他表示从那以后，他一直在反省自己的不当行为。"
 AWR_PRC.25.a:0 "一次优秀的自我批判，干的好，同志"
 AWR_PRC.25.b:0 "他是否真如此想还有待观察。"
 AWR_PRC.25.c:0 "一堆借口！"
 AWR_PRC.26.t:0 "张国焘叛逃"
 AWR_PRC.26.d:0 "1937年3月，中共中央在延安召开政治局扩大会议，批判张国焘的分裂主义和军阀主义错误。为了教育和挽救他，同年9月仍派他担任陕甘宁边区政府副主席、代主席。中央政治局扩大会议开始后，我们又对其之前所做的恶劣行径作出了强烈批判，他因此感到强烈不满。随后以去西安商讨统一战线问题为借口离开陕甘宁边区，投靠国民党，并被中共中央开除党籍。不久，加入国民党的特务组织——军事委员会调查统计局，主持“特种政治问题研究室”、“特种政治工作人员训练班”，从事反共特务活动。"
 AWR_PRC.26.a:0 "这个可耻的叛徒！" 
 AWR_PRC.27.t:0 "中央政治局扩大会议——\n毛泽东作自我检讨"
 AWR_PRC.27.d:0 "\n现在轮到毛泽东反省自己的错误了。\n\n毛承认，在寻求更适合中国国情的革命道路时，他对与党外人士的合作视而不见。 由于过分强调自治，毛泽东的极左排他性受其自我批判，他对自己的方法表示后悔。"
 AWR_PRC.27.a:0 "一次优秀的自我批判，干的好，同志"
 AWR_PRC.27.b:0 "他是否真如此想还有待观察。"
 AWR_PRC.27.c:0 "一堆借口！"
 AWR_PRC.28.t:0 "中央政治局扩大会议——\n张闻天作自我检讨"
 AWR_PRC.28.d:0 "\n对于张闻天，其检讨的主要是他在江西苏区工作时的“左”倾错误思想。他在报告中认真检讨自己在中央苏区的工作：“当时路线是错误的”“我是主要的负责者之一，应当承认错误”，特别在宣传错误政策上负更多责任。他认为自己缺乏实际经验就需要补课，并且坚定地做下去。他同时还在自己的《反省笔记》中写道：“在遵义会议上，我不但未受打击，而且我批评了李德、博古，我不但未受处罚，而且还被抬出来代替了博古的工作。”"
 AWR_PRC.28.a:0 "一次优秀的自我批判，干的好，同志"
 AWR_PRC.28.b:0 "他是否真如此想还有待观察。"
 AWR_PRC.28.c:0 "一堆借口！"
 AWR_PRC.29.t:0 "中央政治局扩大会议——\n彭述之作自我检讨"
 AWR_PRC.29.d:0 "\n作为党内杰出的托洛茨基主义者，彭述之决定站出来进行自我批判。 他的批评主要集中在他对前任领导人的反对上，在党内制造了沿托洛茨基主义路线分裂的派系主义。其自称，未能正确进行沟通是他错误的主要重点。"
 AWR_PRC.29.a:0 "一次优秀的自我批判，干的好，同志"
 AWR_PRC.29.b:0 "他是否真如此想还有待观察。"
 AWR_PRC.29.c:0 "一堆借口！"
 AWR_PRC.30.t:0 "中央政治局扩大会议——\n博古作自我检讨"
 AWR_PRC.30.d:0 "\n下一个进行自我批判的是博古。 博古把他的错误概括为四点，第一是对中国革命基本原则的错误解释。 二是错误地认为只有城市工人阶级才能成为革命的力量。 第三和第四是他对国民革命和中国革命性质的认识不充分。"
 AWR_PRC.30.a:0 "一次优秀的自我批判，干的好，同志"
 AWR_PRC.30.b:0 "他是否真如此想还有待观察。"
 AWR_PRC.30.c:0 "一堆借口！"
 AWR_PRC.31.t:0 "中央政治局扩大会议——\n王明作自我检讨"
 AWR_PRC.31.d:0 "\n王明的自我批判主要以抽象的术语表达。 他含糊地承认是国际派的领导失误导致了第五次反围剿的失败和长征途中的巨大损失，同时重申他对自身政治决策方式的信念。 他还将一些错误归咎于博古。"
 AWR_PRC.31.a:0 "一次优秀的自我批判，干的好，同志"
 AWR_PRC.31.b:0 "他是否真如此想还有待观察。"
 AWR_PRC.31.c:0 "一堆借口！"
 AWR_PRC.32.t:0 "中央政治局扩大会议——\n凯丰做自我检讨"
 AWR_PRC.32.desc:0 "\n下一个进行自我检讨的是凯丰同志。凯丰同志的自我检讨主要着眼于其在长征时期所犯的一系列“左倾错误”，特别是在遵义会议上支持博古并反对毛泽东重掌军事指挥权。幸运的是，在党中央的批评和帮助下，面对着红军在毛泽东等同志的指挥下扭转战局的事实，他很快认识到了自己的错误，转而支持毛泽东同志的正确领导。"
 AWR_PRC.32.a:0 "一次优秀的自我检讨，干的好，同志"
 AWR_PRC.32.b:0 "他是否真如此想还有待观察。"
 AWR_PRC.32.c:0 "一堆借口！"
 AWR_PRC.33.t:0 "埃德加·斯诺抵达保安"
 AWR_PRC.33.desc:0 "在张学良将军、民主人士宋庆龄同志的协助和地下党员董健吾同志的带领下，来自美国的记者、同时也是燕京大学教授的埃德加·斯诺成功穿越了国民党军队的层层封锁，于今日顺利抵达了保安。他随后将在保安及各苏区进行采访活动以收集资料完成他的见闻录创作。"
 AWR_PRC.33.a:0 "热烈欢迎！"
 AWR_PRC.33.b:0 "他为什么要来？"
 AWR_PRC.34.t:0 "埃德加·斯诺结束了在保安的采访"
 AWR_PRC.34.desc:0 "在进行了为期四个多月的采访后，埃德加·斯诺表示他已收集到了足够的材料来完成他的见闻录创作，另外考虑到大多数东北军的驻防区已由南京方面的部队接管，斯诺已经不得不马上离开红区了。现在他将离开保安返回北平以发表一场简短的通讯会来报道他在保安的所见所闻，并继续完成见闻录的创作。"
 AWR_PRC.34.a:0 "期待他的作品！"
 AWR_PRC.34.b:0 "他可算是走了！"
 AWR_PRC.35.t:0 "毛泽东在保安"
 AWR_PRC.35.desc:0 "斯诺的到来对于此时的中国共产党来说具有重大意义，因为他的报道能够将中国共产党及其领导人毛泽东同志介绍给全世界。斯诺在保安见到了毛泽东同志，并为他拍摄了一张戎装照。这张照片不仅展示了毛泽东同志的个人风采，也成为了中国革命历史的重要见证。\n在拍摄过程中，斯诺注意到毛泽东同志没有戴帽子，头发较长，于是他坚持请毛泽东同志戴上缀有红五星的八角帽。毛泽东同志表示自己的军帽已经多日未戴，不知去向，斯诺便将自己头上的红军帽取下来戴在毛泽东同志的头上。随后，斯诺拍摄了这张照片，这张照片被认为是毛泽东同志最喜爱的一张照片之一。"
 AWR_PRC.35.a:0 "让全世界看一看中国共产党领导人的风采。"
 AWR_PRC.36.t:0 "[NEA.GetLeader]接受我们的要求"
 AWR_PRC.36.d:0 "[NEA.GetLeader]及其追随者决定接受我们的要求，安排默许停战。他们表示从现在起，我们将秘密停止任何针对对方的军事行动。看来内战似有结束的曙光。"
 AWR_PRC.36.a:0 "太好了！"
 AWR_PRC.41.t:0 "[amass_support_flag_temp.GetName]的共产党支持度上升了"
 AWR_PRC.41.d_PRC:0 "我们在[amass_support_flag_temp.GetName]的同志组织游击活动今天成功地凝聚了那里的人心。如果我们在那里发动行动，现在人民就会支持我们的！"
 AWR_PRC.41.d_CHI:0 "由于最近在该地区的共产党游击队领导的运动，我们在[amass_support_flag_temp.GetName]的支持率已经大幅下降。我们需要集中力量打击这些土匪，以免他们的谎言蛊惑更多的中国人！"
 AWR_PRC.41.a:0 "该死的！"
 AWR_PRC.41.b:0 "太好了！"
 AWR_PRC.42.t:0 "进驻延安"
 AWR_PRC.42.desc:0 "根据我们此前与东北军达成的合作协议，驻防延安的东北军部队已经全部撤离。和平接管延安后，党中央派出以王观澜为团长的工作团，陕北苏维埃政府派出以曹华山为首的工作组来到延安，连同延安城防司令员兼政治委员黄春甫一起，迅速有效地组织开展宣传保卫等工作。随后成立了延安市苏维埃政府和延安抗日救国会。工作人员分头到大街小巷宣传中国共产党提出的抗日救国主张和城市政策，宣传红军是人民的军队、共产党是抗日的力量。部队还在延安南关、凤凰山等处挖出了东北军撤离前埋藏的几百支枪和部分弹药。延安城内的商业、学校、交通、邮电等各项事业很快恢复正常。"
 AWR_PRC.42.a:0 "中国革命的新起点！"
 AWR_PRC.43.t:0 "西北国防政府的选举？"
 AWR_PRC.43.desc:0 "西北国防政府成立后，一众东北军对张学良执政的呼声越来越高，也有民众呼吁张学良将军应该领导抗战，我们将举行一场公平公正的民主选举，决定出谁来领导抗战，最终选举的结果是......"
 AWR_PRC.43.a:0 "坚持中国共产党的领导。"
 AWR_PRC.43.b:0 "张学良将军会领导抗战。"
 AWR_PRC.44.t:0 "成立三人团？"
 AWR_PRC.44.a:0 "没什么必要。"
 AWR_PRC.44.b:0 "这主意不错。"
 AWR_PRC.44.d:0 "中共中央召开政治局扩大会议，决定成立由周恩来、毛泽东、王稼祥组成的新“三人团”，又称“三人军事指挥小组”、“三人指挥小组”，集中领导军事，加强作战统一指挥。"
 PRC_sanrentuan_desc:0 "中共中央召开政治局扩大会议，决定成立由周恩来、毛泽东、王稼祥组成的新“三人团”，又称“三人军事指挥小组”、“三人指挥小组”，集中领导军事，加强作战统一指挥。新“三人团”是代表党中央领导军委工作的最重要的领导机构，是全权指挥军事的统帅部。"
 AWR_PRC.45.t:0 "大生产运动"
 AWR_PRC.45.d:0 "大生产运动是克服根据地困难的重要一环，总方针是“发展经济，保障供给 ”。早在困难刚刚露头的时候，党中央就发出了 “自己动手 ”的号召。现在党中央再次强调必须走生产自救的道路。命令第三五九旅开进南泥湾实行军垦屯田。他们发扬自力更生、奋发图强的精神，使昔日荒凉的南泥湾变成了 “陕北的好江南 ”。"
 AWR_PRC.45.a:0 "自力更生，艰苦奋斗！"
 AWR_PRC.46.t:0 "打通国际路线"
 AWR_PRC.46.d:0 "我们和张学良已经秘密联络，准备组建大西北联盟共同抗日，张学良将打通甘肃的河西走廊。如果我们能够打通马家军地盘的宁夏，与蒙古直接接壤，同时莫斯科方面就不会受到南京当局的阻挠，给予我们任何援助。进攻计划已经就位。"
 AWR_PRC.46.a:0 "进攻！"
 AWR_PRC.46.b:0 "我们现在应该撤退。"
 AWR_PRC.47.t:0 "打通河西走廊"
 AWR_PRC.47.d:0 "中央红军制定了《通庄静会战役计划》，决定趁着西安最精锐的胡宗南部布防静宁、会宁前，让红四方面军优先占领此地。这既有利于南方红军北上会师，也能阻挠国军北上，以便中央红军能实行宁夏战役计划。该决议在岷州会议上也被红四方面军一致通过，结果张国焘却在会议后突然要求西进，欲抢先跨越黄河前往西宁建立根据地。苏联方面也希望补给经新疆、河西走廊送到根据地，因此西路军的任务变成了打通河西走廊，链接苏联补给线。"
 AWR_PRC.47.a:0 "我们的计划被打乱了。"
 AWR_PRC.48.t:0 "宁夏战役失败"
 AWR_PRC.48.d:0 "国军和宁夏马家军对我们发起进攻，我军未能实现最初计划的作战目标。部队在这次战斗中失败损失惨重，以至于我们不能再坚守靖远、固原这一地区了，导致此地现在被敌军占领。"
 AWR_PRC.48.a:0 "真是不幸。"
 AWR_PRC.48.b:0 "让这帮白匪放马过来！"
 AWR_PRC.49.t:0 "我军获胜了"
 AWR_PRC.49.d:0 "尽管供给不足，我军最终还是战胜了敌人，并歼灭了大部分敌军。虽然仍有马家军成功逃到新疆，但我们在西北的根据地已经稳固了，最重要的是，苏联的援助应该很快就会到达。"
 AWR_PRC.49.a:0 "今天对于中国革命而言是伟大的一天！"
 AWR_NXM.2.a:0 "太好了！"
 AWR_PRC.50.t:0 "军阀发动反击"
 AWR_PRC.50.d:0 "我们的进攻部队损失惨重。马家军的反攻比预料的要猛烈。现在，参与这次行动的大多数同志已经牺牲或逃走了。只有少数人抵达新疆。"
 AWR_PRC.50.a:0 "真糟糕。"
 AWR_PRC.51.t:0 "远征计划失败"
 AWR_PRC.51.d:0 "我军未能实现最初计划的作战目标。 因此，我们决定撤退到我们的基地让部队恢复。 我们的部队在这次失败的战斗中损失惨重，以至于我们不能再坚守[760.GetName]了。 我们必须一路撤退。"
 AWR_PRC.51.a:0 "真是不幸。"
 EFM_Comchina_GSM.2117.t:0 "我军获胜"
 EFM_Comchina_GSM.2117.d:0 "尽管补给状况不佳，我军最终还是战胜了敌人，彻底歼灭了敌军。 虽然少数剩余士兵成功逃往新疆，但我们在该地区的主导地位已经根深蒂固，最重要的是，苏联的援助应该很快就会到来。"
 EFM_Comchina_GSM.2117.a:0 "对中国而言这是伟大的一天！"
 AWR_PRC.57.t:0 "军阀发动反击"
 AWR_PRC.57.d:0 "我们的进攻部队损失惨重。马家军的反攻比预料的要猛烈。现在，参与这次行动的大多数同志已经牺牲或逃走了。只有少数人抵达新疆。"
 AWR_PRC.57.a:0 "真是不幸。"
 AWR_PRC.54.t:0 "大西北联盟"
 AWR_PRC.54.d:0 "由于连接苏联的补给线已经打通，党也相应得到加强。 现在可能是与东北军讨论大西北联盟的可能性的好时机。"
 AWR_PRC.54.a:0 "让我们听听 [NEA.GetLeader] 对此有何看法。"
 AWR_PRC.55.t:0 "[From.GetLeader] 接受大西北联盟计划"
 AWR_PRC.55.d:0 "[From.GetLeader]已经接受了大西北联盟的计划。 时机成熟时，我们会像走手足兄弟般坚定地站在一起。"
 AWR_PRC.55.a:0 "理所当然！ 现在我们将等待时机。"
 AWR_PRC.56.t:0 "[From.GetLeader] 拒绝组建大西北联盟"
 AWR_PRC.56.d:0 "[From.GetLeader] 拒绝组建大西北联盟。 根据我方代表说法，他一直对我们感到难以信任。"
 AWR_PRC.56.a:0 "嗯......好吧......"
 AWR_PRC.57.t:0 "军阀发动反击"
 AWR_PRC.57.d:0 "我们的进攻部队损失惨重。马家军的反攻比预料的要猛烈。现在，参与这次行动的大多数同志已经牺牲或逃走了。只有少数人抵达新疆。"
 AWR_PRC.57.a:0 "真是不幸。"
 disband_all_troops_in_hosi_tt:0 "§R解散§!§Y所有在[756.GetName]的部队§!"
 AWR_PRC.58.t:0 "远征计划失败"
 AWR_PRC.58.d:0 "我军未能实现最初计划的作战目标。 因此，我们决定撤退到我们的基地让部队恢复。 我们的部队在这次失败的战斗中损失惨重，以至于我们不能再坚守[760.GetName]了。 我们必须一路撤退。"
 AWR_PRC.58.a:0 "真是不幸。"
 AWR_PRC.59.t:0 "任弼时被派往莫斯科担任代表"
 AWR_PRC.59.d:0 "根据党中央的指示，任弼时已被派往莫斯科处理我们与共产国际间的事务。"
 AWR_PRC.59.a:0 "祝你好运，同志！"
 AWR_PRC.59.b:0 "呼！他可终于走了"
 AWR_PRC.60.t:0 "王稼祥同志从莫斯科归来"
 AWR_PRC.60.d:0 "在任弼时被派往苏联取代其代表之位后，王稼祥回归了。"
 AWR_PRC.60.a:0 "欢迎回来！"
 AWR_PRC.60.b:0 "呃……为什么他回来了......"
 AWR_PRC.61.t:0 "张国焘挑战红一方面军"
 AWR_PRC.61.d:0 "张国焘显然蔑视毛泽东，他挑战这位魅力十足的革命者对红一方面军的领导，并暗中挑战党。 张和他的军队领导的党的影响力成功向西扩张，为他的主张和论点提供了令人信服的证据。\n在最近的一次重要干部峰会上，毛泽东被批评为优柔寡断和不作为。根据张的说法应帮助张的部队。 此后，毛泽东的所有主要职位都被张和他信任的盟友迅速取代。"
 AWR_PRC.61.a:0 "为张主席高呼三声万岁！"
 AWR_PRC.62.t:0 "挑战[WTT_current_china_leader.GetLeader]政权！"
 AWR_PRC.62.d:0 "[WTT_current_china_leader.GetLeader]领导的腐败政权及其反动支持者自从北伐期间背离孙博士的主义以来，一直在毒害中国。 作为革命者，我们必须为中国除掉[WTT_current_china_leader.Capital.GetName]的毒瘤，把中国人民从压迫和封建主义中解放出来。 为此，我们可以在新疆军阀与苏联的相对友好关系上寻求帮助。"
 AWR_PRC.62.a:0 "请求 [SIK.GetName] 加入。"
 AWR_PRC.63.t:0 "沿用国号？"
 AWR_PRC.63.d:0 "既然我们选择与中华民国进行权力斗争，党内有人提议沿用相同国号来彰显政权的正统性，该如何回应他们？"
 AWR_PRC.63.a:0 "好主意！" 
 AWR_PRC.63.b:0 "没必要沿用反动派的国号。" 
 AWR_PRC.64.t:0 "[SIK.GetName] 决定和我们一起挑战中央！"
 AWR_PRC.64.d:0 "[SIK.GetLeader]表达了与我们合作并推翻现任中央政府的愿望。"
 AWR_PRC.64.a:0 "太好了！"
 AWR_PRC.65.t:0 "[SIK.GetName] 拒绝加入，但会提供支持"
 AWR_PRC.65.d:0 "[SIK.GetLeader] 拒绝了我们的合作提议。 但是，他们将提供一定程度的政治支持。"
 AWR_PRC.65.a:0 "很公平。"
 AWR_PRC.66.t:0 "统一战线中的独立自主问题"
 AWR_PRC.66.d:0 "近来，王明同志在会议上强调“抗战高于一切”，提出“凡抗日者皆吾友，降日者皆我敌”，公然提出“一切经过统一战线”的口号。这个口号，完全否定了中国共产党的独立自主，为国民党方面限制、削弱、消灭中国共产党创造了客观条件。针对王明的右倾投降主义的思想，毛泽东同志于1938年11月写了这篇《抗日战线中的独立自主问题》。对王明的错误思想进行的坚决的抵制。"
 AWR_PRC.66.a:0 "我们的方针是统一战线中的独立自主，既统一，又独立"
 AWR_PRC.67.t:0 "《论持久战》的发表"
 AWR_PRC.67.d:0 "近日毛泽东同志在延安抗日战争研究会上发表了主题为“论持久战”的讲话。其在讲话中批驳了党内某些同志的“亡国论”和“速胜论”观点，深刻地阐述了人民战争的思想，指出全国人民参加抗战，坚持抗战，是取得抗战胜利的根本条件和基本保证，同时批判了蒋介石政府脱离群众的片面抗战路线。正如毛泽东同志所言：“我们是一个弱国，在军力、经济力和政治组织力各方面都显得不如敌人。战争之不可避免和中国之不能速胜，在这个方面有其基础。但是中国积累了近百年的解放运动力量，又是一个很大的国家，只要我们运用正确的军事和政治策略，敌之不利因素和我之有利因素均将随战争之延长而发展，必能继续改变着敌我强弱的原来程度。”这无疑为我们今后的抗战路线指明了方向。"
 AWR_PRC.67.a:0 "道路是曲折的，但前途是光明的"
 AWR_PRC.68.t:0 "中央党校开学典礼"
 AWR_PRC.68.d:0 "今天在中央党校开学典礼上，毛泽东同志发表讲话，提出“惩前毖后，治病救人”的方针是整风运动的宗旨。批评主观主义、宗派主义、党八股。\n\n关于主观主义，毛将党内的主观主义者分为教条主义者和经验主义者。教条主义者一味地套用马克思列宁主义，而经验主义者则经常将异常值视为普遍真理。此外，毛泽东提出，只有理论与实践相结合，才能摆脱党内的主观主义作风。\n\n毛还提到，虽然不占优势，但党内仍有宗派主义残余。以张国焘为例，毛泽东批评宗派主义者将个人利益置于党的利益之上。他进一步阐述了党内团结和军民团结在铲除宗派主义中的重要性。\n\n关于党八股问题，毛泽东列举了党八股的八大罪状：空话连篇，言之无物；装腔作势，借以吓人；无的放矢，不看对象；语言无味，像个瘪三；甲乙丙丁，开中药铺；不负责任，到处害人；流害全党，妨碍革命；传播出去，祸国殃民，是主观主义和宗派主义的表现形式。"
 AWR_PRC.68.a:0 "很棒的演讲！ 毛同志的见解是无可挑剔的！"
 AWR_PRC.68.b:0 "毛泽东演讲的主张能否带领党走向更加光明的未来，尚无定论。"
 AWR_PRC.68.c:0 "毛确实很善于捏造出问题。"
 AWR_PRC.69.t:0 "黄花塘事件"
 AWR_PRC.69.d:0 "新四军军部转移到安徽滁县盱眙地区的黄花塘后。根据中共中央统一安排，军部进行了整风运动。新四军代理政委饶漱石以军部名义打电报到延安，罗列出陈毅反对党中央、毛主席的十大错误。"
 AWR_PRC.69.a:0 "相信饶漱石同志的电报。"
 AWR_PRC.69.b:0 "陈毅同志是有功劳的，未犯路线错误的。"
 AWR_PRC.70.t:0 "中央总学习委员会的成立"
 AWR_PRC.70.d:0 "为加快推进整风运动的开展，中共中央政治局召开会议决定成立中央总学习委员会，由毛泽东负总责，康生和刘少奇副之，领导全延安整风学习。"
 AWR_PRC.70.a:0 "这将大大有利于整风运动的推进"
 AWR_PRC.70.b:0 "这些读书会真的会取得实质性的成果吗？"
 AWR_PRC.70.c:0 "权力狂人的新三驾马车。"
 AWR_PRC.71.t:0 "王实味抗议"
 AWR_PRC.71.d_phase_one:0 "自整风运动开展以来，王实味连续推出《政治家，艺术家》、《野百合花》两篇文章，认为“揭破清洗工作不止是消极的，因为黑暗消灭，光明自然增长。”尽管他已经料到了这类文章会被国民党利用作为攻击我党的文章材料，但是他说“（敌人）……倒更希望我们讳疾忌医，使黑暗更加扩大。”这在不少党员中间造成巨大的影响，与延安热烈的时代氛围形成了一种极不和谐的冲撞。 他的批评引起了其他党员和艺术家的更多批评。 他还声称 [Root.Capital.GetName] 存在严格的社会等级制度和对言论自由的压制，要求做出改变，让艺术家与其他成员一样受到平等对待。"
 AWR_PRC.71.d_phase_two:0 "随着整风运动的肃反日益扩大化，康生领导的“抢救运动”波及面正变得越来越广，党内对“抢救运动”的反对声音不绝于耳。 我们应该采取什么措施？"
 AWR_PRC.71.a:0 "从不正确的立场上说话就是绝对平均主义和冷嘲暗箭的方法。"
 AWR_PRC.71.b:0 "也许他们有一定的道理。"
 AWR_PRC.71.c:0 "让他们说去吧。"
 AWR_PRC.72.t:0 "延安文艺座谈会"
 AWR_PRC.72.d:0 "最近在延安召开的文艺座谈会上，毛泽东同志详细阐述了文艺工作在中国革命中的作用，强调党的文艺工作者必须从根本上解决立场、态度问题，阐明革命文艺为人民群众，首先是为工农兵服务的根本方向。 他还提出文艺要很好地“作为团结人民、教育人民、打击敌人、消灭敌人的有力的武器”，要用文艺加强统一战线，批判了封建主义、资本主义、自由主义和其他反动思想理论。\n\n这篇讲话被认为是对王实味最近批评党干涉艺术家和作家的一次有力回应。"
 AWR_PRC.72.a:0 "很棒的演讲！"
 AWR_PRC.72.b:0 "这真的是一条好路线吗？"
 AWR_PRC.72.c:0 "为什么要听这种语无伦次、空洞无物的胡言乱语？"
 AWR_PRC.73.t:0 "我们反对教条主义的努力受到挑战"
 AWR_PRC.73.d:0 "尽管有最近的指示，但某些党员对其表达了同情，有些甚至公开表示支持教条主义者。 还有人攻击毛泽东对党内教条主义的批评是没有根据的。"
 AWR_PRC.73.a:0 "这说明他们对教条主义的危害认识得还不够深刻"
 AWR_PRC.73.b:0 "也许他们有一定的道理。"
 AWR_PRC.73.c:0 "让他们说去吧。"
 AWR_PRC.74.t:0 "我们反对经验主义的努力受到挑战"
 AWR_PRC.74.d:0 "整风运动开展得如火如荼，经验主义者们纷纷做了自我检查。\n\n但是随着运动的进行，一些党员认为所谓“经验主义者”其实并不像毛泽东所批评的那样狭隘。 [Getprodogmaadvisor] 甚至进一步声称这是毛泽东在借政治运动排除异己。 "
 AWR_PRC.74.a:0 "这说明他们对经验主义的危害认识得还不够深刻"
 AWR_PRC.74.b:0 "也许他们有一定的道理。"
 AWR_PRC.74.c:0 "让他们说去吧。"
 AWR_PRC.75.t:0 "我们反对宗派主义的努力受到挑战"
 AWR_PRC.75.d:0 "有的同志对宗派人士进行了一番考察，认为宗派问题并不像毛所说的那么严重。 他们认为许多宗派主义者都是忠诚的党员。"
 AWR_PRC.75.a:0 "这说明他们对宗派主义的危害认识得还不够深刻"
 AWR_PRC.75.b:0 "也许他们有一定的道理。"
 AWR_PRC.75.c:0 "让他们说去吧。"
 AWR_PRC.76.t:0 "我们反对自由主义的努力受到挑战"
 AWR_PRC.76.d:0 "根据毛泽东同志在《反对自由主义》文章中的说法，自由主义不是中国共产党人应该追求的理想社会模式。 毛认为自由主义取消思想斗争，主张无原则的和平，结果是腐朽庸俗的作风发生，使党和革命团体的某些组织和某些个人在政治上腐化起来。 康生近期关于运动进展的报告也表明，有些同志自由主义思想泛滥，自私自利、敷衍了事、脱离群众的现象十分严重。 然而，一些同志认为康生的调查报告是被人为夸大的。"
 AWR_PRC.76.a:0 "这说明他们对自由主义的危害认识得还不够深刻"
 AWR_PRC.76.b:0 "也许他们有一定的道理。"
 AWR_PRC.76.c:0 "让他们说去吧。"
 AWR_PRC.77.t:0 "毛泽东被任命为中央政治局主席"
 AWR_PRC.77.d:0 "随着整风运动的深入开展，党内已经形成了以毛泽东同志为核心的中共中央的正确领导。中央政治局扩大会议结束后，决定由新成立的中央政治局担负领导整个党的工作责任，有权决定一切重大问题，政治局选举毛泽东为主席；中央书记处则变为根据政治局决定的方针处理日常工作的办事机关，书记处由毛泽东、刘少奇、任弼时组成，毛泽东为主席。毛泽东同志终于成为了党的真正领导者。"
 AWR_PRC.77.a:0 "这是人民的选择！"
 AWR_PRC.78.t:0 "关于抢救运动的问题"
 AWR_PRC.78.d:0 "抢救运动开展以来，受“左”倾错误影响，审干工作严重扩大化，制造了大批冤假错案，无数革命同志蒙冤受屈。\n\n对此，我们该如何做出决定？"
 AWR_PRC.78.a:0 "必须立刻纠错"
 AWR_PRC.79.t:0 "核心党员抗议抢救运动"
 AWR_PRC.79.d:0 "随着整风运动的肃反日益扩大化，康生领导的“抢救运动”波及面正变得越来越广，党内对“抢救运动”的反对声音不绝于耳。 我们应该采取什么措施？"
 AWR_PRC.79.a:0 "他们都是反革命！"
 AWR_PRC.79.b:0 "他们要清楚自己的地位！"
 AWR_PRC.79.c:0 "是时候结束这场闹剧了！"
 AWR_PRC.80.t:0 "改造我们的学习"
 AWR_PRC.80.d:0 "毛泽东同志最近发表了题为《改造我们的学习》的论文，主要批评了党内的肤浅学习方式。\n\n毛泽东在论文中批评许多党员不善于当代研究，不善于历史研究，不善于运用马克思列宁主义。 毛认为，这些趋势导致党内普遍存在“主观主义”，党员盲目实践马克思列宁主义，不考虑中国情况。 按照毛同志的说法，这种“主观主义”不利于革命，对党员的党性有极大的危害。\n\n毛泽东同志对上述趋势进行了批判，要求广泛研究中国历史、改革干部培养制度等方面的信息，以纠正这种情况。"
 AWR_PRC.80.a:0 "这些都是很棒的论点！"
 AWR_PRC.80.b:0 "毛同志对党的分析准确地反映了当前形势。"
 AWR_PRC.80.c:0 "什么反动言论啊！" 
 AWR_PRC.81.t:0 "陈独秀问题"
 AWR_PRC.81.d:0 "一位中国著名作家和政治领袖希望加入我们的行列，陈独秀可能会在即将到来的日本和中国的威胁中助我们一臂之力。 他对[CHI.GetLeader]的仇恨很大，这可能会阻碍我们与国民党的合作，但他的宣传和领导也会使我们受益。"
 AWR_PRC.81.a:0 "他已不再重要"
 AWR_PRC.81.b:0 "邀请他重新入党"
 AWR_PRC.81.c:0 "不惜一切代价邀请他重新入党！"
 AWR_PRC.82.t:0 "陈独秀接受邀请"
 AWR_PRC.82.d:0 "经过多次讨论和劝说，陈独秀终于决定接受我们的邀请，让他重新加入[global.GetCPC]。 这是革命的大好日子！ [global.GetCPC] 的创始成员回来了！"
 AWR_PRC.82.a:0 "欢迎回来，我的同志！"
 AWR_PRC.83.t:0 "陈独秀拒绝我们的邀请"
 AWR_PRC.83.d:0 "尽管我们尽最大努力说服陈独秀重返[global.GetCPC]，但陈已正式回覆我们，他将拒绝我们让他重新加入[global.GetCPC]的提议，因为他看到了我们的反托派立场，这是他难以接受的。"
 AWR_PRC.83.a:0 "没他也无所谓。"
 AWR_PRC.84.t:0 "彭述之重新加入[global.GetCPC]"
 AWR_PRC.84.d:0 "曾被中共流放的前宣传员彭述之现身我们在[Root.Capital.GetName]的总部，他决定重新加入，加速我们的革命运动！ 他的宣传工作令人印象深刻，可以帮助我们获得中国工人阶级的支持。"
 AWR_PRC.84.a:0 "欢迎回来，同志！"
 AWR_PRC.85.t:0 "将“托派”送到新疆"
 AWR_PRC.85.d:0 "一些党员变得越来越不受欢迎。 党有个大计划，将他们派往新疆，并诬陷为托洛茨基主义者，将他们清除。"
 AWR_PRC.85.a:0 "邓发和盛世才会好好照顾他们的。"
 AWR_PRC.86.t:0 "王明将“托派”送往新疆"
 AWR_PRC.86.d:0 "[global.GetCPC]的部分成员已被王明命令派往我区。 暗示这些人是托洛茨基主义者，如果他们永远不会回来，那将是受党内欢迎的。"
 AWR_PRC.86.a:0 "迎接你们的死亡吧。"
 AWR_PRC.87.t:0 "“三人团”重组后，博古在中央政治局会议上任总书记"
 AWR_PRC.87.d:0 "\n\n作为王明的亲密盟友和朋友之一，博古一直享受著战友上台带来的好处。 直到最近，王明都表示支持博古接任张闻天担任中央总书记，而张闻天对王明政策的反对也让他的位置变得脆弱。\n\n在最近的一次中央政治局会议上，王明提出的用博古取代张闻天的提议获得了多数同意。 王明还利用自己的影响力任命奥托·布劳恩为中央军委主席，并邀请周恩来恢复他在政治局常委的职务。\n\n由于最近党的组成发生了这种变化，国际派现在对党的事务拥有绝对的控制权。"
 AWR_PRC.87.a:0 "他们是革命的三颗红星！"
 AWR_PRC.88.t:0 "王明在中央政治局会议上就任总书记"
 AWR_PRC.88.d:0 "\n在最近的中央政治局会议上，许多干部表示支持王明在统一战线和其他政治问题上的做法。\n\n在王明发表讲话批评“自治主义者”并将在统一战线内对密切合作的任何阻力称为“帝国主义的同情者”和“中华民族的敌人”后，会议以王明接替前任张闻天升任总书记而告终。 其中，淹没在雷鸣般的掌声和欢呼声中的是毛泽东和他的几个随从的不满表情。"
 AWR_PRC.88.a:0 "各位向王总书记致敬！"
 AWR_PRC.89.t:0 "与第四国际的合作"
 AWR_PRC.89.d:0 "要巩固中国的政权，必须先得到支持，然后再发动革命。 获得内部支持以和平掌权是明智之举，而工人的武装斗争也是如此。"
 AWR_PRC.89.a:0 "全世界无产者，联合起来！ 不断革命，直到世界变红！"
 AWR_PRC.90.t:0 "托派政变！"
 AWR_PRC.90.d:0 "共产国际对国民党及其对华政策的支持是威胁性的。 [global.GetCPC] 目前的领导层除了眼睁睁地看著外国势力入侵中国之外什么也没做。 无论有没有多少支持，我们都必须自己动手，自己发动革命。"
 AWR_PRC.90.a:0 "反对派万岁！"
 AWR_PRC.90.b:0 "群众万岁！"
 AWR_PRC.90.c:0 "联盟万岁！"
 AWR_PRC.91.t:0 "中央军委扩大会议——\n[PRC.GetLeader]谈正面战场的重要性"
 AWR_PRC.91.desc:0 "在今天召开的中共中央军事委员会扩大会议上，[PRC.GetLeader]同志发表了主题为“摒弃游击思维，重拾正面战场”的讲话。其在讲话中指出，自遵义会议以来，全党全军受毛泽东游击战思维的影响颇深，只专注于发展敌后抗日根据地和进行游击骚扰，却忽视了正面战场以及与国民党军队配合作战的重要性。长此以往，红军将彻底丧失大兵团正面作战的能力，将日本侵略者赶出中华大地也将遥遥无期。我们必须从现在开始作出一系列的军事思想改革。"
 AWR_PRC.91.a:0 "我们真的能从正面击败日本侵略者吗？"
 AWR_PRC.92.t:0 "中国人民政治协商会议第一届全体会议"
 AWR_PRC.92.desc:0 "经过3个多月紧张、认真和周密的筹备，召开中国人民政治协商会议的工作已经圆满完成。会议召开当天，[PRC.GetLeader]等来到中南海怀仁堂，出席中国人民政治协商会议第一届全体会议。\n参会的人有穿工装的，穿长袍的，穿短衫的，穿西装的，穿军装的，戴瓜皮帽的；有说汉语的，说英语的，说客家话的，说蒙语的，说藏语的。“这些一看就知道是身份不同的人物，能够聚在一起开会，讨论建国大事，对我来说真是平生第一次遇到。”社会学家费孝通说。\n大会在欢快的中国人民解放军进行曲和场外鸣放54响礼炮中隆重开幕，全体代表起立，热烈鼓掌达5分钟之久。\n这是一个具有历史意义的庄严时刻！\n[PRC.GetLeader]致开幕词：“现在的中国人民政治协商会议是在完全新的基础上召开的，它具有代表全国人民的性质，它获得全国人民的信任和拥护。”“诸位代表先生们，我们有一个共同的感觉，这就是我们的工作将写在人类的历史上，它将表明：占人类总数四分之一的中国人从此站立起来了。”\n[PRC.GetLeader]的讲话，使许多人热烈盈眶。一百多年来，中华民族受尽外人的蔑视和蹂躏，痛苦和悲愤长期埋存在心头。一旦看到中国人终于重新站立起来，那种兴奋和激动，那种刻骨铭心的翻身感，也许是长期处于幸福生活中的后来者很难真切领会到的。\n各民主党派、各界人士80多人在会上发了言。特邀代表宋庆龄说：“这是一个历史的跃进，一个建设的巨力，一个新中国的诞生！我们达到今天的历史地位，是由于中国共产党的领导。”\n会中，先后有85位代表在大会上发言，就建设新中国的大政方针，各抒己见。\n全体会议讨论通过了《中国人民政治协商会议组织法》《新中国中央人民政府组织法》和新中国国都、纪年、国歌、国旗四个决议案。\n全体会议讨论通过了《中国人民政治协商会议共同纲领》。\n全体会议选举[PRC.GetLeader]为中央人民政府主席，选举出由180人组成的中国人民政治协商会议第一届全国委员会，通过了《中国人民政治协商会议第一届全体会议宣言》。\n当天下午6时，当夜幕将要降临时，全体代表来到天安门广场，参加人民英雄纪念碑的奠基典礼。在这个庄严肃穆的场合，[PRC.GetLeader]满怀激情地朗声宣读了亲自撰写的碑文："
 AWR_PRC.92.a:0 "中国的历史，从此开辟了一个新的时代"
 AWR_PRC.92_tootip:0 "§Y三年以来，在人民解放战争和人民革命中牺牲的人民英雄们永垂不朽！§!\n\n§Y三十年以来，在人民解放战争和人民革命中牺牲的人民英雄们永垂不朽！§!\n\n§Y由此上溯到一千八百四十年，从那时起，为了反对内外敌人，争取民族独立和人民自由幸福，在历次斗争中牺牲的人民英雄们永垂不朽！§!\n"
 AWR_PRC.93.t:0 "末代皇帝的命运"
 AWR_PRC.93.desc:0 "《论十大关系》的基本观点，明确提出溥仪等人是“大蒋介石”，对他们处理方式，只能是逐步地改造，而不能简单地处决。因此溥仪与其他伪满洲国263名战犯在政府安排的下，被送到抚顺战犯管理所接受约十年的思想再教育与劳动改造，编号是981。"
 aisin_gioro_puyi_jianyu_zz:0 "§Y§Y爱新觉罗·溥仪§!§! 收押改造"
 AWR_PRC.93.a:0 "希望他们能好好改造。"
 AWR_PRC.94.t:0 "中华联邦"
 AWR_PRC.94.d:0 "管理中国这么大的领土肯定会消耗资源。有鉴于此，[Root.GetLeader]明智地采纳了联邦共和国的理念。\n\n经过几天的闭门讨论，联邦共和国的计划终于完成了。我们人民高兴地看到，一个包含民主和共产主义的理想政府终于实现了！"
 AWR_PRC.94.a:0 "我们人民将在联邦共和国的治理下兴旺发达！"
 AWR_PRC.95.t:0 "《在中国共产党第七届中央委员会第二次全体会议上的报告》"
 AWR_PRC.95.desc:0 "辽沈、淮海、平津三战役以后，国民党军队的主力已被消灭。国民党的作战部队仅仅剩下一百多万人，分布在新疆到台湾的广大的地区内和漫长的战线上。今后解决这一百多万国民党军队的方式，不外天津、北平、绥远三种。用战斗去解决敌人，例如解决天津的敌人那样，仍然是我们首先必须注意和必须准备的。人民解放军的全体指挥员、战斗员，绝对不可以稍微松懈自己的战斗意志，任何松懈战斗意志的思想和轻敌的思想，都是错误的......\n\n人民解放军永远是一个战斗队。就是在全国胜利以后，在国内没有消灭阶级和世界上存在着帝国主义制度的历史时期内，我们的军队还是一个战斗队。对于这一点不能有任何的误解和动摇。人民解放军又是一个工作队，特别是在南方各地用北平方式或者绥远方式解决问题的时候是这样。随着战斗的逐步地减少，工作队的作用就增加了。有一种可能的情况，即在不要很久的时间之内，将要使人民解放军全部地转化为工作队，这种情况我们必须估计到......\n\n从一九二七年到现在，我们的工作重点是在乡村，在乡村聚集力量，用乡村包围城市，然后取得城市。采取这样一种工作方式的时期现在已经完结。从现在起，开始了由城市到乡村并由城市领导乡村的时期。党的工作重心由乡村移到了城市。在南方各地，人民解放军将是先占城市，后占乡村。城乡必须兼顾，必须使城市工作和乡村工作，使工人和农民，使工业和农业，紧密地联系起来。决不可以丢掉乡村，仅顾城市，如果这样想，那是完全错误的......\n\n在城市斗争中，我们依靠谁呢？有些糊涂的同志认为不是依靠工人阶级，而是依靠贫民群众。有些更糊涂的同志认为是依靠资产阶级。在发展工业的方向上，有些糊涂的同志认为主要地不是帮助国营企业的发展，而是帮助私营企业的发展；或者反过来，认为只要注意国营企业就够了，私营企业是无足轻重的了。我们必须批判这些糊涂思想。我们必须全心全意地依靠工人阶级，团结其他劳动群众，争取知识分子，争取尽可能多的能够同我们合作的民族资产阶级分子及其代表人物站在我们方面，或者使他们保持中立，以便向帝国主义者、国民党、官僚资产阶级作坚决的斗争......\n\n召集政治协商会议和成立民主联合政府的一切条件，均已成熟。一切民主党派、人民团体和无党派民主人士都站在我们方面。上海和长江流域的资产阶级，正在同我们拉关系。南北通航通邮业已开始。陷于四分五裂的国民党，已经脱离了一切群众......\n\n无产阶级领导的以工农联盟为基础的人民民主专政，要求我们党去认真地团结全体工人阶级、全体农民阶级和广大的革命知识分子，这些是这个专政的领导力量和基础力量。没有这种团结，这个专政就不能巩固。同时也要求我们党去团结尽可能多的能够同我们合作的城市小资产阶级和民族资产阶级的代表人物，它们的知识分子和政治派别，以便在革命时期使反革命势力陷于孤立，彻底地打倒国内的反革命势力和帝国主义势力......\n\n我们很快就要在全国胜利了。这个胜利将冲破帝国主义的东方战线，具有伟大的国际意义。夺取这个胜利，已经是不要很久的时间和不要花费很大的气力了；巩固这个胜利，则是需要很久的时间和要花费很大的气力的事情。"
 AWR_PRC.95.a:0 "迈向更美好的明天。"
 GFX_report_event_xibaipo_tt:0 "§Y我们有批评和自我批评这个马克思列宁主义的武器。\n\n我们能够去掉不良作风，保持优良作风。\n\n我们能够学会我们原来不懂的东西。\n\n我们不但善于破坏一个旧世界，我们还将善于建设一个新世界。\n\n中国人民不但可以不要向帝国主义者讨乞也能活下去，而且还将活得比帝国主义国家要好些。§!"
 AWR_PRC.96.t:0 "扩编长江局"
 AWR_PRC.96.d:0 "随著王明的思想在党内得到越来越多的支持，党中央决定为他的工作分配更多的资源。 更多的党员被分配到长江局，以协助王和他加强统一战线的努力。"
 AWR_PRC.96.a:0 "太棒了！"
 AWR_PRC.97.t:0 "东北之争"
 AWR_PRC.97.d:0 "驻扎在东北的日军最终被[SOV.GetName]给予了毁灭性打击后投降。 因此，现今东北大部分地区仍在[SOV.GetName]占领之下。现在国共双方都在争夺这些领土，我们得加紧部属，免得敌方夺取这些领土！"
 AWR_PRC.97.a:0 "东北是我们的！"

 PRC_unit_leader_event:0 "人物事件"
 PRC_liu_zhidan.1.t:0 "刘志丹同志壮烈牺牲"
 PRC_liu_zhidan.1.desc:0 "刘志丹（1903年10月4日一1936年4月14日），名景桂，字子丹、志丹。中国工农红军高级将领，忠诚的共产主义战士，杰出的无产阶级革命家、军事家，西北红军和西北革命根据地的主要创建人之一。1936年3月，率红28军参加东征战役，由罗峪口附近东渡黄河，挺进晋西北，迭克敌军。4月14日在山西中阳县三交镇（现柳林县三交镇）战斗中牺牲，年仅33岁。刘志丹烈士一生热爱党、热爱祖国、热爱人民，追求真理，英勇善战，百折不挠，艰苦奋斗，忠心赤胆，为创建红军和革命根据地，为中国人民的解放事业建立了不可磨灭的功勋，被毛泽东同志誉为“群众领袖，民族英雄”。"
 PRC_liu_zhidan.1.a:0 "上下五千年，英雄万万千；人民的英雄，要数刘志丹"
 PRC_liu_zhidan.2.t:0 "刘志丹同志转危为安"
 PRC_liu_zhidan.2.desc:0 "刘志丹同志在东征期间的山西中阳县三交镇战斗中不幸被敌军炮弹炸中负伤。幸运的是，炮弹并未伤及要害，经过全力抢救，刘志丹同志已经脱离了生命危险。"
 PRC_liu_zhidan.2.a:0 "万幸！"
 PRC_dong_zhentang.1.t:0 "董振堂同志壮烈牺牲"
 PRC_dong_zhentang.1.desc:0 "董振堂（1895年12月21日-1937年1月20日），字绍仲，河北省邢台市新河县人。1920年入保定陆军军官学校学习，毕业后投身于冯玉祥的西北军，曾参加推翻贿选总统曹锟的北京政变和北伐战争。1931年12月14日，率兵举行宁都起义。1932年4月加入中国共产党。1934年10月，董振堂率部参加长征，红5军团担任最艰苦的后卫任务，多次完成阻击国民党军的任务，为保障中央红军主力北上立下了赫赫战功，红5军团因此荣膺“铁流后卫”的光荣称号。1936年10月所部编入红军西路军，渡黄河西征，指挥所部参加攻占山丹、临泽、高台等县城的战斗。1937年1月12日率部在甘肃高台县城与近十倍于己的敌人浴血苦战，战至最后一人一弹，于20日壮烈牺牲。"
 PRC_dong_zhentang.1.a:0 "路遥知马力，董振堂是“坚决革命的同志”"
 PRC_dong_zhentang.2.t:0 "董振堂同志壮烈牺牲"
 PRC_dong_zhentang.2.desc:0 "董振堂（1895年12月21日-1937年1月20日），字绍仲，河北省邢台市新河县人。1920年入保定陆军军官学校学习，毕业后投身于冯玉祥的西北军，曾参加推翻贿选总统曹锟的北京政变和北伐战争。1931年12月14日，率兵举行宁都起义。1932年4月加入中国共产党。1934年10月，董振堂率部参加长征，红5军团担任最艰苦的后卫任务，多次完成阻击国民党军的任务，为保障中央红军主力北上立下了赫赫战功，红5军团因此荣膺“铁流后卫”的光荣称号。1936年10月所部编入红军西路军，渡黄河西征，指挥所部参加攻占灵武、银川、磴口等县城的战斗。1937年1月12日率部在宁夏银川县城与近十倍于己的敌人浴血苦战，战至最后一人一弹，于20日壮烈牺牲。"
 PRC_dong_zhentang.2.a:0 "路遥知马力，董振堂是“坚决革命的同志”"
 PRC_lu_dongsheng.1.t:0 "卢冬生赴苏学习" 
 PRC_lu_dongsheng.1.d:0 "经党组织决定，将卢冬生同志派往苏联学习"
 PRC_lu_dongsheng.1.a:0 "早去早回，同志！"
 PRC_lu_dongsheng.2.t:0 "卢冬生回国" 
 PRC_lu_dongsheng.2.d:0 "自苏德战争爆发后，卢冬生同志便一直被迫滞留苏联，现在苏联正式对日宣战，卢冬生同志也正好随苏联军队回到我国东北地区。"
 PRC_lu_dongsheng.2.a:0 "欢迎回来，同志！"
 PRC_lu_dongsheng.3.t:0 "卢冬生遇害" 
 PRC_lu_dongsheng.3.d:0 "卢冬生，湖南湘潭人。1927年参加“八一”南昌起义；同年12月加入中国共产党。1929年，赴湘鄂西革命根据地工作。历任中国工农红军排、连、营、团长，独立师师长，红三军第八师师长兼政委，第七师师长，红二军团第四师师长等职。抗日战争初期，任国民革命军第八路军第一二〇师三五八旅旅长。\n抗战中期，卢冬生被派到苏联入伏龙芝军事学院学习。学习结束后到驻苏联远东地区东北抗日联军教导旅工作。刚刚得到消息，他在哈尔滨被两名拦路抢劫的苏联红军士兵枪杀，时年37岁。"
 PRC_lu_dongsheng.3.a:0 "他为了党和人民的事业，从来不避艰险，不怕困难，坚韧不拔，出色地完成了党交给他的每一件光荣任务。"
 ludongshengshishi_tt:0 "§R卢冬生逝世§!" 
 AWR_PRC.98.t:0 "解放动员令"
 AWR_PRC.98.desc:0 "一大批英勇善战的八路军、新四军将领在抗战中涌现，现在他们希望尽最大努力为人民谋求解放。"
 AWR_PRC.98.a:0 "重用他们，解放全中国！"
 AWR_PRC.98.b:0 "否（将启用分区占领）"
 AWR_PRC.99.t:0 "毛岸英同志回国"
 AWR_PRC.99.desc:0 "1936年赴苏联学习的毛岸英同志于今日乘机返回了延安。对于毛岸英同志今后的工作安排，党中央讨论决定——"
 AWR_PRC.99.a:0 "他还需要上“劳动大学”这一课"
 AWR_PRC.99.b:0 "他一定能在军事领域施展才华"
 AWR_PRC.100.t:0 "李立三同志回国"
 AWR_PRC.100.desc:0 "1930年赴苏联检讨和学习工作的李立三同志乘列车于今日回到了东北。党中央已经决定任命他为中共中央东北局委员并担任军调部东北三人组成员和首席代表。"
 AWR_PRC.100.a:0 "欢迎回家！"
 AWR_PRC.101.t:0 "解放战争"
 AWR_PRC.101.d:0 "国民党未能提出一个能让民众满意的解决方案。和他们谈判已经没有用了。现在是中国摆脱国民党这个顽疾的时候了。我们将在[Root.GetLeader]的英明领导下团结人民，解放中国的每一块领土。人民的力量终将战胜一切反动派！"
 AWR_PRC.101.a:0 "开战！"
 AWR_PRC.102.t:0 "[From.GetName] 重启内战！"
 AWR_PRC.102.d:0 "[From.GetName]已经在与我们接壤的边界升级事态，并最终袭击了我们的军队，到目前为止，这已经变成了一场全面的内战。我们将一劳永逸地统一中国！"
 AWR_PRC.102.a:0 "准备打仗了！"



 AWR_PRC_news:0 "新闻事件"
 AWR_PRC_news.1.t:0 "《红星照耀中国》今日出版"
 AWR_PRC_news.1.desc:0 "[This.GetNewsIcon]《红星照耀中国》，曾易名为《西行漫记》，是美国记者埃德加·斯诺所著的纪实文学作品，于1937年10月首次出版，于1938年2月首次出版中文版，在中外进步读者中引起极大轰动。该作品真实记录了埃德加·斯诺自1936年6月至1936年10月在中国西北革命根据地进行实地采访的所见所闻，报道了中国和中国工农红军以及许多红军领袖、红军将领的情况。从多个方面展示中国共产党为民族解放而艰苦奋斗和牺牲奉献的精神，瓦解了种种歪曲、丑化共产党的谣言。斯诺通过对领导人和普通民众的观察和描述，把枯燥的红区党组织、各种文件、会议等内容转变为让读者读起来感到亲切生动的文字。在陕北，斯诺采访了众多共产党领袖和红军将领，如毛泽东、周恩来、彭德怀、林伯渠、邓发、徐海东等。斯诺描述他们的言谈举止，追溯他们的家庭环境和青少年时代，试图从其出身和成长经历中，找寻他们成为共产党人的原因。此外，斯诺还深入红军战士和根据地老百姓之中，对共产党的基本政策、军事策略，红军战士的生活，以及陕北根据地的社会制度、货币政策、工业和教育等情况做了广泛的调查。"
 AWR_PRC_news.1.a:0 "红星照耀中国！"
 AWR_PRC_news.1.b:0 "简直是一派胡言！"
 AWR_PRC_news.1.c:0 "有意思的一本书"
 AWR_PRC_news.1.d:0 "令人作呕的布尔什维克童话！"
 AWR_PRC_news.2.t:0 "百团大战"
 AWR_PRC_news.2.desc:0 "[This.GetNewsIcon]为了打破日军对中共华北地区抗日根据地的“囚笼封锁”，在中国共产党八路军副总指挥彭德怀的部署下，八路军以大约一百个团的兵力向华北沦陷区的各大交通干线发起了大规模的破袭战。由于此前对共产党敌后力量的轻视，日军对这次突袭几乎毫无防范，致使华北地区大量交通要道和基础设施被八路军摧毁，日军在该地区的机动能力几近瘫痪，大量此前布置的要塞和据点也被拔除。这场重大的胜利无疑将使中国人民抗战到底的决心更加坚定。"
 AWR_PRC_news.2.a:0 "让小鬼子尝尝我们的厉害！"
 AWR_PRC_news.2.b:0 "他们会后悔的！"
 AWR_PRC_news.2.c:0 "有趣的游击战术"