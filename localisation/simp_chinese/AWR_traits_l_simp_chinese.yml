 PRC_maque:0 "麻雀战"
 PRC_maque_desc:0 "§L麻雀战是抗日游击战的一种作战形式。麻雀在觅食飞翔时，从来不成群结队，多半是一二只，三五只，十几只，忽东忽西，忽聚忽散，目标小，飞速快，行动灵活。§!"
 PRC_didao:0 "地道战"
 PRC_didao_desc:0 "§L地道战战法从晋察冀边区保定清苑的冉庄开始经过不断的发展，从单一的躲藏成为了能打能躲、防水防火防毒的地下工事，并逐渐形成了房连房、形成了内外联防，互相配合，打击敌人。§!"
 PRC_dilei:0 "地雷战"
 PRC_dilei_desc:0 "§L抗日根据地军民在反“扫荡”和反“蚕食”斗争中，随地取材，利用废铁、玻璃、石头等制造地雷，工省价廉，有一定的杀伤力，亦不易被敌人发现。他们把集束起来的手榴弹和用土法自制的各种地雷，随处埋设于大道、田野、山脚、村边、室内、室外、树林草丛等敌人必经或可能经过之地，施以伪装，使入侵之敌陷于处处有雷，物物皆炸，寸步难行的境地。§!"
 PRC_shuishang:0 "水上游击战"
 PRC_shuishang_desc:0 "§L水上游击战主要是在水网地带进行。我抗日军民充分利用小木船出没自如的便利，在河湖港汊等复杂水域寻机狠狠打击敌人。他们在白洋淀的每一个港汊间，给敌人撒下了严密的埋伏网，猎枪从芦苇的背后瞄准敌人的汽艇、包运船和粮队，给敌人以出其不意地打击。§!"
 PRC_poxi:0 "破袭战"
 PRC_poxi_desc:0 "§L破袭战，游击队或正规部队以破坏或袭击敌后方和纵深内重要目标为主的作战。破袭的主要目标有交通运输线、输油管线、通信设施、工程设施、重要技术兵器、作战和补给基地等，以给敌行动、联络、补给等造成困难，消耗或消灭敌人。§!" 


 commander_traits:0 "将领特质"
 youji_hero:0 "游击英雄"
 youji_hero_desc:0 "§L长年以来的游击战争极大地锤炼了红军指战员们的游击作战能力。§!"
 military_political_commissar:0 "军事政治委员"
 military_political_commissar_desc:0 "§L共产主义国家军队团以上部队和相当于团以上单位负责党的工作和政治工作的领导干部。和同级军事指挥员同为部队首长，通常是同级党的委员会日常工作的主持者。根据需要在独立执行任务的营和相当于营的单位，也设立政治委员，简称政委。§!"
 Tzxx_Resprcted_military_leader:0 "德高望重的军队领袖"
 Tzxx_Resprcted_military_leader_desc:0 "§L这位军官在军中拥有很高的人气和声望，深受广大一线指战员的拥护和爱戴。§!"
 irregulars_leader:0 "非正规部队指挥官"
 irregulars_leader_desc:0 "§L善于指挥非正规部队作战。 §!"
 Tzxx_imperturbable_strategist:0 "沉着冷静的战略家"
 Tzxx_imperturbable_strategist_desc:0 "§L哪怕没有快人一步的战略嗅觉，这名指挥员在军队组织方面也拥有不俗的成就，能以强大的军事能力和卓越的政治素养应对绝大部分突发情况。§!"
 advantaged_operational_experts:0 "优势破敌的战略家"
 advantaged_operational_experts_desc:0 "§L这位军官爱好进行碾压式作战，尽可能的减少不必要的伤亡，因此深受士兵们的爱戴。但也导致在局势不明朗时，此将领对发起攻势有所忧虑。§!"
 rising_young_officer:0 "冉冉升起的新星"
 rising_young_officer_desc:0 "§L再给他几年，毕竟他还是颗未经凋琢的鑽石。§!"
