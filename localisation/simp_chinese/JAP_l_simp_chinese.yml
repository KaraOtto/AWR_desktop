 snl_news.30.c:0 "希望那里真的恢复了秩序"
 snl_news.30.t:0 "南京安全区被迫关闭"
 socialism:0 "社会民主主义"
 socialism_desc:0 "社会民主主义的特点是提倡由高税收以推行的国家赞助之福利，旨在通过国家干预来废除或减轻资本主义的影响，并寻求通过改良主义手段改变国家机构。"
 socialist_idealist:0 "社会主义理想主义者"
 socialist_influence:0 "社会主义影响"
 socialist_science_focus:0 "社会主义科学"
 socialist_start_cw_tt:0 "§Y社会主义§!支持者将发动一场内战。\n"
 some_progress_reset_tt:0 "§Y自从新政府成立以来，一些国家的未来已经发生了改变，甚至整个国家的道路都被重绘了。§!\n"
 southern_expansion:0 "南进论"
 southern_expansion_focus:0 "南进扩张"
 southern_expansion_focus_desc:0 "我们必须能够保护我们在东亚的经济和领土利益。因此，我们必须把目光投向中国以外的地方，甚至是印度支那殖民地或许更远的地方，将它们从西方帝国主义中解放出来。"
 sov_jap_border_conflict_won:0 "来自朝鲜边境冲突的经验："
 sov_no_longer_aid_china_tt:0 "如果他们接受的话：§G[SOV.GetName]不再向中国发送装备。§!"
 soviet.2.a:0 "干的好！"
 soviet.2.d:0 "我们跨越满洲边境，对集结的日本军队的奇袭成功了！我们成功抓住了他们还未完成战斗准备的时机。我们勇敢的士兵漂亮给了他们一个迎头痛击。"
 soviet.2.t:0 "奇袭成功"
 soviet.3.a:0 "组织一个行刑队。"
 soviet.3.d:0 "我们跨越满洲边境，对集结的日本军队奇袭失败了！敌人破解了我们进行的钳形攻势，我们在撤退前遭受了严重的损失。"
