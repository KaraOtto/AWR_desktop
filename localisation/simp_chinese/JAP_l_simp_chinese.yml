 albert_coady_wedemeyer_desc:0 "阿尔伯特·科蒂·魏德迈（Albert Coady Wedemeyer，1896年7月9日－1989年12月17日）是美国陆军指挥官，1943年10月至战争结束期间在第二世界大战期间在亚洲服役。 此前，他是战争计划委员会的重要成员，负责制定入侵诺曼第的计划。 1942 年春，他与马歇尔将军和一小群美国军人一起前往伦敦，与英国人协商，试图说服英国人支持跨海峡入侵，当时他是乔治·C·马歇尔将军的首席顾问。 魏德迈是一位坚定的反共主义者。 1944年至1945年间，他在中国担任蒋介石的参谋长，并指挥所有驻华美军。"
