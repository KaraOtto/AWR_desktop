 rcmjapan.1013.a:0 "[SCG.GetName]万岁！"
 rcmjapan.1013.b:0 "现在还不是时候。"
 rcmjapan.1013.d:0 "[SCG.GetName]此前曾被中国军队摧毁，政府已经不复存在。然而，现在光荣的日本帝国军队已经收复其首都，我们应该考虑重建政府吗？还是应该继续直接控制该地区？"
 rcmjapan.1013.t:0 "重建[SCG.GetName]？"
 rcmjapan.1020.a:0 "让[EYW_jap_chi.GetName]做自己。"
 rcmjapan.1020.b:0 "但...我们为了帝国而战！为皇军流血！我要见大君！"
 rcmjapan.1020.d:0 "我们的日本主子已经决定是时候让我们融入 [EYW_jap_chi.GetName] 了。 我们要遵从吗？"
 rcmjapan.1020.t:0 "与[EYW_jap_chi.GetName]整合？"
 rcmjapan.1021.a:0 "让[EYW_jap_chi.GetLeader]做自己。"
 rcmjapan.1021.b:0 "但...我们为了帝国而战！为皇军流血！我要见大君！"
 rcmjapan.1021.d:0 "我们的日本主子已经决定是时候让我们融入 [EYW_jap_chi.GetName] 了。 我们要遵从吗？"
 rcmjapan.1021.t:0 "与[EYW_jap_chi.GetName]整合？"
 rcmjapan.1022.a:0 "[EHB.GetLeader]还是比较能干的。"
 rcmjapan.1022.b:0 "[HPC.GetLeader]还是比较能干的。"
 rcmjapan.1022.c:0 "[CHI.GetLeader]，你的最后时刻到了。"
 rcmjapan.1022.d:0 "现在我们已经建立了一个合适的中国政府，似乎没有必要保留 [EHB.GetName] 的临时政府。 我们应该如何对待他们？"
 rcmjapan.1022.t:0 "[EHB.GetName]的命运"
 rcmjapan.1023.a:0 "太好了。"
 rcmjapan.1023.d:0 "我们的日本主人决定我们将成为 [FROM.GetAdjective] 领土的合法所有者。"
 rcmjapan.1023.t:0 "整合[FROM.GetName]"
 rcmjapan.103.a:0 "当然！"
 rcmjapan.103.b:0 "没有必要。"
 rcmjapan.103.d:0 "在我们控制了南察哈尔后，军队中的一些人认为成立一个南察哈尔自治政府的附庸国将有利于我们在这个地区的军事发展。我们应该联系当地官员建立这样的政府吗？"
 rcmjapan.103.t:0 "成立[SCG.GetName]？"
 rcmjapan.104.a:0 "当然！"
 rcmjapan.104.d:0 "在我们能够以更好的状态对抗中国军队之前，我们需要让公众相信战争是合法的，我们军队的士气也需要提高。一些爱国的海报应该能起到作用。"
 rcmjapan.104.t:0 "扩张主义宣传"
 rcmjapan.105.a:0 "当然！"
 rcmjapan.105.d:0 "中国政府已经垮台，现在是日本的时代。 但是，东北地区仍有一些残余的共产党游击队员。在我们继续做其他重要的事情之前，我们必须消除它们。"
 rcmjapan.105.t:0 "击垮共产党游击队！"
 rcmjapan.106.a:0 "动荡的时代"
 rcmjapan.106.d:0 "在日本国内发生巨大的政治转变后，[JAP.GetName]的意识形态立场已经转变为一条截然不同的路线。因此，预计我们的政府也会受到影响。这将标志着我们和日本的历史翻开了新的篇章。"
 rcmjapan.106.t:0 "一个新殖民政府成立了"
 rcmjapan.1061.a:0 "太好了。"
 rcmjapan.1061.d:0 "经过一些内部谈判和计划，新的殖民地政府已经上任。 我们的海外领土现在应该更加稳定。"
 rcmjapan.1061.t:0 "[From.GetName] 新政府上任"
 rcmjapan.1062.a:0 "太好了。"
 rcmjapan.1062.d:0 "经过一些内部谈判和计划，新的殖民地政府已经上任。 我们的海外领土现在应该更加稳定。"
 rcmjapan.1062.t:0 "[From.GetName] 新政府上任"
 rcmjapan.107.a:0 "这可不妙！"
 rcmjapan.107.d:0 "我们的一些特工发现了大量证据表明[JAP.GetName]正在奉行其“南进论”，并且很可能会对我们发起进攻。另外，由于德国和日本最近签署的三国公约，如果他们真的发动攻击，我们很难得到任何支持。"
 rcmjapan.107.t:0 "日本奉行“南进论”"
 rcmjapan.11.a:0 "我们会进入暹罗，不管他们想要说什么。"
 rcmjapan.11.b:0 "事后看来，威胁入侵的确太咄咄逼人了。"
 rcmjapan.11.d:0 " 我们已经在印度支那靠近暹罗边境的地方集结了大量部队，我们的态度很明确，我们真诚地希望使用他们的领土作为基地，将东南亚从欧洲殖民主义的手中解救出来。不过，通过允许他们加入我们的军事同盟，我们很有希望将暹罗变为日本帝国的一个傀儡国，这样就可以省去一次一边倒的入侵行动。当然，如果他们拒绝了我们，那就等同于对我们宣战。"
 rcmjapan.11.t:0 "对暹罗的最后通牒"
 rcmjapan.111.a:0 "那是当然！（这样将更容易在大陆上部署部队）"
 rcmjapan.111.b:0 "现在还不是时候。"
 rcmjapan.111.d:0 "经过我们的整合工作后，我们终于可以宣布满洲地区是我们核心领土的一部分。我国政府内部的一些人建议，把我们的首都迁往那里可以加强该地区的稳定，甚至可以鼓励投资和促进经济繁荣。我们应该迁都到新京吗？"
 rcmjapan.111.t:0 "迁都至新京？"
 rcmjapan.112.a:0 "让我们放弃所有得到的中国领土？嗯？没门儿"
 rcmjapan.112.b:0 "如果这能够将我们与美国可能发生的战争就此扼杀，就这样吧。"
 rcmjapan.112.d:0 "日本外相野村吉三郎最近呈上了一份来自科德尔·赫尔的消息，其详细阐述日本与美国如若要达成互不侵犯条约所需要协议的要求，这些要求看起来都非常合理。然而，通过进一步的调查发现，野村吉三郎擅自修改了一些达成条约所需要的要求，原本则十分苛刻，甚至可以视作美国政府对我们下的最后通牒。我们应该如何去响应？"
 rcmjapan.112.t:0 "来自科德尔·赫尔的消息"
 rcmjapan.113.a:0 "哈，这真是出乎意料。"
 rcmjapan.113.d:0 "在日本外相野村吉三郎和美国国务卿科德尔·赫尔会谈欧，令人惊讶的是，日本政府决定接受我们的要求，尽管所有有关方面的军事家，以及东亚事物专家都对这持反对意见。但是，这意味着我们两国之间的和平已经降临。"
 rcmjapan.113.t:0 "日本接受了我们的要求"
 rcmjapan.114.a:0 "哈，这真是出乎意料。"
 rcmjapan.114.d:0 "在日本外相野村吉三郎和美国国务卿科德尔·赫尔会谈欧，令人惊讶的是，日本政府决定接受[USA.GetNameDef]的要求，尽管所有有关方面的军事家，以及东亚事物专家都对这持反对意见。但是，这意味着两国之间的和平已经降临。"
 rcmjapan.114.t:0 "日本放弃扩张"
 rcmjapan.115.a:0 "友好的提议以缓解摩擦对立"
 rcmjapan.115.b:0 "下达我们的最后通牒"
 rcmjapan.115.d:0 "我们已经在印度支那靠近暹罗边境的地方集结了大量部队，我们的态度很明确，我们真诚地希望使用他们的领土作为基地，将东南亚从欧洲殖民主义的手中解救出来。我们希望他们能够加入我们的军事同盟。然而，军方的一些人建议，我们应当将暹罗变成我们的傀儡国。另一些人认为，为了两国间的友谊，我们应该进行长期的合作。我们应该怎样对待暹罗？"
 rcmjapan.115.t:0 "暹罗问题"
 rcmjapan.116.a:0 "那是当然。他们的新政府看起来比之前明智多了。"
 rcmjapan.116.b:0 "不行。他们侵略邻国的行为就已经越过了我们容忍的底线。"
 rcmjapan.116.desc:0 "在领导层进行了重组后，日本帝国真诚地向我们抛出了橄榄枝，希望两国能够达成贸易协议，并就亚洲的问题上签署互不干涉条约。日本帝国是[ENG.GetName]的威胁，然而他们的新政府非常认真地重新调整了他们的外交政策。我们应该怎么响应？"
 rcmjapan.116.t:0 "与日本的新加坡会议？"
 rcmjapan.117.a:0 "好极了！"
 rcmjapan.117.desc:0 "在政府经过重组之后，新的领导班子主动联系了[ENG.GetNameDef]。我们真诚的希望我们能够和他们签订贸易协议，并就亚洲的一些问题上能够达成一致。今天，[ENG.GetNameDef]回复我们，他们接受了我们的提议，并于近期安排一次会谈探讨其中的细节。"
 rcmjapan.117.t:0 "[ENG.GetName]接受了我们的提议"
 rcmjapan.118.a:0 "去他们的！"
 rcmjapan.118.desc:0 "在政府经过重组之后，新的领导班子主动联系了[ENG.GetNameDef]。我们真诚的希望我们能够和他们签订贸易协议，并就亚洲的一些问题上能够达成一致。然而，即使我们摆出友好的姿态，英国人还是无情地拒绝了我们的提议。这让人感到沮丧。"
 rcmjapan.118.t:0 "[ENG.GetName]拒绝了我们的提议"
 rcmjapan.119.a:0 "好极了！"
 rcmjapan.119.d_1:0 "随着其他地方的战斗愈演愈烈，我们驻扎在上海的部队已经失去了耐心，他们开始朝着敌军进发。"
 rcmjapan.119.d_2:0 "在我们控制了上海之后，我们当地的一些驻军加入了前线部队。"
 rcmjapan.119.t_1:0 "上海之战"
 rcmjapan.119.t_2:0 "在上海的驻军"
 rcmjapan.12.a:0 "我们同意与日本结盟。"
 rcmjapan.12.b:0 "我们不会轻易放弃自己的独立！"
 rcmjapan.12.d:0 " 日本已经在靠近我们边境的地方集结了大量军队，根据判断，他们的计划是使用我们的港口作为进一步入侵缅甸和马来亚的基地。现在，他们给我们的选择是要么屈服并允许他们通过，要么就面对他们的入侵。\n\n尽管这意味着我们放弃主权并变成日本的傀儡国，但是避免战争才是我们最佳的选择。"
 rcmjapan.12.t:0 "日本下达了最后通牒"
 rcmjapan.120.a:0 "我们必须击退他们！"
 rcmjapan.120.d:0 "我们的军队与[From.GetAdjective]的士兵发生了冲突,[From.GetAdjective]在上海的驻军开始攻击我们。"
 rcmjapan.120.t:0 "上海之战"
 rcmjapan.121.a:0 "明白了。"
 rcmjapan.121.d:0 "在与张澜取得联系后，我们向他告知我们将支持中国的民主人士。他建议我们应该在一定程度上给予中国的民主人士更多的支持，这样他们就可以组织一个新的民主联盟来反对南京的政权。"
 rcmjapan.121.t:0 "与张澜的会面"
 rcmjapan.122.a:0 "新的内阁将会满足我们的要求"
 rcmjapan.122.d:0 "由于当前的政府并不能兑现他们对军方的诺言——稳定我们的帝国，因此，我们将动议不信任投票，解散帝国的参议院与众议院，内阁将被解散，我们将寻求新的首相。"
 rcmjapan.122.t:0 "动议不信任投票"
 rcmjapan.123.a:0 "很好！"
 rcmjapan.123.b:0 "没门。"
 rcmjapan.123.d:0 "新成立的日本共产主义政府表示他们将支持我们的事业！但这一切不是没有代价的，一旦成功了，我们就要成为他们的傀儡国。"
 rcmjapan.123.t:0 "日本提出了要求"
 rcmjapan.124.a:0 "不可接受！"
 rcmjapan.124.d:0 "在我们告知了中国共产党我们将在他们境内配合他们发动一场革命以推动中国统一后，[PRC.GetName]的领导人却拒绝了我们的提议。看来他们不过是一群傻瓜，比那些资本家好不了多少。"
 rcmjapan.124.t:0 "中国人拒绝了"
 rcmjapan.125.a:0 "很好！"
 rcmjapan.125.d:0 "在我们告知了中国共产党我们将在他们境内配合他们发动一场革命以推动中国统一后，[PRC.GetName]的领导人同意了我们的提议。一个红色的东亚将在在不久的将来诞生，一轮红日正冉冉升起！"
 rcmjapan.125.t:0 "与中国共产党的交易"
 rcmjapan.126.a:0 "为了革命！"
 rcmjapan.126.d:0 "日本人在中国发动了一场革命！红色亚洲崛起，红日冉冉升起！"
 rcmjapan.126.t:0 "日本掀起了革命！"
 rcmjapan.127.a:0 "或许，终于有一天我们会重获自由……"
 rcmjapan.127.d:0 "日本人击溃了国民党！现在是时候加入他们，履行我们的诺言了。"
 rcmjapan.127.t:0 "水到渠成"
 rcmjapan.128.a:0 "东方正在崛起！"
 rcmjapan.128.d:0 "今天早些时候，东方会的成员闯入了国会恐吓那些反对他们的议员，直至他们离场为止。东方会推动了一项叫做“Kyōryoku Naikaku（强力内阁）”的法案，其授予了内阁极为强大的权利。虽然这看起来只是临时性的法案，但这就是像在为“日本的希特勒”铺平上台的道路。随着东方会掌权，日本人民急切地想要知道法西斯主义会为日本带来什么。"
 rcmjapan.128.t:0 "东方会发动军事政变"
 rcmjapan.13.a:0 "大东亚共荣圈愈加强大了。"
 rcmjapan.13.d:0 "[From.GetLeader]明智地决定接受我们的最后通牒并与我们结成军事同盟。 事实上，我们将把暹罗变为我们在太平洋下一步行动的基地。"
 rcmjapan.13.t:0 "暹罗接受最后通牒"
 rcmjapan.14.a:0 "事情变成这样真是不幸。"
 rcmjapan.14.d:0 "[From.GetLeader]拒绝了我们进入暹罗以及结为军事同盟的要求。不过我们已经宣布不管如何都会进入，所以这意味着战争。"
 rcmjapan.14.t:0 "暹罗拒绝最后通牒"
 rcmjapan.15.a:0 "为了伟大的正义！"
 rcmjapan.15.d:0 "随着我们击败英国人，我们手头有了一批数量可观的印度战俘。经过适当的“说服”，我们可以让这些战俘支持我们的军队……"
 rcmjapan.15.t:0 "印度国民军"
 rcmjapan.2.a:0 "太好了。"
 rcmjapan.2.d:0 "令人惊讶的是，中国最终选择承认了冀察政务委员会独立的请求。他们大概没有意识到这是我们计划的一部分。不管怎样，我们已经派遣了人员与宋哲元进行接触，他们可能会在未来的几周内加入我们。"
 rcmjapan.2.t:0 "中国接受了我们的要求"
 rcmjapan.3.a:0 "为什么会变成这样？！"
 rcmjapan.3.d:0 "俄国人和他们的蒙古走狗发现了我们正在增强黑龙江的驻军，他们在我们准备好之前就发动了进攻！我们的部队在血腥的遭遇战中遭到了敌人无情地蹂躏。"
 rcmjapan.3.t:0 "边境冲突：苏联胜利"
 rcmjapan.34.a:0 "我们需要扩大我们的傀儡政权以更加稳定地统治。"
 rcmjapan.34.b:0 "保持我们对占领地的直接控制会更加有利。"
 rcmjapan.34.d:0 "蒋介石政府终于垮台了。现在，中国的未来掌握在我们手中。我们可以扩大我们的傀儡政府，让他们替我们统治我们新的中国占领地，也可以维持住现状，以更好地控制住局面。"
 rcmjapan.34.t:0 "扩大我们的傀儡政权？"
 rcmjapan.35.a:0 "利用他们的信仰为我们而战。"
 rcmjapan.35.b:0 "没门儿！"
 rcmjapan.35.d:0 "在我们击败了新疆的盛世才后，当地的维吾尔族人要求建立一个只有的东突厥斯坦共和国，他们称他们愿意为我们的伟大的东亚事业而战。"
 rcmjapan.35.t:0 "新疆的维吾尔族要求在当地建立一个傀儡政府"
 rcmjapan.36.a:0 "让人民们来决定吧！"
 rcmjapan.36.d:0 "选举之日来临。这是自首相犬养毅被暗杀后，第一次举行选举。尽管军方已经被民族主义情绪给深深地影响了，选举似乎也因为军方而显得无足轻重。但一些人表示，这一次选举实际上是日本民主的新希望。但是，没有人能够知晓这个国家的未来通往何方。"
 rcmjapan.36.t:0 "1936年大选"
 rcmjapan.37.a:0 "在民主国家，权力民主的交替总是好的。"
 rcmjapan.37.d:0 "尽管军方与政府之间的关系日益紧张，但昨天的大选还算是平稳地举行了。选举结果于今早发布，而立宪民政党借着此次选举一跃成为最大的政党。\n\n立宪民政党的领导人将在几周后被任命为首相。"
 rcmjapan.37.t:0 "民政党获胜"
 rcmjapan.38.a:0 "最终，立宪政友会甩开了身上的枷锁。"
 rcmjapan.38.d:0 "尽管军方与政府之间的关系日益紧张，但昨天的大选还算是平稳地举行了。选举结果于今早发布，而立宪政友会借着此次选举一跃成为最大的政党。\n\n立宪政友会的领导人将在几周后被任命为首相。"
 rcmjapan.38.t:0 "政友会获胜"
 rcmjapan.39.a:0 "镇压叛军！"
 rcmjapan.39.b:0 "我们将会改组内阁。"
 rcmjapan.39.d:0 "昨日，约有千名士兵发动了政变。几名政客被杀害，而叛军也占领了东京市中心。我们应该对此作出怎样的响应？"
 rcmjapan.39.t:0 "二二六兵变"
 rcmjapan.4.a:0 "这会给他们一个教训！"
 rcmjapan.4.d:0 "俄国人和他们的蒙古走狗发现了我们正在增强黑龙江的驻军，他们越过了国境试图对我们进行先发打击！我们机智的指挥官发现了他们的企图并成功地夹击了敌人。敌人在遭受巨大的损失后夹着尾巴逃回了边境的另一侧。"
 rcmjapan.4.t:0 "边境冲突：日本胜利"
 rcmjapan.40.a:0 "针对这一点，我们可以改组内阁以稳定我们的国家。"
 rcmjapan.40.b:0 "冈田首相将连任"
 rcmjapan.40.d:0 "在天皇的命令下，我们严厉地镇压了来自叛乱。但是，叛乱带来的损伤没法就此揭过。我们必须想办法将解决遗留下来的问题。"
 rcmjapan.40.t:0 "叛军被镇压"
 rcmjapan.41.a:0 "为了天皇陛下！"
 rcmjapan.41.d:0 "这次政变是由皇权派领导的，他们也被称之为皇道派。由于天皇勒令进行内阁改组，因此政变可以视为取得了成功。无论如何，今天的一切都标志着日本翻开了新的篇章。"
 rcmjapan.41.t:0 "皇道派获胜"
 rcmjapan.42.a:0 "逐君侧之恶人！"
 rcmjapan.42.d:0 "一个全新的内阁虽然建立了起来，但是仍旧有许多虚伪的且腐败的官员围绕在天皇身旁。必须要进行一场清洗，为天皇殿下消灭政府中的所有蛀虫！"
 rcmjapan.42.t:0 "为天皇扫清障碍"
 rcmjapan.43.a:0 "还有什么要说的吗？"
 rcmjapan.43.d:0 "针对皇道派的问题，在讨论过后已经达成了共识，皇道派是我们的主要威胁，他们发动的政变却也是我们击垮他们的机会。越早消灭他们，就能够越好的保护日本！"
 rcmjapan.43.t:0 "祖国的威胁"
 rcmjapan.44.a:0 "杀了他。"
 rcmjapan.44.b:0 "软禁他。"
 rcmjapan.44.c:0 "我们不能够这样对待皇室成员！"
 rcmjapan.44.d:0 "虽然闲院宫载仁亲王是皇室成员，并且他也并不是那些威胁这个国家未来的一份子，但他却反对皇道派，并且以天皇的代理人自居，而后镇压我们。现在，我们有两个选择，杀了他或软禁他。但他毕竟是皇室的一员。"
 rcmjapan.44.t:0 "对闲院宫载仁亲王的审判"
 rcmjapan.45.a:0 "国体高于一切！"
 rcmjapan.45.b:0 "软禁他。"
 rcmjapan.45.c:0 "我们不能够这样对待政界元老。"
 rcmjapan.45.d:0 "虽然西园寺公望是日本的威胁，但作为一名政界元老，他是政府中最有影响力的人之一，他深受天皇信任。如果马上将其“抹去”可能会导致严重后果。将其软禁也许是一个不错的办法。"
 rcmjapan.45.t:0 "审判元老西园寺公望"
 rcmjapan.46.a:0 "我们会找其他人。"
 rcmjapan.46.d:0 "尽管我们取得了成功，但是我们的天皇——裕仁，不仅一直批评我们的所作所为，他现在更是拒绝给予我们支持，复兴我们的帝国。他可能不再是我们的天皇了。"
 rcmjapan.46.t:0 "天皇拒绝维新。"
 rcmjapan.48.a:0 "听起来不错"
 rcmjapan.48.b:0 "我们无法信任他们。"
 rcmjapan.48.d:0 "最近转变为民主国家的日本决定与我们结成联盟以共同应对法西斯主义的崛起，以及其所带来的威胁。我们应该怎么响应？"
 rcmjapan.48.t:0 "日本提议建立“泛太平洋联盟”"
 rcmjapan.49.a:0 "很好！"
 rcmjapan.49.d:0 "经过几天的谈判，美国决定同意我们的要求，与我们一同组建泛太平洋联盟。现在，日本和美国站在了一起！"
 rcmjapan.49.t:0 "美国接受了"
 rcmjapan.5.a:0 "这就是为了展现武力。"
 rcmjapan.5.d:0 "在侦测到我们集结的部队后，苏联人很明智地让他们集结满洲边境上的部队向后撤退。我们的士兵们临时地占领了一些被他们遗弃的哨所。这很有希望终结俄国人和他们的蒙古盟友对满洲边境提出的可笑主张。"
 rcmjapan.5.t:0 "苏联撤退"
 rcmjapan.50.a:0 "真丢脸！"
 rcmjapan.50.d:0 "经过几天的谈判，美国拒绝了我们的提议，不会与我们一道建立泛太平洋联盟。这可不是什么好消息。"
 rcmjapan.50.t:0 "美国拒绝了"
 rcmjapan.51.a:0 "听起来不错"
 rcmjapan.51.b:0 "我们无法信任他们。"
 rcmjapan.51.d:0 "近期，随着日本政府内部的改革，日本终于成功恢复了他们丧失已久的民主。新的民主政府愿意加入同盟国。"
 rcmjapan.51.t:0 "日本将加入同盟国"
 rcmjapan.52.a:0 "很好！"
 rcmjapan.52.d:0 "经过几天的谈判，英国同意我们加入同盟国。让全世界的民主国家都团结在一起！"
 rcmjapan.52.t:0 "英国同意了"
 rcmjapan.53.a:0 "真丢脸！"
 rcmjapan.53.d:0 "经过几天的谈判，英国拒绝了我们加入同盟国的请求。这可不是什么好消息。"
 rcmjapan.53.t:0 "英国拒绝了"
 rcmjapan.535.a:0 "利用他们的信仰为我们而战"
 rcmjapan.535.b:0 "没门儿！"
 rcmjapan.535.d:0 "在我们击败了青海的马步芳后，当地的回族人要求建立一个自由的回回国，他们称他们愿意为我们的伟大的东亚事业而战。"
 rcmjapan.535.t:0 "青海和宁夏的回族人民希望在当地组建傀儡政权"
 rcmjapan.536.a:0 "日本是我们的领导者——他们这么说道。"
 rcmjapan.536.d:0 "在日本击败了青海的马步芳之后，当地的回族人民与日本进行谈判，他们将组建自由的回回国。如果他们的要求得到满足，那么他们愿意为了日本的东亚事业而战。"
 rcmjapan.536.t:0 "回回国成立"
 rcmjapan.54.a:0 "听起来不错"
 rcmjapan.54.b:0 "我们无法信任他们。"
 rcmjapan.54.d:0 "日本最近爆发了革命，新诞生的共产主义政府想要加入共产国际。"
 rcmjapan.54.t:0 "日本想要加入共产国际"
 rcmjapan.55.a:0 "很好！"
 rcmjapan.55.d:0 "经过几天的谈判，苏联同意我们加入共产国际。日本将会苏联一同奋斗！"
 rcmjapan.55.t:0 "苏联同意了"
 rcmjapan.56.a:0 "真丢脸！"
 rcmjapan.56.d:0 "经过几天的谈判，苏联还是拒绝了我们加入共产国际的请求。这可不是什么好消息。"
 rcmjapan.56.t:0 "苏联拒绝了"
 rcmjapan.57.a:0 "听起来不错"
 rcmjapan.57.b:0 "我们无法信任他们。"
 rcmjapan.57.d:0 "最近转变为共产主义国家的日本决定与我们结成联盟以共同应对法西斯主义的崛起，以及其所带来的威胁。我们应该怎么响应？"
 rcmjapan.57.t:0 "日本提议建立“泛太平洋共产主义战线”"
 rcmjapan.58.a:0 "很好！"
 rcmjapan.58.d:0 "经过几天的谈判，中国决定加入泛太平洋共产主义战线。我们将会和中共一同奋斗！"
 rcmjapan.58.t:0 "中共接受了"
 rcmjapan.59.a:0 "真丢脸！"
 rcmjapan.59.d:0 "经过几天的谈判，中国还是拒绝泛太平洋共产主义战线。这可不是什么好消息。"
 rcmjapan.59.t:0 "中共拒绝了"
 rcmjapan.60.a:0 "允许中国开始朝河北施加影响，并让他们重新军事化上海。"
 rcmjapan.60.b:0 "同样的，取消冀察政务委员会。"
 rcmjapan.60.c:0 "同样的，也撤去我们对[ECA.GetName]的控制。"
 rcmjapan.60.d:0 "泛亚主义一直是皇道派的核心思想。在辛亥革命时期，日本就曾是孙文等人的主要支持者。但是如今，中国内部派系林立，而共产主义又如鱼得水。除非中国重新统一，否则东方世界无法在将来的战争中与西方抗衡。我们必须让中国成为东方的美国。但是，在这之前，我们必须确保中国站在我们这一边。"
 rcmjapan.60.e:0 "同样的，也撤去我们对[EHB.GetName]的控制。"
 rcmjapan.60.t:0 "修改与中国结盟所定下的盟约"
 rcmjapan.61.a:0 "日本可以帮助我们击退共产党"
 rcmjapan.61.b:0 "永远不要忘记济南事件！日本是我们的死敌！"
 rcmjapan.61.d:0 "新生的日本政府向我们提议组成一个同盟。他们决定撤销冀察政务委员会，但同时，我们也必须承认满洲国的独立性。我们应该怎么响应？"
 rcmjapan.61.t:0 "日本提供补偿并提议结盟"
 rcmjapan.62.a:0 "日本可以帮助我们击退共产党"
 rcmjapan.62.b:0 "永远不要忘记济南事件！日本是我们的死敌！"
 rcmjapan.62.d:0 "新生的日本政府向我们提议组成一个同盟。他们决定撤销冀察政务委员会，但同时，我们也必须承认满洲国的独立性。我们应该怎么响应？"
 rcmjapan.62.t:0 "日本提供补偿并提议结盟"
 rcmjapan.63.a:0 "日本可以帮助我们击退共产党"
 rcmjapan.63.b:0 "永远不要忘记济南事件！日本是我们的死敌！"
 rcmjapan.63.d:0 "新生的日本政府向我们提议组成一个同盟。他们愿意撤销冀察政务委员会并归还关东地区，但同时，我们也必须承认满洲国的独立。我们应该怎么响应？"
 rcmjapan.63.t:0 "日本提供补偿并提议结盟"
 rcmjapan.64.a:0 "日本可以帮助我们击退共产党"
 rcmjapan.64.b:0 "永远不要忘记济南事件！日本是我们的死敌！"
 rcmjapan.64.d:0 "新生的日本政府向我们提议组成一个同盟。他们愿意撤销冀察政务委员会并归还关东地区，甚至内蒙古，但同时，我们也必须承认满洲国的独立。我们应该怎么响应？"
 rcmjapan.64.t:0 "日本提供补偿并提议结盟"
 rcmjapan.65.a:0 "很好！"
 rcmjapan.65.b:0 "很好！"
 rcmjapan.65.c:0 "很好！"
 rcmjapan.65.d:0 "经过几天的谈判，中国决定接受我们的提议。我们现在已站在了一起。"
 rcmjapan.65.e:0 "很好！"
 rcmjapan.65.t:0 "中国接受了我们的提议"
 rcmjapan.66.a:0 "他们会为此付出代价！"
 rcmjapan.66.d:0 "尽管我们已经展现出了友善的姿态，但他们的政府还是拒绝了我们的慷慨提议。看来必须要用一场战争来让中国屈服。"
 rcmjapan.66.t:0 "中国拒绝了提议"
 rcmjapan.67.a:0 "团结就是力量！"
 rcmjapan.67.d:0 "自从清政府垮台以来，中国这几十年，一直被各路军阀所分裂。由于我们的帮助，中国在今天终于实现了统一。今天，标志着新历史的开始。"
 rcmjapan.67.t:0 "中国重新统一"
 rcmjapan.70.a:0 "我们同意这项提议"
 rcmjapan.70.b:0 "我们绝不与恶心的野心家进行谈判！"
 rcmjapan.70.d:0 "日本最近因为对法属印度支那的索取，其贪得无厌的态度引起了包括美国在内的许多国家的反感，日本政府决定举行日美峰会，希望能解决问题。对此我们应该采取什么样的响应？"
 rcmjapan.70.t:0 "日本政府提议举行日美峰会"
 rcmjapan.71.a:0 "很好！"
 rcmjapan.71.d:0 "美国政府昨日同意了我们的提议并进行了积极的响应。我们的首先很快就会与他们的领导人进行一次会谈。"
 rcmjapan.71.t:0 "美国接受了我们的提议"
 rcmjapan.72.a:0 "他们会为他们的决定后悔的。"
 rcmjapan.72.d:0 "美国政府于昨日拒绝了我们的相关提议。看来战争是唯一的出路。"
 rcmjapan.72.t:0 "美国拒绝了我们的提议"
 rcmjapan.73.a:0 "签署协议。"
 rcmjapan.73.b:0 "不与日本人进行交易！"
 rcmjapan.73.d:0 "日本外务省已经提出了我们两国之间的互不侵犯条约。这项条约将大大增加我们双方的贸易。尽管日本人可能不值得信赖，但这项协议将使我们能够与德国“打交道”，而无需担心外界的干预。"
 rcmjapan.73.t:0 "与日本的中立条约"
 rcmjapan.736.a:0 "那是当然。"
 rcmjapan.736.d:0 "中华民国成立后，日本陆军让我们进行政府改革。从长远来看，这对我们来说是一件好事。"
 rcmjapan.736.t:0 "日本下令进行政府改革"
 rcmjapan.74.a:0 "很好。"
 rcmjapan.74.d:0 "美国明智地同意签署我们之间的互不侵犯条约。这意味着我们可以在不受美国干预的情况下自由行动。\n\n当与中国的问题得到解决时，我们可能需要重新审查审议该条约，但这是之后的问题了......"
 rcmjapan.74.t:0 "美国签署协议"
 rcmjapan.75.a:0 "去他的！"
 rcmjapan.75.d:0 "美国拒绝签署我们之间的互不侵犯条约！这让事情变得更加复杂，因为我们不能在冒美国人卷入的危险情况下果断地处置中国。"
 rcmjapan.75.t:0 "美国拒绝签署协议"
 rcmjapan.79.a:0 "很好！"
 rcmjapan.79.d:0 "日本的新生政府决定提供技术以及其他志愿协助者来帮助我们，改善我们的工业，以此来展现他们的诚意。"
 rcmjapan.79.t:0 "日本提供工业援助"
 rcmjapan.8.a:0 "他们就应该这样做。"
 rcmjapan.8.d:0 "德国已经召回了他们在中国的所有顾问。现在他们应该已经登上前往柏林的飞机了。德国人意识到大东亚的光辉未来将属于日本，而不是中国。"
 rcmjapan.8.t:0 "德国召回顾问"
 rcmjapan.83.a:0 "太棒了！日本人可以帮助我们！"
 rcmjapan.83.b:0 "这似乎不合适。我们会求助于傅作义。"
 rcmjapan.83.c:0 "这似乎不合适。我们会向中央政府求助。"
 rcmjapan.83.d:0 "日本已提出正式请求，帮助我们组建新蒙古政府。他们还说，如果我们拒绝他们的提议，将会有严重的后果。然而，中国现在太腐败太孱弱了，保护不了我们，所以这可能是我们重建蒙古帝国的一个很好的机会。"
 rcmjapan.83.t:0 "日本要求为蒙古人建立一个新政府"
 rcmjapan.84.a:0 "对蒙古人来说，这是美好的一天！"
 rcmjapan.84.b:0 "什么？这些该死的叛徒！"
 rcmjapan.84.c:0 "那么，我们将停止在该地区的军事行动。"
 rcmjapan.84.d:0 "德穆楚克栋鲁普亲王及其追随者已与日本军队达成协议，在内蒙古组建[MEN.GetNameDef]新政府。云端旺楚克被任命为新政府的领导人，然而大部分权力仍然掌握在德穆楚克栋鲁普亲王手中。"
 rcmjapan.84.e:0 "什么？去死吧叛徒！"
 rcmjapan.84.t:0 "[MEN.GetName]在日本的帮助下成立了"
 rcmjapan.85.a:0 "蛤？"
 rcmjapan.85.d:0 "[PLM.GetName]已经拒绝了我们关于为蒙古人组建新政府的提议。这可能是由于中国在政务会内部施加的压力，但政务会内部的紧张局势仍然存在。我们应该等一等，看看形势怎么发展。"
 rcmjapan.85.t:0 "蒙古人拒绝"
 rcmjapan.86.a:0 "好消息！"
 rcmjapan.86.d:0 "在[MEN.GetNameDef]成立后，中国政府决定停止干涉蒙古事务，并停止其在内蒙古地区的军事行动。"
 rcmjapan.86.t:0 "[From.GetNameDef]停止在内蒙古的军事发展"
 rcmjapan.87.a:0 "要战便战！"
 rcmjapan.87.d:0 "即使在[MEN.GetNameDef]成立后，中国政府仍决定进一步扩大其在内蒙古地区的军事行动。[MEN.GetNameDef]和[JAP.GetNameDef]将击退中国人并保护蒙古人。"
 rcmjapan.87.t:0 "中国继续其在内蒙古的军事发展"
 rcmjapan.88.a:0 "为了蒙古人民！"
 rcmjapan.88.d:0 "战争持续了数月，日本帮助蒙古人重新夺回了一些领土。是时候再次召开蒙古人大会，把蒙古国改造成一个更大的国家。"
 rcmjapan.88.t:0 "第二次蒙古人大会"
 rcmjapan.884.a:0 "亡羊补牢为时未晚！"
 rcmjapan.884.b:0 "[MEN.GetNameDef]万岁！"
 rcmjapan.884.c:0 "什么？这些该死的叛徒！"
 rcmjapan.884.d:0 "尽管之前几次尝试都失败了，德穆楚克栋鲁普亲王及其一些追随者仍然决定求助于日本军队，在内蒙古组建[MEN.GetNameDef]新政府。德穆楚克栋鲁普亲王被任命为新政府的领导人"
 rcmjapan.884.e:0 "什么？这些该死的叛徒！"
 rcmjapan.884.f:0 "什么？这些该死的叛徒！"
 rcmjapan.884.t:0 "德穆楚克栋鲁普亲王叛逃"
 rcmjapan.89.a:0 "安息吧。"
 rcmjapan.89.d:0 "[ECA.GetNameDef]的领导人云端旺楚克去世了。他的副手德穆楚克栋鲁普亲王将从现在开始领导这个国家。这对蒙古人来说是悲伤的一天。"
 rcmjapan.89.t:0 "云端旺楚克去世了"
 rcmjapan.9.a:0 "他们的顾问会和其他的中国人一起死去。"
 rcmjapan.9.d:0 "德国拒绝从中国召回他们的顾问，完全不顾这些顾问的军事任务直接干扰了我们在大东亚的计划！难道他们认不清这样会破坏德日两国外交关系的基础吗？我们究竟能不能信任德国？"
 rcmjapan.9.t:0 "德国拒绝了我们的请求"
 rcmjapan.90.a:0 "太好了！让我们通知我们邻近的附庸国。"
 rcmjapan.90.b:0 "太好了！让我们通知我们邻近的附庸国。"
 rcmjapan.90.c:0 "为了蒙古的人民！"
 rcmjapan.90.d:0 "在日本的帮助下，大蒙疆联合自治政府即将成立。[Root.GetLeader]被任命为主席，张家口将成为新首都。和日本站在一起，我们蒙古人将夺回成吉思汗帝国的荣耀！"
 rcmjapan.90.t:0 "蒙疆联合自治政府即将成立！"
 rcmjapan.91.a:0 "我们将与他们合并。"
 rcmjapan.91.b:0 "我们至少需要保留一些自治权。"
 rcmjapan.91.c:0 "我们将与他们合并。"
 rcmjapan.91.d:0 "在日本的帮助下，蒙疆联合自治政府已成立。[From.GetLeader]被任命为主席，张家口将成为新首都。但张家口目前在我们的管理下，因此[JAP.GetName]和[From.GetLeader]现在要求我们与[MEJ.GetName]合并。我们该怎么回应？"
 rcmjapan.91.e:0 "我们至少需要保留一些自治权。"
 rcmjapan.91.t:0 "[MEJ.GetName]要求合并"
 rcmjapan.92.a:0 "我们将与他们合并。"
 rcmjapan.92.b:0 "我们至少需要保留一些自治权。"
 rcmjapan.92.c:0 "我们将与他们合并。"
 rcmjapan.92.d:0 "在日本的帮助下，蒙疆联合自治政府已成立。[From.GetLeader]被任命为主席，张家口将成为新首都。然而，[JAP.GetName]]认为多个附庸国可能会阻碍管理的有效性。因此，[JAP.GetName]和[From.GetLeader]现在都要求我们与[MEJ.GetName]合并。我们该怎么回应？"
 rcmjapan.92.e:0 "我们至少需要保留一些自治权。"
 rcmjapan.92.t:0 "[MEJ.GetName]要求合并"
 rcmjapan.93.a:0 "蒙疆万岁！"
 rcmjapan.93.d:0 "在通电晋北和南察哈尔后，他们同意合并在新成立的蒙疆联合自治政府中。这次合并标志着蒙古历史的新篇章！"
 rcmjapan.93.t:0 "两个附庸国都同意合并"
 rcmjapan.9321.a:0 "他们实在太过分了！"
 rcmjapan.9321.b:0 "这不关我们的事"
 rcmjapan.9321.d:0 "日本刚刚对欧洲国家在东南亚的殖民地发起了第一次攻击！他们的法西斯式政府以及其展现出来的扩张主义思想与纳粹德国惊人的相似！看看当地都发生了些什么！或许我们可以寻求和其他国家一起对日本进行一系列的贸易禁运，以打击日本的军国主义。"
 rcmjapan.9321.t:0 "对日禁运？"
 rcmjapan.93211.a:0 "好消息！"
 rcmjapan.93211.d:0 "为了阻止日本在东南亚的军事行动，英国同意对日本实施禁运。"
 rcmjapan.93211.t:0 "英国同意了我们的请求"
 rcmjapan.93212.a:0 "真遗憾。"
 rcmjapan.93212.d:0 "英国拒绝对日本实施禁运。"
 rcmjapan.93212.t:0 "英国拒绝了提议"
 rcmjapan.9322.a:0 "他们实在太过分了！"
 rcmjapan.9322.b:0 "这不关我们的事"
 rcmjapan.9322.d:0 "日本刚刚对欧洲国家在东南亚的殖民地发起了第一次攻击！他们的法西斯式政府以及其展现出来的扩张主义思想与纳粹德国惊人的相似！看看当地都发生了些什么！或许我们可以寻求和其他国家一起对日本进行一系列的贸易禁运，以打击日本的军国主义。"
 rcmjapan.9322.t:0 "对日禁运？"
 rcmjapan.93221.a:0 "好消息！"
 rcmjapan.93221.d:0 "为了阻止日本在东南亚的军事行动，英国同意对日本实施禁运。"
 rcmjapan.93221.t:0 "荷兰同意了我们的请求"
 rcmjapan.93222.a:0 "真遗憾。"
 rcmjapan.93222.d:0 "荷兰拒绝对日本实施禁运"
 rcmjapan.93222.t:0 "荷兰拒绝了我们的请求"
 rcmjapan.94.a:0 "如他们所愿."
 rcmjapan.94.d:0 "尽管日本人的意见一直非常支持内蒙古地区三个附庸国的合并，但我们南方邻近的一个附庸国：南察哈尔希望至少保持某种形式的自治。这可能不是最佳解决方案，但两个附庸国都愿意合作。这样就没什么大不了的了。"
 rcmjapan.94.t:0 "晋北同意合并，但南察哈尔想保留一些自治权"
 rcmjapan.95.a:0 "如他们所愿."
 rcmjapan.95.d:0 "尽管日本人的意见一直非常支持内蒙古地区三个附庸国的合并，但我们南方邻近的一个附庸国：晋北希望至少保持某种形式的自治。这可能不是最佳解决方案，但两个附庸国都愿意合作。这样就没什么大不了的了。"
 rcmjapan.95.t:0 "南察哈尔同意合并，但晋北想保留一些自治权"
 rcmjapan.96.a:0 "那就这样吧。"
 rcmjapan.96.d:0 "尽管日本人的意见一直非常支持内蒙古地区三个附庸国的合并，但我们南方邻近的两个附庸国：晋北和南察哈尔都希望至少保持某种形式的自治。这可能不是最佳解决方案，但两个附庸国都愿意合作。这样就没什么大不了的了。"
 rcmjapan.96.t:0 "两个附庸国都希望保留一些自治权"
 rcmjapan.97.a:0 "蒙疆万岁！"
 rcmjapan.97.d:0 "在得到通电后，晋北自治政府同意合并到新成立的蒙疆联合自治政府中。这次合并标志着蒙古历史的新篇章！"
 rcmjapan.97.t:0 "[From.GetName]同意合并"
 rcmjapan.98.a:0 "蒙疆万岁！"
 rcmjapan.98.d:0 "尽管日本人的意见一直非常支持内蒙古地区三个附庸国的合并，但我们南方邻近的附庸国：[From.GetName]更愿意保留某种形式的自治权。这可能不是最佳的解决方案，但他们非常愿意在这个前提下进行合作。这样就没什么大不了的了。"
 rcmjapan.98.t:0 "[From.GetName]想保留一些自治权"
 rcmjapan.985.a:0 "我们将把政务会进一步地纳入我们的政府。"
 rcmjapan.985.d:0 "[PLM.GetName]已经拒绝了日本关于在内蒙古组建新的合作政府的提议。政务会的领导人表示他们设法阻止[PLM.GetLeader]和[JAP.GetName]之间的秘密阴谋，但是政务会内部的紧张局势仍然存在。我们将在那个地区施加更大的影响，以免出现混乱。"
 rcmjapan.985.t:0 "[JAP.GetName]试图渗透到[PLM.GetName]"
 rcmjapan.99.a:0 "当然！"
 rcmjapan.99.b:0 "没有必要。"
 rcmjapan.99.d:0 "在我们控制了晋北后，军队中的一些人认为成立一个晋北自治政府的附庸国将有利于我们在这个地区的军事发展。我们应该联系当地官员建立这样的政府吗？"
 rcmjapan.99.t:0 "成立[NSG.GetName]？"
 rcmjapan.9932.a:0 "寻求英国和荷兰的支持以一同抵制日本的行为"
 rcmjapan.9932.b:0 "这不关我们的事"
 rcmjapan.9932.d:0 "日本刚刚对欧洲国家在东南亚的殖民地发起了第一波攻击！他们的法西斯式政府以及其展现出来的扩张主义思想与纳粹德国惊人的相似！看看当地都发生了些什么！或许我们可以寻求和其他国家一起对日本进行一系列的贸易禁运，以打击日本的军国主义。"
 rcmjapan.9932.t:0 "日本入侵法属印度支那"
 rcmjapan_althist.1.a:0 "我爱棒球跟耶稣。"
 rcmjapan_althist.1.b:0 "战争是唯一可以让我们团结在一起的东西。"
 rcmjapan_althist.1.d:0 "最近影响力快速上升的左派支持者已经给了政府相当大的压力，包括满州的社会主义者、来自军中的《陆军手册》支持者、和渴求宗教自由的社会民主主义者。这些压力迫使了帝国国会必须要通过新的决议案来举办是否要组成新的社会主义内阁的公投和进行新一届的首相选举。\n\n然而，就算是最受民众欢迎的社会大众党也存在着内部分歧，麻生久所领导的军国社会主义的派系希望可以将日本转变成一个由社会大众党实施一党专政的国家。\n\n另一个派系则是日本棒球之父安部矶雄领导的基督教社会民主主义派系，他们希望可以重组整个日本政府往议会社会主义的方向走，同时禁止宗教迫害和开放宗教自由。\n\n日本正处在十字路口上，究竟哪一条路能让旭日照耀到各方呢？"
 rcmjapan_althist.1.t:0 "国有社会主义领导层公投"
 rcmjapan_althist.10.a:0 "修改它来使法律和秩序得到保持，同时也不破坏个人自由。"
 rcmjapan_althist.10.b:0 "把这条愚蠢的法律烧成灰烬。"
 rcmjapan_althist.10.d:0 "1925年治安维持法是日本历史上最具争议性的立法之一。它禁止任何反政府（且现在军方掌管政府）的议程和言论。如果冈田首相想解决日本军国主义的问题，这是他必须处理的问题之一。那么，我们究竟应该对这部法律做些什么？"
 rcmjapan_althist.10.t:0 "治安维持法问题"
 rcmjapan_althist.2.a:0 "谢天谢地。"
 rcmjapan_althist.2.d:0 "在和张澜的中国民主同盟的合作下，我们已经找到了[WTT_current_china_leader.GetLeader]的确切位置，一个特别行动小队已经被派去继续追踪他的位置，最后我们的副小队长对着他的头部精准的开了一枪，并在被抓住前逃离现场。这对我们来说是一个好消息，可是我们中国民主同盟的朋友们已经被宣布为非法及恐怖组织。显然为了达成我们的目标，中国将不可避免的发生内战。"
 rcmjapan_althist.2.t:0 "[WTT_current_china_leader.GetLeader]被暗杀"
 rcmjapan_althist.3.a:0 "混乱的时代"
 rcmjapan_althist.3.d:0 "最近的左翼政治浪潮使日本发生了翻天覆地的变化。军政府垮台后的政治动荡是前所未见的。然而，在这种混乱的政治环境中，出现了一个不太可能的流行人物。中野正刚。由于受到北一辉的泛亚主义和欧洲国家社会主义的强烈影响，中野和他的政党东方会也认识到无产阶级的重要性以及土地和劳工改革的必要性。这种独特的政治立场使他赢得了人民的心，他们即将创造重复的历史。"
 rcmjapan_althist.3.t:0 "东方会的创始人，中野正刚崛起"
 rcmjapan_althist.4.a:0 "很好。"
 rcmjapan_althist.4.d:0 "[Root.GetRulingParty]和[Root.GetFascistParty]的领导人共同在议会中发表了两政党将合并的联合宣言，但是这对大家来说并不是个意外的消息，两边的政党拥有许多共同的支持者，这是一个清晰的标志对于[Root.GetRulingParty]想巩固在日本政府高层的领导地位。对于这两党来说，合并可以帮助他们更容易达成他们的目标。"
 rcmjapan_althist.4.t:0 "[Root.GetRulingParty]宣布与[Root.GetFascistParty]合并"
 rcmjapan_althist.5.a:0 "欢迎回来，好久不见。"
 rcmjapan_althist.5.d:0 "全日本日益增长的社会主义支持和革命情绪迫使帝国议会和冈田政府通过一项决议，给予日本主要的共产主义革命者之一德田球一特赦。在军政府垮台之前，德田被逮捕，由于现在臭名昭著的《治安维持法》，他自1934年以来一直被关押在网走监狱。直到最近，由于军政府的垮台和新一轮左翼情绪的高涨，他才得以重见天日。然而，他的释放究竟会对日本产生怎样的影响，仍有待观察。"
 rcmjapan_althist.5.t:0 "舆论压力使德田球一被释放"
 rcmjapan_althist.6.a:0 "是时候了！"
 rcmjapan_althist.6.d:0 "[Root.GetLeader]在和文官政府及有关人士的共同努力之后，他宣布他将辞去日本首相一职务，以恢复文官执政的政府原来的样貌。帝国议会将会很快的选出一个新首相并重组一个新内阁。这对重建日本民主制度来说是伟大的一天。"
 rcmjapan_althist.6.t:0 "恢复文官政府"
 rcmjapan_althist.7.a:0 "走得好。"
 rcmjapan_althist.7.d:0 "为了保护我们好不容易重建的民主，和杜绝任何极端民族主义的政变事件发生，我们已经对几位在军中煽动叛乱的将军军官发布逮捕令。一旦他们被抓到，他们将会接受我们公平的审判并把他们排除在政治舞台之上。"
 rcmjapan_althist.7.t:0 "对亲轴心国的军国主义者发布通缉令"
 rcmjapan_althist.8.a:0 "是时候打扫房子了。"
 rcmjapan_althist.8.d:0 "在内阁中站稳脚步并在一定程度上稳定了领导层之后，现在是我们处理导致日本帝国不稳定的政治对手的时候了。我们将组织一份属于舰队派的不受欢迎的海军将领的名单，并将其解职以确保历史不会重演。"
 rcmjapan_althist.8.t:0 "舰队派将领遭解职"
 rcmjapan_althist.9.a:0 "太平洋将和平！"
 rcmjapan_althist.9.d:0 "作为米内光政的强大盟友，山本五十六是海军中一位强有力的反战人士。海军应该承担起治理这个国家的重任，而不是把我们的领导权交还给腐败的立宪政友会和立宪民政党官僚，他们把治理国家败给了军国主义者。\n\n因此，海军对议会施加了强大的压力，以确保山本将被任命为新首相。"
 rcmjapan_althist.9.t:0 "山本五十六被任命为新的首相"
 rcmjapan_baseball.1.a:0 "给我介绍一下各队！"
 rcmjapan_baseball.1.b:0 "我知道这些球队，我想马上选择他们。"
 rcmjapan_baseball.1.c:0 "这很无聊，我就把它留给董事会决定。"
 rcmjapan_baseball.1.d:0 "新赛季的棒球比赛即将开始。 联盟每年组织两场比赛，每场比赛结束时间为60天左右，中场休息时间为120天左右。\n\n为了参加这个活动，我们必须投注我们最喜欢的球队！ 如果我们选择的队伍赢得了冠军，我们将获得奖励！ 但是，如果我们选择的球队表现不佳，那么投入的赌注就会消失。 如果他们最后完成，如果超过 4 支队伍参加，可能会受些处罚。 无论如何，让我们开始吧！"
 rcmjapan_baseball.1.t:0 "新一季的校际棒球比赛即将开始！"
 rcmjapan_baseball.10.a:0 "好的。"
 rcmjapan_baseball.10.d:0 "经过8周的艰苦战斗，我们支持的球队，[Root.GetBaseballteam], 最终在比赛中的排名是 #[?This.baseball_ranking]。球队中的许多球员仍然渴望获得冠军，但遗憾的是，我们的努力是不够的。"
 rcmjapan_baseball.10.t:0 "我们的球队在比赛中排名#[?This.baseball_ranking]"
 rcmjapan_baseball.11.a:0 "好吧。"
 rcmjapan_baseball.11.d:0 "也许像棒球这样无聊的事不值得政府去努力。我们应该把这些不重要的事件留给董事会处理，直到进一步通知。"
 rcmjapan_baseball.11.t:0 "棒球比赛的组织工作移交给了董事会"
 rcmjapan_baseball.12.a:0 "欢呼！"
 rcmjapan_baseball.12.d:0 "政府已经决定，棒球运动与其他问题一样重要。因此，联盟与政府联合宣布，联盟将再次获得政府的支持！这也是联盟的宗旨。全国各地的棒球迷们都在为即将到来的比赛雀跃不已！"
 rcmjapan_baseball.12.t:0 "政府再次支持棒球比赛！"
 rcmjapan_baseball.13.a:0 "一点投资应该足够了。"
 rcmjapan_baseball.13.b:0 "让我们把事情弄得有趣一点。"
 rcmjapan_baseball.13.c:0 "我们大方一点。"
 rcmjapan_baseball.13.d:0 "我们不参与这个。"
 rcmjapan_baseball.13.desc:0 "在得到日本各地教会的财政支持和合作后，我们现在能以民用工厂作为起始赌注的一部分。如果我们的球队能够获胜，这将带来丰厚的收入。"
 rcmjapan_baseball.13.t:0 "投资民用工厂在球队上"
 rcmjapan_baseball.14.a:0 "让我们安稳点吧。"
 rcmjapan_baseball.14.b:0 "这应该够了。"
 rcmjapan_baseball.14.c:0 "我们全力以赴。"
 rcmjapan_baseball.14.d:0 "除了球员自己的投入之外，我们还可以在实际比赛中对我们的球队进行下注。 然而，这里主要的问题是：我们到底应该付出多少？"
 rcmjapan_baseball.14.t:0 "提高赌注"
 rcmjapan_baseball.2.a:0 "好的，下一个"
 rcmjapan_baseball.2.d:0 "法政大学棒球部于1915年正式成立，他们邀请了早稻田大学棒球部的八幡恭介担任教练。 1917年他们加入了联盟的前身。 1930年，他们取得了第一次胜利（加入联盟的第14年）。制服是奶油色的面料，上面写着“HOSEI”(法政)。 此外，棒球帽上还附有字母“H”。"
 rcmjapan_baseball.2.t:0 "法政大学队"
 rcmjapan_baseball.3.a:0 "好的，下一个"
 rcmjapan_baseball.3.d:0 "庆应义塾大学棒球部在 1903 年与新兴球队早稻田进行了首次比赛，以应对其挑战。 赢得比赛后，他们确定了两校从次年起将在春秋两季举行常规赛，最终为日本棒球做出了巨大贡献。 制服是灰色的布料，上面写着“KEIO”。 字母“K”附在棒球帽上。"
 rcmjapan_baseball.3.t:0 "庆应大学队"
 rcmjapan_baseball.4.a:0 "好的，下一个"
 rcmjapan_baseball.4.d:0 "在早稻田棒球部社长的指导下，立教大学棒球部提高了队伍实力，于1921年加入了东京Big6棒球联盟的前身全日本大学棒球联合会。 白色背景上写着“RIKKIO”。 棒球帽上印有百合花的图案，这是该大学的象征。"
 rcmjapan_baseball.4.t:0 "立教大学队"
 rcmjapan_baseball.5.a:0 "好的，下一个"
 rcmjapan_baseball.5.d:0 "早稻田大学棒球部是隶属于东京Big6棒球联盟的大学棒球队。 在大学还没有被启明为早稻田之前的 1901 年，安倍首相先生和其他学生爱好者创立了俱乐部。 由于它对日本棒球的创造和发展做出了巨大贡献，因此与庆应大学棒球俱乐部（Keio）一起被认为是棒球根源学校。"
 rcmjapan_baseball.5.t:0 "早稻田大学队"
 rcmjapan_baseball.6.a:0 "好的，下一个"
 rcmjapan_baseball.6.d:0 "明治大学棒球部（Meiji University Baseball Club）不顾董事会的强烈反对，于1910年成立。 时任教授的内海弘蔵担任教练。 1911年球队与早稻田交手，1912年首次击败早稻田。1913年，球队教练参加第一届远东奥运会并获得冠军，这是其第一次远征海外。"
 rcmjapan_baseball.6.t:0 "明治大学队"
 rcmjapan_baseball.7.a:0 "好的，下一个"
 rcmjapan_baseball.7.d:0 "东京大学棒球部成立于1917年，1919年获得该校批准。最初，该部的唯一目标只是与京都帝国大学定期比赛。 但随着球队实力的逐渐增强，后来又有更多有影响力的选手加入。 1924年参加第一届明治神宫运动会并获得第二名。"
 rcmjapan_baseball.7.t:0 "东京大学队"
 rcmjapan_baseball.8.a:0 "法政大学队。"
 rcmjapan_baseball.8.b:0 "庆应大学队。"
 rcmjapan_baseball.8.c:0 "立教大学队。"
 rcmjapan_baseball.8.d:0 "早稻田大学队。"
 rcmjapan_baseball.8.desc:0 "在对每支球队进行简短的介绍后，是时候选择我们想要投入资金的球队了，这样我们就可以为这些年轻的小伙子们聘请教练并安排训练课程。我想这应该是一个很容易的选择吧？"
 rcmjapan_baseball.8.e:0 "下一页"
 rcmjapan_baseball.8.t:0 "选择我们要资助跟支持的队伍"
 rcmjapan_baseball.81.a:0 "早稻田大学队。"
 rcmjapan_baseball.81.b:0 "明治大学队。"
 rcmjapan_baseball.81.c:0 "东京大学队。"
 rcmjapan_baseball.81.d:0 "上一页"
 rcmjapan_baseball.81.desc:0 "在对每支球队进行简短的介绍后，是时候选择我们想要投入资金的球队了，这样我们就可以为这些年轻的小伙子们聘请教练并安排训练课程。我想这应该是一个很容易的选择吧？"
 rcmjapan_baseball.81.t:0 "选择我们要资助跟支持的队伍"
 rcmjapan_baseball.9.a:0 "欢呼！"
 rcmjapan_baseball.9.d:0 "经过8周的艰苦战斗，我们支持的球队，[Root.GetBaseballteam]，已经赢得了冠军！ 球员们都在雀跃欢呼，庆祝活动与新闻发布会也已安排好了。我们这次真的做到了，伙伴们！做得太棒了！"
 rcmjapan_baseball.9.t:0 "我们的球队赢得冠军！"
 rcmjapan_baseball_news.1.a:0 "耶！"
 rcmjapan_baseball_news.1.d:0 "[This.GetNewsIcon]东京 Big6 棒球联盟是一个由东京地区六所著名大学组成的大学间棒球联盟。 它被广泛认为是日本棒球的最高殿堂。\n\n成立于 1925 年。它也是东京 6 所大学 (Tokyo roku daigaku) 昵称的起源，该昵称被赋予相同的六所大学。\n\n所有比赛都在东京市中心新宿霞之丘的明治神宫体育场举行。 众所周知，比赛将是喧闹和欢庆的，拉拉队和乐队在努力工作，人群变得狂热。 联赛冠军由系列赛胜利次数最多的球队获得。 冠军队将获得天皇杯！"
 rcmjapan_baseball_news.1.t:0 "两年一度的东京Big6棒球赛开始了！"
 rcmjapan_baseball_news.2.a:0 "这对我们球队来说是一次经验。"
 rcmjapan_baseball_news.2.b:0 "我们成功了！ 这那太棒了！"
 rcmjapan_baseball_news.2.c:0 "没人在乎。继续向前。"
 rcmjapan_baseball_news.2.d:0 "[This.GetNewsIcon]历经数周的艰苦奋斗，[Root.GetChampionTeam] 队夺冠！ 在本赛季的最后一场比赛中，[Root.GetChampionTeam] 的打击手在第 9 局上半局对阵两人出局后，击出了一支替转的两分炮。在最后一个出局逆转了比赛。\n\nTokyo Big-6 是日本历史最悠久的棒球联盟，其历史可追溯至 1925 年，由日本东京的六所著名大学组成； 早稻田、京王、明治、法政、东京和立教。\n\n本赛季，每支球队最多有一百位拉拉队员位于体育场的外场看台上。 东京明治神宫体育场可容纳 34,000 人，观众人数限制在 15,000 人。"
 rcmjapan_baseball_news.2.t:0 "[This.GetChampionTeam]赢得冠军！"
 rcmjapan_canton.121.a:0 "明白。"
 rcmjapan_canton.121.d:0 "我们的几个师，在军部的策画下，对广东省的省会发动了入侵行动，我们应该尽快增援那些部队。"
 rcmjapan_canton.121.t:0 "广州作战"
 rcmjapan_canton.122.a:0 "我们必须击退他们！"
 rcmjapan_canton.122.d:0 "在我们的军队与[From.GetAdjective]的士兵作战之时，[From.GetAdjective]的几个师开始入侵广州，以尝试掌握华南地区。"
 rcmjapan_canton.122.t:0 "广州战役"
 rcmjapan_china_go_wang.1.a:0 "蒋会留下来。"
 rcmjapan_china_go_wang.1.b:0 "给汪一个机会。"
 rcmjapan_china_go_wang.1.d:0 "我方于中国的情报部门和为汪精卫工作的人都通知我们，汪精卫渴望并正在谋求成为中国领导人。他的手下表示，他将是一位更好的领导人，且欢迎我们的支持。我们应该阻止他还是顺齐而行？"
 rcmjapan_china_go_wang.1.t:0 "汪精卫谋求领导权"
 rcmjapan_china_go_wang.2.a:0 "好吧，至少我们还算开心。"
 rcmjapan_china_go_wang.2.d:0 "日本对我们要求支持取代蒋介石以建立中国新领导层的呼吁做出了响应。然而，他们的响应是完全不同意，表示如果我们不扰乱当前的政治秩序，对两国都最有利。不过，他们确实承诺会对蒋介石及其核心圈子保密这次谈话。"
 rcmjapan_china_go_wang.2.t:0 "日本对汪精卫领导层表示不满"
 rcmjapan_christian.1.a:0 "哈利路亚！"
 rcmjapan_christian.1.d:0 "由于我们在日本大力发展和维护信仰，教会的影响力有所增加。 这将进一步让人们更加接受基督教信仰。 对于我们的同胞来说，这真是一个美好的一天。"
 rcmjapan_christian.1.t:0 "教会影响力增加！"
 rcmjapan_christian.2.a:0 "我们会卷土重来。"
 rcmjapan_christian.2.d:0 "不稳定的政治气候以及日益高涨的反基督教势力现在已经发展为全国范围内对他们所支持的政府和教会当局的不满。 政府被迫削减对基督教团体的资助，神道教对基督徒的影响越来越大。 我们应该为此做点什么。"
 rcmjapan_christian.2.t:0 "教会当局受到挑战"
 rcmjapan_christian_ban_persecution_backlash.1.a:0 "平定这些暴徒！"
 rcmjapan_christian_ban_persecution_backlash.1.b:0 "得赶快做点什么。"
 rcmjapan_christian_ban_persecution_backlash.1.d:0 "十胜的教条主义极右翼神道崇拜者已经开始反对通过的新宗教迫害禁令，如果我们执行禁令，他们还威胁要反抗。 我们生活在十胜的许多同胞现在都担心会受到进一步的迫害。 这是完全不能接受的！ 我们应该怎么做？"
 rcmjapan_christian_ban_persecution_backlash.1.t:0 "十胜反对新宗教迫害禁令"
 rcmjapan_christian_ban_persecution_backlash.10.a:0 "平定这些暴徒！"
 rcmjapan_christian_ban_persecution_backlash.10.b:0 "得赶快做点什么。"
 rcmjapan_christian_ban_persecution_backlash.10.d:0 "中国的教条主义极右翼神道崇拜者已经开始反对通过的新宗教迫害禁令，如果我们执行禁令，他们还威胁要反抗。 我们生活在中国的许多同胞现在都担心会受到进一步的迫害。 这是完全不能接受的！ 我们应该怎么做？"
 rcmjapan_christian_ban_persecution_backlash.10.t:0 "中国反对新宗教迫害禁令"
 rcmjapan_christian_ban_persecution_backlash.11.a:0 "平定这些暴徒！"
 rcmjapan_christian_ban_persecution_backlash.11.b:0 "得赶快做点什么。"
 rcmjapan_christian_ban_persecution_backlash.11.d:0 "四国的教条主义极右翼神道崇拜者已经开始反对通过的新宗教迫害禁令，如果我们执行禁令，他们还威胁要反抗。 我们生活在四国的许多同胞现在都担心会受到进一步的迫害。 这是完全不能接受的！ 我们应该怎么做？"
 rcmjapan_christian_ban_persecution_backlash.11.t:0 "四国反对新宗教迫害禁令"
 rcmjapan_christian_ban_persecution_backlash.12.a:0 "平定这些暴徒！"
 rcmjapan_christian_ban_persecution_backlash.12.b:0 "得赶快做点什么。"
 rcmjapan_christian_ban_persecution_backlash.12.d:0 "九州岛的教条主义极右翼神道崇拜者已经开始反对通过的新宗教迫害禁令，如果我们执行禁令，他们还威胁要反抗。 我们生活在九州岛的许多同胞现在都担心会受到进一步的迫害。 这是完全不能接受的！ 我们应该怎么做？"
 rcmjapan_christian_ban_persecution_backlash.12.t:0 "九州岛反对新宗教迫害禁令"
 rcmjapan_christian_ban_persecution_backlash.13.a:0 "平定这些暴徒！"
 rcmjapan_christian_ban_persecution_backlash.13.b:0 "得赶快做点什么。"
 rcmjapan_christian_ban_persecution_backlash.13.d:0 "南九州岛的教条主义极右翼神道崇拜者已经开始反对通过的新宗教迫害禁令，如果我们执行禁令，他们还威胁要反抗。 我们生活在南九州岛的许多同胞现在都担心会受到进一步的迫害。 这是完全不能接受的！ 我们应该怎么做？"
 rcmjapan_christian_ban_persecution_backlash.13.t:0 "南九州岛反对新宗教迫害禁令"
 rcmjapan_christian_ban_persecution_backlash.14.a:0 "平定这些暴徒！"
