 RCM_JAP_promote_religious_freedom_desc:0 "我们的首相安部矶雄是社会主义基督教的坚定支持者，而一个神道教主导的社会已被证明是极右军国主义和极端主义的温床。事实上，极右翼非常盛行，甚至到了有社会主义团体也呼吁实行军国极权主义的地步。改变这种情况的一个好办法是传播基督的福音，用社会主义的价值观促进基督教的人道主义，以平衡日本传统宗教的教条主义。\n\n为了实现这一目标，我们将与目前在日本的教会组织合作，组织研讨会，教育人们，使他们更加接受基督教信仰，同时推动立法，保证人民的宗教自由，平息任何极右派的骚动。\n\n整体基督教接受度(按人口加权计算): §O[?Root.current_christian_acceptance|]%§!\n\n每周获得:\n[Root.GetAbeorNo][Root.GettestuorNo][Root.GetBunjiorNo]\n目前限制:\n§O[Root.GetCurrentChristianCap]§!"
