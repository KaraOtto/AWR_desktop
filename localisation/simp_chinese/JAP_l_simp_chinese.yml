 news.401.d:0 "[This.GetNewsIcon]最近年轻革命者的政变在日本引起了极大的混乱。不幸的是，冈田启介首相成为这一可怕事件的主要受害者之一。\n\n在叛军发动一次突袭后，冈田首相被发现死在自己的住所。今天对日本来说是黑暗的一天。"
 news.401.t:0 "冈田首相遇刺"
 news.402.a:0 "令人担忧。"
 news.402.t:0 "二二六兵变"
 news.412.a:0 "令人担忧"
 news.412.b:0 "重大的进展"
 news.412.d:0 "[This.GetNewsIcon]今天，日本政府领导人[JAP.GetLeader]和美国总统[USA.GetLeader]在阿拉斯加朱诺举行首脑会议。正在讨论的主要问题是日本最近对法属印度支那的侵略。\n\n然而，没有达成真正的共识，这次会议引起了国际社会的强烈抗议，主要来自中国和英国。但两位领导人一致认为，两国政府未来可能会进行进一步的谈判。"
 news.412.t:0 "朱诺会议"
 news.444.a:0 "背叛国家的下场。"
 news.444.b:0 "汪逆之死，大快人心！"
 news.444.c:0 "以华制华工作走到了尽头。"
 news.444.d:0 "[This.GetNewsIcon]今日，中国军队在抗日战争中取得重大胜利，成功攻入伪政府首都南京，并抓捕了伪政府主席汪精卫。在此次突袭行动中，我方展现了高超的军事技能和坚定的决心。经过数小时的激烈战斗，我军突破了敌军的防线，迅速控制了南京的关键地区。汪精卫试图逃亡到日本，但在其住所被包围后，无奈被捕。汪精卫多年来一直与日本侵略者合作，背叛国家和人民，引起了全国上下的愤怒与不满。他的倒台象征着伪政府的彻底崩溃，也预示着中国人民抗日战争的胜利在望。愤怒的士兵们在抓捕汪精卫后，将其拖到南京著名的雨花台。雨花台是南京重要的历史纪念地，此地曾见证无数革命先烈的牺牲。如今，这里也成为了汪精卫罪行的终结之地。我们决定在此处对汪精卫进行公审和处决，以告慰抗日英烈的在天之灵。在众多士兵和市民的见证下，汪精卫被执行了枪决。随着几声枪响，这位曾经的伪政府主席结束了其背叛国家和民族的一生。人群中爆发出一片欢呼声，人们挥舞着旗帜，高喊着口号，庆祝这一历史性时刻。"
 news.444.t:0 "汪精卫之死"
 news.666.aa:0 "战争的代价"
 news.666.bb:0 "该死的米畜！"
 news.666.cc:0 "这是一次完美的空袭！"
 news.666.dd:0 "[This.GetNewsIcon]美军首次对东京采取大规模燃烧弹攻势。当晚174架B-29轰炸机在东京抛下大量烧夷弹，把东京约2.56平方千米的地方焚毁。随后美军开始执行“火牛”轰炸行动，派出334架B-29轰炸机从马里亚纳群岛出发，再次使用凝固汽油弹对东京进行持续2小时的地毯式轰炸。 每架飞机携带六至八吨燃烧弹，燃烧面积可达6500平方米。为避免己方不必要的伤亡，空袭时各轰炸机单独轰炸而不进行编队。不少的飞机为了多载炸弹而拆除了自卫机枪，仅保留了尾部的机枪。开始由两队B29轰炸机先行进入目标区，投掷M29燃烧弹，引发一个十字燃烧区，其余轰炸机以此为标记进行投弹。东京有不少建筑物都是传统的木造建筑，所以猛烈的烧夷弹轰炸使当晚的东京出现了火灾旋风，334架B-29共投下了超过2千吨燃烧弹，产生的高温足以使区内所有可燃物烧着，造成近10万人死亡，军轰炸过程中许多东京市民逃离出城。策划轰炸行动的柯蒂斯·柯蒂斯·李梅将军命令美军顶住日本防空力量的压力抛撒传单，事先通知下一步轰炸的目标。这种做法不但较为人道，也能打击日本国民的士气。仅东京一地就有上百万人逃往农村，工厂工人的出勤率不到从前的一半。轰炸东京及其他城市使日本战时经济陷入瘫痪。"
 news.666.tt:0 "东京大轰炸"
