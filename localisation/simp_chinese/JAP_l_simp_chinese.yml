 jap_improved_sprit_focus:0 "强化国家意志"
 jap_improved_sprit_focus_desc:0 "民族自豪和好战热情激励了每一位皇民，这驱使着他们达到为国献身的新高度！"
 jap_kuilei:0 "大东亚共荣圈"
 jap_kuilei_desc:0 "§L作为共荣圈的一份子，我们不得不为兴复亚洲作出贡献。§!"
 jap_military_youth:0 "青年军"
 jap_military_youth_desc:0 "我们可以通过创建组织来训练年轻人成为士兵，从而相对轻松地发展我们的军队。这样，我们的军队才能变得更加强大。"
 jap_paobing:0 "重炮联队"
 jap_ph_attack_three_waves:0 "珍珠港大捷：中等损失"
 jap_ph_attack_three_waves_desc:0 "我们在珍珠港一役中取得了重大战果，但是在第三波攻击中，海军也损失了一部分飞机和经验丰富的飞行员。"
 jap_ph_attack_two_waves:0 "珍珠港大捷：最小损失"
 jap_ph_attack_two_waves_desc:0 "我们在珍珠港一役中以极小的代价取得了重大战果。"
