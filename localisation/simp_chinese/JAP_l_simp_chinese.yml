 war_support_factor:0 "$MODIFIER_WAR_SUPPORT_FACTOR$"
 warlord_generic_communist:0 "社会主义中国国策树"
 warlord_generic_nationalist:0 "国民政府国策树"
 warmonger:0 "好战者"
 warn_difficulty:0 "\n£location_pointer §R警告§!：由于历史环境的原因，这条道路虽然是史实性的，§R但对于随便玩玩的玩家来说可能更加困难§!，因为与大国的战争是难以避免的。\n"
