 usa_support_kmt_civil_war:0 "援助中国国民党"
 usa_zhenzhugang:0 "珍珠港遭到偷袭"
 usa_zhenzhugang_desc:0 "§L昨天，美利坚合众国受到了日本帝国海空力量突然和蓄意的攻击......§!"
 vnr_attack_on_pearl_harbor:0 "偷袭珍珠港已发生。"
 vnr_hondo_kessen_category:0 "本土决战"
 vnr_hondo_kessen_category_desc:0 "我们的敌人已经从各个方向对日本列岛发起了进攻，大本营不得不发出命令决定执行决号作战来阻挡美国人。我们所有人都必须战斗下去，找到手边的武器，动员起来，为了帝国的荣耀和天皇陛下，我们要战斗至最后一人。"
 vnr_pacific_allies_category:0 "太平洋战争委员会"
 vnr_pacific_allies_category_desc:0 "太平洋战争委员会是为了对太平洋战场提供最高级别指导方向的机构，它由正在亚太地区对抗日本暴政的所有国家的代表组成。"
 vnr_pacific_game_category:0 "太平洋大博弈"
 vnr_pacific_game_category_desc:0 "日本已经成为了我国在太平洋方向上的最大威胁，所有人都知道战争即将到来，这只是时间问题。虽然公众对于参加欧亚大陆上的战争表现得极不情愿，但我们必须为最坏的情况做好准备。\n\n全面禁运日本的民意基础：[?USA.anti_ph_score|%G]"
 vnr_pacific_war_jap_category:0 "大东亚战争"
 vnr_pacific_war_jap_category_desc:0 "日本将会成为大东亚共荣圈的核心，为了达成这一伟业，我们必须驱逐西方的殖民者，并消除他们在亚太地区的影响。亚细亚将是亚洲人的亚洲！"
