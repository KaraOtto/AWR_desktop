 ph_appoint_Nimitz:0 "任命切斯特·尼米兹"
 ph_appoint_Nimitz_desc:0 "告诉尼米兹，赶快到珍珠港去，待在那里直到打败日本人。"
 ph_attack_approved:0 "天皇已经批准该计划。"
 ph_attack_countdown:0 "通往夏威夷之路"
 ph_attack_countdown_desc:0 "美国海军将他们大部分的战列舰都部署在了夏威夷的珍珠港。只要我们做好充足的准备，我们就能保证出奇制胜。不过美国人不一定会给我们那么多时间。"
 ph_attack_start_tt:0 "§O执行Z计划。§!"
 ph_attack_timeout_tt:0 "§R我们的努力都将白费。§!"
 ph_carry_on_attack:0 "§R我们必须彻底歼灭他们。\n派出第三波空袭。如果你决定这样做可能会失去更多的飞机和飞行员，而且这次的空袭不会像之前那么简单......§!"
 ph_create_pacific_theatre:0 "创建太平洋战区"
 ph_create_pacific_theatre_desc:0 "我们需要整合所有太平洋地区的战力来对抗日本。"
 ph_cutoff_Japan:0 "阻断日本资源进口"
 ph_cutoff_Japan_desc:0 "对日本全面禁运已获得足够的民意基础。"
 ph_cutoff_Japan_tt:0 "民意100%支持对日禁运。"
 ph_deal_with_japs:0 "对日商品出口"
 ph_deal_with_japs_desc:0 "尽管日本的所作所为极大地危害了亚太的和平，但是它仍然是我们在亚洲最大的贸易伙伴之一，何况总有一些商品不在禁运名单上。"
 ph_death_of_antoku:0 "Death of Antoku（安德天皇之死）"
 ph_doolittle_raid:0 "杜立特空袭"
 ph_doolittle_raid_desc:0 "詹姆斯·杜立特将会率领一队B25轰炸机前往东京，给天皇准备一个惊喜。"
 ph_embargo_japan:0 "限制对日出口战略资源"
 ph_embargo_japan_desc:0 "日本的侵略战争已经打破了世界原有的稳定与和平，我们不能容忍日本胡作非为。"
 ph_emperor_has_spoken:0 "§Y舰队从千岛群岛启航。§!"
 ph_farewell_of_slavianka:0 "Farewell of Slavianka（斯拉夫女人的告别）"
 ph_final_assemble_ships:0 "集结舰队"
 ph_final_assemble_ships_desc:0 "一切准备都已做好，我们可以发出秘密指令集结舰队了。"
 ph_final_assemble_ships_tt:0 "§G舰队集结完成。§!"
 ph_final_north_pacific_route:0 "确保北太平洋航线"
 ph_final_north_pacific_route_desc:0 "北太平洋因为风高浪急是一片人迹罕至的海域，但我们仍然不能冒任何风险。最好先派出一些货轮侦察航线上的情况。"
 ph_final_north_pacific_route_tt:0 "§G我们将确保北太平洋航线。§!"
 ph_final_sub_picket_line:0 "在夏威夷附近设立潜艇警戒线"
 ph_final_sub_picket_line_desc:0 "通过在夏威夷群岛附近水域部署警戒潜艇，我们可以近距离观察港内的动向，毕竟这次行动可经受不起任何意外。"
 ph_final_sub_picket_line_tt:0 "§G我们将获得更多关于珍珠港的情报。§!"
 ph_gunkan_march:0 "Gunkan Kōshinkyoku（军舰进行曲）"
 ph_influence_latin_america:0 "推动拉美国家对日禁运"
 ph_influence_latin_america_desc:0 "拉丁美洲是我们的后院，在这危急的时刻，我们需要他们的帮助。"
 ph_initial_contact_undercovers:0 "联系夏威夷的日本间谍"
 ph_initial_contact_undercovers_desc:0 "在夏威夷居住着许多日裔侨民，我们的情报机构在他们当中安插了一部分间谍。现在只需激活这些潜伏特工，我们就能获得关于珍珠港的第一手情报。"
 ph_initial_last_diplomatic_push:0 "最后的外交努力"
 ph_initial_last_diplomatic_push_desc:0 "没有人想要开战。不过只要美国人还愿意坐下来听听我们的条件，也许我们可以找到和平共处的方法。"
 ph_initial_last_diplomatic_push_tt:0 "我们为美国准备了一份提案。"
 ph_initial_persuade_general_staff:0 "说服总参谋部"
 ph_initial_persuade_general_staff_desc:0 "海军总参谋部并不情愿批准这项天马行空的计划。因此，山本五十六决定以他在海军中的地位为手腕逼迫总参谋部就范。"
 ph_initial_persuade_general_staff_tt:0 "我们的准备工作进度达到20%"
 ph_initial_war_game:0 "举行兵棋推演"
 ph_initial_war_game_desc:0 "在向海军总参谋部提交如此疯狂的计划之前，我们至少应该先举行几场兵推来验证这一方案的可行性。"
 ph_island_hopping_tactics:0 "筹备跳岛战术"
 ph_island_hopping_tactics_desc:0 "我们不能坐视战争无休止地打下去，尼米兹和麦克阿瑟都相信存在一种方法可以在更短的时间内打到日本列岛。"
 ph_jap_celebrating_victory:0 "正在控制其他的占领区"
 ph_jap_defend_islands:0 "防御岛礁"
 ph_jap_defend_islands_desc:0 "联合舰队已经无法与敌人对抗了，但是只要还有刺刀和对天皇尽忠的决心，我们的陆军仍然可以保卫绝对国防圈。"
 ph_jap_support_army:0 "支持陆军行动"
 ph_jap_support_army_desc:0 "我们会在这段时间内支持陆军的行动方针。"
 ph_jap_support_army_navy:0 "促成陆海军协同行动"
 ph_jap_support_army_navy_desc:0 "皇旗之下，诸君都应精诚团结，陆海军要像同袍一样共同战斗。"
 ph_jap_support_navy:0 "支持海军行动"
 ph_jap_support_navy_desc:0 "我们会在这段时间内支持海军的行动方针。"
 ph_jap_supporting_military:0 "正在支持另一军种的行动方针"
 ph_keep_pacific_presence:0 "维持太平洋海军存在"
 ph_keep_pacific_presence_desc:0 "日本在太平洋地区的狼子野心已经昭然若揭，我们需要在此维持足够的海军存在以防止局势生变。\n\n§R我们需要在夏威夷部署至少九艘战列舰，否则将会面临严重后果。§!"
 ph_keep_pacific_presence_tt:0 "我们将保卫太平洋的和平与稳定。"
 ph_letters_from_iwo_jima:0 "Letters from Iwo Jima（硫磺岛的家书）"
 ph_loan_to_resistance:0 "对抵抗日本的国家提供贷款"
 ph_loan_to_resistance_desc:0 "日本在东亚的侵略行为甚嚣尘上，通过向仍然在抵抗日本暴政的国家提供贷款，他们也许可以拖住日本更久。"
 ph_mission_is_a_go:0 "执行Z作战"
 ph_mission_is_a_go_desc:0 "在长时间的准备后，计划已经可以执行了，但并不是所有人都有信心。"
 ph_mission_is_a_go_tt:0 "§O任务已准备就绪。§!"
 ph_nagumo_is_our_guy:0 "§Y南云忠一是海军中资历最深厚的舰队指挥官之一，尽管他对航空兵不甚熟悉，但也只有他能在横跨太平洋的远航中保证舰队的安全。§!"
 ph_nimitz_defense_strategy:0 "岛屿防御"
 ph_nimitz_defense_strategy_desc:0 "日本人对进攻我方的岛屿准备充分，在海军恢复元气之前，我们必须不惜一切代价守住这些岛礁。"
 ph_patriotism_propaganda:0 "珍珠港事件宣传"
 ph_patriotism_propaganda_desc:0 "所有美国人都应该记住这耻辱的一天。直至我们把军舰开进东京湾的那天，与日本之间绝不会有和平二字可言。"
 ph_planning_exercise:0 "举行海航演习"
 ph_planning_exercise_desc:0 "知己知彼，方能百战不殆。"
 ph_planning_first_air_fleet:0 "建立第一航空舰队"
 ph_planning_first_air_fleet_desc:0 "山本五十六相信通过将所有的航母集中到战斗群中，将会使其成为最富革命性且令人畏惧的海上力量。"
 ph_planning_first_air_fleet_tt:0 "§G第一航空舰队已成立。§!"
 ph_planning_pick_Nagumo:0 "任命舰队司令官"
 ph_planning_pick_Nagumo_desc:0 "横跨大洋的航行绝非易事，我们需要一位冷静稳重的指挥官来组织舰队，使其能够平安地穿过太平洋上最危险的航线。"
 ph_planning_pick_Nagumo_tt:0 "我们的准备工作进度达到60%"
 ph_planning_store_fuel:0 "准备燃料"
 ph_planning_store_fuel_desc:0 "这是我们海军历史上规模最大的行动，在出发前我们必须确保舰船的油料充足。"
 ph_practice_dive_bombing:0 "训练俯冲轰炸"
 ph_practice_dive_bombing_desc:0 "俯冲轰炸显然是攻击航母更加高效的办法，别再去管鱼雷了。"
 ph_prepare_island_hopping:0 "准备跳岛作战"
 ph_prepare_island_hopping_desc:0 "目前我们已经掌握制海权，我们可以先绕过一些不重要的地点，直接进攻具有战略意义的岛屿。"
 ph_prepare_island_hopping_tt:0 "我们的海军实力要达到日本的2.5倍。\n§Y海军实力 = 2.5x航母 + 1x战列舰 + 0.8x战列巡洋舰 + 0.5x重巡洋舰 + 0.2x轻巡洋舰 + 0.1x驱逐舰§!"
 ph_propaganda_war_crimes:0 "宣传日本战争罪行"
 ph_propaganda_war_crimes_desc:0 "宣传日本在亚洲犯下的战争罪行能让公众支持更加严格的对日制裁措施。"
 ph_reinfoce_naval_base:0 "发展海军基地"
 ph_reinfoce_naval_base_desc:0 "我们可以对太平洋地区的海军基地进行升级。"
 ph_reinforce_bunker:0 "加固滩头"
 ph_reinforce_bunker_desc:0 "我们应该在太平洋岛屿上建造岸防要塞。"
 ph_reinforce_philippines:0 "支援菲律宾军事建设"
 ph_reinforce_philippines_desc:0 "菲律宾是我们在亚洲不沉的航空母舰，我们得保证它不会在一开战的时候就易手。"
 ph_repair_infrastructure_1:0 "修复珍珠港"
 ph_repair_infrastructure_1_desc:0 "珍珠港在日军的攻击中受损严重。在它被完全修复前，我们无法维修受损的战舰。"
 ph_repair_infrastructure_2:0 "修复珍珠港"
 ph_repair_infrastructure_2_desc:0 "珍珠港和海军油库在日军的攻击中受损严重。在它们被完全修复前，我们无法维修受损的战舰。"
 ph_repair_infrastructure_tt:0 "珍珠港修复完毕，受损战舰现在会进入干船坞。"
 ph_retreat_right_now:0 "§G我们最勇敢的帝国勇士已经在今天取得了巨大的战果，没必要再去赌一次。\n现在撤退，美国海军将停止运转两个月。§!"
 ph_support_decryption_unit:0 "支持太平洋舰队密码破译部门"
 ph_support_decryption_unit_desc:0 "如果埃德温·莱顿说的属实，那么罗切福特和他的密码破译部门将是我们打赢这场战争的关键。"
 ph_third_wave_fail:0 "攻击失败"
 ph_third_wave_success:0 "攻击成功"
 ph_usa_appoint_Nimitz_tt:0 "尼米兹会带领我们走向胜利。"
 ph_victory_in_Australia:0 "攻占澳大利亚"
 ph_victory_in_Australia_desc:0 "我们已经完全夺取澳大利亚，这里将成为我军在南太平洋行动的基地。"
 ph_victory_in_East_Indies:0 "攻占东印度群岛"
 ph_victory_in_East_Indies_desc:0 "我们已经完全夺取东印度群岛，这里将成为我军战略资源的主要产地。"
 ph_victory_in_Hawaii:0 "攻占夏威夷"
 ph_victory_in_Hawaii_desc:0 "我们已经完全夺取夏威夷群岛，这将成为我军进攻美国西海岸的跳板。"
 ph_victory_in_Malaya:0 "攻占马来亚"
 ph_victory_in_Malaya_desc:0 "我们已经完全夺取马来亚，这里将成为我军主要的石油来源。"
 ph_when_johnny_comes_marching_home:0 "乌拉尔的花楸树"
 ph_yamamoto_plan_approved:0 "§G山本五十六的计划已获海军总参谋部通过，我们可以着手执行下一阶段的计划了。§!"
 please_take_btwwwh_focus:0 "完成国策§Y回归我们的航向§!来解锁这个国策。"
 plus_point_1_per_week:0 "£RCM_supply §G+0.1%§! §W每周§!"
 plus_point_2_per_week:0 "£RCM_supply §G+0.2%§! §W每周§!"
 pm_killed:0 "首相被暗杀。"
 political:0 "政治"
 political_actions:0 "政治行动"
 political_advisor_cost_factor:0 "$trade_laws_cost_factor$"
 political_parties_reset_tt:0 "§Y政党将被重置§!\n"
 political_power_factor:0 "$MODIFIER_POLITICAL_POWER_FACTOR$"
 political_power_gain:0 "$MODIFIER_POLITICAL_POWER_GAIN$"
 popular_figurehead:0 "受欢迎的名誉领袖"
 prc_cant_contact_northeast_tt:0 "§G@PRC[WTT_communist_china.GetName] 当该协议生效时，将无法联系满洲的游击队。§!"
 pressure_pm_focus:0 "给首相施压"
 pressure_pm_focus_desc:0 "首相的工作做得不好。光荣的日本军队选择了一个新人选来替代他。"
 prince_de_defect:0 "德王的背叛？"
 prince_de_defect_desc:0 "百灵庙蒙政会领导人德穆楚克栋鲁普亲王已经显露出叛变的迹象。也许我们应该做点什麽。\n§W--------------§!\n及时完成§Y拆分百灵庙蒙政会§!国策可能会阻止内蒙古的彻底背叛。"
 prince_of_terror:0 "恐怖的巨头"
 prince_purged_by_kodoha:0 "遭皇道派清洗"
 prince_purged_jap:0 "皇室成员遭清洗"
 prince_purged_jap_desc:0 "一位皇室成员，闲院宫载仁亲王，以支持皇道派和復辟帝制名义被清洗。\n§W--------------§!\n§G稳定度会随着时间的推移而恢復，尽管它不会比应有的更能增加稳定度。§!"
 prince_will_be_purged:0 "§R亲王将被清洗。§!\n"
 prince_will_be_put_on_house_arrest:0 "§R亲王将被软禁。§!\n"
 pro_axis_generals_purged:0 "逮捕亲轴心国的军国主义者"
 production_effort_tt:0 "没有足够的建筑位可以用于建造§Y军用工厂§!"
 production_factory_max_efficiency_factor:0 "$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY_FACTOR$"
 production_speed_arms_factory_factor:0 "$modifier_production_speed_arms_factory_factor$"
 production_speed_buildings_factor:0 "$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$"
 production_speed_bunker_factor:0 "$modifier_production_speed_bunker_factor$"
 production_speed_coastal_bunker_factor:0 "$modifier_production_speed_coastal_bunker_factor$"
 production_speed_industrial_complex_factor:0 "$modifier_production_speed_industrial_complex_factor$"
 production_speed_infrastructure_factor:0 "$modifier_production_speed_infrastructure_factor$"
 production_speed_rail_way_factor:0 "$modifier_production_speed_rail_way_factor$"
 prospect_for_resources:0 "资源勘查"
 prospect_for_resources_desc:0 "我国地质学家已在本国领土上发现了一批富矿，我们可以投入一些资金进行拓掘。随着挖掘技术的进步，我们还能发现更多可利用的矿藏。"
 protest_action_strong:0 "强烈抗议"
 protest_to_GER:0 "抗议拉贝损害帝国形象"
 puppet_wargoal_focus:0 "傀儡（国策）"
 puppet_wargoal_focus_desc:0 "傀儡$TARGET|Y$"
 purged_by_kodoha:0 "遭皇道派清洗"
 purged_by_terauchi:0 "遭寺内寿一清洗"
 purging_will_seriously_damage_emperor_opinion_on_us_tt:0 "§C我们的天皇非常信任这位人士，清洗他可能会损害天皇对我们的看法。请根据自己的想法抉择§!"
 pw_allies_civilian_industry:0 "对[From.GetNameDef]提供工业援助"
 pw_allies_civilian_industry_desc:0 "[From.GetNameDefCap]是我们在太平洋地区最重要的盟友之一，我们必须保证他们能在战争中坚持下来。"
 pw_allies_ensure_trade:0 "确保通往[From.GetNameDef]的航道"
 pw_allies_ensure_trade_desc:0 "[From.GetNameDefCap]是我们在南太平洋行动的重要支点，当地的石油供应不能中断。"
 pw_allies_expand_auckland:0 "扩建奥克兰港"
 pw_allies_expand_auckland_desc:0 "奥克兰是盟军在此地至关重要的港口，我们需要在美国舰队抵达前扩建这里的设施。"
 pw_allies_expand_sydney:0 "扩建悉尼港"
 pw_allies_expand_sydney_desc:0 "悉尼是盟军在此地至关重要的港口，我们需要在美国舰队抵达前扩建这里的设施。"
 pw_allies_loans:0 "对[From.GetNameDef]的无息贷款"
 pw_allies_loans_desc:0 "我们要为了[From.GetNameDef]的武装和动员贡献一切力量。"
 pw_allies_merge_command:0 "移交国家军队指挥权"
 pw_allies_merge_command_desc:0 "面对日军的攻势，战争已经向不利于我们的一边倾斜。我们除了将武装部队的指挥权移交给[USA.GetNameDef]以外没有其他方法了。"
 pw_allies_military_industry:0 "对[From.GetNameDef]提供军事援助"
 pw_allies_military_industry_desc:0 "[From.GetNameDefCap]是我们在太平洋地区最重要的盟友之一，我们需要他们的军队为我们守住侧翼。"
 pw_burn_cropland:0 "会议室行动"
 pw_burn_cropland_desc:0 "柯蒂斯·李梅将军建议对日本重要的战略性城市和农业基地使用燃烧弹进行毁灭性轰炸。"
 pw_citizen_training:0 "国民训练计划"
 pw_citizen_training_desc:0 "美国人越来越近了，我们没有时间训练一名真正的士兵，他们只要知道怎么扣扳机就行了。"
 pw_deploy_kaiten:0 "部署回天鱼雷"
 pw_deploy_kaiten_desc:0 "回天雷是我们的秘密武器，有了几千枚这种自杀式兵器，我们将会击沉任何胆敢来犯的美国军舰。"
 pw_deploy_kamikaze:0 "部署神风特攻"
 pw_deploy_kamikaze_desc:0 "飞机的性能无关紧要，重要的是飞行员的决心。只要一个人能抱着必死的决心，那他就能击沉任何敌舰。"
 pw_deploy_shitotsubakurai:0 "发放刺突爆雷"
 pw_deploy_shitotsubakurai_desc:0 "刺突爆雷是一款自杀式反坦克武器，一条人命换一辆坦克。"
 pw_gas_food_crops:0 "使用LN-8化合物"
 pw_gas_food_crops_desc:0 "LN-8是一款包含了苯氧基类除草剂的炸弹，这会是我们用于杀死日本所有农作物的最后手段。"
 pw_gyokusai_propaganda:0 "一亿总玉碎"
 pw_gyokusai_propaganda_desc:0 "宁为玉碎，不为瓦全。"
 pw_issue_weapons:0 "向平民发放武器"
 pw_issue_weapons_desc:0 "我们的仓库里还躺着许多军用级别的步枪，尽管它们当中有相当数量的可以追溯到上个世纪，但仍然可堪一用。就算我们没了子弹，我们还有刺刀和竹枪。"
 pw_jap_surrender_tt:0 "§G日本接受无条件投降。§!"
 pw_japan_sue_for_peace:0 "申请与同盟国停战"
 pw_japan_sue_for_peace_desc:0 "天皇陛下选择接受不可避免之宿命。"
 pw_operation_downfall:0 "准备没落行动"
 pw_operation_downfall_desc:0 "在历史上，从来没有人征服过日本列岛，这次行动将会让我们达成这一成就。"
 pw_operation_downfall_discussion:0 "对日登陆行动的讨论"
 pw_operation_downfall_tt:0 "§O没落行动开始执行。§!"
 pw_operation_starvation:0 "饥饿行动"
 pw_operation_starvation_desc:0 "通过在日本周边空投部署数以千计的水雷，我们将会确保一粒米都运不到岛上。"
 pw_recruitment:0 "全民义务兵役"
 pw_recruitment_desc:0 "每个16岁到60岁的国民，不管男女老少都必须服义务兵役，我们要么获胜，要么就光荣地战死。"
 pw_strengthen_Hokkaido:0 "加强北海道防御"
 pw_strengthen_Kyushu:0 "加强九州岛防御"
 pw_strengthen_Shikoku:0 "加强四国岛防御"
 pw_strengthen_home:0 "加强本州岛防御"
 pw_study_pacific_war:0 "研习战争经验"
 pw_study_pacific_war_desc:0 "我们在硫磺岛和冲绳获得的经验证明，美国人过度依赖火力优势和制空权。他们不是无敌的，只要失去了机械化的优势，我们仍然可以击败他们，但前提是我们必须要打得聪明。"
 pw_usa_surrender_tt:0 "§G[USA.GetName]和它的盟友将从太平洋撤出，并割让此地的岛屿和殖民地。§!"
 pw_victory_in_Pacific:0 "向美国释放和谈信号"
 pw_victory_in_Pacific_desc:0 "我们已经在太平洋地区取得了战略性的胜利，现在美国应该会听取我们的条件。"
 qiangtoucao:0 "墙头草"
 radar_station:0 "雷达站"
 radar_station_desc:0 "雷达可使你获得邻近地区的敌军部队情报。\n提高所属地区的雷达站等级，便可增加雷达的有效距离。\n雷达也能在所属地区附近提供更好的对空侦察能力，提高己方战机接敌的概率。\n此外雷达还会提升探测敌方舰队的能力。"
 rail_way:0 "铁路"
 rail_way_desc:0 "铁路用来连接补给中心，使补给能够从你的补给首都运输。"
 rcmUSA.1.a:0 "召回他们。"
 rcmUSA.1.b:0 "不，我们的顾问会留下来。"
 rcmUSA.1.d:0 "由于日本入侵的威胁迫在眉睫，[USA.GetName]军事代表团一直驻扎在中国，顾问们在改革国民党军队的一部分方面取得了很大进展。\n\n现在已经与日本签署了一项不侵犯条约。鉴于日本目前对中国的战争，这自然引起了日本人的一些关注。他们要求立即结束[USA.GetAdjective]对中国的一切支持。"
 rcmUSA.1.t:0 "日本要求我们召回在中国的志愿军"
 rcm_jap_imperial_japanese_army2:0 "大日本帝国军"
 rcm_jap_imperial_japanese_army2_desc:0 "大日本帝国军，组建于1868年，最高统帅为日本天皇，由日本陆军参谋本部、海军军令部直接指挥。 \n\n§R该民族精神将在当前执政党为共产主义政党或社会主义政党，或者日本战败时移除§!"
 rcm_jap_imperial_japanese_army:0 "日本帝国军"
 rcm_jap_imperial_japanese_army_desc:0 "日本帝国军，组建于1868年，最高统帅为日本天皇，由日本陆军参谋本部、海军军令部直接指挥。 \n\n§R该民族精神将在当前执政党为共产主义政党或社会主义政党，或者日本战败时移除§!"
 rcm_japan_imperial_war_conference.1.a:0 "会议将及时召开"
 rcm_japan_imperial_war_conference.1.d:0 "为了缓和帝国陆海军间的紧张关系，我们需要召开帝国战争会议。如果不这样做，我们的帝国将会陷入混乱。"
 rcm_japan_imperial_war_conference.1.t:0 "召开帝国战争会议"
 rcm_japan_imperial_war_conference.2.a:0 "会议很快就会召开！"
 rcm_japan_imperial_war_conference.2.d:0 "为了缓和帝国陆海军间的紧张关系，需要召开帝国战争会议。但因为会议一再拖延，军官以及将军们已经越来越不耐烦了，我们必须对此采取紧急措施。"
 rcm_japan_imperial_war_conference.2.t:0 "战争会议的延期造成的政治分歧"
 rcmchina.1.a:0 "我们不能允许他们不战而窃取我们的土地。"
 rcmchina.1.b:0 "我们要集中力量消灭共产党。"
 rcmchina.1.d:0 "日军部队近来要求我国政府承认冀察政务委员会独立。毫无疑问表现出了分裂中国之企图，迫使我们交出更多领土——就像日本入侵满洲的九一八事变一样。\n\n我们应该如何响应?"
 rcmchina.1.t:0 "日本要求建立一个完全独立的冀察政务委员会"
 rcmchina_path_conflict.1.a:0 "叛徒！"
 rcmchina_path_conflict.1.t:0 "张澜叛逃到日本！"
 rcmchina_path_conflict.2.a:0 "叛徒！"
 rcmchina_path_conflict.2.t:0 "黄琪翔叛逃到日本！"
 rcmchina_pro_jap.1.a:0 "为了西北抗日联军！"
 rcmchina_pro_jap.1.d:0 "[From.GetLeader]已决定接受日本的屈辱条件，与日本结盟。其他中国人需要团结起来反对[From.GetLeader]的叛国政权！ 最后，酝酿已久的“西北联合政府”终于可以付诸行动了。"
 rcmchina_pro_jap.1.t:0 "[From.GetLeader]向日本屈服！"
 rcmindochina.13.a:0 "把基地交给他们。"
 rcmindochina.13.b:0 "我们将拒绝。"
 rcmindochina.13.d:0 "日本要求使用东京的空军基地，并有权在那里部署军队。接受将使他们控制该地区，但拒绝可能意味著战争......"
 rcmindochina.13.t:0 "日本要求空军基地使用权"
 rcmindochina.30.a:0 "这不是真正的入侵，对吧？"
 rcmindochina.30.d:0 "今天早些时候，日本军队已经从东京转移到柬埔寨和交趾支那，以控制该地区的战略机场和港口。虽然我们对这一举动不满意，但我们只能抗议。"
 rcmindochina.30.t:0 "日本军队占领印度支那南部"
 rcmjapan.1.a:0 "他们会为此付出代价！"
 rcmjapan.1.d:0 "中国政府拒绝了我们的要求。他们称，我们——日本，没有任何正当的权利从他们手中索要他们的领土。看来有些人需要一点教训。"
 rcmjapan.1.t:0 "中国拒绝了我们的要求"
 rcmjapan.1000.a:0 "该死！"
 rcmjapan.1000.d:0 "[From.GetName]已经停止抵抗中国军队。我们的附庸不能继续为我国效力了。这对于日本而言是难以言喻的一天。但是，我们终将有一天会用其他方法将这笔债讨回来。"
 rcmjapan.1000.t:0 "[From.GetName]停止抵抗"
 rcmjapan.1002.a:0 "满洲国万岁！"
 rcmjapan.1002.b:0 "现在还不是时候。"
 rcmjapan.1002.d:0 "满洲国此前曾被中国军队摧毁，政府已经不复存在。然而，现在光荣的日本帝国军队已经收复其首都，我们应该考虑重建政府吗？还是应该继续直接控制该地区？"
 rcmjapan.1002.t:0 "重建满洲国？"
 rcmjapan.1003.a:0 "[EHB.GetName]万岁！"
 rcmjapan.1003.b:0 "现在还不是时候。"
