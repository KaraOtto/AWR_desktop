 rcmjapan_christian_constitutionalize_religious_freedom_support_big.9.d:0 "我们在关西推行的关于宗教自由的新宪法修正案，得到了压倒性的支持！ 许多人为保护个人自由的努力感到高兴，而其他人则因这项新修正案而对基督教信仰感兴趣。于关西的信仰人口真的在增长。"
 rcmjapan_christian_constitutionalize_religious_freedom_support_big.9.t:0 "关西人民大力支持有关宗教自由的新宪法修正案！"
 rcmjapan_christian_constitutionalize_religious_freedom_support_small.1.a:0 "好吧，至少没有什么骚动。"
 rcmjapan_christian_constitutionalize_religious_freedom_support_small.1.d:0 "尽管没有发生大的骚动或内乱，但十胜的人们对关于宗教自由的新宪法修正案几乎没怎么支持。 基督教仍然有些争议，许多人认为新修正案是多余的，损害了宪法的一致性。 然而，大多数人仍确实遵守新修正案。"
 rcmjapan_christian_constitutionalize_religious_freedom_support_small.1.t:0 "十胜对宗教自由的新宪法修正案兴趣缺缺"
