 imperial_diet:0 "帝国议会"
 imperial_diet_desc:0 "为了恢復明治时代伟大的宪法精神，帝国议会将作为一个立法机构，帮助确保人民和天皇的意愿得到满足。"
 imperial_glory_focus:0 "死亡乃是职责"
 imperial_glory_focus_desc:0 "给士兵和水手的帝国诏书上说“责任重于泰山,死亡轻于鸿毛”。我们必须准备为日本而牺牲自己的生命。"
 imperial_glory_idea:0 "帝国辉煌"
 imperial_glory_idea_desc:0 "吾国向来未受到应有之尊重，虽时经卅载，一切仍旧。有见及此，吾等坚信国民均将兢业，以事皇国，使之战无不胜。\n\n吾国身居亚细亚之巅，战争胜果必入我国彀中，无一例外。"
 imperial_glory_kodoha:0 "帝国荣耀"
 imperial_glory_kodoha_desc:0 "随着皇道派的成功不断壮大，我们可以在真正的天皇面前拥抱我们新皇权的荣耀。"
