 jap_two_torpedo_cruisers_tt:0 "两艘§Y轻巡洋舰§!皆被改装成§Y重雷装巡洋舰§!。"
 jap_unplanned_offensive.1.a:0 "那么我们就进行重点突破"
 jap_unplanned_offensive.1.b:0 "总算可以喘口气了！"
 jap_unplanned_offensive.1.d_CHI:0 "随着武汉会战的结束，我国东部的大片土地已经处在日军的控制之下。不过幸运的是，急剧拉长的战线、机动兵力的匮乏、占领区游击队的活跃均令日军难以再次发动全面的大规模攻势。"
 jap_unplanned_offensive.1.d_JAP:0 "随着武汉作战的胜利结束，中国东部的大片土地已经处在我军的控制之下，然而问题也随之而来——急剧拉长的战线、机动兵力的匮乏、占领区游击队的活跃均令我军难以再次发动全面的大规模攻势。我们唯有在前线各处静待时机、详细筹划才能继续向中国腹地推进。"
 jap_unplanned_offensive.1.t_CHI:0 "日军攻势受阻"
 jap_unplanned_offensive.1.t_JAP:0 "前线攻势受阻"
 jap_unplanned_offensive_prepare_catagory:0 "中国攻势计划"
 jap_unplanned_offensive_prepare_catagory_desc:0 "随着武汉作战的胜利结束，中国东部的大片土地已经处在我军的控制之下，然而问题也随之而来——急剧拉长的战线、机动兵力的匮乏、占领区游击队的活跃均令我军难以再次发动全面的大规模攻势。我们唯有在前线各处静待时机、详细筹划才能继续向中国腹地推进。"
