ugaki_kazushige_desc:0"宇垣一成庆应4年（1868年）出生于备前国磐梨郡潟瀬村大内（现冈山县冈山市东区瀬户町大内）一个叫宇垣杢右卫门的农民家里，兄弟5人，他是幼子。\n\n他在京都成城学校毕业后进入陆军，随后以优异成绩完成陆军士官学校与陆军大学的学习，并多次赴德国留学。其间军阶稳步上升，历任参谋本部要职、师团长、陆军省次官等重要岗位。大正时期，他先后在多个内阁中担任陆军大臣，并推行了大规模裁军计划，在军政界具有举足轻重的影响力。1931年因卷入三月事件而辞职。\n\n昭和6年（1931年）再次担任朝鲜总督，倡导“内鲜融和”和推行皇民化政策。"
