 jet_fighter_equipment:0 "喷气式战斗机"
 jet_fighter_equipment_desc:0 "战斗机灵敏轻巧，可完成多种任务。包括夺取制空权、为轰炸机护航及拦截敌方轰炸机。"
 jet_strat_bomber_equipment:0 "喷气式战略轰炸机"
 jet_strat_bomber_equipment_desc:0 "战略轰炸机攻击敌方建筑及基础设施，毁坏其珍贵的工业。"
 jet_tac_bomber_equipment:0 "喷气式战术轰炸机"
