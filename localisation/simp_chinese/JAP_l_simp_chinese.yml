 news.731.desc:0 "[This.GetNewsIcon]中国从日本人手中光复哈尔滨后， [1005.controller.GetAdjective] 该地区当局宣布，他们在下一个用于放置尸体的洞穴中留下的数百具尸体旁边发现了人体实验的证据。据报道，这些可怕行为的幕后黑手就是臭名昭著的“731部队”和陆军中将石井四郎。\n\n中国媒体发布了设施内不人道的生活条件以及该组织使用的设备的照片。据报道，日本政府否认他们参与了该部队所犯下的暴行，尽管有大量证据表明他们不仅实施了对中国人、朝鲜人和苏联人的活体实验，还进行了细菌武器的研制。"
 news.731.t:0 "中国揭露日本在伪满洲国的暴行"
 news.732.a:0 "我们应该早点到达这里..."
 news.732.b:0 "什么是战争罪？"
 news.732.c:0 "谴责这种反人类暴行！"
 news.732.desc:0 "[This.GetNewsIcon]苏联从日本关东军手中攻占哈尔滨后， 苏联 该地区当局宣布，他们在下一个用于放置尸体的洞穴中留下的数百具尸体旁边发现了人体实验的证据。据报道，这些可怕行为的幕后黑手就是臭名昭著的“731部队”和陆军中将石井四郎。\n\n苏联媒体发布了设施内不人道的生活条件以及该组织使用的设备的照片。据报道，日本政府否认他们参与了该部队所犯下的暴行，尽管有大量证据表明他们不仅实施了对中国人、朝鲜人和苏联人的活体实验，还进行了细菌武器的研制。"
 news.732.t:0 "苏联揭露日本在伪满洲国的暴行"
 news.777.a:0 "这次南方赢了....."
 news.777.b:0 "自由灯塔的熄灭。"
 news.777.c:0 "这是反动的历史倒车！"
 news.777.d:0 "[This.GetNewsIcon]反动的美利坚联盟国在首都升起了旗帜，联盟国总统发表了冗长演讲，表示为了保障国家的纯洁性，必须复兴美利坚唯一的正统联盟国,历史以北方视角讲述故事的时代太久了，现在该用另一方的视角看待这段往事了!总统宣布联盟国成立的日子将定为全国性的法定节假日。昔日的民主灯塔倒塌了，新政权的未来究竟会变成什么样子呢?只有时间能告诉我们答案。"
 news.777.t:0 "旧日历史重现"
 news.7925.a:0 "庆祝我军第一个大胜利！"
 news.7925.b:0 "可恶的土八路！"
 news.7925.c:0 "看来日军并非不可战胜！"
 news.7925.d:0 "[This.GetNewsIcon]八路军在平型关为了配合第二战区的友军作战，阻挡日军攻势。根据中共中央军委的指示临危出征，由115师师长林彪、副师长聂荣臻指挥，充分发挥近战和山地战的特长，与日本号称“钢军”的板垣征四郎第5师团第21旅团一部及辎重车队浴血死拼取得首战胜利。"
 news.7925.t:0 "平型关大捷"
 news.7926.a:0 "这无疑是一场意外..."
 news.7926.b:0 "这事件背后隐藏着什么..."
 news.7926.c:0 "罪孽深重，终遭报应..."
 news.7926.d:0 "[This.GetNewsIcon]日本总督辖区罪京的街头突然浓烟滚滚，一场意外大火毫无征兆地熊熊燃烧起来。蒋委员长听闻罪京失火，心中正义感爆棚，本着人道主义精神，当即大手一挥，下令组织力量前去救火。各方人员迅速响应，一群消防员在接到命令后，风风火火地赶赴罪京。然而，命运似乎在这个时候开起了玩笑。当消防员们抵达现场，准备大展身手扑灭大火时，却发生了让人目瞪口呆的一幕。慌乱之中，负责调配物资的人员竟然鬼使神差地把汽油当成了灭火的水，一桶桶地输送给了正在灭火的消防员。消防员们对此毫不知情，他们像往常一样熟练地操作着设备，将“水”喷射向熊熊大火。可下一秒，令人惊恐的事情发生了，大火不但没有被扑灭，反而因为汽油的加入变得更加猛烈，火舌肆虐地舔舐着周围的一切，火势呈几何倍数迅速蔓延。整个罪京陷入了更大的混乱与恐慌之中，人们纷纷尖叫着四处逃窜。蒋委员长得知这个意外后，也是一脸震惊，呆立当场，完全没想到自己的好心救援竟演变成了一场更加可怕的灾难，无数在罪京居住的日本人因此葬身火海..."
 news.7926.t:0 "火烧罪京"
 news.7927.a:0 "垂死挣扎罢了。"
 news.7927.b:0 "赴战！"
 news.7927.c:0 "战争局势进一步扩大。"
 news.7927.desc:0 "[This.GetNewsIcon]重庆传来意外消息有报道称，[CHI.GetLeader]领导的中国军队对日军阵地发动了突然袭击。据报道，日本军队在中国巨大规模的进攻下被打的措手不及后从阵地撤退，据报道国民革命军收复了一些城市和地区。尽管攻势最初取得了成功，但大多数观察家对中国军队将日本人驱逐出中国的能力表示怀疑。"
 news.7927.t:0 "中国发起冬季攻势"
 news.7928.a:0 "此役牵制了国民党主力。"
 news.7928.d:0 "[This.GetNewsIcon]国军占领淮阴、淮安及运河交通线后，以张灵甫指挥的整编第74师等部共4个旅进攻涟水，以此达到使华中党政机关北移山东的目标。粟裕、谭震林集中28个团迎击。战斗中，国军在飞机、炮火掩护下强渡废黄河，多次攻城并一度突入涟水城内，后又增调整编第28师第192旅1个团支援；华中野战军第10纵队、第6师等部顽强抗击，适时反击，收复顺河集等地切断了国军的退路，围绕涟水城及周边反复争夺。历时14天的涟水保卫战结束，国军余部向淮安撤离。此役华中野战军歼灭八千余人，自身伤亡六千余人。\n一个月后，国军为再夺涟水、打开进攻山东通道发起的作战。以整编第74师为主力，辅以整编第28师等部，共5个旅兵力，吸取首次进攻教训，改从涟水城西、城北发起突袭，同时以飞机、重炮猛烈轰击。华中野战军依托阵地顽强抗击，多次与国军展开巷战、肉搏战，但国军火力占优且战术调整，涟水城终被攻陷。"
 news.7928.t:0 "涟水战役"
 news.7929.a:0 "涟水一战，损伤惨重。"
 news.7929.d:0 "[This.GetNewsIcon]国军占领淮阴、淮安及运河交通线后，以张灵甫指挥的整编第74师等部共4个旅进攻涟水，以此达到使华中党政机关北移山东的目标。粟裕、谭震林集中28个团迎击。战斗中，国军在飞机、炮火掩护下强渡废黄河，多次攻城并一度突入涟水城内，后又增调整编第28师第192旅1个团支援；华中野战军第10纵队、第6师等部顽强抗击，适时反击，收复顺河集等地切断了国军的退路，围绕涟水城及周边反复争夺。历时14天的涟水保卫战结束，国军余部向淮安撤离。此役华中野战军歼灭八千余人，自身伤亡六千余人。\n一个月后，国军为再夺涟水、打开进攻山东通道发起的作战。以整编第74师为主力，辅以整编第28师等部，共5个旅兵力，吸取首次进攻教训，改从涟水城西、城北发起突袭，同时以飞机、重炮猛烈轰击。华中野战军依托阵地顽强抗击，多次与国军展开巷战、肉搏战，但国军火力占优且战术调整，涟水城终被攻陷。"
 news.7929.t:0 "涟水战役"
 news.7930.a:0 "实为吾民族复兴之起点。"
 news.7930.b:0 "不惜牺牲，奋勇向前。"
 news.7930.c:0 "丢人现眼！"
 news.7930.d:0 "中国自长城抗战以来取得的又一次胜利。"
 news.7930.desc:0 "[This.GetNewsIcon]进攻百灵庙的战斗全面展开。日本特务机关长盛岛角芳指挥作战，以炽烈火力阻止晋绥军前进。战至4时，攻击部队深入各敌阵地，战斗呈胶着状态。上午7时天即放明，若无进展，敌飞机助战，援兵亦至，则对晋绥军非常不利。因此孙长胜、孙兰峰到第一线指挥作战，袁庆荣指挥炮兵，并拨给尖刀连9辆汽车，每班乘1辆，由东南山口鱼贯向庙内冲击，决心在早晨全歼庙内之敌。经过反复搏斗，终于突破敌阵，突入庙内。\n激战后将敌歼灭大半。骑兵团攻占北山，控制了飞机场，断敌后路。日本特务机关长盛岛角芳、顾问烟谷草以及伪蒙第七师师长穆克登宝最后仓促撤离，晋绥军胜利收复百灵庙。"
 news.7930.t:0 "百灵庙大捷"
 news.7931.a:0 "豫东解放了！"
 news.7931.b:0 "这是一场灾难！"
 news.7931.c:0 "局势风云突变。"
 news.7931.desc:0 "[This.GetNewsIcon]华东野战军20万战士突然渡过黄河南下，震惊了国民党高层。国民党和共产党军队在开封城内发生一系列战斗，在陈士渠和唐亮的部队对开封城发动全面进攻后，共产党最终取得了上风。 \n至次日清晨，华东野战军成功突破国民党军在城内的主力防御，进入开封城内。随后进行了最后的攻击，成功消灭了国民党军队的三万名守军。据报道，国民党军第66师师长李忠信阵亡。"
 news.7931.t:0 "豫东战役"
 news.7932.a:0 "一场空中屠杀。"
 news.7932.b:0 "天皇陛下万岁！"
 news.7932.c:0 "任你龟儿子炸，格老子就是不怕！"
 news.7932.d:0 "[This.GetNewsIcon]日本大本营实施的“102号作战”，日军以平均每日3-4批次的频率使用炸弹和燃烧弹轰炸重庆，单日出动飞机最高达200架次，远超此前规模。这一阶段日军采用疲劳战术，轮番轰炸七天七夜，还明确将平民区纳入攻击范围。因此发生了震惊中外的“较场口大隧道窒息惨案”，此次轰炸导致重庆市区70%建筑被毁 。"
 news.7932.t:0 "重庆大轰炸"
 news.888.a:0 "台湾光复，雪甲午耻！"
 news.888.b:0 "这是耻辱性的一天..."
 news.888.c:0 "中日战场结局已定。"
 news.888.dd:0 "[This.GetNewsIcon]中国陆军第七十军、第六十二军分别在基隆港和高雄港登陆。陈仪代表国民政府正式宣布：“从今天起，台湾及其附属岛屿及澎湖列岛正式重入中国版图，所有一切土地人民政事皆已置于中华民国主权之下。这种具有历史意义的事实，本人特报告给中国全体同胞及世界周知。”日本侵占中国台湾省的历史到此结束。"
 news.888.tt:0 "台湾光复"
 news.9.a:0 "也许这能达成一次持久的和平。"
 news.9.b:0 "懦夫们逃走了！"
 news.9.c:0 "只是一次战术撤退。没什么大不了的。"
 news.9.d:0 "[This.GetNewsIcon]随着日本在满洲的部队不断增加，苏联出人意料地让紧紧压在边境线的部队向后撤退。\n\n这很可能是莫斯科希望避免在未来与日本发生冲突，也有可能是因为想起了当年在日俄战争中被日本打败的悲惨记忆。"
 news.9.t:0 "苏联撤退"
 news.9402.d:0 "[This.GetNewsIcon]昨天，一千多名日本皇军士兵发动了一场政变。包括首相在内的几位主要政治家被杀，东京市中心被叛军占领。\n\n作为对政变的回应，天皇决定改组内阁。很多专家表示，这将给叛军一个推翻现政府的重要机会，但没有人确定接下来会发生什么。"
 news.942.a:0 "惨绝人寰。"
 news.942.b:0 "一派胡言！"
 news.942.c:0 "帮助河南民众开展生产救灾活动！"
 news.942.dd:0 "[This.GetNewsIcon]黄河花园口决堤，使豫皖苏三省形成了巨大的黄泛区。加之战乱影响，中国河南地区发生重大饥荒，大早之后又遭遇蝗灾，饥荒遍及全省110个县。灾民只得步行赴邻省逃难，逃荒者又遇日军轰炸，沿途饿死、病死者不计其数，据估计有近300万。"
 news.942.tt:0 "河南大饥荒"
 news.995.a:0 "延安正在与国际接轨。"
 news.995.b:0 "美国人这是不信任我们！"
 news.995.c:0 "必须团结一切参与抗日的力量。"
 news.995.d:0 "[This.GetNewsIcon]全面抗战爆发后，国府表现不尽人意，致使大片国土被占，此事引起了国际社会的关注和不满，美国担心中国正面战场的危机会影响其在太平洋作战的胜利。因此美国更加坚信，仅靠国民政府是无法对抗日本的，要想战胜日本，需要联合中国更多的抗日力量，于是开始了派观察团前往延安准备工作，期间关于使团定名一事还费了不少周折，最后经国、共、美三方协商，使团的名称定为“美军中缅印战区驻延安观察组”，绰号“迪克西使团”。"
 news.995.t:0 "“迪克西使团”访问延安"
 news.996.a:0 "中日战局的变化令人关注"
 news.996.b:0 "一寸山河一寸血！"
 news.996.c:0 "螳臂当车！"
 news.996.dd:0 "[This.GetNewsIcon]日军先后占领了多个大城市，企图进一步打通津浦线，夹击徐州，威胁武汉。徐州会战成为中国军队阻止日军这一战略企图的关键战役，而台儿庄战役则是徐州会战的重要组成部分。日军开始向台儿庄发动进攻，中国军队进行了坚决的抵抗。随着战事的升级，双方的军队投入了大量的兵力，战斗异常激烈。"
 news.996.tt:0 "徐州会战"
 news.997.a:0 "日本大势已去"
 news.997.b:0 "他们不过是负隅顽抗！"
 news.997.c:0 "天皇陛下，万岁！"
 news.997.dd:0 "[This.GetNewsIcon]美军与日军在冲绳岛进行了一场战役，该战役被丘吉尔称为“战争史中最激烈最著名的战役之一。牛岛满奉命防守冲绳岛，抵抗登陆的美军，造成美军和当地居民的重大伤亡。此战役历时3个多月，美军伤亡7.5万人，损失飞机763架，舰艇404艘，坦克372辆；日军伤亡11万人，被俘9000人，损失飞机7830架，舰艇20艘。此外，岛上平民死亡超过10万人，日本将领牛岛满战败自杀。"
 news.997.tt:0 "冲绳岛战役"
 news.998.a:0 "中日战局的变化令人关注"
 news.998.b:0 "一寸山河一寸血！"
 news.998.c:0 "征服支那，指日可待！"
 news.998.dd:0 "[This.GetNewsIcon]中国军队与日军在以长沙为中心的中国第九战区进行了大规模的攻防战，随着战事的升级，双方的军队投入了大量的兵力，战斗异常激烈。"
 news.998.tt:0 "长沙会战"
 news.999.a:0 "沉睡的东方雄狮已经苏醒。"
 news.999.b:0 "世事难料啊！"
 news.999.c:0 "核大国的核讹诈从此结束了！"
 news.999.dd:0 "[This.GetNewsIcon]在中国西部新疆罗布泊，“邱小姐”引爆行动正式开始，巨大的蘑菇云升上了戈壁的天空，染红了整个天际，中国第一颗原子弹爆炸成功。中华人民共和国外交部向外界宣布:“中国已经成为拥核国家。原子弹的成功引爆对中国国防发展具有里程碑式的意义，是反对美帝国主义的斗争中所取得的重大成就。但是中国始终以和平为第一愿景，在任何时候、任何情况下，都不会首先使用核武器。原子弹的成功引爆是中国人民在加强国防力量、反对美帝国主义核讹诈和核威胁政策的斗争中所取得的重大成就。中国发展核武器，是为了防御，是为了保卫中国人民免受大国的核威慑和核讹诈。”最后，中国政府对世界各国发出的倡议：“争取通过国际协商，促进全面禁止和彻底销毁核武器的崇高目标的实现。”"
 news.999.tt:0 "中国原子弹试爆成功"
 no_proper_equipment_design:0 "不正规的装备设计"
 nobusuke_kishi:0 "岸信介"
 nobusuke_kishi_desc:0 "在进入东京帝国大学后，岸信介于1920年进入了商业和工业部。随后，他前往各国考察产业政策，苏联的五年计划给他留下了深刻的印象。\n\n1935年，岸信介被任命为满洲国工业发展部副部长。在完全控制满洲国经济的情况下，他向满洲国提出了自己的五年计划，其雄心勃勃的目标是扩大该地区的重工业和钢铁生产。"
 nobusuke_kishi_return_to_japan.1.d:0 "岸信介被任命为第二届近卫文麿内阁大臣，他将从满洲国退休并返回日本，祝他一路顺风。"
 nobusuke_kishi_return_to_japan.1.t:0 "岸信介归日"
 non_aggression_pact:0 "互不侵犯条约"
 north_america:0 "北美洲"
 northern_expansion:0 "北进论"
 northern_expansion_focus:0 "北进扩张"
 northern_expansion_focus_desc:0 "满洲和西伯利亚是日本的利益范围，日本在这些地区经济和领土扩张的潜在价值高于其他地区。北进论可以帮助日本在远东取得主导地位。"
 nuclear:0 "核科技"
 nukes:0 "原子弹"
 nukes_desc:0 "旨在制造原子弹的工程项目是一国能进行的最艰巨而最隐秘的任务之一。但一旦成功，便可能改变眼下战争进程乃至未来世界走向。"
 offered_support:0 "提供援助"
 officer_purged_jap:0 "清洗军官"
 officer_purged_jap_desc:0 "§C随着时间的推移，这项惩罚会逐渐消失。§!"
 officer_purged_jap_tt:0 "§C随着时间的推移，这项惩罚会逐渐消失。§!\n"
