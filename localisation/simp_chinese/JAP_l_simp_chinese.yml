 specialization_naval:0 "海军工程"
 specialization_nuclear:0 "核研究"
 spirit_of_genghis:0 "成吉思汗的后裔"
 spiritual_mobilization_focus:0 "国民精神总动员"
 spiritual_mobilization_focus_desc:0 "不仅仅是我们的士兵，我们的所有国民都需要在精神上做好战争的准备。为了这个目的，所有的民族主义者都被集中到了国民精神动员大会上来宣扬爱国主义、支持政府。"
 spiritual_mobilization_idea:0 "精神动员"
 spiritual_mobilization_idea_desc:0 "“骄奢淫逸是我们的敌人！”随着节俭、卫生和努力工作被提升为国家美德，使得更多人力能够投入战争中。"
