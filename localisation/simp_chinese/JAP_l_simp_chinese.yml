 seishiro_itagaki:0 "板垣征四郎"
 seishiro_itagaki_desc:0 "作为日俄战争的老兵，板垣在日本驻华大使馆担任武官后，被分配到中国关东军第 33 团指挥。 他后来升任关东军情报处处长，策划了沈阳事变和建立满洲国。"
