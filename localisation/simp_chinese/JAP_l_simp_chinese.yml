 old_figurehead:0 "名誉元老领袖"
 operation_downfall.0.a:0 "让我们做好最坏的打算。"
 operation_downfall.0.b:0 "还是考虑一下其他方案吧。"
 operation_downfall.0.d:0 "目前我军已经控制了硫磺岛和冲绳群岛，这为我们攻打日本本土铺平了道路。日本的部队此时正在从东南亚、太平洋和中国撤退，太平洋战区司令部此时提出了在压倒性规模的海空力量掩护下直接进攻日本本土的作战方案。\n\n然而，即使盟军在这一地区的军力已经远超日本，对于直接进攻日本，在美国陆军和海军中仍然有不少的反对声音。首先是日本本土复杂的地形和密集的城市，难以供机械化部队展开，同时日本在岛上仍然有大量兵力，且战斗意志高昂。根据日本民众的抵抗程度，盟军指挥部估计直接进攻可能造成最多上百万的伤亡。更多来自日本的情报还指出日本大本营已经发布了一道名为决号作战的计划，试图动员所有日本国民来保卫日本列岛，阻挡我们的登陆行动。\n\n§R注意，直接进攻日本的路线包含一部分令人不安的内容，其涉及且不限于平民伤亡，战略轰炸，化学武器，以及诸如神风和回天等自杀式袭击。我必须要强调这些方式都是真实存在过的，而且是非常不人道的做法。我对任何民族都没有敌意，在任何时候我们都应该对战争罪行说不。一旦你选择了这条路线，那就不能更改，日本的无条件投降选项将被禁用。§!"
 operation_downfall.0.t:0 "没落行动"
 operation_downfall.1.a:0 "该死的！"
 operation_downfall.1.d:0 "美国对我们的轰炸和战略封锁已经在国内造成了严重的粮食短缺，为了保证我们的军队和政府能够正常运转，我们需要采取更加严格的食物配给制度。士兵们必须要吃上饭，因此政府鼓励国民为了帝国最终的胜利省下更多的粮食。"
 operation_downfall.1.t:0 "粮食危机"
 operation_downfall_news.0.a:0 "冲啊！"
 operation_downfall_news.0.b:0 "守住滩头！"
 operation_downfall_news.0.c:0 "又要有多少人为之丧命..."
 operation_downfall_news.0.d:0 "昨天，盟军已经启动了没落行动，这将是一场迫使日本投降的大规模登陆作战。该计划准备在第一阶段的奥林匹克行动中夺取九州，再以此为跳板在之后的小王冠行动中夺取本州岛的控制权。\n\n根据前线的报告，目前已经有超过四百艘盟军战舰和登陆舰集结在九州附近的登陆场，在过去的几周，美国陆军航空兵已经对该岛的大部分军事目标进行了不间断的轰炸，但是日本军队仍然在滩头坚守。这次战役也许将会成为人类历史上规模最大的两栖行动。"
 operation_downfall_news.0.t:0 "没落行动"
 operation_downfall_news.1.a:0 "这到底是为什么......"
 operation_downfall_news.1.b:0 "希望这能更快结束战争。"
 operation_downfall_news.1.c:0 "我的天啊......"
 operation_downfall_news.1.d:0 "从昨天开始，美国陆军航空兵就启动了会议室行动，这将是即将到来的没落行动的序曲之一。超过300架战略轰炸机从冲绳机场起飞，对九州和本州岛上的多个重要城市和农业区投下了上千枚凝固汽油弹。根据柯蒂斯·李梅将军的报告，日方的伤亡人数可能在80000到130000之间。日本军部对此发表声明，称美军这一做法是极不人道的。"
 operation_downfall_news.1.t:0 "日本列岛大轰炸"
 operation_downfall_news.2.a:0 "混蛋！"
 operation_downfall_news.2.b:0 "这是必要的恶。"
 operation_downfall_news.2.c:0 "日内瓦公约还有效力吗？"
 operation_downfall_news.2.d:0 "在今天早晨，数百架美国陆军航空兵下属的战略轰炸机像往常一样靠近了日本列岛。但是这一次，它们却没有投下任何燃烧弹，而是喷洒出一些白色的雾状气体。根据日本一些地方政府的报告，在今天的空袭中几乎没有平民死伤，但是越来越多的报道都指向农作物和植物的枯萎，同时有些人产生了恶心和头痛的症状，不免带来了许多紧张的情绪。部分传言声称美国已经开始使用化学武器了。"
 operation_downfall_news.2.t:0 "日本上空的白雾"
