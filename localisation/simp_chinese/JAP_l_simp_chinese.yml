 license_production_speed:0 "$MODIFIER_LICENSE_PRODUCTION_SPEED$"
 light_air:0 "轻型飞机"
 light_aircraft_manufacturer_2:0 "高机动飞机制造商"
 light_cruiser:0 "轻巡洋舰"
 light_cruiser_desc:0 "轻型的屏卫舰。其主要功能是防护己方主力舰只免受敌方轻型军舰的攻击，不过轻巡洋舰同样也可以发射威力强大的鱼雷，足以对更大型的军舰造成伤害。"
 light_fighter:0 "轻型战斗机型号"
 light_mg_2x:0 "2x 轻机枪"
 light_mg_2x_desc:0 "两支步枪口径的机枪对空中目标的火力略有增加，且成本适中。"
 light_ship_engine_4:0 "50000马力引擎"
 light_ship_engine_4_desc:0 "改进后的发动机设计和轮机减速齿轮能让动力设备在重量不变的情况下拥有更高的效率。"
 light_tank_chassis:0 "轻型坦克"
 light_tank_chassis_desc:0 "一款小巧紧凑的底盘，非常适合用于执行侦察和火力支援等任务的轻型车辆。其有限的负载能力使得其不适合携带重型装甲或大型火炮。"
 likes_allies:0 "亲同盟国人士"
