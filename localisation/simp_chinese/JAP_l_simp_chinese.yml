 low_inflation_risk_tt:0 "当§R稳定度低于15%§!时，发生§Y通货膨胀§!。\n"
 low_stake_expanded_tt:0 "起始下注: £pol_power §R-25§![Root.GetStakeLevelCivBet]\n冠军奖励: £pol_power §G+100§![Root.GetStakeLevelExpandedCivChampion] \n第二名奖励: £pol_power §G+75§![Root.GetStakeLevelExpandedCivSecond] \n第三名奖励: £pol_power §G+50§![Root.GetStakeLevelExpandedCivThird] \n第四名奖励: £pol_power §G+25§![Root.GetStakeLevelExpandedCivfourth] \n第五名奖励: £pol_power §Y0§![Root.GetStakeLevelExpandedCivfifth] \n第六名没收: £pol_power §R-25§![Root.GetStakeLevelExpandedCivsixth]"
 low_stake_tt:0 "起始下注: £pol_power §R-25§![Root.GetStakeLevelCivBet]\n冠军奖励: £pol_power §G+75§![Root.GetStakeLevelCivChampion] \n第二名奖励: £pol_power §G+50§![Root.GetStakeLevelCivSecond] \n第三名奖励: £pol_power §G+25§![Root.GetStakeLevelCivThird] \n第四名奖励: £pol_power §Y0§![Root.GetStakeLevelCivfourth]"
 makino_nobuaki:0 "牧野伸显"
 makino_nobuaki_desc:0 "作为日本自由主义运动的早期领导人之一，牧野伸显致力于改善英日和日美关係，并和西园寺公望一同保护天皇免于直接政治参与的努力。\n\n然而，他为维护皇室崇高地位所做的努力使日本国内的极右翼团体成长，并进一步助长了日本国内的军国主义。"
 man_factory1:0 "满洲工厂"
 man_factory1_desc:0 "随着日本适度的工业化，满洲也必须进行工业化。这个地区有相当大的民用工业发展空间。"
 man_integrate_focus:0 "整合满洲"
 man_integrate_focus_desc:0 "我们已采取多项措施促进满洲国的整合。现在是我们将帝国的版图扩大到欧亚大陆的时候了。"
 man_oil_exploration:0 "满洲石油勘探"
 man_oil_exploration_desc:0 "世界各地都发现了石油，但我们的一些敌人似乎垄断了石油。我们应该在满洲进行石油勘探，看我们是否也能幸运地获取这个资源。"
 man_rangribenguizigunchuqu:0 "让日本鬼子滚出去"
 man_soc_tt:0 "在满洲§O宣传社会主义§!将允许劳工运动在那里发起§O罢工§!。一旦罢工发生, 我们可以§O选择与罢工者合作的方式§!来推动我们的事业。"
 man_steel:0 "满洲钢铁生产"
 man_steel_desc:0 "钢铁是战争工作的重要资源。满洲可以帮助我们获得这种资源。"
 man_territorial_extension:0 "领土扩张"
 man_territorial_extension_desc:0 "满洲一直是皇道派的主要关注点，只有将日本适当地扩展到满洲，才能向世界展示我们帝国的荣光。"
 man_unit_731:0 "满树731支队"
 man_unit_731_2:0 "日本关东军防疫给水部"
 man_unit_731_2_desc:0 "如果我们的行动基地被苏联军队攻陷，我们在该设施内的行动必须是秘密的…… \n\n证据将是§R烧焦§! 面目全非。"
 man_unit_731_3:0 "日本关东军驻满洲第731防疫给水部队"
 man_unit_731_3_desc:0 "如果我们的行动基地被苏联军队攻陷，我们在该设施内的行动必须是秘密的…… \n\n证据将是§R烧焦§! 面目全非。"
 man_unit_731_desc:0 "如果我们的行动基地陷落，我们在该设施内的行动必须是秘密的…… \n\n证据将是§R烧焦§! 面目全非。"
 manchu_japan_resource_committee:0 "满洲-日本资源委员会"
 marine:0 "海军陆战队"
 marine_desc:0 "这种配有两栖作战装备的专业部队日益成为军队不可或缺的力量。我们的海军陆战队装备特制的登陆艇并接受专业训练，装具简陋和训练不足已是过去时。"
