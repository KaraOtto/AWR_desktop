 usa_operation_downfall:0 "没落行动"
 usa_operation_downfall_desc:0 "我们要一次性解决日本。"
 usa_pearl_harbour_afterwinds:0 "珍珠港事件的余波"
 usa_pearl_harbour_afterwinds_desc:0 "日本人对珍珠港的袭击出乎了所有人的预料，大量停泊在珍珠港的重型战列舰要么被击沉，要么遭到了严重损毁，可供使用的战舰目前已经寥寥无几，整个太平洋舰队陷入了一片混乱之中。我们需要一定的时间来处理这些令人头疼的麻烦。"
 usa_ph_morale_crushed:0 "西海岸陷入恐慌"
 usa_ph_morale_crushed_desc:0 "珍珠港被彻底破坏了，恐慌情绪在西海岸的美国民众当中蔓延。"
 usa_ph_national_wrath:0 "国民怒火"
 usa_ph_national_wrath_desc:0 "在我们的战舰驶入东京湾前，与日本没有和平二字可言。"
 usa_ph_oil_depot_destroyed:0 "失去海军油库"
 usa_ph_oil_depot_destroyed_desc:0 "我们失去了夏威夷的海军油库，舰队不得不撤退到西海岸修整。"
 usa_ph_shocking:0 "国耻日"
 usa_ph_shocking_desc:0 "昨天，将是我们的国耻之日，美利坚合众国受到了日本帝国海空力量突然和蓄意的攻击......"
 usa_qingdao_happy:0 "§Y§Y美国将进一步加大对我们的援助力度§!§!"
