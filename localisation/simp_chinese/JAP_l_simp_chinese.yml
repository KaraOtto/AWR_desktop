 rcmjapan_christian_state.1.a:0 "太好了！阿门！"
 rcmjapan_christian_state.1.d:0 "我们在[From.From.GetName]组织起的研讨会已经获得了压倒性的支持！许多人开始对福音和传教感兴趣，信仰的钟声正在[From.From.GetName]远播"
 rcmjapan_christian_state.1.t:0 "在[From.From.GetName]有很大的宗教研讨会支持度!"
 rcmjapan_christian_state.2.a:0 "至少我们没被迫害。"
 rcmjapan_christian_state.2.d:0 "尽管我们尽了最大的努力，[From.From.GetName] 的人们似乎对福音和基督的好消息表现出不多的兴趣。 愿主怜悯这些灵魂，愿他们早日转向上帝寻求拯救。"
 rcmjapan_christian_state.2.t:0 "[From.From.GetName] 对支持宗教研讨会的兴趣缺缺"
 rcmjapan_christian_state.3.a:0 "平定这些暴徒！"
 rcmjapan_christian_state.3.b:0 "我们会考虑一下。"
 rcmjapan_christian_state.3.d:0 "[From.From.GetName] 中教条主义的神道教偶像崇拜者破坏了我们预定的研讨会场地，如果我们继续在他们附近讲道，他们还威胁要反抗。 我们居住在 [From.From.GetName] 的许多同胞现在担心会受到进一步的迫害。 这是完全不能接受的！ 我们应该怎么做？"
 rcmjapan_christian_state.3.t:0 "在[From.From.GetName]的反基督教声浪"
 rcmjapan_christian_state.4.a:0 "很好！"
 rcmjapan_christian_state.4.d:0 "在我们的执法人员抵达 [From.From.GetName] 与反基督教抗议者对峙后，抗议者因震惊而散去。 我们将再次在这里重新开始我们的推广。"
 rcmjapan_christian_state.4.t:0 "[pacify_christian_state.GetName] 的反基督教抗议活动平息"
 rcmjapan_christian_state.5.a:0 "我们下次会得到他们的。"
 rcmjapan_christian_state.5.d:0 "即使面对武力，[From.From.GetName]的暴徒仍然充满仇恨和极端民族主义情绪，拒绝接受附近任何其他宗教的存在。 这里需要更多的解决工作。"
 rcmjapan_christian_state.5.t:0 "[pacify_christian_state.GetName] 中的反基督教抗议仍在继续"
 rcmjapan_christian_state.6.a:0 "上天保佑。"
 rcmjapan_christian_state.6.d:0 "由于 [From.From.GetName] 持续的反基督教骚乱，据报导，今天我们居住在 [From.From.GetName] 的几个心爱的弟兄被活跃在那里的神道教暴徒抢劫和打伤。 这是一种耻辱，我们应该尽快处理这些极端分子。"
 rcmjapan_christian_state.6.t:0 "[From.From.GetName] 的基督徒受到迫害！"
 rcmjapan_defeated.1.a:0 "该死……"
 rcmjapan_defeated.1.d:0 "由于在中国大陆的军事行动遭受大规模的失败，不信任投票被发起。现任内阁将解散，新的内阁将筹措组建。"
 rcmjapan_defeated.1.t:0 "就于中国战场的失败动议不信任投票"
 rcmjapan_defeated.233.a:0 "我们将组建皇族内阁。"
 rcmjapan_defeated.233.b:0 "铃木贯太郎不会辞职。"
 rcmjapan_defeated.233.d:0 "铃木贯太郎内阁因为了结束战争“两次麻烦天皇陛下圣断”而总辞职。谁来收拾残局成了问题，让数百万皇国军队听从号令绝非易事。木户幸一与重臣们商议后认为东久迩宫是最合适的人选。主要由于他的皇族地位和陆军大将衔，能够控制住目前的局势。"
 rcmjapan_defeated.233.t:0 "铃木内阁总辞职"
 rcmjapan_defeated_conference.1.a:0 "只能这么做了。"
 rcmjapan_defeated_conference.1.d:0 "日本在对抗盟军的战争中战败了。我们必须做点什么——比如谴责我们之前那所谓的为保护国家完整而对其他国家宣战的行为。"
 rcmjapan_defeated_conference.1.t:0 "日本战败"
 rcmjapan_defeated_conference.2.a:0 "我们将重生！"
 rcmjapan_defeated_conference.2.d:0 "日本在对抗盟军的战争中失败了。我们应该利用印度支那好好度过这段艰难的时刻。"
 rcmjapan_defeated_conference.2.t:0 "印度支那地区"
 rcmjapan_defeated_conference.3.a:0 "中国人民万岁！"
 rcmjapan_defeated_conference.3.d:0 "日本被盟军打败了！这对中国而言，是一个伟大的日子！"
 rcmjapan_defeated_conference.3.t:0 "成功战胜了日本！"
 rcmjapan_defeated_conference.4.a:0 "行动吧！"
 rcmjapan_defeated_conference.4.d:0 "日本投降后，日军和许多日本平民仍滞留在原沦陷区，需要解除武装并遣返。 但国民政府缺乏人力、资源或运输工具来一次性解除全日军的武装。 他们担心北方的共产党军队能够在国民党到来之前到达并解除大量日军的武装。 因此，[Root.GetLeader]派遣了超过5万名[Root.GetAdjective]海军陆战队和一支舰队前往华北，接受日本投降的命令，并将他们遣返，以帮助国民党重新控制以前被日本占领的地区。"
 rcmjapan_defeated_conference.4.t:0 "围攻者行动"
 rcmjapan_defeated_conference.5.a:0 "青岛将仍是我方海军基地。"
 rcmjapan_defeated_conference.5.b:0 "我们将撤回所有华北部队。"
 rcmjapan_defeated_conference.5.d:0 "国民党已在华北确立了其地位，不再需要我们的占领军支持，我军将从中国撤退。 然而，军方建议我们在华北保留一个基地，以与苏联抗衡。"
 rcmjapan_defeated_conference.5.t:0 "围攻者行动结束"
 rcmjapan_defeated_conference.6.a:0 "感谢美利坚友邦的协助！"
 rcmjapan_defeated_conference.6.b:0 "可恶的美帝！"
 rcmjapan_defeated_conference.6.d:0 "[FROM.GetAdjective]政府决定从华北撤退，其占领区将移交给[WTT_current_china_leader.GetLeader]。"
 rcmjapan_defeated_conference.6.t:0 "[FROM.GetNameDef]从华北撤离"
 rcmjapan_defeated_conference.7.a:0 "这些帝国主义者！"
 rcmjapan_defeated_conference.7.d:0 "[FROM.GetAdjective]政府决定从华北撤退，其占领区将移交给[WTT_current_china_leader.GetLeader]。"
 rcmjapan_defeated_conference.7.t:0 "[FROM.GetNameDef]从华北撤离"
 rcmjapan_defeated_conference.8.a:0 "没更好的选项了。"
 rcmjapan_defeated_conference.8.d:0 "最近，中共从[WTT_current_china_leader.GetName]手中夺取了许多城市，包括[WTT_current_china_leader.GetName]的首都以及青岛周边地区。 为了避免与中国共产党发生潜在的冲突，我们将不得不从这个地区撤退。"
 rcmjapan_defeated_conference.8.t:0 "从青岛撤退"
 rcmjapan_defeated_conference.9.a:0 "明白。"
 rcmjapan_defeated_conference.9.b:0 "懦夫！"
 rcmjapan_defeated_conference.9.d:0 "由于许多城市已被中共占领，包括[WTT_current_china_leader.GetName]的首都以及青岛周边地区。 [FROM.GetNameDef] 将不得不从该地区撤退，以避免与中国共产党发生潜在冲突。"
 rcmjapan_defeated_conference.9.t:0 "[FROM.GetNameDef]从青岛撤退"
 rcmjapan_expand_revo.39.a:0 "该死的共产主义者！"
 rcmjapan_expand_revo.39.d:0 "[From.GetName]正在渗透我们的政府并组织针对我们的颠覆活动。一旦我们的共产党支持率过高，他们就很容易发动政变。"
 rcmjapan_expand_revo.39.t:0 "[From.GetName]正在渗透我们的政府！"
 rcmjapan_expand_revo.40.a:0 "我们会战斗下去！"
 rcmjapan_expand_revo.40.d:0 "由于我们的错误和疏忽，共产党设法获得了相当程度的支持。就在今天早上，一场旨在推翻我们的政变上演了。总部被包围了，他们冲了进来。我们的领导地位即将结束。"
 rcmjapan_expand_revo.40.t:0 "共产主义政变"
 rcmjapan_expand_revo.41.a:0 "好极了。"
 rcmjapan_expand_revo.41.b:0 "让我们清理这些渣渣。"
 rcmjapan_expand_revo.41.d:0 "[From.GetName]人民已经有足够的力量推翻现任政府，现在他们将加入我们。"
 rcmjapan_expand_revo.41.t:0 "[From.GetName]政变"
 rcmjapan_form_puppets_continue.1.a:0 "我们应该尽快建立一个代理政府"
 rcmjapan_form_puppets_continue.1.d:0 "我们在上海的统治仍然很不受欢迎，除非我们及时建立一个代理政府，否则结局会很糟糕。"
 rcmjapan_form_puppets_continue.1.t:0 "上海危机仍在持续"
 rcmjapan_form_puppets_continue.2.a:0 "我们应该尽快建立一个代理政府"
 rcmjapan_form_puppets_continue.2.d:0 "我们在南京的统治仍然很不受欢迎，除非我们及时建立一个代理政府，否则结局会很糟糕。"
 rcmjapan_form_puppets_continue.2.t:0 "南京危机仍在持续"
 rcmjapan_form_puppets_continue.3.a:0 "我们应该尽快建立一个代理政府"
 rcmjapan_form_puppets_continue.3.d:0 "我们在中国的统治仍然很不受欢迎，除非我们及时建立一个代理政府，否则结局会很糟糕。"
 rcmjapan_form_puppets_continue.3.t:0 "华北危机仍在持续"
 rcmjapan_form_puppets_continue.4.a:0 "我们应该尽快建立一个代理政府"
 rcmjapan_form_puppets_continue.4.d:0 "我们在中国的统治仍然很不稳定，除非我们及时建立一个代理政府，否则结局会很糟糕。"
 rcmjapan_form_puppets_continue.4.t:0 "傀儡政府仍然很不稳定"
 rcmjapan_form_puppets_continue.5.a:0 "我们应该尽快建立一个代理政府"
 rcmjapan_form_puppets_continue.5.d:0 "在接管了南察哈尔和晋北的几个地区之后，蒙古人现在要求他们的政府兼并这些土地。如果不及时这样做，就会破坏我们的规则。"
 rcmjapan_form_puppets_continue.5.t:0 "蒙古人再次要求兼并土地"
 rcmjapan_form_puppets_continue.6.a:0 "我们应该尽快建立一个代理政府"
 rcmjapan_form_puppets_continue.6.d:0 "战争爆发后，蒙古代理政府遭受了陈旧政治框架的无效官僚主义之苦。是时候举行另一次“蒙古人大会”了。"
 rcmjapan_form_puppets_continue.6.t:0 "蒙古人再次要求召开另一场大会"
