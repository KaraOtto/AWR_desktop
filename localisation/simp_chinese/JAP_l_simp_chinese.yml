 pearl.1.d:0 "[This.GetNewsIcon]“昨日，1941年12月7日，美利坚合众国遭到了日本帝国海空军预谋的突然袭击。”\n.......\n“战争业已存在。谁也不能否认，我国人民、我国领土和我国利益正处于极度危险之中。”\n“我们信赖我们的武装力量，依靠我国人民的无比坚强的决心，我们必将取得胜利。愿上帝保佑我们。”\n                             -富兰克林·D·罗斯福的“国耻日演说”\n"
 pearl.1.option1:0 "愿上帝保佑我们......"
 pearl.1.option2:0 "虎！虎！虎！"
 pearl.1.option3:0 "终于，我们不再是孤军奋战！"
 pearl.1.option4:0 "他们惊醒了沉睡的巨人......"
 pearl.1.t:0 "珍珠港遭受攻击"
 pearl.2.d:0 "[This.GetNewsIcon]我方联合舰队袭击了珍珠港，我们击沉了4艘美国战列舰，短时间内，他们将无法阻止我们的大东亚战争（太平洋战争）。"
