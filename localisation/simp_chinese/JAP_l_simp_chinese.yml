l_simp_chinese:
 AND:0 "和 "
 AST:0 "澳大利亚"
 AST_citizen_military_forces:0 "民间军事力量"
 AST_citizen_military_forces_desc:0 "现在应准备预备军力以防战争。我军将征召民兵到正规部队负责本土防卫，并让他们准备好在必要时征战海外。"
 August:0 "8月"
 BBQ_qinshan:0 "菲律宾第二共和国"
 BRA:0 "巴西"
 BUL:0 "保加利亚"
 BUL_army_restrictions:0 "军备限制"
 BUL_army_restrictions_desc:0 "讷伊条约所带来的另一个后果便是对我国武装力量的严格限制，我们不仅被禁止实行义务兵役制度，同时在部队士兵以及军官人数上也遭到了限制。此外，我们禁止拥有任何先进装备，同样也禁止举行任何军事演习亦或是制定作战计划，甚至连我军的步枪持有数量也被遭到限制。"
 BUR_qinshan:0 "缅甸国"
 Ba_Haw:0 "巴莫"
 Back_lash_active:0 "§R反基督教声浪§! 在这个省分会很活跃，不能在这里组织研讨会，且基督徒在这里会受到迫害。"
 CAM:0 "柬埔寨"
 CAN:0 "加拿大"
 CAN_commit_to_the_war:0 "承诺战争"
 CAN_commit_to_the_war_desc:0 "世界正在燃烧着战火，加拿大可以有着重要的角色。我们发誓要保护民主和英国生存的道路。"
 CHI:0 "中国"
 CHI_Faction_Research_tt:0 "我们将加入§Y阵营研究§!。"
 CHI_JAP_COMM_YES:0 "中国人接受了我们的协议"
 CHI_JAP_COMM_YES_tt:0 "日本共产党与我们达成了协议。"
 CHI_accept_san_hiro:0 "中国接受“广田三原则”"
 CHI_chiang_kai_shek:0 "蒋中正"
 CHI_chiang_kai_shek_desc:0 "§Y生卒年：§L\n生于：1887年10月31日 浙江溪口\n卒于：1975年4月5日 台湾台北\n§Y母校：§L\n通国速成学堂\n东京振武学校\n§Y军阶：§L\n1935年4月1日 特级上将\n§Y军旅生涯：§L\n1925-1927 第一军军长\n1926-1929 北伐军总司令\n1932-1946 军事委员会委员长\n1932-1935 参谋总长\n1937 第一战区司令长官\n1937~1938 第三战区司令长官\n1938 第八战区司令长官"
 CHI_claire_chennault:0 "克莱尔·李·陈纳德"
 CHI_coast_focus_idea:0 "侧重于海岸防御的空军"
 CHI_coast_focus_idea_desc:0 "中国空军专注于在沿海拦截敌机。"
 CHI_communism_party_POW:0 "中华民族解放行动委员会"
 CHI_communism_party_POW_long:0 "中华民族解放行动委员会"
 CHI_democratic_party:0 "中国国家社会党"
 CHI_democratic_party_long:0 "中国国家社会党"
 CHI_fractured_administration_idea:0 "破碎的政府"
 CHI_fractured_administration_idea_desc:0 "由于民国年幼，大多数行政政府机构还不够成熟，无法有效运作，而且由于国内问题和军阀割据的悬而未决，整体上处于分裂状态。 需要进行行政改革才能摆脱这种困境。"
 CHI_german_coop:0 "中德合作"
 CHI_german_coop_desc:0 "德国和中国更紧密地合作，在经济和军事上相互帮助。\n§W--------------§!\n§G提高德国提供许可证生产的意愿。§!"
 CHI_german_style_training_idea:0 "德式训练"
 CHI_gregory_thor:0 "格雷戈里·托尔"
 CHI_hyper_inflation_3:0 "重度通货膨胀"
 CHI_hyper_inflation_3_desc:0 "政府发行的货币正不断贬值，购买力持续下降，如今部分商品甚至只有关系户才能购买。"
 CHI_hyper_inflation_4:0 "恶性通货膨胀"
 CHI_hyper_inflation_4_desc:0 "我国货币的价值正急速蒸发，物价每日持续飞涨，在事态彻底崩溃前，我们必须采取紧急措施加以应对。"
 CHI_hyper_inflation_5:0 "经济崩溃"
 CHI_hyper_inflation_5_desc:0 "我国的货币体系已彻底崩溃，在全国大部分地区，贸易已经回到了以物易物的水平。贫困无处不在，政府职员甚至把支付给他们的纸币当柴火烧。为了扭转局面，一场彻底的金融以及经济改革势在必行。"
 CHI_illegal_regime:0 "非法政权"
 CHI_incompetent_officers:0 "低能的军官团"
 CHI_incompetent_officers_desc:0 "军官们尚不能胜任指挥现代战争的职责。在他们赶上国外同行的水平前，急需进行刻苦的学习。培训军官将成为军队改革当中十分关键的项目。"
 CHI_labor_reform:0 "劳动改革"
 CHI_labor_reform_desc:0 "传统的劳作方式和制度已经在中国传承了上千年，现在是时候将其推向现代化了。"
 CHI_long_term_economic_planning:0 "长远经济规划"
 CHI_long_term_economic_planning_desc:0 "由于我们的官僚机构并没有中央政府那般庞大，这使得我们可以精简冗余的机构并专注于实现最大的收益回报。"
 CHI_n_socialism_cdl:0 "中国民主同盟"
 CHI_n_socialism_cdl_long:0 "中国民主同盟"
 CHI_n_socialism_party:0 "第三党"
 CHI_n_socialism_party_long:0 "中华民族解放行动委员会"
 CHI_neutrality_party:0 "中国国民党"
 CHI_neutrality_party_long:0 "中国国民党"
 CHI_opposition:0 "谋逆枭雄"
 CHI_opposition_desc:0 "中央政府腐败软弱，共产党则试图颠覆中华民族五千年的悠久历史，在这种情况下，我们需要一位愿意作出艰难抉择并通过任何必要的手段来统一国家的伟大领袖。"
 CHI_pavel_rychagov:0 "帕维尔·雷恰戈夫"
 CHI_pavel_zhigarev:0 "帕维尔·日加列夫"
 CHI_petr_anisimov:0 "彼得·阿尼希莫夫"
 CHI_prc_pact:0 "第二次统一战线"
 CHI_public_works:0 "公共建设"
 CHI_public_works_desc:0 "民众必须要看到我们为其福祉而作出的努力，相信几个备受关注的项目便能够成为有效的宣传工具，并让他们浅尝到中国能够拥有的未来——只要他们继续支持我们的话。"
 CHI_sino_jap_war_hold_shanghai:0 "淞沪会战"
 CHI_sov_pact_focus:0 "中苏互不侵犯条约"
 CHI_sov_pact_focus_desc:0 "苏联正受到法西斯势力的威胁，我们也一样。为了打败自由工人天堂的敌人，我们一起共同合作似乎是顺理成章的。"
 CHI_wang:0 "中华民国"
 CHI_war_taxes:0 "战争税"
 CHI_war_taxes_desc:0 "危机年代需采取特殊的手段，在战火正酣的当下，我们必须尽可能地征集民众所有的收入和资源。"
 CHI_warlord_leader_communism:0 "中华民国"
 CZP:0 "柬埔寨王国"
 Chen_Gongbo:0 "陈公博"
 Demchugdongrub_new_leader:0 "\n§Y德穆楚克栋鲁普亲王b§!将成为[Root.GetName]新的领导人。"
 ECA_Autonomous_Government_party:0 "自治政府"
 ECA_Autonomous_Government_party_long:0 "联合自治政府"
 ECA_MAF_fascism:0 "蒙古自治邦"
 ECA_MAF_reform:0 "@ECA §Y[ECA.GetNameDef]§!将被称为§Y蒙古自治联合会§!。\n"
 EFM_Manchukuo.10.a:0 "唉！"
 EFM_Manchukuo.10.d:0 "经过几个月的日本帝国陆军反对我们自治的运动，他们那可疑的计划已经结出硕果。他们现在迫使我们签署吞并满洲的宣言。我们的帝国终结了。"
 EFM_Manchukuo.10.t:0 "日本吞并我们"
 EFM_Manchukuo.9.a:0 "令人关注。"
 EFM_Manchukuo.9.d:0 "日本帝国陆军在对台湾和韩国施加了强大的殖民影响后，现在已把目光投向了我们。他们现在正在发起一场全面的运动来降低我们的自治度，这令人担忧。"
 EFM_Manchukuo.9.t:0 "日本选择了整合满洲的政策"
 EHB_qiulongzhengce:0 "治安肃正计划"
 EHB_qiulongzhengce_desc:0 "§L日本人提出封锁共匪军的治安肃正计划，我们不得不强征壮丁去修筑碉堡、炮楼，这无疑会消耗我们的大量人力。§!"
 EHB_qiyi:0 "中华民国救国军"
 EHB_xiawenyun_desc:0 "§L夏文运(1906—1978)，字承尧，化名何益之，出生于金州老虎山会大朱家屯（今大连市金州区七顶山满族乡大朱家屯）。1932年3月于日本京都帝国大学文学部毕业后回到大连，同年担任侵华日军参谋部第二课课长和知鹰二的随身翻译。之后为李宗仁所劝，成为秘密情报人员，刺探日方机密，助力中国军队取得台儿庄战役的重大胜利。夏文运提供的情报在价值及迅速、准确方面在抗战初期“是独一无二”，对抗战之功实不可没。曾任伪《新民报》社社长、伪山西省政府建设厅厅长。§!"
 EHB_zizhi:0 "形同虚设的附庸"
 EHB_zizhi_desc:0 "§L我们只是名义上属于汪精卫的政府，实际上政府几乎完全独立。§!"
 ENG:0 "英国"
 ENG_cannot_increase_conscription_law:0 "向工会承诺不会扩大征兵。\n"
 ENG_concessions_to_the_trade_unions:0 "向工会妥协"
 ENG_concessions_to_the_trade_unions_desc:0 "我们重整军备的努力不断受到与工会冲突的影响。如果我们选择与他们合作而不是继续同他们斗争，我们可能会有一个更平稳的过渡。"
 ETR:0 "东突厥斯坦共和国"
 Emperor_Hirohito:0 "裕仁天皇"
 Emperor_Yasuhito:0 "雍仁天皇"
 FIC_friendly_invasion:0 "“友好”入侵"
 FIC_friendly_invasion_desc:0 "由于德意志国和日本最近签署的三国同盟条约，日本帝国应该成为我们的朋友而不是敌人。然而，他们现在正利用这一事实来对付我们，并准备对印度支那半岛发动攻击。尽管我们效忠于它的盟友德国，但如果日本人对印度支那发动进攻，德国很可能根本不在乎。"
 FOCUS_FILTER_RESEARCH:0 "科研"
 FRA:0 "法国"
 FRA_factory_strikes:0 "工厂罢工"
 FRA_scw_intervention_republicans_focus:0 "干涉西班牙内战"
 GAME_OVER_TT:0 "§R对你来说游戏已经结束了§!"
 GER:0 "德国"
 GER_ally_chiang_kai_shek:0 "与蒋介石结盟"
 GER_ally_chiang_kai_shek_desc:0 "我们目前在东亚的行动不仅仅对我们有利。通过与[CHI.GetNameDef]的[CHI.GetLeader]结盟，并使他与我们结盟，我们可以扩大我们的势力范围，并促进该地区的殖民扩张。"
 GER_fascism:0 "德意志第三帝国"
 GER_haijunyuanshuai:0 "海军元帅"
 GER_joseph_goebbels:0 "$joseph_goebbels$"
 GER_mol_rib_pact:0 "莫洛托夫 - 里宾特洛甫条约"
 GER_mol_rib_pact_desc:0 "虽然与[GER.GetTheUSSRName]签订友好与互不侵犯条约令人反胃，但这样也可以使其宝贵的石油能够源源不断地流入德国。两国将签订一个秘密协议，把罗马尼亚、波兰、立陶宛、拉脱维亚、爱沙尼亚和芬兰的领土分别划分进[GER.GetAdjective]和[SOV.GetAdjective]的势力范围……"
 GER_wuxuzaiyi:0 "无需在意"
 GSM:0 "甘肃马家军"
 GUM:0 "马里亚纳群岛"
 GXC:0 "桂系"
 HOL:0 "荷兰"
 HUA:0 "华北政务委员会"
 HUN:0 "匈牙利"
 HUN_treaty_of_triannon:0 "《特里亚农条约》"
 HUN_treaty_of_triannon_desc:0 "《特里亚农条约》在许多方面都与《凡尔赛和约》近似，它不仅削弱了我国的军事力量，同时也严格限制我国对军备的重整。对其进行修订亦或者直接将其废除，显然是我们的首要目标。为达成这一目标，我们可以在同小协约国和解、提出《布莱德协议》亦或是直接撕毁条约几个选项当中作出选择。其中，撕毁条约被广泛认为是激进之举，并很有可能引发严重的后果。"
 Hirohito:0 "裕仁"
 INS:0 "印度尼西亚"
 INS_kuilei:0 "印度尼西亚"
 IRQ:0 "伊拉克"
 ITA:0 "意大利"
 ITA_fascism:0 "意大利王国"
 JAP:0 "日本"
 JAPCHI_duli:0 "昏昏浊世吾独立"
 JAPCHI_duli_desc:0 "早在我们打出直线救国方针的时候，夏文运就已经秘密组建了“中华民国光复委员会”，准备有朝一日反抗日本帝国，武力反日建国刻不容缓，现在这一天终于到来了，政府不会再做日本人的走狗了，我们已经和抗日民族统一战线取得联系，一起里应外合把日本人赶出去，夏文运将成为新政府的领袖，我命不由天！"
 JAPCHI_duoquejungongchang:0 "夺取日本军工厂"
 JAPCHI_duoquejungongchang_desc:0 "日本人在我们的国土上投资了许多军工厂，这些工厂本来就应该是属于我们的！政府将派遣和平建国军武力接管这些工厂，虽然这样会引起日本政府的不满，但谁又会在乎呢？"
 JAPCHI_ribenzhuangbei:0 "偷取日军装备"
 JAPCHI_ribenzhuangbei_desc:0 "日本人的军工厂和军营里的装备数不胜数，就算偶尔丢一两个应该也不会引起他们的吧？"
 JAPCHI_zhixianjiuguo:0 "直线救国"
 JAPCHI_zhixianjiuguo_desc:0 "汪主席的曲线救国策略终究是行不通的，听说日本人的随军翻译夏文运已经秘密与李宗仁建立关系，也许我们可以听听他的建议？"
 JAP_Chinese_revolution_focus:0 "中国革命"
 JAP_Chinese_revolution_focus_desc:0 "一旦我们准备好了，革命就会在中国取得胜利！"
 JAP_Constitutional_Reform_focus:0 "复兴条约派"
 JAP_Constitutional_Reform_focus_desc:0 "现在冈田领导层的影响力和支持终于得到加强，我们现在应该计划复兴“条约派”，这是一个主要由温和派民主支持者组成的政治团体。只有这样，我们才能为未来重建一个正常运作的文职政府铺平道路。但首先我们要开除那些可能会损害我们事业的人。"
 JAP_Economic_priority:0 "经济建设优先"
 JAP_Economic_priority_desc:0 "在对世界重申日本不干涉主义之后，我们的社会主义经济建设是很重要的"
 JAP_Hull_Nomura_Pact_focus:0 "赫尔—野村条约"
 JAP_Hull_Nomura_Pact_focus_desc:0 "日本外相野村吉三郎和美国国务卿科德尔·赫尔将安排一次会谈，讨论美国与日本帝国之间的互不侵犯条约。只有这样才能避免日本和美国之间爆发全面战争。"
 JAP_Indian_National_Army_arrives:0 "印度国民军的两个师已到达新加坡。"
 JAP_JCA_party:0 "日本殖民政府"
 JAP_JCA_party_long:0 "日本殖民政府"
 JAP_JPSA_party:0 "日本人民政府"
 JAP_JPSA_party_long:0 "日本人民政府"
 JAP_Japan_soviet_exchange_group:0 "日苏技术交流"
 JAP_Japan_soviet_exchange_group_desc:0 "我们应该开始向苏联展开科技与技术的合作"
 JAP_Japans_lifeline_focus:0 "日本生命线"
 JAP_Japans_lifeline_focus_desc:0 "满洲是日本抵御任何外来威胁的唯一生命线，我们最好好好照顾它，否则我们的帝国可能会处于危险之中。"
 JAP_Join_Axis_focus:0 "倾向轴心国"
 JAP_Join_Axis_focus_desc:0 "随着欧洲国家社会主义者的战争愈演愈烈，我们应该考虑加入他们，收穫一些战争的战利品。"
 JAP_Liberate_south:0 "南洋解放者"
 JAP_Liberate_south_desc:0 "在处理掉帝国殖民主义以后，解决帝国主义对东南亚的野蛮殖民成为了我们下个目标。我们在东南亚的同胞们正处于被邪恶殖民者压迫、压榨的情形中，我们必须让从东京席捲至东亚的赤风也横扫东南亚。"
 JAP_Non_interventionism:0 "日本再锁国"
 JAP_Non_interventionism_desc:0 "在这个动盪的时代，以革命精神为领导的锁国政策会是最好的选择"
 JAP_Release_Kyuichi_Tokuda_focus:0 "释放德田球一"
 JAP_Release_Kyuichi_Tokuda_focus_desc:0 "也许释放德田球一会改善政府在公众心目中的形象以及调整好我们自己政策，因为我们进一步向左靠拢，获得了我们治下的朝鲜人和中国人的支持，有利于终结我们的帝制。"
 JAP_SOV_border_nuomenhan.1.a:0 "我们应当请求苏联的介入"
 JAP_SOV_border_nuomenhan.1.b:0 "是谁给他们的胆子？"
 JAP_SOV_border_nuomenhan.1.desc:0 "我国边防军日前于满蒙边境线上的诺门罕地区同日军士兵爆发了冲突，而根据从日本方面探得的情报显示，这很可能是大规模冲突的先声。我们应该立即强化同日本边境的戒备。"
 JAP_SOV_border_nuomenhan.1.t:0 "日本军队正在向满蒙边境集结"
 JAP_SOV_border_nuomenhan.111.a:0 "是谁给他们的胆子？"
 JAP_SOV_border_nuomenhan.111.desc:0 "蒙古边防军日前于满蒙边境线上的诺门罕地区同日军士兵爆发了冲突，而根据从日本方面探得的情报显示，这很可能是大规模冲突的先声。我们应该立即强化同日本边境的戒备。"
 JAP_SOV_border_nuomenhan.111.t:0 "蒙古人民共和国请求我国介入满蒙边境冲突"
 JAP_SOV_border_nuomenhan.2.a:0 "天皇陛下万岁！"
 JAP_SOV_border_nuomenhan.2.b:0 "他们不会得意太久的！"
 JAP_SOV_border_nuomenhan.2.c:0 "一九零五年的耻辱回忆再度上演"
 JAP_SOV_border_nuomenhan.2.desc:0 "[This.GetNewsIcon]近日日本陆军与苏蒙联军在满蒙边境线上的诺门罕地区爆发的局部冲突落下了帷幕，苏蒙联军据说目前已经全线撤退。在占据了地区周遭若干颇具战略地位的山头后，日军现已开始构筑阵地，巩固现有的态势。\n\n战斗当中，日军还缴获了若干[SOV.GetAdjective]的坦克，后者现已被运往东京，以展开进一步的测试和评估。"
 JAP_SOV_border_nuomenhan.2.t:0 "日本军队赢得了诺门罕之战"
 JAP_SOV_border_nuomenhan.21.t:0 "日本军队赢得了诺门罕之战"
 JAP_SOV_border_nuomenhan.222.a:0 "北国风光无限好,反修战士斗志高！"
 JAP_SOV_border_nuomenhan.222.b:0 "中国是入侵行为,在边境加强兵力。"
 JAP_SOV_border_nuomenhan.222.c:0 "苏联折戟珍宝岛。"
 JAP_SOV_border_nuomenhan.222.desc:0 "[This.GetNewsIcon]苏联边防军侵入珍宝岛，袭击中国边防部队巡逻人员，打死打伤6人。中国边防部队被迫自卫反击，将入侵的苏军逐出珍宝岛。次日，苏联边防军3次出动向守卫珍宝岛的中国边防分队发起猛烈进攻，并用多种火炮轰击中国境内纵深地区。中国边防部队激战近9小时，顶住了苏联边防军的6次炮火急袭，挫败了进攻。两日后，苏联边防军又出动步兵，在坦克支援下入侵珍宝岛。中国边防部队以炮火将其击退。\n\n此次战役最终以中国边防部队坚守珍宝岛、捍卫领土主权告终，战斗中中国边防部队成功击毁并缴获苏军1辆T-62主战坦克。"
 JAP_SOV_border_nuomenhan.222.t:0 "中国军队赢得了珍宝岛战役"
 JAP_SOV_border_nuomenhan.3.a:0 "光荣战败总胜过怯懦避战"
 JAP_SOV_border_nuomenhan.3.b:0 "我军此战表现出色"
 JAP_SOV_border_nuomenhan.3.c:0 "苏联已是今非昔比"
 JAP_SOV_border_nuomenhan.3.d:0 "大快人心！"
 JAP_SOV_border_nuomenhan.3.desc:0 "[This.GetNewsIcon]近日日本陆军与苏蒙联军在满蒙边境线上的诺门罕地区爆发的局部冲突落下了帷幕，日本驻苏联大使东乡茂德已经与苏联外交部长莫洛托夫签订了诺门罕停战协定。\n\n战斗当中，日军数次对苏蒙联军阵地的猛攻均以伤亡惨烈的失败告终。此役，苏蒙联军重创日军第23师团搜索队，全歼第7师团第26联队第1大队，日军第64联队和炮兵第13联队被苏蒙联军大部歼灭，第64联队长山县武光大佐和炮兵第13联队长伊势高秀大佐均被击毙，23师团第71联队长森田彻大佐亦被击毙，日军兵力的总体损失预计至少在一万人以上。这不由得引起了日军大本营对陆军战斗力的担忧，一贯主张“北进论”进攻苏联的日本陆军很有可能就此改变他们不切实际的想法。"
 JAP_SOV_border_nuomenhan.3.t:0 "苏蒙联军赢得了诺门罕之战"
 JAP_SOV_border_nuomenhan.31.t:0 "苏蒙联军赢得了诺门罕之战"
 JAP_SOV_border_nuomenhan.4.a:0 "我们至少得到了宝贵的经验"
 JAP_SOV_border_nuomenhan.4.b:0 "我们至少得到了宝贵的经验"
 JAP_SOV_border_nuomenhan.4.c:0 "日本人不容小觑"
 JAP_SOV_border_nuomenhan.4.desc:0 "[This.GetNewsIcon]在双方均撤出争议地段以重新补给和集结后，日本和苏蒙联军围绕着诺门罕地区所爆发的边境冲突暂且偃旗息鼓。也许是意识到继续进攻亦无济于事，日本军方现已要求停火谈判，以期恢复边境态势。"
 JAP_SOV_border_nuomenhan.4.t:0 "诺门罕之战陷入僵局"
 JAP_SOV_border_nuomenhan.41.t:0 "诺门罕之战陷入僵局"
 JAP_SOV_border_nuomenhan_win:0 "在诺门罕战役中击败苏联"
 JAP_Sakhalin_issue:0 "萨哈林问题"
 JAP_Sakhalin_issue_desc:0 "库页岛正处于领土争议中，为了与苏联更好的合作，共同持有库页岛的解决方案是可以被公开讨论的。"
 JAP_Sonno_Tokkan_focus:0 "尊皇讨奸"
 JAP_Sonno_Tokkan_focus_desc:0 "只有“尊皇讨奸”才能确保日本帝国与其光荣的天皇同在。"
 JAP_Soviet_Japanese_Neutrality_Pact_focus:0 "苏日中立条约"
 JAP_Soviet_Japanese_Neutrality_Pact_focus_desc:0 "在法国沦陷和随后的轴心国扩张之后，苏联希望修复与我们的外交关系，以便集中精力于欧洲战场。现在让我们与苏联开战也是无法想像的。中立条约可以防止这种情况发生。"
 JAP_a_change_in_course_focus:0 "改变航向"
 JAP_a_change_in_course_focus_desc:0 "-"
 JAP_a_deal_with_CPC:0 "与中共做交易"
 JAP_a_deal_with_CPC_desc:0 "为了使我们的革命扩大到中国，我们将与中国共产党人做个交易。我们将帮助他们进行革命，作为交换，一旦国民党被击败，他们就脱离苏联，成为日本的附庸国。"
 JAP_a_deal_with_CPC_tt:0 "安排与中国共产党达成协议，帮助中国革命，以换取将来国民党被击败后中国共产党融入日本共产党的机构。\n"
 JAP_a_new_empire_focus:0 "新帝国"
 JAP_a_new_empire_focus_desc:0 "无论我们对陛下表现出多么的忠诚，天皇对我们的军事行动并不满意。如果我们想让我们的事业取得胜利，给秩父宫亲王戴上皇冠，让他成为我们的新天皇，是我们最好的选择。"
 JAP_a_new_republic_focus:0 "新共和国"
 JAP_a_new_republic_focus_desc:0 "我们终于摆脱了那些在日本拥有绝对权力的领导人。我们必须最终实现日本共和国，并给予人民应有的发言权！"
 JAP_absorb_tohokai_focus:0 "吸收东方会"
 JAP_absorb_tohokai_focus_desc:0 "由于我们和东方会之间的支持人群重叠，我们将开始与他们合并以扩大我们的影响力。"
 JAP_accepted_hull_note_demands:0 "@JAP§H日本§!接受来自@USA§H美国§!科德尔·赫尔的要求。"
 JAP_against_Nanjing_safezone:0 "针对南京安全区的相关行动"
 JAP_aggressive_china_politics_focus:0 "战争准备"
 JAP_aggressive_china_politics_focus_desc:0 "在我们同中国势力打仗前，我们需要让广大民众相信这场战争的合法性，我们的军队供应需要有计划和做好准备。"
 JAP_agility_focus:0 "重视机动"
 JAP_agility_focus_desc:0 "如果我军战机无法及时抵达战场与敌军交战，那么再长的航程亦无济于事。我们必须制造出具备超强机动性的新型号，使其不会被敌军通过投机取巧击败。"
 JAP_agrarian_reform_focus:0 "土地改革"
 JAP_agrarian_reform_focus_desc:0 "我们的农业是我国的立国支柱之一，土地管理是我国农业的关键要素之一。土地改革使我们能够最大限度地利用我们所拥有的土地。"
 JAP_aichi_organization:0 "$aichi$"
 JAP_alliance_with_siam:0 "与暹罗结盟"
 JAP_alliance_with_siam_desc:0 "暹罗优越的地理位置将能够在帝国和西方列强接下来的战争中提供援助，若是将其拉入我方阵营，必然对接下来进攻马来亚和东印度群岛有极大好处。"
 JAP_ally_with_the_zaibatsus:0 "联合财阀"
 JAP_ally_with_the_zaibatsus_desc:0 "长久以来，各大财阀在国家政治和经济领域都拥有着不可估量的影响力，他们是机会均等和自由的成功典范，我们必须寻求与其展开合作，共建国家发展。"
 JAP_an_ally_in_need:0 "必要的盟友"
 JAP_anti_colonialist_crusade_focus:0 "反殖民主义十字军"
 JAP_anti_colonialist_crusade_focus_desc:0 "有数不清的亚洲同胞正在被邪恶的西方势力压迫和殖民。现在正是时候，我们将发起一场对抗邪恶暴政的解放圣战来让我们的亚洲同胞脱离水深火热的压迫！"
 JAP_anti_communist_bulwark:0 "反共堡垒"
 JAP_anti_communist_bulwark_desc:0 "民主的准则与所谓的共产主义水火不容，我们必须坚定地对抗这邪恶的意识形态，使我国自身乃至友邦不受其侵蚀。"
 JAP_anti_communist_diplomacy_focus:0 "反共产外交"
 JAP_anti_communist_diplomacy_focus_desc:0 "来自共产主义的恐吓正威胁到了民主，这应该要被立刻处理掉。"
 JAP_anti_communist_volunteers:0 "反共志愿军"
 JAP_anti_communist_volunteers_desc:0 "即便我们自己未正式置身于冲突当中，我们也必须和共产主义灾厄斗个至死方休。为此，我们将派出大和民族最优秀的男儿作为志愿军走出国门，捍卫民主。"
 JAP_anti_fascist_diplomacy_focus:0 "反法西斯外交"
 JAP_anti_fascist_diplomacy_focus_desc:0 "来自法西斯主义的恐吓正威胁到了民主，这应该要被立刻处理掉。"
 JAP_approach_the_young_officers:0 "接触青年将校"
 JAP_approach_the_young_officers_desc:0 "要军中那些老顽固接受新思潮实属不易，我们还是把目光转向年轻一代的将校吧。"
 JAP_approach_the_young_officers_tt:0 "获得§G3§!名共产主义将领。\n"
 JAP_armored_divisions:0 "战车师团"
 JAP_armored_divisions_desc:0 "不少国家已经开始运用装甲部队的力量，而我国也绝不能落于人后。我们要研发更为先进且更具杀伤力的战车，实现对敌军的迅捷重击。"
 JAP_army_expansion:0 "陆军扩编"
 JAP_army_expansion_desc:0 "为实现我国的扩军战略，我们必须任用那些具备过硬军事训练技能的军官。"
 JAP_army_expansion_law:0 "陆军扩编法案"
 JAP_army_expansion_law_desc:0 "政府必须将保证军队的快速扩充能力列为工作的一项核心原则。"
 JAP_asia_united_focus:0 "东亚联盟运动"
 JAP_asia_united_focus_desc:0 "日本必须追随石原莞尔的“世界最终战论”。因此，必须建立一个新的东亚联盟，或称为Tōa Renmei（东亚联盟），以指导我们东亚兄弟最终战胜西方帝国主义列强！"
 JAP_asian_communist_solidarity:0 "亚洲共产团结联盟"
 JAP_asian_communist_solidarity_desc:0 "西方模式的共产主义在这片大陆可没有立足之地，我们必须和邻国的亚细亚同胞并肩作战，携手开创出符合本地区需求的共产主义革命道路。"
 JAP_back_to_where_we_were_heading_focus:0 "回归我们的航向"
 JAP_back_to_where_we_were_heading_focus_desc:0 "经过一系列的事件，日本帝国现在又回归了民族主义和帝国主义的源头。东方会现在将引导日本成为一个光荣的远东帝国，并将其亚洲邻国从西方殖民主义中解放出来！"
 JAP_battle_is_mother_of_culture_focus:0 "战斗为文化之母"
 JAP_battle_is_mother_of_culture_focus_desc:0 "在1934年的《国防本义与其强化之提倡》中，主要的重点是战斗的重要性和它对日本文化的重要作用。考虑到这一点，它支持“广义国防论”，这一理论认为政府应保证人们的社会权利，以换取战时的合作。"
 JAP_bicycle_battalions:0 "自行车大队"
 JAP_bicycle_battalions_desc:0 "机动性至关重要，而我军将列装自行车以大幅提升部队的机动能力。"
 JAP_bomber_modernization:0 "轰炸机现代化"
 JAP_bomber_modernization_desc:0 "建立现代化的战术轰炸机部队，是我军战场支援的关键。"
 JAP_border_conflict_back_out_of_conflict:0 "悻然让步"
 JAP_border_conflict_back_out_of_conflict_desc:0 "放任这场冲突失控并将我等两国推向全面战争的危险实在是太大了。我们应该及时止损，向对方提出外交磋商。"
 JAP_border_conflict_escalate_conflict:0 "加剧冲突"
 JAP_border_conflict_escalate_conflict_desc:0 "我们和[FROM.GetNameDef]在边境线的冲突现已陷入僵局，但如果进一步扩大事态并投入更多部队，我们仍有机会斩获胜利。"
 JAP_border_conflict_escalate_to_war:0 "正式开战"
 JAP_border_conflict_escalate_to_war_desc:0 "争议地带的战事已经持续了一段时间，然却丝毫没有终战的希望。我们必须做好准备，将目前的冲突视为全面战争的开端，进而展开下一步方略。"
 JAP_border_conflict_escalation_warning_SOV:0 "日本备战"
 JAP_border_conflict_escalation_warning_SOV_desc:0 "空中侦察已经确认了日方在其边境一侧的主力部队调动情况，虽然尚不知晓日军是否或者何时发动突袭，但我们必须做好准备。"
 JAP_border_conflict_time_until_cancelled:0 "结束冲突"
 JAP_border_conflict_time_until_cancelled_desc:0 "就目前的态势来说，我们已经不再能维持更久的作战了。"
 JAP_border_conflict_warning_SOV:0 "日本边境挑衅"
 JAP_border_conflict_warning_SOV_desc:0 "我国边防军日前于朝鲜边境线上同日军士兵爆发了冲突，而根据从日本方面探得的情报显示，这很可能是大规模冲突的先声。我们应该立即强化同日本边境的戒备。"
 JAP_border_incident_forgotten:0 "最佳时机"
 JAP_border_incident_forgotten_desc:0 "如果我们想利用苏朝边境发生的事变，就必须果断采取行动。"
 JAP_border_the_SOV_in_nuomenhan:0 "在满蒙边境挑起冲突"
 JAP_border_the_SOV_in_nuomenhan_desc:0 "我们同[SOV.GetNameDef]和[MON.GetNameDef]在朝鲜和满洲共享着相当漫长的边境线，而在沿线各地，两军士兵随时都可能擦枪走火。对于我们来说，这是试探[SOV.GetAdjective]和[MON.GetAdjective]对轻度挑衅反应程度的机会。"
 JAP_break_the_london_naval_treaty:0 "撕毁伦敦海军条约"
 JAP_break_the_london_naval_treaty_desc:0 "伦敦海军条约的蛮横限制对本国的安全而言实属威胁，我们必须拥有建设海军的自由，才能抗击那些胆敢挑战我国合法权益的国家。"
 JAP_bribe_the_tokko:0 "影响特别高等警察"
 JAP_bribe_the_tokko_1:0 "特高"
 JAP_bribe_the_tokko_1_desc:0 "特高（Tokkō），是特别高等警察的简称，是一支1911年在日本成立的警察部队，专门用于调查和控制被视为对公共秩序构成威胁的政治团体和意识形态。\n§W--------------§!\n在改革的情况下，§R首相很有可能遭暗杀§!。"
 JAP_bribe_the_tokko_2:0 "游说特别高等警察"
 JAP_bribe_the_tokko_2_desc:0 "特高（Tokkō），是特别高等警察的简称，是一支1911年在日本成立的警察部队，专门用于调查和控制被视为对公共秩序构成威胁的政治团体和意识形态。\n§W--------------§!\n在改革的情况下，§R首相遭暗杀的可能性很小§!。"
 JAP_bribe_the_tokko_3:0 "贿赂特别高等警察"
 JAP_bribe_the_tokko_3_desc:0 "特高（Tokkō），是特别高等警察的简称，是一支1911年在日本成立的警察部队，专门用于调查和控制被视为对公共秩序构成威胁的政治团体和意识形态。\n§W--------------§!\n在改革的情况下，§Y首相不会遭暗杀§!。"
 JAP_bribe_the_tokko_befriended:0 "交好特别高等警察"
 JAP_bribe_the_tokko_befriended_desc:0 "特高（Tokkō），是特别高等警察的简称，是一支1911年在日本成立的警察部队，专门用于调查和控制被视为对公共秩序构成威胁的政治团体和意识形态。\n"
 JAP_bribe_the_tokko_desc:0 "日本的政治气氛现在非常紧张。随着军队和秘密警察的不断壮大，政治改革将永远无法产生。然而，我们也许能够影响其中一些团体来推动我们的事业。\n\n§Y在改革的情况下，一次或多次执行该决议可以降低首相遭暗杀的可能性。§!"
 JAP_broke_the_london_naval_treaty:0 "撕毁伦敦海军条约"
 JAP_build_up_the_manchurian_army:0 "扩编满洲帝国陆军"
 JAP_build_up_the_manchurian_army_desc:0 "[MAN.GetNameDefCap]将成为任何北方战事的最前线，我们必须确保其有足够的能力应对潜在的威胁。"
 JAP_carrier_warfare_experiments:0 "航母作战实践"
 JAP_carrier_warfare_experiments_desc:0 "战列舰已是旧时代遗留的产物，如今我们必须放眼属于航空作战的未来，航母机动部队将确保我们能够在整个太平洋投射空军力量。"
 JAP_cast_the_die:0 "孤注一掷"
 JAP_cast_the_die_desc:0 "吾辈在政治和军事上的基础已然巩固，如今是时候为命运而奋进了！"
 JAP_challenge_the_zaibatsus:0 "威慑财阀"
 JAP_challenge_the_zaibatsus_desc:0 "尽管长久以来，各大财阀在帝国的政治和经济领域都拥有着不可估量的影响力，但我们必须警示他们身为臣下，依旧要对天皇陛下的圣意俯首慑服。"
 JAP_china_step_up_war_effort:0 "升级对华战争态势"
 JAP_christian_on_map:0 "组织研讨会以提高基督教的接受度。"
 JAP_chumogun:0 "驻蒙军据点"
 JAP_chumogun_ehb:0 "驻蒙军据点"
 JAP_chumogun_man:0 "驻蒙军据点"
 JAP_church_sponsored_baseball_games_focus:0 "教会赞助的棒球比赛"
 JAP_church_sponsored_baseball_games_focus_desc:0 "感谢首相安部矶雄为帮助保护和加强各种基督教教派的宗教自由权所做的仁慈人道主义努力，基督教会在日本蓬勃发展。 现在他们愿意赞助棒球比赛来帮助我们的总理先生！"
 JAP_colonial_independence:0 "殖民地独立"
 JAP_colonial_independence_desc:0 "鉴于我们已收复帝国的旧属地，是时候解放当地人民并给予他们应得的独立了。"
 JAP_colonial_reform_focus_no_dlc:0 "改革殖民政府"
 JAP_colonial_reform_focus_no_dlc_desc:0 "军国主义情绪仍然存在于我们殖民政府的内部，需要进行改革来恢复我们在那里的影响力。"
 JAP_communism:0 "日本人民共和国"
 JAP_communist_sympathizer:0 "共产主义支持者"
 JAP_communist_sympathizer_desc:0 "§L此人是一位共产主义事业的支持者。§!"
 JAP_communist_volunteers:0 "共产志愿军"
 JAP_communist_volunteers_desc:0 "革命斗争并不会仅仅止步于日本，我们还必须将燎原之火燃向其他国家，大和民族最英勇无畏的战士们将踏出国门，进一步加速他国的革命进程！"
 JAP_conquer_china:0 "征服中国"
 JAP_consolidate_yonai_cabinet_focus:0 "巩固米内光政内阁"
 JAP_consolidate_yonai_cabinet_focus_desc:0 "在米内光政的领导下，海军现在决策和政治影响力方面占了上风。限制提督们扩大其政治影响力的最大障碍之一是二二六兵变后恢复了安抚军方的“现役武官大臣制”条款。我们将把它移除，使提督们能大展身手。"
 JAP_contact_zhang_lan_focus:0 "与张澜接触"
 JAP_contact_zhang_lan_focus_desc:0 "作为反对[CHI.GetLeader]政权的人，张澜是民主的坚定支持者。我们将帮助他和他在中国的盟友组织反对腐败的[CHI.GetLeader]。"
 JAP_cooperate_with_labor_union_focus:0 "与工会合作"
 JAP_cooperate_with_labor_union_focus_desc:0 "如果我们想要引领日本成为一个强大的社会主义力量，工人们的饭碗和日本的工业是至关重要的，为了确保他们的生计不会被牺牲，我们应该和工会一起合作，并做我们该做的事。"
 JAP_create_a_manchurian_imperial_air_force:0 "创建满洲帝国空军"
 JAP_create_a_manchurian_imperial_air_force_desc:0 "夺取制空是战争胜利的关键，如果[MAN.GetNameDef]能拥有其自己的空军力量，将能够极大地提升我军的空中优势。"
 JAP_cruiser_modernization:0 "巡洋舰现代化"
 JAP_cruiser_modernization_desc:0 "巡洋舰将会是我国太平洋特遣舰队的主要战力，必须尽可能对其加以建造。"
 JAP_defeated:0 "对华战败"
 JAP_defense_modifier2:0 "防御态势"
 JAP_defense_modifier2_desc:0 "这场战争是一场马拉松，而不是短跑。过早地开始挑战其他势力会招致灾难。现在，我们将会保持着防御性姿态。"
 JAP_defense_modifier:0 "防御态势"
 JAP_defense_modifier_desc:0 "这场战争是一场马拉松，而不是短跑。过早地开始挑战其他势力会招致灾难。现在，我们将会保持着防御性姿态。"
 JAP_demilitarisation:0 "非军事化"
 JAP_democracy_to_china_focus:0 "把民主带到中国"
 JAP_democracy_to_china_focus_desc:0 "几十年来，中国一直由王朝、军政府、军阀和共产党来统治。我们必须结束这些政权，为全中国带来真正的稳定与和平。"
 JAP_democratic_party_min:0 "立宪民政党"
 JAP_deradicalization_of_young_officers:0 "年轻军官去激进化"
 JAP_deradicalization_of_young_officers_desc:0 "二二六事件发生的主要原因之一是来自日本贫穷和农村地区的年轻军官的不满。为了恢复我们的国家稳定，通过促进宪政和改善他们部队的条件， 使他们去激进化，可以获得他们至关重要的支持。"
 JAP_develop_chinese_resources:0 "开发中华资源"
 JAP_develop_chinese_resources_desc:0 "我们必须充分利用所夺取的大中华地区富饶的资源，为帝国的下一场战争做好准备。"
 JAP_develop_luzon_chromium_deposits:0 "开发吕宋铬矿"
 JAP_develop_mindanao_steel_deposits:0 "开发棉兰老铁矿"
 JAP_develop_nauru_tungsten_deposits:0 "开发瑙鲁钨矿"
 JAP_develop_new_fighters:0 "开发新型战斗机"
 JAP_develop_new_fighters_desc:0 "由三菱重工最新设计的一款舰载战斗机或许将被证明是该机型领域迄今为止最为强大的存在，其无与伦比的机动性以及优秀的航程意味着此型号足可堪用多年，我们应该立即开始对原型机展开设计以及试制。"
 JAP_develop_north_sakhalin_oil_deposits:0 "开发北萨哈林油田"
 JAP_develop_samar_steel_deposits:0 "开发萨马铁矿"
 JAP_develop_shandong_aluminium_deposits:0 "开发山东铝矿"
 JAP_develop_sichuan_aluminium_deposits:0 "开发四川铝矿"
 JAP_develop_singapore_aluminium_deposits:0 "开发新加坡铝矿"
 JAP_develop_suiyuan_steel_deposits:0 "开发绥远铁矿"
 JAP_develop_tonkin_aluminium_deposits:0 "开发北圻铝矿"
 JAP_develop_yunnan_aluminium_deposits:0 "开发云南铝矿"
 JAP_draft_exemptions:0 "兵役豁免法案"
 JAP_duplicate_research_efforts:0 "重复的研究"
 JAP_escalate_incident_to_border_conflict_SOV:0 "升级事态"
 JAP_escalate_incident_to_border_conflict_SOV_desc:0 "鉴于苏联人似乎并不打算在这场冲突当中让步，我们只能在将事变升级为武装冲突或者悻然退却当中作出选择了。"
 JAP_escort_debuff:0 "缺乏护航体制"
 JAP_escort_debuff_desc:0 "我们的海军专注于决战，并没有足够的舰艇与体制来护航我们的运输船队，虽然当我们的敌人缺乏海军力量时这不成问题，但若我们要与西方世界作战，我们将遭受重大伤亡。"
 JAP_establish_national_diet_focus:0 "成立国民议会"
 JAP_establish_national_diet_focus_desc:0 "在采纳了民主主义以后，我们应该重新改组过时的帝国国会为更有功能的国民议会，使我们的立法机构像西方一样有功能。"
 JAP_establish_the_northern_resource_area:0 "北方资源地建设"
 JAP_establish_the_northern_resource_area_desc:0 "西伯利亚富饶的资源必须为帝国全速运转的战争机器所用。"
 JAP_everybody_serves:0 "规制滥征兵役"
 JAP_exchange_the_exiles:0 "引渡流亡者"
 JAP_exchange_the_exiles_desc:0 "不久前我们曾将左翼的军官和公务员半流放式地赶到了满洲，而现在，是时候将其召回来顶替我国的右翼了。"
 JAP_expand_hiratsuka_navy_arsenal:0 "扩建平冢海军弹药厂"
 JAP_expand_hiratsuka_navy_arsenal_desc:0 "1905年成立的平塚海军弹药厂具有极大的扩建潜力。他们能够将不同工厂专门化，用于设计与工程，包括机枪弹药、海军炮弹、溶剂回收以及硝化甘油生产。"
 JAP_expand_the_Tokyo_Big6_Baseball_League_focus:0 "扩大东京六大学棒球联盟"
 JAP_expand_the_Tokyo_Big6_Baseball_League_focus_desc:0 "曾担任东京六大学棒球联盟的首相安部矶雄，他非常的熟悉如何扩大并组织一个大规模、跨大学的棒球联盟。我们应该让他当我们的顾问来给我们扩大联盟的方向。"
 JAP_expand_the_revolution_sol_focus:0 "扩大革命"
 JAP_expand_the_revolution_sol_focus_desc:0 "我们将把我们的革命扩大到东南亚国家，把那些人民从西方殖民者的统治下解放出来！"
 JAP_expand_the_revolutions_focus:0 "扩大革命"
 JAP_expand_the_revolutions_focus_desc:0 "我们要把革命扩大到东南亚国家，把那里的人民从西方殖民统治中解放出来！"
 JAP_expand_the_snlf:0 "扩编海军特别陆战队"
 JAP_expand_the_snlf_desc:0 "太平洋上爆发的战争将涵盖大量的海军登陆作战，海军特别陆战队必须要实现扩编才能完成其被赋予的任务。 "
 JAP_expansionist_propaganda_1:0 "扩张主义宣传"
 JAP_expansionist_propaganda_5:0 "扩张主义宣传"
 JAP_fangongbaolei:0 "反共堡垒"
 JAP_fascism_party_kod:0 "皇道派"
 JAP_fascism_party_tai:0 "大政翼赞会"
 JAP_favor_army:0 "偏重陆军"
 JAP_favor_navy:0 "偏重海军"
 JAP_fighter_modernization:0 "战斗机现代化"
 JAP_fighter_modernization_desc:0 "鉴于我们必须在包括空中战场在内的各个领域全面压制对手，列装现代化战斗机着实很有必要。"
 JAP_final_war_theory_focus:0 "世界最终战论"
 JAP_final_war_theory_focus_desc:0 "《世界最终战论》又称《最终战争论》，是一个由战略家石原莞尔提出的理论。他提到了在日本领导的东亚人民和美国领导的西方殖民者之间将会有一场不可避免的战争发生，不过在这之后将会有未曾出现过的世界和平产生。如果这场战争确实无法避免，有着神圣国体保护的大日本帝国会是这场战争的胜利者，而不会是邪恶的西方殖民主义势力。"
 JAP_finish_the_fight:0 "追歼穷寇"
 JAP_finish_the_fight_desc:0 "我们必须将革命战火燃向旧日的殖民地，彻底摧毁我国意识形态敌人的最后堡垒。"
 JAP_first_air_fleet:0 "第一航空战队"
 JAP_first_air_fleet_desc:0 "为在最大程度上发挥攻击战力，我们将实现世界上最大规模的航母集中作战运用。通过践行发展这种模式下的协同进攻理论，敌军将断无机会对抗我们压倒性的海军航空兵力量。"
 JAP_focus_war_effort_on_china_focus:0 "聚焦日中战争"
 JAP_focus_war_effort_on_china_focus_desc:0 "日中战争已经持续了太长时间了，浪费了我们很多资源。我们将加大战争的力度，一劳永逸地终结中国。"
 JAP_form_CCP_mission:0 "上海危机"
 JAP_form_CCP_mission_desc:0 "我们在上海的统治现在很不受欢迎，除非我们及时建立一个代理政府，否则结局会很糟糕。"
 JAP_form_JNC_mission:0 "华北危机"
 JAP_form_JNC_mission_desc:0 "我们在中国的统治现在很不受欢迎，除非我们及时建立一个代理政府，否则结局会很糟糕。"
 JAP_form_MEJ_mission:0 "蒙古人要求兼并土地"
 JAP_form_MEJ_mission_desc:0 "在接管了南察哈尔和晋北的几个地区之后，蒙古人现在要求他们的政府兼并这些土地。如果不及时这样做，就会破坏我们的所订下的秩序。"
 JAP_form_MUA_mission:0 "蒙古人要求召开另一场大会"
 JAP_form_MUA_mission_desc:0 "战争爆发后，蒙古代理政府遭受了陈旧政治框架的无效官僚主义之苦。是时候举行另一次“蒙古人大会”了。"
 JAP_form_RFM_mission:0 "南京危机"
 JAP_form_RFM_mission_desc:0 "我们在南京的统治现在很不受欢迎，除非我们及时建立一个代理政府，否则结局会很糟糕。"
 JAP_form_RRC_mission:0 "不稳定的傀儡政府"
 JAP_form_RRC_mission_desc:0 "我们在中国的统治现在很不稳定，除非我们及时建立一个代理政府，否则结局会很糟糕。"
 JAP_fortress_manchuria_focus:0 "驻防满洲"
 JAP_fortress_manchuria_focus_desc:0 "我们在满洲的领土被各个方向的敌人所包围。对于来自苏联和中国的威胁都需要构建一个防线来保障我们的利益。"
 JAP_full_sovereignty_for_the_philippines:0 "赋予菲律宾完整主权"
 JAP_full_sovereignty_for_the_philippines_desc:0 "全亚洲实现民族自决的进程必须继续推进，鉴于[USA.GetNameDefCap]仍然把持着菲律宾国政，我们必须对其予以施压，强迫其正视菲律宾人民的民主权利。"
 JAP_fund_the_CDL:0 "资助民主同盟"
 JAP_fund_the_CDL_desc:0 "国民党辜负了中国和它的人民。为了恢复中国的稳定和繁荣，资助中国民主同盟并最终迫使他们举行公投，可以为中国提供一个崭新的未来。"
 JAP_fund_the_unions_focus:0 "支持工人联合会"
 JAP_fund_the_unions_focus_desc:0 "支持联合会可以帮助工人提高生产效率。"
 JAP_fund_the_unitarian_church_focus:0 "资助当地教堂"
 JAP_fund_the_unitarian_church_focus_desc:0 "由于神道教在日本的强烈影响力，大部分的基督教派在日本都几乎没有影响力。但是，日本人也应当得到神的拯救。为了实现这个目标，我们应该集中并资助日本几个最大的教会和反过来让福音传遍整个日本。"
 JAP_further_investment_in_manchuria_focus:0 "增加满洲投资"
 JAP_further_investment_in_manchuria_focus_desc:0 "与其清洗掉美丽的满洲文化，并灌输我们的文化进去，一个更好的政策是逐步扩大我们在满洲的投资规模，来实现双赢的局面。"
 JAP_get_the_nuomenhan:0 "击败苏蒙联军"
 JAP_gongrongquan:0 "大东亚共荣圈"
 JAP_gongrongquan_desc:0 "§L我们必须动用一切手段从共荣圈的盟友手中获取战争所必需的物资。§!"
 JAP_greater_east_asian_co_prosperity_sphere:0 "大东亚共荣圈"
 JAP_greater_east_asian_co_prosperity_sphere_desc:0 "西方帝国主义的霸权已然到头，从今往后，亚细亚的人民将在帝国的领导下团结起来迈向繁荣昌盛，共建属于亚洲人的大亚细亚！"
 JAP_guardian_of_INS:0 "承接印度尼西亚管辖权"
 JAP_guardian_of_MAL:0 "承接马来亚管辖权"
 JAP_guardian_of_indochina:0 "承接印度支那管辖权"
 JAP_guide_the_zaibatsus:0 "财阀督导"
 JAP_guide_the_zaibatsus_desc:0 "长久以来，各大财阀在帝国的政治和经济领域都拥有着不可估量的影响力，我们或许可以通过一些手段，来引导他们为国家服务。"
 JAP_horseshoe_theory_focus:0 "中野正刚崛起"
 JAP_horseshoe_theory_focus_desc:0 "中野正刚于1936年5月创立“东方会”。东方会成员是泛亚洲主义的信徒，但也打上欧洲国家社会主义的标籤。然而，他们中的许多人把重点放在社会主义元素上，因此，它与社会大众党的支持者有重叠，这意味着左翼运动的激增很可能也刺激他们运动的激增。"
 JAP_ichi_go:0 "一号作战"
 JAP_ichi_go_desc:0 "战事的终点已指日可待，我国或可通过一场最终攻势以加速结果的进程。然而，若是我们不能在此后的一年内斩获胜利，那么随着社会舆论对扩大战争投入的质疑，我们或许会面临内部稳定问题的困扰……"
 JAP_if_man_accepts:0 "如果§H满洲国§!接受提案，将会发生：\n"
 JAP_improved_living_conditions_for_farmers:0 "农民的生活水准提高"
 JAP_improved_living_conditions_for_farmers_desc:0 ""
 JAP_improved_living_conditions_for_middle_class:0 "中产阶级的生活水准提高"
 JAP_improved_living_conditions_for_middle_class_desc:0 ""
 JAP_improved_living_conditions_for_workers:0 "工人的生活水准提高"
 JAP_improved_living_conditions_for_workers_desc:0 ""
 JAP_influence_china_focus:0 "影响中国政治"
 JAP_influence_china_focus_desc:0 "为了在不发生战争和流血的情况下扩大我们在亚洲的影响力，政治手段和游说可以极大地帮助我们实现这一目标。"
 JAP_interservice_rivalry:0 "军种对立"
 JAP_interservice_rivalry_army_dominant:0 "军种对立-陆军主导"
 JAP_interservice_rivalry_desc:0 "帝国海军和帝国陆军为争夺我们有限的资源陷入了一场恶性冲突。我们设立了定期会议，以确保我们的资源用在正确的地方。偏袒其中一个将会产生深远的影响。\n由于帝国陆军和帝国海军内部的情绪：\n§C支持海军会疏远德国；§!\n§R支持陆军会激怒[USA.GetNameDef]。§!"
 JAP_interservice_rivalry_navy_dominant:0 "军种对立-海军主导"
 JAP_intervene_in_china:0 "对华战争"
 JAP_intervene_in_china_desc:0 "中国仍然拒绝承认满洲国独立，北平附近紧张的边境局势已经造成多次小规模冲突。如果我们捏造一场事端，便可以把小规模冲突升级为全面战争。这将给我们充足的借口一劳永逸地解决掉中国！"
 JAP_intervene_in_china_level_down:0 "对华介入程度降低"
 JAP_invade_southern_indochina:0 "入侵南印度支那"
 JAP_japanese_army_academy:0 "陆军士官学校"
 JAP_japanization_focus:0 "殖民地日本化"
 JAP_japanization_focus_desc:0 "我们新获取的殖民地还没有很好地整合进帝国体制之下。因此，一场促进这些地区整合的运动对帝国大有裨益。"
 JAP_jet_prototypes:0 "试制喷气机原型"
 JAP_jet_prototypes_desc:0 "航空领域的未来并不取决于螺旋桨发动机，我们必须着眼于对喷气式引擎的研发，进一步提升飞机的性能。"
 JAP_jie:0 "饥饿、混乱和恐慌"
 JAP_jie_desc:0 "§L随着“一亿玉碎”计划的实施日本社会全民彻底进入军事化，但随之而来的是各种问题，平民的全部粮食被军部强制征收，但即使这样也无法弥补军队粮食短缺的问题，社会、工厂因此几乎完全停摆。尽管军部的广播不断播放着“日本必胜！”“这是最终的战斗！”但是日本即将战败的声音还是在民间不断传播，整个日本完全陷入混乱和恐慌的极端状态...§!"
 JAP_join_comintern_focus:0 "加入[SOV.GetFactionName]"
 JAP_join_comintern_focus_desc:0 "现在，伟大的日本终于成为一个愿意为它的农民和工人挺身而出的国家，我们将加入共产国际，在全世界发动革命！"
 JAP_join_the_london_naval_treaty:0 "加入伦敦海军条约"
 JAP_join_the_london_naval_treaty_desc:0 "如果要专注于屠熊，我们就必须保护帝国脆弱的侧腹。倘若只需通过一纸限制海军的条约就能带来安宁的话，那么也未尝不可。"
 JAP_kalkin_gol:0 "苏联的试探"
 JAP_kodoha_plot:0 "皇道派动乱"
 JAP_kodoha_plot_desc:0 "Kodoha或称皇道派，是军方的一个主要派别，支持由天皇直接领导的民粹主义统治，消灭政府中的精英和建制官僚。现在他们的存在正在极大地破坏这个国家的稳定。"
 JAP_konoe_cabinet_focus:0 "近卫文麿内阁"
 JAP_konoe_cabinet_focus_desc:0 "近卫文麿，勛瑞宝大绶章和贵族院议长，在军队和公众中都很受欢迎。由他领导的内阁可以确保日本的政治稳定。"
 JAP_kure_naval_arsenal_organization:0 "$kure_naval_arsenal$"
 JAP_labor_unions:0 "工会"
 JAP_labor_unions_desc:0 ""
 JAP_last_win:0 "决号作战"
 JAP_left_reform_focus:0 "与满洲的异议人士合作"
 JAP_left_reform_focus_desc:0 "社会主义是人民的政治，而不是像现行制度那样的精英政府代表。尽管冈田不受欢迎，但他现在也不会离任，这是一个彻底改革和赋予社会主义力量的好机会。"
 JAP_liaison_conference:0 "大本营政府联席会议"
 JAP_liaison_conference_desc:0 "通过组织各军政部门负责人召开联席会议，我们将能够极大地提升本国的决策速度。"
 JAP_liberate_china_focus:0 "解放中国"
 JAP_liberate_china_focus_desc:0 "尽管我国革命取得了成功，但中国这个失败的国家仍然受到反动压迫者的控制。那里的革命者辜负了他们的人民。为解放他们，战争是唯一的手段。"
 JAP_liberate_manchuria:0 "改革殖民政府"
 JAP_liberate_manchuria_alliance_tt:0 "递交结盟提案。"
 JAP_liberate_manchuria_desc:0 "军国主义情绪仍然存在于我们殖民政府的内部，需要进行改革来恢复我们在那里的影响力。"
 JAP_long_lance_torpedoes:0 "九三式鱼雷"
 JAP_long_lance_torpedoes_desc:0 "受制于全球资源分布不均的严峻现实，我国海军在舰艇数量上远不及敌国，因此，我们需要开发出世界上最先进的鱼雷：这是一种由压缩氧气而不是压缩空气推动的超远程强大武器，它可以使我们较小的水面舰艇具备远超其吨位的打击力。"
 JAP_manchu_japan_resource_committee:0 "日满资源委员会"
 JAP_manchu_japan_resource_committee_desc:0 "为了刺激满洲和日本之间的资源流通，一个新的日满资源委员会应该被成立，以确保日本和满洲之间的互相贸易。"
 JAP_military_is_the_government_idea:0 "陆军派取代政府"
 JAP_military_is_the_government_idea_desc:0 "随着我们打击腐败中国政府的战争取得成功，我们终于做出了一些努力，将军国主义融入我们的政府结构中。日本帝国陆军现在比以前更有组织性了。"
 JAP_military_outweighs_the_government_idea:0 "军方压过政府"
 JAP_military_outweighs_the_government_idea_bad:0 "军方压过政府"
 JAP_military_outweighs_the_government_idea_bad_desc:0 "随着军国主义的兴起和军队内部的派系斗争，日本政府的能力越来越弱。没有一个正常运作的政府，日本军队也陷入了混乱状态。"
 JAP_military_outweighs_the_government_idea_desc:0 "随着军国主义的兴起和军队内部的派系斗争，日本政府的能力越来越弱。没有一个正常运作的政府，日本军队也陷入了混乱状态。"
 JAP_military_outweighs_the_government_idea_good:0 "军方压过政府"
 JAP_military_outweighs_the_government_idea_good_desc:0 "随着军国主义的兴起和军队内部的派系斗争，日本政府的能力越来越弱。没有一个正常运作的政府，日本军队也陷入了混乱状态。 然而，随着新秩序运动的实施，军队比以前更有组织性。"
 JAP_military_purges:0 "整肃军队"
 JAP_minguo:0 "大和民国"
 JAP_minpon_shugi_focus:0 "民本主义"
 JAP_minpon_shugi_focus_desc:0 "在《宪政的本意》中，政治家吉野作造定义了“民本主义”为“以国民利益和幸福为政治目的”。民本主义的精神是让明治时代的民主真正伟大。"
 JAP_minshu_shugi_focus:0 "民主主义"
 JAP_minshu_shugi_focus_desc:0 "政治学家吉野作造，定义了民主主义为“互相承诺的人民主权”. 不像人们如何尝试将其放在一个框架内，民主主义并不排斥君主制，它只是将重点放在人民的主权上。另外，民众对皇室的个人崇拜，已经成为我们国家各种意义上的大灾难。现在是时候来“重新”装潢一下了。"
 JAP_mitsubishi_organization:0 "$mitsubishi$"
 JAP_modern_artillery:0 "现代火炮"
 JAP_modern_artillery_desc:0 "尽管我军将士英勇悍战，但也仍然需要压倒性炮火支援以掩护推进。"
 JAP_modern_escorts:0 "海上护卫总部"
 JAP_modern_escorts_desc:0 "海军部希望护航舰队能使本队或运输船队不受敌方潜舰和鱼雷艇的阻击，我们应该改进护航舰艇的设计。"
 JAP_more_Constitutional_Reform_focus:0 "宪法改革"
 JAP_more_Constitutional_Reform_focus_desc:0 "我们现有的宪法很明显是有缺陷的，而且也无法承受政治的危机像是226兵变一样。现在是时候重新检视并修正他该被修正的地方了。"
 JAP_move_our_capital:0 "迁都？"
 JAP_move_our_capital_desc:0 "经过我们的整合工作后，我们终于可以宣布满洲地区是我们核心领土的一部分。我国政府内部的一些人建议，把我们的首都迁往那里可以加强该地区的稳定，甚至可以鼓励投资和促进经济繁荣。"
 JAP_move_our_capital_tt:0 "\n§C把我们的首都迁往新京可以更容易地在欧亚大陆上部署军队。§!"
 JAP_national_mobilization_law_idea:0 "国家总动员法"
 JAP_national_mobilization_law_idea_desc:0 "Kokka Sōdōin Hō或字面上的国家总动员法，允许政府对民间组织进行控制，战略性工业国有化，价格控制和定量配给，并将新闻媒体国有化。\n§W--------------§!\n§R只有当§!§Y敌人拥有比我们更庞大的工业§!§R或者§!§Y稳定度/战争支持度很低§!§R的时候，经济才会变得不稳定。然而，当他们这样做的时候，他们可能是毁灭性的。§!"
 JAP_nationalize_the_military_focus:0 "军队国家化"
 JAP_nationalize_the_military_focus_desc:0 "军队国家化可以防止未来不必要的军国主义兴起。军队应该为国家服务，而不是反过来。"
 JAP_nationalize_the_zaibatsus:0 "财阀国有化"
 JAP_nationalize_the_zaibatsus_desc:0 "财阀在我国的政治和经济领域予取予求的历史将在今天被终结，从今往后，国家的权威绝不再容任何挑战。"
 JAP_naval_primacy:0 "海军优先"
 JAP_navy_backed_government:0 "海军派支持的政府"
 JAP_navy_backed_government_desc:0 "与文官政府的合作进展顺利。海军派影响力也因此而扩大。现在政府得到了海军派的大力支持，海军派可以在政治上佔有一席之地了。"
 JAP_navy_leadership_focus:0 "山本内阁"
 JAP_navy_leadership_focus_desc:0 "作为米内光政的强大盟友，山本五十六是海军中一位强有力的反战人士。海军应该承担起治理这个国家的重任，而不是把我们的领导权交还给腐败的立宪政友会和立宪民政党官僚，毕竟他们已在治理国家方面败给了军国主义者。"
 JAP_new_naval_estimates:0 "新编海军预算"
 JAP_new_naval_estimates_desc:0 "我们必须为本国海军的规模增长调拨新的预算，以确保各造船厂满足增长的建造需求。"
 JAP_nitan:0 "深陷中国战场"
 JAP_nitan_desc:0 "共党的敌后武装在我军后方不断地袭扰破坏，使我们的部队损耗严重。"
 JAP_no_peace_preservation_law:0 "没有治安维持法"
 JAP_non_aggression_pact_with_china:0 "与中国签订互不侵犯条约"
 JAP_non_aggression_pact_with_china_desc:0 "尽管近百年来帝国与中国的外交关系颇为紧张，但至少我们现在需要与其达成互不侵犯条约，以此解放军队，向北进军。"
 JAP_nuke_1:0 "已实施第一次对日核打击"
 JAP_nuke_2:0 "已实施第二次对日核打击"
 JAP_one_hit_theory:0 "中国一击论"
 JAP_one_hit_theory_desc:0 ""
 JAP_one_hit_theory_for_player:0 "中国一击论"
 JAP_one_hit_theory_for_player_desc:0 ""
 JAP_one_hit_theory_tt:0 "§C此精神的加成和持续时间§! §Y取决于@JAP[JAP.GetName]或@CHI[WTT_current_china_leader.GetName]是否受AI控制。§!"
 JAP_outline_plan_for_reorganization_of_japan_focus:0 "《日本改造法案大纲》"
 JAP_outline_plan_for_reorganization_of_japan_focus_desc:0 "《日本改造法案大纲》在1919年八月于中国上海公开发表，由伟大的民族主义思想家北一辉阐述了一个明确的计划，如何让日本成为针对西方殖民主义的全球革命领导者。他打算将日本重构为一个由天皇所领导的绝对独裁国家。"
 JAP_pacific_guardian:0 "太平洋守护者"
 JAP_pacific_guardian_desc:0 "为了环太平洋和亚细亚诸国的利益，我们将承担起守护者的职责，若他们希望成长为健全的民主国家，就必须要依靠我国的指导。"
 JAP_peace_preservation_law:0 "治安维持法"
 JAP_peace_preservation_law_better:0 "修改治安维持法"
 JAP_peace_preservation_law_better_desc:0 "经过修订，治安维持法在不侵犯个人自由的前提下维护了法律和秩序。"
 JAP_peace_preservation_law_desc:0 "1925年治安维持法（Chian Iji Hō）于1925年5月12日，在加藤高明任内颁布。这是日本最重要和最具争议的法律之一，因为它禁止所有反对政府议程的异议跟思想。"
 JAP_people_owned_mines:0 "民有矿业"
 JAP_people_owned_mines_desc:0 "为了提高工人群众的劳动积极性和效率，他们将被允许在其工作的矿山当中持有股份。"
 JAP_pitch_western_powers_against_soviet_union:0 "让西方对抗苏联"
 JAP_pitch_western_powers_against_soviet_union_desc:0 "-"
 JAP_placate_military_focus:0 "安抚军队"
 JAP_placate_military_focus_desc:0 "在经历可怕的政变之后，我们政府现在无法承受与军方的任何冲突。最好是安抚他们，而不是反对他们。"
 JAP_police_backlash_on_map:0 "警方为防止基督徒遭迫害而进行反击。"
 JAP_preemptive_war:0 "先发攻苏"
 JAP_preemptive_war_desc:0 "通过伪造[SOV.GetAdjective]不断进犯帝国北疆的报告，我们可以为自己制造口实，以发动消灭北方威胁的先制战争。"
 JAP_prepare_for_war_with_the_soviet_union:0 "准备对[SOV.GetNameDef]的战争"
 JAP_prepare_for_war_with_the_soviet_union_desc:0 "我们必须解决盘踞在帝国北境的[SOV.GetSovietThreatName]威胁，必须即刻着手准备对[SOV.GetNameDef]的战争。"
 JAP_pressure_france:0 "索取印度支那"
 JAP_prioritize_army_aircraft_construction:0 "优先陆军航空兵建设"
 JAP_prioritize_naval_aircraft_construction:0 "优先海军航空兵建设"
 JAP_project_f_go:0 "F计划"
 JAP_project_f_go_desc:0 "F计划是帝国海军的原子弹研制工程，由京都帝国大学的荒胜文策教授负责，该计划选择了“离心分离法”来提纯铀-235。"
 JAP_promote_army_pamphlet_focus:0 "提倡《陆军手册》"
 JAP_promote_army_pamphlet_focus_desc:0 "《国防本义与其强化之提倡》（又称“陆军手册”）于1934年由陆军省发布，以表其对日本由军队领导并推行计划经济之支持。随着左翼政治运动的越发高涨，现在是时候来提倡《陆军手册》并抛弃愚蠢的皇道派论述了。"
 JAP_promote_student_baseball_focus:0 "推广校园棒球"
 JAP_promote_student_baseball_focus_desc:0 "首相安部矶雄被许多人称做日本棒球之父。他成立了最早的大学野球部，还带整个队伍去美国吸收新的棒球知识，更帮助日本组成了第一个奥运代表队，如果年轻人们有一个东西可以去做和关注它，它们也许就不会把注意力放在法西斯政变上或是发起一个对西方的全面战争。"
 JAP_public_works:0 "公共建设"
 JAP_public_works_desc:0 "一系列新的公共工程将会为社会带来大量的工作机会，同时也将改善国内的基础设施建设。"
 JAP_purge_pro_axis_militarists_focus:0 "逮捕亲轴心国的军国主义者"
 JAP_purge_pro_axis_militarists_focus_desc:0 "很长一段时间以来，军队一直以亲轴心国的观点来煽动人们，这对我们的领导层造成了不利的影响。在海军和盟国的全力支持下，我们可以让这些战争鹰派在他们应得的监狱里度过他们的一生。"
 JAP_purge_the_fleet_faction_focus:0 "清除舰队派"
 JAP_purge_the_fleet_faction_focus_desc:0 "尽管我们在海军中的领导地位得到了强有力的支持，但海军内部的舰队派仍然在煽动人们反对我们的领导，并呼吁与美国开战。如果我们想与西方列强达成任何共识，就必须请他们离开。现在有了盟友的支持，我们有能力迫使他们辞职。"
 JAP_purge_the_kodoha_faction:0 "清洗军队"
 JAP_purge_the_kodoha_faction_desc:0 "日本承受不起另一场政变，而对军方内部的清洗将确保这种情况永远不会再发生。"
 JAP_purged_by_Yonai:0 "遭条约派解职"
 JAP_qiulongzhengce:0 "治安肃正计划"
 JAP_qiulongzhengce_desc:0 "§L治安肃正计划，由华北方面军司令官多田骏提出。其措施是：以铁路为柱，以公路为链，以碉堡为锁，辅之以封锁沟、封锁墙，从敌占区向游击区和抗日根据地构成网状囚笼，对抗日军队压缩包围;其意图是束缚抗日武装的机动性，以便出兵奇袭，消灭抗日武装，摧毁抗日根据地，即“囚笼政策”。§!"
 JAP_raiding_regiments:0 "组建陆军空挺部队"
 JAP_range_focus:0 "重视航程"
 JAP_range_focus_desc:0 "太平洋战场纵横辽阔，我军的新式战机必须具备足够的航程才能有效打击敌人。"
 JAP_realize_the_white_movement_focus:0 "授权给俄罗斯法西斯党"
 JAP_realize_the_white_movement_focus_desc:0 "康斯坦丁·罗扎耶夫斯基正在领导一场成功的运动，在满洲国内重建一个新的民族主义俄罗斯国家。在我们的帮助下，我们可以把他的想法变成现实。"
 JAP_reapprochement_with_China:0 "重新接触中国"
 JAP_reapprochement_with_China_desc:0 "作为亚洲的民主大国，我们有责任恢复与中国的关系，并帮助他们实现国家的民主化。"
 JAP_reapprochement_with_the_government:0 "与政府重新接洽"
 JAP_reapprochement_with_the_government_desc:0 "条约派一直与文官政府保持着良好的关係。混乱的军国主义只会给日本带来麻烦。我们将开始与文官政府合作，以摆脱那些疯子。"
 JAP_rebuild_china_focus:0 "向中国提供工业援助"
 JAP_rebuild_china_focus_desc:0 "为了保持对该国居民的可持续控制，就必须向中国提供援助，以重建因战争造成的破坏。"
 JAP_rebuild_the_civil_service:0 "重建行政体系"
 JAP_rebuild_the_civil_service_desc:0 "为妥善管理国家，我们应当选拔有才之士以重建本国的行政体系。"
 JAP_reconsider_hull_note:0 "重新考虑赫尔的备忘录"
 JAP_red_brigades:0 "日本红军"
 JAP_red_brigades_desc:0 "国民大众不论男女，皆有责任义务保家卫国，我们将确保人人皆有机会参军服役。"
 JAP_redefine_national_polity_focus:0 "重新定义国体"
 JAP_redefine_national_polity_focus_desc:0 "“国体”是国家主权和国族认同的基本结构和基础。这个词的定义和其本质已经争论多年，而现在我们要将争论结束。"
 JAP_reeducation_campaign:0 "再教育运动"
 JAP_reeducation_campaign_desc:0 "伟大的革命战争所带来的动荡和不安仍然萦绕在国境内，我们必须对民众展开再教育，使大众的行为意识符合当下现状。"
 JAP_referendum_for_state_socialism_focus:0 "国家之社会主义公投"
 JAP_referendum_for_state_socialism_focus_desc:0 "不幸的是，我们最近的支持度上升仍没有缓和我们内部的分歧。在军国主义者麻生久和基督教社会民主主义者安部矶雄之间的分歧仍然变得越来越严重。我们应该要求举办一个公投来让他们稍微冷却一下。"
 JAP_reform_Japanese_Army_Academy:0 "扩张陆军士官学校"
 JAP_reform_Japanese_Army_Academy_desc:0 "重组和扩张陆军士官学校会允许我们的军官和军事人员能够拥有更好的指挥能力。"
 JAP_reinstate_chinese_republic_focus:0 "恢复中华共和国"
 JAP_reinstate_chinese_republic_focus_desc:0 "1933年发生的福建起义（闽变）与我们的政治目标有很多共同点。我们应该联繫其残余的领导层，并建立一个附属国来帮助我们的战争。"
 JAP_reinstate_civilian_government_focus:0 "恢复文官政府"
 JAP_reinstate_civilian_government_focus_desc:0 "现在我们国家由极右翼激进分子和战争鹰派把持，民主选举的立宪民政党将被任命组成内阁并管理我们的帝国。"
 JAP_rekindle_the_old_alliance:0 "[Root.GetDLC_old_alliance]"
 JAP_rekindle_the_old_alliance_desc:0 "[Root.GetDLC_old_alliance_desc]"
 JAP_release_korea:0 "朝鲜独立"
 JAP_removes_chiang_kai_shek:0 "铲除蒋介石"
 JAP_removes_chiang_kai_shek_b:0 "铲除[WTT_current_china_leader.GetLeader]"
 JAP_removes_chiang_kai_shek_b_desc:0 "[WTT_current_china_leader.GetLeader]在中国有很多反对者，利用这一点让他下台将有助于我们极大地扩大影响力。 中国的春天在等着你！"
 JAP_removes_chiang_kai_shek_desc:0 "蒋介石是中国的祸患，辜负了他的民族。在他的领导下，中国永远不会繁荣，我们将帮助我们的亚洲兄弟国家。"
 JAP_renmin:0 "民众外逃"
 JAP_renmin_desc:0 "共党指挥的新四军利用“对内团结、对内和平”、减租减息等政策吸引我们管辖范围内的民众纷纷投向他们的根据地。导致我们的很多产业因为没有人纷纷破产，政府的稳定开始下降，为了避免这种事情继续发生我们必须对共党的敌后武装采取措施！"
 JAP_renovate_SMR_focus:0 "翻新南满铁路"
 JAP_renovate_SMR_focus_desc:0 "南满铁路一直以来都是满洲国基础建设的核心，是时候翻新这条铁路来加强我们的后勤能力了。"
 JAP_reorganise_China:0 "重建中国政府"
 JAP_reorganise_China_desc:0 "我们已经在中国取得了胜利，是时候界定他们的领土和将临时政府的剩余部份整合到新政府中"
 JAP_reorganize_imperial_diet_focus:0 "改组帝国国会"
 JAP_reorganize_imperial_diet_focus_desc:0 "在确认了我们对民本主义的承诺之后，我们应该改组帝国国会来让国会的功能恢复成像明治时期一样。"
 JAP_reorganize_imperial_universities:0 "重组帝国大学"
 JAP_reorganize_imperial_universities_desc:0 "重组帝国大学可以提高普通民众的教育水平。"
 JAP_reorganized_japanese_militarism_idea:0 "重组日本军国主义"
 JAP_reorganized_japanese_militarism_idea_desc:0 "日本帝国陆军已经重组，军国主义与政府紧密结合。强大的日本军队不再退缩。"
 JAP_request_soviet_support:0 "请求苏联援助"
 JAP_request_soviet_support_desc:0 "当前的内战态势下，我方急需获得援助，而距离最近且最可能为革命提供支持的，也只有作为北方邻国的苏联了。或许我们可以将南桦太作为筹码，换取一些苏联方面的志愿部队。"
 JAP_research_spending:0 "科研拨款"
 JAP_research_spending_desc:0 "如果我们想要充分运用我国精英的聪明才智，就必须为科研项目拨出充足的预算。"
 JAP_resist_berlin_moscow_menace_focus:0 "对抗柏林莫斯科同盟"
 JAP_resist_berlin_moscow_menace_focus_desc:0 "柏林和莫斯科当局完成了不可能的联盟！他们竟然组成了一个联盟？这在地球上会是何等大的势力，我们必须不计一切代价的反抗他们！"
 JAP_resist_menace:0 "对抗柏林莫斯科同盟"
 JAP_return_manchuria:0 "归还满洲"
 JAP_reverse_tenko_focus:0 "扭转“转向”"
 JAP_reverse_tenko_focus_desc:0 "“转向”是在满洲实施的一项政策，目的是对年轻的左倾学生进行政治再教育，使他们的意识形态立场更加右倾。然而现在潮流已经改变，人们已经意识到无产阶级是我们帝国的基础，我们将扭转这些政策，并在日本本土上实施。"
 JAP_revise_hirota_sangesoku_focus:0 "修正“广田三原则”"
 JAP_revise_hirota_sangesoku_focus_decision_cat:0 "修正“广田三原则”"
 JAP_revise_hirota_sangesoku_focus_decision_cat_desc:0 "Hirota Sangensoku，意思是“广田三原则”，由广田弘毅颁布，作为日本对中国立场的明确声明，其中包括承认满洲国。\n\n然而，由于中国不愿这样做，或许应该重新提出一项新的谈判，以促进亚洲的和平与繁荣。\n\n§Y与中国谈判达成一个协议。§!\n§W在这个协议中，我们政府将§! §R放弃租界§! §W或者§! §R撤销某些中国傀儡§! §W以换取和他们的§!§G联盟§! §W并且§! §G承认满洲的独立§!§W.§!\n\n§Y拥有§! §R泛亚主义者§! §C内阁部长§!并且 §Y当中国拥有强大的§! §R绥靖政策§! 时提供交易，这将使中国 §Y更愿意§!接受这个联盟。"
 JAP_revise_hirota_sangesoku_focus_desc:0 "我们应该与中国结盟，以帮助其实现统一目标，而不是发动战争！也许通过和平手段，我们将以最方便的方式获得他们的资源。"
 JAP_samurai_lineage:0 "武士血统"
 JAP_samurai_lineage_desc:0 "§L此人来自于骄傲的武家世系，恪守着古老的传统和忠诚。§!"
 JAP_sanguangzhengce2:0 "烬灭作战"
 JAP_sanguangzhengce2_desc:0 "§L共党的游击队使皇军一直无法有效控制中国广大的农村地区，并且他们组织平民对我们的后勤运输造成了严重的破坏，这样下去注定会影响战场上的胜负。我们决定对其根据地进行以杀戮当地居民、对粮秣房舍等物资进行彻底的抢劫、焚烧和破坏为目标的烬灭作战，并将这一作战方式逐渐系统化、规模化、长期化。简要概括为“烧光、杀光、抢光”，即“三光政策”。§!"
 JAP_sanguangzhengce:0 "烬灭作战"
 JAP_sanguangzhengce_desc:0 "§L共党的游击队使皇军一直无法有效控制中国广大的农村地区，并且他们组织平民对我们的后勤运输造成了严重的破坏，这样下去注定会影响战场上的胜负。我们决定对其根据地进行以杀戮当地居民、对粮秣房舍等物资进行彻底的抢劫、焚烧和破坏为目标的烬灭作战，并将这一作战方式逐渐系统化、规模化、长期化。简要概括为“烧光、杀光、抢光”，即“三光政策”。§!"
 JAP_sea_long_operational_range:0 "远距离作战航程"
 JAP_sea_long_operational_range_desc:0 "尽管我们渴望快速取胜，但仅靠正面交锋没那么容易赢得战争。太平洋战区距离辽阔，若要取胜，需要研发能跨越长远距离的机型。"
 JAP_second_konoe_cabinet_focus:0 "第二次近卫文麿内阁"
 JAP_second_konoe_cabinet_focus_desc:0 "战争正在激烈地进行着。根据《国家总动员法》，日本需要新体制来加强她的民族团结。米内领导下的现任领导层软弱无力，是我们国家的困境。近卫文麿将回来展开他的第二任期，重组各党派以实现新体制。"
 JAP_secure_china:0 "征服中国"
 JAP_secure_china_desc:0 "中国人的抵抗正变得日益顽固且无止歇，帝国必须竭尽全力，尽速平定大陆的战事。"
 JAP_sever_sino_american_ties_focus:0 "破坏中美关系"
 JAP_sever_sino_american_ties_focus_desc:0 "美国人一直以某种形式的敌意对待我们的帝国，主要是因为军队内部的亲轴心国情绪和我们在中国的活动。解决这个问题的一个办法是帮助美国认识到蒋介石政权的腐败和亲德性质，而日本建立的经过改革的政府将为中国人民提供更好的生活品质。"
 JAP_sign_tripartite_pact:0 "签署三国同盟条约"
 JAP_sign_tripartite_pact_desc:0 "鉴于帝国当前所面临的很可能是力不能及的任务，我们应该与其他有着相似目标的国家政府展开交涉，以便实现某种程度上的互助合作。"
 JAP_singapore_conference_focus:0 "新加坡会议"
 JAP_singapore_conference_focus_desc:0 "日本前任领导人已经把我们从《伦敦海军条约》中退了出来。这是一个明显的不信任的迹象，因为我们很可能在军备竞赛中无法达到这种限制。为了修复这种关系，我们将提议在新加坡举行一次会议，讨论我们之间的外交关系以及贸易和潜在的许可证生产。"
 JAP_singapore_conference_liscense:0 "新加坡会议"
 JAP_small_arms_modernization:0 "轻武器现代化"
 JAP_small_arms_modernization_desc:0 "我国武装部队必须配备现代化的装备，以与潜在的对手相抗衡。"
 JAP_socialism_to_nationalism:0 "社会主义到民族主义"
 JAP_socialism_with_christian_charateristics_focus:0 "基督教社会民主主义"
 JAP_socialism_with_christian_charateristics_focus_desc:0 "社会民主主义的派系在社会大众党内是由安部矶雄所领导，他是一位忠实的基督教社会民主主义支持者，也被称为日本的棒球之父。他可以将日本从集体之疯狂中拯救出来吗？"
 JAP_socialism_with_militarism_characteristics_focus:0 "军国社会主义"
 JAP_socialism_with_militarism_characteristics_focus_desc:0 "偏向军国主义的派系在社会大众党内是由麻生久所领导。他是一个对《陆军手册》相当忠实的支持者，并且他还希望和统制派跟东方会一起合作。他可以带领日本的工人们走向一个充满光明的道路吗？"
 JAP_socialist_colonial_administration_focus:0 "社会主义殖民管理"
 JAP_socialist_colonial_administration_focus_desc:0 "旧的领导政府已经过时了。 新的社会主义殖民政府将取代它们。"
 JAP_socialist_research_facility_focus:0 "社会主义科学"
 JAP_socialist_research_facility_focus_desc:0 "我们需要为社会主义事业支持科学。"
 JAP_sol_liberate_china_focus:0 "解放中国"
 JAP_sol_liberate_china_focus_desc:0 "中国人民正在遭受[CHI.GetLeader]政权的压迫，我们要把他们从压迫者手中解放出来！"
 JAP_southern_expansion:0 "南进扩张"
 JAP_southern_expansion_desc:0 "为了贯彻海军的南进策略，是时候与南方的帝国主义者和殖民者掰掰手腕了，必须将整条南方航路纳入我国领域。"
 JAP_special_air_landing_force:0 "组建海军空挺部队"
 JAP_steel_for_guns:0 "钢材优先造枪"
 JAP_steel_for_ships:0 "钢材优先造船"
 JAP_strategic_bomber_effort:0 "战略轰炸机研发"
 JAP_strategic_bomber_effort_desc:0 "正如我们所预想的那样，战争很难仅凭直接的正面军事对抗决出胜负。鉴于国家的工业产能在很大程度上左右着战争的结果，我们需要投资研发新式战略轰炸机，以实现对敌国隐蔽在战线后方的工业展开摧毁和打击。"
 JAP_strengthen_civilian_government:0 "冈田留任"
 JAP_strengthen_civilian_government_desc:0 "当你的头在老虎口中，我们不能向老虎磕头！为了挽救我们的君主立宪制，将进行一系列的改革，政府将进行重组，但为了确保这些改革的成功，我们必须采取措施。"
 JAP_subdue_warlords_focus:0 "消灭中国割据势力"
 JAP_subdue_warlords_focus_desc:0 "中国人任由他们曾经引以为傲的帝国被激进分子和军阀撕成碎片。但是大日本帝国不容许这种分裂存在，即使参与者是它的附庸。"
 JAP_subsidize_the_middle_class_focus:0 "资助中产阶级"
 JAP_subsidize_the_middle_class_focus_desc:0 "我们政府的大部分支持来自中产阶级和小企业主。我们将确保我们基础支持群体的幸福。"
 JAP_sue_for_peace_CHI:0 "向[From.GetNameDef]呈请议和"
 JAP_sue_for_peace_CHI_desc:0 "我们已经失去了在东亚大陆的所有据点。鉴于军方认为我国已不太可能卷土重来，文官政府建议，为了至少保全对本土列岛的统治，我们应该寻求达成和约。"
 JAP_sue_for_peace_MAN:0 "向[From.GetNameDef]呈请议和"
 JAP_sue_for_peace_MAN_desc:0 "我们已经失去了在东亚大陆的所有据点。鉴于军方认为我国已不太可能卷土重来，文官政府建议，为了至少保全对本土列岛的统治，我们应该寻求达成和约。"
 JAP_sue_for_peace_TT:0 "§Y日本§!或其附属国不再控制任何§Y中国§!大陆或§Y朝鲜§!的核心领土。"
 JAP_sue_for_peace_lost_MAN:0 "提供无条件投降"
 JAP_sue_for_peace_nuke:0 "宣布无条件投降"
 JAP_sue_for_peace_nuke_desc:0 "敌新使用残虐爆弹，战局必不好转，时运所趋，只能堪所难堪，忍所难忍，欲以为万世开太平。"
 JAP_sue_for_peace_nuke_mission:0 "发动对日本岛核打击"
 JAP_sue_for_peace_nuke_mission_desc:0 "最近成功的核试验为全面入侵日本列岛提供了替代的方案。情报显示，如果我们可以从日本手中夺取冲绳岛和硫磺岛，同时将其海军舰队削弱至不多于30艘舰船的规模，最后再对日本列岛的两处地点实施核打击的话，就能有效迫使日本政府无条件投降。"
 JAP_superior_will:0 "意志至上"
 JAP_supremacy_of_technology:0 "科技至上"
 JAP_supremacy_of_technology_desc:0 "科技是指引我们走向胜利的关键，我们必须不遗余力地投入科研以期在军备上压倒对手。"
 JAP_supremacy_of_the_battlefleet:0 "大舰巨炮主义"
 JAP_supremacy_of_the_battlefleet_desc:0 "凭借我国卓越的战列舰设计，仅需一场决定性的海战便能左右整个战局。我们必须优化舰队编成，确保海军能够赢下舰队决战。"
 JAP_supremacy_of_will:0 "意志至上"
 JAP_supremacy_of_will_desc:0 "利剑若置于匹夫之手则不过尔尔，武士纵手持木剑，亦能陷阵杀敌。"
 JAP_surrender_in_ww2:0 "日本在第二次世界大战中投降"
 JAP_taishuto_one_party_state_focus:0 "社大党一党专政"
 JAP_taishuto_one_party_state_focus_desc:0 "现在我们有了来自军国主义派系的支持，现在我们应该尽快实现《陆军手册》的概论！ 为了实现该目标，确保我们政党的支持率在政坛上足够高是非常重要的一点！"
 JAP_tech_sharing_ger_focus:0 "技术共享"
 JAP_tech_sharing_ger_focus_desc:0 "重视我们价值观的伟大国家之间的科学进步是我们国家应该努力的一项美好事业。此外，为了加强我们的军事力量，我们必须向其他国家伸出援助之手。"
 JAP_technological_exchange:0 "科技交流"
 JAP_technological_exchange_desc:0 "帝国需要能携手放倒俄国巨熊的盟友，而德国不仅是强力的潜在盟友，而且也在诸多科技领域保持着领先地位。两国若能联手，必定大有可为。"
 JAP_test_the_soviets:0 "试探[SOV.GetAdjective]"
 JAP_test_the_soviets_desc:0 "我们同[SOV.GetNameDef]在朝鲜和满洲共享着相当漫长的边境线，而在沿线各地，两军士兵随时都可能擦枪走火。对于我们来说，这是试探[SOV.GetAdjective]对轻度挑衅反应程度的机会。"
 JAP_the_fate_of_the_imperial_family:0 "皇室的命运"
 JAP_the_fate_of_the_imperial_family_desc:0 "是时候见证世袭统治在日本的终焉了，我们必须抉择如何处置天皇及其家族。"
 JAP_the_five_year_plan_focus:0 "五年计划"
 JAP_the_five_year_plan_focus_desc:0 "效法苏联模式启动一个五年计划将对我国有很大的帮助。"
 JAP_the_korean_question:0 "朝鲜决议案"
 JAP_the_korean_question_desc:0 "我国虽然控制朝鲜半岛为时已久，但有关朝鲜民族自决的问题仍悬而未决，若是我们拒绝承认朝鲜邻居的独立主权，那我们还能真正标榜民主的理念吗？"
 JAP_the_london_naval_treaty:0 "伦敦海军条约"
 JAP_the_new_international:0 "新共产国际"
 JAP_the_right_to_initiate_war_focus:0 "日本战争主动权"
 JAP_the_right_to_initiate_war_focus_desc:0 "在《日本改造法案大纲》中，北一辉提到了我们作为整个亚洲的领导者，我们拥有发动战争的权利来解放受到西方殖民主义分子野蛮暴政的亚洲同胞。"
 JAP_the_ultimate_battleship:0 "丸三计划"
 JAP_the_ultimate_battleship_desc:0 "既然我国资源有限，那么就必须确保其能够得到妥善利用，我们将建造有史以来最为强大的战列舰，断然轰沉一切胆敢正面对抗之敌。"
 JAP_the_workhouse_of_asia_focus:0 "东方济贫院"
 JAP_the_workhouse_of_asia_focus_desc:0 "现在满洲的基础建设维护状况已相当好，这让我们可以真的把满洲转变为一个东亚最大的工业区。"
 JAP_the_zero:0 "永远的零"
 JAP_the_zero_desc:0 "由三菱重工最新设计的一款舰载战斗机或许将被证明是该机型领域迄今为止最为强大的存在，其无与伦比的机动性以及优秀的航程意味着此型号足可堪用多年，我们应该立即开始对原型机展开设计以及试制。"
 JAP_the_zero_tt:0 "解锁§H三菱A6M 零战§!的制造。"
 JAP_tohokai_in_power_focus:0 "东方会掌权"
 JAP_tohokai_in_power_focus_desc:0 "在经历一系列意想不到的事件之后，东方会现在已经掌握了权力。是时候在民族主义和社会主义的政策下改革我们的国家了。"
 JAP_tokyo_aluminum_plant:0 "东京铝业"
 JAP_tokyo_aluminum_plant_desc:0 "我们将充分发挥工人群众的聪明才智，进而提升国家的自给自足能力。"
 JAP_tora_tora_tora:0 "虎！虎！虎！"
 JAP_tora_tora_tora_desc:0 "第一批攻击编队已蓄势待发，无论如何，我们都必须迅速行动，在敌人醒悟过来前，充分利用其在明我在暗的优势予以打击削弱。"
 JAP_tora_tora_tora_idea:0 "虎！虎！虎！"
 JAP_tora_tora_tora_idea_desc:0 "在最初的突袭得手后，日本人便展开了以航母机动部队为核心的闪电战攻势。"
 JAP_torpedo_cruisers:0 "重雷装巡洋舰"
 JAP_torpedo_cruisers_desc:0 "我们将为一整级的军舰列装最新式的鱼雷兵器，赋予其重创敌国舰队的战力。"
 JAP_torpedo_destroyer:0 "实验型驱逐舰"
 JAP_torpedo_destroyer_desc:0 "我们的海军需要具有高雷击能力的高速驱逐舰，我们将建造一艘实验驱逐舰来满足这项需求。"
 JAP_touxiangle:0 "已经投降"
 JAP_ultimate_deterrence:0 "终极震慑"
 JAP_ultimate_deterrence_desc:0 "保护国民生命安全的最佳选择便是使其远离战争，而研发具备毁灭性破坏力的新式武器则可确保国民永无参战之虞。"
 JAP_unified_fighter_development:0 "联合战斗机研发"
 JAP_unified_fighter_development_desc:0 "多年来，我们饱受陆海军在航空发展问题上各自为政的困扰。我们必须为此将航空研发项目整合，以既确保军备制造的标准统一，同时也更有效地利用有限的科研资源。"
 JAP_unite_china_focus:0 "统一中国"
 JAP_unite_china_focus_desc:0 "在这个国际动盪时期，一个四分五裂的中国无法抵御外来侵略。只有统一的中国才能坚定地屹立在远东。"
 JAP_unite_china_sol_focus:0 "统一中国"
 JAP_unite_china_sol_focus_desc:0 "在我们取得对中国中央政府的胜利以后，更进一步的革命必须要将整个中国团结在社会主义之下！"
 JAP_usurp_the_left_focus:0 "清洗左派"
 JAP_usurp_the_left_focus_desc:0 "最近对东方会的支持率上升，正在提高日本一种新形式的民族主义运动的受欢迎程度，但这一次是一个反资本主义的转折。"
 JAP_war_conferences_cd:0 "距离上次召开御前战争会议已过去6个月"
 JAP_war_with_soviet_union:0 "对[SOV.GetNameDef]宣战"
 JAP_war_with_soviet_union_desc:0 "尽管欧洲盟友们已经和[SOV.GetNameDef]方面签订了互不侵犯条约，但我们可没法坐失良机。因此，即便可能要冒被盟友疏远的风险，我们也必须单方面向共产主义分子开战。"
 JAP_warrior_spirit:0 "武士道精神"
 JAP_warrior_spirit_desc:0 "基于国立神道教的存在，我们得以向国民灌输为天皇陛下尽忠的七生报国精神。"
 JAP_west_pacific_treaty_organization:0 "跨太平洋防御条约"
 JAP_west_pacific_treaty_organization_desc:0 "美利坚合众国被很多人视为是全世界自由和解放的堡垒。他们将是反抗专制独裁统治的宝贵盟友。"
 JAP_white_peace_after_defeat:0 "向[From.GetName]乞求和平"
 JAP_white_peace_after_defeat_desc:0 "£location_pointer §R警告：加载可能需要一段时间。§!\n"
 JAP_work_with_the_zaibatsus:0 "与财阀合作"
 JAP_work_with_the_zaibatsus_desc:0 "与财阀合作，以确保日本的经济稳定。"
 JAP_work_with_toseiha_focus:0 "与统制派合作"
 JAP_work_with_toseiha_focus_desc:0 "尽管在面对既顽固又幸运的冈田朋友时遭受了重大的政治失败，但统制派在日本的政治领域内仍有相当的影响力。我们将与他们合作以加强我们的权威。"
 JAP_yamato_tt:0 "将两艘§Y大和级§!超重型战列舰添加至生产线，其分别具有75%和50%的完工度。"
 JAP_zaibatsus:0 "财阀"
 JAP_zaibatsus_challenged:0 "财阀慑服"
 JAP_zaibatsus_empowered:0 "财阀共治"
 JAP_zen_at_war_focus:0 "战中之禅"
 JAP_zen_at_war_focus_desc:0 "我们将把我们的佛教人口军事化，并将他们的宗教意志引导到战场上。"
 JCA_party:0 "§Y日本殖民政府§!"
 JPG_Faction_Research_jap:0 "技术共享"
 JPG_Faction_Research_jap_desc:0 "技术共享可以帮助我们长期推进技术进步。"
 JPG_armoured_vehicle_experiment:0 "装甲车辆实验"
 JPG_armoured_vehicle_experiment_desc:0 "一战中坦克的出现改变了战争历史的进程。我们必须发展自己的坦克，以免在军事装备和战术上落后。"
 JPG_arms_confiscation:0 "没收武器"
 JPG_arms_confiscation_desc:0 "武器能允许携带者进行报复，或者主动打击他们的敌人。对于我们政权的反对派也是如此。"
 JPG_army_expansion:0 "扩大陆军"
 JPG_army_expansion_desc:0 "我军原来是一支警察部队，现在规模太小了。它需要一次大规模的扩张，才能满足国家防御的需要。"
 JPG_ban_communism:0 "取缔共产党"
 JPG_ban_communism_desc:0 "共产主义是腐败的苏联和其他左翼分子共同宣扬的一种邪恶的意识形态。只有铲除它们，我们才能确保国家安全。"
 JPG_benefits_of_collaboration_idea:0 "合作主义的好处"
 JPG_bicycle_battalions:0 "自行车机动营"
 JPG_bicycle_battalions_desc:0 "机动性极其关键。在笨重的运兵车不能穿越的地方，自行车可以很好地为我们士兵服务。"
 JPG_expand_propaganda_machines:0 "扩大宣传机器"
 JPG_expand_propaganda_machines_desc:0 "为了获得民众的支持，我们必须向他们灌输我们是一个为他们谋福利的好政府的形象。"
 JPG_expanded_propaganda_machines:0 "扩大宣传机器"
 JPG_hire_japanese_military_advisors:0 "聘请日本陆军顾问"
 JPG_hire_japanese_military_advisors_desc:0 "缺乏经验是我军的一个无可辩驳的缺点。我们必须通过聘请国外有经验的老兵作为顾问来解决这个问题。"
 JPG_improve_infrastructure:0 "改善基础设施"
 JPG_improve_infrastructure_desc:0 "拥有完善的基础设施有利于我们部队的迅速部署，并有助于缓解后勤压力。"
 JPG_industrial_investment:0 "工业投资"
 JPG_industrial_investment_desc:0 "虽然我们的资源可能有限，但我们仍应该将我们所拥有的资本用于改善经济。"
 JPG_jap_mil_advisors:0 "日本陆军顾问"
 JPG_labor_reform:0 "劳动改革"
 JPG_labor_reform_desc:0 "我们是时候将中国在超过数千年发展下来的工作方式和传统推向现代化了。"
 JPG_local_arms_production:0 "本地武器生产"
 JPG_local_arms_production_desc:0 "只要我们仍被视为战争中一个微不足道的小派别，我们就不能奢望依靠外部输送的武器。我们有必要建立我们自己的兵工厂来建造武器。"
 JPG_local_arms_workshops:0 "地方武器作坊"
 JPG_local_arms_workshops_desc:0 "有一个地方的武器作坊可以让我们知识分子研究一些轻型武器。这将有助于我们的研究，并有助于降低生产成本。"
 JPG_local_arms_workshops_idea:0 "地方武器作坊"
 JPG_long_term_economic_planning:0 "长远经济规划"
 JPG_long_term_economic_planning_desc:0 "我们的官僚机构不像中央政府一样的庞大。这容许我们可以清除大部分妨碍经济发展的官僚习气并将我们的努力集中于获得最大的回报。"
 JPG_modernise_support_equipment:0 "现代化支援装备"
 JPG_modernise_support_equipment_desc:0 "只有勇士愿意向敌人发动进攻是不够的。工兵、通信兵和医务兵的重要性不容忽视。"
 JPG_only_show_up_in_war_time_tt:0 "§C这个决议只会在战时出现。§!"
 JPG_personal_leadership:0 "绝对领导"
 JPG_personal_leadership_desc:0 "分散军队指挥权就有引发不甘居人之下的军官试图夺权的危险。我们必须确保士兵们将一直忠于政府。"
 JPG_power_consolidation:0 "巩固权力"
 JPG_power_consolidation_desc:0 "我们的政权年轻而脆弱。为了巩固我们的地位，需要采取一系列政治和非政治行动。"
 JPG_public_education_reform:0 "公共教育改革"
 JPG_public_education_reform_desc:0 "一个现代化的国家的基础就是知识和科学。我们必须先改善和强化这一基础。"
 JPG_public_works:0 "公共工程"
 JPG_public_works_desc:0 "国民需要看见我们为了他们的努力。几个备受瞩目的项目将成为有效的宣传工具，并让他们瞭解到中国能拥有的未来——如果他们继续支持我们的话。"
 JPG_rapid_mobilisation:0 "快速动员"
 JPG_rapid_mobilization:0 "快速动员"
 JPG_rapid_mobilization_desc:0 "要成为中国领导地位的有力竞争者的话，我们必须扩大军队的规模。我们将会开发新的方法来精简培训并创建一支可以应对任何挑战的军队。"
 JPG_reorganization_of_the_regime:0 "政权重组"
 JPG_reorganization_of_the_regime_CACNL:0 "政权重组"
 JPG_reorganization_of_the_regime_CACNL_desc:0 "现在我们的国家已经统一了。重组我们的政权可以帮助我们重新确立我们的权威。"
 JPG_reorganization_of_the_regime_CPC:0 "政权重组"
 JPG_reorganization_of_the_regime_CPC_desc:0 "现在我们的国家已经统一了。重组我们的政权可以帮助我们重新确立我们的权威。"
 JPG_reorganization_of_the_regime_DEM:0 "政权重组"
 JPG_reorganization_of_the_regime_DEM_desc:0 "现在我们的国家已经统一了。重组我们的政权可以帮助我们重新确立我们的权威。"
 JPG_reorganization_of_the_regime_desc:0 "现在我们的国家已经统一了。重组我们的政权可以帮助我们重新确立我们的权威。"
 JPG_rural_militias:0 "农民兵"
 JPG_rural_militias_desc:0 "在广阔的领土内，军事支援经常需要大量的时间来抵达冲突前沿。通过培训本土民兵力量，我们将使得所有入侵者都难以在我们的国境内移动。"
 JPG_seek_japanese_support:0 "寻求日本支持"
 JPG_seek_japanese_support_desc:0 "中央政府和共产党都拥有强大的盟友。如果我们想维持统治，甚至夺得天下的话，我们就不得不寻找我们的保护者。"
 JPG_small_arms_development:0 "轻武器开发"
 JPG_small_arms_development_desc:0 "我们士兵装备的落后品质令人无法忍受。我军不能用陈旧的武器战胜不断前进的敌人。需要在轻武器发展方面取得重大突破。"
 JPG_take_what_we_can_take:0 "收缴武器"
 JPG_take_what_we_can_take_desc:0 "随着战争持续进行，我们的枪支开始短缺。我们不仅应该保持现有的装备，更该尽可能多地从敌人手中夺取武器。"
 JPG_the_benefit_of_collaboration:0 "合作主义的好处"
 JPG_the_benefit_of_collaboration_desc:0 "尽管绝大多数民众支持我们的统治，但仍有很多人不支持。强硬派被他们的民族主义情绪矇蔽了双眼，看不到在我们的宗主国统治下服务的美好未来。然而，中立的人只需要一点“推动力”。"
 JPG_war_taxes:0 "战争税"
 JPG_war_taxes_desc:0 "危急的情况需要特殊的措施。在战争持续进行中的同时，我们必须尽可能向全国所有人口徵调经济资源。"
 JPG_weapon_scavenging:0 "收缴武器"
 Jinzaburo_Masaki:0 "真崎甚三郎"
 Jose_Laurel:0 "劳威尔"
 KHR:0 "喀什"
 KHR_Mahmut_Muhiti:0 "麻木提·穆依提"
 KHR_Mahmut_Muhiti_desc:0 "§Y将领介绍\n§Y出生：§L\n1987年 新疆省吐鲁番\n§Y去世：§L\n1944年 北平市\n§Y母校：§L\n未知\n§Y军阶：§L\n未知\n§Y军旅生涯：§L\n骑兵第六师师长(1934-1937)\n§Y称号：§L\n“麻木提师长”"
 KMT:0 "国民党"
 KOR:0 "朝鲜"
 Kaohsiung:0 "高雄"
 Koki_Hirota:0 "广田弘毅"
 Kyuichi_Tokuda:0 "德田球一"
 LAO:0 "老挝"
 LEADER_KONOE_FUMIMARO_DESC:0 "威望、地位、权力，都是血脉所决定的。\n\n文麿是近卫家第一任妻子时隔 250 年所生的第一个儿子，父母的早逝以及学生时代被西园寺收养，为他的履历增添了一定的传奇色彩。\n\n然而，这个英俊如富士山的年轻人，却与他的政治导师有着截然不同的世界观，继承了父亲的政治权力和人脉，崇尚泛亚主义，同时敌视欧洲和美国——尽管这并不意味着他是一个战争鹰派，但他的上台本身就说明了许多事情。\n\n近卫能否以他的名义保护日本，或者他只是改革派和战争贩子眼中的一个花瓶。"
 LEADER_TOJO_HIDEKI_DESC:0 "东条从没想过当首相——在告诉前首相日本人应该勇敢地做出重大的决定，并向西方宣战后，现在他迅速实现了自己的愿望，让自己冒险一试。\n\n首相知道自己的命运完全取决于这场战争的输赢；\n\n华丽的风笛和留声机，烟草和布料，只有国家才能决定谁吃米饭，谁坐烧炭车，谁领红票；\n\n千万人齐心协力，神国日本将创造奇迹……"
 LXW:0 "老挝王国"
 MAL:0 "马来西亚"
 MAN:0 "中国"
 MAN_Japan_Extraterritoriality_of_Abrogation:0 "废除日本人的治外法权"
 MAN_Japan_Extraterritoriality_of_Abrogation_desc:0 "东京方面仍然对满洲帝国拥有很大的治外法权，但它可能会阻碍我们的业务。现在我们在满洲有了更稳固的立足点，我们将与东京方面进行谈判，并加以修正。"
 MAN_assertiveness:0 "王道统治"
 MAN_assertiveness_desc:0 "日本人仍然还在以傲慢的姿态对我方颐指气使，也许我们应该提醒他们，我国同样也是值得尊敬的帝国。"
 MAN_exiled_imperial_family:0 "流亡的皇族"
 MAN_kwantung_veto:0 "关东军掣肘"
 MAN_kwantung_veto_desc:0 "自1905年日本人从俄国人手中夺取大连以来，驻扎于此的日本关东军便愈发倾向政治化，其志在开疆拓土的将军们不断为日本蚕食着更多的中国领土。而此等行径的巅峰，便是1932年的盛京事变后，将满洲帝国自那些东北军阀的割据领当中整合而出。如今关东军依旧对这片区域施行着统治，并将其诸将的利益置于满洲国的需求之上。\n\n为解决此问题，我们将只能在协商使日军平等展开交往，亦或是将其武力驱逐这两者间抉择。"
 MAN_left_wing_student_movement:0 "左翼学生运动"
 MAN_left_wing_student_movement_desc:0 "由于对官僚和建制精英的不满，很多日本大学毕业生都有着草根、左翼的情绪。1925年的《治安维持法》禁止一切反对政府议程的思想，特别是左翼思想，为了逃避该法，他们搬到满洲国寻找一个新地方，在那里他们可以发表自己的思想，促进自己的事业。"
 MAN_white_movement:0 "白色运动"
 MEN:0 "蒙古国"
 MEN_puppet_form:0 "一个新国家在@JAP日本的帮助下成立"
 MEN_will_be_established_tt:0 "@MEN[MEN.GetNameDef]将被建立。"
 MEX_callistas:0 "卡列斯派"
 MEX_callistas_desc:0 "卡列斯的支持者们一边中饱私囊，一边滥用权力。任人唯亲不唯贤的他们让腐化这个国家的每一个岗位和阶级的政治分赃制度常态化了。只要卡列斯的统治还存在，墨西哥的普通民众仍会继续嘲笑这个政权为“劫匪革命党”。"
 MEX_politicised_army:0 "政治化军队"
 MEX_politicised_army_desc:0 "近三十年以来，墨西哥统治者均是从革命军队的军官中选出的。我们曾经度过的激流岁月也要求我们有稳定的领导层。问题在于：激流岁月是早已离我们远去，还是变得越来越猛烈了呢？我们应该将我们的军队职业化，或允许那些地方实力派，酋长和考迪罗们拥有较小的封邑呢？像圣路易斯波托西的萨图尼诺·塞迪略那样的将军们正在为维护其权力而组建私人武装。如果我们不果断采取行动，过去那些不满军官领导的叛乱就很可能会持续下去。"
 MON:0 "蒙古"
 MON_militant_buddhism_idea:0 "激进佛教"
 MTG_naval_treaty.7.a:0 "我们应该重新考虑是否参与这份条约。"
 MTG_naval_treaty.7.t:0 "[From.GetNameDefCap]废除海军条约"
 MUA_reform:0 "@MEN §Y[MEN.GetNameDef]§!将被@MUA §Y[MUA.GetNameDef]§!取代。\n"
 Machida_Chuji:0 "町田忠治"
 May:0 "5月"
 Moscow_international_research_team:0 "莫斯科国际研究计划"
 NAH:0 "纳瓦民族国"
 NFA_renmin:0 "群众的支持"
 NFA_renmin_desc:0 "人民群众在我们的抗日政策吸引下，纷纷加入我们抗日的队伍中来，现在是时候让侵略者及其走狗陷入人民战争的汪洋大海中了！"
 NO:0 "否"
 NOT_is_socialist_country_tt:0 "当前的执政党不是§Y社会主义§!"
 NSG_establish_tt:0 "@NSG§Y[NSG.GetName]§!将被建立。\n"
 NXM:0 "宁夏马家军"
 NZL:0 "新西兰"
 Nations_friendly:0 "关系改善"
 Nobuyuki_Abe:0 "阿部信行"
 Norodom_Sihanouk:0 "诺罗敦·西哈努克"
 OCC_JAP_party_democratic:0 "盟军最高司令官总司令部"
 OCC_JAP_party_democratic_long:0 "盟军最高司令官总司令部"
 OR:0 "或"
 OWNER:0 "地区拥有国"
 PER:0 "伊朗"
 PHI:0 "菲律宾"
 PHI_align_with_japan:0 "与日本结盟"
 PHI_align_with_japan_desc:0 "尽管美国姿态良好，但他们仍是殖民统治者，随时可能背弃对我们的承诺。因此，在国际舞台上寻找新朋友才是明智之举，而目前来看，日本是最理智的选择。"
 PHI_declare_military_emergency:0 "宣布军事紧急状态"
 PHI_declare_military_emergency_desc:0 "这个国家正滑向法西斯主义的深渊，但果断的行动阻止了最终的坠落。显然，现在威胁无处不在，阻止这些威胁是我们的责任。没有什么不可为，没有什么不合法。民主必须存续下去。"
 PLM_altanochir:0 "阿拉坦鄂齐尔"
 PLM_bai_haifeng:0 "白海风"
 PLM_chahar_mon_neutrality_party:0 "察哈尔蒙政会"
 PLM_chahar_mon_neutrality_party_long:0 "察哈尔省境内蒙古各盟旗群地方自治政务委员会"
 PLM_political_effort_decision:0 "绥远蒙古政务委员会"
 PLM_political_effort_decision_desc:0 "现在委员会内部的敌对派系已经退出了，是时候将委员会重组为更稳定的，更重要的，更高效的机构了。"
 PLM_prince_demchugdongrub:0 "德穆楚克栋鲁普亲王"
 PLM_zhu_shifu:0 "朱实夫"
 POLITICS_DEMCHUGDONGRUB_DESC:0 "§L世人应当如何称呼德穆楚克栋鲁普王？蒙古的英雄？中华民族的叛徒？1902年，德王生于苏尼特右旗，是黄金家族第三十一代传人，那木济勒旺楚克亲王的独子。六年后，德王经爱新觉罗皇室批准，承袭了父亲的郡王头衔，又被灌输了中华文化的精粹。古今中外的各色历史人物中，德王最崇拜的便是自己的祖先——成吉思汗。此后，他一生都在追求成吉思汗的遗产。\n\n1931年，德王继任锡林郭勒盟长。茫茫蒙古草原，此时仿佛换了人间：大清帝国灭亡，以北洋政府为中央的中华民国取而代之，却在俄国的阴谋策应下丢失了外蒙古。时逢乱世，德王决定趁此机会搏上一把。后来的九一八事变让德王利用南京的恐惧发起泛蒙古自治运动。谈判最终由于蒋介石及其追随势力的大汉族主义而破裂。蒙古独立建国的强烈愿望，驱使德王采用了最后的手段——向关东军求助，即使他很清楚关东军笑里藏刀的真面目。\n\n多年的奋战，部分实现了德王的梦想。大东亚战争九年后，蒙古自治政府消灭了苏联傀儡势力，并在西伯利亚干涉之后收复了失地。尽管他取得了丰功伟绩，但蒙古尚未统一，更遑论独立了。法理上，蒙疆仍然是汪精卫及其走狗的附庸；实际上，蒙疆也仅仅是关东军的封地。东蒙古的土地仍被满洲控制，外蒙古的抵抗搅得亲王寝食难安。\n\n有人将他鄙弃为羞辱了成吉思汗灵魂的叛徒，也有人批判他是一个做春秋大梦的附庸暴发户。对于这些评价，德王心里反而不无同感。可他绝不愿追随前宗主溥仪的脚步，甘做日本的傀儡。南京政府公布现代化计划后，德王警惕地发觉，革命的风暴即将重临大东亚。或许现在就是他证明自己不辱成吉思汗后裔之名的最后关头，从压迫者手中解放蒙古的最后机会。§"
 POLITICS_SOKOLOVKSY_DESC:0 "§Y苏联的元帅§!\n1941年莫斯科战役期间，瓦西里·索科洛夫斯基元帅声名显赫。从那里开始，他在余下的战争中占据了重要的指挥位置，并帮助策划了许多成功的行动，包括柏林战役。1946年，索科洛夫斯基领导了苏联在德国的军事当局，帮助监督德意志统一社会党作为苏联控制的德国的主要共产党的发展。1948年，索科洛夫斯基退出盟军控制委员会，有效地结束了在德国占领问题上的相互合作。这加剧了苏联与西方的前战时盟友之间的紧张关系。索科洛夫斯基仍然抵抗任何明显的盟军干涉，并监督当地共产主义在他的领土上的持续发展。"
