l_simp_chinese:
 PRC_wayaobaohuiyi_end:0 "瓦窑堡会议的闭幕"
 PRC_wayaobaohuiyi_end_desc:0 "六届中央政治局于1935年12月17日至25日在陕北安定县瓦窑堡举行扩大会议。这次会议是根据共产国际七大的决议，在抗日救亡运动重新高涨的形势下，亟需制定新的战略策略的情况下召开的。会议由总书记张闻天同志主持，与会者有毛泽东、周恩来、博古、李维汉、王稼祥、刘少奇、邓发、凯丰、林育英、邓颖超、吴亮平、郭洪涛等十余人，共产国际军事顾问李德也参加了会议。"
 PRC_wayaobaohuiyi_end_tt:0 "§C凛冬已至，冰凌垂挂，春天可期。§!"
 PRC_East_conquest:0 "东征"
 PRC_East_conquest_desc:0 "几乎所有人都不同意出征晋系军阀。但只有我们知道，单靠刘志丹同志打下来的陕北六县是不论如何也容纳不下数额庞大的红军大部队的……那么，向东看会是一个不错的选择，山西地主豪强连阡累陌，绝对能解红军燃眉之急。也许东边的阎锡山与红军没有什么仇恨，但他很快就有了。"
 border_war_SHX_tt:0 "开启与§Y[SHX.GetName]§!边境战争。"
 PRC_Western_expedition:0 "西征"
 PRC_Western_expedition_desc:0 "如今红军四面八方都是敌人，等到他们反应过来时肯定会逐渐包围上来。与其坐以待毙，倒不如主动出击寻找突破点——这个突破点就是仍然在长征路上的红二方面军和红四方面军。如果中央红军能够提前打通西边的道路，甚至开辟一片苏区，那么三大红军主力很快就能在甘肃会师，然后执行我们后一阶段的战略任务。"
 PRC_huininghuishi:0 "会宁会师"
 PRC_huininghuishi_desc:0 "万里征程入陕边，梁坡沟坎溢霞胭。\n从而红带黄原系，更使芒苗石洞燃。\n艳日升腾苏大地，赤旗漫卷指峰巅。\n三军聚力铸长剑，小镇因名得世传。"
 PRC_huininghuishi_zidong:0 "§C该国策将在固定时间自动完成§!"
 PRC_chongshensandajilv:0 "重申三大纪律八项注意"
 PRC_chongshensandajilv_desc:0 "行动听指挥、不拿群众一针一线、一切缴获要归公，这是我们纪律建设的基本原则，也是我们人民军队区别于一切旧式军队的显著标志。"
 PRC_kuodaxuanchuan:0 "扩大红军宣传队"
 PRC_kuodaxuanchuan_desc:0 "1928年5月，中国工农革命军第4军正式将宣传队纳编。同年11月，中国共产党红军第4军第六次代表大会通过的决议案，要求“连上须组织三人以上宣传队，战时、平常不断地作宣传工作”。1929年12月，古田会议决议明确规定了宣传队在红军建设中的重要地位作用、组织构成和工作的方式、方法，还规定要运用一些文艺形式服务士兵的政治训练。"
 PRC_baoweiweiyuanhui:0 "成立中央特别工作委员会"
 PRC_baoweiweiyuanhui_desc:0 "1937年12月，中共中央成立“中央特别工作委员会”，对外称“敌区工作委员会”，主任周恩来、副主任林育英，取代原有的政治保卫局统管全党的情报、保卫工作。"
 tzxx_PRC_Reorganize_Sixth_Intelligence:0 "扩大军委二局"
 tzxx_PRC_Reorganize_Sixth_Intelligence_desc:0 "二局，是红军成功走完长征的关键性力量之一。有我们专业收集情报的同志在，国民党的一举一动都在我们的监视之中。他们互相来往的密电不过是二局同志们眼里的明码罢了！"
 PRC_shehuibu:0 "成立中央社会部"
 PRC_shehuibu_desc:0 "1939年2月，中央保卫委员会和中央敌区工作委员会合并，组成中央社会部，对内称“中央情报部”，对外仍是用“中央敌区工作委员会”。部长康生，副部长李克农、孔原、潘汉年。从这时起直至新中国成立，中央社会部一直承担党的情报工作职能。"
 PRC_kangda_focus:0 "中国人民抗日军事政治大学"
 PRC_kangda_focus_desc:0 "1937年1月中国人民抗日红军大学改名为中国人民抗日军事政治大学，校址迁往陕西延安。抗大的学员以部队中的红军干部以及来自全国各地的知识青年为主。学校坚持“团结、紧张、严肃、活泼”的校风，以强调理论联系实际的教学方法，以注重思想政治教育为特色的教育内容，培养抗日干部。"
 PRC_jiesuo_qianghuaxietong:0 "解锁指挥官技能 £GFX_ability_PRC_Synergy §Y强化协同§!"
 PRC_huifuguominjingji:0 "恢复国民经济"
 PRC_huifuguominjingji_desc:0 "旧中国的经济本来就已经极其落后，日本帝国主义侵华战争和国民党反动派反人民战争更使它遭到严重的破坏，集中力量恢复国民经济成为摆在党和人民面前的紧迫任务。党和政府按照“公私兼顾、劳资两利、城乡互助、内外交流”的基本方针，全力恢复国民经济。"
 PRC_Five_year_plans_of_China:0 "一五计划"
 PRC_Five_year_plans_of_China_desc:0 "根据党在过渡时期总路线的要求，“一五”计划将集中主要力量进行以苏联帮助我国设计的156个建设项目为中心、由694个大中型建设项目组成的工业建设，建立我国的社会主义工业化的初步基础；发展部分集体所有制的农业生产合作社以建立对农业和手工业社会主义改造的基础；基本上把资本主义工商业分别纳入各种形式的国家资本主义的轨道以建立对私营工商业社会主义改造的基础。"
 a_fraction_of_forces_will_desert_tt:0 "§C一小部分部队将叛逃到@PRC[Root.GetName].§!\n"
 PRC_End_of_Long_March:0 "苏区会议"
 PRC_End_of_Long_March_desc:0 "王明带着共产国际的指示和陈云、康生从莫斯科回来了。现在应召开中央政治局会议，向党的主要成员通报莫斯科的意图和指导。"
 PRC_6th_plenary_session_of_the_6th_CPC_central_committee_focus:0 "第六届六中全会[global.GetCPC]中央委员会"
 PRC_6th_plenary_session_of_the_6th_CPC_central_committee_focus_desc:0 "为巩固[GetCPC]对当前形势下的抗日斗争的认识，明确党的基本方针和任务，纠正右倾投降主义的错误，明确党在民族战争中的地位，以争取抗日战争的胜利。我们召开了中国共产党第六届中央委员会第六次全体会议来商讨和解决这些问题。"
 PRC_enlarged_central_politburo_conference_focus:0 "中央政治局扩大会议"
 PRC_enlarged_central_politburo_conference_focus_desc:0 "中共中央政治局扩大会议召开。参加会议的政治局委员和候补委员有：毛泽东、周恩来、朱德、张闻天、陈云、康生、王明、任弼时、刘少奇、王稼祥、彭德怀、博古、邓发、凯丰。参加会议的还有李富春、杨尚昆、李维汉、陈伯达、高岗、林伯渠、叶剑英、王若飞、彭真等120多名高级领导干部。共举行了5次会议，集中讨论了党在土地革命战争后期开始的中共临时中央的领导路线问题。"
 PRC_contact_Zhang_Xueliang_focus:0 "肤施会谈"
 PRC_contact_Zhang_Xueliang_focus_desc:0 "自从1935年秋天东北军调入西北与我们交战以来，多次被我们成编制地伏击歼灭，士气低迷。《八一宣言》发表后，张学良有过联合抗日的表态，或许我们可以派遣此前俘获的东北军团长高福源前往接触。"
 PRC_Red_Army_Recovery:0 "星星之火，可以燎原"
 PRC_Red_Army_Recovery_desc:0 "中国是一个落后的半封建半殖民地国家，我们的革命力量现在是弱的，但是立足于落后社会上的反动阶级也是弱的。现在虽只有一点小小的力量，但它的发展会是很快的。它是站在海岸遥望海中已经看得见桅杆尖头了的一只航船，它是立于高山之巅远看东方已见光芒四射喷薄欲出的一轮朝日，它是躁动于母腹中的快要成熟了的一个婴儿。"
 PRC_Join_the_war:0 "洛川会议"
 PRC_Join_the_war_desc:0 "六届中央政治局于1937年8月22日至25日在陕北洛川冯家村召开扩大会议，讨论制定动员全国军民开展民族解放战争，实行全面持久抗战的方针，进一步确定在抗日战争时期的任务及各项政策。会议由总书记张闻天主持，出席者有毛泽东、周恩来、博古、朱德、张国焘、任弼时、彭德怀等22人。"
 PRC_Join_the_war_tt_zz:0 "§C共产党员及其所领导的民众和武装力量，应该最积极地站在斗争的最前线，应该使自己成为全国抗战的核心，应该用极大力量发展抗日的群众运动。不放松一刻工夫一个机会去宣传群众，组织群众，武装群众。只要真能组织千百万群众进入民族统一战线，抗日战争的胜利是无疑义的。§!"
 chinese_sov_rep_dissolves:0 "\n@PRC §Y[PRC.GetNameDef]§!将被解散，取而代之的是§Y陝甘宁边区§!。\n"
 PRC_partisan_offensive:0 "开辟敌后战场"
 PRC_partisan_offensive_desc:0 "随着正面战场的战线向中国腹地推进，日军后方的占领区非常利于我们渗透。趁着日军主力与国民党军交战、日占区留守兵力分散，我们可以伺机派遣游击队深入敌后以缓解正面战场的巨大压力。"
 PRC_Confrontation_Focus:0 "抗战动员"
 PRC_Confrontation_Focus_desc:0 "决定中华民族生死存亡的抗日战争已经开始，我们需要在党、政、军中组织抗日动员，明确我们反抗日本帝国主义侵略的任务，以及赢得民族革命战争最终胜利的伟大目标。"
 PRC_for_china:0 "党员先锋模范作用"
 PRC_for_china_desc:0 "我们的共产党和共产党所领导的八路军、新四军，是革命的队伍。我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。人总是要死的，但死的意义有不同。人固有一死，或重于泰山，或轻于鸿毛。为人民利益而死，就比泰山还重。替法西斯卖力，替剥削人民和压迫人民的人去死，就比鸿毛还轻。"
 PRC_Japan_war_focus:0 "百团大战"
 PRC_Japan_war_focus_desc:0 "有消息称国民政府正在与日本进行谈判，而日军近来的动向也让人担心，他们可能向陕北进攻；另外，近两年来日军在华北依托交通线进行的扫荡使得各地驻军力量分散，此时发动一场大规模攻势，破坏华北的正太铁路，可以有效缓解眼前的危机。"
 PRC_Breaking_operations:0 "推广铁道游击队经验"
 PRC_Breaking_operations_desc:0 "铁道游击队是活跃在山东鲁南地区的一支抗日武装，受八路军苏鲁支队命令成立，成立时称“鲁南军区铁道大队”。人员最多时达300余人，由苏鲁支队任命洪振海为铁道游击队队长。铁道队以抱犊崮山区抗日根据地为依托，以临城为中心，紧紧依靠枣庄地区人民群众，主要战斗在铁路支线临城-枣庄段、枣庄-台儿庄段，津浦铁路干线的韩庄-兖州段、兖州-徐州段，驰骋在运河两岸和微山湖区。"
 PRC_Breaking_operations_tt:0 "这将使§C游击队攻势§!的§Y建筑破坏§!效果§G增加两倍§!；§Y游击队攻势§!人员杀伤效果§G增加5%§!\n"
 PRC_Breaking_operations_tt_aazz:0 "§C西边的太阳就要落山了\n\n微山湖上静悄悄\n\n弹起我心爱的土琵琶\n\n唱起那动人的歌谣\n\n爬上飞快的火车\n\n像骑上奔驰的骏马\n\n车站和铁道线上\n\n是我们杀敌的好战场\n\n我们扒飞车那个搞机枪\n\n撞火车那个炸桥梁\n\n就像钢刀插入敌胸膛\n\n打得鬼子魂飞胆丧\n\n西边的太阳就要落山了\n\n鬼子的末日就要来到\n\n弹起我心爱的土琵琶\n\n唱起那动人的歌谣§!"
 PRC_mobile_warfare:0 "运动战"
 PRC_mobile_warfare_desc:0 "运动战是中国共产党领导下的人民军队的传统战法，随着中国革命战争的形势变化而发展变化。抗日战争时期，八路军、新四军贯彻“基本的是游击战，但不放松有利条件下的运动战”的方针，在广泛开展游击战的同时，进行了一些团、师（旅）规模的运动战，以袭击、伏击、分进合击等战法消灭敌人，对打退敌人多路围攻，实现战略上的持久战起到了决定性的作用。"
 PRC_Breaking_operations_2_tt:0 "这将使§C游击队攻势§!的§Y建筑破坏§!效果§G增加一倍§!；§Y游击队攻势§!人员杀伤效果§G增加10%§!\n"
 PRC_jinzhuyanan:0 "转移中央机关驻地至延安"
 PRC_jinzhuyanan_desc:0 "瓦窑堡虽然地段隐蔽，但交通这方面上终究不太方便。如今东北军已经把延安让了出来，是时候把党中央和中央书记处搬到延安了。延安在陕北根据地的中心位置，她的影响力足以辐射整个陕北，加强我们对根据地的控制力。"
 PRC_jinzhuyanan_tt:0 "§C夕阳照耀着山头的塔影\n\n月色映照着河边的流萤\n\n春风吹遍了坦平的原野\n\n群山结成了坚固的围屏\n\n啊延安\n\n你这庄严雄伟的古城\n\n到处传遍了抗战的歌声\n\n啊延安\n\n你这庄严雄伟的古城\n\n热血在你胸中奔腾\n\n千万颗青年的心\n\n埋藏着对敌人的仇恨\n\n在山野田间长长的行列\n\n结成了坚固的阵线\n\n看群众已抬起了头\n\n看群众已扬起了手\n\n无数的人和无数的心\n\n发出了对敌人的怒吼\n\n士兵瞄准了枪口\n\n准备和敌人搏斗\n\n啊延安\n\n你这庄严雄伟的城墙\n\n筑成坚固的抗日的阵线\n\n你的名字将万古流芳\n\n在历史上灿烂辉煌§!"
 PRC_daxibeilianmeng:0 "大西北联盟"
 PRC_daxibeilianmeng_desc:0 "张学良将军已经同意和我们联合，现在我们的西北大联合计划可以正式开始实施了。"
 PRC_reshuffle_soviet_government:0 "改组苏维埃政权"
 PRC_reshuffle_soviet_government_desc:0 "中共中央召开政治局扩大会议，决定改组苏维埃政权，成立由毛泽东、周恩来、王稼祥组成的新“三人团”，又称“三人军事指挥小组”、“三人指挥小组”，集中领导军事，加强作战统一指挥。新“三人团”是代表党中央领导军委工作的最重要的领导机构，是全权指挥军事的统帅部。"
 prc_pipanzhangguotao:0 "批判张国焘"
 prc_pipanzhangguotao_desc:0 "张国焘犯了严重的分裂主义、军阀主义错误，他反对中央北上的决定，率部南下川康，在卓木碉宣布另立“中央”。他的行为严重危害党内团结，为了教育和挽救他，中央将对其进行批判，纠正这些错误。"
 PRC_Peasant_class:0 "解决农民土地问题"
 PRC_Peasant_class_desc:0 "南方地区之前在我党的领导下，农民运动迅速发展起来，广大贫苦农民向封建地主、土豪劣绅展开各种斗争，从根本上动摇了国民党的反动统治‌。我们应该继续实行争取农民的政策，因此本月中央政府颁布“土地法令”，境内各县在“给地、富以生活出路”的口号下，进一步平分土地，做到耕者有其田，农民生活如有所靠。土地部长王观澜率工作团将到农村地区调查土地改革情况。"
 PRC_Land_reform:0 "继续推进土地改革"
 PRC_Land_reform_desc:0 "为建立抗日民族统一战线，抗日民主政权规定：在未实行土改的地区，允许地主出租土地，但原则上须按照战前的原租额减低百分之二十五；承认战前的借贷关系，但年利息一般不得超过一分半，如债务人付息已超过原本一倍者，停利还本，如付息已超过原本两倍者，本利停付，原借贷关系视为消灭。这是减轻农民所受地租和高利贷剥削但是不改变地主土地所有制的一种土地政策。"
 PRC_Developing_Focus:0 "巩固陕甘宁根据地"
 PRC_Developing_Focus_desc:0 "如今我们已经能在陕甘宁地区站稳脚跟。万丈高楼平地起，不管我们的目光看向这个世界上哪一处远方，脚下踏着的依旧是这一块可爱的土地。"
 PRC_Establish_traffic_network:0 "修缮黄河水利"
 PRC_Establish_traffic_network_desc:0 "黄河母亲在滋养了数千万上亿人的同时也给两岸的人民群众带来沉重的灾难。如今我们的根据地处于黄河周边，我们可以动员人民群众修缮陕北沿线的水利工程。"
 PRC_Expand_production:0 "建设小作坊"
 PRC_Expand_production_desc:0 "小作坊、小工厂，这些都是我们可以发展的地方，如果能将他们组织起来，并且扩大数量和规模，我们就可以进一步改善我们的工农业产出状况。"
 PRC_Soviet_armed:0 "苏联军援"
 PRC_Soviet_armed_desc:0 "在国共两党达成合作后，苏联此前承诺的军援终于得以途经西北地区各军阀的领地送抵[Root.Capital.GetName]。"
 PRC_Weapon_production:0 "成立军事工业局"
 PRC_Weapon_production_desc:0 "抗日战争爆发后，党中央对军工生产日益重视。为发展我军军事工业，1938年3月10日，中央军委决定成立军事工业局，任命军委参谋长滕代远兼任局长，任务是统一领导我军的兵工生产。"
 PRC_West_road_army_victory:0 "打通国际路线"
 PRC_West_road_army_victory_desc:0 "中共中央政治局召开的瓦窑堡会议审议通过了由毛泽东起草的《中央关于军事战略问题的决议》，第一方面军行动部署之基础，应确定地放在“打通苏联”与“巩固扩大现有苏区”这两个任务之上，并把“打通苏联”作为中心任务。"
 PRC_GongDeLin:0 "功德林改造"
 PRC_GongDeLin_desc:0 "功德林，即北京战犯管理所，是新中国成立之初，用来关押国民党战犯的专用监狱。中央政府决定对国民党战犯采取不审不判、不歧视人格、集中改造的方针，表现良好，积极承认错误的将会得到特赦。关押的100多名高级战犯共分为13个小组。一组组长为邱行湘，组员有杜聿明、宋希濂、康泽、王陵基、范汉杰、廖耀湘等人。这里关押的战犯还有黄维、陈长捷、沈醉等人。"
 PRC_zaicisufan:0 "肃反运动"
 PRC_zaicisufan_desc:0 "中央里，军队里还是很多人不听从张国焘同志的命令，这样下去我们迟早会再次走向分裂，也许我们可以重复一遍当年在鄂豫皖做过的事情？"
 PRC_nanxia:0 "重提南下路线"
 PRC_nanxia_desc:0 "张国焘同志的南下方针以百丈关战役的失败而告终，这个仇恨我们没有忘记，现在党内有人提议重启南下的计划，这不仅可以扩大我们的根据地，还可以进一步巩固我们在党内的权威。"
 PRC_grand_northwest_alliance_focus:0 "三位一体计划"
 PRC_grand_northwest_alliance_focus_desc:0 "如果东北军、第十七路军和红军能够联合起来，形成三位一体的格局，将是中国西北一支不可小觑的力量。我们可以全面开展对东北军的统战工作，为这项计划做准备。"
 PRC_dispatch_ren_bishi_to_moscow_focus:0 "派遣任弼时前往莫斯科"
 PRC_dispatch_ren_bishi_to_moscow_focus_desc:0 "为报告第二次国共合作，遏制右倾错误日益增长的影响力，任弼时同志将作为代表团赴[SOV.GetName]拜会共产国际领导人格奥尔基·季米特洛夫 . 这反过来又可以给已经在[SOV.GetName]中待了一段时间的王稼祥一个回归并传达共产国际正确指示和纠正错误的机会。"
 PRC_finish_off_the_ma_cliques_focus:0 "终结马家军"
 PRC_finish_off_the_ma_cliques_focus_desc:0 "既然已经完成了西征的战争目标，我们就可以着手清除周边地区的军阀残余了。"
 PRC_challenge_the_first_red_army_focus:0 "挑战红一军"
 PRC_challenge_the_first_red_army_focus_desc:0 "中央红军的错误领导，是造成瑞金陷落和长征损失惨重的直接原因； 在张国焘、陈昌浩、徐向前等同志的伟大领导下，我们以闪电般的清洗扫荡中央的机会主义和逃避主义。 革命万岁！"
 PRC_request_supply_from_the_soviet_union_focus:0 "向[SOV.GetName]请求援助"
 PRC_request_supply_from_the_soviet_union_focus_desc:0 "鑑于他与南京政府的关系，[SOV.GetLeader]不希望较弱的[GetCPC]与国民党之间发生更多的正面冲突，并且对向[GetCPC]提供直接武器支持持谨慎态度 - 尽管武器援助将是秘密穿越新疆且数量可观的。"
 PRC_oppose_the_central_government:0 "对抗中央政府"
 PRC_oppose_the_central_government_desc:0 "现在，在大西北联盟反对蒋的倡议之后，我们与中央政府的关系已经开始变差。 可能是时候召集我们在西北的盟友，与中央政府展开政治斗争了。"