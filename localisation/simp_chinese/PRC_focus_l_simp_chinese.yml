 PRC_Output_revolution:0 "两个拳头同时出击"
 PRC_Output_revolution_desc:0 "全世界人民团结起来，打倒所有压迫世界人民的帝国主义国家！"

 PRC_attack_SOV_revisionism:0 "修正主义的末日"
 PRC_attack_SOV_revisionism_desc:0 "苏联在修正主义的荼毒下已经成为了一个“堕落的工人国家”，我们绝不能让修正主义的歪风邪气继续毒害苏联的无产阶级同胞。"

 PRC_diguozhuyixuanzhan:0 "帝国主义的末日"
 PRC_diguozhuyixuanzhan_desc:0 "帝国主义与殖民扩张是资本主义晚期阶段的重要组成部分。不过，被奴役的百万群众为我们提供了可以轻松利用的巨大的革命契机。这些殖民帝国的广大受压迫人民渴望自由——我们将打破奴役他们的锁链。"
 PRC_diguozhuyixuanzhan_tt:0 "§C获得针对所有帝国主义国家的解放战争目标§!"

 PRC_internationalist_clique_focus:0 "世界人民大团结万岁"
 PRC_internationalist_clique_focus_desc:0 "人最宝贵的是生命，生命属于人只有一次人。人的一生应当这样度过：当他回首往事的时候，不会因为碌碌无为，虚度年华而悔恨，也不会因为为人卑劣，生活庸俗而愧疚。这样，在临终的时候，他能够说：“我已把自己的整个的生命和全部的精力献给了世界上最壮丽的事业———为全人类的解放而斗争”。"

