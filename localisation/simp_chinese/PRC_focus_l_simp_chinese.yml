l_simp_chinese:
 PRC_wayaobaohuiyi_end:0 "瓦窑堡会议的闭幕"
 PRC_wayaobaohuiyi_end_desc:0 "六届中央政治局于1935年12月17日至25日在陕北安定县瓦窑堡举行扩大会议。这次会议是根据共产国际七大的决议，在抗日救亡运动重新高涨的形势下，亟需制定新的战略策略的情况下召开的。会议由总书记张闻天同志主持，与会者有毛泽东、周恩来、博古、李维汉、王稼祥、刘少奇、邓发、凯丰、林育英、邓颖超、吴亮平、郭洪涛等十余人，共产国际军事顾问李德也参加了会议。"
 PRC_wayaobaohuiyi_end_tt:0 "§C凛冬已至，冰凌垂挂，春天可期。§!"

 PRC_East_conquest:0 "东征"
 PRC_East_conquest_desc:0 "几乎所有人都不同意出征晋系军阀。但只有我们知道，单靠刘志丹同志打下来的陕北六县是不论如何也容纳不下数额庞大的红军大部队的……那么，向东看会是一个不错的选择，山西地主豪强连阡累陌，绝对能解红军燃眉之急。也许东边的阎锡山与红军没有什么仇恨，但他很快就有了。"
 border_war_SHX_tt:0 "开启与§Y[SHX.GetName]§!边境战争。"
 when_war_is_declared_tt:0 "§R宣战时：\n§!"

 tzxx_PRC_eastern_Expedition:0 "乘胜追击"
 tzxx_PRC_eastern_Expedition_desc:0 "阎老西自以为他那“黄河天堑”和“坚固防线”能够挡住红军的进攻，但很可惜让他失望了，我军趁敌人不备，成功利用机动优势将敌人玩弄于股掌之中，吕梁城已经在我们的手里了！但是红军的脚步绝不会就此停下，接下来，我们的目光便不由自主地投向阎锡山的老巢——太原。"
 tzxx_PRC_eastern_Expedition_flag:0 "已开始执行东征战役第二阶段"

 PRC_Western_expedition:0 "西征"
 PRC_Western_expedition_desc:0 "如今红军四面八方都是敌人，等到他们反应过来时肯定会逐渐包围上来。与其坐以待毙，倒不如主动出击寻找突破点——这个突破点就是仍然在长征路上的红二方面军和红四方面军。如果中央红军能够提前打通西边的道路，甚至开辟一片苏区，那么三大红军主力很快就能在甘肃会师，然后执行我们后一阶段的战略任务。"

 PRC_huininghuishi:0 "会宁会师"
 PRC_huininghuishi_desc:0 "万里征程入陕边，梁坡沟坎溢霞胭。\n从而红带黄原系，更使芒苗石洞燃。\n艳日升腾苏大地，赤旗漫卷指峰巅。\n三军聚力铸长剑，小镇因名得世传。"

 PRC_Red_Army:0 "重振红军"
 PRC_Red_Army_desc:0 "红军经过二万五千里长征后，如今我们身边只剩下几支“残兵败将”，或许他们都是铁打的人，可终归是人……这些健儿不论损失哪怕一个都会让众人心情沉重，我们已经无法承担失去战友的代价了。如今红军三大主力已经胜利会师，陕甘苏区就在脚下。现在，我们不允许有任何一个同志倒在革命胜利的前夜。"
 PRC_jiesuo_qiangxingjun:0 "解锁指挥官技能 £GFX_ability_PRC_Forced_March §Y强行军§! "
 PRC_huininghuishi_zidong:0 "§C该国策将在固定时间自动完成§!"

 PRC_chongshensandajilv:0 "重申三大纪律八项注意"
 PRC_chongshensandajilv_desc:0 "行动听指挥、不拿群众一针一线、一切缴获要归公，这是我们纪律建设的基本原则，也是我们人民军队区别于一切旧式军队的显著标志。"

 PRC_kuodaxuanchuan:0 "扩大红军宣传队"
 PRC_kuodaxuanchuan_desc:0 "1928年5月，中国工农革命军第4军正式将宣传队纳编。同年11月，中国共产党红军第4军第六次代表大会通过的决议案，要求“连上须组织三人以上宣传队，战时、平常不断地作宣传工作”。1929年12月，古田会议决议明确规定了宣传队在红军建设中的重要地位作用、组织构成和工作的方式、方法，还规定要运用一些文艺形式服务士兵的政治训练。"
 allows_direct_boost_of_ideology:0 "§O允许直接煽动反对中央政府的意识形态。\n\n当政治协商会议能达成联合政府时，若中央政府中共产主义支持度越高将越易发动无血政变，会议将在抗日战争结束后举行。§!"

 PRC_baoweiweiyuanhui:0 "成立中央特别工作委员会"
 PRC_baoweiweiyuanhui_desc:0 "1937年12月，中共中央成立“中央特别工作委员会”，对外称“敌区工作委员会”，主任周恩来、副主任林育英，取代原有的政治保卫局统管全党的情报、保卫工作。"

 tzxx_PRC_Reorganize_Sixth_Intelligence:0 "扩大军委二局"
 tzxx_PRC_Reorganize_Sixth_Intelligence_desc:0 "二局，是红军成功走完长征的关键性力量之一。有我们专业收集情报的同志在，国民党的一举一动都在我们的监视之中。他们互相来往的密电不过是二局同志们眼里的明码罢了！"

 PRC_shehuibu:0 "成立中央社会部"
 PRC_shehuibu_desc:0 "1939年2月，中央保卫委员会和中央敌区工作委员会合并，组成中央社会部，对内称“中央情报部”，对外仍是用“中央敌区工作委员会”。部长康生，副部长李克农、孔原、潘汉年。从这时起直至新中国成立，中央社会部一直承担党的情报工作职能。"

 PRC_kangda_focus:0 "中国人民抗日军事政治大学"
 PRC_kangda_focus_desc:0 "1937年1月中国人民抗日红军大学改名为中国人民抗日军事政治大学，校址迁往陕西延安。抗大的学员以部队中的红军干部以及来自全国各地的知识青年为主。学校坚持“团结、紧张、严肃、活泼”的校风，以强调理论联系实际的教学方法，以注重思想政治教育为特色的教育内容，培养抗日干部。"
 PRC_jiesuo_qianghuaxietong:0 "解锁指挥官技能 £GFX_ability_PRC_Synergy §Y强化协同§!"

 PRC_huifuguominjingji:0 "恢复国民经济"
 PRC_huifuguominjingji_desc:0 "旧中国的经济本来就已经极其落后，日本帝国主义侵华战争和国民党反动派反人民战争更使它遭到严重的破坏，集中力量恢复国民经济成为摆在党和人民面前的紧迫任务。党和政府按照“公私兼顾、劳资两利、城乡互助、内外交流”的基本方针，全力恢复国民经济。"

 PRC_Five_year_plans_of_China:0 "一五计划"
 PRC_Five_year_plans_of_China_desc:0 "根据党在过渡时期总路线的要求，“一五”计划将集中主要力量进行以苏联帮助我国设计的156个建设项目为中心、由694个大中型建设项目组成的工业建设，建立我国的社会主义工业化的初步基础；发展部分集体所有制的农业生产合作社以建立对农业和手工业社会主义改造的基础；基本上把资本主义工商业分别纳入各种形式的国家资本主义的轨道以建立对私营工商业社会主义改造的基础。"
 a_fraction_of_forces_will_desert_tt:0 "§C一小部分部队将叛逃到@PRC[Root.GetName].§!\n"

 PRC_End_of_Long_March:0 "苏区会议"
 PRC_End_of_Long_March_desc:0 "王明带着共产国际的指示和陈云、康生从莫斯科回来了。现在应召开中央政治局会议，向党的主要成员通报莫斯科的意图和指导。"

 PRC_6th_plenary_session_of_the_6th_CPC_central_committee_focus:0 "第六届六中全会[global.GetCPC]中央委员会"
 PRC_6th_plenary_session_of_the_6th_CPC_central_committee_focus_desc:0 "为巩固[GetCPC]对当前形势下的抗日斗争的认识，明确党的基本方针和任务，纠正右倾投降主义的错误，明确党在民族战争中的地位，以争取抗日战争的胜利。我们召开了中国共产党第六届中央委员会第六次全体会议来商讨和解决这些问题。"

 PRC_enlarged_central_politburo_conference_focus:0 "中央政治局扩大会议"
 PRC_enlarged_central_politburo_conference_focus_desc:0 "中共中央政治局扩大会议召开。参加会议的政治局委员和候补委员有：毛泽东、周恩来、朱德、张闻天、陈云、康生、王明、任弼时、刘少奇、王稼祥、彭德怀、博古、邓发、凯丰。参加会议的还有李富春、杨尚昆、李维汉、陈伯达、高岗、林伯渠、叶剑英、王若飞、彭真等120多名高级领导干部。共举行了5次会议，集中讨论了党在土地革命战争后期开始的中共临时中央的领导路线问题。"

 PRC_contact_Zhang_Xueliang_focus:0 "肤施会谈"
 PRC_contact_Zhang_Xueliang_focus_desc:0 "自从1935年秋天东北军调入西北与我们交战以来，多次被我们成编制地伏击歼灭，士气低迷。《八一宣言》发表后，张学良有过联合抗日的表态，或许我们可以派遣此前俘获的东北军团长高福源前往接触。"

 PRC_Red_Army_Recovery:0 "星星之火，可以燎原"
 PRC_Red_Army_Recovery_desc:0 "中国是一个落后的半封建半殖民地国家，我们的革命力量现在是弱的，但是立足于落后社会上的反动阶级也是弱的。现在虽只有一点小小的力量，但它的发展会是很快的。它是站在海岸遥望海中已经看得见桅杆尖头了的一只航船，它是立于高山之巅远看东方已见光芒四射喷薄欲出的一轮朝日，它是躁动于母腹中的快要成熟了的一个婴儿。"
 add_economy_development_index_0.25:0 "§R经济指数§!§G+0.25§!"

 PRC_makeshift_research_facility:0 "中国人民抗日红军大学"
 PRC_makeshift_research_facility_desc:0 "红军到达陕北后仅剩3万人，而且军队干部也损失颇大。为培养补充抗日军政干部，提高红军自身的战略技术水平，1936年6月1日中共中央在陕北安定县瓦窑堡建立了“中国人民抗日红军大学”。同日第一期学员举行开学典礼，毛泽东、张闻天、周恩来等出席开学典礼并讲话。第一科有学员38人，其中比较有名的有罗荣桓、罗瑞卿、谭政、彭雪枫、杨成武等人。这是一个名副其实的“将军科”。"

 PRC_Join_the_war:0 "洛川会议"
 PRC_Join_the_war_desc:0 "六届中央政治局于1937年8月22日至25日在陕北洛川冯家村召开扩大会议，讨论制定动员全国军民开展民族解放战争，实行全面持久抗战的方针，进一步确定在抗日战争时期的任务及各项政策。会议由总书记张闻天主持，出席者有毛泽东、周恩来、博古、朱德、张国焘、任弼时、彭德怀等22人。"
 PRC_linboqu_tt:0 "§O林伯渠成为政府主席§!" 
 PRC_Join_the_war_tt_zz:0 "§C共产党员及其所领导的民众和武装力量，应该最积极地站在斗争的最前线，应该使自己成为全国抗战的核心，应该用极大力量发展抗日的群众运动。不放松一刻工夫一个机会去宣传群众，组织群众，武装群众。只要真能组织千百万群众进入民族统一战线，抗日战争的胜利是无疑义的。§!"
 chinese_sov_rep_dissolves:0 "\n@PRC §Y[PRC.GetNameDef]§!将被解散，取而代之的是§Y陝甘宁边区§!。\n"
 
 PRC_partisan_offensive:0 "开辟敌后战场"
 PRC_partisan_offensive_desc:0 "随着正面战场的战线向中国腹地推进，日军后方的占领区非常利于我们渗透。趁着日军主力与国民党军交战、日占区留守兵力分散，我们可以伺机派遣游击队深入敌后以缓解正面战场的巨大压力。"

 PRC_Confrontation_Focus:0 "抗战动员"
 PRC_Confrontation_Focus_desc:0 "决定中华民族生死存亡的抗日战争已经开始，我们需要在党、政、军中组织抗日动员，明确我们反抗日本帝国主义侵略的任务，以及赢得民族革命战争最终胜利的伟大目标。"

 PRC_for_china:0 "党员先锋模范作用"
 PRC_for_china_desc:0 "我们的共产党和共产党所领导的八路军、新四军，是革命的队伍。我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。人总是要死的，但死的意义有不同。人固有一死，或重于泰山，或轻于鸿毛。为人民利益而死，就比泰山还重。替法西斯卖力，替剥削人民和压迫人民的人去死，就比鸿毛还轻。"

 PRC_Japan_war_focus:0 "百团大战"
 PRC_Japan_war_focus_desc:0 "有消息称国民政府正在与日本进行谈判，而日军近来的动向也让人担心，他们可能向陕北进攻；另外，近两年来日军在华北依托交通线进行的扫荡使得各地驻军力量分散，此时发动一场大规模攻势，破坏华北的正太铁路，可以有效缓解眼前的危机。"

 PRC_Breaking_operations:0 "推广铁道游击队经验"
 PRC_Breaking_operations_desc:0 "铁道游击队是活跃在山东鲁南地区的一支抗日武装，受八路军苏鲁支队命令成立，成立时称“鲁南军区铁道大队”。人员最多时达300余人，由苏鲁支队任命洪振海为铁道游击队队长。铁道队以抱犊崮山区抗日根据地为依托，以临城为中心，紧紧依靠枣庄地区人民群众，主要战斗在铁路支线临城-枣庄段、枣庄-台儿庄段，津浦铁路干线的韩庄-兖州段、兖州-徐州段，驰骋在运河两岸和微山湖区。"
 PRC_Breaking_operations_tt:0 "这将使§C游击队攻势§!的§Y建筑破坏§!效果§G增加两倍§!；§Y游击队攻势§!人员杀伤效果§G增加5%§!\n"
 PRC_Breaking_operations_tt_aazz:0 "§C西边的太阳就要落山了\n\n微山湖上静悄悄\n\n弹起我心爱的土琵琶\n\n唱起那动人的歌谣\n\n爬上飞快的火车\n\n像骑上奔驰的骏马\n\n车站和铁道线上\n\n是我们杀敌的好战场\n\n我们扒飞车那个搞机枪\n\n撞火车那个炸桥梁\n\n就像钢刀插入敌胸膛\n\n打得鬼子魂飞胆丧\n\n西边的太阳就要落山了\n\n鬼子的末日就要来到\n\n弹起我心爱的土琵琶\n\n唱起那动人的歌谣§!"

 PRC_mobile_warfare:0 "运动战"
 PRC_mobile_warfare_desc:0 "运动战是中国共产党领导下的人民军队的传统战法，随着中国革命战争的形势变化而发展变化。抗日战争时期，八路军、新四军贯彻“基本的是游击战，但不放松有利条件下的运动战”的方针，在广泛开展游击战的同时，进行了一些团、师（旅）规模的运动战，以袭击、伏击、分进合击等战法消灭敌人，对打退敌人多路围攻，实现战略上的持久战起到了决定性的作用。"
 PRC_Breaking_operations_2_tt:0 "这将使§C游击队攻势§!的§Y建筑破坏§!效果§G增加一倍§!；§Y游击队攻势§!人员杀伤效果§G增加10%§!\n"

 PRC_jinzhuyanan:0 "转移中央机关驻地至延安"
 PRC_jinzhuyanan_desc:0 "瓦窑堡虽然地段隐蔽，但交通这方面上终究不太方便。如今东北军已经把延安让了出来，是时候把党中央和中央书记处搬到延安了。延安在陕北根据地的中心位置，她的影响力足以辐射整个陕北，加强我们对根据地的控制力。"
 PRC_jinzhuyanan_tt:0 "§C夕阳照耀着山头的塔影\n\n月色映照着河边的流萤\n\n春风吹遍了坦平的原野\n\n群山结成了坚固的围屏\n\n啊延安\n\n你这庄严雄伟的古城\n\n到处传遍了抗战的歌声\n\n啊延安\n\n你这庄严雄伟的古城\n\n热血在你胸中奔腾\n\n千万颗青年的心\n\n埋藏着对敌人的仇恨\n\n在山野田间长长的行列\n\n结成了坚固的阵线\n\n看群众已抬起了头\n\n看群众已扬起了手\n\n无数的人和无数的心\n\n发出了对敌人的怒吼\n\n士兵瞄准了枪口\n\n准备和敌人搏斗\n\n啊延安\n\n你这庄严雄伟的城墙\n\n筑成坚固的抗日的阵线\n\n你的名字将万古流芳\n\n在历史上灿烂辉煌§!"

 PRC_daxibeilianmeng:0 "大西北联盟"
 PRC_daxibeilianmeng_desc:0 "张学良将军已经同意和我们联合，现在我们的西北大联合计划可以正式开始实施了。"

 PRC_reshuffle_soviet_government:0 "改组苏维埃政权"
 PRC_reshuffle_soviet_government_desc:0 "中共中央召开政治局扩大会议，决定改组苏维埃政权，成立由毛泽东、周恩来、王稼祥组成的新“三人团”，又称“三人军事指挥小组”、“三人指挥小组”，集中领导军事，加强作战统一指挥。新“三人团”是代表党中央领导军委工作的最重要的领导机构，是全权指挥军事的统帅部。"

 prc_pipanzhangguotao:0 "批判张国焘"
 prc_pipanzhangguotao_desc:0 "张国焘犯了严重的分裂主义、军阀主义错误，他反对中央北上的决定，率部南下川康，在卓木碉宣布另立“中央”。他的行为严重危害党内团结，为了教育和挽救他，中央将对其进行批判，纠正这些错误。"

 PRC_Peasant_class:0 "解决农民土地问题"
 PRC_Peasant_class_desc:0 "南方地区之前在我党的领导下，农民运动迅速发展起来，广大贫苦农民向封建地主、土豪劣绅展开各种斗争，从根本上动摇了国民党的反动统治‌。我们应该继续实行争取农民的政策，因此本月中央政府颁布“土地法令”，境内各县在“给地、富以生活出路”的口号下，进一步平分土地，做到耕者有其田，农民生活如有所靠。土地部长王观澜率工作团将到农村地区调查土地改革情况。"

 PRC_Land_reform:0 "继续推进土地改革"
 PRC_Land_reform_desc:0 "为建立抗日民族统一战线，抗日民主政权规定：在未实行土改的地区，允许地主出租土地，但原则上须按照战前的原租额减低百分之二十五；承认战前的借贷关系，但年利息一般不得超过一分半，如债务人付息已超过原本一倍者，停利还本，如付息已超过原本两倍者，本利停付，原借贷关系视为消灭。这是减轻农民所受地租和高利贷剥削但是不改变地主土地所有制的一种土地政策。"

 PRC_Developing_Focus:0 "巩固陕甘宁根据地"
 PRC_Developing_Focus_desc:0 "如今我们已经能在陕甘宁地区站稳脚跟。万丈高楼平地起，不管我们的目光看向这个世界上哪一处远方，脚下踏着的依旧是这一块可爱的土地。"

 PRC_Establish_traffic_network:0 "修缮黄河水利"
 PRC_Establish_traffic_network_desc:0 "黄河母亲在滋养了数千万上亿人的同时也给两岸的人民群众带来沉重的灾难。如今我们的根据地处于黄河周边，我们可以动员人民群众修缮陕北沿线的水利工程。"

 PRC_Expand_production:0 "建设小作坊"
 PRC_Expand_production_desc:0 "小作坊、小工厂，这些都是我们可以发展的地方，如果能将他们组织起来，并且扩大数量和规模，我们就可以进一步改善我们的工农业产出状况。"

 PRC_Soviet_armed:0 "苏联军援"
 PRC_Soviet_armed_desc:0 "在国共两党达成合作后，苏联此前承诺的军援终于得以途经西北地区各军阀的领地送抵[Root.Capital.GetName]。"

 PRC_Weapon_production:0 "成立军事工业局"
 PRC_Weapon_production_desc:0 "抗日战争爆发后，党中央对军工生产日益重视。为发展我军军事工业，1938年3月10日，中央军委决定成立军事工业局，任命军委参谋长滕代远兼任局长，任务是统一领导我军的兵工生产。"

 PRC_West_road_army_victory:0 "打通国际路线"
 PRC_West_road_army_victory_desc:0 "中共中央政治局召开的瓦窑堡会议审议通过了由毛泽东起草的《中央关于军事战略问题的决议》，第一方面军行动部署之基础，应确定地放在“打通苏联”与“巩固扩大现有苏区”这两个任务之上，并把“打通苏联”作为中心任务。"

 PRC_GongDeLin:0 "功德林改造"
 PRC_GongDeLin_desc:0 "功德林，即北京战犯管理所，是新中国成立之初，用来关押国民党战犯的专用监狱。中央政府决定对国民党战犯采取不审不判、不歧视人格、集中改造的方针，表现良好，积极承认错误的将会得到特赦。关押的100多名高级战犯共分为13个小组。一组组长为邱行湘，组员有杜聿明、宋希濂、康泽、王陵基、范汉杰、廖耀湘等人。这里关押的战犯还有黄维、陈长捷、沈醉等人。"

 PRC_zaicisufan:0 "肃反运动"
 PRC_zaicisufan_desc:0 "中央里，军队里还是很多人不听从张国焘同志的命令，这样下去我们迟早会再次走向分裂，也许我们可以重复一遍当年在鄂豫皖做过的事情？"
 unlock_PRC_dai_jiying_tt:0 "解锁人物§Y戴季英§"

 PRC_nanxia:0 "重提南下路线"
 PRC_nanxia_desc:0 "张国焘同志的南下方针以百丈关战役的失败而告终，这个仇恨我们没有忘记，现在党内有人提议重启南下的计划，这不仅可以扩大我们的根据地，还可以进一步巩固我们在党内的权威。"

 PRC_grand_northwest_alliance_focus:0 "三位一体计划"
 PRC_grand_northwest_alliance_focus_desc:0 "如果东北军、第十七路军和红军能够联合起来，形成三位一体的格局，将是中国西北一支不可小觑的力量。我们可以全面开展对东北军的统战工作，为这项计划做准备。"

 PRC_dispatch_ren_bishi_to_moscow_focus:0 "派遣任弼时前往莫斯科"
 PRC_dispatch_ren_bishi_to_moscow_focus_desc:0 "为报告第二次国共合作，遏制右倾错误日益增长的影响力，任弼时同志将作为代表团赴[SOV.GetName]拜会共产国际领导人格奥尔基·季米特洛夫 . 这反过来又可以给已经在[SOV.GetName]中待了一段时间的王稼祥一个回归并传达共产国际正确指示和纠正错误的机会。"

 PRC_finish_off_the_ma_cliques_focus:0 "终结马家军"
 PRC_finish_off_the_ma_cliques_focus_desc:0 "既然已经完成了西征的战争目标，我们就可以着手清除周边地区的军阀残余了。"

 PRC_challenge_the_first_red_army_focus:0 "挑战红一军"
 PRC_challenge_the_first_red_army_focus_desc:0 "中央红军的错误领导，是造成瑞金陷落和长征损失惨重的直接原因； 在张国焘、陈昌浩、徐向前等同志的伟大领导下，我们以闪电般的清洗扫荡中央的机会主义和逃避主义。 革命万岁！"

 PRC_request_supply_from_the_soviet_union_focus:0 "向[SOV.GetName]请求援助"
 PRC_request_supply_from_the_soviet_union_focus_desc:0 "鑑于他与南京政府的关系，[SOV.GetLeader]不希望较弱的[GetCPC]与国民党之间发生更多的正面冲突，并且对向[GetCPC]提供直接武器支持持谨慎态度 - 尽管武器援助将是秘密穿越新疆且数量可观的。"

 PRC_oppose_the_central_government:0 "对抗中央政府"
 PRC_oppose_the_central_government_desc:0 "现在，在大西北联盟反对蒋的倡议之后，我们与中央政府的关系已经开始变差。 可能是时候召集我们在西北的盟友，与中央政府展开政治斗争了。"

 PRC_demand_integration_of_sinkiang_focus:0 "要求整合新疆"
 PRC_demand_integration_of_sinkiang_focus_desc:0 "盛世才是一位优秀的共产主义者，曾与莫斯科紧密合作，为[GetCPC]奠定了坚实的革命骨干，我们希望莫斯科按照自古以来的领土主张，同意让新疆加入我们的抗日和反国民党阵线，而不是成为苏联的新苏维埃共和国。"

 PRC_governance_through_presidium_focus:0 "主席团统治"
 PRC_governance_through_presidium_focus_desc:0 "主席团名义上是一个独立于党务的机构，实际上是[GetCPC]在全国的行政权力的体现。 因此，为了改进我们的治理方式，实现这个实施例应该是我们的首要目标。"
 PRC_found_the_military_commission_general_political_department_focus:0 "中共中央革命军事委员会"
 PRC_found_the_military_commission_general_political_department_focus_desc:0 "为确保抗日战争新形势下党对人民军队的绝对领导，1937年8月22日中共中央决定成立中共中央革命军事委员会取代原有的隶属于政府体系的中央革命军事委员会，毛泽东为主席，朱德、周恩来为副主席，毛泽东、朱德、周恩来、彭德怀、任弼时、贺龙、林彪、刘伯承、林育英、叶剑英、徐向前为委员。"

 PRC_great_troskyist_purge_focus:0 "“实践论”与“矛盾论”"
 PRC_great_troskyist_purge_focus_desc:0 "《实践论》与《矛盾论》是毛泽东同志于抗日战争爆发前后这一时间段完成的著作，这两部著作写作的共同目的，是批判和克服党内存在的严重的经验主义特别是教条主义，为中国共产党人正确地领导现代中国的革命提供世界观和方法论的工具。"

 PRC_disrespect_the_united_front_focus:0 "有限的统一战线"
 PRC_disrespect_the_united_front_focus_desc:0 "“发展进步势力，争取中间势力，孤立顽固势力”是毛泽东总结全国抗战以来的国共合作和反摩擦斗争经验，提出的党在抗日民族统一战线中的基本政策。由于日本侵华政策的改变，国民党顽固派开始消极抗日、积极反共，不断制造与我党以及我党所领导的人民军队的摩擦。我们现在的统一战线政策，既不否认联合也不否认斗争，而是综合这两方面的，奉行独立自主，既须统一又须独立。"

 PRC_promote_prolonged_warfare_focus:0 "论持久战"
 PRC_promote_prolonged_warfare_focus_desc:0 "1938年5月毛泽东发表《论持久战》的讲演，系统阐明了持久抗战总方针。指出抗战是中日之间进行的一场决死战争。双方强弱对比决定了抗战只能是持久战。日本发动侵略战争失道寡助；中国进行反侵略战争得道多助。我们有代表民族和人民根本利益的党及其领导的根据地和人民军队。因此最后胜利属于我们。战略相持阶段是取得胜利的关键，中国只要坚持抗战和统一战线将在这时转弱为强。"

 PRC_route_struggle_focus:0 "延安整风"
 PRC_route_struggle_focus_desc:0 "近年来，以王明等部分同志为代表的“主观主义”、“宗派主义”和“教条主义”的错误思想令党和人民蒙受了巨大的损失，前不久发生的皖南事变就是最好的证明。然而这些错误思想在今天仍未得到批判和纠正，甚至有愈演愈烈的态势，因此毛泽东同志认为在全党上下开展一次大规模的思想整风运动已是迫在眉睫。"

 PRC_demand_another_politburo_meeting_focus:0 "要求召开另一场中央政治局会议"
 PRC_demand_another_politburo_meeting_focus_desc:0 "鉴于对日抗战仍在继续，应再次召开政治局会议，强调巩固统一战线的重要性，并遵循共产国际的指示。 毛泽东和他的分裂言论也应该受到挑战！"

 PRC_expand_changjiang_bureau_focus:0 "扩大长江局"
 PRC_expand_changjiang_bureau_focus_desc:0 "长江局是[GetCPC]在华南地区开展抗日工作的最重要机构之一。 通过扩大局，我们得以加强对南方各省的[GetCPC]部队的领导，在敌后发动了更广泛的动员和拯救运动。"

 PRC_question_of_chen_duxiu_focus:0 "陈独秀问题"
 PRC_question_of_chen_duxiu_focus_desc:0 "陈独秀是中国共产党的早期领导人，但他在1927年投降的错误几乎导致了我们的彻底灭亡，并且一再拒绝谴责托洛茨基主义。 然而，他终究还是中国共产党的创始人。 我们应该重新邀请他回来吗？ 如果是这样，我们该付出什么代价？"

 PRC_minority_faction_focus:0 "次要派系"
 PRC_minority_faction_focus_desc:0 "以王凡西、郑超麟为首的托运少数派原本是中国共产主义同盟的一部分，但由于国际化倾向最终与他们分道扬镳，说实话，这未必是一个坏主意。"

 PRC_majority_faction_focus:0 "主要派系"
 PRC_majority_faction_focus_desc:0 "为抗日所鼓吹的民族宣传是值得赞赏的，但决不能被资产阶级民族主义的口号所利用。 只有肃清买办的影响，才能进行真正的抗日民族战争；托洛茨基主义-彭主义思想万岁。"

 PRC_demand_reentry_of_cpc_focus:0 "要求重返中国共产党"
 PRC_demand_reentry_of_cpc_focus_desc:0 "斯大林对中国革命的双重交易态度以及[GetCPC]与国民党之间日益加剧的摩擦，使托洛茨基主义迅速蔓延； 随着[GetCPC] 领导层陷入动盪，托派的温和派领袖彭述之被潜在的托派支持者邀请回延安。"

 PRC_send_trotskyists_to_sinkiang_focus:0 "将托派送到新疆"
 PRC_send_trotskyists_to_sinkiang_focus_desc:0 "苏联和新疆都在打击国际共产主义运动的叛徒，那些托派份子的破坏活动。 将疑似托派派往迪化可能更有利于他们的筛查，以及苏联对我们工作的认可。 当然，与此同时，我们也可以处理我们的小异见人士。"

 PRC_submit_to_comintern_and_the_united_front_focus:0 "服从共产国际和统一战线"
 PRC_submit_to_comintern_and_the_united_front_focus_desc:0 "抗日战争是中华民族解放的伟大斗争，是世界反法西斯战争的重要组成部分。 无论输赢，我们都将坚守理想，与共产国际团结一致。"

 PRC_reunite_the_group_of_three_focus:0 "重新团结三人团"
 PRC_reunite_the_group_of_three_focus_desc:0 "由奥托·布劳恩、周恩来和博古组成的三人团是[GetCPC]曾经的一个重要团体。 现在，我们让毛泽东和他的手下远离政治中心，三人团将重新团结起来，在[GetCPC]向我们的异议人士表明我们哪儿也不去。"

 PRC_consolidate_wang_mings_authority_focus:0 "巩固王明权威"
 PRC_consolidate_wang_mings_authority_focus_desc:0 "由于毛泽东无法解决路线斗争的争端，共产国际认为[GetCPC]即将被托洛茨基主义和布哈林主义接管。 为此，他们强迫毛泽东去莫斯科报告和学习——王明暂时成为了[GetCPC]的主人，确实扭转了自1935年起的逆势。"

 PRC_Republican:0 "中央集权制"
 PRC_Republican_desc:0 "新中国政府领导人通过党内选举的共和制选出，是全国各族人民共同缔造的统一的多民族国家，以中央集权的方式更有利于治理国家。"

 PRC_empower_the_general_secretary_focus:0 "调整中央机构"
 PRC_empower_the_general_secretary_focus_desc:0 "中共中央政治局，讨论调整及精简中央领导机构、加强中央的集中统一领导，决定在两次中央委员会之间，由中央政治局担负领导整个党的工作责任，有权决定一切重大问题，政治局选举[PRC.GetLeader]为主席；书记处则成为根据政治局决定的方针处理日常工作的办事机关，书记处由三人组成，[PRC.GetLeader]为主席，没有用总书记这个称谓。这是中共中央第一次使用“主席”的称谓。"

 PRC_cooperate_with_fourth_international_focus:0 "与第四国际合作"
 PRC_cooperate_with_fourth_international_focus_desc:0 "许多人从他们的墨西哥朝圣之旅归来，并为他们改正过去误解托洛茨基之事而兴奋，因为他们从第四国际发现了中国革命的真正方向。"

 PRC_trotskyist_coup:0 "托派政变"
 PRC_trotskyist_coup_desc:0 "由于我们的政治努力，托洛茨基主义者终于成为[GetCPC]的主流。 我们现在可以认清过去的教训，并在最好的意义上发动一场真正的托洛茨基主义革命！"

 PRC_zhengmianzhanchang:0 "重拾正面战场"
 PRC_zhengmianzhanchang_desc:0 "以[PRC.GetLeader]为代表的部分同志认为依靠国民党的强大力量，我们可以很快击退日本人的侵略。只有稳扎稳打，逐步推进，才能有效地推进战线，游击战虽然能有更为喜人的战损比，但终究只是敌后骚扰，无法取代正面战场的作用。我们是时候发展红军的硬实力，成为战场上的中坚力量了。" 

 PRC_zhendizhan_focus:0 "阵地战"
 PRC_zhendizhan_focus_desc:0 "在对抗日本侵略者的作战中，阵地作战是必不可少的重要一环。如果想要阻止日军前进的步伐、稳固目前的战线，我们就必须加强对红军阵地作战的理论和实战训练。"

 PRC_gongjianzhan_focus:0 "攻坚战"
 PRC_gongjianzhan_focus_desc:0 "在对抗日本侵略者的作战中，攻坚作战是必不可少的重要一环。如果想要实施反攻、收复失地，我们就必须加强对红军攻坚作战的理论和实战训练。"

 PRC_tigaolilun_focus:0 "提高新理论的可行性"
 PRC_tigaolilun_focus_desc:0 "在经过长期的理论和实战训练后，红军的正面作战能力已经得到了大幅增强，我们已经不再是那支只会躲在深山老林里打游击的军队了！"

 PRC_swift_victory_idea_focus:0 "快速胜利学说"
 PRC_swift_victory_idea_focus_desc:0 "是时候吹起反攻的号角了，让日本侵略者在新生的红军面前为之颤抖吧！"

 PRC_federation:0 "联邦制"
 PRC_federation_desc:0 "中国领土广、势力多、民族杂，通过联邦制，适当放权给地方，不仅有利于与地方势力达成共识，保证领土完整，更能促进地区发展，节省中央资源。"

 PRC_consolidate_the_central_committee_focus:0 "巩固中央委员会"
 PRC_consolidate_the_central_committee_focus_desc:0 "中央委员会是[GetCPC]的组织，负责讨论谁将担任总书记，谁将成为政治局的一部分。 然而，大量的与会者使讨论不便，而且大部分时间会议都是密闭的。 因此，我们应该整合组织以解决这种不便。"

 PRC_zhengxiehuiyi_1st:0 "中国人民政治协商会议第一届全体会议"
 PRC_zhengxiehuiyi_1st_desc:0 "中国人民政治协商会议于1949年9月21日至30日在北平召开第一届全体会议。出席会议的代表有635人，来宾300人。[PRC.GetLeader]、朱德、刘少奇、周恩来、李济深、张澜、沈钧儒、黄炎培、郭沫若、马叙伦等89人组成大会主席团。林伯渠为大会秘书长。[PRC.GetLeader]致开幕词。"
 PRC_zhengxiehuiyi_1st_tt:0 "§C社会主义的建设事业必须依靠工人、农民和知识分子，团结一切可以团结的力量。在长期的革命和建设过程中，已经结成由中国共产党领导的，有各民主党派和各人民团体参加的，包括全体社会主义劳动者、社会主义事业的建设者、拥护社会主义的爱国者和拥护祖国统一的爱国者的广泛的爱国统一战线，这个统一战线将继续巩固和发展。§!"
 PRC_zhengxiehuiyi_1st_tt:0 "§C社会主义的建设事业必须依靠工人、农民和知识分子，团结一切可以团结的力量。在长期的革命和建设过程中，已经结成由中国共产党领导的，有各民主党派和各人民团体参加的，包括全体社会主义劳动者、社会主义事业的建设者、拥护社会主义的爱国者和拥护祖国统一的爱国者的广泛的爱国统一战线，这个统一战线将继续巩固和发展。§!"

 PRC_Federal_Republic:0 "联邦共和国"
 PRC_Federal_Republic_desc:0 "我们将遵循二大的建国设想：在统一中国本部为民主共和国的同时，“蒙古、西藏、回疆三部实行自治，为民主自治邦”；“在自由联邦制原则上，联合蒙古、西藏、回疆建立中华联邦共和国”，将国家结构形式确定为联邦制。"
 PRC_Federal_Republic_tt:0 "§Y中华联邦共和国§!将成立。\n"
 PRC_A_new_country_effect_tt_aa:0 "§C我们的工作将写在人类的历史上，它将表明：占人类总数四分之一的中国人从此站立起来了。我们的民族将从此列入爱好和平自由的世界各民族的大家庭，以勇敢而勤劳的姿态工作着，创造自己的文明和幸福，同时也促进世界的和平和自由。我们的民族将再也不是被人侮辱的民族了。全国规模的经济建设工作业已摆在我们面前。只要我们仍然保持艰苦奋斗的作风，只要我们团结一致，只要我们坚持人民民主专政和团结国际友人，我们就能在经济战线上迅速地获得胜利。随着经济建设的高潮的到来，不可避免地将要出现一个文化建设的高潮。中国人被人认为不文明的时代已经过去了，我们将以一个具有高度文化的民族出现于世界。我们的国防将获得巩固，不允许任何帝国主义者再来侵略我们的国土。我们将不但有一个强大的陆军，而且有一个强大的空军和一个强大的海军。让那些内外反动派在我们面前发抖吧，让他们去说我们这也不行那也不行吧，中国人民的不屈不挠的努力必将稳步地达到自己的目的！§!"
 xingxingzhihuo_keyiliaoyuan_5_tt:0 "§C曾经的点点星火如今已汇集成巨大的燎原之势，而我们要做的，就是继续将这希望的火焰燃遍中华大地，乃至整个世界。§!"
 zhengzhiju_gui_will_change:0 "§G中央政治局交互界面将会发生变化§!"
 jiesuo_dahuitang:0 "解锁奇观§Y人民大会堂§!"
 PRC_Federal_Republic_tt:0 "§Y中华联邦共和国§!将成立。\n"
 PRC_Establish_state_or_independent_government:0 "一个新国家已经建立起来"
 a_nation_to_be_established_tt:0 "§C一个新国家将建立起来。§!\n"
 PRC_strengthen_the_politburo_focus:0 "强化政治局"
 PRC_strengthen_the_politburo_focus_desc:0 "中央政治局是中央委员会在两次会议之间的代行机构，负责就党务重大问题作出决策和部署。 加强它将是一个明智的想法。"
 PRC_strengthen_the_politburo_focus_focus_flag:0 "已完成国策§Y强化政治局§!"

 PRC_For_the_Soviets:0 "为了苏维埃"
 PRC_For_the_Soviets_desc:0 "江西苏区时期的革命斗争已经为中华苏维埃共和国的制度建设积累了丰富的经验，我们将沿着这条建国道路继续前行。"
 PRC_For_the_Soviets_tt:0 "§Y中华苏维埃共和国§!将被重建。\n"

 PRC_Domestic_truce_agreement:0 "向军阀提供联邦成员资格"
 PRC_Domestic_truce_agreement_desc:0 "一个新的联邦社会主义中国已经建立，但目前地方军阀仍然拥有很大的自治权。为了和平统一中国，我们将向他们提供联邦成员资格。"

 PRC_Domestic_revolution:0 "降服军阀"
 PRC_Domestic_revolution_desc:0 "我们将全面落实对分裂势力的革命行动，一旦达成，他们就会加入我们。"
 PRC_Domestic_revolution_focus_flag:0 "已完成国策§Y降服军阀§!"
 RCM_regional_revolution_tt:0 "§R一旦共产党的支持率超过50%，这个政权就会发生政变。如果这个国家是其他国家的傀儡，一旦共产党的支持率超过75%，政变就会发生。§!\n"

 PRC_A_New_Country:0 "开国大典"
 PRC_A_New_Country_desc:0 "春秋易过，冬雪初霁。延安，西柏坡，香山，北京……难忘的足迹印证着中国共产党人改天换地建立新中国的不凡历程。随着中国人民解放战争从胜利走向胜利，[PRC.GetLeader]主席一方面运筹帷幄，指挥解放全中国各项战事不断取得胜利；一方面广邀各民主党派、无党派民主人士共商召开中国人民政治协商会议、建立新中国等举世瞩目的大事。"
 PRC_A_new_country_effect_tt_aa:0 "§C我们的工作将写在人类的历史上，它将表明：占人类总数四分之一的中国人从此站立起来了。我们的民族将从此列入爱好和平自由的世界各民族的大家庭，以勇敢而勤劳的姿态工作着，创造自己的文明和幸福，同时也促进世界的和平和自由。我们的民族将再也不是被人侮辱的民族了。全国规模的经济建设工作业已摆在我们面前。只要我们仍然保持艰苦奋斗的作风，只要我们团结一致，只要我们坚持人民民主专政和团结国际友人，我们就能在经济战线上迅速地获得胜利。随着经济建设的高潮的到来，不可避免地将要出现一个文化建设的高潮。中国人被人认为不文明的时代已经过去了，我们将以一个具有高度文化的民族出现于世界。我们的国防将获得巩固，不允许任何帝国主义者再来侵略我们的国土。我们将不但有一个强大的陆军，而且有一个强大的空军和一个强大的海军。让那些内外反动派在我们面前发抖吧，让他们去说我们这也不行那也不行吧，中国人民的不屈不挠的努力必将稳步地达到自己的目的！§!"
 unlock_PRC_diplomacy_focus:0 "解锁外交国策树"

 PRC_GongDeLin:0 "功德林改造"
 PRC_GongDeLin_desc:0 "功德林，即北京战犯管理所，是新中国成立之初，用来关押国民党战犯的专用监狱。中央政府决定对国民党战犯采取不审不判、不歧视人格、集中改造的方针，表现良好，积极承认错误的将会得到特赦。关押的100多名高级战犯共分为13个小组。一组组长为邱行湘，组员有杜聿明、宋希濂、康泽、王陵基、范汉杰、廖耀湘等人。这里关押的战犯还有黄维、陈长捷、沈醉等人。"

 PRC_reunification_of_china:0 "统一中国"
 PRC_reunification_of_china_desc:0 "在击溃国民政府主力部队后，中华大地的军阀分裂势力将成为我们接下去要解放的目标。"
 PRC_reunification_of_china_focus_flag:0 "已完成国策§Y统一中国§!"

 PRC_jiefang_xinjiang:0 "解放新疆"
 PRC_jiefang_xinjiang_desc:0 "即便国民党反动派已经败退台湾，新疆问题到今天却依然迟迟未能解决，是时候向新疆地区的军阀们表明我们的态度了。"

 PRC_xinjiangbingtuan:0 "新疆生产建设兵团"
 PRC_xinjiangbingtuan_desc:0 "1954年10月，中央人民政府命令驻新疆的中国人民解放军第二、第六军大部，第五军大部，第二十二兵团全部，集体就地转业，脱离国防部队序列，组建“中国人民解放军新疆军区生产建设兵团”，接受新疆军区和中共中央新疆分局双重领导，其使命是劳武结合、屯垦戍边。此后，全国各地大批优秀青壮年、复转军人、知识分子、科技人员加入兵团行列，投身新疆建设。"

 PRC_Claim_Tibet:0 "解放西藏"
 PRC_Claim_Tibet_desc:0 "西藏是我国不可分割的一部分，哪里有百万农奴等待着我们去解放，西藏的黑暗时代就此结束了！"
 PRC_Claim_Tibet_focus_flag:0 "已完成国策§Y收复西藏§!"

 PRC_force_TIB_reform:0 "强制要求西藏改革"
 PRC_force_TIB_reform_desc:0 "西藏的政教一体制度充满了暴力与血腥。藏传佛教中的人皮鼓、嘎巴拉、“念心咒”等用人体组织制成的法器及法事是最有力的证明；落后封建的农奴制压迫了藏族同胞上百年，同藏内贵族统治者和所谓的“活佛”们没什么好谈的，要么自行放弃剥削者的身份加入人民，要么成为人民的敌人迎接解放军的枪杆子和人民的审判。"
 PRC_TIB_minzhugaige_focus_warning:0 "§R会遭到西藏更加强烈的抵抗§!"

 PRC_allow_TIB_reform_by_itself:0 "允许西藏地方政府自行改革"
 PRC_allow_TIB_reform_by_itself_desc:0 "西藏政府接受了我们统一西藏的要求，那我们也应该尊重地方政府，当民众提出改革事宜时，中央不加强迫，由地方政府自行推进改革。"

 PRC_Revanchism_of_Chinese:0 "百年国耻，今朝应雪"
 PRC_Revanchism_of_Chinese_desc:0 "新中国的建立向帝国主义列强们昭示着这样一个事实——西方侵略者几百年来只要在东方一个海岸上架起几尊大炮就可霸占一个国家的时代是一去不复返了！"
 at_least_has_normal_life:0 "经济情况至少达到正常"
 add_economy_development_index_0.30:0 "§4经济指数§! §G+0.30§!"

 PRC_cult_of_personality_focus:0 "[PRC.GetName]万岁"
 PRC_cult_of_personality_focus_desc:0 "中国通过北伐战争、土地革命战争、抗日战争、解放战争，以武装革命推翻帝国主义、封建主义、官僚资本主义这三座大山，最终建立新中国，实现了民族独立与人民解放。\n新民主主义革命的胜利，彻底结束了旧中国半殖民地半封建社会的历史，彻底结束了旧中国一盘散沙的局面，彻底废除了列强强加给中国的不平等条约和帝国主义在中国的一切特权。我们以英勇顽强的奋斗向世界庄严宣告，中国人民站起来了，中华民族任人宰割、饱受欺凌的时代一去不复返了！"


 PRC_xibaipo:0 "会师西柏坡"
 PRC_xibaipo_flag:0 "会师西柏坡"
 PRC_xibaipo_desc:0 "在华北，随着晋察冀解放军连续取得清风店、石家庄战役的胜利，晋察冀解放区与晋冀鲁豫解放区连成一片，西柏坡周边大环境的安全性骤然上升。中央会议遂作出决定：中央前委、后委要与工委合而为一，会师于西柏坡，以便为接下来的战略决战做好全方位的准备工作。"
 PRC_contact_cheng_qian_focus:0 "联络国民党地方官员"
 PRC_contact_cheng_qian_focus_tt:0 "§Y程潜将随湖南省政府投靠我方§!\n"
 PRC_contact_cheng_qian_focus_desc:0 "一些国民党的地方官员似乎蛮同情我们的事业，或许我们可以接触并看看他们是否会投靠我方，以确保和平解放。"
 PRC_Field_army:0 "野战军"
 PRC_Field_army_desc:0 "现在是时候建立野战军并与敌人展开大规模决战了。"
 PRC_jiesuo_qiangxingjun:0 "解锁指挥官技能 £GFX_ability_PRC_Forced_March §Y强行军§! "
 PRC_jiesuo_chongfeng:0 "解锁指挥官技能 £GFX_ability_PRC_Charge §Y冲锋与反冲锋§! "
 PRC_jiesuo_kuaisuqianhao:0 "解锁指挥官技能 £GFX_ability_PRC_Dig §Y坑道战术§!"
 PRC_jiesuo_jingongchengshi:0 "解锁指挥官技能 £GFX_ability_PRC_Shelling §Y城市攻坚§!"
 PRC_jiesuo_jinshendongyuan:0 "解锁指挥官技能 £GFX_ability_PRC_Sickle_hammer §Y精神动员§!"
 PRC_jiesuo_qianghuaxietong:0 "解锁指挥官技能 £GFX_ability_PRC_Synergy §Y强化协同§!"
 tactic_jianmiezhan:0 "歼灭战" 
 tactic_jianmiezhan_tt:0 "\n启用战术卡：§Y歼灭战§! 其效果为:\n 进攻方战术伤害：§G10%§!\n 防御方战术伤害：§G-10%§!\n 战术作战宽度：§G50%§!\n "
 tactic_jianmiezhan_2:0 "歼灭战" 
 tactic_jianmiezhan_2_tt:0 "§Y歼灭战§!战术卡追加效果:\n 进攻方战术伤害：§G5%§!\n 防御方战术伤害：§G-5%§!\n 战术作战宽度：§G50%§!"
 PRC_Reorganize_NRA:0 "招募残余的国民党军队"
 PRC_Reorganize_NRA_desc:0 "我们将把俘虏与投诚者进行改编，他们将是一股强大的力量。"
 PRC_xibaipohuiyi:0 "西柏坡会议"
 PRC_xibaipohuiyi_desc:0 "在中国人民解放战争即将取得全国胜利的前夕，经过充分准备，中国共产党于1949年3月5日至13日在河北省平山县西柏坡中央机关食堂，召开了第七届中央委员会第二次全体会议。出席这次全会的有中央委员34人，候补中央委员19人。列席会议的11人。会议由[PRC.GetLeader]、刘少奇、周恩来、朱德、任弼时组成的主席团主持。这是中国共产党为建立新中国奠基的一次具有深远历史意义的会议。"
 PRC_xibaipohuiyi_tt:0 "§C我们很快就要在全国胜利了。这个胜利将冲破帝国主义的东方战线，具有伟大的国际意义。夺取这个胜利，已经是不要很久的时间和不要花费很大的气力了；巩固这个胜利，则是需要很久的时间和要花费很大的气力的事情。§!"
 GFX_report_event_xibaipo_tt:0 "§Y我们有批评和自我批评这个马克思列宁主义的武器。\n\n我们能够去掉不良作风，保持优良作风。\n\n我们能够学会我们原来不懂的东西。\n\n我们不但善于破坏一个旧世界，我们还将善于建设一个新世界。\n\n中国人民不但可以不要向帝国主义者讨乞也能活下去，而且还将活得比帝国主义国家要好些。§!"
 PRC_Theater_Settings:0 "战略计划"
 PRC_Theater_Settings_desc:0 "建立各部队负责的主战区，直面迎击敌军。"
 PRC_Theater_Settings_focus_flag:0 "已完成国策§Y战略计划§!"
 PRC_Strategic_offensive:0 "战略进攻"
 PRC_Strategic_offensive_desc:0 "我们已经发展到足够的实力，是时候发起主动攻势了。"
 PRC_jiesuo_chongfeng:0 "解锁指挥官技能 £GFX_ability_PRC_Charge §Y冲锋与反冲锋§! "
 PRC_Guerrilla_warfare_orientation:0 "发扬游击传统"
 PRC_Guerrilla_warfare_orientation_desc:0 "我们必须吸取第五次反围剿失败的惨痛教训，扬长避短，充分发挥我军游击战术的优势。"
 PRC_Roundabout_Tactics:0 "贯彻十六字方针"
 PRC_Roundabout_Tactics_desc:0 "敌进我退，敌退我追，敌驻我扰，敌疲我打"
 PRC_Protection_of_intelligence:0 "战术穿插"
 PRC_Protection_of_intelligence_desc:0 "穿插战术是利用敌人部署的间隙或薄弱部位插入其纵深或后方的战斗行动，是进攻作战的一种重要手段。目的是夺占敌纵深内的要点，分割和打乱敌人部署，为各个歼敌创造有利条件。穿插具有任务艰巨，腹背受敌，边打边插，独立战斗等特点。要周密计划准备，详细查明敌人防御间隙、薄弱部位和纵深内的兵力部署、地形、道路等情况，制定多种战斗方案。"
 PRC_Strengthen_assault_ability:0 "三三制战术"
 PRC_Strengthen_assault_ability_desc:0 "三三制是根据大量战斗经验总结归纳出的极其高超的步兵战术，由时任八路军115师师长林彪提出。在保证自己火力强度的同时，大大减少了士兵的伤亡。该战术大体可概述为：三人构成一个战斗小组，每人间隔7米以上，以减少手榴弹杀伤；三个战斗小组构成一个战斗群，每组间隔15米以上，以减少迫击炮杀伤；三个战斗群构成一个战斗集群，每群间隔20米以上，以减少榴弹炮杀伤。"
 PRC_War_of_People:0 "人民战争的汪洋大海"
 PRC_War_of_People_desc:0 "兵民是胜利之本，战争的伟力之最深厚的根源，存在于民众之中。人民战争既然是为人民而战、为正义而战，那么要想取得战争的胜利就必须依靠人民和从人民中走出来的兵，也就是要靠兵民结合。兵民结合是人民战争的一大特色，也是取得人民战争胜利的根本保障。"

 PRC_maquezhan:0 "麻雀战"
 PRC_maquezhan_desc:0 "麻雀战是我抗日军民常用的以弱胜强的游击战法，由民兵组成战斗小组，忽来忽去，忽聚忽散，神出鬼没地打击敌人。麻雀战有三种手段：一是袭击，打击驻守之敌，抓住敌人的活动规律，乘敌不备，突然袭击。二是伏击，在敌人必经之路设下伏兵，拦头斩腰打尾巴；几个人引敌人入套，用排枪、地雷大量杀伤敌人。三是阻击，采取分散隐蔽，瞅准时机，用冷枪杀伤敌人。"
 
 PRC_didaozhan:0 "地道战"
 PRC_didaozhan_desc:0 "地道战是华北、冀中平原抗日军民利用地道打击日本侵略者的作战方法，从晋察冀边区保定清苑的冉庄开始经过不断的发展，从单一的躲藏成为了能打能躲、防水防火防毒的地下工事，并逐渐形成了房连房、户户通、村村连。内外联防，互相配合，打击敌人，使原本无坚可守的冀中平原成为中国军民打击日本侵略者的重要作战区域。"
 
 PRC_dileizhan:0 "地雷战"
 PRC_dileizhan_desc:0 "抗日根据地军民在反“扫荡”和反“蚕食”斗争中，随地取材，利用废铁、玻璃、石头等制造地雷，工省价廉，有一定的杀伤力，亦不易被敌人发现。他们把集束起来的手榴弹和用土法自制的各种地雷，随处埋设于大道、田野、山脚、村边、室内、室外、树林草丛等敌人必经或可能经过之地，施以伪装，使入侵之敌陷于处处有雷，物物皆炸，寸步难行的境地。"
 
 PRC_shuishangyouji:0 "水上游击战"
 PRC_shuishangyouji_desc:0 "水上游击战主要在水网地带进行。我抗日军民充分利用小木船出没自如的便利，在河湖港汊等复杂水域寻机狠狠打击敌人。他们在白洋淀的每一个港汊间，给敌人撒下了严密的埋伏网，猎枪从芦苇的背后瞄准敌人的汽艇、包运船和粮队，给敌人以出其不意地打击。"
 
 PRC_poxizhan:0 "破袭战"
 PRC_poxizhan_desc:0 "破袭战是广大平原地区采用的一种战法，通过破坏或袭击敌人交通运输线、后方补给系统、指挥通信系统、工程设施、基地、据点使日军的列车和摩托化机械化部队难以行进。"

 PRC_take_what_we_can_take:0 "八路军总部修械所"
 PRC_take_what_we_can_take_desc:0 "1938年9月，八路军总部决定以115师344旅修械所、129师补充团修械所、豫晋游击支队修械所和115师供给部修械所部分人员近300人集中到榆社韩庄村组建了八路军总部修械所。1938年10月的中共六届六中全会指出“每个游击战争根据地都必须尽量建立小的兵工厂办到自制弹药、步枪、手榴弹等程度，使游击战争无军火缺乏之虞。”"

 PRC_Huangyadong_Arsenal:0 "黄崖洞兵工厂"
 PRC_Huangyadong_Arsenal_desc:0 "1939年7月，日寇侵入榆社，设立在韩庄的八路军总部修械所受到威胁。为了保存力量隐蔽目标，创建长期而稳固的的军工生产基地，八路军总部兵工部将设在榆社县韩庄村的总部修械所移到黄崖洞并扩建为当时华北敌后我八路军最大的兵工厂，这就是著名的黄崖洞兵工厂。黄崖洞兵工厂研发出了我军第一种制式步枪“八一”式步枪、第一种自产“掷弹筒”等，为人民军工培养了大批优秀技术人员。"

 PRC_Homemade_artillery:0 "仿制火炮"
 PRC_Homemade_artillery_desc:0 "在与日军的交战中，我们缴获了一些日军使用的九二式步兵炮，这种轻便耐用的支援武器可以在我们伏击日军或进攻据点时提供稀缺的炮击火力。我们可以让兵工厂仿制这款步兵炮，加强我军的炮兵火力。"

 PRC_Improve_construction_method:0 "八一式马步枪"
 PRC_Improve_construction_method_desc:0 "我们军队的主要作战形式是游击战，这要求我们的武器装备轻便好用。国民政府供给的汉阳造和中正式步枪数量太少，从日军处缴获的三八式步枪又较长，我们需要研发一款自己的步枪。"

 PRC_Motorized_unit:0 "摩托化理论研究"
 PRC_Motorized_unit_desc:0 "尽管我们被称作“窑洞里的革命者”，但红军对世界先进作战理论以及相关技术的研究却从未落下过。在红军战士读书学习的地方——即“列宁室”，能够看到许多诸如战列舰、潜艇甚至航空母舰等先进武器装备的展示图纸以及理论书籍。除了理论知识以外许多先进的实用战术也被红军所吸纳，防空、防毒、防化这些听起来专业性十足的技能确确实实出现在了看起来颇具“乡土气息”的红军队伍当中。"

 PRC_Tank:0 "装甲部队理论研究"
 PRC_Tank_desc:0 "尽管我们被称作“窑洞里的革命者”，但红军对世界先进作战理论以及相关技术的研究却从未落下过。在红军战士读书学习的地方——即“列宁室”，能够看到许多诸如战列舰、潜艇甚至航空母舰等先进武器装备的展示图纸以及理论书籍。除了理论知识以外许多先进的实用战术也被红军所吸纳，防空、防毒、防化这些听起来专业性十足的技能确确实实出现在了看起来颇具“乡土气息”的红军队伍当中。"

 PRC_Mountain_combat:0 "山地游击战"
 PRC_ideas_shandizuozhanzhuanjia_ttaa:0 "§C我们将获得一支山地作战经验丰富的模范教导旅§!"

 PRC_request_northeast_china:0 "接管苏占东北"
 PRC_request_northeast_china_desc:0 "中国的东北地区现在由苏联控制，苏联红军帮助我们打败了日本关东军和伪满洲国军，并且将美国支持的国民党军挡在了山海关内。我们可以与苏联接洽，在苏军撤离时接管中国东北。"

 PRC_the_dongbei_hangxiao:0 "东北民主联军航空学校"
 PRC_the_dongbei_hangxiao_desc:0 "东北民主联军航空学校是于1946年3月1日成立的中国人民解放军第一所航空学校，校址位于吉林通化。先后辗转移至牡丹江、东安、长春等地。在短短的3年零9个月里，东北老航校培养出了一百多名飞行员和四百多名各类航空技术人员，为人民空军和新中国航空事业发展建立了不朽的功绩，成为人民空军的摇篮，中国航空事业发展史上的一座丰碑。"

 PRC_northeast_trade_hq:0 "东北贸易总公司"
 PRC_northeast_trade_hq_desc:0 "1947年初，中共中央东北局决定成立东北贸易总公司以解决战时军用物资的生产和调运问题，同时统筹管理与[SOV.GetAdjective]之间的贸易往来。"

 PRC_War_of_Liberation:0 "解放战争"
 PRC_War_of_Liberation_desc:0 "国民党反动派狼子野心昭然若揭，他们完全不希望与我们构建联合政府，誓死“捍卫”它那春秋大梦，甚至不惜再打一次内战也要让中国人民蒙受苦难。"
 
 PRC_strategic_defense:0 "战略防御"
 PRC_strategic_defense_desc:0 "我们目前的军队规模明显弱于国民党反动派，先收缩防线，战略转移并将各解放区连成一片，再寻求机会反攻，才是明智之举"
 
 PRC_crush_the_all-out_attack:0 "粉碎全面进攻"
 PRC_crush_the_all-out_attack_desc:0 ""

 PRC_crush_the_point_attack:0 "粉碎重点进攻"
 PRC_crush_the_point_attack_desc:0 ""

 PRC_stand_firm:0 "站稳脚跟"
 PRC_stand_firm_desc:0 ""

 PRC_strategic_conterattack:0 "战略反攻"
 PRC_strategic_conterattack_desc:0 ""

 PRC_Liaoshen_campaign:0 "辽沈战役"
 PRC_Liaoshen_campaign_desc:0 "人民解放战争进入夺取全国胜利的决定性阶段。中共中央选定首先在东北战场展开决战，因为东北战场的态势对人民解放军最为有利。"

 PRC_Huaihai_campaign:0 "淮海战役"
 PRC_Huaihai_campaign_desc:0 "淮河是长江屏障，徐州更是四战之地。粟裕最早提出的小淮海为开辟苏北战场，攻占两淮、海州等地。随着战事进展打成了大淮海，涉及‌河南‌、安徽、‌江苏、山东等地，我军将在这对国军进行战略进攻！"

 PRC_Pingjin_campaign:0 "平津战役"
 PRC_Pingjin_campaign_desc:0 "全国军事形势发生了新的转折。人民解放军总兵力已经基本超越国民党军，从劣势转为优势。傅作义在北平孤立无援现在正是一举解放北平的好时机!"

 PRC_Nanjing_campaign:0 "渡江战役"
 PRC_Nanjing_campaign_desc:0 ""

 PRC_seize_the_initiative:0 "抢占主动权"
 PRC_seize_the_initiative_desc:0 "抗日战争急不得、解放战争拖不得！如今我们兵强马壮，解放军战士士气高涨，是时候主动向国民党反动派进攻，解放全中国了！"

 breakthrough_the_encirclement:0 "突破包围"
 breakthrough_the_encirclement_desc:0 ""

 attack_the_north_of_China:0 "解放华北"
 attack_the_north_of_China_desc:0 ""

 attack_inner_mon:0 "解放内蒙"
 attack_inner_mon_desc:0 ""

 attack_the_northwest_of_China:0 "解放大西北"
 attack_the_northwest_of_China_desc:0 ""

 attack_the_northeast_of_China:0 "解放东北"
 attack_the_northeast_of_China_desc:0 ""

