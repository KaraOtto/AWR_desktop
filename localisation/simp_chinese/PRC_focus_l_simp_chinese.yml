 PRC_xibaipo:0 "会师西柏坡"
 PRC_xibaipo_flag:0 "会师西柏坡"
 PRC_xibaipo_desc:0 "在华北，随着晋察冀解放军连续取得清风店、石家庄战役的胜利，晋察冀解放区与晋冀鲁豫解放区连成一片，西柏坡周边大环境的安全性骤然上升。中央会议遂作出决定：中央前委、后委要与工委合而为一，会师于西柏坡，以便为接下来的战略决战做好全方位的准备工作。"
 PRC_contact_cheng_qian_focus:0 "联络国民党地方官员"
 PRC_contact_cheng_qian_focus_tt:0 "§Y程潜将随湖南省政府投靠我方§!\n"
 PRC_contact_cheng_qian_focus_desc:0 "一些国民党的地方官员似乎蛮同情我们的事业，或许我们可以接触并看看他们是否会投靠我方，以确保和平解放。"
 PRC_Field_army:0 "野战军"
 PRC_Field_army_desc:0 "现在是时候建立野战军并与敌人展开大规模决战了。"
