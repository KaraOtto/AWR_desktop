 attack_the_center_of_China_desc:0 ""

 attack_the_east_of_China:0 "解放华东"
 attack_the_northeast_of_China_desc:0 ""

 attack_the_SIK:0 "解放新疆"
 attack_the_SIK_desc:0 ""

 PRC_attack_Nanjing:0 "百万雄狮过大江"
 PRC_attack_Nanjing_desc:0 ""

 PRC_revolute_the_whole_China:0 "解放全中国"
 PRC_revolute_the_whole_China_desc:0 ""

 PRC_7th_plenary_session_of_the_6th_CPC_central_committee_focus:0 "第六届七中全会[global.GetCPC]中央委员会"
 PRC_7th_plenary_session_of_the_6th_CPC_central_committee_focus_desc:0 "第六届[GetCPC]中央委员会是目前最后一次全体会议，巩固[Root.GetLeader]对党的领导，总结1928年以来的革命道路问题。 并进行国民党-[GetCPC] 的谈判与朝城市革命方面发展。"

 PRC_7th_National_Congress_focus:0 "中国共产党第七次全国代表大会"
 PRC_7th_National_Congress_focus_desc:0 "中国共产党，除了在诞生之初能得到联俄联共政策的扶助外，其余的大多数时间内都在与反动派进行残酷、惨烈的政治、军事斗争，而如今的她并不只会退缩、软弱或无知。历时50天的中共七大，是党在民主主义革命时期极其重要的一次代表大会。它总结了历史经验，制定了正确的路线、纲领和策略，克服了错误思想，使全党在马克思列宁主义的基础上达到了空前的团结与统一。"
 PRC_kaizhonggongqida:0 "当选择此项时，召开为期§Y50§!天的§G中国共产党第七次全国代表大会§!"
 PRC_timeaxis_98_tooltip:0 "§O这次大会注定会作为“团结的大会、胜利的大会”而载入史册§!"
 PRC_timeaxis_94_tooltip:0 "§C中国人民建立民主联合政府、打败侵略者、建设新中国！§!"
 PRC_timeaxis_95_tooltip:0 "§C人民军队若要把为人民服务、保卫祖国作为宗旨，那么政治工作便成为这支军队的灵魂。§!"
 PRC_timeaxis_96_tooltip:0 "§C我们大会通过的党章，将是一个能够保证中国民族与中国人民获得胜利与解放的党章。§!"
 
 PRC_PLA:0 "中国人民解放军"
 PRC_PLA_desc:0 "中国人民解放军，是为了彻底摧毁国民党反动政权所建立的，是为了完成中国民主革命反帝反封建最主要的历史任务的坚实基础。是中国共产党人领导人民解放战争，完成中国战争史和世界战争史上少有的威武雄壮话剧的刀枪剑戟！"

 PRC_military_commission_new_country_focus:0 "中央人民政府人民革命军事委员会"
 PRC_military_commission_new_country_focus_desc:0 "中国人民政治协商会议第一届全体会议通过的《中国人民政治协商会议共同纲领》规定：“[PRC.GetNameDef]建立统一的军队，即人民解放军和人民公安部队，受中央人民政府人民革命军事委员会统率，实行统一的指挥，统一的制度，统一的编制，统一的纪律，国家最高军事统率机关是中央人民政府人民革命军事委员会。”"

 PRC_wuzhuangbu:0 "成立人民武装部"
 PRC_wuzhuangbu_desc:0 "中国共产党一贯重视人民群众武装力量的建设，历次革命战争时期都在县、区建立人民群众武装的领导机构。抗日战争时期，各抗日根据地分别建立自卫队总指挥部、人民武装委员会、武装科或武装部，主要任务是开展游击战争并负责征兵动员工作。新中国成立后，为统一领导和管理民兵工作并为实行义务兵役制打好基础，自1950年6月起从中央军委至地方区政府一级设立人民武装部。"
 
 PRC_gonganbu:0 "成立中央人民政府公安部"
 PRC_gonganbu_desc:0 "1949年10月19日，中央人民政府委员会第三次会议决定任命罗瑞卿为中央人民政府公安部长，杨奇清为副部长。中央人民政府命令发布后，中央军委公安部即行撤销，改名为中央人民政府公安部，统管全国国家安全与情报工作。"
 
 PRC_jiefangjunjunshixueyuan:0 "中国人民解放军军事学院"
 PRC_jiefangjunjunshixueyuan_desc:0 "新中国建立后，为加强中国人民解放军正规化、现代化建设，培养适应现代战争要求的指挥员，经中央人民政府人民革命军事委员会批准，在原华北、华东军事政治大学的基础上，创办中国人民解放军军事学院。1951年1月15日军事学院在南京成立，刘伯承元帅领导了创建工作并任院长兼政治委员。"

 PRC_xiandaijungong:0 "现代化军事工业"
 PRC_xiandaijungong_desc:0 "国防和军队现代化是巩固人民政权的战略支撑，要想完成这一任务现代化的军事工业是必不可少的。"

 PRC_yongbaoxiandaizhanzheng:0 "拥抱现代战争"
 PRC_yongbaoxiandaizhanzheng_desc:0 "现代战争的武器技术和战略战术正在不断进步，落后就要挨打，我们必须发展国防科技，创新战略战术，拥抱现代战争。"
 
 PRC_xiandaizhuangjia:0 "现代化装甲部队"
 PRC_xiandaizhuangjia_desc:0 "装甲部队，陆军地表力量的最强代表，如果我们的陆军要想跟上时代，发展先进且优良的装甲部队是必不可少的。"
 
 PRC_mechanization:0 "机械化的初步建设"
 PRC_mechanization_desc:0 "机械化部队，以坦克、装甲输送车或步兵战车实施运动和战斗的部队。以坦克为主要装备的部队称坦克部队。以装甲输送车或步兵战车为主要装备的部队称机械化步兵部队或摩托化步兵部队。机械化部队是快速移动型的防御部队，而且是会在战斗中快速撤退的部队。装甲部队的出现代表着部队可以快速冲破敌人的防御据点，而且快速进入战场之中。为了军队能够更加灵活，我们必须开始发展机械化。"
 mechanised_infantry:0 "机械化"
 
 PRC_domestic_Tank:0 "国产坦克"
 PRC_domestic_Tank_desc:0 "59式中型坦克是20世纪50年代中国参考苏联T-54A中型坦克仿制并大量装备的国产第一代主战坦克，全重36吨，乘员4人，最大时速50千米，最大行程560千米。主要武器有1门100毫米线膛炮，战斗射速7发/分，1挺12.7毫米高射机枪和2挺7.62毫米机枪，配有红外夜视仪可夜间驾驶。车体首部和侧面的装甲较厚，炮塔成流线型，具有良好的抗弹能力。"
 PRC_domestic_Tank_bonus:0 "国产坦克"
 
 PRC_xiandaipaobing:0 "现代化炮兵部队"
 PRC_xiandaipaobing_desc:0 "抗日战争时期我们的火炮基本是万国造，依靠缴获敌人的火炮和苏联援助等等，黄崖洞兵工厂也生产过一些，但质量现在无疑已经跟不上时代，我们必须生产更先进的火炮，培养更专业的炮兵，建设属于自己的现代化炮兵部队。"
 
  PRC_PLA_paobingxuexiao:0 "中国人民解放军炮兵学校"
  PRC_PLA_paobingxuexiao_desc:0 "中国人民解放军炮兵学校的最早前身是八路军第一所炮兵学校——延安炮兵学校，解放战争时期改称东北人民解放军炮兵学校。1950年8月，学校奉命改中国人民解放军东北军区朱瑞炮兵学校为中国人民解放军炮兵学校，担负全军培养现代化国防炮兵干部的任务，校址在辽宁沈阳。"

 PRC_dierpaobing:0 "第二炮兵"
 PRC_dierpaobing_desc:0 "第二炮兵成立于1966年7月1日，由周恩来总理亲自命名，始终由中央军委直接掌握，是中国实施战略核威慑的核心力量，主要担负遏制他国对中国使用核武器、遂行核反击和常规导弹精确打击任务。这支掌握着“大国利剑”的神秘部队从诞生伊始便肩负着保障中华民族根本生存利益的重任，可以说对于潜在的敌对势力而言，二炮堪比古希腊神话中的“达摩克利斯”之剑，是震慑敌人的最有力杀手锏。"

 PRC_xiandaibubing:0 "现代化步兵部队"
 PRC_xiandaibubing_desc:0 "现代化的军事理论配合上我们在过去战争中积累的游击战、歼灭战、三三制等战术，必将使我军步兵部队的战斗力在世界上处于领先地位！"

  PRC_PLA_paobingxuexiao:0 "中国人民解放军炮兵学校"
  PRC_PLA_paobingxuexiao_desc:0 "中国人民解放军炮兵学校的最早前身是八路军第一所炮兵学校——延安炮兵学校，解放战争时期改称东北人民解放军炮兵学校。1950年8月，学校奉命改中国人民解放军东北军区朱瑞炮兵学校为中国人民解放军炮兵学校，担负全军培养现代化国防炮兵干部的任务，校址在辽宁沈阳。"

 PRC_sansanzhi:0 "完善“三三制”战术"
 PRC_sansanzhi_desc:1 "三三制战术最早起源于抗日战争期间，由时任八路军115师师长林彪提出，成熟于解放战争，大量运用于抗美援朝战争，是我军步兵训练大纲中的一种步兵“班组突击”战术，是我军建制建设的一个重要法宝，是我军在长久的斗争中领悟的智慧，但相对于现代战争而言仍然显得有些简陋。如果我们能完善“三三制”战术，就能让它适应未来很长一段时间的战斗需要。"
 
 PRC_tezhongbudui:0 "组建敌后侦察大队"
 PRC_tezhongbudui_desc:1 "1960年代，除武汉军区和济南军区外，有边防任务的各大军区陆军部队组建敌后侦察队，接受跳伞训练，具备空中渗透能力。1964年5月，广州军区成立敌后侦察大队；同年8月，扩编为敌后侦察营，下辖2个武装侦察连和1个空降连。这一般被认为是人民解放军现代特种部队的早期雏形。"

 PRC_duobingzhongxietong:0 "多兵种协同作战"
 PRC_duobingzhongxietong_desc:0 "陆军、空军、海军之间的关系如今已不再是各自孤立的，多兵种协同作战已经是大势所趋。"

 PRC_xuezhandaodi:0 "血战到底"
 PRC_xuezhandaodi_desc:0 "正如[PRC.GetLeader]主席所言：“我们中华民族有同自己的敌人血战到底的气概。”我们的人民军队必须把这种精神贯彻到底。"
 
 PRC_lengqianglengpao:0 "冷枪冷炮"
 PRC_lengqianglengpao_desc:0 "以单枪或单炮对敌守备力量、坦克、车辆等目标进行射杀的战术，该战术隐蔽性强、机动性高，俗称“打冷枪”。此战术可以在保存我方实力的同时有效杀伤敌有生力量，令敌人夜不能寐、寝食难安。"
 
 PRC_huoliyazhi:0 "优势火力"
 PRC_huoliyazhi_desc:0 "正所谓“穷则战术穿插，达则火力覆盖”，今天的人民军队也将拥有西方强国的火力投送能力。"

 PRC_xiandaihuarenminjundui:0 "现代化人民军队"
 PRC_xiandaihuarenminjundui_desc:0 "人民群众自发地或在先进阶级领导下建立的并为人民利益而战斗的军队。由无产阶级领导、以马克思主义理论作指导的军队是新型的人民军队。“人民子弟兵”是老百姓对中国人民解放军部队的亲切称谓。饱含着军民之间同呼吸、共命运的鱼水深情。人民解放军是全心全意为人民服务的，只要有人民群众的拥护，我们的军队在哪里都将战无不胜！"

 PRC_Establish_the_air_force:0 "创立空军"
 PRC_Establish_the_air_force_desc:0 "我们现在的空军部队还十分稀缺，而发达国家早就利用空军取得了各种各样的胜利。"

 PRC_Air_base:0 "空军基地建设"
 PRC_Air_base_desc:0 "建造更多的空军基地，我们将需要这些机场。"

 PRC_expand_the_flight_school:0 "扩建航校"
 PRC_expand_the_flight_school_desc:0 "1949年7月，中共中央在筹划建立人民空军时决定，以东北老航校的干部、学员为骨干，请苏联派出专家协助，向苏联购买飞机和航空器材，尽快建立一批航空学校。至1950年1月，新建7所航空学校，以速成方式培养飞行、航空机务等专业技术人才。"

 PRC_The_first_squadron:0 "南苑飞行中队"
 PRC_The_first_squadron_desc:0 "南苑飞行中队是人民空军的第一个飞行中队，于1949年8月15日在北平南苑机场正式组建。中队编有2个战斗机分队、1个轰炸机分队、1个地勤分队。有飞机10架，其中P-51型战斗机6架、蚊式轰炸机2架、PT-19型教练机2架。"

 PRC_PLAAF:0 "人民解放军空军"
 PRC_PLAAF_desc:0 "1949年10月25日，中央军委任命刘亚楼为空军司令员、萧华为空军政治委员兼政治部主任。同年11月中国人民解放军空军司令部在[Root.Capital.GetName]成立，原军委航空局撤销，其人员及业务移交空军司令部。空军领率机关先后设参谋部（司令部）、训练部、政治部、工程部、后勤部、干部部和空军直属政治部等部门。"

 PRC_women_in_PLAF:0 "第一批女飞行员"
 PRC_women_in_PLAF_desc:0 "1951年初，党中央、中央军委作出一项决定：为新中国培养第一批女飞行员。于是从华东军政大学、航空预科总队挑选出来的55名女战士奔赴牡丹江第7航空学校学习飞行。1952年3月8日，一个阳光灿烂的日子，她们从北京西郊机场起飞，飞越天安门上空。[PRC.GetLeader]主席赞扬她们：“细妹子不简单，飞得好高啊！”"

 PRC_Improved_aircraft_production:0 "发展航空工业"
 PRC_Improved_aircraft_production_desc:0 "1951年4月17日，新中国航空工业在抗美援朝的烽火中诞生。中央人民政府人民革命军事委员会和政务院颁发《关于航空工业建设的决定》，标志着新中国航空工业建设的起步。"

 PRC_Radar:0 "国产雷达"
 PRC_Radar_desc:0 "渡江战役后，国民政府雷达研究所光荣起义，全部雷达、器材物资、车辆、文件档案完整地为我军顺利接管。雷达研究所也就是现如今的中国电科14所，获得了新生，中国雷达工业自此也拉开了从无到有、从落后到先进的蓬勃发展历程。1953年，第一部自行设计的国产雷达在中国电科14所正式诞生，最大探测距离125公里，命名为314甲中程警戒雷达。"

 PRC_mordern_air_combat:0 "现代空战"
 PRC_mordern_air_combat_desc:0 "自双翼飞机在战壕上空搏击以来，空战的历史就由来已久。现今的空战究其本质是工业实力的比拼，利用高性能快节奏对敌人实施昼夜不停的持续作战。我们必须认清这一事实并制定相应的规划。"

 PRC_J_fighter_jet:0 "“歼”系列"
 PRC_J_fighter_jet_desc:0 "新中国成立后逐步建立的人民空军，我国的天空防卫长期依赖有限的外援、缴获装备与艰难维修。现在，我们必须把经验转化为工业能力。以东北航空工业基地为核心，吸收苏联喷气式飞机技术，并结合朝鲜战场上积累的空战教训，我们将推动国产歼击机体系的建立。‘歼’系列不仅是一种战斗机的名称，更代表着中国航空工业从修理、仿制走向批量制造的关键一步。"

 PRC_domestic_fighter_jet:0 "国产歼击机"
 PRC_domestic_fighter_jet_desc:0 "依靠外购飞机无法保障长期的国土防空。我们必须建立自己的航空制造体系，将修理、仿制与试飞经验转化为稳定的生产能力。国产歼击机的投产，将使人民空军拥有真正属于自己的现代化战机。"

 PRC_H_fighter_jet:0 "“轰”系列"
 PRC_H_fighter_jet_desc:0 "从战争年代的零散航空力量到建国后的人民空军，中国尚缺乏可靠的远程轰炸能力。新的国际环境要求我们不仅能够守卫天空，也要具备打击敌方后方与支援地面战役的能力。发展‘轰’系列轰炸机，将推动航空工业从轻型战机制造走向更复杂的大型飞机领域，并为中国空军建立更加完整的作战体系。"

 PRC_domestic_support_jet:0 "国产支援机"
 PRC_domestic_support_jet_desc:0 "空军的力量并不只体现在空战与轰炸之中。国产支援机将承担侦察、训练、联络和近距支援任务，弥补基层航空力量的不足。只有建立完整的辅助机型体系，人民空军才能真正支撑大规模现代战争。"

 PRC_Bomber:0 "国产战术轰炸机"
 PRC_Bomber_desc:0 "战场上的胜负不仅取决于地面部队的推进，也取决于空中力量能否及时打击敌方阵地、交通线与后方集结点。过去，中国航空力量长期缺乏稳定的中型轰炸与战役支援能力，难以在大规模陆战中持续发挥作用。发展国产战术轰炸机，将使人民空军能够在前线之外实施更有组织的纵深打击，并减少对进口机型和外国零件的依赖。这不仅是航空工业能力的扩展，也是陆空协同作战走向现代化的重要一步。"

 PRC_large_Bomber:0 "国产战略轰炸机"
 PRC_large_Bomber_desc:0 "真正的战略空军不能只依赖前线机场与短程飞机。国产战略轰炸机的研制，将使我们具备远程打击、战略威慑和纵深作战能力，也将推动中国航空工业迈入大型飞机制造的新阶段。"

 PRC_yingjichangkong:0 "鹰击长空"
 PRC_yingjichangkong_desc:0 "“飞了过去没有飞过的航线，到了过去没有到过的区域”，人民空军将如同雄鹰和大雁一般飞跃崇山峻岭，冲向蔚蓝大洋的深处，冲出中国国土的局限，冲向我们从未到达的高度。"

 PRC_the_sonic_age:0 "音速时代"
 PRC_the_sonic_age_desc:0 "随着喷气引擎的问世，现代战机已具备超越声速的可能。经科学家们的实验的重大突破，共和国空军将于不久的将来正式进入音速时代！\n在过去的一百年里，我们一直在追赶别人。现在，轮到别人追赶我们了。"

 PRC_Establish_the_naval:0 "创立海军"
 PRC_Establish_the_naval_desc:0 "当我们取得港口后，必须要开始建立海军来稳固海权。"
 PRC_Establish_the_naval_focus_flag:0 "已完成国策§Y创立海军§!"

 PRC_Naval_base:0 "海军基地建设"
 PRC_Naval_base_desc:0 "我们需要建立一个新的海军基地，这对控制周边水域非常有效。"

 PRC_study_foreign_ship:0 "组建海军院系"
 PRC_study_foreign_ship_desc:0 "如果我们想成为国际舞台上一个受人尊敬的大国，就需要研究西方大国的军舰设计。"

 PRC_Coast_defense:0 "组建岸防舰队"
 PRC_Coast_defense_desc:0 "一切从零开始，从岸防编队开始发展我国的海军。"

 PRC_Transport_fleet:0 "运输船队"
 PRC_Transport_fleet_desc:0 "我们需要一批运输船来运送外部的补给和贸易物品，并开始保卫该船队。"

 PRC_PLAN:0 "人民解放军海军"
 PRC_PLAN_desc:0 "1950年4月14日，中国人民解放军海军司令部在[Root.Capital.GetName]成立，这是中央军事委员会领导和指挥的海军部队最高领导机关，萧劲光任司令员，刘道生任副政委兼政治部主任；同年任命王宏坤为副司令员，罗舜初为参谋长，后相继组建了东海舰队、南海舰队和北海舰队。"

 PRC_Train_naval_officers:0 "成立海军军事学院"
 PRC_Train_naval_officers_desc:0 "现有的中国人民解放军军事学院海军院系已经不能满足我军培养现代化海军人才的要求，应当在其原有基础上继续扩建为独立的海军军事学院。"

 PRC_Submarine:0 "“空潜快”"
 PRC_Submarine_desc:0"“空潜快”是中国人民解放军海军在建立初期的一个短期发展方向，强调以航空兵、潜艇和快艇为主要构成的海上作战力量。主要特点是利用航空兵进行空中掩护，潜艇进行水下威慑，快艇则提供快速打击能力，这种组合旨在近岸海域形成一支高效的、经济的海军力量，以保卫江河出海口和沿海重要地区。"

 PRC_Underwater_forces:0 "国产潜艇"
 PRC_Underwater_forces_desc:0 "1953年，中苏两国签署了“六四协定”，苏联开始向中国提供W级潜艇的全套生产设备以及相关的资料和图纸等，为中国海军日后自行建造潜艇打下了基础。1956年3月，第一艘完全由中国自主建造的W级潜艇在江南造船厂下水，它标志着中国海军开始具备了自行生产潜艇的能力。"

 PRC_submarine_center:0 "以潜艇为核心"
 PRC_submarine_center_desc:0 "随着导弹技术的研发，战列舰被淘汰已成即定事实；航母发展需要时间，潜艇才是当下快速发展共和国海军力量的最优解。"

 PRC_haijunluzhandui:0 "第一支海军陆战队"
 PRC_haijunluzhandui_desc:0 "1953年，为了解放东南沿海岛屿，华东军区以陆军1个步兵团和2个步兵营为基础，组建了海军陆战第1团，这标志着中国人民解放军海军陆战队的正式成立。1954年12月9日，在陆战第1团和和水陆坦克教导团的基础上，合并华东军区水兵师师部及所属水兵第2团，组建了第一个海军陆战师。"

 PRC_guochanquzhujian:0 "国产驱逐舰"
 PRC_guochanquzhujian_desc:0 "20世纪60年代，中国参考苏联“科特林”级和“快速”级驱逐舰部分图纸、技术资料开始研制国产驱逐舰，编号051型，西方称旅大级。它是中国第一代自行设计制造的驱逐舰，也是第一种具备远洋作战能力的水面作战舰艇。"
 sidajingang:0 "§C如果拥有民族精神《中苏友好同盟互助条约》，则将获取苏联援助的“四大金刚”驱逐舰及相应配套技术。§!"

 PRC_Carriers:0 "航空母舰的初步设想"
 PRC_Carriers_desc:0 "建造属于人民海军自己的航空母舰目前看来尚且有诸多困难，但这并不妨碍我军研习世界航母大国的先进作战经验与装备技术。"

 PRC_Carriers_made_by_ourselves:0 "国产航母"
 PRC_Carriers_made_by_ourselves_desc:0 "第二次世界大战中，美国海军已经证明了航母的重要性和对海战理念的再定义，这种海军中流砥柱我们一定要研究出来！"

 PRC_carriers_center:0 "以航母为核心"
 PRC_carriers_center_desc:0 "航母是现代海战的主力，二战期间航母已通过实战证明了舰载机提供的远程打击能力、战场感知优势和战术灵活性，彻底压倒了战列舰的“巨舰大炮”模式。一支强大的舰队必然是以航母为核心的，这理应成为我国的海军的发展方针。"

 PRC_Ocean_hegemony:0 "蓝水海军"
 PRC_Ocean_hegemony_desc:0 "大舰巨炮主义尚未落伍，这些舰艇仍然是强大火力喷射的来源。"

 PRC_battleships_made_by_ourselves:0 "国产战列舰"
 PRC_battleships_made_by_ourselves_desc:0 "大舰巨炮仍是海军主流，潜艇终究无法成为海战主力，而我国尚无法组建有效的舰载机产线以满足航母战斗群的需要，大舰巨炮将是我们成为海权强国的最佳选择。"

 PRC_battleships_center:0 "以战列舰为核心"
 PRC_battleships_center_desc:0 "我们有一支宏伟的舰队，这些海上钢铁巨兽将是领敌国望而却步的共和国之盾。"

 PRC_zouxiangshenlan:0 "走向深蓝"
 PRC_zouxiangshenlan_desc:0 "人民海军的战士们啊！帝国主义从海上入侵中国的次数一度达到400多次，几乎绝大多数侵略、割地、赔款都是从海上方向开始的。面向海洋则兴，放弃海洋则衰，海权是决定我们人民共和国和中华民族命运的重要因素。阔步深蓝，我们强大的现代化海军正在加速成长，列强们的舰队在中国的领海肆意妄为的时代一去不复返了！"

 PRC_nuclear_powered_carrier:0 "核动力航母"
 PRC_nuclear_powered_carrier_desc:0 "  随着核能发电站的普及，我们的专家提出可以将反应堆装在航母的动力系统中的，从而让航母达到近乎无限的动力的构想。二战时期的航母结构无法实现这种伟大的构想，我们必须研究出核动力的引擎和更为先进的航母结构。\n  过去，我们曾认为时机尚为成熟，但现在，我们早已习惯共和国创造的一个又一个奇迹。"
 
 PRC_nuclear_powered_battleship:0 "核动力战列舰"
 PRC_nuclear_powered_battleship_desc:0 "  随着核能发电站的普及，我们的专家提出可以将反应堆装在战列舰的动力系统中的，从而让战列舰达到近乎无限的动力和超高移速的构想。二战时期的战列舰结构无法实现这种伟大的构想，我们必须研究出核动力的引擎和更为先进的战列舰结构。\n  过去，我们曾认为时机尚为成熟，但现在，我们早已习惯共和国创造的一个又一个奇迹。"

 PRC_nuclear_powered_submarine:0 "核潜艇与核鱼雷"
 PRC_nuclear_powered_submarine_desc:0 "  由于动力系统的限制，潜艇必须定期回到港口补充能源，这极大限制了潜艇的航程和任务时长。但现在，一切问题将被核潜艇解决。同时随着核武器的小型化，科学家们同时设计出了一种可携带小当量弹头的鱼雷，二者的结合将成为可以击碎一切钢铁巨兽的共和国之矛。\n  核潜艇，一万年都要搞出来！————毛泽东"


 PRC_New_Red_Army:0 "新红军线（放后面）"




 PRC_compulsory_education_system:0 "义务教育制度"
 PRC_compulsory_education_system_desc:0 "义务教育起源于普鲁士，在工业革命以后，资本主义生产迅猛发展，不但要求大大增加劳动者的数量，而且要求提高劳动者的质量。早在清廷时期的《学务纲要》中就已经有了“义务教育”一词。随着时代的发展，我们国家的义务教育的普及也要走上日程。"

 PRC_New_education_system:0 "扫盲大运动"
 PRC_New_education_system_desc:0 "我们将召开第一次全国工农教育会议，专门研究扫盲工作，拟提出“开展识字教育，逐步减少文盲”的口号。我们坚信，很快，一场自上而下、轰轰烈烈的扫盲运动将在全国解放区范围内展开，全国各地都将开办“扫盲班”。"

 PRC_hanzijianhua:0 "汉字简化"
 PRC_hanzijianhua_desc:0 "汉字简化是中国文字改革的三大任务之一，然而腐败无能的国民政府是没有能力推行他那《第一批简体字表》的。但简化字运动在人民群众之中依旧继续进行着。在人民军队解放的地区，到处都可以看到简体字。人们也将这些字成为“解放字”，随着解放区的扩大，“解放字”也开始普及全国。"

 PRC_Chinese_Academy_of_Sciences:0 "中国科学院"
 PRC_Chinese_Academy_of_Sciences_desc:0 "中国科学院（Chinese Academy of Sciences）成立于1949年11月，中央人民政府委员会任命郭沫若为第一任中国科学院院长，陈伯达、李四光、陶孟和、竺可桢为第一任中国科学院副院长，为中国自然科学最高学术机构、科学技术最高咨询机构、自然科学与高技术综合研究发展中心。"

 PRC_computer:0 "国产计算机"
 PRC_computer_desc:0 "1958年中国科学院计算技术研究所根据苏联提供的M-3小型机技术资料制成了第一台国产电子计算机八一型通用电子管计算机（又称103机）。103机每秒运算30次，改进后提高到1500次。1959年9月14日又根据苏联有关计算机技术资料制成104大型通用电子计算机，104机在运算速度、存储容量等主要技术指标方面不仅超过了当时日本的计算机而且不逊于英国已投入运行的最快的计算机。"

 PRC_nationalize_industry_focus:0 "农业社会主义改造"
 PRC_nationalize_industry_focus_desc:0 "分散、脆弱的农业个体经济既不能满足工业发展对农产品的需求，又有两极分化的危险。中共中央于1953年先后发布了《中共中央关于农业生产互助合作的决议》和《中共中央关于发展农业合作社的决议》，中国农村开始了互助合作运动引导他们参加农业生产合作社，走集体化和共同富裕的社会主义道路。"

 PRC_fanghuanhezuohua:0 "放缓合作化进程"
 PRC_fanghuanhezuohua_desc:0 "想让小农思维根深蒂固的中国农民阶级迅速接受集体化显然会有许多困难，也许我们应该适当放缓合作化进程，保证合作化过程的稳定。太过激进可能会适得起反。"

 PRC_jiasujitihua:0 "加速合作化进程"
 PRC_jiasujitihua_desc:0 "正是数千年来脆弱的小农经济使得中国的农民阶级长期处于极端贫困之中，尽管会遇到许多阻力，但我们仍必须坚定地推进农业集体化。"

 PRC_nationalize_industry_ii_focus:0 "手工业社会主义改造"
 PRC_nationalize_industry_ii_focus_desc:0 "个体手工业是以私有制和个体劳动为基础、从事商品生产的一种个体经济，在中国国民经济中占有一定的地位。手工业社会主义改造采取合作化的形式和逐步过渡的步骤，从手工业生产合作小组、手工业供销合作社，再发展为手工业生产合作社。通过合作化道路，把个体手工业转变为社会主义劳动群众集体所有制经济的理论和实践。"

 PRC_nationalize_industry_iii_focus:0 "资本主义工商业社会主义改造"
 PRC_nationalize_industry_iii_focus_desc:0 "中国民族资本主义经济在由新民主主义向社会主义的过渡时期中具有两面性，既有有利于国计民生的一面，又有不利于国计民生的一面；中国民族资产阶级相应也具有两面性。消灭资本主义私有制是过渡时期的一项基本任务，党对之采取了“和平赎买”政策，通过国家资本主义形式逐步将其改造成社会主义公有制企业并将所有制改造与人的改造相结合，努力使剥削者成为自食其力的劳动者。"

 PRC_jieguanqiye:0 "强制接管私营企业"
 PRC_jieguanqiye_desc:0 "“永远不要对布尔乔亚仁慈。”"

 PRC_tuijingongsiheying:0 "继续推进公私合营"
 PRC_tuijingongsiheying_desc:0 "中国共产党对资本主义工商业采取利用、限制、改造的政策，对资产阶级采取赎买政策。通过委托加工、计划订货、统购包销、委托经销代销等一系列从初级到高级的国家资本主义过渡形式对私人资本进行社会主义改造。"

 PRC_modern_industrialization:0 "社会主义初级阶段"
 PRC_modern_industrialization_desc:0 "社会主义改造的胜利使我国社会的经济结构发生了根本变化，几千年来以生产资料私有制为基础的阶级剥削制度基本上被消灭，社会主义经济成了国民经济中的主导成分，社会主义经济制度在中国基本确立。它与1954年召开的第一届全国人民代表大会确立的社会主义政治体制一起，完成了历史上最深刻、最伟大的社会变革，新中国自此从新民主主义社会进入社会主义初级阶段。"

 PRC_nuclear_project_596:0 "启动596工程"
 PRC_nuclear_project_596_desc:0 "原子弹的出现彻底拉开了大国与小国之间的军事差距，若不想笼罩在大国核威慑的阴影之下，我们就必须打破核垄断，跻身有核国家！"
 PRC_nuclear_project_596_focus_flag:0 "已完成国策§Y启动596工程§!"

 PRC_streamlined_industry:0 "社会主义工业化的开端"
 PRC_streamlined_industry_desc:0 "人人都会懂得，只有在我国人民现时生活已经有所改善的条件下尽力增产节约，去建设我国的工业特别是重工业，才能大规模地发展农业，才能从根本上改善工人、农民和全体人民的生活，这是长远的利益所在；只有把我们眼前生活中的局部的利益，服从于国家社会主义工业化的长远的利益，这才是全体人民最高的根本的利益。"

 PRC_rejuvenate_heavy_industry:0 "优先发展重工业"
 PRC_rejuvenate_heavy_industry_desc:0 "正如[PRC.GetLeader]主席所言：“现在我们能造什么？能造桌子椅子，能造茶碗茶壶，能种各种粮食，还能磨成面粉，还能造纸，但是，一辆汽车、一架飞机、一辆坦克、一辆拖拉机都不能造。”优先振兴重工业对于面临帝国主义国家层层包围的新中国来说可谓是刻不容缓。"

 PRC_zhonggongyejiasu:0 "重工业加速发展"
 PRC_zhonggongyejiasu_desc:0 "帝国主义对我们的封锁愈加紧迫了，唯有强大的重工业才能保证新生的人民政权不被敌人击败。"

 PRC_nongqingzhongbili:0 "农、轻、重协调发展"
 PRC_nongqingzhongbili_desc:0 "我们现在发展重工业可以有两种办法，一种是少发展一些农业、轻工业，一种是多发展一些农业、轻工业。从长远观点来看，前一种办法会使重工业发展得少些和慢些，至少基础不那么稳固，几十年后算总账是划不来的。后一种办法会使重工业发展得多些和快些，而且由于保障了人民生活的需要，会使它发展的基础更加稳固。"
 
 PRC_revive_hanyang_steelwork_focus:0 "武汉钢铁厂"
 PRC_revive_hanyang_steelwork_focus_desc:0 "新中国成立后，为发展钢铁工业并改善工业布局，中央开始酝酿在华中地区、长江流域建立一个新的钢铁联合企业。武钢第一期工程于1955年8月开始施工，这是一五计划期间由苏联帮助设计并提供主要设备的重点建设项目之一。到1960年大型厂试轧制，基本完成了年产钢150万吨规模设计包括的主要生产设施及相应的公用辅助设施的建设，同时还将属于二期工程的部分项目提前在1960年建成投产。"
 
 PRC_anshan_steelwork_focus:0 "鞍山钢铁厂"
 PRC_anshan_steelwork_focus_desc:0 "1948年，东北全境解放，鞍钢重新回到了人民的怀抱，随后鞍山钢铁公司成立，成为当时中国最大的钢厂。从1952年下半年起，鞍钢进入大规模建设时期。以鞍钢大型轧钢厂、无缝钢管厂和7号炼铁高炉“三大工程”为代表，新中国第一批重点工业建设项目在鞍钢相继竣工投产，诞生了新中国第一根无缝钢管、第一根重轨、第一座现代化高炉。"

 PRC_national_steelwork_focus:0 "国家钢铁生产"
 PRC_national_steelwork_focus_desc:0 "通过建立组织并密切监控企业的状况是有效的，我们可以将同样的做法应用于钢铁厂，这些钢铁厂已成为几乎所有设备的战时生产工作不可或缺的一部分。"

 PRC_infrastructure_effort_i:0 "公路建设"
 PRC_infrastructure_effort_i_desc:0 "一五计划期间全国公路通车里程达到25万多公里，比1952年增加1倍。川藏、青藏、新藏公路相继通车。许多公路都是修建在群山峻岭和戈壁沙漠之中，使西南和西北地区结束了没有公路的历史。"

 PRC_infrastructure_effort_ii:0 "铁路建设"
 PRC_infrastructure_effort_ii_desc:0 "一五计划期间全国新建铁路33条、恢复铁路3条，新建和修复干线、复线、支线和企业专用线共约一万公里。到1957年底，全国铁路通车里程达29862公里，比1952年增加22%。宝成铁路、鹰厦铁路、集二铁路先后建成，特别是宝成铁路通车形成的铁路网把西北、西南和全国联成一体。1957年10月，我国建成了贯通南北、具有世界水准的武汉长江大桥，结束了长江上没有铁路桥梁的历史。"
 
 PRC_infrastructure_effort_iii:0 "水利建设"
 PRC_infrastructure_effort_iii_desc:0 "新中国成立前我国只有大型水库6座，中型水库17座，小型水库1200座，大中小水库1223座，总库容估计200亿立方左右。1949—1976年，全国建成大型水库302座，中型水库2110座，小型水库82000多座，大中小水库84000多座，总库容4000亿立方。"

 PRC_powerhouse_of_the_east:0 "东方强国"
 PRC_powerhouse_of_the_east_desc:0 "中国是一个幅员辽阔的国家，拥有取之不尽的优质资源和庞大的人口，才能创造出工业强国。是时候动用我们的资源，把这个国家推向光明的未来了。我们将成为亚洲最大的工业强国。"

 PRC_tudigaigefa:0 "[PRC.GetNameDef]土地改革法"
 PRC_tudigaigefa_desc:0 "1950年6月28日，中央人民政府委员会第八次会议讨论并通过了《[PRC.GetNameDef]土地改革法》，明确规定废除地主阶级封建剥削的土地所有制，实行农民的土地所有制。它总结了党过去领导土地改革的经验和教训，又适应新中国成立后的新形势确定了新政策，提出保存富农经济，不动中农土地，限制没收地主财产范围等，成为指导新解放区土地改革的基本法律依据。"
 snl_PRC_dyn_land_reform_1_all_state_have:0 "§G已在全国范围内完成第一轮土地改革§!"

 PRC_national_resource_exploration:0 "[PRC.GetNameDef]地质部"
 PRC_national_resource_exploration_desc:0 "1952年中央人民政府根据《关于调整中央人民政府机构的决议》而成立[PRC.GetNameDef]地质部，其前身为全国地质工作计划指导委员会和矿产地质勘探局，统筹负责全国地质测量和矿业探勘等工作，首任部长为李四光。"

 PRC_aluminium_effort_i_focus:0 "重视铝矿开采 I"
 PRC_aluminium_effort_i_focus_desc:0 "我们需要改进铝的开采和生产，以增强我们的空军力量，所以我们必须采取措施，抢在日本人之前保护我们的资源。"
 
 PRC_aluminium_effort_ii_focus:0 "重视铝矿开采 II"
 PRC_aluminium_effort_ii_focus_desc:0 "为了中国，我们必须流血流汗来进一步增加产量。我们的空军正在扩大，铝在战争中的使用也变得更加普遍和有效。"

 PRC_aluminium_effort_iii_focus:0 "重视铝矿开采 III"
 PRC_aluminium_effort_iii_focus_desc:0 "我们的空军正在蓬勃发展，我们开采的铝几乎达到了最好的水准。只要在生产和开采方面再进行一点改革，我们就能稳稳地踏上战场。"

 PRC_tungsten_effort_i_focus:0 "重视钨矿开采 I"
 PRC_tungsten_effort_i_focus_desc:0 "我们缺乏坦克也可以归因于中国各地缺乏钨的开采和生产。现在是政府投资于日本人正在追逐的这一重要资源的时候了。"

 PRC_tungsten_effort_ii_focus:0 "重视钨矿开采 II"
 PRC_tungsten_effort_ii_focus_desc:0 "钨行业正在蓬勃发展，其在战场上的用途也在不断增加。坦克的产量似乎增加了，重型装甲工业也在增长。"

 PRC_tungsten_effort_iii_focus:0 "重视钨矿开采 III"
 PRC_tungsten_effort_iii_focus_desc:0 "我们现在正在稳步建造坦克，以便在战场上作战，钨业也正在给中国带来繁荣。让我们倾注更多的努力，进一步巩固我们在战场上的地位。"

 PRC_refinery_technology_german:0 "精炼工艺"
 PRC_refinery_technology_german_desc:0 "总有一天我们将不能再依赖于从外国进口橡胶和石油资源。当那天到来时，我们必须准备好使用自产的橡胶和石油满足我们的需求。"

 PRC_yumen_oil_field:0 "玉门油田"
 PRC_yumen_oil_field_desc:0 "玉门的一些地质专家认为那里可能蕴藏着大量的石油。应努力开发利用这些资源。"

 PRC_daqing_oil_field:0 "大庆油田"
 PRC_daqing_oil_field_desc:0 "大庆的一些地质专家认为那里可能蕴藏着大量的石油。应努力开发利用这些资源。"

 PRC_coal_effort_i_focus:0 "开发东北煤矿"
 PRC_coal_effort_i_focus_desc:0 "东北作为我国的重工业基地，不仅是因为东北具有一定的工业基础，还蕴含着惊人的煤矿，开发这些煤矿对共和国生工业发展意义重大"

 PRC_coal_effort_ii_focus:0 "开发平顶山煤矿"
 PRC_coal_effort_ii_focus_desc:0 "经我国专家勘测，位于河南的平顶山中也蕴含着大量煤矿，通过开发这个煤矿，一定能大大提高我国的煤矿产量。"

 PRC_coal_effort_iii_focus:0 "开发淮北煤矿"
 PRC_coal_effort_iii_focus_desc:0 "经我国专家勘测，位于安徽的淮北市中也有一定的煤矿，这是我国华东地区首个平原隐秘式煤田。它的开发将成为华东能源供应的核心基地。"

 PRC_guangdong_plantation:0 "广东国营橡胶农场"
 PRC_guangdong_plantation_desc:0 "橡胶是重要的战略物资，在军事国防上应用更是十分广泛，比如，一辆坦克要用八百多千克橡胶；一艘三万吨级的军舰要用六十八吨橡胶，大部分军事装备、空军设施、国防工程都有橡胶的足迹。至于国防尖端技术需要的耐高温、耐低温、耐油、耐高度真空等特殊性能的橡胶制品更是不可缺少。由于广东有种植橡胶树所需的气候，我们应该帮助那里的农民增加橡胶产量。"
 
 PRC_yunnan_plantation:0 "云南国营橡胶农场"
 PRC_yunnan_plantation_desc:0 "橡胶是重要的战略物资，在军事国防上应用更是十分广泛，比如，一辆坦克要用八百多千克橡胶；一艘三万吨级的军舰要用六十八吨橡胶，大部分军事装备、空军设施、国防工程都有橡胶的足迹。至于国防尖端技术需要的耐高温、耐低温、耐油、耐高度真空等特殊性能的橡胶制品更是不可缺少。由于云南有种植橡胶树所需的气候，我们应该帮助那里的农民增加橡胶产量。"
 
