 PRC_hainan_plantation_desc:0 "橡胶是重要的战略物资，在军事国防上应用更是十分广泛，比如，一辆坦克要用八百多千克橡胶；一艘三万吨级的军舰要用六十八吨橡胶，大部分军事装备、空军设施、国防工程都有橡胶的足迹。至于国防尖端技术需要的耐高温、耐低温、耐油、耐高度真空等特殊性能的橡胶制品更是不可缺少。由于海南有种植橡胶树所需的气候，我们应该帮助那里的农民增加橡胶产量。"
 
 PRC_neimenggu_gekuang:0 "开采内蒙古铬矿"
 PRC_neimenggu_gekuang_desc:0 "中国的铬矿产地多达56处，主要分布在西藏、新疆、内蒙古、甘肃等13个省（区），尤其是西藏，保有储量约占全国的一半。然而尽管中国的铬矿资源分布广泛，但总体上中国的铬矿资源相对匮乏，储量仅占全球的0.16%，进一步发展铬矿的开采和加工技术并加大开发力度是是十分必要的。"
 
 PRC_xinjiang_gekuang:0 "开采新疆铬矿"
 PRC_xinjiang_gekuang_desc:0 "中国的铬矿产地多达56处，主要分布在西藏、新疆、内蒙古、甘肃等13个省（区），尤其是西藏，保有储量约占全国的一半。然而尽管中国的铬矿资源分布广泛，但总体上中国的铬矿资源相对匮乏，储量仅占全球的0.16%，进一步发展铬矿的开采和加工技术并加大开发力度是是十分必要的。"
 
 PRC_xizang_gekuang:0 "开采西藏铬矿"
 PRC_xizang_gekuang_desc:0 "中国的铬矿产地多达56处，主要分布在西藏、新疆、内蒙古、甘肃等13个省（区），尤其是西藏，保有储量约占全国的一半。然而尽管中国的铬矿资源分布广泛，但总体上中国的铬矿资源相对匮乏，储量仅占全球的0.16%，进一步发展铬矿的开采和加工技术并加大开发力度是是十分必要的。"

 PRC_focus_on_diplomacy:0 "重视外交"
 PRC_focus_on_diplomacy_desc:0 "如今中国局势已定，内政问题基本已经解决，是时候处理一些与外国的领土争端与国际外交问题了。"

 PRC_focus_on_inner_problem:0 "聚焦国内"
 PRC_focus_on_inner_problem_desc:0 "由于百年耻辱和内战，很多国外势力借机非法占领我国大片领土。如今中国重生，是时候解决这些领土争端了！"
 
 PRC_lingtu_from_the_west:0 "与西方重议领土问题"
 PRC_lingtu_from_the_west_desc:0 "西方列强及其盟友占领了我们大量领土，如香港、澳门、藏南地区等，现在是时候解决这些问题了。"

 PRC_xinanlingtu:0 "西南领土争端"
 PRC_xinanlingtu_desc:0 "历史上，藏南和江心坡在一系列殖民动荡中脱离了我们，是时候谈谈了。"
 prc_xinan_dec_tt:0 "解锁收复藏南、江心坡的决议！"

 PRC_HKMC:0 "港澳问题"
 PRC_HKMC_desc:0 "香港和澳门是帝国主义给中国留下伤痕的铁证，我们将会解决这一问题。"
 prc_hkmc_dec_tt:0 "解锁收复港澳的决议！"

 PRC_lingtu_from_the_SOV:0 "与苏联重议争议领土"
 PRC_lingtu_from_the_SOV_desc:0 "苏联，又或是沙俄，曾经非法占据了大量中国领土，又鼓动外蒙和唐努乌梁海独立。现在中国人民站起来了，这些问题也就当解决。"

 PRC_Demand_mongolia:0 "收复外蒙"
 PRC_Demand_mongolia_desc:0 "蒙古在军阀掌权期间被俄国人窃取了。现在他们必须回归。"

 PRC_Demand_Tangnutuwa:0 "收复唐努乌梁海"
 PRC_Demand_Tangnutuwa_desc:0 "唐努图瓦，原名唐努乌梁海，过去被沙俄控制，苏联剿灭白军后就一直驻军在那里。现在我们应当处理这个问题了。"

 PRC_Demand_outer_northeast_and_westeast:0 "外东北与外西北"
 PRC_Demand_outer_northeast_and_westeast_desc:0 "如今外蒙和唐努乌梁海的问题都已解决，是时候处理外东北和外西北的问题了。"

 PRC_Concession_or_cede:0 "索取合法领土"
 PRC_Concession_or_cede_desc:0 "腐败的前清领导人让外国列强根据领土不平等条约窃取中国的正义领土。作为现代中国的领导人，我们正在纠正这一错误。"

 PRC_TaiWan_problem:0 "台湾问题"
 PRC_TaiWan_problem_desc:0 "三大战役后，国民党反动派已经计划将台湾作为退出中国大陆的最后落脚点。我党为解放全中国，彻底完成新民主主义革命任务，台湾问题是必须解决的。" 

 PRC_TaiWan_annex_by_peace:0 "和平统一"
 PRC_TaiWan_annex_by_peace_desc:0 "当下国际局势紧张，美国政府明确支持反动势力，直接使用武力代价太大，而且成功的可能不高。增强交流，引导台湾人民自发站起来反对国民党反对派才是最优解。"

 PRC_TaiWan_annex_by_war:0 "武力统一"
 PRC_TaiWan_annex_by_war_desc:0 "自我们解放整个中国大陆，国民党反动派一直龟缩在台湾。现在共和国已经强大起来，国家领土没有任何谈的余地，统一事业刻不容缓，任何企图阻挡解放军的反动势力都会陷入人民战争的汪洋大海之中！"

