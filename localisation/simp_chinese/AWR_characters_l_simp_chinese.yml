 #####中共
 PRC_zhang_wentian:0 "张闻天"
 PRC_zhang_wentian_desc:0 "张闻天是一位教师和作家，他写了许多关于中国和社会主义思想的文章。 1925年加入中国共产党，1928年帮助建立了28布尔什维克。\n\n第一次中国内战期间，他写文章劝说人们加入共产运动，并在中共六届五次会议上当选中央政治局委员、中央书记处书记。"
 PRC_mao_zedong:0 "毛泽东"
 PRC_mao_zedong_desc:0 "一位政治知识分子、理论家、军事家和诗人，是毛泽东所为人熟知的。\n\n毛泽东早年反帝反封，参与了推翻清政府的辛亥革命运动，并在辛亥革命后重返教育领域。\n\n他在求学期间被共产主义理念所吸引，1922年加入新成立的中国共产党，成为湘区委员会书记，是一名后起之秀。在国民大革命期间，毛泽东支持国民革命军直到四一二事变爆发。后在江西苏维埃时期任中华苏维埃共和国中央执行委员会和人民委员会主席。在第五次反围剿失败后，他随红一军团长征，并在遵义会议后重新取得红军的军事领导权"
 PRC_zhang_guotao:0 "张国焘"
 PRC_zhang_guotao_desc:0 "张国焘是中国共产党的创始成员。\n\n1920年代赴苏联留学，成为共产国际的重要联络人，与国民党在统一战线组织中共劳工运动。 1931年，党被逐出城市后，他成立了鄂玉湾苏维埃。\n\n1935年，当他的军队被赶出该地区时，他参加了长征，并与毛泽东开始了党的领导权斗争."
 prc_xu_teli:0 "徐特立"
 prc_xu_teli_desc:0 "徐特立是包括毛泽东在内的几位中国领导人物的老师。 曾参加辛亥革命，在1927年国共分裂时加入中国共产党。\n\n1928年赴莫斯科中山大学就读，1930年回国任中华苏维埃共和国教育部长。\n\n1934年参加长征。"
 PRC_lin_boqu:0 "林伯渠"
 PRC_lin_boqu_desc:0 "林伯渠是中国政治家和诗人。 他是孙中山的早期支持者和同盟会成员。\n\n国共分裂后，林伯渠转投共产党，1927年参加南昌起义。不久，他离开中国，在苏联逗留六年，就读于莫斯科中山大学。\n\n1933年底，林伯渠回国，活跃于江西苏维埃，任财政部长，主持农委会工作。"
 prc_xie_juezai:0 "谢觉哉"
 prc_xie_juezai_desc:0 "谢觉哉是中共最资深的成员之一，多年的游击战对他衰老的身体造成了很大的影响。\n\n但是，针对党内的腐败和腐朽问题，他仍积极学习法律规范，成为中共资深的司法专家。"
 PRC_zhou_enlai:0 "周恩来"
 PRC_zhou_enlai_desc:0 "周恩来年轻时积极参加五四运动； 运动结束后赴法国留学，1921年加入中国共产党的一个分部。\n\n周作为中共早期核心成员，参与甚至主导了黄埔军校、南昌起义、反围剿等重大事件和决策。\n\n1932年10月，周主持宁都会议，毛泽东被免职； 但在第五次反围剿失败后，他转而在遵义会议上支持毛泽东，以维持自己的立场。"
 PRC_liu_shaoqi:0 "刘少奇"
 PRC_liu_shaoqi_desc:0 "刘少奇是中国革命家、政治家和理论家。 他是中共早期党员，1920年加入社会主义青年团，次年入党。\n\n刘参与了1934年的长征，至少在关键的遵义会议上，他是毛泽东在会议上的坚定支持者之一。\n\n他还善于组织游击运动。"
 PRC_chen_yun:0 "陈云"
 PRC_chen_yun_desc:0 "作为上海着名商务印书馆的排字员，其在1920年代初中期作为年轻的组织者在工运中发挥了突出的作用，1924年加入中国共产党。\n\n1930年任中央委员，1934年成为政治局委员。\n\n1933年撤往江西苏维埃。 他全面负责党的“白区”工作，即在不受党控制的地方进行地下活动。 长征途中，他是出席遵义会议的四名政治局常委之一。\n\n1935年春某时离开长征，返回上海，1935年9月赴莫斯科，任中共驻共产国际代表之一。"
 PRC_deng_xiaoping:0 "邓小平"
 PRC_deng_xiaoping_desc:0 "1923年，邓小平在欧洲加入中国共产主义青年团，并成为团的主要成员之一，并于次年入党。\n\n1926年邓小平远赴苏联，在莫斯科中山大学学习1年，后随冯军。\n\n1929年国共分裂后，邓离冯率军领导百色起义，但起义失败，邓逃往江西苏维埃。\n\n在江西苏维埃，邓任江西宣传部部长。 他在权力斗争中贊成毛泽东的思想，曾一度使他在1933年下台，但邓小平以第五次反围剿为契机，重新掌权。"
 prc_wang_guanlan:0 "王观澜"
 prc_wang_guanlan_desc:0 "1932年和1933年土地调查运动的主要倡导者。这次运动引起了毛泽东的兴趣，王观澜很快就上台了。\n\n长征后到陝西，任国土部部长、农运委员会部长。"
 PRC_dong_biwu:0 "董必武"
 PRC_dong_biwu_desc:0 "董必武是中国共产党革命家、政治家，曾加入同盟会，参加过武昌起义。\n\n1920年，董在武汉成立了中国共产主义的一个分部，成为中共的创始人之一。\n\n国共分裂后，董和离开中国，先后就读于国际列宁学校和莫斯科中山大学4年左右。\n\n1932年回国，任红军学院政治主任、江西苏维埃党校校长。 在此期间，董在两人争夺党的领导权的斗争中站在毛泽东一边而不是李立三。\n\n在参加长征并到达延安后，恢復了学校领导职务。"
 PRC_cai_shufan:0 "蔡树藩"
 PRC_cai_shufan_desc:0 "蔡树藩早年是一名煤矿工人，1925年20岁左右入党，参加中共第六次全国代表大会，先后就读于莫斯科中山大学和国际列宁学校。\n\n在第三次反围剿中，他的左臂被截肢。 遵义会议后，任中央军委纵队政委、中央军委政治部部长。"
 prc_wang_jiaxiang:0 "王稼祥"
 prc_wang_jiaxiang_desc:0 "王稼祥，安徽省泾县人。中国共产党的优秀党员，忠诚的马克思主义者，杰出的无产阶级革命家，中国共产党和中国人民解放军卓越领导人，新中国优秀的外交家，首任苏联大使。1935年遵义会议后的3月中旬，在贵州鸭溪、苟坝一带，成立由毛泽东、周恩来、王稼祥组成的新的中央三人军事领导小组，通过中革军委、红军总政治部负责指挥全军的军事行动。"
 prc_bo_gu:0 "博古"
 prc_bo_gu_desc:0 "秦邦宪，以他的汉化俄罗斯名字“博古”而闻名，是中国共产党的高级政治领导人。 他曾就读于上海大学，后被派往莫斯科中山大学，成为统称为28个布尔什维克的国际主义团体的一员。\n\n1931年任中共中央总书记。 直到1935年在遵义会议期间因抗击国民党围剿战略失败而被免职。 辞职后，他继续在政治局常委任职。"
 prc_wang_ming:0 "王明"
 prc_wang_ming_desc:0 "王明年轻时是一名维权人士，曾领导抵制日本产品，并抗议被操纵的选举。\n\n1924年入武昌商学院，发表多篇关于革命和共产主义的文章。\n\n同年加入中国共产党，参加了5月30日革命。\n\n1925年，他帮助成立了28个布尔什维克，并试图与他的28个布尔什维克伙伴一起接管中国共产党。\n\n然而在 1931 年，28 名布尔什维克中的许多人被捕，王明前往莫斯科为中共争取共产国际的支持。"
 prc_meng_qingshu:0 "孟庆树"
 prc_meng_qingshu_desc:0 "莫斯科中山大学校友，中共第六次全国代表大会代表，1930年被捕前在上海妇女委员会工作。\n\n11月获释后，在舅舅的坚持下，她嫁给了王明。 1931 年 10 月，在他们结婚大约一年后，孟跟随王明飞往莫斯科。"
 prc_chen_changhao:0 "陈昌浩"
 prc_chen_changhao_desc:0 "陈是第28届布尔什维克成员、红四军重要军事人物，在中共内部经历已久。\n\n于1930年代初，他在国民党佔领的地区建立小基地，但在第一次围剿行动中被阻止，并在长征中率领第四军。"
 prc_wang_shengrong:0 "王生荣"
 prc_wang_shengrong_desc:0 "来自工人运动，以诚实务实着称的中共青年党员。\n\n从莫斯科回来后，他主要负责组织共产党少先队，培养青少年成为党的志愿者。\n\n经历长征，王生荣心系党的革命抗日事业，等待风雨来临。"
 PRC_chen_duxiu:0 "陈独秀"
 PRC_chen_duxiu_desc:0 "陈独秀是中国革命社会主义者、教育家、哲学家、作家。 1921年共同创办中国共产党，任第一任总书记，1927年因4月12日清党辞职。\n\n1929年被开除，加入托洛茨基的国际左翼反对派。 他于 1932 年被上海国际租界逮捕，并被引渡到南京服刑 15 年。"
 prc_peng_shuzhi:0 "彭述之"
 prc_peng_shuzhi_desc:0 "早年是中国社会主义同盟成员，1920年被派往莫斯科留学，1924年回国，成为中共中央委员。\n\n他在中共期间的工作是指导党的宣传工作，并在 1925 年至 1927 年革命期间编辑党的中央刊物。 1929年，他因支持托洛茨基主义而与陈独秀一同被开除。"
 prc_zheng_chaolin:0 "郑超麟"
 prc_zheng_chaolin_desc:0 "曾经是作家、诗人、历史学家、语言学家和翻译家。 郑超麟对共产活动参与已久，1922年在法国成立共产党，并被选入莫斯科东方劳动大学。 在中共需要干部协助革命活动后，他回到了中国。\n\n他控制了宣传部门，但很快被国民党当局逮捕。"
 prc_wang_fanxi:0 "王凡西"
 prc_wang_fanxi_desc:0 "王凡西1925年加入中国共产党，就读于共产主义东方大学。 留学期间成为托洛茨基和国际左翼反对派的支持者，1930年回国。\n\n王为中共工作，成为托洛茨基十月集团的主要成员。 他于 1931 年被捕。"
 prc_wang_shiwei:0 "王实味"
 prc_wang_shiwei_desc:0 "王实味，文学作家、记者。 先后就读于北京大学、欧洲基础学院、马克思-恩格斯研究所等多所大学。\n\n在莫斯科学习期间，他帮助创立了28个布尔什维克，并在毛泽东任主席时加入了中国共产党。"
 PRC_quanguorenda:0 "全国人民代表大会常务委员会"
 PRC_quanguorenda_desc:0 "全国人民代表大会，是中国最高国家权力机关。它的常设机关是全国人民代表大会常务委员会。全国人民代表大会和全国人民代表大会常务委员会行使国家立法权。全国人民代表大会由省、自治区、直辖市、特别行政区和军队选出的代表组成。各少数民族都应当有适当名额的代表。"
 prc_shen_junru:0 "沈钧儒"
 prc_shen_junru_desc:0 "沈钧儒（1875年1月2日—1963年6月11日），字秉甫，号衡山，浙江嘉兴人，沈钧儒祖居在嘉兴城内南帮岸2号，现在改建成为沈钧儒纪念馆。清光绪甲辰（1904）进士。1905年留学日本。回国后参加辛亥革命和反对北洋军阀的斗争。1912年加入中国同盟会。五四运动期间，撰文提倡新道德、新文化。曾任国会议员、广东军政府总检察厅检察长、上海法科大学教务长。1936年，他与宋庆龄等发起并组织了全国各界救国联合会，积极开展抗日救亡运动，触怒当局而遭入狱，为著名的救国会“七君子”领头人。之后，他为反对内战争取和平，建立和扩大爱国统一战线作出了很大贡献，是中国民主同盟的创始人之一。曾出席在柏林召开的国际民主法律工作者协会第五届代表大会，当选为国际民主法律工作者协会副主席。新中国成立后，历任最高人民法院院长、全国政协副主席、全国人大常委会副委员长和民盟中央主席等职，被誉为“民主人士左派的旗帜”、“爱国知识分子的光辉榜样”。"
 renminfayuan:0 "最高人民法院院长。"
 PRC_wang_shengrong:0 "王盛荣"
 PRC_songqingling:0 "宋庆龄"
 PRC_songqingling_desc:0 "宋庆龄同志，举世闻名的二十世纪的伟大女性，伟大的爱国、民主、国际主义和共产主义战士，也是中华人民共和国的缔造者之一。同时，作为孙中山之妻，她亦是当之无愧的国母，矢志不移、英勇奋斗，始终坚定地和中国人民与中共站在一起。在数十年如一日的岁月里，她为妇女儿童的文教事业殚精竭力，鞠躬尽瘁，做出了不可磨灭的贡献。"
 PRC_he_cheng:0 "贺诚"
 he_cheng_desc:0 "贺诚（1901-1992 ），四川射洪人，北大医学院毕业。1925年入党，参加广州起义。1931年任红军总卫生部部长，创建红军首所军医学校，制定卫生法规，成为人民军队卫生事业奠基人。长征任总卫部长。1937年赴苏联深造，系统学习军事医学。"
 PRC_mao_anying:0 "毛岸英"
 PRC_li_zhen:0 "李贞"
 prc_zhang_qinqiu:0 "张琴秋"
 prc_zhang_qinqiu_desc:0 "张秋琴（应为张琴秋，1904-1968）是一位杰出的红军女将领和军事指挥员，她直接创建并领导了红军历史上规模最大的妇女武装力量。1924年加入中国共产党，1925年赴苏联莫斯科中山大学学习。\n\n第一次中国内战期间，她在鄂豫皖根据地参与军事教育工作，后任红四方面军政治部主任。1933年起，她受命组建并担任妇女独立团团长（后扩编为独立师师长），指挥女战士参与作战、运输和根据地保卫。1935年随红四方面军长征，任政治部组织部部长。\n\n1936年西征中，她任西路军政治部组织部长。西路军失败后被俘，始终坚贞不屈，次年经组织营救回延安。抗日战争时期，她主要从事干部教育和妇女工作。中华人民共和国成立后，长期担任纺织工业部副部长，为新中国轻工业建设作出贡献。"
 PRC_zhu_de:0 "朱德"
 zhu_de_desc:0 "朱德（1886年12月1日-1976年7月6日），字玉阶，原名朱代珍，曾用名朱建德，伟大的马克思主义者，伟大的无产阶级革命家、政治家、军事家，中国人民解放军的主要缔造者之一，中华人民共和国的开国元勋，是以毛泽东同志为核心的党的第一代中央领导集体的重要成员。1886年12月1日生，字玉阶。四川仪陇人。1909年考入云南陆军讲武堂，同年加入中国同盟会。参加了辛亥革命。1913年后在滇军任营长、副团长、团长、旅长。曾参加护国、护法战争。1922年赴德国留学，同年加入中国共产党。1925年到苏联学习军事，次年回国。1927年在南昌创办国民革命军第三军军官教育团，参加领导八一南昌起义，任起义军第九军副军长。1928年参与领导湘南起义，建立工农民主政权，同年4月，率起义军上井冈山，同毛泽东领导的部队会师，成立了中国工农革命军（后改称红军）第四军。土地革命战争时期，任中国工农革命军第四军军长。1930年起，任中国工农红军第一军团军团长，第一方面军总司令，中国工农红军总司令，中央革命军事委员会主席。和毛泽东一起指挥红军取得了第一、二、三次反“围剿”的胜利。1933年春和周恩来一起指挥红军取得了第四次反“围剿”的胜利。1934年10月参加长征。1935年1月，在党中央召开的遵义会议上，严正批判了“左倾冒险主义”的错误，坚决拥护和支持毛泽东在全党的领导地位。在长征途中，对张国焘的分裂红军和叛党活动，进行了坚决的斗争。抗日战争时期，任中央军委副主席，八路军总指挥（后改称第十八集团军，任总司令）。转战晋察冀鲁豫等省，建立和扩大抗日根据地。1940年冬，提出“南泥湾政策”,对发展大生产运动，粉碎国民党反动派对陕甘宁边区的封锁，作出了重大贡献。解放战争时期，任中央军委副主席，中国人民解放军总司令。协助毛泽东组织指挥了辽沈、淮海、平津三大战役，随后又和毛泽东一起发出向全国进军的命令，指挥人民解放军渡过长江，为推翻国民党反动统治，夺取解放战争的伟大胜利作出了巨大贡献。建国后，历任中央人民政府副主席，中共中央军事委员会副主席，中国人民解放军总司令，中华人民共和国副主席，国防委员会副主席。1949年11月至1955年5月兼任中央纪律检查委员会书记。朱德同志的一生是光辉的一生，波澜壮阔的一生。朱德同志参加革命70年，经历了旧民主主义革命、新民主主义革命、社会主义革命、社会主义建设几个历史时期，经历过许多磨难和险境，为中国人民解放事业和社会主义建设事业建立了不朽功勋，深受全党全军全国各族人民爱戴和崇敬。毛泽东同志称赞朱德同志是“人民的光荣”。这是党对朱德同志的最高评价，这是人民对朱德同志的最高评价。"
 PRC_peng_dehuai:0 "彭德怀"
 pengdehuai_desc:0 "彭德怀（1898年10月24日-1974年11月29日），男，原名得华，号石穿，出生于湖南省湘潭县彭家围子。中华人民共和国开国元帅，伟大的无产阶级革命家，军事家，政治家，中国人民解放军创建人和领导人之一。彭德怀于1928年加入中国共产党，第二次国内革命战争时期历任中国工农红军师长、军长、三军团总指挥、中华苏维埃共和国中央革命军事委员会副主席；长征后期担任过陕甘支队司令员；到达陕北以后，担任过红军前敌总指挥。抗日战争时期，担任八路军副总指挥，中共中央北方局代理书记。解放战争时期，担任中国人民解放军副总司令、西北野战军(后为第一野战军)司令员兼政治委员。新中国成立后，任中央人民政府委员、人民革命军事委员会副主席、西北军政委员会主席、中共中央西北局第一书记、西北军区司令员。1950年10月，出任中国人民志愿军司令员兼政治委员。1954年后任国务院副总理兼国防部长、国防委员会副主席，对中国人民解放军的现代化、正规化建设，作出了卓越的贡献。1955年被授予中华人民共和国元帅军衔。1956年在中共八届一中全会上，当选为中共中央政治局委员。彭德怀同志是中国共产党优秀党员，德高望重的老一辈无产阶级革命家、政治家、军事家，党、国家和军队的杰出领导人。从新民主主义革命时期到社会主义建设时期，他为了党和人民的事业鞠躬尽瘁，奉献了自己的全部智慧和力量，建立了彪炳史册的不朽功勋。"
 PRC_lin_biao:0 "林彪"
 linbiao_desc:0 "林彪（1907年12月5日-1971年9月13日），出生于湖北黄冈林家大湾，军事家，原名林祚大，字阳春，号毓蓉；曾用名育容、育荣、尤勇、李进。9岁入私塾，13岁起就读于林育南、恽代英等在黄冈八斗湾创办的浚新学校。15岁转入武昌共进中学，并于1923年加入中国社会主义青年团。后经当地中共组织批准南下广州，考入黄埔军校第四期，编在步兵科第2团第2营第3连，同时改名为林彪。在黄埔军校由共青团转入中国共产党，并任3连中共支部书记。1926年10月毕业后，由广州北上武汉，被分派到国民革命军第4军叶挺独立团任见习排长，参加北伐战争。8月2日由聂荣臻、周士第直接率领参加南昌起义。起义后任73团3营7连连长。同年10月起义军在广东潮（州）汕（头）地区失败后，随朱德、陈毅转战闽、粤、赣、湘边地区。1928年1月参加湘南起义，改任工农革命军第1师1营2连连长。同年4月随湘南起义军到达井冈山，先后任中国工农红军第4军28团营长、团长，参加了井冈山革命根据地的反“进剿”、反“会剿”斗争。1934年10月中央红军长征开始后，与聂荣臻指挥所部参加了突破国民党军四道封锁线和强渡乌江作战。1935年1月参加了中共中央在贵州遵义召开的政治局扩大会议，会后指挥红1军团参加四渡赤水、巧渡金沙江、强渡大渡河、夺占泸定桥等作战。抗日战争爆发后，被任命为八路军第115师师长和该师军政委员会书记，并任中共中央革命军事委员会和军委前方分会委员，率部挺进华北抗日前线。抗日战争胜利后，奉派到山东拟任山东军区司令员、中共山东分局委员。1945年9月下旬，当其行至河南濮阳地区时接到中央电令，遂奉命兼程转赴东北，于10月底抵达沈阳。此后，曾对中央军委南下作战的指示迟疑不决，直到1948年7月才初步定下实施辽沈战役的决心。9月战役打响后，对敌情作出正确判断，在攻克锦州后果断举行辽西会战，围歼国民党军“西进兵团”，取得战役的决定性胜利。在解放战争中，曾总结部队的作战经验，提出“一点两面”、“三三制”、“四组一队”、“四快一慢”等战术原则。新中国成立后，任中南军政委员会（后改为中南行政委员会）主席、中南军区兼第四野战军司令员、中共中央中南局第一书记。1955年被授予元帅军衔。"
 PRC_liu_bocheng:0 "刘伯承"
 liubocheng_desc:0 "刘伯承（1892年12月4日—1986年10月7日），原名刘明昭，曾用名刘伯坚，四川省开县人（现重庆市开州区）。中国共产党的优秀党员，中华人民共和国元帅，中国人民解放军缔造者之一，伟大的无产阶级革命家、军事家、马克思主义军事理论家，军事教育家。辛亥革命时期从军，1926年加入中国共产党。相继参加了北伐战争、八一南昌起义、土地革命战争、长征、抗日战争、解放战争等。建国后，历任中共中央西南局第二书记，西南军政委员会主席，中国人民解放军军事学院院长兼政委，中央人民政府人民革命军事委员会副主席。1955年被授予元帅军衔。1986年10月7日，刘伯承在北京逝世，终年94岁。刘伯承为中华民族和中国人民的解放事业建立了不朽功勋，为我国的国防建设和社会主义建设事业作出了杰出贡献，对我军向正规化、现代化迈进作出了卓越的贡献。刘伯承的一生，经历了中国革命战争的全部过程。他判断敌情准确，计划战斗周密，善于出奇制胜，以神机妙算、足智多谋著称。朱德元帅曾赞誉他“具有仁、信、智、勇、严的军人品质，有古名将风，为国家不可多得的将才”。邓小平同志在《悼伯承》一文中写道：“伯承同志是我党我军的大知识分子，大军事家。他的军事指挥艺术和军事理论造诣，在国内外屈指可数。”“对于毛泽东军事思想的形成和发展，伯承是有大贡献的。”"
 helong_desc:0 "贺龙（1896年3月22日-1969年6月9日），原名贺文常，字云卿，湖南桑植人。伟大的无产阶级革命家、军事家，中国人民解放军的创始人和主要领导者之一。他在半个多世纪的革命斗争生涯中，为中国的旧民主主义革命、新民主主义革命、社会主义革命和建设，作出了重要贡献，建立了不朽功勋。1914年参加孙中山领导的中华革命党。1916年1月参与领导湘西暴动，发动群众攻打石门县城。3月率领乡邻21人捣毁芭茅溪盐局，缴枪12支。随即，组织桑植讨袁护国民军并任总指挥，后任湘西护国军左翼第1梯团第2营营长。抗日战争爆发后，任八路军第120师师长。1948年6月任中共中央西北局第二书记，9月兼任西北军政大学校长。1956年在中共中央八届一中全会上当选中央政治局委员。他从1952年起兼任国家体育运动委员会主任，是新中国体育事业的奠基人。贺龙是杰出的共产主义战士。他一生追求真理，把毕生的精力和心血都奉献给了党和人民。战争年代，为人民的解放事业，英勇善战，历尽艰险，百折不挠；和平时期，为社会主义建设，呕心沥血，鞠躬尽瘁，死而后已。他坚决执行党的路线、方针、政策，严格遵守党的纪律，自觉维护党的统一和团结。他对敌人恨，对人民爱，对无产阶级革命事业忠心耿耿。他的一生，是革命的一生，战斗的一生。他大公无私，刚直不阿，言行一致，光明磊落，平易近人，豁达大度，爱护战士，关心群众。他的英雄形象和崇高品德深受全党、全军和全国各族人民的崇敬和爱戴。"
 PRC_he_long:0 "贺龙"
 helong_desc:0 "贺龙（1896年3月22日-1969年6月9日），原名贺文常，字云卿，湖南桑植人。伟大的无产阶级革命家、军事家，中国人民解放军的创始人和主要领导者之一。他在半个多世纪的革命斗争生涯中，为中国的旧民主主义革命、新民主主义革命、社会主义革命和建设，作出了重要贡献，建立了不朽功勋。1914年参加孙中山领导的中华革命党。1916年1月参与领导湘西暴动，发动群众攻打石门县城。3月率领乡邻21人捣毁芭茅溪盐局，缴枪12支。随即，组织桑植讨袁护国民军并任总指挥，后任湘西护国军左翼第1梯团第2营营长。抗日战争爆发后，任八路军第120师师长。1948年6月任中共中央西北局第二书记，9月兼任西北军政大学校长。1956年在中共中央八届一中全会上当选中央政治局委员。他从1952年起兼任国家体育运动委员会主任，是新中国体育事业的奠基人。贺龙是杰出的共产主义战士。他一生追求真理，把毕生的精力和心血都奉献给了党和人民。战争年代，为人民的解放事业，英勇善战，历尽艰险，百折不挠；和平时期，为社会主义建设，呕心沥血，鞠躬尽瘁，死而后已。他坚决执行党的路线、方针、政策，严格遵守党的纪律，自觉维护党的统一和团结。他对敌人恨，对人民爱，对无产阶级革命事业忠心耿耿。他的一生，是革命的一生，战斗的一生。他大公无私，刚直不阿，言行一致，光明磊落，平易近人，豁达大度，爱护战士，关心群众。他的英雄形象和崇高品德深受全党、全军和全国各族人民的崇敬和爱戴。"
 PRC_chen_yi:0 "陈毅"
 chenyi_desc:0 "陈毅（1901年8月26日-1972年1月6日），男，名世俊，字仲弘，四川乐至人，中华人民共和国十大元帅之一。中国人民解放军创建人和领导人之一，伟大的无产阶级革命家、军事家、外交家。曾任中华人民共和国国务院副总理、中共中央军委副主席、中华人民共和国外交部长，上海市人民政府首任市长。一九一九年赴法国勤工俭学。一九二一年回国。一九二三年加入中国共产党。一九二七年在南昌起义部队任第十一军二十五师七十三团政治指导员。参加领导湘南起义。土地革命战争时期，任工农革命军第一师党代表，中国工农红军第四军十二师党代表、师长，红四军军委书记、军政治部主任，红六军、红三军政治委员，中共赣西南特委书记，红二十二军军长，江西军区总指挥，西方军总指挥，中华苏维埃共和国中央政府办事处主任。领导了南方三年游击战争。抗日战争解放战争时期，任新四军军长兼山东军区司令员，华东军区司令员，华东野战军司令员兼政治委员，中原军区和中原野战军副司令员，第三野战军司令员兼政治委员。中华人民共和国成立后，任华东军区司令员兼上海市市长，人民革命军事委员会副主席，国务院副总理兼外交部部长，中共中央军委副主席。一九五五年被授予元帅军衔。时期，任新四军第一支队司令员，江南指挥部、苏北指挥部指挥，新四军代军长。陈毅同志是久经考验的无产阶级革命家、军事家、外交家，中国人民解放军的创建者和领导者之一，党和国家的卓越领导人。他毕生坚信马克思主义，坦荡无私、爱憎分明，为人民军队的创建和发展，为争取人民解放的革命事业和新中国社会主义的建设事业，建立了不朽的功绩。"
 PRC_luo_ronghuan:0 "罗荣桓"
 luoronghuan_desc:0 "罗荣桓（1902年11月26日—1963年12月16日），原名罗慎镇，字雅怀，号宗人。生于湖南省衡山县寒水乡南湾村（今属衡东县荣桓镇）。中华人民共和国成立后，罗荣桓任最高人民检察署检察长、政务院政治法律委员会委员。中华人民共和国的开国元勋，中国十大元帅之一。1927年加入中国共产主义青年团，同年转入中国共产党。参加了湘赣边秋收起义。土地革命战争时期，历任工农革命军第一军一师一团特务连党代表，中国工农红军第四军十一师三十一团营党代表，第二纵队党代表，红四军政治委员，红一军团政治部主任，江西军区政治部主任，红军总政治部巡视员、动员，红八军团政治部主任，红一军团政治部副主任，红军大学一科政治委员，中国工农红军后方政治部主任。参加了长征。抗日战争时期，历任八路军一一五师政治部主任、政治委员，代师长、山东军区司令员兼政治委员，中共中央山东分局书记。解放战争时期，历任东北民主联军副政治委员，东北军区副政治委员，东北野战军政治委员，第四野战军第一政治委员，中共中央华中局第二书记，华中军区、中南军区第一政治委员，参与指挥三下江南、四保临江、血战四平、辽沈战役、平津战役等著名战役。建国后，历任中央人民政府最高人民检察署检察长，中国人民解放军总政治部主任兼总干部管理，人民革命军事委员会副主席，第一、二届国防委员会副主席，第一、二届全国人大会副委员长。是中共第七届中央委员、第八届中央政治局委员。罗荣桓元帅是一个伟大的无产阶级革命家、军事家，也是一个伟大的政治家，堪称中国人民解放军政治工作的奠基人。他从秋收起义担任特务连党代表起，就与党的政治工作结下了不解之缘。此后，党代表、政治部主任、政治委员、总政治部主任、解放军政治学院院长......等我军政治工作的各级领导岗位便一直伴随着他的光辉一生。罗荣桓元帅从事政工时间之长、经历政工岗位之多、开创政工方法之新、作出政工业绩之大令人瞩目，为人称道。十大元帅中，罗荣桓当之无愧地被誉为“政工元帅”，是我军政治工作的杰出典型，其在管党、治军、建政方面的丰功伟绩将永载史册，他在政工方面的一些鲜活故事也广为传颂。"
 PRC_xu_xiangqian:0 "徐向前"
 xuxiangqian_desc:0 "徐向前（1901年11月8日—1990年9月21日），字子敬，出生于山西省五台县永安村。原名徐象谦，字子敬。山西五台县人。黄埔军校第一期毕业。曾任国民军第二军第六混成旅教导营教官、参谋、副团长。1927年任武汉中央军事政治学校队长，同年加入中国共产党。广州起义中任工人赤卫队第六联队长。土地革命战争时期，历任工农革命军第四师第十团党代表、师参谋长、师长，中国工农红军第三十一师副师长，红一军副军长兼第一师师长，红四军参谋长、军长，红四方面军总指挥，红军右路军总指挥、西路军军政委员会副主席。参加了长征。抗日战争时期，历任八路军一二九师副师长，八路军第一纵队司令员，陕甘宁晋绥联防军副司令员兼参谋长，中国人民抗日军政大学代校长。解放战争时期，历任晋冀鲁豫军区副司令员，华北军区副司令员兼第一兵团（后改为第十八兵团）司令员兼政委。建国后，历任中央人民政府人民革命军事委员会（中央军委）总参谋长，人民革命军事委员会副主席，中共中央军委副主席，国务院副总理兼国防部部长，第一至三届国防委员会副主席，第三、四届全国人大副委员长。是中共第七、九、十届中央委员，第八、十一、十二届中央政治局委员。徐向前同志是忠诚的共产主义战士，坚定的马克思主义者，久经考验的无产阶级革命家、军事家，中华人民共和国的缔造者之一，长期担任党、国家和军队重要领导职务的卓越领导人。"
 PRC_nie_rongzhen:0 "聂荣臻"
 nierongzhen_desc:0 "聂荣臻（1899年12月29日—1992年5月14日），男，汉族，字福骈，曾用名聂云臻，四川省江津县吴滩镇石院子（今重庆市江津区）人。1899年12月生，四川江津人。1922年参加旅欧中国少年共产党。1923年3月加入中国共产党。1919年10月赴法国勤工俭学。1924年到苏联学习。次年9月回国，任黄埔军校秘书兼政治教官。1926年7月任中共广东区党委军委特派员，参加北伐战争。1927年“四·一二”反革命政变后被派往上海，协助周恩来将工人纠察队转入秘密活动，同年5月任中共中央军事部参谋长，并参加南昌起义、广州起义，任十一军党代表。土地革命战争时期，任中共前敌军委书记。１９２９年８月任中央军委参谋长。１９３１年底进入中央革命根据地，先后任中国工农红军总政治部副主任，第一军团政委。１９３２年后任红军东路军政委，参与指挥漳州战役，率部参加第四、第五次反“围剿”。１９３５年１月在遵义会议上，坚决支持毛泽东的正确主张。抗战时期，任八路军一一五师副师长、政委，中共中央晋察冀分局书记、军区司令员兼政委。解放战争时期，任晋察冀军区司令员兼政委，中共晋察冀中央局书记，中共中央华北局第三书记，华北军区司令员，中国人民解放军副总参谋长，平津卫戍区司令员，北平市军管会主任、市长，１９４９年出席全国政协第一届全体会议。建国后，历任中央军委秘书长兼中国人民解放军代总参谋长，国防委员会副主席，中央军委副主席，国务院副总理兼国家科委主任、国防科委主任，中国老龄问题全国委员会名誉主任，中国发明协会名誉会长。聂荣臻同志是久经考验的无产阶级革命家、军事家，党和国家的卓越领导人，中国人民解放军的创建人之一，中华人民共和国元帅，中华人民共和国开国元勋，深受全党、全军、全国人民的尊敬和爱戴。"
 PRC_ye_jianying:0 "叶剑英"
 yejianying_desc:0 "叶剑英（1897年4月28日—1986年10月22日），原名叶宜伟，字沧白，广东省梅县人，久经考验的共产主义忠诚战士，坚定的马克思主义者，伟大的无产阶级革命家、政治家、军事家，中国人民解放军的缔造者之一，中华人民共和国的开国元勋，长期担任党、国家和军队重要领导职务的卓越领导人，中华人民共和国十大元帅之一。１８９７年４月２８日生，原名叶宜伟，字沧白。广东省梅县人。１９１７年入云南讲武堂。曾参与筹建黄埔军校，任教授部副主任。１９２６年任国民革命军新编第二师师长，后任四军参谋长。１９２７年加入中国共产党。１９２７年１２月率领所部教导团参加广州起义，任军事指挥部副总指挥。１９２８年赴莫斯科学习。１９３０年回国。１９３１年到江西中央革命根据地，历任中华苏维埃共和国中央革命军事委员会委员兼总参谋长，中央军委总参谋长兼红一方面军参谋长，西北军委会参谋长兼红一方面军参谋长，工农红军学校校长，瑞金卫戍区司令，闽赣及福建军区司令员。参加了长征，任一纵队司令员、前敌总指挥部参谋长。到陕北后参加和平解决西安事变。抗日战争时期，曾任八路军参谋长，并协同周恩来在国民党统治区做统战工作。１９４１年２月任中央军委参谋长。解放战争时期，历任华北军政大学校长，国民革命军第十八集团军参谋长，中国人民解放军总参谋长，北平军事管制委员会主任，北平市市长。１９４６年任北平军事调处执行部中共首席代表。１９４８年１２月—１９４９年８月任中共北京市委第一副书记。建国后，历任广东军区司令员兼政治委员，广州市军事管制委员会主任，广州市市长、市委书记，华南军区司令员兼政委，中南军区副司令员、代司令员，中共中央中南局代书记。"
 PRC_ye_ting:0 "叶挺"
 yeting:0 "叶挺"
 PRC_gao_jingting:0 "高敬亭"
