 PRC_wu_ting:0 "武亭"
 PRC_wu_ting_desc:0 "武亭（1905—1952）本名金武亭，朝鲜将领。1905年生于朝鲜咸镜北道镜城郡，1925年加入中国共产党。是全程走过长征的朝鲜人之一，中国人民解放军炮兵最早的创始人，也是朝鲜早期的第二号领导人。武亭以坦率和勇气闻名，他性如烈火，勇敢无畏。是一位坚韧不屈、无私奉献的革命家和杰出的指挥官，在朝鲜的将领中，他是坚决果断、精力充沛和才能卓越的。他精通炮兵专业，培养了人民军的第一批炮兵指挥员，是人民军的创建者之一。武亭是一位曾经与金日成并称的传奇性的军事英雄：后者是著名的抗日游击队领导人，而武亭则是中国共产党军队里的朝鲜人领袖。武亭领导着中国共产党军队的炮兵和朝鲜义勇军，他在中国和朝鲜都创造了传奇性的军事成就。他一直是一位神秘人物，很少有历史学家能真正地了解武亭。他和他的朝鲜义勇军曾经被寄予很高的期望，但是他在北朝鲜的政治舞台上出现而又迅速地消失——就象一颗流星。武亭曾经在1946年被选举为北朝鲜共产党的第二号领导人，但是他的政治地位下降得很快，在新成立的国家中，他仅仅被任命了纯军事性的职务，而仅剩的军事事业也因为1950年的朝鲜战争而耻辱地结束了。"
