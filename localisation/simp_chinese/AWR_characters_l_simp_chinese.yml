 PRC_lu_dongsheng:0 "卢冬生"
 PRC_lu_dongsheng_desc:0 "卢冬生，湖南湘潭人。1927年参加“八一”南昌起义；同年12月加入中国共产党。1929年，赴湘鄂西革命根据地工作。历任中国工农红军排、连、营、团长，独立师师长，红三军第八师师长兼政委，第七师师长，红二军团第四师师长等职。抗日战争初期，任国民革命军第八路军第一二〇师三五八旅旅长。\n抗战中期，卢冬生被派到苏联入伏龙芝军事学院学习。学习结束后到驻苏联远东地区东北抗日联军教导旅工作。"
