 prc_zuo_quan:0 "左权"
 prc_zuo_quan_desc:0 "左权为黄埔军校毕业生，国共分裂期间，赴莫斯科苏联军校学习。\n\n他在长征前回国，任第一集团军参谋长。"
 PRC_peng_xuefeng:0 "彭雪枫"
 PRC_zhu_rui:0 "朱瑞"
 PRC_liu_yalou:0 "刘亚楼"
 PRC_li_de:0 "李德"
 PRC_li_de_2:0 "李德"
 PRC_zhao_shangzhi:0 "赵尚志"
 PRC_yun_jixian:0 "云继先"
 PRC_sanrentuan:0 "三人团"
 PRC_sanrentuan_desc:0 "中共中央召开政治局扩大会议，决定成立由周恩来、毛泽东、王稼祥组成的新“三人团”，又称“三人军事指挥小组”、“三人指挥小组”，集中领导军事，加强作战统一指挥。新“三人团”是代表党中央领导军委工作的最重要的领导机构，是全权指挥军事的统帅部。"
 PRC_fu_zuoyi:0 "傅作义"
 PRC_he_zizhen:0 "贺子珍"
 PRC_he_zizhen_desc:0 "贺子珍（1909年9月28日—1984年4月19日），1926年，从永新女子学校毕业。同年，加入中国共产党。1927年，参与永新暴动。随后，上井冈山，成为井冈山上农民武装的第一位女战士。1928年，与毛泽东结婚。1934年10月，随红一方面军长征。1935年4月，为保护担架上的钟赤兵，身重17块弹片。1937年冬，去苏联治病。10月，贺子珍生下女儿李敏。后来又到延安。1939年，和毛泽东终止了婚姻关系。"
 PRC_yang_zilie:0 "杨子烈"
 PRC_yang_zilie_desc:0 "杨子烈（1902—1994），湖北省枣阳县人。1922年10月加入中国共产党，1924年与张国焘结婚，曾两次赴莫斯科深造。1931年张国焘被派往鄂豫皖根据地，杨子烈被留在上海从事地下工作。上海党组织遭破坏后，杨子烈与组织失去联系。国共第二次合作后辗转来到延安。1938年张国焘叛离延安后，毛泽东批准杨子烈离开延安，前往武汉投奔张国焘。1949年张国焘和杨子烈带领全家随国民党退居台湾，后迁居香港。1968年移居加拿大。"
 PRC_gao_gang:0 "高岗"
 PRC_gao_gang_desc:0 "高岗（1905年10月25日—1954年8月17日），陕西省横山县武镇乡高家沟村人，原名高崇德，字硕卿，贫苦农民家庭出身。1926年加入中国共产党。1933年8月任陕甘边红军临时总指挥部政治委员。11月后，任红二十六军第四十二师政治委员、红二十六军政治委员，是陕甘红军和革命根据地的创建人之一。1948年辽沈战役后，大部队挥师南下，高岗继续留在东北主持大局，成为中国共产党为数不多能够身兼党政军三大要职的领导人，在当时是真真正正的“东北王”。"
 PRC_wulanfu:0 "乌兰夫"
 PRC_Apei_awangjinmei:0 "阿沛·阿旺晋美"
 PRC_Apei_awangjinmei_desc:0 "阿沛·阿旺晋美（1910.2—2009.12），藏族，西藏拉萨人，1910年2月出生于西藏拉萨一个有蒙古族血统的贵族霍尔康家里。曾任西藏噶厦政府昌都粮官、民事法官、孜本（审计官）、昌都总管、噶伦。1951年2月，达赖喇嘛和噶厦任命阿沛·阿旺晋美为西藏地方政府首席全权代表，和另外4位全权代表赴北京，同中央人民政府进行和平谈判。从4月29日起，以阿沛为首席的西藏地方政府全权代表5人同以李维汉为首席的中央人民政府全权代表4人就和平解放西藏事宜进行谈判。最后双方代表在各项问题上完全达成了一致意见，于1951年5月23日签订了《中央人民政府和西藏地方政府关于和平解放西藏办法的协议》(简称《十七条协议》)，西藏获得和平解放。西藏解放后历任西藏军区第一副司令员，西藏自治区人民委员会主席、革委会副主任，全国人民代表大会常务委员会副委员长，中国人民政治协商会议全国委员会副主席，中国西藏文化保护与发展协会会长。1955年被授予中将军衔。"
