l_simp_chinese:
GER_reinhard_heydrich_modded_desc:0"莱因哈德·特里斯坦·欧根·海德里希，德国党卫队全国副总指挥兼警察上将，德国纳粹党党卫队的重要成员之一，地位仅次于希姆莱，而且希特勒有意培养海德里希为自己的接班人；由于行事极其残酷，而有着“金发的野兽”、“铁石心肠的人”、“纳粹的斩首官”、“死亡的追随者”、“纳粹魔王”、“第三帝国的黑太子”等许多恐怖称号。"
SOV_zhukov_traits:0"军神"
SOV_georgy_zhukov_desc:0"格奥尔基·康斯坦丁诺维奇·朱可夫出身于莫斯科附近的贫苦手工业家庭，青年时期在皮货作坊做学徒。1915年被征入沙俄军队，在骑兵部队作战并因勇敢获得圣乔治十字勋章。十月革命后加入红军，在国内战争中指挥骑兵单位多次立功。战后他在骑兵学校与高等军事机关进修，以严格训练和注重纪律著称。进入1930年代后参与红军机械化改革试验，逐渐从地方骑兵师指挥官成长为军区层级的骨干力量。到1936年，他已被视为红军新一代具有实战经验与组织能力的指挥官之一。"
SOV_rokossovsky_traits:0"战略欺骗大师"
SOV_konstantin_rokossovsky_desc:0"康斯坦丁·康斯坦丁诺维奇·罗科索夫斯基出生于华沙工人家庭，青年时期在马匹行业工作，1914年自愿加入俄军骑兵部队，凭借勇敢沉着多次受伤而不退。加入红军后参与国内战争，在骑兵与装甲侦察部队积累指挥经验。战后在远东和西伯利亚任职，以训练严格、善用机动作战而获赞。1930年代被调至机械化部队相关岗位，开始接触坦克与摩托化理论。至1936年，尽管红军内部斗争加剧，他仍因实战经历丰富、战术灵活而逐步受到上级重视。"
ivan_konev_traits:0"纵深突破专家"
ivan_konev_desc:0"伊万·斯捷潘诺维奇·科涅夫出生于农民家庭，早年在森林与木业工作，1916年被征入沙俄军队。革命后加入红军，在国内战争的多个战线服役，从排、连一路升至团级指挥官。战后在工农红军军事学校学习，逐渐从基层战术指挥走向更高层级岗位。他在军区机关中以执行力强、善于整顿部队和推进政治工作而出名。1930年代参与红军正规化建设，历任军区参谋与基层指挥职务。到1936年，他已成为红军中兼具政治可靠性与组织能力的中层指挥官。"
SOV_aleksandr_vasilevsky_traits:0"参谋长机器"
SOV_aleksandr_vasilevsky_desc:0"亚历山大·米哈伊洛维奇·华西列夫斯基出身于萨拉托夫州牧师家庭，早年接受良好教育，1915年入伍并在一战中担任步兵军官。十月革命后加入红军，在国内战争期间历任排、连与营级指挥职务。战后投入参谋体系，系统学习作战计划与部队调度，逐渐展现出对大兵团作战的理解能力。1930年代在总参谋部和军事院校任职，参与红军战术条令与训练体系的编写。到1936年，他已是红军参谋体系中发展迅速的青年军官之一，以思维严谨和善于组织复杂行动而受到重用。"
GER_erich_von_manstein_traits:0"卓越的参谋"
GER_erich_von_manstein_desc:0"埃里希·冯·曼施坦因出身传统普鲁士贵族军官世家，接受过严格的总参谋部训练，在一战中担任参谋人员参与东线与西线行动，因思维缜密与组织能力受到上级赏识。战后在陆军缩编的大背景下继续留任，先后在部队和参谋岗位间轮换，参与国防军的结构规划与机动化研究。他以逻辑严密、善于制定可行作战方案著称，1930年代已在参谋本部内崭露头角。到1936年，他被视为陆军最具潜力的作战策划者之一，为后续在战略层面的表现打下理论与组织基础。"
GER_heinz_guderian_traits:0"闪电战大师"
GER_heinz_guderian_desc:0"海因茨·古德里安出生于普鲁士军人家庭，早年在信号兵与参谋体系中任职，于一战中主要从事通信与参谋工作，积累对机动作战的兴趣。战后留在国防军，参与研究装甲兵运用，深受富勒与里德尔思想影响，逐步形成以快速突击、无线电指挥和装甲集群为核心的理论。他在军内撰写大量论文倡导机械化改革，1931年起负责摩托化部队训练，推动无线电在坦克部队中的全面使用。到1936年时，他已成为德国陆军中最鲜明的装甲战主张者，为未来的装甲兵体系奠定基础。"
GER_erwin_rommel_traits:0"奇袭战术"
GER_erwin_rommel_desc:0"埃尔温·隆美尔出身符腾堡军官家庭，一战期间以基层军官身份在西线和阿尔卑斯山展开行动，以大胆灵活的战术和个人勇气闻名，曾因在意大利战场的指挥获得“普鲁士蓝马克斯勋章”。战争结束后留在规模受限的国防军，从事步兵战术训练与教材编写。他擅长近距离指挥与快速机动，多次担任士官学校与训练机构教官，并以《步兵攻击》一书总结自身一战经验，受到军内重视。至1936年，他已确立为新式步兵战术的倡导者，在陆军内部声名渐盛，为后来的指挥生涯奠定了基础。"
SOV_mikhail_tukhachevsky_desc:0"米哈伊尔·尼古拉耶维奇·图哈切夫斯基出身于贵族家庭，早年受军校教育，一战中在沙俄军队服役并被德军俘虏。1918年加入红军，在国内战争期间以大胆进攻、快速机动闻名，指挥多支方面军参与保尔科夫、华沙战役等重要行动。战后他被任命为红军最具影响力的军事改革者之一，主张深度作战、机械化和空地协同，推动坦克、航空兵与炮兵的现代化建设。他在军事学院与总参谋部内具有极大话语权，被视为红军理论革新的核心人物。到1936年，他已是苏联军界最耀眼的改革将领，为红军现代化奠定战略基础。"
SOV_mikhail_kalinin_desc:0"米哈伊尔·伊万诺维奇·加里宁出生于特维尔省农民家庭，青年时期在工厂任技工，早年便参与革命活动并加入布尔什维克。1917年革命后，他在地方苏维埃中积累政治威望，随即成为俄共的重要领导干部之一。内战期间主要从事政治和组织工作，以稳健、忠诚和擅长调和不同派系矛盾而受到列宁赏识。1922年起担任全俄中央执行委员会主席，后成为苏维埃中央执行委员会主席，名义上为苏联国家元首。1930年代他继续在党和国家机关中发挥象征性与协调性作用，至1936年在政治局和中央委员会体系内依然保持关键地位，成为苏联统治结构中稳固的长青人物。"