l_simp_chinese:
 AWR_NEA:0 "东北军事件"
 AWR_NEA.1.t:0 "共产党人希望安排默许停战以避免伤亡"
 AWR_NEA.1.d:0 "共产党人今天秘密緻函我们，希望我们与他们达成默契，以免造成不必要的牺牲。我们大多数人都同情共产党，也对南京对日本侵略的不作为而感到愤怒。然而，安排这样的事情是非常棘手的。我们该如何回应？"
 AWR_NEA.1.a:0 "中国人不打中国人。我们会安排默许停战。"
 AWR_NEA.1.b:0 "我们理解他们的事业，但他们的影响太大了，我们现在不能这样做。"
 AWR_NEA.2.t:0 "[CHI.GetLeader]抵达西安"
 AWR_NEA.2.d:0 "中央政府声称，我们和共产党军队之间有一个所谓的默许的停战协议，原因他们尚未证实。[CHI.GetLeader]已经决定访问西安并与我们会面，以澄清事情的结果。"
 AWR_NEA.2.a:0 "嗯，也许我们可以做点什么......"
 AWR_NEA.3.t:0 "突然的袭击"
 AWR_NEA.3.d:0 "中央军和马家军联合发起突袭，中共军队被击退。现在我们只能一同奔赴前线，避免事态朝坏的方向发展。"
 AWR_NEA.3.a:0 "中国的未来将何去何从。"  
 AWR_NEA.4.t:0 "共产党人提出大西北联盟"
 AWR_NEA.4.d:0 "随著共产党成功建立了从苏联的补给路线，他们向[Root.GetLeader]提议组建大西北联盟。 这将使我们有机会站出来反对国民党政府，甚至日本。"
 AWR_NEA.4.a:0 "我们将接受该提议。"
 AWR_NEA.4.b:0 "这风险太大了！"





 AWR_NXM:0 "宁夏马事件"
 AWR_NXM.1.t:0 "击退共产党民兵"
 AWR_NXM.1.d:0 "我们和中央军、东北军联合发起突袭给共匪带来了更大的打击。现在他们都逃走了，我们在该地区的主导地位已得到恢复，今天对马家军来说是个好日子。"
 AWR_NXM.1.a:0 "太好了！" 
 AWR_NXM.2.t:0 "击退共产党民兵"
 AWR_NXM.2.d:0 "我军队遭到共产党军队的袭击。但是，我们给他们带来了更大的打击。现在他们都逃走了。我们在该地区的主导地位已得到恢复。今天对我军来说是个好日子。"
 AWR_NXM.2.a:0 "太好了！"
 AWR_NXM.3.t:0 "共产党民兵撤退了"
 AWR_NXM.3.d:0 "我军遭到共军的袭击。 然而，最近他们决定撤退到他们的基地，原因尚未明确。 然而，我们在该地区的影响力并没有受到这次平安无事的袭击的太大影响。"
 AWR_NXM.3.a:0 "好吧。"




 AWR_GSM:0 "甘肃马事件"
 AWR_GSM.1.t:0 "共产党民兵被击退"
 AWR_GSM.1.d:0 "我军遭到共产党军队的袭击。 然而，我们给了他们更大的打击。 现在他们都逃走了。 我们在该地区的主导地位已经恢复。 今天对我军来说是个好日子。"
 AWR_GSM.1.a:0 "很好！"
 AWR_GSM.2.t:0 "共产党民兵撤退了"
 AWR_GSM.2.d:0 "我军遭到共军的袭击。 然而，最近他们决定撤退到他们的基地，原因尚未明确。 然而，我们在该地区的影响力并没有受到这次平安无事的袭击的太大影响。"
 AWR_GSM.2.a:0 "好吧。"


 AWR_SIK:0 "新疆事件"
 AWR_SIK.1.t:0 "[From.GetName] 请求配合挑战中央权威"
 AWR_SIK.1.d:0 "[From.GetLeader]请求我们合作挑战[WTT_current_china_leader.GetLeader]的腐败和反动政权，以完成革命和解放中国人民。"
 AWR_SIK.1.a:0 "当然，我们会积极参与。"
 AWR_SIK.1.b:0 "不，但我们会表现出政治上的支持。"
 AWR_SIK.2.t:0 "[From.GetName]想要整合我们"
 AWR_SIK.2.d:0 "[From.GetName]向我们发出请求，让我们融入进他们。我们应该怎样去响应他们？"
 AWR_SIK.2.a:0 "好极了！"
 AWR_SIK.2.b:0 "我们至少要留有一些自治权"
 AWR_SIK.3.t:0 "[From.GetName]决定让我们保留最低限度的自治权"
 AWR_SIK.3.d:0 "[From.GetName]决定帮助我们在建立一个自治政府以更好的维护[Root.GetAdjective]的统治，以保持领土的完整性。"
 AWR_SIK.3.a:0 "明白了。"
 AWR_SIK.4.t:0 "[PRC.GetNameDef]希望与我们达成和平解放协议"
 AWR_SIK.4.desc:0 "中国共产党在内战中已经取得了绝对优势，他们希望能通过和平的方式统一新疆地区，如果谈判破裂，他们会运用武力，对此，我们应该怎么做？"
 AWR_SIK.4.a:0 "识时务者为俊杰"
 AWR_SIK.4.b:0 "让他们放马过来吧！"


 AWR_TIB:0 "西藏事件"
 AWR_TIB.1.t:0 "祖国让我们“回家”"
 AWR_TIB.1.d:0 "新的中国政府要求我们承认他们的领土主张，他们将派遣军队驻守在那里。有关部门正在召开紧急会议，我们应该如何应对？"
 AWR_TIB.1.a:0 "西藏将保持独立"
 AWR_TIB.1.b:0 "独立不过是叛者的狂语！我们回家！"