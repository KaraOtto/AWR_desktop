l_simp_chinese:
 AWR_NEA:0 "东北军事件"
 AWR_NEA.3.t:0 "突然的袭击"
 AWR_NEA.3.d:0 "中央军和马家军联合发起突袭，中共军队被击退。现在我们只能一同奔赴前线，避免事态朝坏的方向发展。"
 AWR_NEA.3.a:0 "中国的未来将何去何从。"  
 AWR_NEA.4.t:0 "共产党人提出大西北联盟"
 AWR_NEA.4.d:0 "随著共产党成功建立了从苏联的补给路线，他们向[Root.GetLeader]提议组建大西北联盟。 这将使我们有机会站出来反对国民党政府，甚至日本。"
 AWR_NEA.4.a:0 "我们将接受该提议。"
 AWR_NEA.4.b:0 "这风险太大了！"





 AWR_NXM:0 "宁夏马事件"
 AWR_NXM.1.t:0 "击退共产党民兵"
 AWR_NXM.1.d:0 "我们和中央军、东北军联合发起突袭给共匪带来了更大的打击。现在他们都逃走了，我们在该地区的主导地位已得到恢复，今天对马家军来说是个好日子。"
 AWR_NXM.1.a:0 "太好了！" 
 AWR_NXM.2.t:0 "击退共产党民兵"
 AWR_NXM.2.d:0 "我军队遭到共产党军队的袭击。但是，我们给他们带来了更大的打击。现在他们都逃走了。我们在该地区的主导地位已得到恢复。今天对我军来说是个好日子。"
 AWR_NXM.2.a:0 "太好了！"
 AWR_NXM.3.t:0 "共产党民兵撤退了"
 AWR_NXM.3.d:0 "我军遭到共军的袭击。 然而，最近他们决定撤退到他们的基地，原因尚未明确。 然而，我们在该地区的影响力并没有受到这次平安无事的袭击的太大影响。"
 AWR_NXM.3.a:0 "好吧。"




 AWR_GSM:0 "甘肃马事件"
 AWR_GSM.1.t:0 "共产党民兵被击退"
 AWR_GSM.1.d:0 "我军遭到共产党军队的袭击。 然而，我们给了他们更大的打击。 现在他们都逃走了。 我们在该地区的主导地位已经恢复。 今天对我军来说是个好日子。"
 AWR_GSM.1.a:0 "很好！"
 AWR_GSM.2.t:0 "共产党民兵撤退了"
 AWR_GSM.2.d:0 "我军遭到共军的袭击。 然而，最近他们决定撤退到他们的基地，原因尚未明确。 然而，我们在该地区的影响力并没有受到这次平安无事的袭击的太大影响。"
 AWR_GSM.2.a:0 "好吧。"


 AWR_SIK:0 "新疆事件"
 AWR_SIK.1.t:0 "[From.GetName] 请求配合挑战中央权威"
 AWR_SIK.1.d:0 "[From.GetLeader]请求我们合作挑战[WTT_current_china_leader.GetLeader]的腐败和反动政权，以完成革命和解放中国人民。"
 AWR_SIK.1.a:0 "当然，我们会积极参与。"
 AWR_SIK.1.b:0 "不，但我们会表现出政治上的支持。"