 CHI_prc_kmt_shuangshixieding:0 "《双十协定》"
 CHI_prc_kmt_shuangshixieding_desc:0 "（一）承认和平建国的基本方针，同意以对话方式解决一切争端。\n（二）长期合作，坚决避免内战，建设独立、自由和富强的新中国，彻底实行三民主义。\n（三）迅速结束训政，实施宪政。\n（四）迅速召开政治协商会议，对国民大会及其他问题进行商讨后再作决定，制定新宪法。\n（五）中国共产党承认[CHI.GetLeader]及南京国民政府对中国的合法领导地位。"
