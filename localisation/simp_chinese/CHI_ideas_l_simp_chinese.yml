 CHI_prince_de_defect:0 "德王的背叛？"
 CHI_prince_de_defect_desc:0 "百灵庙蒙政会领导人德穆楚克栋鲁普亲王已经显露出叛变的迹象。也许我们应该做点什麽。\n§W--------------§!\n及时完成§Y拆分百灵庙蒙政会§!国策可能会阻止内蒙古的彻底背叛。"
