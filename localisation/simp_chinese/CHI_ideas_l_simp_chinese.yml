 CHI_agrarian_reform_idea:0 "土地改革"
 CHI_appeasement_policy:0 "绥靖政策"
 CHI_appeasement_policy_desc:0 "由于目前国内冲突不断，政府在处理日本问题时选择了不抵抗的绥靖政策。然而，中国国内很多团体已经表达了反对这一政策的声音，并呼吁停止内战。"
 CHI_appeasement_policy_0:0 "绥靖政策"
 CHI_appeasement_policy_2:0 "绥靖政策"
 CHI_army_corruption_00:0 "派系林立的军队"
 CHI_army_corruption_00_desc:0 "我们的军队因为内部派系林立和一些颠复分子的影响，造成了很多问题。如果我们想要将其转变为一个强大、具有战斗力的军队，我们必须要开始一个漫长且消耗许多预算的军队改革。"
