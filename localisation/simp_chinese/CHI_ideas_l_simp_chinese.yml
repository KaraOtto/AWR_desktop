 CHI_central_club:0 "中央俱乐部"
 CHI_central_club_desc:0 "中央俱乐部，又称CC系，是国民党内部管理党际事务的主要政治集团。\n\n陈立夫和他的兄弟陈果夫是其主要领导人，在国共两党分裂不久后成立，包括两人在内的许多成员在 1928 年帮助组建了国民党中央执行委员会。"
 CHI_central_club_stronger:0 "中央俱乐部"
 CHI_central_club_stronger_desc:0 "中央俱乐部，又称CC系，是国民党内部管理党际事务的主要政治集团。\n\n陈立夫和他的兄弟陈果夫是其主要领导人，在国共两党分裂不久后成立，包括两人在内的许多成员在 1928 年帮助组建了国民党中央执行委员会。"
 CHI_chi_375_battle_plan:0 "375执行部"
 CHI_chi_baifeidaixing:0 "百废待兴"
 CHI_chi_baifeidaixing_desc:0 "§L经济上我们依靠外国资本，关税、盐税、统税几乎也就是我们所有的收入来源了，农村地区文盲遍地，他们部分人开始参加民间秘密结社的宗教组织，也就是所谓的“会道门”，使得我们几乎无法有效管理农村。而且地方上我们已经放权给当地乡绅，农业税问题和土地分配问题无疑将会是一个隐患。§!"
 CHI_chi_baomiju:0 "国防部保密局"
 CHI_chi_baomiju_desc:0 "§L原国民政府军事委员会调查统计局秘密核心部分改组成国防部保密局，由毛人凤担任局长。§!"
 CHI_chi_ccw_anti_communist_idea:0 "消灭共匪！"
 CHI_chi_ccw_fighting_retreat_idea:0 "战略转进"
 CHI_chi_ccw_fighting_retreat_upgrade_idea:0 "战略转进"
 CHI_chi_ccw_ministry_of_national_defence:0 "中华民国国防部"
 CHI_chi_ccw_seize_the_gold_idea:0 "将黄金转移到台北"
 CHI_chi_chenchenggaige:0 "陈诚改革"
 CHI_chi_chenchenggaige_desc:0 "§L陈诚在台湾期间，吸取了国民党在大陆失败的教训，努力缓和与当地农民之间的矛盾，推行“三七五减租”和以工商企业股向地主赎买土地的办法进行“土地改革”，台湾一片勃勃生机万物竞发的境界犹在眼前！§!"
 CHI_chi_diwucongzui:0 "第五纵队在行动"
 CHI_chi_diwucongzui_desc:0 "国民党在撤离大陆期间留下了大批间谍特务，他们藏在地下秘密活动，现在[CHI.GetLeader]突然宣布反攻，他们的行动配合还乡团和地方的土匪变得越发频繁，严重影响我军的调动速度和应对国民党反动派登陆作战的能力，我们现在必须彻底肃清他们！"
 CHI_chi_dongyuankanluan:0 "动员戡乱时期临时条款"
 CHI_chi_dongyuankanluan_desc:0 "§L《动员戡乱时期临时条款》是《中华民国宪法》的附属条款，由国民大会经由宪法修正程序制定，以适应动员戡乱时期政军情势。§!"
 CHI_chi_fukuan:0 "对美国的支付"
 CHI_chi_fuyuanwenti:0 "复员问题"
 CHI_chi_fuyuanwenti_desc:0 "§L军事上我们的国军由于在抗战和戡乱中急需兵员，招募了大量的伪军、壮丁、土匪、帮派成员、还乡团成员，成分极其复杂。而且连年的战乱使军队厌战情绪高涨，这无疑会成为军队质量下降的因素。§!"
 CHI_chi_guoguangjihua:0 "国光计划"
 CHI_chi_guoguangjihua_desc:0 "一年准备，两年反攻，三年扫荡，五年成功。"
 CHI_chi_guojun:0 "中华民国国军"
 CHI_chi_guojun_desc:0 "§L风云起,山河动,黄埔建军声势雄,革命壮士矢精忠。金戈铁马,百战沙场,安内攘外作先锋。国民革命军已经改组成中华民国国军，以实现“军队国家化”。§!"
 CHI_chi_guojunhaijun:0 "中华民国海军"
 CHI_chi_guojunhaijun_desc:0 "§L信仰坚定，纪律严明，操纵新时代之战列舰，使用最坚利之甲兵。雄视三洋，屏障四海，保卫疆土，巩固和平，同舟共济，万众一心，着成忠勇冒险之好习惯，同舟共济，万众一心，创造海洋生活之新精神，为青天白日旗争光荣。我们的海军已经实现全面现代化，甲午海战的悲惨历史一去不复返了!。§!"
 CHI_chi_guojunkongjun:0 "中华民国空军"
 CHI_chi_guojunkongjun_desc:0 "§L凌云御风去，报国把志伸，遨游昆仑上空，俯瞰太平洋滨，看五岳三江，雄关要塞，美丽的锦绣河山，辉映着无敌机群。缅怀先烈莫辜负创业艰辛，发扬光大尤赖我空军军人！同志们努力努力，矢勇矢勤，国祚皇皇万世荣。我们的空军已经实现全面现代化，敌人的飞机一架都休想从此飞过，领空是属于我们的!§!"
 CHI_chi_hangmu:0 "不沉的航母"
 CHI_chi_hangmu_desc:0 "§L台湾岛是永不沉没的航空母舰！§!"
 CHI_chi_huangpujunhun:0 "黄埔军魂"
 CHI_chi_huangpujunhun_desc:0 "§L升官发财请往他处,贪生畏死勿入斯门。§!"
 CHI_chi_huanxiangtuan:0 "地主还乡团"
 CHI_chi_huanxiangtuan_desc:0 "§L为了拯救我们岌岌可危的国家，我们将动用一切手段武装地主来对抗共匪，号召他们上山打游击和敌人斗到底！双枪老太婆赵洪文国将成为他们学习的榜样。§!"
 CHI_chi_huanxiangtuan2:0 "地主还乡复仇团"
 CHI_chi_huanxiangtuan2_desc:0 "§L为了拯救我们岌岌可危的国家，我们将动用一切手段武装地主来对抗共匪，号召他们上山打游击和敌人斗到底！双枪老太婆赵洪文国将成为他们学习的榜样。\n\n§R打回老家去，有仇报仇，有冤报冤！§!"
 CHI_chi_initial_offensive_buff:0 "攻略陕北作战计划"
 CHI_chi_initial_offensive_buff_desc:0 "胡宗南将他几年前压箱底的“闪击延安”计划拿出来，改成了“攻略陕北作战计划”，要采取“犁庭扫穴、直捣延安”的闪击计划，如果此计划能够成功，共匪将遭受重大打击!"
 CHI_chi_jingong:0 "进攻畅通无阻"
 CHI_chi_jinyuanquan:0 "发行金圆券"
 CHI_chi_jinyuanquan_desc:0 "§L币制改革、发行金圆券刻不容缓，尽管这会引起民众的不满，但为了对抗共匪迫不得已我们只能这么做。§!"
 CHI_chi_kanluan:0 "戡乱总动员"
 CHI_chi_kanluan2:0 "戡乱总动员"
 CHI_chi_meiguoyuanzhu:0 "中美共同防御条约"
 CHI_chi_meiguoyuanzhu_desc:0 "§L《中美共同防御条约》，正式名称是《中华民国与美利坚合众国间共同防御条约》，是中华民国政府与美国政府签订的国际条约。该条约以军事为基础，包含政治、经济、社会等合作条约。根据条约第十条规定，该条约无限期有效，但若一国向对方提出终止通告，则该条约会在该通告发出时刻的整1年后失效。§!"
 CHI_chi_nanfang:0 "南方八省游击队的影响"
 CHI_chi_nanfang_desc:0 "§L共匪离开南方后,陈毅、项英、张鼎丞等人留在江西、福建、浙江、安徽、河南、湖北、湖南、广东八省一直坚持游击。后来逐步发展到赣粤边、闽赣边、闽西、闽粤边、皖浙赣边、浙南、闽北、闽东、闽中、鄂豫皖边、鄂豫边、湘鄂赣边、湘赣边、湘南、琼崖等15个地区都有他们的踪迹。我们现在的任务就是彻底剿灭他们，使政府可以彻底控制南方地区!§!"
 CHI_chi_neiwubu:0 "内政部调查局"
 CHI_chi_neiwubu_desc:0 "§L中国国民党中央执行委员会调查统计局改组为“党员通讯社”后又改为内政部调查局，隶属于中华民国行政院内政部，首任局长为季源溥。§!"
 CHI_chi_shijiehuimie:0 "世界毁灭者？？？!!!"
 CHI_chi_zhongguoneizhan:0 "中国内战"
 CHI_chi_zhongguoneizhan_desc:0 "贸然介入新一轮的中国内战并不是明智的选择。"
 CHI_chi_zhongmeitiaoyue:0 "中美友好通商航海条约"
 CHI_chi_zhongmeitiaoyue_desc:0 "§L《中美友好通商航海条约》，全称《中华民国与美利坚合众国友好通商航海条约》，中华民国外交部部长王世杰与美国驻华大使司徒雷登于南京签订的国际条约，内容包括：中美永敦睦谊、互相平等国民待遇、互相矿产最惠国待遇、互相进出口不管制、平等税收特权、中美共管领海。§!"
 CHI_chi_zhongsutiaoyue:0 "失去中东铁路控制权"
 CHI_chi_zhongsutiaoyue_desc:0 "§L苏联现在控制着我们在东北的铁路。§!"
 CHI_chi_zhuangjiabudui:0 "中华民国装甲部队"
 CHI_chi_zhuangjiabudui_desc:0 "§L加速我们的飞轮前进!迈进迈进!我们是锥之尖,我们是刀之刃,我们是中华民国国军新生命。§!"
 CHI_chiang:0 "蒋氏独裁"
 CHI_chiang_desc:0 "尽管民国的开国元勛孙中山先生有民主的意愿，但由于国内仍在持续的内乱，蒋介石及其亲密盟友仍以强大的独裁统治中国。"
 CHI_chiang_better:0 "蒋氏独裁"
 CHI_chiang_better_desc:0 "尽管民国的开国元勋孙中山先生有民主的意愿，但蒋介石及其亲密盟友以强大的独裁统治中国。不过，这位领导人还是设法让人民相信他的权威。"
 CHI_chinese_culture:0 "取其精华，去其糟粕"
 CHI_chinese_culture_desc:0 "我们现在提倡读书要用批判的眼光，要取其精华，去其糟粕，这个主张古代读书人却没有胆量提出。"
 CHI_chinese_general_staff2:0 "中华民国总参谋部"
 CHI_chinese_general_staff2_desc:0 "我们已经学习了德国的优秀军事经验，现在将进一步加强总参谋部的功能。"
 CHI_chinese_national:0 "中华民族"
 CHI_chinese_national_desc:0 "§L中国者，中国人的中国。中国人的政治，中国人任之。驱除鞑虏后，光复我民族的国家，敢有为石敬瑭、吴三桂所为者，天下人共击之。§!"
 CHI_chinese_tribute_idea:0 "中方付款"
 CHI_civil_war_debuff:0 "厌战情绪I"
 CHI_civil_war_debuff_desc:0 "在北方的军事失败，导致我军厌战情绪高涨。"
 CHI_civil_war_debuff_2:0 "厌战情绪II"
 CHI_civil_war_debuff_2_desc:0 "在北方的军事失败，导致我军厌战情绪高涨。"
 CHI_civil_war_debuff_3:0 "厌战情绪III"
 CHI_civil_war_debuff_3_desc:0 "在北方的军事失败，导致我军厌战情绪高涨。"
