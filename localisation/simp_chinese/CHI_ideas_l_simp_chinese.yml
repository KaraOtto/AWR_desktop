 CHI_CBIS_kmt_indoctrination_desc:0 "中央执行委员会调查统计局（CBIS），俗称“中统”，是国民党中央执行委员会的情报单位之一。这是蒋介石的两个警察和军事情报机构之一，另一个是由戴笠领导的军事委员会调查统计局。"
 CHI_Defender_Legacy_of_DR_SunYatsen:0 "总理遗教的捍卫者"
 CHI_Defender_Legacy_of_DR_SunYatsen_desc:0 "§L余致力国民革命,凡四十年,其目的在求中国之自由平等。积四十年之经验,深知欲达到此目的,必须唤起民众及联合世界上以平等待我之民族,共同奋斗。现在革命尚未成功,凡我同志,务须依照余所著《建国方略》、《建国大纲》、《三民主义》及《第一次全国代表大会宣言》,继续努力,以求贯彻。最近主张开国民会议及废除不平等条约,尤须于最短期间,促其实现。是所至嘱!§!"
 CHI_Encirclement_Campaign_idea:0 "围剿战争"
 CHI_Encirclement_Campaign_idea_desc:0 "共产主义及其追随者是一个需要根除的国家困境。除非我们除掉他们并使我们国家稳定，才能专心地处理好外交事务。\n§W--------------§!\n§R当不再与共产党交战时就会消失。§!"
 CHI_JAP_chizhunbei:0 "遭遇准备充足的中国军队"
 CHI_JAP_sanguangzhengce:0 "烬灭作战"
 CHI_JAP_sanguangzhengce_desc:0 "§L共党的游击队使皇军一直无法有效控制中国广大的农村地区，并且他们组织平民对我们的后勤运输造成了严重的破坏，这样下去注定会影响战场上的胜负。我们决定对其根据地进行以杀戮当地居民、对粮秣房舍等物资进行彻底的抢劫、焚烧和破坏为目标的烬灭作战，并将这一作战方式逐渐系统化、规模化、长期化。简要概括为“烧光、杀光、抢光”，即“三光政策”。§!"
 CHI_Minzuism:0 "民族主义"
 CHI_Minzuism_desc:0 "民族主义旨在驱除鞑虏，恢复中华。这一主张旨在通过革命手段推翻帝国主义支持的清朝封建统治，恢复中国的民族独立和国家主权。同时提倡民族平等，国内各民族应一律平等。建立五族共和的国家，以维护国家统一和民族团结。"
 CHI_NBIS:0 "国民政府军事委员会调查统计局"
 CHI_NBIS_desc:0 "国民政府军事委员会调查统计局（NBIS），俗称军统，是中华民国的军事情报机构。它致力于为国家安全和国防目的收集情报和从事秘密间谍活动。"
 CHI_NBIS_esp:0 "国民政府军事委员会调查统计局"
 CHI_NBIS_esp_desc:0 "国民政府军事委员会调查统计局（NBIS），俗称军统，是中华民国的军事情报机构。它致力于为国家安全和国防目的收集情报和从事秘密间谍活动。"
