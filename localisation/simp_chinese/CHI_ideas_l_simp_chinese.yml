l_simp_chinese:
 CHI_CBIS:0 "中国国民党中央执行委员会调查统计局"
 CHI_CBIS_desc:0 "中央执行委员会调查统计局（CBIS），俗称“中统”，是国民党中央执行委员会的情报单位之一。这是蒋介石的两个警察和军事情报机构之一，另一个是由戴笠领导的军事委员会调查统计局。"
 CHI_CBIS_indoctrination:0 "中国国民党中央执行委员会调查统计局"
 CHI_CBIS_indoctrination_desc:0 "中央执行委员会调查统计局（CBIS），俗称“中统”，是国民党中央执行委员会的情报单位之一。这是蒋介石的两个警察和军事情报机构之一，另一个是由戴笠领导的军事委员会调查统计局。"
