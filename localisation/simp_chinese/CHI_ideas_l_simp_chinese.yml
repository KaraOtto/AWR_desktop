 CHI_communist_in_government:0 "政府中的共产主义者"
 CHI_communist_in_government_desc:0 "由于我们对共产党作出了让步，尽管他们重新加入了我们的政府，但他们仍然保留了很大的影响力。我们应该注意他们的活动，确保他们不会掌权。\n§W--------------§!\n§W如果他们是第一次总统选举期间§! §R最受欢迎的政党§! §W或者§! §R他们的支持率超过40%，而我们的支持率低于25%，§! §W他们就会掌权。§!§W\n§Y当共产党支持率低于15%时，这种民族精神就会消失。§!"
 CHI_dangguo_system:0 "党国体制"
 CHI_disrupted_factories:0 "焦土抗战"
 CHI_disrupted_factories_desc:0 "民国中央政府的撤退使我们占领区的工业基本上无法使用。游击队和其他力量的民众抵抗也阻碍了这些已经被破坏的工业设施的修复。我们应该尽快打败重庆国民政府，以克服这些麻烦。"
 CHI_engguwen:0 "英国驻华军事顾问团"
 CHI_equalization_of_land_ownership:0 "平均地权"
 CHI_equalization_of_land_ownership_desc:0 "工业愈进步，商业愈发达，则资本家与地主之利愈大，而工人愈穷苦矣。故同盟会之主张，创立民国后，则继之以平均地权，倘能达此目的，则社会问题已解决过半矣。"
 CHI_extraordinary_national_protocol_idea:0 "特别国家议定书"
 CHI_extraordinary_national_protocol_idea_desc:0 "我们国家处于紧急状态。已经宣布了一项特别的国家议定书。\n§W--------------§!\n§R当不再与@JAP日本.§!交战时，这个民族精神就会去除。§!\n"
 CHI_five_yuan:0 "五院制"
 CHI_five_yuan_desc:0 "就中国政府权的情形讲，只有司法、立法、行政三个权是由皇帝拿在掌握之中，其余监察权和考试权还是独立的。就是中国的专制政府，从前也可以说是三权分立的，和外国从前的专制政府便大不相同。从前外国在专制政府的时候，无论是什么权都是由皇帝一个人垄断。中国在专制政府的时候，关于考试权和监察权，皇帝还没有垄断。所以分开政府的大权，便可以说外国是三权分立，中国也是三权分立。中国从前实行君权、考试权和监察权的分立，有了几千年。外国实行立法权、司法权和行政权的分立，有了一百多年。不过外国近来实行这种三权分立，还是不大完全。中国从前实行那种三权分立，更是有很大的流弊。我们现在要集合中外的精华，防止一切的流弊，便要采用外国的行政权、立法权、司法权，加入中国的考试权和监察权，连成一个很好的完壁，造成一个五权分立的政府。像这样的政府，才是世界上最完全、最良善的政府。国家有了这样的纯良政府，才可以做到民有、民治、民享的国家。"
