 CHI_sanmin_doctrine:0 "三民主义"
 CHI_sanmin_doctrine_desc:0 "三民主义，是孙中山先生提出的一种政治哲学，是使中国成为一个自由、繁荣、强大国家的哲学的一部分。这三个原则经常被翻译和概括为：民族、民权、民生。"
