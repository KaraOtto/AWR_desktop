 CHI_minquanism:0 "民权主义"
 CHI_minquanism_desc:0 "民权主义旨在实现政治革命，创立民国，推翻封建君主专制制度，建立资产阶级民主共和国"
 CHI_minshengism:0 "民生主义"
 CHI_minshengism_desc:0 "民生主义旨在解决土地和资本两大问题，提出了平均地权和节制资本两项经济纲领。平均地权的宗旨是通过变革旧的土地制度，实现土地国有，以避免工商业发达后土地涨价而出现的社会问题。节制资本则是通过国家力量遏制私人资本的膨胀和垄断，实现资本国有，以避免西方资本主义的一些弊端。"
 CHI_minshengism2:0 "民生主义"
 CHI_minshengism2_desc:0 "民生主义旨在解决土地和资本两大问题，提出了平均地权和节制资本两项经济纲领。平均地权的宗旨是通过变革旧的土地制度，实现土地国有，以避免工商业发达后土地涨价而出现的社会问题。节制资本则是通过国家力量遏制私人资本的膨胀和垄断，实现资本国有，以避免西方资本主义的一些弊端。"
 CHI_minshengism3:0 "民生主义"
 CHI_minshengism3_desc:0 "民生主义旨在解决土地和资本两大问题，提出了平均地权和节制资本两项经济纲领。平均地权的宗旨是通过变革旧的土地制度，实现土地国有，以避免工商业发达后土地涨价而出现的社会问题。节制资本则是通过国家力量遏制私人资本的膨胀和垄断，实现资本国有，以避免西方资本主义的一些弊端。"
