 CHI_jiaolong_desc:0 "§L蛟龙计划是我们海军提出的有史以来最大胆的计划，计划的内容可以简述为在盟友海军的帮助下，中国军队孤注一掷登陆日本本土，一举彻底结束战争！（该计划为架空内容）\n\n§R蛟龙出海卷狂风，破浪乘威气势虹。§!"
