 CHI_stilwell_in_china:0 "史迪威驻华"
 CHI_stilwell_in_china_desc:0 "身为[Root.GetLeader]委员长的参谋长和中缅印战区美军司令，约瑟夫·史迪威有才华和足够的权威在战争中帮助盟军，但他的性格和想法与美国的期望不符。对于中国高层来说，可以预见的是他将会与中国政府发生不少冲突。"
 CHI_the_blueshirts:0 "[Root.GetBSorTPPYC]"
 CHI_the_blueshirts_desc:0 "[Root.GetBSorTPPYC]作为党内组织的意识形态团体起家，初期主要成员来自黄埔军校。 到 1930 年代，它的影响力扩展到军事和政治领域。\n\n但因为它的一些边缘成员表现，现今被担心在党内传递一些不健康的法西斯思想。"
 CHI_the_blueshirts_stronger:0 "[Root.GetBSorTPPYC]"
 CHI_the_blueshirts_stronger_desc:0 "[Root.GetBSorTPPYC]作为党内组织的意识形态团体起家，初期主要成员来自黄埔军校。 到 1930 年代，它的影响力扩展到军事和政治领域。\n\n但因为它的一些边缘成员表现，现今被担心在党内传递一些不健康的法西斯思想。\n\n尽管如此，由于中央领导人最近改变了党内政策，该政治团体的成员人数又出现了新一波暴增。"
