l_simp_chinese:
 SIK_Against_sheng_shicai:0 "抵制盛世才"
 SIK_Army_reform:0 "陆军改革"
 SIK_Army_reform_desc:0 "与苏联相比，我们的军事体制远远落后，需要立即进行改革。"
 SIK_Autocracy:0 "独裁统治"
 SIK_Autocracy_desc:0 "盛世才通过压制或伪造指控来镇压任何可能危及他统治的个人或组织,而不管当事人是否真的打算推翻他。"
 SIK_Beat_the_enemy:0 "击败敌人"
 SIK_Conflict_with_the_local_people:0 "民族冲突"
 SIK_Conflict_with_the_local_people_desc:0 "新疆维吾尔族和其他少数民族多年来一直与盛世才省政府发生冲突，外国也曾支持多个组织发动暴乱。"
 SIK_Extensive_turkicism:0 "泛突厥主义"
 SIK_Improve_production_capacity:0 "提高生产能力"
 SIK_Infantry_assault:0 "突击队"
 SIK_Kicking_out_different_nation:0 "驱逐少数民族"
 SIK_Malpractice_reform:0 "消除弊端"
 SIK_Malpractice_reform_desc:0 "新疆有太多不公正的现象。我们必须开始改善这种状况。"
 SIK_Monetary_unification:0 "统一货币"
 SIK_Neutral:0 "马克思机会主义"
 SIK_Neutral_desc:0 "马克思主义只是名义上的。好到足以得到苏联的支持，但还不足以加入共产国际。"
 SIK_New_currency:0 "新货币"
 SIK_New_currency_desc:0 "新疆将发行自己的纸币系统。"
 SIK_Output_Focus:0 "重视生产"
 SIK_Output_Focus_desc:0 "我们将把大部分资源放在内部建设和使用上，这对我们是有好处的。"
 SIK_Plundered_the_local_economy:0 "盗贼统治"
 SIK_Prominent_artilleryman:0 "训练有素的砲兵"
 SIK_Promote_Six_major_policies_idea:0 "伟大的八点宣言"
 SIK_Promote_Six_major_policies_idea_desc:0 "新疆省政府目前正在推行八大宣言，为此暂时要停止采取对外激进的表现。\n§W--------------§!\n§R不能对未造成紧张度的国家的製造战争目标。\n§R当盛不掌权或不再共产主义时将消失。§!"
 SIK_Province_construction_plan:0 "省级建设计划"
 SIK_Province_construction_plan_desc:0 "我们将投入大量资源，把新疆建设成为最值得自豪的先进地区。"
 SIK_Recruitment_order:0 "征兵指令"
 SIK_Reduced_ethnic_conflicts:0 "调解民族冲突"
 SIK_Repression_guerrillas:0 "镇压游击队"
 SIK_Revolutionary_propaganda:0 "革命宣传"
 SIK_Sheng_group:0 "强化我们的派系"
 SIK_Sheng_group_desc:0 "我们可以建立一个以盛世才为核心的机构。"
 SIK_Sinkiang_King:0 "新疆王"
 SIK_Sinkiang_King_desc:0 "要维持一个稳固的统治是很困难的，尤其是在强敌环伺的情况下。"
 SIK_Sinkiang_coalition_government:0 "联合政府"
 SIK_Six_major_policies_idea:0 "六大政策"
 SIK_Six_major_policies_idea_desc:0 "这六项政策对新疆的内部来说意义重大，相信它们能对省政府起到更大的支持作用。\n§W--------------§!\n§R当盛世才不再掌权或不再是共产主义者时，这些政策就会失效。§!"
 SIK_Soviet_authorize_design:0 "苏联设计图"
 SIK_Soviet_supports_armed_groups:0 "苏联支持的民兵"
 SIK_Soviet_supports_armed_groups_desc:0 "由于盛世才最近的政治僵局，苏联支持的民兵组织已成立。一旦盛世才不再掌权时，这可能导致动乱和潜在的内战。"
 SIK_Stable_politics:0 "稳定政府"
 SIK_Support_idea:0 "苏联的支持"
 SIK_Support_idea_desc:0 "没有苏联的支持，盛世才在新疆地区的统治可能会有严重的危险。"
 SIK_Trade_in_xinjiang_smuggling:0 "走私武器"
 SIK_Weakened_ussr_influence:0 "削弱苏联的支持"
 SIK_Weakened_ussr_influence_desc:0 "除非苏联决定入侵新疆，否则它不会对我们的领导层构成直接威胁。然而，苏联仍然可以支持一些组织企图推翻我们。"
